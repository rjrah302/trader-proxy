// وقت السوق الأمريكي بالدقائق من منتصف الليل UTC
function getMarketTimes() {
  const now = new Date();
  const isSummer = (() => {
    const y = now.getUTCFullYear();
    const start = new Date(Date.UTC(y,2,8)); start.setUTCDate(8-(start.getUTCDay()||7)+7);
    const end   = new Date(Date.UTC(y,10,1)); end.setUTCDate(1+(7-end.getUTCDay())%7);
    return now >= start && now < end;
  })();
  return {
    // Pre-Market: 4:00ص - 4:30م سعودي (صيف: UTC 01:00-13:30)
    preOpen:  isSummer ? 60   : 120,   // 4:00ص  / 5:00ص  سعودي
    open:     isSummer ? 810  : 870,   // 4:30م  / 5:30م  سعودي
    close:    isSummer ? 1200 : 1260,  // 11:00م / 12:00ص سعودي
    // After Hours: 11:00م - 1:00ص سعودي (صيف: UTC 20:00-22:00)
    afterEnd: isSummer ? 1320 : 1380,  // 1:00ص  / 2:00ص  سعودي
    midDay:   isSummer ? 960  : 1020,  // 7:00م  / 8:00م  سعودي
    isSummer,
  };
}

function getNowMins() {
  const now = new Date();
  return now.getUTCHours()*60 + now.getUTCMinutes();
}

// ── حالة السوق الأربع
function getMarketSession() {
  if(window.DEBUG_MARKET) return 'open';
  const t = getMarketTimes();
  const m = getNowMins();

  // السوق مفتوح
  if(m >= t.open && m < t.close) return 'open';

  // Pre-Market (صباحاً قبل الفتح)
  if(m >= t.preOpen && m < t.open) return 'pre';

  // After Hours — نتعامل مع منتصف الليل
  // afterEnd قد يتجاوز 1440 (24 ساعة) في الشتاء
  if(t.afterEnd <= 1440) {
    // لا يتجاوز منتصف الليل — شيك عادي
    if(m >= t.close && m < t.afterEnd) return 'after';
  } else {
    // يتجاوز منتصف الليل — نشيك على جزئين
    const afterEndAdj = t.afterEnd - 1440; // الوقت بعد منتصف الليل
    if(m >= t.close || m < afterEndAdj) return 'after';
  }

  return 'closed';
}

function isMarketOpen() {
  return getMarketSession() === 'open';
}

// ── معلومات حالة السوق للعرض
function getSessionInfo() {
  const session = getMarketSession();
  const t = getMarketTimes();
  const tz = t.isSummer ? 'صيف' : 'شتاء';
  switch(session) {
    case 'open':
      return {
        label:  'السوق مفتوح',
        sub:    `4:30م - 11:00م ${tz}`,
        color:  '#00ff88',
        dot:    true,
        canRec: true,   // يمكن التوصية
      };
    case 'pre':
      return {
        label:  'Pre-Market',
        sub:    `4:00ص - 4:30م ${tz}`,
        color:  '#ffe033',
        dot:    false,
        canRec: false,  // لا توصيات — أسعار غير رسمية
      };
    case 'after':
      return {
        label:  'After Hours',
        sub:    `11:00م - 1:00ص ${tz}`,
        color:  '#ff7a00',
        dot:    false,
        canRec: false,  // لا توصيات — تداول محدود
      };
    default:
      return {
        label:  'السوق مغلق',
        sub:    `يفتح ${t.isSummer?'4:30م':'5:30م'} ${tz}`,
        color:  '#ff7a00',
        dot:    false,
        canRec: false,
      };
  }
}

const $ = id => document.getElementById(id);

function el(tag, props={}, children=[]) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => {
    if(k==='style' && typeof v==='object') Object.assign(e.style, v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  (Array.isArray(children)?children:[children]).forEach(c => {
    if(c===null||c===undefined||c===false) return;
    e.appendChild(typeof c==='string'||typeof c==='number'
      ? document.createTextNode(c) : c);
  });
  return e;
}

function txt(t, style={}) {
  return el('span', {style}, [String(t??'')]);
}

function fmt(n, d=2) {
  if(n===null||n===undefined||isNaN(n)) return '—';
  return Number(n).toFixed(d);
}

function fmtPrice(n) {
  if(!n) return '—';
  return '$'+Number(n).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
}

// ── 0. اتجاه السوق العام (SPY + QQQ)
async function fetchMarketTrend() {
  try {
    const res  = await fetch(`https://financialmodelingprep.com/stable/quote?symbol=SPY,QQQ&apikey=${API_KEY}`);
    const data = await res.json();
    if(!Array.isArray(data)) return;

    data.forEach(q => {
      if(q.symbol==='SPY') state.spyChange = parseFloat(q.changesPercentage||0);
      if(q.symbol==='QQQ') state.qqqChange = parseFloat(q.changesPercentage||0);
    });

    // اتجاه السوق = متوسط SPY + QQQ
    if(state.spyChange!==null && state.qqqChange!==null) {
      const avg = (state.spyChange + state.qqqChange) / 2;
      state.marketTrend =
        avg >= 0.3  ? 'bullish'  :  // صاعد واضح
        avg <= -0.3 ? 'bearish'  :  // هابط واضح
                      'neutral';    // محايد
    }
  } catch(e) {}
}


async function fetchPrices() {
  state.loadingPrices = true;
  const symbols = ALL_STOCKS.map(s=>s.id);
  const BATCH = 25;
  state.dataCheck.prices.total = symbols.length;
  let realCount = 0;

  for(let i=0; i<symbols.length; i+=BATCH) {
    const batch = symbols.slice(i, i+BATCH).join(',');
    try {
      const res = await fetch(`https://financialmodelingprep.com/stable/quote?symbol=${batch}&apikey=${API_KEY}`);
      const data = await res.json();
      if(Array.isArray(data)) {
        data.forEach(q => {
          const price = parseFloat(q.price);
          if(q.symbol && price > 0) {
            state.prices[q.symbol] = {
              price,
              change:    parseFloat(q.changesPercentage??q.change??0),
              high:      parseFloat(q.dayHigh||price*1.01),
              low:       parseFloat(q.dayLow||price*0.99),
              volume:    parseInt(q.volume||0),
              avgVolume: parseInt(q.avgVolume||0),
              isReal:    true,
            };
            realCount++;
          }
        });
      }
    } catch(e) {}
  }

  state.dataCheck.prices.real = realCount;
  state.loadingPrices = false;
}

// ── 2. مؤشرات تقنية (3 طلبات/سهم، دفعات 8)
async function fetchIndicators() {
  state.loadingIndicators = true;
  state.indicators = {};

  const symbols = ALL_STOCKS.map(s=>s.id);
  const BATCH = 8;
  let dc = state.dataCheck;
  dc.rsi.total = dc.macd.total = dc.ma.total =
  dc.support.total = dc.atr.total = dc.bb.total = symbols.length;

  for(let i=0; i<symbols.length; i+=BATCH) {
    const batch = symbols.slice(i, i+BATCH);

    await Promise.all(batch.map(async sym => {
      try {
        // 3 طلبات: RSI + SMA50 + تاريخي 60 يوم
        const [rsiRes, sma50Res, histRes] = await Promise.all([
          fetch(`https://financialmodelingprep.com/stable/technical-indicators/rsi?symbol=${sym}&periodLength=14&timeframe=1day&apikey=${API_KEY}`),
          fetch(`https://financialmodelingprep.com/stable/technical-indicators/sma?symbol=${sym}&periodLength=50&timeframe=1day&apikey=${API_KEY}`),
          fetch(`https://financialmodelingprep.com/stable/historical-price-eod/full?symbol=${sym}&limit=60&apikey=${API_KEY}`)
        ]);

        const [rsiData, sma50Data, histData] = await Promise.all([
          rsiRes.json(), sma50Res.json(), histRes.json()
        ]);

        // ── RSI
        const rsi = Array.isArray(rsiData) && rsiData[0]?.rsi!=null
          ? parseFloat(rsiData[0].rsi) : null;

        // ── البيانات التاريخية
        const hist   = histData?.historical || [];
        const closes = hist.map(d=>d.close).reverse();
        const highs  = hist.map(d=>d.high).reverse();
        const lows   = hist.map(d=>d.low).reverse();

        if(closes.length < 20) return; // بيانات غير كافية

        // ── MA20 (من آخر 20 إغلاق)
        const ma20 = closes.slice(-20).reduce((a,b)=>a+b,0)/20;

        // ── MA50
        const ma50api = Array.isArray(sma50Data) && sma50Data[0]?.sma!=null
          ? parseFloat(sma50Data[0].sma) : null;
        const ma50 = ma50api ?? (closes.length>=50
          ? closes.slice(-50).reduce((a,b)=>a+b,0)/50 : null);

        // ── MACD (EMA12 - EMA26)
        function calcEMA(data, period) {
          if(data.length < period) return null;
          const k = 2/(period+1);
          let val = data.slice(0,period).reduce((a,b)=>a+b,0)/period;
          for(let j=period; j<data.length; j++) val = data[j]*k + val*(1-k);
          return val;
        }
        const ema12 = calcEMA(closes, 12);
        const ema26 = calcEMA(closes, 26);
        const macd  = (ema12!=null && ema26!=null) ? ema12-ema26 : null;

        // ── Bollinger Bands (من MA20)
        const last20 = closes.slice(-20);
        const std = Math.sqrt(last20.reduce((s,p)=>s+Math.pow(p-ma20,2),0)/20);
        const bb_upper = ma20 + 2*std;
        const bb_lower = ma20 - 2*std;

        // ── دعم ومقاومة (خوارزمية محسّنة)
        // نبحث عن مستويات لمسها السهم مرتين أو أكثر ورجع منها
        function findLevels(prices, highs, lows, cur) {
          const tolerance = cur * 0.015; // 1.5% هامش للتجمع
          const levels = [];

          // نجمع كل القمم والقيعان
          for(let j=1; j<highs.length-1; j++) {
            // قمة محلية: أعلى من يمينه ويساره
            if(highs[j] >= highs[j-1] && highs[j] >= highs[j+1])
              levels.push({price:highs[j], type:'resistance'});
            // قاع محلي: أقل من يمينه ويساره
            if(lows[j] <= lows[j-1] && lows[j] <= lows[j+1])
              levels.push({price:lows[j], type:'support'});
          }

          // تجميع المستويات المتقاربة (cluster)
          const clusters = [];
          levels.forEach(l => {
            const existing = clusters.find(c =>
              Math.abs(c.price - l.price) <= tolerance
            );
            if(existing) {
              existing.touches++;
              existing.price = (existing.price + l.price) / 2; // متوسط
            } else {
              clusters.push({price:l.price, type:l.type, touches:1});
            }
          });

          // فلتر: مستويات لمسها السهم مرتين على الأقل
          const strong = clusters.filter(c => c.touches >= 2);

          // أقرب مقاومة فوق السعر الحالي
          const resistances = strong
            .filter(c => c.price > cur)
            .sort((a,b) => a.price - b.price);

          // أقرب دعم تحت السعر الحالي
          const supports = strong
            .filter(c => c.price < cur)
            .sort((a,b) => b.price - a.price);

          // Fallback: لو ما وجدنا مستوى قوي نستخدم أعلى/أدنى 20 يوم
          const resistance = resistances[0]?.price
            ?? (highs.length ? Math.max(...highs.slice(-20)) : null);
          const support = supports[0]?.price
            ?? (lows.length  ? Math.min(...lows.slice(-20))  : null);

          // مستويات نفسية ($50، $100، $150...)
          const psychLevels = [10,15,20,25,30,40,50,60,75,80,100,120,
            150,175,200,250,300,350,400,450,500,600,700,800,1000];
          const nearPsych = psychLevels.find(l =>
            l > cur && l < cur*1.05
          );

          return {
            resistance: nearPsych ?? resistance,
            support,
            resistanceTouches: resistances[0]?.touches ?? 1,
            supportTouches:    supports[0]?.touches    ?? 1,
          };
        }

        const levels = findLevels(closes, highs, lows, cur);
        const resistance = levels.resistance;
        const support    = levels.support;
        const resTouches = levels.resistanceTouches;
        const supTouches = levels.supportTouches;

        // nearSupport: السعر فوق الدعم وقريب منه بـ 3%
        const nearSupport    = support && cur > support ? cur <= support*1.03 : false;
        // nearResistance: السعر أقل من المقاومة وقريب منها بـ 2%
        const nearResistance = resistance && cur < resistance ? cur >= resistance*0.98 : false;

        // ── ATR (14 يوم)
        let atrPct = null;
        if(highs.length >= 15) {
          const trs = [];
          for(let j=highs.length-14; j<highs.length; j++) {
            const prev = closes[j-1] ?? closes[j];
            trs.push(Math.max(
              highs[j]-lows[j],
              Math.abs(highs[j]-prev),
              Math.abs(lows[j]-prev)
            ));
          }
          const atr = trs.reduce((a,b)=>a+b,0)/trs.length;
          atrPct = cur>0 ? (atr/cur)*100 : null;
        }

        // ── Stochastic RSI من آخر 14 قيمة RSI
        // نحسب RSI لآخر 28 يوم ثم نأخذ آخر 14 قيمة
        let stochRsi = null;
        if(closes.length >= 28) {
          const rsiArr = [];
          for(let j=14; j<=closes.length-1; j++) {
            const sl = closes.slice(j-14, j+1);
            let ag=0, al=0;
            for(let k=1; k<sl.length; k++) {
              const d = sl[k]-sl[k-1];
              if(d>0) ag+=d; else al+=Math.abs(d);
            }
            ag/=14; al/=14;
            const rs = al===0?100:ag/al;
            rsiArr.push(100-(100/(1+rs)));
          }
          if(rsiArr.length>=14) {
            const recent = rsiArr.slice(-14);
            const minR = Math.min(...recent);
            const maxR = Math.max(...recent);
            stochRsi = maxR===minR ? 50 : ((rsiArr[rsiArr.length-1]-minR)/(maxR-minR))*100;
          }
        }

        // ── حفظ
        state.indicators[sym] = {
          rsi, ma20, ma50, macd, bb_upper, bb_lower,
          support, resistance, nearSupport, nearResistance,
          resTouches, supTouches,
          atrPct, stochRsi,
          closes: closes.slice(-30),
        };

        // ── Data Check
        if(rsi!=null)            dc.rsi.real++;
        if(macd!=null)           dc.macd.real++;
        if(ma20!=null && ma50!=null) dc.ma.real++;
        if(support!=null)        dc.support.real++;
        if(atrPct!=null)         dc.atr.real++;
        if(bb_upper!=null)       dc.bb.real++;

      } catch(e) {}
    }));

    // 3 ثواني بين الدفعات = 8×3=24 طلب/دفعة × (n-1)×3ث
    // = آمن تحت 750 طلب/دقيقة
    if(i+BATCH < symbols.length) {
      await new Promise(r=>setTimeout(r,3000));
    }
  }

  // Volume check
  dc.volume.total = ALL_STOCKS.length;
  dc.volume.real  = Object.values(state.prices).filter(p=>p.avgVolume>0).length;

  state.loadingIndicators = false;
  state.indicatorsDone    = true;
}

// ── 3. أخبار
async function fetchNews() {
  try {
    const syms = ALL_STOCKS.map(s=>s.id).join(',');
    const res  = await fetch(`https://financialmodelingprep.com/stable/news/stock?symbols=${syms}&limit=100&apikey=${API_KEY}`);
    const data = await res.json();
    state.news = {};
    if(Array.isArray(data)) {
      data.forEach(n => {
        const sym = n.symbol;
        if(!sym) return;
        if(!state.news[sym]) state.news[sym] = {pos:0, neg:0};
        const t = (n.title||'').toLowerCase();
        if(/beat|surge|jump|rally|strong|record|growth/.test(t)) state.news[sym].pos++;
        else if(/miss|fall|drop|decline|loss|cut|weak/.test(t)) state.news[sym].neg++;
      });
    }
  } catch(e) {}
}

// ── 4. أرباح قادمة
async function fetchEarnings() {
  try {
    const today    = new Date().toISOString().slice(0,10);
    const nextWeek = new Date(Date.now()+14*864e5).toISOString().slice(0,10);
    const res  = await fetch(`https://financialmodelingprep.com/stable/earning-calendar?from=${today}&to=${nextWeek}&apikey=${API_KEY}`);
    const data = await res.json();
    state.earnings = {};
    if(Array.isArray(data)) {
      data.forEach(e => {
        if(!e.symbol) return;
        const days = Math.ceil((new Date(e.date)-new Date())/(864e5));
        if(days>=0 && days<=14) state.earnings[e.symbol] = days;
      });
    }
  } catch(e) {}
}

// ── 5. Profiles
async function fetchProfiles() {
  const symbols = ALL_STOCKS.map(s=>s.id);
  const BATCH   = 20;
  for(let i=0; i<symbols.length; i+=BATCH) {
    const batch = symbols.slice(i,i+BATCH).join(',');
    try {
      const res  = await fetch(`https://financialmodelingprep.com/stable/profile?symbol=${batch}&apikey=${API_KEY}`);
      const data = await res.json();
      if(Array.isArray(data)) {
        data.forEach(p => {
          if(p.symbol) state.profiles[p.symbol] = {
            beta:      parseFloat(p.beta||0)||null,
            avgVolume: parseInt(p.avgVolume||0)||null,
            mktCap:    p.mktCap||null,
          };
        });
      }
    } catch(e) {}
    if(i+BATCH < symbols.length) await new Promise(r=>setTimeout(r,500));
  }
}

// ================================================================
// ═══════════════════ SIGNAL ENGINE ══════════════════════════════
// ================================================================

function calcSignal(stock) {
  const p   = state.prices[stock.id];
  const ind = state.indicators[stock.id];
  const pro = state.profiles[stock.id];
  const news= state.news[stock.id]||{pos:0,neg:0};
  const earn= state.earnings[stock.id]??999;

  // ══ شرط أساسي: يجب أن يكون لدينا سعر حقيقي ومؤشرات حقيقية
  if(!p?.isReal || !ind) return null;

  const price = p.price;
  const {rsi, ma20, ma50, macd, bb_upper, bb_lower,
         support, resistance, nearSupport, nearResistance,
         atrPct, stochRsi} = ind;

  // ══ حساب نقاط الشراء والبيع
  let buy=0, sell=0, reasons=[];

  // 1. RSI
  if(rsi!=null) {
    if(rsi<30)      { buy+=2; reasons.push('RSI '+fmt(rsi)+'% — تشبع بيع قوي'); }
    else if(rsi<40) { buy++;  reasons.push('RSI '+fmt(rsi)+'% — ميل للشراء'); }
    else if(rsi>70) { sell+=2;}
    else if(rsi>60) { sell++; }
  }

  // 2. MA Cross
  if(ma20!=null && price>ma20) { buy++;  reasons.push('السعر فوق MA20'); }
  else if(ma20!=null)          { sell++; }
  if(ma20!=null && ma50!=null && ma20>ma50) { buy++;  reasons.push('MA20 فوق MA50 — اتجاه صاعد'); }
  else if(ma20!=null && ma50!=null)         { sell++; }

  // 3. MACD
  if(macd!=null) {
    if(macd>0) { buy++;  reasons.push('MACD إيجابي — زخم شراء'); }
    else       { sell++; }
  }

  // 4. Bollinger Bands
  if(bb_lower!=null && price<=bb_lower) { buy++;  reasons.push('السعر عند الحد الأدنى لـ BB'); }
  if(bb_upper!=null && price>=bb_upper) { sell++; }

  // 5. دعم/مقاومة
  if(nearSupport)    { buy+=2; reasons.push('قريب من الدعم $'+fmt(support,2)); }
  if(nearResistance) { sell+=2; }

  // 6. Stochastic RSI (حقيقي الآن)
  if(stochRsi!=null) {
    if(stochRsi<20)      { buy+=2; reasons.push('Stoch RSI '+fmt(stochRsi)+'% — تشبع بيع شديد'); }
    else if(stochRsi<30) { buy++;  reasons.push('Stoch RSI '+fmt(stochRsi)+'% — تشبع بيع'); }
    else if(stochRsi>80) { sell+=2; }
    else if(stochRsi>70) { sell++; }
  }

  // 7. Volume
  const vol    = p.volume;
  const avgVol = p.avgVolume || pro?.avgVolume || 0;
  const volR   = avgVol>0 ? vol/avgVol : 0;
  if(volR>1.5) {
    if(buy>sell) { buy++;  reasons.push('حجم تداول مرتفع ×'+fmt(volR,1)); }
    else         { sell++; }
  }

  // 8. ATR Risk/Reward
  let riskReward = 0;
  if(atrPct!=null && resistance!=null && resistance>price) {
    const distToRes  = (resistance-price)/price*100;
    const atrStop    = atrPct*1.5;
    riskReward       = atrStop>0 ? distToRes/atrStop : 0;
    if(riskReward>=2.5) { buy+=2; reasons.push('نسبة مخاطرة/مكافأة '+fmt(riskReward,1)+'x ممتازة'); }
    else if(riskReward>=1.5) { buy++; }
    else if(riskReward<1)    { sell++; }
  }

  // ══ عقوبات
  if(earn<=5)       { sell+=3; }
  else if(earn<=10) { sell+=1; }
  const change = p.change||0;
  if(change>10)     { sell+=3; } // gap-up مبالغ
  else if(change>5) { sell++;  }
  if(news.neg>=2)   { sell+=2; }
  else if(news.neg===1) { sell++; }
  buy += Math.min(3, news.pos);

  // ══ الإشارة النهائية
  const netScore = buy - sell;
  const signal   = netScore>=4?"شراء قوي":netScore>=2?"شراء":
                   netScore<=-4?"بيع قوي":netScore<=-2?"بيع":"انتظار";

  // ══ قوة الإشارة (0-100)
  const strength = Math.min(100, Math.max(0, netScore*10 + 50));

  // ══ الثقة (بناءً على عدد المؤشرات المتوفرة)
  let confidence = 0;
  if(rsi!=null)     confidence+=20;
  if(macd!=null)    confidence+=20;
  if(ma20!=null && ma50!=null) confidence+=15;
  if(support!=null) confidence+=15;
  if(atrPct!=null)  confidence+=15;
  if(stochRsi!=null)confidence+=15;
  // مكافآت
  if(p.avgVolume>0) confidence  = Math.min(100, confidence+5);
  if(news.pos>0)    confidence  = Math.min(100, confidence+5);

  // ══ هدف الربح ووقف الخسارة
  const atrStop  = atrPct ? atrPct*1.5 : 2;
  const stopLoss = price*(1-atrStop/100);
  const target   = resistance ?? price*(1+atrStop*2/100);
  const profitPct= (target-price)/price*100;

  // ══ جودة الصفقة
  let tradeQuality = 0;
  if(riskReward>=2.5)  tradeQuality+=35;
  else if(riskReward>=1.5) tradeQuality+=20;
  if(nearSupport)      tradeQuality+=30;
  if(profitPct>=3)     tradeQuality+=20;
  else if(profitPct>=2)tradeQuality+=10;
  if(atrPct!=null && atrPct<3) tradeQuality+=15;
  tradeQuality = Math.min(100, tradeQuality);

  // ══ توقيت الدخول
  // حساب المسافة بين السعر الحالي والدعم
  const distToSupport = support>0 ? (price-support)/price*100 : 999;

  let entryTiming, entryColor, entryNote;

  if(nearSupport) {
    // السعر قريب من الدعم (أفضل توقيت)
    entryTiming = 'ادخل الآن';
    entryColor  = C.green;
    entryNote   = 'السعر عند الدعم — أفضل نقطة دخول';
  } else if(distToSupport <= 5) {
    // بعيد عن الدعم بـ 5% أو أقل — مقبول
    entryTiming = 'مقبول';
    entryColor  = C.blue;
    entryNote   = 'انتظر تراجعاً بسيطاً نحو $'+fmt(support,2)+' أفضل';
  } else if(distToSupport <= 10) {
    // بعيد عن الدعم بـ 10% — انتظر
    entryTiming = 'انتظر';
    entryColor  = C.yellow;
    entryNote   = 'السعر بعيد عن الدعم — انتظر تراجعاً لـ $'+fmt(support,2);
  } else {
    // بعيد جداً عن الدعم
    entryTiming = 'متأخر';
    entryColor  = C.orange;
    entryNote   = 'الدخول الآن محفوف بالمخاطر — الدعم عند $'+fmt(support,2);
  }

  // نقطة الدخول المثالية
  const idealEntry = nearSupport ? price : (support ? support*1.01 : price);

  return {
    id: stock.id, name: stock.name, sector: stock.sector, cat: stock.cat,
    price, change, high:p.high, low:p.low, volume:vol, volR,
    rsi, ma20, ma50, macd, bb_upper, bb_lower,
    support, resistance, nearSupport, nearResistance,
    resTouches: ind.resTouches??1, supTouches: ind.supTouches??1,
    atrPct, stochRsi, riskReward,
    signal, strength, confidence, tradeQuality,
    netScore, buy, sell, reasons,
    stopLoss, target, profitPct,
    entryTiming, entryColor, entryNote, idealEntry, distToSupport,
    earnings: earn,
    news: news,
    isConviction: (state.sessionOneIds||[]).includes(stock.id),
    beta: pro?.beta || stock.beta,
  };
}

// ================================================================
// ═══════════════════ RECOMMENDATION ENGINE ══════════════════════
// ================================================================

function calcRecs() {
  // ══ شروط صارمة للتوصية
  const candidates = ALL_STOCKS
    .map(s => calcSignal(s))
    .filter(Boolean)
    // شرط 1: إشارة شراء
    .filter(s => s.signal==='شراء قوي' || s.signal==='شراء')
    // شرط 2: ثقة كافية (50%+)
    .filter(s => s.confidence >= 50)
    // شرط 3: جودة صفقة مقبولة
    .filter(s => s.tradeQuality >= 30)
    // شرط 4: هدف ربح 2%+ (مناسب لـ 1-3 أيام)
    .filter(s => s.profitPct >= 2)
    // شرط 5: لا أرباح قريبة
    .filter(s => s.earnings > 5)
    // شرط 6: لا gap-up مبالغ
    .filter(s => (s.change||0) <= 8)
    // شرط 7: لا توصية إذا التوقيت متأخر — تناقض مع إشارة الشراء
    .filter(s => s.entryTiming !== 'متأخر');

  // ترتيب: قوة × 0.4 + ثقة × 0.3 + جودة × 0.2 + توقيت × 0.1
  // FIX: conviction = 10 بدل 20 — لا يطغى على قوة السهم الحقيقية
  candidates.sort((a,b) => {
    const timingBonus = (s) =>
      s.entryTiming==='ادخل الآن' ? 15 :
      s.entryTiming==='مقبول'     ? 5  : 0;
    const convictionBonus = (s) => s.isConviction ? 10 : 0;
    const scoreA = a.strength*0.4 + a.confidence*0.3 + a.tradeQuality*0.2
                 + timingBonus(a) + convictionBonus(a);
    const scoreB = b.strength*0.4 + b.confidence*0.3 + b.tradeQuality*0.2
                 + timingBonus(b) + convictionBonus(b);
    return scoreB - scoreA;
  });

  // 5 توصيات فقط — موزعة على قطاعات مختلفة
  const recs = [];
  const usedSectors = new Set();
  for(const c of candidates) {
    if(recs.length>=5) break;
    // نحاول تنويع القطاعات
    if(usedSectors.has(c.sector) && recs.length<3) continue;
    recs.push(c);
    usedSectors.add(c.sector);
  }
  // لو ما وصلنا 5، نكمل بدون تنويع
  if(recs.length<5) {
    for(const c of candidates) {
      if(recs.length>=5) break;
      if(!recs.find(r=>r.id===c.id)) recs.push(c);
    }
  }

  state.recs = recs;
  state.recsTime = new Date();

  // حفظ للـ High Conviction
  try {
    localStorage.setItem('s1_recs', JSON.stringify(recs.map(r=>r.id)));
    localStorage.setItem('recs_time', new Date().toISOString());
  } catch(e) {}

  return recs;
}

// ================================================================
// ═══════════════════ SPECULATIVE ENGINE ═════════════════════════
// ================================================================

function calcSpeculative() {
  // ══ شرط جوهري: السوق العام يجب أن يكون محايداً أو صاعداً
  // في السوق الهابط أسهم المجازفة تنهار بسرعة
  if(state.marketTrend === 'bearish') {
    state.speculativeRecs = [];
    return [];
  }
  const candidates = ALL_STOCKS
    // FIX 1: نشمل كل سهم beta >= 2 بغض النظر عن القطاع
    .filter(s => s.cat==='future' || s.beta>=2 || (s.cat==='small' && s.beta>=1.8))
    .map(s => {
      const p   = state.prices[s.id];
      const ind = state.indicators[s.id];
      const pro = state.profiles[s.id];

      // شرط أساسي: سعر ومؤشرات حقيقية
      if(!p?.isReal || !ind) return null;

      const beta  = pro?.beta || s.beta || 1;
      const volR  = p.avgVolume>0 ? p.volume/p.avgVolume : 0;
      const price = p.price;

      let score = 0, reasons = [];

      // ── Beta (الأساس)
      if(beta>=2 && beta<=4)  { score+=25; reasons.push('Beta '+fmt(beta,1)+' — تقلب مثالي للمجازفة'); }
      else if(beta>4)         { score+=10; reasons.push('Beta '+fmt(beta,1)+' — خطر مرتفع جداً'); }
      else if(beta>=1.5)      { score+=15; }

      // ── RSI — FIX 2: rsi<30 فرصة ارتداد للمجازفة
      if(ind.rsi!=null) {
        if(ind.rsi<30)               { score+=12; reasons.push('RSI '+fmt(ind.rsi)+'% — تشبع بيع = ارتداد محتمل'); }
        else if(ind.rsi>50 && ind.rsi<70) { score+=15; reasons.push('RSI '+fmt(ind.rsi)+'% — زخم صاعد'); }
        else if(ind.rsi>=30 && ind.rsi<=50) { score+=8; }
        else if(ind.rsi>=70) { score-=5; } // تشبع شراء — تحذير
      }

      // ── MACD
      if(ind.macd!=null && ind.macd>0) { score+=15; reasons.push('MACD إيجابي — زخم شراء'); }

      // ── MA Cross
      if(ind.ma20!=null && ind.ma50!=null && ind.ma20>ind.ma50)
        { score+=10; reasons.push('اتجاه صاعد متوسط المدى'); }

      // ── السعر المنخفض
      if(price<10)      { score+=15; reasons.push('سعر منخفض — إمكانية مضاعفة عالية'); }
      else if(price<30) { score+=10; }
      else if(price<80) { score+=5; }

      // ── حجم التداول
      if(volR>2)        { score+=10; reasons.push('حجم ×'+fmt(volR,1)+' — اهتمام كبير'); }
      else if(volR>1.5) { score+=5; }

      // ── عقوبات
      if((state.earnings[s.id]??999)<=7) { score-=20; }
      if((p.change||0)>15) { score-=15; }
      if(ind.rsi!=null && ind.rsi>80) { score-=15; }

      score = Math.max(0, score);
      if(score < 35) return null;

      // ── FIX 3: هدف الربح ووقف الخسارة للمجازفة
      // المجازفة = ATR أكبر → هدف أعلى ووقف أوسع
      const atrStop   = ind.atrPct ? ind.atrPct * 2   : 5;  // وقف خسارة: 2x ATR (أوسع من العادي)
      const atrTarget = ind.atrPct ? ind.atrPct * 4   : 10; // هدف: 4x ATR
      const stopLoss  = price * (1 - atrStop/100);
      const target    = ind.resistance && ind.resistance > price
        ? ind.resistance
        : price * (1 + atrTarget/100);
      const profitPct = (target - price) / price * 100;
      const lossPct   = (price - stopLoss) / price * 100;
      const riskReward= lossPct > 0 ? profitPct / lossPct : 0;

      // ── FIX 4: تخصيص رأس المال — 5-10% فقط للمجازفة
      const allocPct  = beta >= 3 ? 0.05 : 0.08; // beta عالي = 5%، طبيعي = 8%
      const allocSar  = state.capital * allocPct;
      const qty       = allocSar > 0 && price > 0
        ? Math.floor(allocSar / (price * USD_RATE)) : 0;
      const potProfit = qty * price * USD_RATE * (profitPct/100);
      const potLoss   = qty * price * USD_RATE * (lossPct/100);

      // ── FIX 5: توقيت الدخول للمجازفة
      const distToSup = ind.support > 0 ? (price - ind.support) / price * 100 : 999;
      const entryTiming =
        ind.nearSupport     ? 'ادخل الآن' :
        distToSup <= 8      ? 'مقبول'     :
        distToSup <= 15     ? 'انتظر'     : 'متأخر';

      const label =
        score>=80 ? '🚀 Potential Explosion' :
        score>=65 ? '🔥 High Momentum'       :
        score>=50 ? '⚡ Aggressive'           :
                    '🎲 Speculative';

      return {
        ...s, price, change:p.change, volR, beta, score, label, reasons,
        rsi:ind.rsi, macd:ind.macd, ma20:ind.ma20, ma50:ind.ma50,
        support:ind.support, resistance:ind.resistance, atrPct:ind.atrPct,
        stopLoss, target, profitPct, lossPct, riskReward,
        allocPct, allocSar, qty, potProfit, potLoss,
        entryTiming,
        nearSupport: ind.nearSupport,
      };
    })
    .filter(Boolean)
    // FIX 6: 5 فقط بدل 10 للتركيز
    .sort((a,b) => b.score - a.score)
    .slice(0, 5);

  state.speculativeRecs = candidates;
  return candidates;
}

let _indicatorsLoading = false;

async function loadData(full=false) {
  // تحميل الأسعار + اتجاه السوق دائماً
  await Promise.all([fetchPrices(), fetchMarketTrend()]);

  // FIX: render مباشرة بعد الأسعار — يحدّث تبويب السوق فوراً
  render();

  // تحميل المؤشرات مرة واحدة يومياً عند فتح السوق
  // أو عند الطلب الصريح (full=true)
  if((isMarketOpen() || full) && !state.indicatorsDone && !_indicatorsLoading) {
    _indicatorsLoading = true;
    render();

    // نبدأ الجلب بالتوازي
    await Promise.all([
      fetchIndicators(),
      fetchNews(),
      fetchEarnings(),
      fetchProfiles(),
    ]);

    _indicatorsLoading = false;

    // احسب التوصيات بعد اكتمال البيانات
    calcRecs();
    calcSpeculative();
  } else if(state.indicatorsDone) {
    // البيانات جاهزة — فقط حدّث التوصيات بالأسعار الجديدة
    calcRecs();
    calcSpeculative();
  }

  render();
}

          color: r.confidence>=80?C.green:r.confidence>=60?C.blue:C.yellow,
        }}, [r.confidence+'%']),
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['جودة: '+r.tradeQuality+'%']),
      ]),
    ]),

    // شريط القوة
    el('div', {style:{marginBottom:'8px'}}, [
      el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'3px'}}, [
        el('span', {style:{fontSize:'9px', color:C.text3}}, ['قوة الإشارة']),
        el('span', {style:{fontSize:'9px', color:C.text2}}, [r.strength+'%']),
      ]),
      el('div', {style:{height:'3px', background:'#1a2340', borderRadius:'2px'}}, [
        el('div', {style:{
          height:'3px', borderRadius:'2px',
          width:r.strength+'%',
          background:`linear-gradient(90deg,${C.blue},${C.green})`,
        }}),
      ]),
    ]),

    // توقيت الدخول
    el('div', {style:{
      display:'flex', alignItems:'center', justifyContent:'space-between',
      background: r.entryColor+'11',
      border:`1px solid ${r.entryColor}33`,
      borderRadius:'8px', padding:'8px 10px',
      marginBottom:'8px',
    }}, [
      el('div', {}, [
        el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'2px'}}, ['⏱ توقيت الدخول']),
        el('div', {style:{fontSize:'12px', fontWeight:'800', color:r.entryColor}}, [r.entryTiming]),
      ]),
      el('div', {style:{textAlign:'left', maxWidth:'55%'}}, [
        el('div', {style:{fontSize:'9px', color:C.text2, lineHeight:'1.4'}}, [r.entryNote]),
        r.idealEntry && r.idealEntry!==r.price && el('div', {style:{
          fontSize:'10px', fontWeight:'700', color:r.entryColor, marginTop:'2px',
        }}, ['دخول مثالي: '+fmtPrice(r.idealEntry)]),
      ]),
    ]),

    // صف 3: الدخول والخروج
    el('div', {style:{
      display:'grid', gridTemplateColumns:'1fr 1fr',
      gap:'6px', marginBottom:'8px',
    }}, [
      el('div', {style:{
        background:'rgba(0,255,136,.06)', border:'1px solid rgba(0,255,136,.15)',
        borderRadius:'8px', padding:'6px 8px',
      }}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['🎯 هدف الربح']),
        el('div', {style:{fontSize:'12px', fontWeight:'700', color:C.green}}, [fmtPrice(r.target)]),
        el('div', {style:{fontSize:'9px', color:C.green}}, ['+'+fmt(r.profitPct)+'%']),
      ]),
      el('div', {style:{
        background:'rgba(255,45,122,.06)', border:'1px solid rgba(255,45,122,.15)',
        borderRadius:'8px', padding:'6px 8px',
      }}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['🛑 وقف الخسارة']),
        el('div', {style:{fontSize:'12px', fontWeight:'700', color:C.pink}}, [fmtPrice(r.stopLoss)]),
        el('div', {style:{fontSize:'9px', color:C.pink}}, [
          '-'+fmt((r.price-r.stopLoss)/r.price*100)+'%'
        ]),
      ]),
    ]),

    // صف 4: دعم/مقاومة + MA
    el('div', {style:{
      display:'grid', gridTemplateColumns:'1fr 1fr',
      gap:'6px', marginBottom:'8px',
    }}, [
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'2px'}}, ['📊 دعم / مقاومة']),
        el('div', {style:{display:'flex', justifyContent:'space-between'}}, [
          el('div', {}, [
            el('div', {style:{fontSize:'9px', color:C.text3}}, ['دعم']),
            el('div', {style:{fontSize:'11px', fontWeight:'700', color:C.green}}, [
              r.support ? fmtPrice(r.support) : '—'
            ]),
            r.supTouches>1 && el('div', {style:{fontSize:'8px', color:C.text3}}, [
              r.supTouches+' لمسات'
            ]),
          ]),
          el('div', {style:{textAlign:'left'}}, [
            el('div', {style:{fontSize:'9px', color:C.text3}}, ['مقاومة']),
            el('div', {style:{fontSize:'11px', fontWeight:'700', color:C.pink}}, [
              r.resistance ? fmtPrice(r.resistance) : '—'
            ]),
            r.resTouches>1 && el('div', {style:{fontSize:'8px', color:C.text3}}, [
              r.resTouches+' لمسات'
            ]),
          ]),
        ]),
        r.nearSupport && el('div', {style:{
          fontSize:'9px', color:C.green, marginTop:'3px',
          background:'rgba(0,255,136,.08)', borderRadius:'4px', padding:'2px 4px',
        }}, ['✅ قريب من الدعم — توقيت جيد']),
      ]),
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'2px'}}, ['📈 المتوسطات']),
        el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'9px', color:C.text3}}, ['MA20']),
          el('span', {style:{
            fontSize:'10px', fontWeight:'700',
            color: r.price > r.ma20 ? C.green : C.pink,
          }}, [r.ma20 ? fmtPrice(r.ma20) : '—']),
        ]),
        el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'9px', color:C.text3}}, ['MA50']),
          el('span', {style:{
            fontSize:'10px', fontWeight:'700',
            color: r.price > r.ma50 ? C.green : C.pink,
          }}, [r.ma50 ? fmtPrice(r.ma50) : '—']),
        ]),
        el('div', {style:{
          fontSize:'9px', marginTop:'2px',
          color: r.ma20 > r.ma50 ? C.green : C.orange,
        }}, [
          r.ma20 > r.ma50 ? '✅ اتجاه صاعد' : '⚠️ اتجاه هابط'
        ]),
      ]),
    ]),

    // صف 5: حجم التداول
    el('div', {style:{
      background:'#060b14', borderRadius:'8px',
      padding:'8px 10px', marginBottom:'8px',
      border: r.volR>=1.5 ? '1px solid rgba(0,200,255,.2)' : '1px solid #1a2340',
    }}, [
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center'}}, [
        el('div', {}, [
          el('div', {style:{fontSize:'9px', color:C.text3}}, ['📦 حجم التداول']),
          el('div', {style:{fontSize:'11px', fontWeight:'700', color:C.text}}, [
            r.volume > 0 ? (r.volume/1e6).toFixed(1)+'M' : '—'
          ]),
        ]),
        el('div', {style:{textAlign:'center'}}, [
          el('div', {style:{fontSize:'9px', color:C.text3}}, ['مقارنة بالمعتاد']),
          el('div', {style:{
            fontSize:'13px', fontWeight:'800',
            color: r.volR>=2?C.green:r.volR>=1.3?C.blue:C.text2,
          }}, [r.volR>0 ? '×'+fmt(r.volR,1) : '—']),
        ]),
        el('div', {style:{textAlign:'left'}}, [
          el('div', {style:{fontSize:'9px', color:C.text3}}, ['التقييم']),
          el('div', {style:{
            fontSize:'10px', fontWeight:'700',
            color: r.volR>=2?C.green:r.volR>=1.3?C.blue:C.text2,
          }}, [
            r.volR>=2  ? '🔥 مرتفع جداً' :
            r.volR>=1.3? '✅ مرتفع' :
            r.volR>=0.7? '➡️ طبيعي' : '⚠️ منخفض'
          ]),
        ]),
      ]),
    ]),

    // تخصيص رأس المال
    qty>0 && el('div', {style:{
      background:'rgba(0,200,255,.06)', border:'1px solid rgba(0,200,255,.15)',
      borderRadius:'8px', padding:'8px 10px', marginBottom:'8px',
    }}, [
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center'}}, [
        el('div', {}, [
          el('div', {style:{fontSize:'9px', color:C.text3}}, ['💰 من رأس مالك (20%)']),
          el('div', {style:{fontSize:'12px', fontWeight:'700', color:C.blue}}, [
            (alloc/USD_RATE/1000).toFixed(0)+'K$ = '+qty+' سهم'
          ]),
        ]),
        el('div', {style:{textAlign:'left'}}, [
          el('div', {style:{fontSize:'9px', color:C.green}}, ['ربح متوقع: +'+fmt(potProfit,0)+' ر']),
          el('div', {style:{fontSize:'9px', color:C.pink}},  ['خسارة محتملة: -'+fmt(potLoss,0)+' ر']),
        ]),
      ]),
    ]),

    // التفاصيل (عند الضغط)
    isSelected && el('div', {style:{borderTop:'1px solid var(--border)', paddingTop:'10px'}}, [
      // أسباب التوصية
      r.reasons.length>0 && el('div', {style:{marginBottom:'8px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text2, marginBottom:'4px'}}, ['📋 أسباب التوصية:']),
        ...r.reasons.map(reason =>
          el('div', {style:{fontSize:'10px', color:C.green, marginBottom:'2px'}}, ['✓ '+reason])
        ),
      ]),
      // Stoch RSI
      r.stochRsi!=null && el('div', {style:{
        display:'flex', justifyContent:'space-between',
        fontSize:'10px', color:C.text2, marginBottom:'4px',
      }}, [
        el('span', {}, ['Stoch RSI:']),
        el('span', {style:{
          color: r.stochRsi<20?C.green:r.stochRsi>80?C.pink:C.blue,
          fontWeight:'700',
        }}, [fmt(r.stochRsi)+'%']),
      ]),
      // MACD
      r.macd!=null && el('div', {style:{
        display:'flex', justifyContent:'space-between',
        fontSize:'10px', color:C.text2, marginBottom:'4px',
      }}, [
        el('span', {}, ['MACD:']),
        el('span', {style:{color:r.macd>0?C.green:C.pink, fontWeight:'700'}}, [
          fmt(r.macd,3)+' ('+(r.macd>0?'صاعد':'هابط')+')'
        ]),
      ]),
      // R/R
      r.riskReward>0 && el('div', {style:{
        display:'flex', justifyContent:'space-between',
        fontSize:'10px', color:C.text2, marginBottom:'4px',
      }}, [
        el('span', {}, ['نسبة المخاطرة/المكافأة:']),
        el('span', {style:{color:r.riskReward>=2?C.green:C.yellow, fontWeight:'700'}}, [
          fmt(r.riskReward,1)+'x'
        ]),
      ]),
      // أرباح
      r.earnings<999 && el('div', {style:{
        fontSize:'10px', color:C.orange, marginTop:'4px',
      }}, ['⚠️ نتائج الأرباح خلال '+r.earnings+' يوم']),

      // ══ شيك ليست التشخيص
      el('div', {style:{
        marginTop:'10px',
        background:'#060b14',
        border:'1px solid rgba(0,200,255,.15)',
        borderRadius:'10px', padding:'10px',
      }}, [
        el('div', {style:{
          fontSize:'10px', fontWeight:'700', color:C.blue,
          marginBottom:'8px', display:'flex', alignItems:'center', gap:'4px',
        }}, ['🔍 تشخيص — تحقق من عمل الكود']),

        // ── المؤشرات
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['المؤشرات:']),
        ...[
          {label:'RSI',         val:r.rsi,        ok:r.rsi!=null,        display: r.rsi!=null ? fmt(r.rsi) : 'مفقود'},
          {label:'MACD',        val:r.macd,       ok:r.macd!=null,       display: r.macd!=null ? fmt(r.macd,3) : 'مفقود'},
          {label:'MA20',        val:r.ma20,       ok:r.ma20!=null,       display: r.ma20!=null ? fmtPrice(r.ma20) : 'مفقود'},
          {label:'MA50',        val:r.ma50,       ok:r.ma50!=null,       display: r.ma50!=null ? fmtPrice(r.ma50) : 'مفقود'},
          {label:'Stoch RSI',   val:r.stochRsi,   ok:r.stochRsi!=null,   display: r.stochRsi!=null ? fmt(r.stochRsi) : 'مفقود'},
          {label:'BB Upper',    val:r.bb_upper,   ok:r.bb_upper!=null,   display: r.bb_upper!=null ? fmtPrice(r.bb_upper) : 'مفقود'},
          {label:'دعم',         val:r.support,    ok:r.support!=null,    display: r.support!=null ? fmtPrice(r.support) : 'مفقود'},
          {label:'مقاومة',      val:r.resistance, ok:r.resistance!=null, display: r.resistance!=null ? fmtPrice(r.resistance) : 'مفقود'},
          {label:'ATR',         val:r.atrPct,     ok:r.atrPct!=null,     display: r.atrPct!=null ? fmt(r.atrPct)+'%' : 'مفقود'},
          {label:'حجم',         val:r.volR,       ok:r.volR>0,           display: r.volR>0 ? '×'+fmt(r.volR,1) : 'مفقود'},
        ].map(item => el('div', {style:{
          display:'flex', justifyContent:'space-between',
          fontSize:'10px', marginBottom:'2px',
          color: item.ok ? C.text2 : C.pink,
        }}, [
          el('span', {}, [(item.ok?'✅':'❌')+' '+item.label]),
          el('span', {style:{color: item.ok ? C.blue : C.pink, fontWeight:'700'}}, [item.display]),
        ])),

        // ── الشروط
        el('div', {style:{fontSize:'10px', color:C.text3, marginTop:'8px', marginBottom:'4px'}}, ['الشروط:']),
        ...[
          {label:'إشارة شراء',         ok: r.signal.includes('شراء'),  val: r.signal},
          {label:'ثقة ≥ 50%',          ok: r.confidence>=50,           val: r.confidence+'%'},
          {label:'جودة ≥ 30%',         ok: r.tradeQuality>=30,         val: r.tradeQuality+'%'},
          {label:'ربح ≥ 2%',           ok: r.profitPct>=2,             val: '+'+fmt(r.profitPct)+'%'},
          {label:'لا أرباح < 5 أيام',  ok: r.earnings>5,              val: r.earnings>900?'آمن':r.earnings+' يوم'},
          {label:'لا gap-up > 8%',     ok: (r.change||0)<=8,           val: fmt(r.change)+'%'},
          {label:'توقيت مقبول',        ok: r.entryTiming!=='متأخر',    val: r.entryTiming},
          {label:'بيانات حقيقية',      ok: true,                       val: '✅ مؤكد'},
        ].map(item => el('div', {style:{
          display:'flex', justifyContent:'space-between',
          fontSize:'10px', marginBottom:'2px',
          color: item.ok ? C.text2 : C.pink,
        }}, [
          el('span', {}, [(item.ok?'✅':'❌')+' '+item.label]),
          el('span', {style:{color: item.ok ? C.green : C.pink, fontWeight:'700'}}, [String(item.val)]),
        ])),

        // ── النتيجة
        el('div', {style:{
          marginTop:'8px', padding:'6px 8px',
          background: 'rgba(0,255,136,.08)',
          borderRadius:'6px', fontSize:'10px',
          color: C.green, fontWeight:'700',
        }}, [
          'buy='+r.buy+' | sell='+r.sell+' | netScore='+r.netScore+
          ' | strength='+r.strength+'%'
        ]),
      ]),
    ]),
  ]);
}

function renderSpecTab() {
  if(_indicatorsLoading) {
    return el('div', {style:{padding:'40px 16px', textAlign:'center'}}, [
      el('div', {style:{fontSize:'12px', color:C.blue}}, ['⏳ جاري تحميل المؤشرات...']),
    ]);
  }

  if(!state.indicatorsDone) {
    return el('div', {style:{padding:'40px 16px', textAlign:'center'}}, [
      el('div', {style:{fontSize:'40px', marginBottom:'12px'}}, ['🎲']),
      el('div', {style:{fontSize:'13px', color:C.text2}}, [
        'سيتم حساب فرص المجازفة بعد تحميل المؤشرات'
      ]),
    ]);
  }

  // ══ تحذير السوق الهابط
  if(state.marketTrend === 'bearish') {
    return el('div', {style:{padding:'20px 16px'}}, [
      el('div', {style:{
        background:'rgba(255,45,122,.08)', border:'1px solid rgba(255,45,122,.3)',
        borderRadius:'14px', padding:'20px', textAlign:'center',
      }}, [
        el('div', {style:{fontSize:'36px', marginBottom:'10px'}}, ['🛑']),
        el('div', {style:{fontSize:'14px', fontWeight:'700', color:C.pink, marginBottom:'6px'}}, [
          'السوق هابط — لا مجازفة اليوم'
        ]),
        el('div', {style:{fontSize:'11px', color:C.text2, lineHeight:'1.8', marginBottom:'10px'}}, [
          'SPY: '+(state.spyChange>=0?'+':'')+fmt(state.spyChange)+'%',
          el('br'),
          'QQQ: '+(state.qqqChange>=0?'+':'')+fmt(state.qqqChange)+'%',
          el('br'),
          'أسهم المجازفة تنهار بسرعة في السوق الهابط',
        ]),
        el('div', {style:{
          fontSize:'11px', color:C.orange,
          background:'rgba(255,122,0,.08)', borderRadius:'8px',
          padding:'8px 12px', border:'1px solid rgba(255,122,0,.2)',
        }}, ['انتظر حتى يستقر السوق قبل المجازفة ✅']),
      ]),
    ]);
  }

  const specs = state.speculativeRecs || [];

  const trendColor = state.marketTrend==='bullish'?C.green:
                     state.marketTrend==='bearish'?C.pink:C.yellow;
  const trendLabel = state.marketTrend==='bullish'?'السوق صاعد ✅':
                     state.marketTrend==='bearish'?'السوق هابط 🛑':
                     state.marketTrend==='neutral' ?'السوق محايد ⚠️':'جاري التحقق...';

  return el('div', {style:{padding:'12px 16px'}}, [
    el('div', {style:{marginBottom:'12px'}}, [
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'6px'}}, [
        el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.purple}}, [
          '🎲 رادار المجازفة — '+specs.length+' فرصة'
        ]),
        el('div', {style:{fontSize:'10px', fontWeight:'700', color:trendColor}}, [trendLabel]),
      ]),
      // SPY + QQQ
      state.spyChange!==null && el('div', {style:{
        display:'flex', gap:'8px', fontSize:'10px',
        background:'#060b14', borderRadius:'8px', padding:'5px 8px',
        marginBottom:'6px',
      }}, [
        el('span', {style:{color:C.text2}}, ['مؤشر السوق:']),
        el('span', {style:{color:state.spyChange>=0?C.green:C.pink, fontWeight:'700'}}, [
          'SPY '+(state.spyChange>=0?'+':'')+fmt(state.spyChange)+'%'
        ]),
        el('span', {style:{color:state.qqqChange>=0?C.green:C.pink, fontWeight:'700'}}, [
          'QQQ '+(state.qqqChange>=0?'+':'')+fmt(state.qqqChange)+'%'
        ]),
      ]),
      el('div', {style:{
        fontSize:'10px', color:C.orange,
        background:'rgba(255,45,122,.06)', borderRadius:'6px',
        padding:'5px 8px', border:'1px solid rgba(255,45,122,.2)',
      }}, ['⚠️ أسهم مجازفة — خصص 5-8% فقط من رأس مالك لكل صفقة']),
    ]),

    specs.length===0 ?
      el('div', {style:{textAlign:'center', padding:'40px 0', color:C.text2, fontSize:'12px'}}, [
        'لا توجد فرص مجازفة تستوفي الشروط الآن'
      ]) :
      el('div', {}, specs.map((s,i) => renderSpecCard(s,i))),
  ]);
}

function renderSpecCard(s, idx) {
  const isSelected = state.selected === s.id+'_spec';
  const labelColor = s.score>=80?C.green:s.score>=65?C.orange:s.score>=50?C.yellow:C.text2;
  const entryColor = s.entryTiming==='ادخل الآن'?C.green:
                     s.entryTiming==='مقبول'?C.blue:
                     s.entryTiming==='انتظر'?C.yellow:C.orange;

  return el('div', {
    class:'fade-up',
    style:{
      background:'#0a1020', borderRadius:'12px',
      border:'1px solid rgba(180,79,255,.2)',
      padding:'12px 14px', marginBottom:'10px',
      animationDelay: idx*0.05+'s',
    },
    onClick: () => { state.selected = isSelected?null:s.id+'_spec'; render(); }
  }, [
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'6px'}}, [
      el('div', {}, [
        el('span', {style:{fontSize:'15px', fontWeight:'800', color:C.text}}, [s.name]),
        el('span', {style:{fontSize:'10px', color:C.text2, marginRight:'6px'}}, [' '+s.id]),
        el('span', {style:{fontSize:'9px', color:C.text3}}, ['Beta '+fmt(s.beta,1)]),
      ]),
      el('div', {style:{fontSize:'11px', fontWeight:'700', color:labelColor}}, [s.label]),
    ]),
    el('div', {style:{display:'flex', gap:'8px', fontSize:'10px', marginBottom:'8px'}}, [
      el('span', {style:{color:C.text, fontWeight:'700'}}, ['$'+fmt(s.price,2)]),
      el('span', {style:{color:s.change>=0?C.green:C.pink}}, [(s.change>=0?'+':'')+fmt(s.change)+'%']),
      s.volR>0 && el('span', {style:{color:s.volR>=2?C.blue:C.text2}}, ['حجم ×'+fmt(s.volR,1)]),
    ]),
    el('div', {style:{display:'flex', alignItems:'center', gap:'6px', marginBottom:'8px'}}, [
      el('div', {style:{flex:1, height:'4px', background:'#1a2340', borderRadius:'2px'}}, [
        el('div', {style:{height:'4px', borderRadius:'2px', width:Math.min(100,s.score)+'%',
          background:'linear-gradient(90deg,'+C.purple+','+C.pink+')'}}),
      ]),
      el('span', {style:{fontSize:'10px', fontWeight:'700', color:labelColor}}, [s.score+'/100']),
    ]),
    el('div', {style:{background:entryColor+'11', border:'1px solid '+entryColor+'33',
      borderRadius:'7px', padding:'5px 8px', fontSize:'10px', fontWeight:'700',
      color:entryColor, marginBottom:'8px', textAlign:'center'}}, ['⏱ '+s.entryTiming]),
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px', marginBottom:'8px'}}, [
      el('div', {style:{background:'rgba(0,255,136,.06)', border:'1px solid rgba(0,255,136,.15)',
        borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['🎯 هدف']),
        el('div', {style:{fontSize:'12px', fontWeight:'700', color:C.green}}, ['$'+fmt(s.target,2)]),
        el('div', {style:{fontSize:'9px', color:C.green}}, ['+'+fmt(s.profitPct,1)+'%']),
      ]),
      el('div', {style:{background:'rgba(255,45,122,.06)', border:'1px solid rgba(255,45,122,.15)',
        borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['🛑 وقف']),
        el('div', {style:{fontSize:'12px', fontWeight:'700', color:C.pink}}, ['$'+fmt(s.stopLoss,2)]),

// ================================================================
// ═══════════════════ MARKET TAB ═════════════════════════════════
// ================================================================

function renderMarketTab() {
  // نستخدم الأسعار الحية أولاً، ثم المحفوظة في state.prices (تبقى من آخر تحديث)
  const priced = ALL_STOCKS
    .map(s => {
      const p = state.prices[s.id];
      return p?.price > 0 ? {...s, p} : null;
    })
    .filter(Boolean)
    .sort((a,b) => Math.abs(b.p.change) - Math.abs(a.p.change));

  const isLive    = priced.some(s=>s.p.isReal);
  const gainers   = priced.filter(s=>s.p.change>0).slice(0,10);
  const losers    = priced.filter(s=>s.p.change<0).slice(0,10);

  // لو ما في أسعار بعد — جاري التحميل
  if(priced.length===0) {
    return el('div', {style:{padding:'40px 16px', textAlign:'center'}}, [
      el('div', {style:{
        width:'36px', height:'36px', margin:'0 auto 12px',
        border:'3px solid rgba(0,200,255,.2)',
        borderTop:'3px solid #00c8ff',
        borderRadius:'50%', animation:'spin 1s linear infinite',
      }}),
      el('div', {style:{fontSize:'13px', color:C.blue, marginBottom:'6px'}}, ['جاري تحميل الأسعار...']),
      el('div', {style:{fontSize:'11px', color:C.text2}}, ['يستغرق ~10 ثواني']),
    ]);
  }

  return el('div', {style:{padding:'12px 16px'}}, [
    // رأس مع حالة البيانات
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'10px'}}, [
      el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.text}}, [
        '📊 نظرة السوق — '+priced.length+' سهم'
      ]),
      el('div', {style:{
        fontSize:'10px', fontWeight:'700',
        color: isLive ? C.green : C.yellow,
        background: isLive ? 'rgba(0,255,136,.1)' : 'rgba(255,224,51,.1)',
        borderRadius:'6px', padding:'2px 8px',
        border: `1px solid ${isLive?'rgba(0,255,136,.3)':'rgba(255,224,51,.3)'}`,
      }}, [isLive ? '🟢 أسعار حية' : '🟡 آخر تحديث']),
    ]),

    gainers.length>0 && el('div', {style:{marginBottom:'12px'}}, [
      el('div', {style:{fontSize:'11px', color:C.green, fontWeight:'700', marginBottom:'6px'}}, [
        '▲ الرابحون ('+gainers.length+')'
      ]),
      ...gainers.map(s => renderMiniStock(s, true)),
    ]),

    losers.length>0 && el('div', {}, [
      el('div', {style:{fontSize:'11px', color:C.pink, fontWeight:'700', marginBottom:'6px'}}, [
        '▼ الخاسرون ('+losers.length+')'
      ]),
      ...losers.map(s => renderMiniStock(s, false)),
    ]),

    // أسهم بلا تغيير
    priced.filter(s=>s.p.change===0).length>0 && el('div', {style:{marginTop:'8px'}}, [
      el('div', {style:{fontSize:'11px', color:C.text2, fontWeight:'700', marginBottom:'6px'}}, ['➡️ بدون تغيير']),
      ...priced.filter(s=>s.p.change===0).slice(0,5).map(s=>renderMiniStock(s, false)),
    ]),
  ]);
}

function renderMiniStock(s, isGainer) {
  const color = isGainer ? C.green : C.pink;
  return el('div', {style:{
    display:'flex', justifyContent:'space-between', alignItems:'center',
    padding:'6px 10px', background:'#060b14', borderRadius:'8px',
    marginBottom:'4px', border:`1px solid ${color}18`,
  }}, [
    el('div', {}, [
      el('span', {style:{fontSize:'11px', fontWeight:'700', color:C.text}}, [s.name]),
      el('span', {style:{fontSize:'9px', color:C.text2, marginRight:'4px'}}, [' '+s.id]),
    ]),
    el('div', {style:{textAlign:'left'}}, [
      el('div', {style:{fontSize:'11px', fontWeight:'700', color:C.text}}, [fmtPrice(s.p.price)]),
      el('div', {style:{fontSize:'10px', color}}, [(isGainer?'+':'')+fmt(s.p.change)+'%']),
    ]),
  ]);
}

function renderCalcTab() {
  return el('div', {style:{padding:'16px'}}, [
    el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.text, marginBottom:'12px'}}, ['🧮 حاسبة التداول']),

    // رأس المال
    el('div', {style:{
      background:'#0a1020', borderRadius:'10px',
      border:'1px solid var(--border)', padding:'12px', marginBottom:'10px',
    }}, [
      el('div', {style:{fontSize:'11px', color:C.text2, marginBottom:'6px'}}, ['💰 رأس مالك']),
      el('input', {
        type:'number', value:state.capital,
        style:{
          width:'100%', background:'#060b14', border:'1px solid var(--border)',
          borderRadius:'6px', padding:'8px 10px', color:C.text,
          fontSize:'14px', fontWeight:'700', textAlign:'center',
        },
        onChange: e => {
          const v = parseFloat(e.target.value)||0;
          state.capital = v;
          try{localStorage.setItem('capital',v);}catch(ex){}
          render();
        }
      }),
      el('div', {style:{fontSize:'10px', color:C.text2, marginTop:'4px', textAlign:'center'}}, [
        '20% لكل صفقة = '+(state.capital*0.2).toLocaleString('ar')+' ريال'
      ]),
    ]),

    // حاسبة الربح
    el('div', {style:{
      background:'#0a1020', borderRadius:'10px',
      border:'1px solid var(--border)', padding:'12px',
    }}, [
      el('div', {style:{fontSize:'11px', color:C.text2, marginBottom:'8px'}}, ['📈 حاسبة الربح/الخسارة']),
      el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px', marginBottom:'8px'}}, [
        el('div', {}, [
          el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'3px'}}, ['سعر الشراء $']),
          el('input', {
            id:'calc_buy', type:'number', placeholder:'0.00',
            style:{width:'100%', background:'#060b14', border:'1px solid var(--border)',
              borderRadius:'6px', padding:'6px 8px', color:C.text, fontSize:'12px'},
          }),
        ]),
        el('div', {}, [
          el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'3px'}}, ['سعر البيع $']),
          el('input', {
            id:'calc_sell', type:'number', placeholder:'0.00',
            style:{width:'100%', background:'#060b14', border:'1px solid var(--border)',
              borderRadius:'6px', padding:'6px 8px', color:C.text, fontSize:'12px'},
          }),
        ]),
      ]),
      el('div', {style:{marginBottom:'8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'3px'}}, ['عدد الأسهم']),
        el('input', {
          id:'calc_qty', type:'number', placeholder:'0',
          style:{width:'100%', background:'#060b14', border:'1px solid var(--border)',
            borderRadius:'6px', padding:'6px 8px', color:C.text, fontSize:'12px'},
        }),
      ]),
      el('button', {
        style:{
          width:'100%', background:`linear-gradient(135deg,${C.blue}22,${C.green}22)`,
          border:`1px solid ${C.blue}44`, borderRadius:'8px',
          padding:'8px', color:C.blue, fontWeight:'700', fontSize:'12px',
        },
        onClick: () => {
          const buy = parseFloat($('calc_buy')?.value||0);
          const sell= parseFloat($('calc_sell')?.value||0);
          const qty = parseFloat($('calc_qty')?.value||0);
          if(!buy||!sell||!qty) return;
          const pnl    = (sell-buy)*qty;
          const pnlSar = pnl*USD_RATE;
          const pct    = (sell-buy)/buy*100;
          alert(`الربح/الخسارة:\n${pnl>=0?'+':''}${fmt(pnl,2)} $ (${fmt(pct,2)}%)\n= ${fmt(pnlSar,0)} ريال`);
        }
      }, ['احسب']),
    ]),
  ]);
}

// ================================================================
// ═══════════════════ TIMER & START ══════════════════════════════
// ================================================================

// ── متغيرات التحكم في التوصيات
let _recsLockedToday  = false;   // التوصيات محسوبة ومقفلة لليوم
let _midDayDone       = false;   // تحديث منتصف اليوم تم
let _lastRecDate      = null;    // تاريخ آخر حساب

function shouldRecalc() {
  const today = new Date().toDateString();
  // يوم جديد → أعد الحساب
  if(_lastRecDate !== today) {
    _recsLockedToday = false;
    _midDayDone      = false;
    _lastRecDate     = today;
    return true;
  }
  return !_recsLockedToday;
}

// ── تحديث الأسعار واتجاه السوق كل 30 ثانية (بدون إعادة حساب التوصيات)
setInterval(async () => {
  await Promise.all([fetchPrices(), fetchMarketTrend()]);
  // فقط نحدث الأسعار في التوصيات الموجودة — لا نعيد الحساب
  if(state.recs) {
    state.recs = state.recs.map(r => {
      const p = state.prices[r.id];
      if(!p?.isReal) return r;
      return {
        ...r,
        price:  p.price,
        change: p.change,
        high:   p.high,
        low:    p.low,
        volume: p.volume,
      };
    });
  }
  render();
}, 30000);

// ── فحص منتصف اليوم كل دقيقة
setInterval(async () => {
  if(!isMarketOpen() || !state.indicatorsDone) return;

  const t = getMarketTimes();
  const m = getNowMins();

  // 7:00م — تحديث المؤشرات وإعادة الحساب مرة ثانية وأخيرة
  if(m >= t.midDay && m <= t.midDay+5 && !_midDayDone) {
    _midDayDone      = true;
    _recsLockedToday = false; // فتح القفل لإعادة الحساب

    // حفظ توصيات الجلسة الأولى كـ High Conviction
    if(state.recs?.length > 0) {
      state.sessionOneIds = state.recs.map(r => r.id);
      try { localStorage.setItem('s1_recs', JSON.stringify(state.sessionOneIds)); } catch(e) {}
    }

    // إعادة تحميل المؤشرات وحساب التوصيات
    state.indicatorsDone = false;
    await fetchIndicators();
    await fetchNews();
    await fetchEarnings();

    calcRecs();
    calcSpeculative();
    _recsLockedToday = true; // قفل حتى الغد
    render();
  }
}, 60000);

// ── Debug helper
window.testMarket = () => {
  window.DEBUG_MARKET = true;
  state.indicatorsDone = false;
  _recsLockedToday     = false;
  loadData(true);
};

// ── بدء التحميل
(async () => {
  render();
  await loadData(false);
  // بعد التحميل — قفل التوصيات لليوم
  if(state.recs?.length > 0) {
    _recsLockedToday = true;
    _lastRecDate     = new Date().toDateString();
  }
  render();
})();

</script>
