// ===== SEEDED RANDOM =====
function seededRnd(seed, min, max) {
  const x = Math.sin(seed * 9301 + 49297) * 233280;
  const t = x - Math.floor(x);
  return min + t * (max - min);
}
function dailySeed(id) {
  const d = new Date();
  let h = (d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate())*1000;
  for(let i=0;i<id.length;i++) h = h*31+id.charCodeAt(i);
  return Math.abs(h) % 999983;
}

// ===== CALC INDICATORS (ثابتة يومياً) =====
function calcIndicators(s, price) {
  const seed = dailySeed(s.id);
  const beta = s.beta || 1;
  const rsi     = seededRnd(seed+1, 22, 78);
  const ma20    = price * (1 + seededRnd(seed+2, -0.006, 0.006));
  const ma50    = price * (1 + seededRnd(seed+3, -0.018, 0.018));
  const macd    = seededRnd(seed+4, -1.5, 1.5);
  const macdSig = macd + seededRnd(seed+5, -0.4, 0.4);
  const macdH   = macd - macdSig;
  const vol     = Math.floor(seededRnd(seed+6, 500000, 15000000));
  const avgVol  = Math.floor(seededRnd(seed+7, 800000, 8000000));
  const volR    = vol / avgVol;
  const bb_u    = price * (1 + seededRnd(seed+8, 0.01, 0.03));
  const bb_l    = price * (1 - seededRnd(seed+9, 0.01, 0.03));
  const sup     = price * (1 - seededRnd(seed+10, 0.008, 0.025));
  const res     = price * (1 + seededRnd(seed+11, 0.008, 0.025));
  // P/E تقريبي
  const pe      = seededRnd(seed+12, 10, 60);
  const peScore = pe < 20 ? 2 : pe < 35 ? 1 : 0;

  let buy=0, sell=0;
  if(rsi < 35) buy++; if(rsi > 65) sell++;
  if(price > ma20) buy++; else sell++;
  if(ma20 > ma50) buy++; else sell++;
  if(macdH > 0) buy++; else sell++;
  if(volR > 1.3) { if(buy>sell) buy++; else sell++; }
  if(price <= bb_l) buy++; if(price >= bb_u) sell++;
  buy += peScore;

  const sig  = buy>sell+2?"شراء قوي":buy>sell?"شراء":sell>buy+2?"بيع قوي":sell>buy?"بيع":"انتظار";
  const sigC = sig.includes("شراء")?"green":sig.includes("بيع")?"red":"yellow";
  const str  = Math.min(100, Math.abs(buy-sell)*15 + seededRnd(seed+13, 5, 20));

  return {rsi,ma20,ma50,macdH,vol,avgVol,volR,bb_u,bb_l,sup,res,pe,
          signal:sig,signalColor:sigC,strength:str,buySignals:buy,sellSignals:sell,
          profitPct:Math.abs(res-price)/price*100};
}

// ===== FETCH PRICES =====
async function fetchPrices() {
  const symbols = uniqueStocks.map(s=>s.id).join(',');
  try {
    const res = await fetch(`/api/stocks?symbols=${symbols}`);
    if(!res.ok) throw new Error('failed');
    const data = await res.json();
    const results = data?.quoteResponse?.result || [];
    if(results.length === 0) throw new Error('empty');
    results.forEach(q => {
      if(q.regularMarketPrice) {
        state.prices[q.symbol] = {
          price: q.regularMarketPrice,
          change: q.regularMarketChangePercent || 0,
          high: q.regularMarketDayHigh || q.regularMarketPrice * 1.01,
          low: q.regularMarketDayLow || q.regularMarketPrice * 0.99,
          volume: q.regularMarketVolume || 0,
          isReal: true
        };
      }
    });
    state.dataSource = results.length > 5 ? 'real' : 'simulated';
  } catch(e) {
    state.dataSource = 'simulated';
  }
}

function buildStocks() {
  state.stocks = uniqueStocks.map(s => {
    const p = state.prices[s.id];
    const fallback = {AAPL:211,NVDA:135,MSFT:447,GOOGL:178,META:512,AMD:156,PLTR:24,CRM:290,ORCL:140,INTC:22,AMZN:193,TSLA:182,WMT:90,COST:920,JPM:198,GS:510,BAC:40,V:310,PYPL:67,JNJ:155,LLY:780,PFE:27,MRNA:45,XOM:115,CVX:155,ENPH:72,NFLX:628,DIS:98,SPOT:380,RKLB:14,IONQ:12,JOBY:6,LUNR:8,RIVN:13,QBTS:5,ARRY:15,HOOD:25,SOFI:14,UBER:75,LYFT:18,SNAP:10,COIN:220,NIO:5,PLUG:3,F:11,GM:52,AAL:12,BA:175,RTX:125};
    const price = p?.price || fallback[s.id] || 50;
    const change = p?.change || seededRnd(dailySeed(s.id)+20, -3, 3);
    const ind = calcIndicators(s, price);
    return {
      ...s, price, change,
      high: p?.high || price*1.01,
      low: p?.low || price*0.99,
      volume: p?.volume || ind.vol,
      isReal: p?.isReal || false,
      priceInSar: price * USD_RATE,
      ...ind
    };
  });
}

async function loadData() {
  state.loading = true;
  render();
  await fetchPrices();
  buildStocks();
  calcRecs();
  state.loading = false;
  state.lastPriceUpdate = new Date();
  state.priceCountdown = UPDATE_INTERVAL;
  render();
}

function calcRecs() {
  const buys = [...state.stocks].filter(s=>s.signal.includes("شراء")).sort((a,b)=>b.strength-a.strength);
  const sells = [...state.stocks].filter(s=>s.signal.includes("بيع")).sort((a,b)=>b.strength-a.strength);
  const watch = [...state.stocks].filter(s=>s.signal==="انتظار").sort((a,b)=>b.volR-a.volR);
  const future = [...state.stocks].filter(s=>s.cat==="future"&&s.signal.includes("شراء")).sort((a,b)=>b.strength-a.strength);
  const buyCount = state.stocks.filter(s=>s.signal.includes("شراء")).length;
  const sellCount = state.stocks.filter(s=>s.signal.includes("بيع")).length;
  const mktScore = Math.round(buyCount/(buyCount+sellCount+0.1)*100);
  state.recs = {top3:buys.slice(0,3), avoid:sells.slice(0,3), watch:watch.slice(0,2), future:future.slice(0,3), buyCount, sellCount, mktScore};
  state.lastRecUpdate = new Date();
  state.recCountdown = REC_INTERVAL;
}

// ===== HELPERS =====
const C = {
  green:"#00ff88", yellow:"#ffe033", red:"#ff2d7a",
  blue:"#00c8ff", purple:"#b44fff", orange:"#ff7a00"
};
function f(n,d=2){return Number(n).toFixed(d);}
function fK(n){return n>=1e9?(n/1e9).toFixed(1)+'B':n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':String(n);}
function sigColor(sig){return sig.includes("شراء")?C.green:sig.includes("بيع")?C.red:C.yellow;}
function catColor(cat){return {large:C.blue,mid:C.green,small:C.yellow,future:C.purple}[cat]||C.blue;}

function el(tag,attrs,children){
  const e=document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{
    if(k==='style')Object.assign(e.style,v);
    else if(k==='onclick')e.onclick=v;
    else if(k==='className')e.className=v;
    else e.setAttribute(k,v);
  });
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}
function div(s,c){return el('div',{style:typeof s==='string'?{}:s},c);}
function txt(s,style){const e=document.createElement('span');if(style)Object.assign(e.style,style);e.textContent=s;return e;}
function btn(html,style,onclick){
  const b=document.createElement('button');
  b.innerHTML=html;
  if(style)Object.assign(b.style,style);
  if(onclick)b.onclick=onclick;
  return b;
}

// ===== MINI SPARKLINE =====
function sparkline(change, width=80, height=28) {
  const pts=[]; let y=50;
  const seed = Math.random();
  for(let i=0;i<16;i++){
    y+=((Math.random()-.499)*12)+(change>0?.5:-.5);
    y=Math.max(5,Math.min(95,y));
    pts.push(`${i*(100/15)},${y}`);
  }
  const col=change>=0?C.green:C.red;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',width);svg.setAttribute('height',height);
  svg.setAttribute('viewBox','0 0 100 100');
  svg.setAttribute('preserveAspectRatio','none');
  const poly=document.createElementNS('http://www.w3.org/2000/svg','polyline');
  poly.setAttribute('points',pts.join(' '));
  poly.setAttribute('fill','none');poly.setAttribute('stroke',col);
  poly.setAttribute('stroke-width','3');poly.setAttribute('stroke-linecap','round');
  svg.appendChild(poly);
  return svg;
}

// ===== RSI BAR =====
function rsiBar(rsi) {
  const col=rsi<35?C.green:rsi>65?C.red:C.yellow;
  const lbl=rsi<35?"تشبع بيع":rsi>65?"تشبع شراء":"محايد";
  return el('div',{style:{display:"flex",alignItems:"center",gap:"5px"}},[
    el('div',{style:{flex:1,height:"4px",background:"#1a2340",borderRadius:"2px",overflow:"hidden"}},[
      el('div',{style:{height:"100%",width:`${rsi}%`,background:col,borderRadius:"2px",transition:"width .8s"}})
    ]),
    txt(f(rsi,0),{fontSize:"10px",color:col,fontWeight:"800",minWidth:"20px"}),
    txt(lbl,{fontSize:"9px",color:"var(--text3)"})
  ]);
}

      borderRadius:"16px",
      padding:"14px",
      marginBottom:"10px",
      cursor:"pointer",
      position:"relative",
      overflow:"hidden",
      transition:"transform .15s,box-shadow .15s"
    }
  },[
    // Top glow line

        fontWeight:"900",fontSize:"12px",
        textShadow:`0 0 10px ${rc}`
      }},s.signal)
    ]),

    // Support / Resistance / Profit
    el('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"5px",marginBottom:shares>0?"8px":"0"}},[
      ...[{l:"دعم",v:f(s.sup),c:C.green},{l:"مقاومة",v:f(s.res),c:C.red},{l:"ربح%",v:`${f(s.profitPct)}%`,c:C.yellow}].map(x=>

          el('div',{style:{fontSize:"9px",color:"var(--text3)",marginBottom:"2px"}},x.l),
          el('div',{style:{fontSize:"11px",fontWeight:"700",color:x.c,textShadow:`0 0 8px ${x.c}`}},x.v)
        ])
      )
    ]),

    // Profit calc
    shares>0 && el('div',{style:{background:`${rc}0a`,border:`1px solid ${rc}22`,borderRadius:"8px",padding:"6px 10px",display:"flex",justifyContent:"space-between"}},[
      txt(`${shares} سهم (20% = $${f(state.capital*0.2)})`,{fontSize:"10px",color:"var(--text3)"}),
      txt(`+${f(profit,0)} ر`,{fontSize:"11px",fontWeight:"800",color:rc,textShadow:`0 0 8px ${rc}`})
    ])
  ]);

  card.onmouseenter=()=>{card.style.transform="translateY(-2px)";card.style.boxShadow=`0 8px 30px ${rc}22`;};
  card.onmouseleave=()=>{card.style.transform="none";card.style.boxShadow="none";};
  card.onclick=()=>{state.selected=s;render();};
  return card;
}

// ===== REC CARD =====
function recCard(s, rank, pct) {
  if(!s) return null;
  const rc = sigColor(s.signal);
  const capUsd = state.capital;
  const investUsd = capUsd * pct;
  const shares = Math.floor((investUsd * USD_RATE) / s.priceInSar);
  const profitSar = shares * s.priceInSar * (s.profitPct/100);
  const stopPrice = s.price * 0.97;

  const reasons = [];
  if(s.rsi<38) reasons.push(`RSI ${f(s.rsi,0)} — تشبع بيع قوي`);
  if(s.price>s.ma20&&s.ma20>s.ma50) reasons.push("Golden Cross — MA20 فوق MA50 ✅");
  if(s.macdH>0) reasons.push("MACD إيجابي — زخم شراء");
  if(s.volR>1.3) reasons.push(`حجم ${f(s.volR,1)}x فوق المعتاد`);
  if(s.pe<25) reasons.push(`P/E ${f(s.pe,0)} — سعر جذاب`);
  if(s.price<=s.bb_l*1.01) reasons.push("عند حد بولينجر السفلي");
  if(reasons.length===0) reasons.push(`${s.buySignals} إشارات شراء مقابل ${s.sellSignals} بيع`);
  if(s.isReal) reasons.push("✅ سعر حقيقي من السوق");

  return el('div',{style:{
    background:"var(--card)",
    border:`2px solid ${rc}44`,
    borderRadius:"18px",
    padding:"16px",
    marginBottom:"14px",
    position:"relative",
    overflow:"hidden"
  }},[
    el('div',{style:{position:"absolute",top:0,left:0,right:0,height:"3px",background:`linear-gradient(90deg,transparent,${rc},transparent)`}}),
    el('div',{style:{position:"absolute",top:0,right:0,bottom:0,width:"3px",background:`linear-gradient(180deg,transparent,${rc}44,transparent)`}}),

    // Header
    el('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}},[
      el('div',{},[
        el('div',{style:{display:"flex",alignItems:"center",gap:"6px",marginBottom:"4px"}},[
          el('div',{style:{
            width:"26px",height:"26px",borderRadius:"8px",
            background:`${rc}20`,border:`1px solid ${rc}44`,
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:"14px",fontWeight:"900",color:rc
          }},rank),
          txt(s.sector,{fontSize:"10px",color:"var(--text3)"}),
          el('span',{style:{fontSize:"9px",color:catColor(s.cat),background:`${catColor(s.cat)}15`,padding:"1px 6px",borderRadius:"4px"}},CATS[s.cat]||s.cat)
        ]),
        el('div',{style:{fontSize:"17px",fontWeight:"900",color:"var(--text)"}},s.name),
        el('div',{style:{fontSize:"11px",color:"var(--text3)"}},s.id)
      ]),
      el('div',{style:{textAlign:"left"}},[
        el('div',{style:{
          background:`${rc}15`,border:`1px solid ${rc}55`,
          color:rc,padding:"5px 12px",borderRadius:"8px",
          fontWeight:"900",fontSize:"12px",marginBottom:"4px",
          textShadow:`0 0 10px ${rc}`
        }},s.signal),
        el('div',{style:{fontSize:"10px",color:"var(--text3)",textAlign:"center"}},`قوة ${f(s.strength,0)}%`),
        el('div',{style:{height:"3px",background:"var(--bg3)",borderRadius:"2px",marginTop:"3px",overflow:"hidden"}},[
          el('div',{style:{height:"100%",width:`${s.strength}%`,background:rc,borderRadius:"2px",boxShadow:`0 0 8px ${rc}`}})
        ])
      ])
    ]),

    // Price boxes
    el('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px",marginBottom:"12px"}},[
      el('div',{style:{background:"var(--bg3)",borderRadius:"10px",padding:"8px 10px"}},[
        el('div',{style:{fontSize:"9px",color:"var(--text3)",marginBottom:"2px"}},"السعر"),
        el('div',{style:{fontSize:"14px",fontWeight:"800",color:"var(--text)"}},`$${f(s.price)}`),
        el('div',{style:{fontSize:"10px",color:"var(--text3)"}},`${f(s.price*USD_RATE)} ر`)
      ]),
      el('div',{style:{background:"rgba(0,255,136,.05)",borderRadius:"10px",padding:"8px 10px",border:"1px solid rgba(0,255,136,.15)"}},[
        el('div',{style:{fontSize:"9px",color:"var(--text3)",marginBottom:"2px"}},"🎯 الهدف"),
        el('div',{style:{fontSize:"14px",fontWeight:"800",color:C.green,textShadow:`0 0 8px ${C.green}`}},`$${f(s.res)}`),
        el('div',{style:{fontSize:"10px",color:C.green}},`+${f(s.profitPct)}%`)
      ]),
      el('div',{style:{background:"rgba(255,45,122,.05)",borderRadius:"10px",padding:"8px 10px",border:"1px solid rgba(255,45,122,.15)"}},[
        el('div',{style:{fontSize:"9px",color:"var(--text3)",marginBottom:"2px"}},"🛑 الوقف"),
        el('div',{style:{fontSize:"14px",fontWeight:"800",color:C.red,textShadow:`0 0 8px ${C.red}`}},`$${f(stopPrice)}`),
        el('div',{style:{fontSize:"10px",color:C.red}},"-3%")
      ])
    ]),

    // Reasons
    el('div',{style:{background:"var(--bg3)",borderRadius:"10px",padding:"10px 12px",marginBottom:"12px"}},[
      el('div',{style:{fontSize:"11px",color:C.yellow,fontWeight:"700",marginBottom:"8px"}},"📋 لماذا هذا السهم؟"),
      ...reasons.map(r=>el('div',{style:{display:"flex",gap:"7px",marginBottom:"5px"}},[
        txt("✓",{color:C.green,flexShrink:"0",fontSize:"11px"}),
        txt(r,{fontSize:"12px",color:"var(--text2)",lineHeight:"1.5"})
      ]))
    ]),

    // Profit calc
    shares>0 && el('div',{style:{background:`${rc}08`,border:`1px solid ${rc}22`,borderRadius:"10px",padding:"10px 12px"}},[
      el('div',{style:{fontSize:"11px",color:"var(--text3)",marginBottom:"8px",fontWeight:"700"}},`💰 ${(pct*100).toFixed(0)}% من رأسمالك = $${f(investUsd,0)} (${f(investUsd*USD_RATE,0)} ر)`),
      el('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px"}},[
        ...[
          {l:"الأسهم",v:`${shares}`,c:"var(--text)"},
          {l:"ربح متوقع",v:`+${f(profitSar,0)} ر`,c:C.green},
          {l:"أقصى خسارة",v:`-${f(investUsd*USD_RATE*0.03,0)} ر`,c:C.red}
        ].map(x=>el('div',{style:{textAlign:"center"}},[
          el('div',{style:{fontSize:"9px",color:"var(--text3)",marginBottom:"2px"}},x.l),
          el('div',{style:{fontSize:"13px",fontWeight:"900",color:x.c,textShadow:x.c!=="var(--text)"?`0 0 8px ${x.c}`:"none"}},x.v)
        ]))
      ])
    ])
  ]);
}

// ===== HEADER =====
function renderHeader() {
  const isMarketOpen = (() => {
    const now = new Date();
    const utcH = now.getUTCHours();
    const utcM = now.getUTCMinutes();
    const day = now.getUTCDay();
    if(day===0||day===6) return false;
    const mins = utcH*60+utcM;
    return mins>=830&&mins<=2100; // 13:30-21:00 UTC
  })();

  return el('div',{style:{padding:"14px 14px 0",background:"var(--bg)",position:"sticky",top:0,zIndex:20}},[
    // Top bar
    el('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},[
      el('div',{style:{display:"flex",alignItems:"center",gap:"8px"}},[
        el('div',{style:{
          width:"36px",height:"36px",borderRadius:"10px",
          background:"linear-gradient(135deg,#00ff88,#00c8ff)",
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:"18px",boxShadow:"0 0 20px rgba(0,255,136,.4)"
        }},"📊"),
        el('div',{},[
          el('div',{style:{fontSize:"15px",fontWeight:"900",color:"var(--text)",letterSpacing:"-0.5px"}},"تريدر برو X"),
          el('div',{style:{fontSize:"9px",color:"var(--text3)"}},"50 سهم أمريكي • تحليل احترافي")
        ])
      ]),
      el('div',{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"2px"}},[
        el('div',{style:{display:"flex",alignItems:"center",gap:"5px"}},[
          el('span',{className:"live-dot",style:{
            width:"7px",height:"7px",borderRadius:"50%",
            background:state.loading?"#ffe033":state.dataSource==="real"?"#00ff88":"#ffe033",
            display:"inline-block",
            boxShadow:state.dataSource==="real"?"0 0 8px #00ff88":"0 0 8px #ffe033"
          }}),
          el('span',{style:{
            fontSize:"10px",
            color:state.dataSource==="real"?"#00ff88":"#ffe033",
            fontWeight:"700"
          }},state.loading?"يتحمل...":state.dataSource==="real"?"🟢 حقيقي":"🟡 تقريبي"),
          el('span',{style:{fontSize:"9px",color:"var(--text3)",background:"var(--bg3)",borderRadius:"5px",padding:"1px 5px"}},`${state.priceCountdown}ث`)
        ]),
        el('span',{style:{fontSize:"9px",color:"var(--text3)"}},[
          el('span',{style:{
            color:isMarketOpen?C.green:C.red,
            fontSize:"8px",marginLeft:"4px"
          }},isMarketOpen?"● مفتوح":"● مغلق"),
          document.createTextNode(state.lastPriceUpdate?state.lastPriceUpdate.toLocaleTimeString('ar-SA'):"--")
        ])
      ])
    ]),

    // Market mood
    (() => {
      if(!state.recs) return el('div',{style:{height:"36px"}});
      const {buyCount,sellCount,mktScore} = state.recs;
      const mc = mktScore>60?C.green:mktScore<40?C.red:C.yellow;
      const ml = mktScore>60?"🚀 السوق صاعد":mktScore<40?"📉 السوق هابط":"⚡ السوق محايد";

        background:"var(--bg3)",borderRadius:"12px",padding:"8px 12px",

        border:`1px solid ${mc}22`
      }},[

          txt(`🟢 ${buyCount}`,{fontSize:"11px",color:C.green}),

        boxShadow:state.tab===t.id?`0 0 10px ${t.c}33`:"none",
        whiteSpace:"nowrap"
      },()=>{state.tab=t.id;render();}))
    ])
  ]);
}

          el('div',{style:{fontSize:"10px",color:"var(--text3)"}},`${s.signal} • RSI ${f(s.rsi,0)}`)
        ]),
        el('div',{style:{background:"rgba(255,45,122,.1)",border:"1px solid rgba(255,45,122,.3)",color:C.red,padding:"3px 10px",borderRadius:"7px",fontSize:"11px",fontWeight:"700"}},"تجنب")
      ]))
    ]),

    // Watch
    watch.length>0 && el('div',{style:{background:"rgba(255,224,51,.05)",border:"1px solid rgba(255,224,51,.2)",borderRadius:"14px",padding:"14px",marginBottom:"14px"}},[
      el('div',{style:{fontSize:"13px",fontWeight:"700",color:C.yellow,marginBottom:"10px"}},"👀 راقب هذه"),
      ...watch.map((s,i)=>el('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<watch.length-1?"1px solid rgba(255,224,51,.1)":"none"}},[
        el('div',{},[
          el('div',{style:{fontSize:"12px",fontWeight:"700",color:"var(--text)"}},s.name),
          el('div',{style:{fontSize:"10px",color:"var(--text3)"}},`RSI ${f(s.rsi,0)} • حجم ${s.volR>1?"نشط":"عادي"}`)
        ]),
        el('div',{style:{background:"rgba(255,224,51,.1)",border:"1px solid rgba(255,224,51,.3)",color:C.yellow,padding:"3px 10px",borderRadius:"7px",fontSize:"11px",fontWeight:"700"}},"انتظار")
      ]))
    ]),

    el('div',{style:{background:"rgba(255,45,122,.05)",border:"1px solid rgba(255,45,122,.15)",borderRadius:"12px",padding:"12px"}},[
      txt("⚠️ هذه التوصيات للأغراض التعليمية فقط. لا تتخذ قرارات استثمارية بناءً عليها وحدها.",{fontSize:"11px",color:"rgba(255,45,122,.7)",lineHeight:"1.7"})
    ])
  ]);
}

// ===== MARKET TAB =====
function renderMarketTab() {
  const sectors = ["الكل",...new Set(uniqueStocks.map(s=>s.sector))];
  const filtered = state.stocks
    .filter(s=>state.sector==="الكل"||s.sector===state.sector)
    .filter(s=>state.catFilter==="الكل"||s.cat===state.catFilter)
    .sort((a,b)=>{
      if(state.sort==="signal"){const o={"شراء قوي":0,"شراء":1,"انتظار":2,"بيع":3,"بيع قوي":4};return(o[a.signal]||2)-(o[b.signal]||2);}
      if(state.sort==="change")return Math.abs(b.change)-Math.abs(a.change);
      if(state.sort==="profit")return b.profitPct-a.profitPct;
      if(state.sort==="rsi")return a.rsi-b.rsi;
      return 0;
    });

  return el('div',{},[
    // Cat filter
    el('div',{style:{display:"flex",gap:"5px",overflowX:"auto",paddingBottom:"6px",marginBottom:"6px",scrollbarWidth:"none"}},[
      ...["الكل",...Object.keys(CATS)].map(cat=>btn(
        cat==="الكل"?"الكل":CATS[cat],
        {
          background:state.catFilter===cat?`${catColor(cat)}15`:"var(--bg3)",
          border:`1px solid ${state.catFilter===cat?catColor(cat):"var(--border)"}`,
          color:state.catFilter===cat?catColor(cat):"var(--text3)",
          padding:"4px 11px",borderRadius:"20px",fontSize:"11px",
          whiteSpace:"nowrap",flexShrink:"0",
          boxShadow:state.catFilter===cat?`0 0 8px ${catColor(cat)}33`:"none"
        },
        ()=>{state.catFilter=cat;render();}
      ))
    ]),

    // Sort
    el('div',{style:{display:"flex",gap:"5px",marginBottom:"10px",overflowX:"auto",scrollbarWidth:"none"}},[
      ...([{id:"signal",l:"الإشارة"},{id:"change",l:"أكثر تحركاً"},{id:"profit",l:"أعلى ربح"},{id:"rsi",l:"RSI"}]).map(s=>btn(s.l,{
        background:state.sort===s.id?"rgba(0,255,136,.1)":"var(--bg3)",
        border:`1px solid ${state.sort===s.id?C.green:"var(--border)"}`,
        color:state.sort===s.id?C.green:"var(--text3)",
        padding:"4px 10px",borderRadius:"20px",fontSize:"11px",whiteSpace:"nowrap",flexShrink:"0"
      },()=>{state.sort=s.id;render();}))
    ]),

    el('div',{style:{fontSize:"11px",color:"var(--text3)",marginBottom:"8px"}},`${filtered.length} سهم`),

    ...filtered.map(s=>stockCard(s))
  ]);
}

// ===== FUTURE TAB =====
function renderFutureTab() {
  const futures = state.stocks.filter(s=>s.cat==="future").sort((a,b)=>b.strength-a.strength);
  return el('div',{style:{paddingTop:"8px"}},[
    el('div',{style:{
      background:"linear-gradient(135deg,rgba(180,79,255,.08),rgba(0,200,255,.08))",
      border:"1px solid rgba(180,79,255,.3)",
      borderRadius:"14px",padding:"14px",marginBottom:"14px"
    }},[
      el('div',{style:{fontSize:"16px",fontWeight:"900",color:C.purple,marginBottom:"6px",textShadow:`0 0 15px ${C.purple}`}},"🚀 أسهم المستقبل"),
      el('div',{style:{fontSize:"12px",color:"var(--text3)",lineHeight:"1.8"}},"شركات ناشئة وتقنيات المستقبل — مخاطرة عالية لكن إمكانية نمو ضخمة على المدى البعيد")
    ]),
    ...futures.map(s=>stockCard(s)),
    el('div',{style:{background:"rgba(255,45,122,.05)",border:"1px solid rgba(255,45,122,.15)",borderRadius:"12px",padding:"12px",marginTop:"6px"}},[
      txt("⚠️ أسهم المستقبل عالية المخاطرة — لا تضع فيها أكثر من 10% من رأسمالك.",{fontSize:"11px",color:"rgba(255,45,122,.7)",lineHeight:"1.7"})
    ])
  ]);
}

// ===== TIPS TAB =====
function renderTipsTab() {
  const tips = [
    {icon:"📈",title:"RSI — مؤشر القوة النسبية",color:C.green,lines:["أقل من 30: فرصة شراء — السهم مباع بإفراط","أكثر من 70: خطر — السهم مشترى بإفراط","بين 30-70: منطقة محايدة — انتظر إشارة أخرى"]},
    {icon:"〰️",title:"MA20 و MA50 — المتوسطات المتحركة",color:C.blue,lines:["MA20 فوق MA50 = Golden Cross — اتجاه صاعد قوي 🚀","السعر فوق MA20 = زخم إيجابي قصير المدى","السعر تحت MA50 = ضغط بيعي على المدى المتوسط"]},
    {icon:"⚡",title:"MACD — مؤشر الزخم",color:C.yellow,lines:["الشريط فوق الصفر = زخم شراء نشط","الشريط تحت الصفر = زخم هبوطي","التقاطع مع خط الإشارة = نقطة دخول أو خروج"]},
    {icon:"💎",title:"P/E — تقييم السهم",color:C.purple,lines:["P/E منخفض (أقل من 20) = السهم رخيص نسبياً","P/E عالي (أكثر من 40) = توقعات نمو كبيرة أو مبالغة","قارن دائماً مع متوسط القطاع"]},
    {icon:"💰",title:"إدارة المال — قواعد ذهبية",color:C.orange,lines:["لا تخاطر بأكثر من 2% من رأسمالك في صفقة واحدة","وقف الخسارة دائماً — بدونه تخاطر بكل رأسمالك","أسهم المستقبل = 10% فقط من محفظتك"]},
    {icon:"🎯",title:"كيف تجمع المؤشرات؟",color:C.green,lines:["شراء مثالي: RSI<35 + MACD↑ + MA20>MA50 + حجم عالٍ + P/E معقول","لا تدخل بإشارة واحدة — اجمع 3 مؤشرات على الأقل","السوق الأمريكي يفتح 4:30م - 11م بتوقيت السعودية"]},
  ];

  return el('div',{style:{paddingTop:"8px"}},[
    ...tips.map(t=>el('div',{style:{
      background:"var(--card)",border:`1px solid ${t.color}22`,
      borderRadius:"14px",padding:"14px",marginBottom:"10px"
    }},[
      el('div',{style:{fontSize:"13px",fontWeight:"700",color:t.color,marginBottom:"10px",textShadow:`0 0 10px ${t.color}`}},`${t.icon} ${t.title}`),
      ...t.lines.map(l=>el('div',{style:{display:"flex",gap:"8px",marginBottom:"6px"}},[
        txt("•",{color:t.color,flexShrink:"0"}),
        txt(l,{fontSize:"12px",color:"var(--text2)",lineHeight:"1.7"})
      ]))
    ])),
    el('div',{style:{background:"rgba(255,45,122,.05)",border:"1px solid rgba(255,45,122,.15)",borderRadius:"12px",padding:"12px"}},[
      txt("⚠️ المؤشرات أدوات مساعدة وليست ضمانة ربح. ادرس الأخبار والسياق قبل أي قرار.",{fontSize:"11px",color:"rgba(255,45,122,.7)",lineHeight:"1.7"})
    ])
  ]);
}

// ===== MODAL =====
function renderModal() {
  const s = state.selected;
  if(!s) return null;
  const rc = sigColor(s.signal);

  const overlay = el('div',{
    style:{position:"fixed",inset:"0",background:"rgba(0,0,0,.9)",zIndex:"50",display:"flex",alignItems:"flex-end",justifyContent:"center"}
  },[
    el('div',{
      style:{
        background:"var(--bg2)",border:`1px solid ${rc}44`,
        borderRadius:"20px 20px 0 0",padding:"18px 16px 44px",
        width:"100%",maxWidth:"480px",direction:"rtl",
        maxHeight:"90vh",overflowY:"auto",
        boxShadow:`0 -10px 40px ${rc}22`
      }
    },[
      el('div',{style:{position:"absolute",top:"0",left:"0",right:"0",height:"3px",background:`linear-gradient(90deg,transparent,${rc},transparent)`}}),

      // Header
      el('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}},[
        el('div',{},[
          el('div',{style:{display:"flex",alignItems:"center",gap:"6px",marginBottom:"3px"}},[
            el('span',{style:{fontSize:"10px",color:catColor(s.cat)}},CATS[s.cat]),
            s.isReal && el('span',{style:{fontSize:"9px",color:C.green,background:"rgba(0,255,136,.1)",padding:"1px 5px",borderRadius:"3px"}},"● سعر حقيقي")
          ]),
          el('div',{style:{fontSize:"18px",fontWeight:"900",color:"var(--text)"}},s.name),
          el('div',{style:{fontSize:"11px",color:"var(--text3)"}},`${s.id} • ${s.sector}`)
        ]),
        btn("✕",{background:"var(--bg3)",border:"1px solid var(--border)",color:"var(--text3)",width:"32px",height:"32px",borderRadius:"8px",fontSize:"16px"},()=>{state.selected=null;render();})
      ]),

      // Price
      el('div',{style:{background:"var(--bg3)",borderRadius:"12px",padding:"12px 14px",marginBottom:"12px",display:"flex",justifyContent:"space-between",alignItems:"center"}},[
        el('div',{},[
          el('div',{style:{fontSize:"24px",fontWeight:"900",color:"var(--text)"}},[
            document.createTextNode(`$${f(s.price)}`),
            s.isReal && el('span',{style:{fontSize:"10px",color:C.green,marginRight:"6px",textShadow:`0 0 6px ${C.green}`}}," ●")
          ]),
          el('div',{style:{fontSize:"13px",color:"var(--text3)",marginTop:"2px"}},`${f(s.price*USD_RATE)} ريال سعودي`)
        ]),
        el('div',{style:{textAlign:"left"}},[
          el('div',{style:{fontSize:"14px",fontWeight:"800",color:s.change>=0?C.green:C.red,textShadow:`0 0 8px ${s.change>=0?C.green:C.red}`}},`${s.change>=0?"▲":"▼"} ${f(Math.abs(s.change))}%`),
          el('div',{style:{fontSize:"10px",color:"var(--text3)",marginTop:"3px"}},`أعلى: $${f(s.high)}`),
          el('div',{style:{fontSize:"10px",color:"var(--text3)"}},`أدنى: $${f(s.low)}`)
        ])
      ]),

      // Indicators grid
      el('div',{style:{fontSize:"12px",color:"var(--text3)",fontWeight:"700",marginBottom:"8px"}},"📊 المؤشرات الفنية"),
      el('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:"12px"}},[
        ...[
          {l:"RSI",v:f(s.rsi,0),c:s.rsi<35?C.green:s.rsi>65?C.red:C.yellow,d:s.rsi<35?"تشبع بيع":s.rsi>65?"تشبع شراء":"محايد"},
          {l:"MA20",v:f(s.ma20),c:s.price>s.ma20?C.green:C.red,d:s.price>s.ma20?"فوق MA20 ✅":"تحت MA20 ⚠️"},
          {l:"MA50",v:f(s.ma50),c:s.price>s.ma50?C.green:C.red,d:s.price>s.ma50?"فوق MA50 ✅":"تحت MA50 ⚠️"},
          {l:"MACD",v:f(s.macdH,2),c:s.macdH>0?C.green:C.red,d:s.macdH>0?"زخم صاعد":"زخم هابط"},
          {l:"P/E",v:f(s.pe,0),c:s.pe<25?C.green:s.pe<40?C.yellow:C.red,d:s.pe<25?"تقييم جذاب":s.pe<40?"تقييم معقول":"تقييم مرتفع"},
          {l:"الحجم",v:fK(s.volume),c:s.volR>1.3?C.green:s.volR>0.8?C.yellow:"var(--text3)",d:s.volR>1.3?"نشاط عالي":s.volR>0.8?"طبيعي":"منخفض"}
        ].map(x=>el('div',{style:{background:"var(--bg3)",borderRadius:"10px",padding:"8px 10px"}},[
          el('div',{style:{display:"flex",justifyContent:"space-between",marginBottom:"3px"}},[
            txt(x.l,{fontSize:"10px",color:"var(--text3)"}),
            txt(x.v,{fontSize:"12px",fontWeight:"800",color:x.c,textShadow:`0 0 8px ${x.c}`})
          ]),
          txt(x.d,{fontSize:"10px",color:"var(--text3)"})
        ]))
      ]),

      // Trade plan
      el('div',{style:{background:"var(--bg3)",borderRadius:"12px",padding:"14px",marginBottom:"12px"}},[
        el('div',{style:{fontSize:"12px",color:"var(--text3)",fontWeight:"700",marginBottom:"10px"}},"خطة التداول"),
        ...[
          {l:"⚡ نقطة الدخول",v:`$${f(s.price)}`,c:"var(--text)"},
          {l:"🛑 وقف الخسارة (3%)",v:`$${f(s.price*.97)}`,c:C.red},
          {l:"🎯 الهدف الأول",v:`$${f(s.res)}`,c:C.green},
          {l:"🚀 الهدف الثاني",v:`$${f(s.res*1.02)}`,c:C.green}
        ].map((x,i)=>el('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<3?"1px solid var(--border)":"none"}},[
          txt(x.l,{fontSize:"12px",color:"var(--text3)"}),
          txt(x.v,{fontSize:"13px",fontWeight:"800",color:x.c,textShadow:x.c!=="var(--text)"?`0 0 8px ${x.c}`:"none"})
        ]))
      ]),

      // Tip
      el('div',{style:{background:`${catColor(s.cat)}08`,border:`1px solid ${catColor(s.cat)}22`,borderRadius:"10px",padding:"10px 12px"}},[
        txt(`💡 ${s.tip}`,{fontSize:"11px",color:"var(--text2)",lineHeight:"1.7"})
      ])
    ])
  ]);

  overlay.onclick = e => { if(e.target===overlay){state.selected=null;render();} };
  return overlay;
}

// ===== LOADING =====
function renderLoading() {
  return el('div',{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:"16px"}},[
    el('div',{style:{
      width:"50px",height:"50px",
      border:`3px solid rgba(0,255,136,.2)`,
      borderTop:`3px solid ${C.green}`,
      borderRadius:"50%",
      animation:"spin 1s linear infinite",
      boxShadow:`0 0 20px ${C.green}44`
    }}),
    el('div',{style:{fontSize:"14px",color:C.green,textShadow:`0 0 10px ${C.green}`}},"جاري تحميل السوق..."),
    el('div',{style:{fontSize:"11px",color:"var(--text3)"}},"الاتصال بـ FMP API")
  ]);
}

// ===== MAIN RENDER =====
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const wrapper = el('div',{style:{minHeight:"100vh",display:"flex",flexDirection:"column"}});

  if(state.loading && state.stocks.length===0) {
    wrapper.appendChild(renderLoading());
  } else {
    wrapper.appendChild(renderHeader());
    const content = el('div',{style:{flex:"1",padding:"0 14px 80px"}});

    if(state.tab==="rec")     content.appendChild(renderRecTab());
    else if(state.tab==="market")  content.appendChild(renderMarketTab());
    else if(state.tab==="future")  content.appendChild(renderFutureTab());
    else if(state.tab==="tips")    content.appendChild(renderTipsTab());

    wrapper.appendChild(content);
    if(state.selected) wrapper.appendChild(renderModal());
  }

  app.appendChild(wrapper);
}

// ===== TIMERS =====
setInterval(()=>{
  state.priceCountdown--;
  state.recCountdown--;

  if(state.recCountdown<=0) {
    if(state.stocks.length>0) {
      calcRecs();
      render();
    }
  }

  if(state.priceCountdown<=0) {
    loadData();
  } else {
    const cdEl = document.querySelector('[data-cd]');
    if(cdEl) cdEl.textContent = state.priceCountdown+'ث';
  }
}, 1000);

// ===== START =====
loadData();
</script>

</html>
