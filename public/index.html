<style>
:root {
  --bg: #050810;

  --bg3: #0d1526;
  --card: #0a1020;
  --border: #1a2340;
  --neon-green: #00ff88;
  --neon-blue: #00c8ff;
  --neon-purple: #b44fff;
  --neon-pink: #ff2d7a;

  --neon-orange: #ff7a00;
  --text: #e8eeff;
  --text2: #7888aa;
  --text3: #3a4560;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;direction:rtl;max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:0;height:0}

/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px currentColor}50%{box-shadow:0 0 20px currentColor,0 0 40px currentColor}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes shimmer{0%,100%{opacity:.4}50%{opacity:.8}}
@keyframes priceFlash{0%{background:rgba(0,255,136,.15)}100%{background:transparent}}

.live-dot{animation:pulse 1.5s ease-in-out infinite}
.card-in{animation:fadeUp .4s ease both}
.glow-green{animation:glow .8s ease-in-out infinite;color:var(--neon-green)}
button{cursor:pointer;font-family:inherit;border:none;outline:none;transition:all .15s}
button:active{transform:scale(.95);opacity:.8}

/* Neon borders */
.neon-green{border-color:var(--neon-green)!important;box-shadow:0 0 10px rgba(0,255,136,.2)}
.neon-blue{border-color:var(--neon-blue)!important;box-shadow:0 0 10px rgba(0,200,255,.2)}
.neon-pink{border-color:var(--neon-pink)!important;box-shadow:0 0 10px rgba(255,45,122,.2)}
.neon-yellow{border-color:var(--neon-yellow)!important;box-shadow:0 0 10px rgba(255,224,51,.2)}
.neon-purple{border-color:var(--neon-purple)!important;box-shadow:0 0 10px rgba(180,79,255,.2)}

/* Grid bg */
body::before{content:'';position:fixed;inset:0;background:
  linear-gradient(rgba(0,200,255,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,200,255,.03) 1px,transparent 1px);
background-size:40px 40px;pointer-events:none;z-index:0}

#app{position:relative;z-index:1}
</style>

// ===== SEEDED RANDOM =====
function seededRnd(seed, min, max) {
  const x = Math.sin(seed * 9301 + 49297) * 233280;
  const t = x - Math.floor(x);
  return min + t * (max - min);
}
function dailySeed(id) {
  const d = new Date();
  let h = (d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate())*1000;
  for(let i=0;i<id.length;i++) h = h*31+id.charCodeAt(i);
  return Math.abs(h) % 999983;
}

// ===== CALC INDICATORS (ثابتة يومياً) =====
function calcIndicators(s, price) {
  const seed = dailySeed(s.id);
  const beta = s.beta || 1;
  const real = state.realIndicators && state.realIndicators[s.id];
  const profile = state.companyProfiles && state.companyProfiles[s.id];
  
  // نستخدم Beta الحقيقي إذا متوفر
  const realBeta = profile?.beta || beta;
  const realAvgVol = profile?.avgVolume || 0;

  // نستخدم المؤشرات الحقيقية إذا متوفرة — وإلا نستخدم التقريبية
  const rsi  = real ? real.rsi  : seededRnd(seed+1, 22, 78);
  const ma20 = real ? real.ma20 : price * (1 + seededRnd(seed+2, -0.006, 0.006));
  const ma50 = real ? real.ma50 : price * (1 + seededRnd(seed+3, -0.018, 0.018));
  const macdH= real ? real.macdHist : (() => {
    const macd = seededRnd(seed+4, -1.5, 1.5);
    return macd - (macd + seededRnd(seed+5, -0.4, 0.4));
  })();
  const bb_u = real ? real.bb_upper : price * (1 + seededRnd(seed+8, 0.01, 0.03));
  const bb_l = real ? real.bb_lower : price * (1 - seededRnd(seed+9, 0.01, 0.03));

  const vol     = Math.floor(seededRnd(seed+6, 500000, 15000000));
  const avgVol  = realAvgVol > 0 ? realAvgVol : Math.floor(seededRnd(seed+7, 800000, 8000000));
  const volR    = vol / avgVol;
  // نستخدم دعم/مقاومة حقيقية إذا متوفرة
  const sup = real?.support || price * (1 - seededRnd(seed+10, 0.008, 0.025));
  const res = real?.resistance || price * (1 + seededRnd(seed+11, 0.008, 0.025));
  const pe      = seededRnd(seed+12, 10, 60);
  const peScore = pe < 20 ? 2 : pe < 35 ? 1 : 0;
  const isReal  = !!real;

  let buy=0, sell=0;
  if(rsi < 35) buy++; if(rsi > 65) sell++;
  if(price > ma20) buy++; else sell++;
  if(ma20 > ma50) buy++; else sell++;
  if(macdH > 0) buy++; else sell++;
  if(volR > 1.3) { if(buy>sell) buy++; else sell++; }
  if(price <= bb_l) buy++; if(price >= bb_u) sell++;
  buy += peScore;

  // ===== Stochastic RSI =====
  if(real?.stochRsi !== undefined) {
    if(real.stochRsi < 20) { buy++; buy++; } // تشبع بيع قوي
    else if(real.stochRsi < 30) { buy++; }    // تشبع بيع
    else if(real.stochRsi > 80) { sell++; sell++; } // تشبع شراء قوي
    else if(real.stochRsi > 70) { sell++; }   // تشبع شراء
  }

  // ===== دعم ومقاومة =====
  if(real?.nearSupport) { buy++; buy++; }     // قريب من الدعم = فرصة
  if(real?.nearResistance) { sell++; sell++; } // قريب من المقاومة = خطر

  // ===== ATR — وقف خسارة ذكي =====
  // نستخدم ATR لتحسين نسبة المخاطرة/المكافأة
  const atrStop = real?.atrPct ? real.atrPct * 1.5 : 3; // وقف = 1.5x ATR
  const atrTarget = real?.atrPct ? real.atrPct * 3 : 6;  // هدف = 3x ATR
  const riskReward = atrTarget / atrStop;
  if(riskReward >= 2) buy++;   // نسبة مخاطرة/مكافأة ممتازة
  if(riskReward < 1) sell++;   // نسبة سيئة

  // ===== تأثير الأخبار =====
  const stockNews = (state.news && state.news[s.id]) || [];
  const posNews = stockNews.filter(n=>n.sentiment==='positive').length;
  const negNews = stockNews.filter(n=>n.sentiment==='negative').length;
  buy += posNews;
  sell += negNews;

  // ===== تأثير تقارير الأرباح =====
  const earning = state.earnings && state.earnings[s.id];
  if(earning && earning.daysUntil <= 3) {
    // أرباح خلال 3 أيام = خطر عالي
    sell += 2;
  }

  const sig  = buy>sell+2?"شراء قوي":buy>sell?"شراء":sell>buy+2?"بيع قوي":sell>buy?"بيع":"انتظار";
  const sigC = sig.includes("شراء")?"green":sig.includes("بيع")?"red":"yellow";
  // قوة السهم = نقاط الشراء - نقاط البيع بدون عشوائية
  const str = Math.min(100, Math.max(0, (buy - sell) * 12 + (real ? 10 : 0)));

  return {rsi,ma20,ma50,macdH,vol,avgVol,volR,bb_u,bb_l,sup,res,pe,
          signal:sig,signalColor:sigC,strength:str,buySignals:buy,sellSignals:sell,
          profitPct:Math.abs(res-price)/price*100,indicatorsReal:isReal};
}

// ===== FETCH HISTORICAL DATA & REAL INDICATORS =====
async function fetchHistoricalIndicators() {
  const apiKey = '9FDbZgjuTfNCiuOoTlUR4jweViwYAZiG';
  // نجيب كل الأسهم — يتم مرة واحدة فقط عند فتح السوق
  const topSymbols = uniqueStocks.map(s=>s.id);
  
  state.realIndicators = {};
  
  // نجيب بشكل متسلسل عشان ما نتجاوز حد الطلبات
  for(const sym of topSymbols) {
    await (async (sym) => {
    try {
      const url = `https://financialmodelingprep.com/stable/historical-price-eod/full?symbol=${sym}&limit=200&apikey=${apiKey}`;
      const res = await fetch(url);
      const data = await res.json();
      const prices = (data.historical || []).map(d => d.close).reverse();
      
      if(prices.length < 14) return;

      // ===== RSI الحقيقي =====
      const gains = [], losses = [];
      for(let i=1; i<prices.length; i++) {
        const diff = prices[i] - prices[i-1];
        gains.push(diff > 0 ? diff : 0);
        losses.push(diff < 0 ? Math.abs(diff) : 0);
      }
      const avgGain = gains.slice(-14).reduce((a,b)=>a+b,0)/14;
      const avgLoss = losses.slice(-14).reduce((a,b)=>a+b,0)/14;
      const rs = avgLoss === 0 ? 100 : avgGain/avgLoss;
      const rsi = 100 - (100/(1+rs));

      // ===== MA20 و MA50 الحقيقية =====
      const ma20 = prices.slice(-20).reduce((a,b)=>a+b,0)/Math.min(20,prices.length);
      const ma50 = prices.slice(-50).reduce((a,b)=>a+b,0)/Math.min(50,prices.length);

      // ===== MACD الحقيقي =====
      function ema(data, period) {
        const k = 2/(period+1);
        let emaVal = data[0];
        for(let i=1; i<data.length; i++) emaVal = data[i]*k + emaVal*(1-k);
        return emaVal;
      }
      const ema12 = ema(prices.slice(-26), 12);
      const ema26 = ema(prices.slice(-26), 26);
      const macdLine = ema12 - ema26;
      const signal = ema([macdLine], 9);
      const macdHist = macdLine - signal;

      // ===== بولينجر الحقيقي =====
      const last20 = prices.slice(-20);
      const mean = last20.reduce((a,b)=>a+b,0)/20;
      const std = Math.sqrt(last20.reduce((sum,p)=>sum+Math.pow(p-mean,2),0)/20);
      const bb_upper = mean + 2*std;
      const bb_lower = mean - 2*std;

      // ===== حفظ البيانات التاريخية للشارت =====
      const chartData = prices.slice(-30);

      // ===== Stochastic RSI =====
      const rsiPeriod = 14;
      const stochPeriod = 14;
      const rsiValues = [];
      for(let i=rsiPeriod; i<prices.length; i++) {
        const slice = prices.slice(i-rsiPeriod, i);
        const g = [], l = [];
        for(let j=1; j<slice.length; j++) {
          const d = slice[j]-slice[j-1];
          g.push(d>0?d:0); l.push(d<0?Math.abs(d):0);
        }
        const ag = g.reduce((a,b)=>a+b,0)/rsiPeriod;
        const al = l.reduce((a,b)=>a+b,0)/rsiPeriod;
        const rs2 = al===0?100:ag/al;
        rsiValues.push(100-(100/(1+rs2)));
      }
      const recentRsi = rsiValues.slice(-stochPeriod);
      const minRsi = Math.min(...recentRsi);
      const maxRsi = Math.max(...recentRsi);
      const stochRsi = maxRsi===minRsi ? 50 : ((rsiValues[rsiValues.length-1]-minRsi)/(maxRsi-minRsi))*100;

      // ===== ATR — وقف خسارة ذكي =====
      const atrPeriod = 14;
      const highs = (data.historical||[]).map(d=>d.high).reverse().slice(-atrPeriod-1);
      const lows  = (data.historical||[]).map(d=>d.low).reverse().slice(-atrPeriod-1);
      const trValues = [];
      for(let i=1; i<highs.length; i++) {
        const tr = Math.max(
          highs[i]-lows[i],
          Math.abs(highs[i]-prices[prices.length-atrPeriod-1+i-1]),
          Math.abs(lows[i]-prices[prices.length-atrPeriod-1+i-1])
        );
        trValues.push(tr);
      }
      const atr = trValues.reduce((a,b)=>a+b,0)/atrPeriod;
      const atrPct = (atr/prices[prices.length-1])*100; // ATR كنسبة مئوية

      // ===== دعم ومقاومة =====
      const last200 = prices.slice(-200);
      const last20h = (data.historical||[]).map(d=>d.high).reverse().slice(-20);
      const last20l = (data.historical||[]).map(d=>d.low).reverse().slice(-20);
      const resistance = Math.max(...last20h);
      const support = Math.min(...last20l);
      const currentPrice = prices[prices.length-1];
      const nearSupport = currentPrice <= support * 1.02;    // السعر قريب من الدعم (2%)
      const nearResistance = currentPrice >= resistance * 0.98; // السعر قريب من المقاومة (2%)

      state.realIndicators[sym] = {
        rsi, ma20, ma50, macdHist, bb_upper, bb_lower, chartData,
        stochRsi, atr, atrPct, support, resistance, nearSupport, nearResistance
      };

    } catch(e) {}
    })(sym);
    // انتظر 200ms بين كل طلب عشان ما نضغط على API
    await new Promise(r => setTimeout(r, 200));
  }
}

async function fetchPrices() {
  const symbols = uniqueStocks.map(s=>s.id).join(',');
  try {
    const res = await fetch(`/api/stocks?symbols=${symbols}`);
    if(!res.ok) throw new Error('failed');
    const data = await res.json();
    const results = data?.quoteResponse?.result || [];
    if(results.length === 0) throw new Error('empty');
    results.forEach(q => {
      if(q.regularMarketPrice) {
        state.prices[q.symbol] = {
          price: q.regularMarketPrice,
          change: q.regularMarketChangePercent || 0,
          high: q.regularMarketDayHigh || q.regularMarketPrice * 1.01,
          low: q.regularMarketDayLow || q.regularMarketPrice * 0.99,
          volume: q.regularMarketVolume || 0,
          isReal: true
        };
      }
    });
    state.dataSource = results.length > 5 ? 'real' : 'simulated';
    // نحفظ آخر أسعار حقيقية
    if(results.length > 5) {
      Object.assign(state.lastPrices, state.prices);
      // نحفظ في localStorage عشان تبقى حتى بعد إغلاق المتصفح
      try { localStorage.setItem('lastPrices', JSON.stringify(state.lastPrices)); } catch(e) {}
    }
  } catch(e) {
    state.dataSource = 'simulated';
  }

async function fetchNewsAndEarnings() {
  const apiKey = '9FDbZgjuTfNCiuOoTlUR4jweViwYAZiG';
  const symbols = uniqueStocks.slice(0,20).map(s=>s.id).join(','); // أهم 20 سهم للأخبار
  
  try {
    // أخبار السوق
    const newsUrl = `https://financialmodelingprep.com/stable/news/stock?symbols=${symbols}&limit=50&apikey=${apiKey}`;
    const newsRes = await fetch(newsUrl);
    const newsData = await newsRes.json();
    
    state.news = {};
    if(Array.isArray(newsData)) {
      newsData.forEach(n => {
        const sym = n.symbol;
        if(!state.news[sym]) state.news[sym] = [];
        if(state.news[sym].length < 3) {
          // تحليل بسيط للعنوان — إيجابي أو سلبي
          const title = (n.title || '').toLowerCase();
          const positive = ['beat','record','growth','surge','rise','up','gain','profit','strong','bullish','buy','upgrade'].some(w=>title.includes(w));
          const negative = ['miss','fall','drop','decline','loss','cut','down','bearish','sell','downgrade','warning','risk'].some(w=>title.includes(w));
          state.news[sym].push({
            title: n.title,
            sentiment: positive ? 'positive' : negative ? 'negative' : 'neutral',
            date: n.publishedDate
          });
        }
      });
    }
  } catch(e) {
    state.news = {};
  }

  try {
    // تقارير الأرباح القادمة
    const today = new Date().toISOString().split('T')[0];
    const nextWeek = new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0];
    const earnUrl = `https://financialmodelingprep.com/stable/earning-calendar?from=${today}&to=${nextWeek}&apikey=${apiKey}`;
    const earnRes = await fetch(earnUrl);
    const earnData = await earnRes.json();
    
    state.earnings = {};
    if(Array.isArray(earnData)) {
      earnData.forEach(e => {
        state.earnings[e.symbol] = {
          date: e.date,
          epsEstimate: e.epsEstimated,
          daysUntil: Math.ceil((new Date(e.date) - new Date()) / (1000*60*60*24))

  } catch(e) {

  }

function checkMarketStatus() {
  return getMarketSession() === "open";
}

function getMarketSession() {
  const now = new Date();
  const utcH = now.getUTCHours();
  const utcM = now.getUTCMinutes();
  const day = now.getUTCDay();
  const mins = utcH*60+utcM;
  const month = now.getUTCMonth() + 1; // 1-12

  // التوقيت الصيفي (مارس-نوفمبر): السوق 13:30-20:00 UTC = 4:30م-11م سعودي
  // التوقيت الشتوي (نوفمبر-مارس): السوق 14:30-21:00 UTC = 5:30م-12م سعودي
  const isSummer = month >= 3 && month <= 11;
  const marketOpen = isSummer ? 810 : 870;   // 13:30 أو 14:30 UTC
  const marketClose = isSummer ? 1200 : 1260; // 20:00 أو 21:00 UTC

  if(day===0||day===6) return "weekend";
  if(mins>=marketOpen&&mins<=marketClose) return "open";
  if(mins>marketClose&&mins<=marketClose+210) return "afterhours";
  if(mins>=marketOpen-180&&mins<marketOpen) return "premarket";
  return "closed";
}

async function loadData() {
  state.loading = true;
  state.marketOpen = true; // الأداة شغالة 24/7
  render();

  const session = getMarketSession();
  const isOfficialOpen = session === "open"; // السوق الرسمي 4:30م-11م فقط

  // نجيب الأسعار دائماً
  await Promise.all([fetchPrices(), fetchNewsAndEarnings(), fetchLongTermEarnings()]);
  buildStocks();

  if(isOfficialOpen && !state.historicalFetched) {
    // ① السوق فتح لأول مرة اليوم — نحمّل المؤشرات
    state.loadingIndicators = true;
    render();

    // ② ننتظر اكتمال 200 يوم + 11 مؤشر
    await Promise.all([fetchHistoricalIndicators(), fetchCompanyProfiles()]);
    
    // ③ بعد الاكتمال — نحسب التوصية مرة واحدة ✅
    state.historicalFetched = true;
    state.loadingIndicators = false;
    buildStocks();
    calcRecs();
    state.lastMarketRecs = state.recs;

  } else if(isOfficialOpen) {
    // السوق مفتوح والمؤشرات محملة — أسعار فقط، التوصيات ثابتة ✅

  } else {
    // خارج السوق الرسمي — نعرض آخر توصية محفوظة
    if(!state.recs && state.lastMarketRecs) {
      state.recs = state.lastMarketRecs;
    } else if(!state.recs) {
      calcRecs(); // أول مرة فقط
    }

  state.loading = false;
  state.lastPriceUpdate = new Date();
  state.priceCountdown = UPDATE_INTERVAL;
  render();

function calcRecs() {
  const buys = [...state.stocks]
    .filter(s=>s.signal.includes("شراء"))
    .filter(s=>s.profitPct >= 1.5)  // فلتر: ربح أدنى 1.5%
    .sort((a,b)=>b.strength-a.strength);
  const sells = [...state.stocks].filter(s=>s.signal.includes("بيع")).sort((a,b)=>b.strength-a.strength);
  const watch = [...state.stocks].filter(s=>s.signal==="انتظار").sort((a,b)=>b.volR-a.volR);
  const future = [...state.stocks].filter(s=>s.cat==="future"&&s.signal.includes("شراء")).sort((a,b)=>b.strength-a.strength);
  const buyCount = state.stocks.filter(s=>s.signal.includes("شراء")).length;
  const sellCount = state.stocks.filter(s=>s.signal.includes("بيع")).length;
  const mktScore = Math.round(buyCount/(buyCount+sellCount+0.1)*100);
  state.recs = {top3:buys.slice(0,5), avoid:sells.slice(0,5), watch:watch.slice(0,2), future:future.slice(0,5), buyCount, sellCount, mktScore};
  state.lastRecUpdate = new Date();
  state.recCountdown = REC_INTERVAL;
}

const C = {
  green:"#00ff88", yellow:"#ffe033", red:"#ff2d7a",
  blue:"#00c8ff", purple:"#b44fff", orange:"#ff7a00"
};
function f(n,d=2){return Number(n).toFixed(d);}
function fK(n){return n>=1e9?(n/1e9).toFixed(1)+'B':n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':String(n);}
function sigColor(sig){return sig.includes("شراء")?C.green:sig.includes("بيع")?C.red:C.yellow;}
function catColor(cat){return {large:C.blue,mid:C.green,small:C.yellow,future:C.purple}[cat]||C.blue;}

function el(tag,attrs,children){
  const e=document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{
    if(k==='style')Object.assign(e.style,v);
    else if(k==='onclick')e.onclick=v;
    else if(k==='className')e.className=v;
    else e.setAttribute(k,v);
  });
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}
function div(s,c){return el('div',{style:typeof s==='string'?{}:s},c);}
function txt(s,style){const e=document.createElement('span');if(style)Object.assign(e.style,style);e.textContent=s;return e;}
function btn(html,style,onclick){
  const b=document.createElement('button');
  b.innerHTML=html;
  if(style)Object.assign(b.style,style);
  if(onclick)b.onclick=onclick;
  return b;
}

// ===== MINI SPARKLINE =====
function sparkline(s, width=80, height=28) {
  const real = state.realIndicators && state.realIndicators[s.id];
  const change = s.change || 0;
  const col = change>=0?C.green:C.red;
  
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',width); svg.setAttribute('height',height);
  svg.setAttribute('viewBox','0 0 100 100');
  svg.setAttribute('preserveAspectRatio','none');

  let pts = [];
  
  if(real && real.chartData && real.chartData.length > 1) {
    // شارت حقيقي من البيانات التاريخية
    const data = real.chartData;
    const min = Math.min(...data);
    const max = Math.max(...data);
    const range = max - min || 1;
    pts = data.map((p,i) => `${(i/(data.length-1))*100},${100-((p-min)/range)*90+5}`);
    
    // نضيف علامة حقيقي
    svg.setAttribute('title','بيانات حقيقية');
  } else {
    // شارت تقريبي
    let y = 50;
    for(let i=0;i<16;i++){
      y += ((Math.random()-.499)*12)+(change>0?.5:-.5);
      y = Math.max(5,Math.min(95,y));
      pts.push(`${i*(100/15)},${y}`);
    }
  }

  const poly = document.createElementNS('http://www.w3.org/2000/svg','polyline');
  poly.setAttribute('points', pts.join(' '));
  poly.setAttribute('fill','none');
  poly.setAttribute('stroke', real?.chartData ? col : col+'99');
  poly.setAttribute('stroke-width','3');
  poly.setAttribute('stroke-linecap','round');
  svg.appendChild(poly);
  return svg;
}

// ===== REC CARD =====
function recCard(s, rank, pct) {
  if(!s) return null;
  const rc = sigColor(s.signal);
  const capUsd = state.capital;
  const investUsd = capUsd * pct;
  const shares = Math.floor((investUsd * USD_RATE) / s.priceInSar);
  const profitSar = shares * s.priceInSar * (s.profitPct/100);
  const stopPrice = s.price * 0.97;
  // حساب المدة المتوقعة بناءً على ATR
  const real = state.realIndicators && state.realIndicators[s.id];
  const atr = real?.atr || s.price * 0.02; // ATR أو 2% من السعر كـ fallback
  const priceDiff = Math.abs(s.res - s.sup);
  const expectedDays = atr > 0 ? Math.round(priceDiff / atr) : 3;
  const daysMin = Math.max(1, expectedDays - 1);
  const daysMax = expectedDays + 2;

  const reasons = [];

  // شرح RSI
  if(s.rsi < 30) reasons.push(`RSI ${f(s.rsi,0)} — تشبع بيع قوي جداً — أدنى مستوى ومن المتوقع ارتداد`);
  else if(s.rsi < 38) reasons.push(`RSI ${f(s.rsi,0)} — منطقة تشبع بيع — ضغط البيع يتراجع`);
  
  // شرح Stochastic RSI
  if(real?.stochRsi !== undefined) {
    if(real.stochRsi < 20) reasons.push(`Stochastic RSI ${f(real.stochRsi,0)} — إشارة دخول مبكرة قبل RSI`);
  }

  // شرح المتوسطات
  if(s.price>s.ma20&&s.ma20>s.ma50) reasons.push(`Golden Cross ✅ — MA20 فوق MA50 — اتجاه صاعد قوي`);
  else if(s.price>s.ma20) reasons.push(`السعر فوق MA20 — زخم إيجابي قصير المدى`);

  // شرح MACD
  if(s.macdH>0) reasons.push(`MACD إيجابي — زخم الشراء أقوى من البيع الآن`);

  // شرح الحجم
  if(s.volR>2) reasons.push(`حجم التداول اليوم أعلى من المعتاد بـ ${f(s.volR,1)} مرة — دخول كبار المتداولين`);
  else if(s.volR>1.3) reasons.push(`حجم التداول اليوم أعلى من المعتاد بـ ${f(s.volR,1)} مرة — نشاط متزايد`);

  // شرح الدعم والمقاومة
  if(real?.nearSupport) reasons.push(`السعر $${f(s.price)} قريب من خط الدعم $${f(s.sup)} — منطقة ارتداد قوية`);
  
  // شرح بولينجر
  if(s.price<=s.bb_l*1.01) reasons.push(`السعر عند الحد السفلي لبولينجر — إشارة ارتداد محتملة`);

  // شرح P/E
  if(s.pe<20) reasons.push(`P/E ${f(s.pe,0)} — السهم رخيص مقارنة بأرباح الشركة`);
  else if(s.pe<25) reasons.push(`P/E ${f(s.pe,0)} — تقييم جذاب`);

  // شرح الهدف
  reasons.push(`المقاومة التالية $${f(s.res)} — ربح محتمل ${f(s.profitPct)}% لو وصلها`);

  // لو ما في أسباب كافية
  if(reasons.length < 2) reasons.push(`${s.buySignals} إشارات شراء مقابل ${s.sellSignals} إشارات بيع`);
  
  if(s.isReal) reasons.push("✅ السعر حقيقي من السوق الآن");

  return el('div',{style:{
    background:"var(--card)",
    border:`2px solid ${rc}44`,

// ===== MARKET TAB =====
function getFilteredStocks() {
  return state.stocks
    .filter(s=>state.searchQuery===""||
      s.name.toLowerCase().includes(state.searchQuery.toLowerCase())||
      s.id.toLowerCase().includes(state.searchQuery.toLowerCase())||
      s.sector.includes(state.searchQuery))
    .filter(s=>state.sector==="الكل"||s.sector===state.sector)
    .filter(s=>state.catFilter==="الكل"||s.cat===state.catFilter)
    .sort((a,b)=>{
      if(state.sort==="signal"){const o={"شراء قوي":0,"شراء":1,"انتظار":2,"بيع":3,"بيع قوي":4};return(o[a.signal]||2)-(o[b.signal]||2);}
      if(state.sort==="change")return Math.abs(b.change)-Math.abs(a.change);
      if(state.sort==="profit")return b.profitPct-a.profitPct;
      if(state.sort==="rsi")return a.rsi-b.rsi;
      return 0;
    });
}

function getEarningsDays(symbol) {
  const date = LONGTERM_EARNINGS[symbol];
  if(!date) return null;
  const days = Math.ceil((new Date(date) - new Date()) / (1000*60*60*24));
  return {date, days};
}

function earningsBadge(symbol) {
  const e = getEarningsDays(symbol);
  if(!e) return null;
  const col = e.days <= 7 ? C.red : e.days <= 30 ? C.yellow : C.green;
  const msg = e.days <= 7 ? "🔴 أرباح خلال "+e.days+" أيام — تجنب الشراء!" :
              e.days <= 30 ? "🟡 أرباح خلال "+e.days+" يوم — راقب" :
              "🟢 أرباح بعد "+e.days+" يوم — وقت مناسب";
  return el('div',{style:{
    background:`${col}10`, border:`1px solid ${col}33`,
    borderRadius:"8px", padding:"6px 10px", marginBottom:"8px",
    display:"flex", justifyContent:"space-between", alignItems:"center"
  }},[
    txt(msg, {fontSize:"11px", color:col, fontWeight:"700"}),
    txt(e.date, {fontSize:"10px", color:"var(--text3)"})
  ]);
}

// ===== PORTFOLIO TAB =====
let portfolioStocks = [];
let tradeHistory = [];
let portfolioLoaded = false;

async function loadPortfolio() {
  if(!window.db || portfolioLoaded) return;
  try {
    // تحميل المحفظة الحالية
    const pSnap = await window.fbGetDocs(window.fbCollection(window.db, 'portfolio'));
    portfolioStocks = [];
    pSnap.forEach(doc => portfolioStocks.push({id: doc.id, ...doc.data()}));
    
    // تحميل سجل الصفقات
    const hSnap = await window.fbGetDocs(window.fbQuery(window.fbCollection(window.db, 'trades'), window.fbOrderBy('date', 'desc')));
    tradeHistory = [];
    hSnap.forEach(doc => tradeHistory.push({id: doc.id, ...doc.data()}));
    
    portfolioLoaded = true;
    render();
  } catch(e) {
    console.log('Firebase error:', e);
  }
}

async function addTrade(trade) {
  if(!window.db) return;
  try {
    await window.fbAddDoc(window.fbCollection(window.db, 'trades'), {
      ...trade,
      date: new Date().toISOString()
    });
    await window.fbAddDoc(window.fbCollection(window.db, 'portfolio'), trade);
    portfolioLoaded = false;
    await loadPortfolio();
  } catch(e) {
    console.log('Error adding trade:', e);
  }
}

        el('div',{style:{fontSize:"16px",fontWeight:"900",color:C.blue}},String(totalTrades))
      ])
    ]),

    // إضافة صفقة جديدة
    el('div',{style:{background:"var(--bg3)",border:`1px solid ${C.green}33`,borderRadius:"14px",padding:"14px",marginBottom:"14px"}},[
      el('div',{style:{fontSize:"13px",fontWeight:"700",color:C.green,marginBottom:"12px"}},"➕ تسجيل صفقة جديدة"),
      
      // نوع الصفقة
      el('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}},[
        btn("🟢 شراء",{
          background:"rgba(0,255,136,.15)",border:`1px solid ${C.green}`,
          color:C.green,borderRadius:"10px",padding:"8px",fontSize:"12px",fontWeight:"700",
          id:"btn-buy"
        },()=>{newType='buy';document.getElementById('btn-buy').style.background="rgba(0,255,136,.3)";document.getElementById('btn-sell').style.background="rgba(255,45,122,.08)";}),
        btn("🔴 بيع",{
          background:"rgba(255,45,122,.08)",border:`1px solid ${C.red}33`,
          color:"var(--text3)",borderRadius:"10px",padding:"8px",fontSize:"12px",fontWeight:"700",
          id:"btn-sell"
        },()=>{newType='sell';document.getElementById('btn-sell').style.background="rgba(255,45,122,.3)";document.getElementById('btn-buy').style.background="rgba(0,255,136,.08)";})
      ]),

      // الحقول
      el('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}},[
        el('div',{style:{gridColumn:"1 / -1"}},[
          el('div',{style:{fontSize:"10px",color:"var(--text3)",marginBottom:"4px"}},"اختار السهم"),
          (() => {
            const sel = document.createElement('select');
            Object.assign(sel.style,{width:"100%",background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"8px",padding:"8px",color:"var(--text)",fontSize:"12px",fontFamily:"inherit",boxSizing:"border-box",direction:"rtl"});
            const defaultOpt = document.createElement('option');
            defaultOpt.value = ''; defaultOpt.textContent = '-- اختار سهم --';
            sel.appendChild(defaultOpt);
            uniqueStocks.forEach(s => {
              const opt = document.createElement('option');
              opt.value = s.id;
              const currentPrice = state.prices[s.id]?.price || '';
              opt.textContent = `${s.name} (${s.id})${currentPrice?' - $'+Number(currentPrice).toFixed(2):''}`;
              if(s.id === state.newSymbol) opt.selected = true;
              sel.appendChild(opt);
            });
            sel.onchange = e => {
              state.newSymbol = e.target.value;
              // نضع السعر الحالي تلقائياً
              const currentStock = state.stocks.find(x=>x.id===e.target.value);
              if(currentStock) state.newPrice = currentStock.price.toFixed(2);
              render();
            };
            return sel;
          })()
        ]),
        el('div',{},[
          el('div',{style:{fontSize:"10px",color:"var(--text3)",marginBottom:"4px"}},"عدد الأسهم"),
          (() => {
            const inp = document.createElement('input');
            inp.type = "number"; inp.placeholder = "10";
            inp.value = state.newShares || '';
            Object.assign(inp.style,{width:"100%",background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"8px",padding:"8px",color:"var(--text)",fontSize:"12px",fontFamily:"inherit",boxSizing:"border-box"});
            inp.oninput = e => { state.newShares = e.target.value; };
            return inp;
          })()
        ]),
        el('div',{},[
          el('div',{style:{fontSize:"10px",color:"var(--text3)",marginBottom:"4px"}},"السعر $"),
          (() => {
            const inp = document.createElement('input');
            inp.type = "number"; inp.placeholder = "150.00";
            inp.value = state.newPrice || '';
            Object.assign(inp.style,{width:"100%",background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"8px",padding:"8px",color:"var(--text)",fontSize:"12px",fontFamily:"inherit",boxSizing:"border-box"});
            inp.oninput = e => { state.newPrice = e.target.value; };
            return inp;
          })()
        ])
      ]),

      btn("💾 حفظ الصفقة",{
        width:"100%",background:`linear-gradient(135deg,${C.green}33,${C.blue}33)`,
        border:`1px solid ${C.green}`,color:C.green,borderRadius:"10px",
        padding:"10px",fontSize:"13px",fontWeight:"700"
      },async ()=>{
        const sym = (state.newSymbol||'').toUpperCase();
        const shares = parseFloat(state.newShares||0);
        const price = parseFloat(state.newPrice||0);
        if(!sym||!shares||!price){alert('أكمل جميع الحقول');return;}
        const currentStock = state.stocks.find(s=>s.id===sym);
        const currentPrice = currentStock?.price||price;
        const profit = state.newTradeType==='sell' ? (price-price)*shares : 0;
        await addTrade({symbol:sym,shares,buyPrice:price,type:state.newTradeType||'buy',profit,currentPrice});
        state.newSymbol=''; state.newShares=''; state.newPrice='';
        alert('✅ تم حفظ الصفقة في السحابة!');
      })
    ]),

    // الأسهم الحالية في المحفظة
    portfolioStocks.length>0 && el('div',{style:{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"14px",padding:"14px",marginBottom:"14px"}},[
      el('div',{style:{fontSize:"13px",fontWeight:"700",color:C.blue,marginBottom:"12px"}},"💼 أسهمي الحالية"),
      ...portfolioStocks.map(s=>{
        const current = state.stocks.find(x=>x.id===s.symbol);
        const currentPrice = current?.price||s.buyPrice;
        const pnl = (currentPrice-s.buyPrice)*s.shares*USD_RATE;
        const pnlPct = ((currentPrice-s.buyPrice)/s.buyPrice*100);
        const rec = current?.signal||'—';
        const recColor = sigColor(rec);
        return el('div',{style:{
          display:"flex",justifyContent:"space-between",alignItems:"center",
          padding:"10px 0",borderBottom:"1px solid var(--border)"
        }},[
          el('div',{},[
            el('div',{style:{fontSize:"13px",fontWeight:"700",color:"var(--text)"}},s.symbol),
            el('div',{style:{fontSize:"10px",color:"var(--text3)"}},`${s.shares} سهم • دخل بـ $${f(s.buyPrice)}`),
            el('div',{style:{fontSize:"10px",color:recColor,fontWeight:"700"}},`توصية: ${rec}`)
          ]),
          el('div',{style:{textAlign:"left",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px"}},[
            el('div',{style:{fontSize:"13px",fontWeight:"800",color:pnl>=0?C.green:C.red}},`${pnl>=0?"+":""}${f(pnl,0)} ر`),
            el('div',{style:{fontSize:"10px",color:pnl>=0?C.green:C.red}},`${pnlPct>=0?"+":""}${f(pnlPct)}%`),
            pnl<=-s.buyPrice*s.shares*USD_RATE*0.03 && el('div',{style:{fontSize:"9px",color:C.red,fontWeight:"700",background:"rgba(255,45,122,.15)",borderRadius:"4px",padding:"2px 6px"}},"🛑 وقف الخسارة!"),
            el('button',{
              onclick: async ()=>{
                if(!confirm(`حذف ${s.symbol} من المحفظة؟`)) return;
                try {
                  const {deleteDoc, doc} = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
                  await deleteDoc(doc(db, 'portfolio', s.id));
                  alert('✅ تم الحذف!');
                  renderPortfolioTab && render();
                } catch(e) { alert('❌ خطأ في الحذف'); }
              },
              style:{
                background:"rgba(255,45,122,.1)",border:"1px solid rgba(255,45,122,.3)",
                color:C.red,borderRadius:"6px",padding:"3px 8px",
                fontSize:"10px",cursor:"pointer",fontFamily:"inherit"
              }
            },"🗑️ حذف")
          ])
        ]);
      })
    ]),

    // سجل الصفقات
    tradeHistory.length>0 && el('div',{style:{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"14px",padding:"14px",marginBottom:"14px"}},[
      el('div',{style:{fontSize:"13px",fontWeight:"700",color:C.yellow,marginBottom:"12px"}},"📋 سجل صفقاتي"),
      ...tradeHistory.slice(0,10).map((t,i)=>el('div',{style:{
        display:"flex",justifyContent:"space-between",alignItems:"center",
        padding:"8px 0",borderBottom:i<tradeHistory.length-1?"1px solid var(--border)":"none"
      }},[
        el('div',{},[
          el('div',{style:{display:"flex",gap:"6px",alignItems:"center"}},[
            el('span',{style:{fontSize:"10px",color:t.type==='buy'?C.green:C.red,background:t.type==='buy'?"rgba(0,255,136,.1)":"rgba(255,45,122,.1)",padding:"2px 8px",borderRadius:"5px",fontWeight:"700"}},t.type==='buy'?"شراء":"بيع"),
            el('span',{style:{fontSize:"12px",fontWeight:"700",color:"var(--text)"}},t.symbol)
          ]),
          el('div',{style:{fontSize:"10px",color:"var(--text3)",marginTop:"2px"}},`${t.shares} سهم • $${f(t.buyPrice)} • ${new Date(t.date).toLocaleDateString('ar-SA')}`)
        ]),
        t.type==='sell' && el('div',{style:{fontSize:"12px",fontWeight:"800",color:t.profit>=0?C.green:C.red}},`${t.profit>=0?"+":""}${f(t.profit,0)} ر`)
      ]))
    ]),

    !portfolioLoaded && el('div',{style:{textAlign:"center",padding:"30px 0",color:"var(--text3)"}},[
      el('div',{style:{fontSize:"13px"}},"جاري تحميل بياناتك من السحابة...")
    ]),

    portfolioLoaded && portfolioStocks.length===0 && el('div',{style:{textAlign:"center",padding:"30px 0"}},[
      el('div',{style:{fontSize:"40px",marginBottom:"12px"}},"📭"),
      el('div',{style:{fontSize:"14px",color:"var(--text3)"}},"ما عندك أسهم بعد — سجّل أول صفقة! 🚀")
    ])
  ]);
}

// ===== MAIN RENDER =====
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const wrapper = el('div',{style:{minHeight:"100vh",display:"flex",flexDirection:"column"}});

  if(state.loading && state.stocks.length===0) {
    wrapper.appendChild(renderLoading());
  } else {
    wrapper.appendChild(renderHeader());
    const content = el('div',{style:{flex:"1",padding:"0 14px 80px"}});

    if(state.tab==="rec")     content.appendChild(renderRecTab());
    else if(state.tab==="market")  content.appendChild(renderMarketTab());
    else if(state.tab==="future")  content.appendChild(renderFutureTab());
    else if(state.tab==="tips")    content.appendChild(renderTipsTab());
    else if(state.tab==="portfolio") content.appendChild(renderPortfolioTab());
    else if(state.tab==="longterm")  content.appendChild(renderLongTermTab());

    wrapper.appendChild(content);
    if(state.selected) wrapper.appendChild(renderModal());
  }

  app.appendChild(wrapper);
}

// ===== TIMERS =====
let lastDay = new Date().getDate();
let midDayFetched = false;

// تحقق من تحديث منتصف اليوم كل دقيقة
setInterval(()=>{
  const now = new Date();
  const today = now.getDate();
  const mins = now.getUTCHours()*60 + now.getUTCMinutes();
  const month = now.getUTCMonth()+1;
  const isSummer = month>=3&&month<=11;
  const midDay = isSummer ? 960 : 1020; // 7:00م سعودي

  if(today !== lastDay) {
    state.historicalFetched = false;
    midDayFetched = false;
    lastDay = today;
  }

  if(mins>=midDay && mins<=midDay+5 && !midDayFetched && state.historicalFetched) {
    midDayFetched = true;
    state.historicalFetched = false;
    console.log("🔄 تحديث منتصف التداول 7:00م");
  }
}, 60000);

setInterval(()=>{
  state.priceCountdown--;
  state.recCountdown--;

  if(state.recCountdown<=0) {
    // نحدث الواجهة كل 30 ثانية — الأسعار تتحدث
    // التوصيات تُحسب مرتين: 4:30م عند الفتح + 7:00م منتصف التداول
    state.recCountdown = REC_INTERVAL;
    render();
  }

  if(state.priceCountdown<=0) {
    loadData();
  } else {
    const cdEl = document.querySelector('[data-cd]');
    if(cdEl) cdEl.textContent = state.priceCountdown+'ث';
  }
}, 1000);

// ===== START =====
loadData();
</script>
</body>
