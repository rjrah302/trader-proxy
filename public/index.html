// ── شريط MACD Hist + أسبوعي (يظهر في جميع التبويبات)
function renderMacdBar() {
  // نجمع إحصائيات من كل الأسهم التي عندها بيانات
  const inds = Object.values(state.indicators);
  const withHist = inds.filter(i=>i.macdHist!=null);
  if(withHist.length === 0) return null;

  const bullHist  = withHist.filter(i=>i.macdHist>0 && i.macdHistDir==='expanding').length;
  const bearHist  = withHist.filter(i=>i.macdHist<0 && i.macdHistDir==='expanding').length;
  const bullWeek  = withHist.filter(i=>i.weeklyTrend==='bullish').length;
  const total     = withHist.length;
  const moodColor = bullHist > bearHist ? C.green : bearHist > bullHist ? C.pink : C.yellow;
  const moodText  = bullHist > bearHist ? 'زخم صاعد' : bearHist > bullHist ? 'زخم هابط' : 'متوازن';

  return el('div', {style:{
    background:'#060b14', borderBottom:'1px solid #1a2340',
    padding:'6px 16px', display:'flex', gap:'8px', alignItems:'center',
    overflowX:'auto',
  }}, [
    // MACD Histogram السوق
    el('div', {style:{
      display:'flex', alignItems:'center', gap:'5px', flexShrink:'0',
    }}, [
      el('span', {style:{fontSize:'9px', color:C.text3}}, ['MACD Hist']),
      el('span', {style:{
        fontSize:'10px', fontWeight:'700', color:moodColor,
        background:moodColor+'12', borderRadius:'5px', padding:'2px 7px',
      }}, [bullHist+'↑ / '+bearHist+'↓ '+moodText]),
    ]),
    el('div', {style:{width:'1px', height:'16px', background:'#1a2340', flexShrink:'0'}}),
    // أسبوعي
    el('div', {style:{
      display:'flex', alignItems:'center', gap:'5px', flexShrink:'0',
    }}, [
      el('span', {style:{fontSize:'9px', color:C.text3}}, ['أسبوعي']),
      el('span', {style:{
        fontSize:'10px', fontWeight:'700',
        color: bullWeek/total > 0.6 ? C.green : bullWeek/total < 0.4 ? C.pink : C.yellow,
        background: bullWeek/total > 0.6 ? 'rgba(0,255,136,.1)' : bullWeek/total < 0.4 ? 'rgba(255,45,122,.1)' : 'rgba(255,224,51,.1)',
        borderRadius:'5px', padding:'2px 7px',
      }}, [
        bullWeek/total > 0.6 ? '↑ صاعد' : bullWeek/total < 0.4 ? '↓ هابط' : '↔ متوازن',
      ]),
    ]),
    el('div', {style:{width:'1px', height:'16px', background:'#1a2340', flexShrink:'0'}}),
    // ATR
    (() => {
      const avgATR = withHist.filter(i=>i.atrPct!=null).reduce((s,i)=>s+i.atrPct,0)/Math.max(withHist.filter(i=>i.atrPct!=null).length,1);
      return el('div', {style:{display:'flex', alignItems:'center', gap:'5px', flexShrink:'0'}}, [
        el('span', {style:{fontSize:'9px', color:C.text3}}, ['ATR متوسط']),
        el('span', {style:{
          fontSize:'10px', fontWeight:'700',
          color: avgATR>4?C.orange:avgATR>2?C.yellow:C.text2,
        }}, [fmt(avgATR,1)+'%']),
      ]);
    })(),
  ]);
}

function renderToolReportTab() {
  const history = updateHistoryResults();
  const now = Date.now();
  const week = history.filter(h => now - new Date(h.recDate).getTime() <= 7*864e5);
  const month = history.filter(h => now - new Date(h.recDate).getTime() <= 30*864e5);
  const recs = history.filter(h => (h.type||'rec') === 'rec');
  const specs = history.filter(h => h.type === 'spec');

  const stAll = calcHistoryStats(history);
  const stWeek = calcHistoryStats(week);
  const stRec = calcHistoryStats(recs);
  const stSpec = calcHistoryStats(specs);
  const closed = history.filter(h => h.result !== 'pending' && h.pnlPct != null);
  const best = closed.length ? [...closed].sort((a,b)=>(b.pnlPct||0)-(a.pnlPct||0))[0] : null;
  const worst = closed.length ? [...closed].sort((a,b)=>(a.pnlPct||0)-(b.pnlPct||0))[0] : null;
  const pending = history.filter(h => h.result === 'pending');
  const repeatStars = (() => {
    const byDay = {};
    history.filter(h=>(h.type||'rec')==='rec').forEach(h => {
      const d = new Date(h.recDate).toDateString();
      const k = d+'_'+h.id;
      byDay[k] = byDay[k] || new Set();
      byDay[k].add(h.session);
    });
    return Object.entries(byDay).filter(([,s])=>s.has('افتتاح') && s.has('منتصف')).length;
  })();

  const card = (title, value, sub, color=C.blue) => el('div', {style:{
    background:'#0a1020', border:`1px solid ${color}33`,
    borderRadius:'12px', padding:'12px',
  }}, [
    el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'5px'}}, [title]),
    el('div', {style:{fontSize:'18px', fontWeight:'900', color}}, [value]),
    sub && el('div', {style:{fontSize:'9px', color:C.text2, marginTop:'3px'}}, [sub]),
  ]);

  const row = (label, value, color=C.text) => el('div', {style:{
    display:'flex', justifyContent:'space-between', alignItems:'center',
    padding:'8px 0', borderBottom:'1px solid rgba(255,255,255,.06)',
    fontSize:'11px',
  }}, [
    el('span', {style:{color:C.text2}}, [label]),
    el('span', {style:{color, fontWeight:'900'}}, [value]),
  ]);

  return el('div', {style:{padding:'12px 16px'}}, [
    el('div', {style:{marginBottom:'12px'}}, [
      el('div', {style:{fontSize:'15px', fontWeight:'900', color:C.text}}, ['📊 تقرير أداء الأداة']),
      el('div', {style:{fontSize:'10px', color:C.text3, marginTop:'4px'}}, ['مبني على سجل التوصيات والمجازفة داخل الجهاز']),
    ]),
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginBottom:'12px'}}, [
      card('نسبة النجاح', stAll.winRate+'%', stAll.wins+' ربح / '+stAll.losses+' خسارة', stAll.winRate>=60?C.green:stAll.winRate>=40?C.yellow:C.pink),
      card('الصفقات المغلقة', String(stAll.closed), stAll.pending+' معلقة', C.blue),
      card('متوسط الربح', (stAll.avgWin>=0?'+':'')+stAll.avgWin+'%', 'للصفقات الرابحة', C.green),
      card('متوسط الخسارة', stAll.avgLoss+'%', 'للصفقات الخاسرة', C.pink),
      card('توقع الصفقة', (stAll.expectancy>=0?'+':'')+stAll.expectancy+'%', 'متوسط العائد المتوقع', stAll.expectancy>=0?C.green:C.pink),
      card('نجوم التكرار ⭐', String(repeatStars), 'ظهر افتتاح + منتصف', C.yellow),
    ]),
    el('div', {style:{
      background:'#0a1020', border:'1px solid var(--border)',
      borderRadius:'12px', padding:'12px', marginBottom:'12px',
    }}, [
      el('div', {style:{fontSize:'12px', fontWeight:'900', color:C.blue, marginBottom:'8px'}}, ['تفصيل الأداء']),
      row('آخر 7 أيام', stWeek.winRate+'% | '+stWeek.closed+' مغلقة | '+stWeek.pending+' معلقة', stWeek.winRate>=60?C.green:C.yellow),
      row('آخر 30 يوم', calcHistoryStats(month).winRate+'% | '+month.length+' إشارة', C.text),
      row('توصياتي', stRec.winRate+'% | '+recs.length+' إشارة', C.green),
      row('مجازفة', stSpec.winRate+'% | '+specs.length+' إشارة', C.purple),
      best && row('أفضل سهم', best.id+' +'+fmt(best.pnlPct,2)+'%', C.green),
      worst && row('أسوأ سهم', worst.id+' '+fmt(worst.pnlPct,2)+'%', C.pink),
    ]),
    pending.length>0 && el('div', {style:{
      background:'rgba(255,122,0,.06)', border:'1px solid rgba(255,122,0,.22)',
      borderRadius:'12px', padding:'12px',
    }}, [
      el('div', {style:{fontSize:'12px', fontWeight:'900', color:C.orange, marginBottom:'8px'}}, ['معلّقة تحتاج متابعة']),
      ...pending.slice(-8).reverse().map(h => row(h.id+' — '+(h.session||'—'), (h.pnlPct!=null?(h.pnlPct>=0?'+':'')+fmt(h.pnlPct,2)+'%':'بانتظار السعر'), h.pnlPct>=0?C.green:C.pink)),
    ]),
  ]);
}

function renderRecCard(r, idx) {
  const isSelected = state.selected === r.id;
  const marketClosed = !isMarketOpen();
  const sigColor = r.signal.includes('قوي') ? C.green :
                   r.signal.includes('شراء') ? C.blue : C.yellow;
  const recDecision = r.recDecision || (
    r.activeBuy ? {label:'ادخل الآن', color:C.green, note:r.entryNote} :
    r.conditionalBuy ? {label:'ادخل بشرط', color:C.blue, note:r.entryNote} :
    r.earlyRadar ? {label:'استعد', color:C.yellow, note:r.entryNote} :
    {label:'راقب فقط', color:C.yellow, note:r.entryNote}
  );

  // ── نوع الأمر — منطق صحيح
  // حالة 1: السعر عند الدعم مباشرة (فرق أقل من 1%) → أمر سوق
  // حالة 2: السعر أعلى من الدعم بـ 1-10%           → أمر محدد عند الدعم (انتظر تراجع)
  // حالة 3: لا يوجد دعم واضح                       → أمر سوق بالسعر الحالي
  const distToSup  = r.support>0 ? (r.price - r.support) / r.price * 100 : 0;
  const atSupport  = r.nearSupport || distToSup < 1;
  const hasSupport = r.support>0 && distToSup > 0;
  let orderType, orderColor, orderNote, buyPrice;

  if(atSupport) {
    // السعر عند الدعم الآن — اشتري بسعر السوق
    orderType  = 'أمر سوق';
    orderColor = C.green;
    orderNote  = 'السعر عند الدعم — اشتري فوراً';
    buyPrice   = r.price;
  } else if(hasSupport && distToSup <= 10) {
    // السعر فوق الدعم — ضع أمر محدد عند الدعم وانتظر التراجع
    orderType  = 'أمر محدد';
    orderColor = C.blue;
    orderNote  = 'انتظر تراجع السعر للدعم — ينفذ تلقائياً';
    buyPrice   = r.support * 1.002; // سنتات فوق الدعم لضمان التنفيذ
  } else {
    // السعر بعيد عن الدعم أو لا يوجد دعم — أمر سوق بالسعر الحالي
    orderType  = 'أمر سوق';
    orderColor = C.yellow;
    orderNote  = 'ادخل بسعر السوق — راقب وقف الخسارة';
    buyPrice   = r.price;
  }

  const recStatusColor = marketClosed ? C.yellow : recDecision.color || (r.activeBuy ? C.green : r.watchOnly ? C.yellow : C.pink);
  const canPlaceRecOrder = !marketClosed && r.activeBuy && !r.blockEntry && !r.tooCloseToResistance;
  const recPlanTitle = canPlaceRecOrder ? '📋 أمر الشراء الجاهز' : '📋 خطة المراقبة';
  const displayOrderType = canPlaceRecOrder ? orderType : 'انتظار';
  const displayOrderColor = canPlaceRecOrder ? orderColor : C.yellow;
  const displayOrderNote = canPlaceRecOrder
    ? orderNote
    : marketClosed
      ? 'السوق مغلق؛ راقب السعر بعد الافتتاح ولا تنفذ قبل تأكيد الحجم.'
      : 'ليست إشارة تنفيذ الآن؛ راقب نقطة الدخول والوقف فقط.';

  return el('div', {
    class: state.animatedRecs?.has(r.id) ? '' : 'fade-up',
    style:{
      background:'#0a1020', borderRadius:'14px',
      border:`1px solid ${r.isConviction ? '#ffe03344' : 'var(--border)'}`,
      padding:'14px', marginBottom:'10px',
      animationDelay: idx*0.05+'s',
    },
    onClick: async () => {
      state.selected = isSelected ? null : r.id;
      render();
      if(!isSelected) {
        await ensureAnalystData(r.id);
        render();
      }
    }
  }, [

    // ── 1. رأس البطاقة: اسم + إشارة
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'8px'}}, [
      el('div', {}, [
        el('div', {style:{display:'flex', alignItems:'center', gap:'6px', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'16px', fontWeight:'900', color:C.text}}, [r.name]),
          el('span', {style:{fontSize:'10px', color:C.text2}}, [r.id]),
          r.isConviction && el('span', {style:{
            fontSize:'9px', color:C.yellow, background:'rgba(255,224,51,.12)',
            borderRadius:'4px', padding:'1px 5px', border:'1px solid rgba(255,224,51,.3)',
          }}, ['⭐ High Conviction']),
          r.nearSupport && el('span', {style:{
            fontSize:'9px', color:C.green, background:'rgba(0,255,136,.12)',
            borderRadius:'4px', padding:'1px 6px', border:'1px solid rgba(0,255,136,.28)',
          }}, ['عند الدعم']),
        ]),
        el('div', {style:{fontSize:'10px', color:C.text2}}, [r.sector]),
      ]),
      el('div', {style:{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:'4px'}}, [
        el('div', {style:{
          background: sigColor+'22', border:`1px solid ${sigColor}44`,
          borderRadius:'8px', padding:'4px 10px',
          fontSize:'11px', fontWeight:'700', color:sigColor,
        }}, [r.signal]),
        r.isCooldown && el('span', {style:{
          fontSize:'9px', fontWeight:'700', padding:'2px 6px',
          borderRadius:'20px', background:'rgba(255,45,122,.15)',
          color:'#ff2d7a', border:'1px solid rgba(255,45,122,.3)',
        }}, ['⏸️ Cooldown']),
      ]),
    ]),

    // ── 1.5 تنبيه "ظهر أمس" — يحمي من التكرار
    (() => {
      const history = loadHistory();
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate()-1);
      const yStr = yesterday.toDateString();
      const prevRec = history.find(h =>
        h.symbol === r.id &&
        new Date(h.date||h.recDate).toDateString() === yStr
      );
      if(!prevRec) return null;

      const prevPrice = parseFloat(prevRec.entryPrice||prevRec.entry||0);
      const priceDiff = prevPrice>0 ? ((r.price-prevPrice)/prevPrice*100) : null;
      const diffColor = priceDiff>=0 ? C.green : C.pink;

      return el('div', {style:{
        background:'rgba(255,122,0,.08)',
        border:'1px solid rgba(255,122,0,.3)',
        borderRadius:'8px', padding:'8px 10px',
        marginBottom:'8px',
        display:'flex', alignItems:'flex-start', gap:'8px',
      }}, [
        el('span', {style:{fontSize:'14px', flexShrink:'0'}}, ['⚠️']),
        el('div', {style:{flex:'1'}}, [
          el('div', {style:{fontSize:'10px', fontWeight:'800', color:C.orange, marginBottom:'3px'}}, [
            'ظهر في توصية أمس — تحقق من مركزك',
          ]),
          el('div', {style:{fontSize:'9px', color:C.text2}}, [
            'سعر الأمس: $'+fmt(prevPrice,2),
            priceDiff!=null && el('span', {style:{color:diffColor, marginRight:'6px'}}, [
              ' | اليوم: '+(priceDiff>=0?'+':'')+fmt(priceDiff,2)+'%',
            ]),
          ]),
          el('div', {style:{fontSize:'9px', color:C.orange, marginTop:'3px'}}, [
            'إذا عندك مركز مفتوح → لا تشتري مجدداً',
          ]),
        ]),
      ]);
    })(),

    // ── 2. السعر + RSI + ثقة
    el('div', {style:{display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:'6px', marginBottom:'8px'}}, [
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['السعر']),
        el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.text}}, [fmtPrice(r.price)]),
        el('div', {style:{fontSize:'9px', color: r.change>=0?C.green:C.pink}}, [
          (r.change>=0?'+':'')+fmt(r.change)+'%'
        ]),
      ]),
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['RSI']),
        el('div', {style:{
          fontSize:'13px', fontWeight:'700',
          color: r.rsi!=null?(r.rsi<30?C.green:r.rsi>70?C.pink:C.blue):C.text3,
        }}, [r.rsi!=null ? fmt(r.rsi) : '—']),
        el('div', {style:{fontSize:'9px', color:C.text3}}, [
          r.rsi!=null?(r.rsi<30?'تشبع بيع':r.rsi>70?'تشبع شراء':'طبيعي'):'—'
        ]),
      ]),
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['ADX']),
        el('div', {style:{
          fontSize:'13px', fontWeight:'700',
          color: r.adx!=null?(r.adx>30?C.green:r.adx>20?C.blue:C.text3):C.text3,
        }}, [r.adx!=null ? fmt(r.adx,0) : '—']),
        el('div', {style:{fontSize:'9px', color:C.text3}}, [
          r.adx!=null?(r.adx>30?'قوي جداً':r.adx>25?'قوي':r.adx>20?'متوسط':'ضعيف'):'—'
        ]),
      ]),
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['ثقة / جودة']),
        el('div', {style:{
          fontSize:'13px', fontWeight:'700',
          color: r.confidence>=80?C.green:r.confidence>=60?C.blue:C.yellow,
        }}, [r.confidence+'%']),
        el('div', {style:{fontSize:'9px', color:C.text3}}, [r.tradeQuality+'% جودة']),
        // ⚠️ تحذير MACD سلبي
        r.macd!=null && r.macd<0 && el('div', {style:{
          fontSize:'8px', color:C.orange, marginTop:'2px',
        }}, ['⚠️ MACD↓']),
      ]),
    ]),

    // ── 3. شريط القوة
    el('div', {style:{marginBottom:'8px'}}, [
      el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'3px'}}, [
        el('span', {style:{fontSize:'9px', color:C.text3}}, ['قوة الإشارة']),
        el('span', {style:{fontSize:'9px', color:C.text2}}, [r.strength+'%']),
      ]),
      el('div', {style:{height:'3px', background:'#1a2340', borderRadius:'2px'}}, [
        el('div', {style:{
          height:'3px', borderRadius:'2px', width:r.strength+'%',
          background:`linear-gradient(90deg,${C.blue},${C.green})`,
        }}),
      ]),
    ]),

    // ── 4. توقيت الدخول
    el('div', {style:{
      display:'flex', alignItems:'center', justifyContent:'space-between',
      background: recStatusColor+'11', border:`1px solid ${recStatusColor}33`,
      borderRadius:'8px', padding:'8px 10px', marginBottom:'8px',
    }}, [
      el('div', {style:{fontSize:'12px', fontWeight:'800', color:recStatusColor}}, [
        marketClosed ? '🌙 مراقبة عند الافتتاح' : recDecision.label
      ]),
      el('div', {style:{fontSize:'9px', color:C.text2, textAlign:'left', maxWidth:'55%'}}, [
        marketClosed ? 'السوق مغلق؛ لا تنفيذ الآن. أعد التأكيد بعد الافتتاح والحجم.' : recDecision.note
      ]),
    ]),

    renderTradeDecisionBox(calcTradeDecision({
      kind:'rec',
      symbol:r.id,
      entry:buyPrice || r.price,
      stop:r.stopLoss,
      target:r.target,
      rr:r.riskReward,
      action:r.entryNote,
      watchOnly:marketClosed || !r.activeBuy,
      noTrade:marketClosed || r.blockEntry || r.tooCloseToResistance,
    })),

    renderNewsMini(r.id, true),

    renderAnalystMini(r.id, r.price, true),

    // ── 5. دعم / مقاومة + المتوسطات
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px', marginBottom:'8px'}}, [
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'4px'}}, ['📊 دعم / مقاومة']),
        el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'2px'}}, [
          el('div', {}, [
            el('div', {style:{fontSize:'9px', color:C.text3}}, ['دعم']),
            el('div', {style:{fontSize:'11px', fontWeight:'700', color:C.green}}, [r.support?fmtPrice(r.support):'—']),
          ]),
          el('div', {style:{textAlign:'left'}}, [
            el('div', {style:{fontSize:'9px', color:C.text3}}, ['مقاومة']),
            el('div', {style:{fontSize:'11px', fontWeight:'700', color:C.pink}}, [r.resistance?fmtPrice(r.resistance):'—']),
          ]),
        ]),
        r.nearSupport && el('div', {style:{
          fontSize:'9px', color:C.green, background:'rgba(0,255,136,.08)',
          borderRadius:'4px', padding:'2px 4px', marginTop:'2px',
        }}, ['✅ قريب من الدعم']),
      ]),
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'4px'}}, ['📈 المتوسطات']),
        el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'9px', color:C.text3}}, ['MA20']),
          el('span', {style:{fontSize:'10px', fontWeight:'700', color:r.ma20?(r.price>r.ma20?C.green:C.pink):C.text3}},
            [r.ma20?fmtPrice(r.ma20):'—']),
        ]),
        el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'9px', color:C.text3}}, ['MA50']),
          el('span', {style:{fontSize:'10px', fontWeight:'700', color:r.ma50?(r.price>r.ma50?C.green:C.pink):C.text3}},
            [r.ma50?fmtPrice(r.ma50):'—']),
        ]),
        el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'9px', color:C.text3}}, ['MA200']),
          el('span', {style:{fontSize:'10px', fontWeight:'700', color:r.ma200?(r.price>r.ma200?C.green:C.pink):C.text3}},
            [r.ma200?fmtPrice(r.ma200):'—']),
        ]),
        el('div', {style:{fontSize:'9px', marginTop:'2px', color:r.price>(r.ma200||r.ma50||0)?C.green:C.orange}}, [
          r.ma200?(r.price>r.ma200?'💪 فوق MA200':'⚠️ تحت MA200'):(r.ma20>(r.ma50||0)?'✅ صاعد':'⚠️ هابط')
        ]),
      ]),
    ]),

    // ── Analyst Ratings
    false && isSelected && state.analystRatings?.[r.id]?.analysts >= 5 && (() => {
      const ar = state.analystRatings?.[r.id];
      if (!ar) return null;
      const rat = (ar.rating||'').toLowerCase();
      const isBuy  = rat.includes('buy');
      const isSell = rat.includes('sell');
      const color  = isBuy ? C.green : isSell ? C.pink : C.yellow;
      const label  = isBuy ? 'شراء' : isSell ? 'بيع' : 'محايد';
      return el('div', {style:{
        background:'rgba(0,255,136,.06)', borderRadius:'8px',
        padding:'6px 10px', marginBottom:'8px',
        border:`1px solid ${color}22`,
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}, [
        el('div', {style:{fontSize:'10px', color:C.text2}}, ['👨‍💼 المحللون']),
        el('div', {style:{textAlign:'left'}}, [
          el('div', {style:{fontSize:'12px', fontWeight:'700', color}}, [
            ar.analysts+' محلل — '+label
          ]),
          ar.score && el('div', {style:{fontSize:'9px', color:C.text3}}, [
            'تقييم: '+fmt(ar.score,1)+'/5'
          ]),
        ]),
      ]);
    })(),
    false && isSelected && state.priceTargets?.[r.id] && (() => {
      const pt = state.priceTargets[r.id];
      if(!pt.consensus) return null;
      const diff = ((pt.consensus - r.price) / r.price * 100).toFixed(1);
      const color = diff > 0 ? C.green : C.pink;
      return el('div', {style:{
        background:'rgba(0,200,255,.06)', borderRadius:'8px',
        padding:'6px 10px', marginBottom:'8px',
        border:'1px solid rgba(0,200,255,.15)',
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}, [
        el('div', {style:{fontSize:'10px', color:C.text2}}, ['👨‍💼 هدف المحللين']),
        el('div', {style:{textAlign:'left'}}, [
          el('div', {style:{fontSize:'12px', fontWeight:'700', color}}, [
            '$'+fmt(pt.consensus,2)+' ('+(diff>0?'+':'')+diff+'%)'
          ]),
          pt.high && pt.low && el('div', {style:{fontSize:'9px', color:C.text3}}, [
            'أعلى: $'+fmt(pt.high,2)+' | أدنى: $'+fmt(pt.low,2)
          ]),
        ]),
      ]);
    })(),
    isSelected && r.closes && r.closes.length >= 5
      ? renderCandleChart(r.closes, r.highs, r.lows, r.opens)
      : null,
    isSelected && renderRelativeStrength(r.change),
    // ⚠️ تحذير MACD سلبي — تنبيه واضح
    isSelected && r.macd!=null && r.macd<0 && el('div', {style:{
      background:'rgba(255,122,0,.08)', border:'1px solid rgba(255,122,0,.25)',
      borderRadius:'7px', padding:'6px 10px', marginBottom:'6px',
      fontSize:'10px', color:C.orange,
      display:'flex', alignItems:'center', gap:'6px',
    }}, [
      el('span',{},['⚠️']),
      el('span',{},['MACD سلبي ('+fmt(r.macd,3)+') — زخم متوسط المدى هابط، تحقق من الرسم البياني']),
    ]),

    // ── MACD Histogram + أسبوعي — جديد
    isSelected && el('div', {style:{display:'flex', gap:'5px', marginBottom:'6px', flexWrap:'wrap'}}, [
      r.macdHist!=null && el('span', {style:{
        fontSize:'9px', fontWeight:'700', borderRadius:'5px', padding:'2px 8px',
        color: r.macdHist>0 && r.macdHistDir==='expanding' ? C.green
             : r.macdHist>0 ? C.yellow
             : r.macdHistDir==='expanding' ? C.pink : C.orange,
        background: r.macdHist>0
          ? (r.macdHistDir==='expanding'?'rgba(0,255,136,.12)':'rgba(255,224,51,.08)')
          : (r.macdHistDir==='expanding'?'rgba(255,45,122,.12)':'rgba(255,122,0,.08)'),
      }}, [
        'Hist '+(r.macdHist>0?'+':'')+fmt(r.macdHist,2)+
        ' '+(r.macdHistDir==='expanding'?'↑ يتوسع':'↓ يضيق'),
      ]),
      r.weeklyTrend!=null && el('span', {style:{
        fontSize:'9px', fontWeight:'700', borderRadius:'5px', padding:'2px 8px',
        color: r.weeklyTrend==='bullish' ? C.blue : C.pink,
        background: r.weeklyTrend==='bullish'?'rgba(0,200,255,.08)':'rgba(255,45,122,.08)',
      }}, [r.weeklyTrend==='bullish'?'📅 أسبوعي ↑':'📅 أسبوعي ↓']),
    ].filter(Boolean)),

    // ── 7. حجم التداول
    isSelected && el('div', {style:{
      background:'#060b14', borderRadius:'8px', padding:'7px 10px', marginBottom:'8px',
      border: r.volR>=1.5?'1px solid rgba(0,200,255,.2)':'1px solid #1a2340',
    }}, [
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center'}}, [
        el('div', {}, [
          el('div', {style:{fontSize:'9px', color:C.text3}}, ['📦 حجم التداول']),
          el('div', {style:{fontSize:'11px', fontWeight:'700', color:C.text}}, [
            r.volume>0?(r.volume/1e6).toFixed(1)+'M':'—'
          ]),
        ]),
        el('div', {style:{textAlign:'center'}}, [
          el('div', {style:{fontSize:'9px', color:C.text3}}, ['مقارنة بالمعتاد']),
          el('div', {style:{fontSize:'12px', fontWeight:'800', color:r.volR>=2?C.green:r.volR>=1.3?C.blue:C.text2}},
            [r.volR>0?'×'+fmt(r.volR,1):'—']),
        ]),
        el('div', {style:{fontSize:'10px', fontWeight:'700', color:r.volR>=2?C.green:r.volR>=1.3?C.blue:C.text2}}, [
          r.volR>=2?'🔥 مرتفع جداً':r.volR>=1.3?'✅ مرتفع':r.volR>=0.7?'➡️ طبيعي':'⚠️ منخفض'
        ]),
      ]),
    ]),

    // ── 7. أمر الشراء الجاهز (يشمل الكمية والربح والخسارة)
    el('div', {style:{
      background:canPlaceRecOrder?'linear-gradient(135deg,rgba(0,255,136,.06),rgba(0,200,255,.04))':'rgba(255,224,51,.06)',
      border:canPlaceRecOrder?'1px solid rgba(0,255,136,.25)':'1px solid rgba(255,224,51,.22)', borderRadius:'10px',
      padding:'10px 12px', marginBottom: isSelected?'8px':'0',
    }}, [
      el('div', {style:{fontSize:'10px', fontWeight:'800', color:displayOrderColor, marginBottom:'8px'}}, [recPlanTitle]),
      el('div', {style:{borderTop:'1px solid '+displayOrderColor+'24', marginBottom:'8px'}}),

      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'5px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, ['نوع الأمر']),
        el('span', {style:{
          fontSize:'11px', fontWeight:'800', color:displayOrderColor,
          background:displayOrderColor+'18', borderRadius:'5px', padding:'2px 8px',
          border:`1px solid ${displayOrderColor}33`,
        }}, [displayOrderType]),
      ]),
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'5px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, [canPlaceRecOrder ? 'سعر الشراء' : 'نقطة مراقبة']),
        el('span', {style:{fontSize:'13px', fontWeight:'900', color:C.text}}, [fmtPrice(buyPrice)]),
      ]),
      el('div', {style:{borderTop:'1px solid rgba(255,255,255,.05)', margin:'5px 0'}}),
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'5px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, ['🛑 وقف الخسارة']),
        el('span', {style:{fontSize:'12px', fontWeight:'800', color:C.pink}}, [fmtPrice(r.stopLoss)]),
      ]),
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, ['🎯 هدف الربح']),
        el('div', {style:{textAlign:'left'}}, [
          el('div', {style:{fontSize:'12px', fontWeight:'800', color:C.green}}, [fmtPrice(r.target)]),
          el('div', {style:{fontSize:'9px', color:C.green}}, ['+'+fmt(r.profitPct,2)+'%']),
        ]),
      ]),
      el('div', {style:{
        fontSize:'10px', color:displayOrderColor, background:displayOrderColor+'0e',
        borderRadius:'6px', padding:'5px 8px',
      }}, ['💡 '+displayOrderNote]),
    ]),

    // ── مدة الصفقة المتوقعة
    (() => {
      if(!r.atrPct || !r.profitPct) return null;
      // ✅ تعديل: مدة تأخذ MACD والأسبوعي بعين الاعتبار
      const dur = estimateTradeDuration({
        kind:'rec', profitPct:r.profitPct, atrPct:r.atrPct,
        macdHist:r.macdHist, macdHistDir:r.macdHistDir, weeklyTrend:r.weeklyTrend,
      });
      const days = dur.days;
      const type = days <= 1 ? {label:'🔥 يومي', color:C.pink,    desc:'قد تصل الهدف اليوم — راقب كل ساعة'}
                 : days <= 3 ? {label:'⚡ قصير',  color:C.orange,  desc:'1-3 أيام تداول — راقب يومياً'}
                 : days <= 7 ? {label:'📅 أسبوعي',color:C.blue,    desc:'3-7 أيام — اصبر ولا تتسرع في الخروج'}
                 :             {label:'⏳ متوسط', color:C.text2,   desc:'أكثر من أسبوع — هل يناسبك كمضارب يومي؟'};
      return el('div', {style:{
        background:'#060b14', border:`1px solid ${type.color}33`,
        borderRadius:'8px', padding:'8px 12px', marginTop:'8px',
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}, [
        el('div', {}, [
          el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'2px'}}, ['⏱️ مدة الصفقة المتوقعة']),
          el('div', {style:{fontSize:'12px', fontWeight:'800', color:type.color}}, [type.label]),
          el('div', {style:{fontSize:'9px', color:C.text2, marginTop:'2px'}}, [type.desc]),
        ]),
        el('div', {style:{textAlign:'left', flexShrink:'0'}}, [
          el('div', {style:{fontSize:'18px', fontWeight:'900', color:type.color}}, [days+''])  ,
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['يوم تداول']),
        ]),
      ]);
    })(),

    !isSelected && el('div', {style:{
      fontSize:'9px', color:C.text3, textAlign:'center',
      borderTop:'1px solid rgba(255,255,255,.06)',
      marginTop:'8px', paddingTop:'7px',
    }}, ['اضغط على البطاقة لعرض الشموع، المتوسطات، الحجم، والأسباب التفصيلية']),

    // ── 8. التفاصيل (عند الضغط) — مبسطة
    isSelected && el('div', {style:{borderTop:'1px solid var(--border)', paddingTop:'10px', marginTop:'2px'}}, [
      r.reasons.length>0 && el('div', {style:{marginBottom:'8px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text2, marginBottom:'4px', fontWeight:'700'}}, ['📋 أسباب التوصية:']),
        ...r.reasons.map(reason =>
          el('div', {style:{fontSize:'10px', color:C.green, marginBottom:'2px'}}, ['✓ '+reason])
        ),
      ]),
      el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px', fontSize:'10px'}}, [
        r.stochRsi!=null && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 8px'}}, [
          el('div', {style:{color:C.text3}}, ['Stoch RSI']),
          el('div', {style:{fontWeight:'700', color:r.stochRsi<20?C.green:r.stochRsi>80?C.pink:C.blue}},
            [fmt(r.stochRsi)+'%']),
        ]),
        r.macd!=null && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 8px'}}, [
          el('div', {style:{color:C.text3}}, ['MACD']),
          el('div', {style:{fontWeight:'700', color:r.macd>0?C.green:C.pink}},
            [fmt(r.macd,3)+' '+(r.macd>0?'↑':'↓')]),
        ]),
        r.riskReward>0 && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 8px'}}, [
          el('div', {style:{color:C.text3}}, ['R/R نسبة']),
          el('div', {style:{fontWeight:'700', color:r.riskReward>=2?C.green:C.yellow}},
            [fmt(r.riskReward,1)+'x']),
        ]),
        r.atrPct!=null && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 8px'}}, [
          el('div', {style:{color:C.text3}}, ['ATR تذبذب']),
          el('div', {style:{fontWeight:'700', color:r.atrPct<2?C.green:r.atrPct<4?C.blue:C.orange}},
            [fmt(r.atrPct,1)+'%']),
        ]),
      ].filter(Boolean)),
      // ✅ أنماط الشموع في التفاصيل
      r.candlePatterns?.length > 0 && el('div', {style:{
        marginTop:'8px', background:'#060b14', borderRadius:'8px', padding:'8px 10px',
      }}, [
        el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'5px', fontWeight:'700'}}, ['🕯 أنماط الشموع المكتشفة']),
        ...r.candlePatterns.map(p2 => el('div', {style:{
          display:'flex', alignItems:'center', gap:'6px',
          fontSize:'10px', color:p2.color, marginBottom:'3px',
        }}, [
          el('span',{style:{fontWeight:'800'}},[p2.icon+' '+p2.ar]),
          el('span',{style:{color:C.text3, fontSize:'9px'}},[' — '+p2.tip]),
        ])),
      ]),
      r.earnings<999 && el('div', {style:{
        fontSize:'10px', color:C.orange, marginTop:'8px',
        background:'rgba(255,122,0,.08)', borderRadius:'6px', padding:'5px 8px',
      }}, ['⚠️ نتائج الأرباح خلال '+r.earnings+' يوم']),
    ]),
  ]);
}

        el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.purple}}, [
          '🎲 رادار المجازفة — '+specs.length+' فرصة'

        el('div', {style:{fontSize:'10px', fontWeight:'700', color:trendColor}}, [trendLabel]),

      // SPY + QQQ
      state.spyChange!==null && el('div', {style:{
        display:'flex', gap:'8px', fontSize:'10px',
        background:'#060b14', borderRadius:'8px', padding:'5px 8px',
        marginBottom:'6px',

        el('span', {style:{color:C.text2}}, ['مؤشر السوق:']),
        el('span', {style:{color:state.spyChange>=0?C.green:C.pink, fontWeight:'700'}}, [
          'SPY '+(state.spyChange>=0?'+':'')+fmt(state.spyChange)+'%'
        ]),
        el('span', {style:{color:state.qqqChange>=0?C.green:C.pink, fontWeight:'700'}}, [
          'QQQ '+(state.qqqChange>=0?'+':'')+fmt(state.qqqChange)+'%'
        ]),
      ]),
      el('div', {style:{
        display:'flex', justifyContent:'space-between', gap:'8px',
        fontSize:'9px', color:C.text3,
        background:'rgba(255,255,255,.035)', borderRadius:'6px',
        padding:'5px 8px', marginBottom:'6px',
      }}, [
        el('span', {}, ['آخر تحديث: '+fmtClock(state.specTime)]),
        el('span', {}, ['القادم: '+(isMarketOpen()?nextUpdateText(state.specTime,getActiveRefreshMin()):'بعد الافتتاح والتأكيد')]),
      ]),
      el('div', {style:{

    specs.length===0 ?

          maxWidth:'420px', margin:'0 auto',
          background:'rgba(255,255,255,.035)', border:'1px solid rgba(255,255,255,.08)',
          borderRadius:'10px', padding:'10px 12px', textAlign:'right',

        }}, [
          'تم فحص '+(specDebug.checked||0)+' مرشح. ',
          topReject && topReject[1] > 0 ? 'أكبر سبب رفض: '+(rejectLabels[topReject[0]]||topReject[0])+' ('+topReject[1]+').' : '',
          el('br'),
          'المجازفة لا تعرض دخولًا إلا إذا توفر هدف ووقف وR/R مقبول.'
        ])
      ]) :

}

function renderSpecCard(s, idx) {
  const isSelected  = state.selected === s.id+'_spec';
  const marketClosed = !isMarketOpen();
  const labelColor  = s.score>=80?C.green:s.score>=65?C.orange:s.score>=50?C.yellow:C.text2;
  const entryColor  = s.entryTiming==='ادخل الآن'?C.green:
                      s.entryTiming==='مقبول'?C.blue:
                      s.entryTiming==='انتظر'?C.yellow:C.orange;
  const rrColor     = s.riskReward>=3?C.green:s.riskReward>=2?C.blue:C.yellow;

  // نوع الأمر
  const distToSup = s.support>0 ? (s.price-s.support)/s.price*100 : 999;
  const atSup     = s.nearSupport || distToSup < 1;
  const hasSup    = s.support>0 && distToSup>0 && distToSup<=18;
  const orderType = atSup ? 'أمر سوق' : hasSup ? 'أمر محدد' : 'أمر سوق';
  const orderColor= atSup ? C.green   : hasSup  ? C.purple  : C.yellow;
  const buyPrice  = hasSup && !atSup  ? s.support*1.002 : s.price;
  const specVerdict = marketClosed
    ? {label:'مراقبة عند الافتتاح', color:C.yellow, note:'السوق مغلق؛ لا تنفيذ الآن. أعد تأكيد السعر والحجم بعد الافتتاح.'}
    : s.isWatch
      ? {label:'انتظار فقط', color:C.yellow, note:s.entryNote || 'لم تكتمل شروط دخول المجازفة.'}
      : s.entryTiming === 'ادخل الآن' && s.riskReward >= 1.45 && s.score >= 45
        ? {label:'دخول مجازفة', color:C.green, note:'دخول مسموح بشرط الالتزام بالوقف وحجم مخاطرة صغير.'}
        : s.entryTiming === 'مقبول' && s.riskReward >= 1.45
          ? {label:'دخول مشروط', color:C.blue, note:'الأفضل أمر محدد قرب الدعم؛ لا تطارد السعر.'}
          : {label:'ممنوع الآن', color:C.pink, note:'الدخول متأخر أو المخاطرة غير مناسبة.'};
  const specCancel = 'إلغاء الفكرة إذا كسر '+fmtPrice(s.stopLoss)+' أو فقد الزخم قبل الدخول.';
  const displayEntryTiming = marketClosed
    ? 'انتظر الافتتاح'
    : s.isWatch
    ? 'انتظر نقطة الدخول'
    : specVerdict.label === 'ممنوع الآن'
      ? 'لا تدخل'
      : s.entryTiming;
  const displayEntryNote = marketClosed
    ? 'لا تدخل خارج وقت السوق؛ الأسعار الليلية قد تتغير مع الافتتاح.'
    : s.isWatch
    ? (s.entryNote || 'انتظر اكتمال شروط الدخول قبل التنفيذ.')
    : specVerdict.label === 'ممنوع الآن'
      ? specVerdict.note
      : s.entryNote;
  const canPlaceSpecOrder = !marketClosed && (specVerdict.label === 'دخول مجازفة' || specVerdict.label === 'دخول مشروط');
  const specPlanTitle = canPlaceSpecOrder ? '📋 أمر الشراء' : '📋 خطة المراقبة';
  const displayOrderType = canPlaceSpecOrder ? orderType : 'انتظار';
  const displayOrderColor = canPlaceSpecOrder ? orderColor : specVerdict.color;

  return el('div', {
    class:'fade-up',
    style:{
      background:'#0a1020', borderRadius:'14px',
      border:'1px solid rgba(180,79,255,.25)',
      padding:'14px', marginBottom:'12px',
      animationDelay: idx*0.05+'s',
    },
    onClick: async () => {
      state.selected = isSelected?null:s.id+'_spec';
      render();
      if(!isSelected) {
        await ensureAnalystData(s.id);
        render();
      }
    }
  }, [

    // ── 1. رأس البطاقة
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'8px'}}, [
      el('div', {}, [
        el('div', {style:{display:'flex', alignItems:'center', gap:'6px', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'16px', fontWeight:'900', color:C.text}}, [s.name]),
          el('span', {style:{fontSize:'10px', color:C.text3}}, [s.id]),
          el('span', {style:{
            fontSize:'9px', color:C.purple,
            background:'rgba(180,79,255,.12)', borderRadius:'4px', padding:'1px 6px',
          }}, ['β'+fmt(s.beta,1)]),
        ]),
        el('div', {style:{fontSize:'10px', color:C.text3}}, [s.sector]),
      ]),
      el('div', {style:{textAlign:'left'}}, [
        el('div', {style:{fontSize:'11px', fontWeight:'800', color:labelColor}}, [s.label]),
        el('div', {style:{fontSize:'10px', color:C.text, fontWeight:'700'}}, [
          '$'+fmt(s.price,2),
          el('span', {style:{color:s.change>=0?C.green:C.pink, marginRight:'4px'}},
            [' '+(s.change>=0?'+':'')+fmt(s.change,1)+'%']),
        ]),
      ]),
    ]),

    el('div', {style:{
      background:specVerdict.color+'10',
      border:`1px solid ${specVerdict.color}30`,
      borderRadius:'10px',
      padding:'9px 10px',
      marginBottom:'9px',
    }}, [
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'5px'}}, [
        el('div', {style:{fontSize:'12px', fontWeight:'900', color:specVerdict.color}}, ['قرار: '+specVerdict.label]),
        el('div', {style:{fontSize:'9px', color:C.text2}}, ['R/R '+fmt(s.riskReward,1)+'x']),
      ]),
      el('div', {style:{fontSize:'10px', color:C.text2, lineHeight:'1.6'}}, [specVerdict.note]),
      el('div', {style:{fontSize:'9px', color:C.pink, marginTop:'4px', lineHeight:'1.5'}}, [specCancel]),
    ]),

    renderNewsMini(s.id, true),

    // ── 2. شريط القوة + معلومات المجازفة
    el('div', {style:{marginBottom:'8px'}}, [
      // شريط القوة مع النسبة
      el('div', {style:{display:'flex', alignItems:'center', gap:'8px', marginBottom:'5px'}}, [
        el('div', {style:{flex:1, height:'4px', background:'#1a2340', borderRadius:'2px'}}, [
          el('div', {style:{
            height:'4px', borderRadius:'2px', width:Math.min(100,s.score)+'%',
            background:'linear-gradient(90deg,'+C.purple+','+C.pink+')',
          }}),
        ]),
        el('span', {style:{fontSize:'10px', fontWeight:'700', color:labelColor, flexShrink:0}},
          [s.score+'/100']),
      ]),
      // معلومات المجازفة الثلاثة: ATR + Beta + R/R
      el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'5px'}}, [
        el('div', {style:{
          background:'rgba(255,122,0,.08)', borderRadius:'6px',
          padding:'4px 6px', textAlign:'center',
        }}, [
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['📈 ATR']),
          el('div', {style:{fontSize:'11px', fontWeight:'800', color:C.orange}},
            [fmt(s.atrPct,1)+'%']),
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['تذبذب']),
        ]),
        el('div', {style:{
          background:'rgba(180,79,255,.08)', borderRadius:'6px',
          padding:'4px 6px', textAlign:'center',
        }}, [
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['⚡ Beta']),
          el('div', {style:{fontSize:'11px', fontWeight:'800', color:C.purple}},
            [fmt(s.beta,1)+'x']),
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['تقلب']),
        ]),
        el('div', {style:{
          background: s.riskReward>=3?'rgba(0,255,136,.08)':'rgba(0,200,255,.08)',
          borderRadius:'6px', padding:'4px 6px', textAlign:'center',
        }}, [
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['⚖️ R/R']),
          el('div', {style:{
            fontSize:'11px', fontWeight:'800',
            color: s.riskReward>=3?C.green:C.blue,
          }}, [fmt(s.riskReward,1)+'x']),
          el('div', {style:{fontSize:'8px', color:C.text3}},
            [s.riskReward>=3?'ممتاز':'جيد']),
        ]),
      ]),
    ]),

    // ── 3. حاسبة الكمية — تظهر عند الضغط فقط حتى لا تزحم قرار البطاقة
    isSelected && renderTradeDecisionBox(calcTradeDecision({
      kind:'spec',
      symbol:s.id,
      entry:buyPrice || s.price,
      stop:s.stopLoss,
      target:s.target,
      rr:s.riskReward,
      action:s.entryNote,
      watchOnly:marketClosed || s.isWatch || s.entryTiming === 'انتظر' || s.entryTiming === 'متأخر',
      noTrade:marketClosed || s.tooCloseToResistance,
    })),

    isSelected && renderAnalystMini(s.id, s.price, true),

    // ── 3. سبب الاختيار — واضح ومباشر
    isSelected && s.reasons.length>0 && el('div', {style:{
      background:'rgba(180,79,255,.06)', border:'1px solid rgba(180,79,255,.15)',
      borderRadius:'8px', padding:'8px 10px', marginBottom:'8px',
    }}, [
      el('div', {style:{fontSize:'9px', color:C.purple, fontWeight:'700', marginBottom:'5px'}},
        ['💡 لماذا هذا السهم؟']),
      ...s.reasons.map(r => el('div', {style:{
        fontSize:'10px', color:C.text2, marginBottom:'3px', display:'flex', gap:'6px',
      }}, [
        el('span', {style:{color:C.purple, flexShrink:0}}, ['•']),
        el('span',{}, [r]),
      ])),
    ]),

    // ── 4. تحذيرات (إذا وجدت)
    isSelected && s.warnings?.length>0 && el('div', {style:{
      background:'rgba(255,122,0,.06)', border:'1px solid rgba(255,122,0,.2)',
      borderRadius:'8px', padding:'6px 10px', marginBottom:'8px',
    }}, [
      ...s.warnings.map(w => el('div', {style:{
        fontSize:'9px', color:C.orange, marginBottom:'2px',
      }}, ['⚠️ '+w])),
    ]),

    // ── 4b. Price Target المحللين
    false && isSelected && state.priceTargets?.[s.id]?.consensus && (() => {
      const pt   = state.priceTargets[s.id];
      const diff = ((pt.consensus - s.price) / s.price * 100).toFixed(1);
      const color = diff > 0 ? C.green : C.pink;
      return el('div', {style:{
        background:'rgba(180,79,255,.06)', borderRadius:'8px',
        padding:'6px 10px', marginBottom:'8px',
        border:'1px solid rgba(180,79,255,.2)',
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}, [
        el('div', {style:{fontSize:'10px', color:C.text2}}, ['👨‍💼 هدف المحللين']),
        el('div', {style:{textAlign:'left'}}, [
          el('div', {style:{fontSize:'12px', fontWeight:'700', color}}, [
            '$'+fmt(pt.consensus,2)+' ('+(diff>0?'+':'')+diff+'%)'
          ]),
          pt.high && pt.low && el('div', {style:{fontSize:'9px', color:C.text3}}, [
            'أعلى: $'+fmt(pt.high,2)+' | أدنى: $'+fmt(pt.low,2)
          ]),
        ]),
      ]);
    })(),

    // ── 4c. حالة الشمعة — واضحة ومؤثرة
    isSelected && s.topCandle && el('div', {style:{
      background: s.topCandle.signal==='bullish'
        ? 'rgba(0,255,136,.08)' : s.topCandle.signal==='bearish'
        ? 'rgba(255,45,122,.08)' : 'rgba(255,224,51,.06)',
      border: `1px solid ${s.topCandle.signal==='bullish'?'rgba(0,255,136,.3)':s.topCandle.signal==='bearish'?'rgba(255,45,122,.3)':'rgba(255,224,51,.25)'}`,
      borderRadius:'8px', padding:'8px 10px', marginBottom:'8px',
    }}, [
      el('div', {style:{
        display:'flex', alignItems:'center', gap:'6px', marginBottom:'3px',
      }}, [
        el('span', {style:{fontSize:'16px'}}, [
          s.topCandle.signal==='bullish'?'✅':s.topCandle.signal==='bearish'?'🚨':'⚠️'
        ]),
        el('span', {style:{
          fontSize:'11px', fontWeight:'800',
          color: s.topCandle.signal==='bullish'?C.green:s.topCandle.signal==='bearish'?C.pink:C.yellow,
        }}, [
          s.topCandle.signal==='bullish'
            ? 'شمعة صاعدة — تأكيد الدخول'
            : s.topCandle.signal==='bearish'
            ? 'شمعة هابطة — ادخل بحذر'
            : 'تردد — انتظر تأكيد',
        ]),
      ]),
      el('div', {style:{
        fontSize:'10px',
        color: s.topCandle.signal==='bullish'?C.green:s.topCandle.signal==='bearish'?C.pink:C.yellow,
      }}, [s.topCandle.icon+' '+s.topCandle.ar+' — '+s.topCandle.tip]),
      // نصيحة إضافية للهابطة
      s.topCandle.signal==='bearish' && el('div', {style:{
        fontSize:'9px', color:C.pink, marginTop:'4px',
        borderTop:'1px solid rgba(255,45,122,.2)', paddingTop:'4px',
      }}, ['انتظر شمعة صاعدة تأكيداً قبل الدخول']),
      // مضاعفة النقاط للمطرقة والابتلاع
      s.topCandle.signal==='bullish' &&
      (s.topCandle.name==='Hammer'||s.topCandle.name==='Bullish Engulfing'||s.topCandle.name==='Morning Star') &&
      el('div', {style:{
        fontSize:'9px', color:C.green, marginTop:'3px',
        background:'rgba(0,255,136,.06)', borderRadius:'4px', padding:'2px 6px',
        display:'inline-block',
      }}, ['🚀 نقاط مضاعفة في المجازفة']),
    ]),

    // ── 5. توقيت الدخول
    el('div', {style:{
      background:specVerdict.color+'11', border:'1px solid '+specVerdict.color+'33',
      borderRadius:'8px', padding:'7px 10px', marginBottom:'8px',
      display:'flex', justifyContent:'space-between', alignItems:'center',
    }}, [
      el('span', {style:{fontSize:'11px', fontWeight:'800', color:specVerdict.color}}, [displayEntryTiming]),
      el('span', {style:{fontSize:'9px', color:C.text3, textAlign:'left', maxWidth:'60%'}}, [displayEntryNote]),
    ]),

    // ── 6. شموع يابانية
    isSelected && state.indicators[s.id]?.closes?.length >= 5
      ? renderCandleChart(
          state.indicators[s.id].closes,
          state.indicators[s.id].highs,
          state.indicators[s.id].lows,
          state.indicators[s.id].opens)
      : null,

    // ── 7. الأرقام الحاسمة: دعم / مقاومة / هدف / وقف
    isSelected && el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px', marginBottom:'8px'}}, [
      // دعم
      el('div', {style:{
        background:'rgba(0,200,255,.06)', border:'1px solid rgba(0,200,255,.15)',
        borderRadius:'8px', padding:'7px 8px',
      }}, [
        el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'3px'}}, ['📐 الدعم']),
        el('div', {style:{fontSize:'12px', fontWeight:'800', color:C.blue}},
          [s.support ? '$'+fmt(s.support,2) : '—']),
        s.nearSupport && el('div', {style:{fontSize:'8px', color:C.green}}, ['✅ السعر عنده الآن']),
        !s.nearSupport && s.support && el('div', {style:{fontSize:'8px', color:C.text3}},
          ['بُعد '+fmt(distToSup,1)+'%']),
      ]),
      // مقاومة — توضيح إذا كانت هي الهدف أم لا
      (() => {
        const resIsTarget = s.resistance && Math.abs(s.resistance - s.target) < 0.5;
        const resAbove    = s.resistance && s.resistance > s.price*1.05;
        return el('div', {style:{
          background:'rgba(255,45,122,.06)', border:'1px solid rgba(255,45,122,.15)',
          borderRadius:'8px', padding:'7px 8px',
        }}, [
          el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'3px'}}, ['🧱 أقرب مقاومة']),
          el('div', {style:{fontSize:'12px', fontWeight:'800', color:C.pink}},
            [s.resistance ? '$'+fmt(s.resistance,2) : '—']),
          // توضيح العلاقة بالهدف
          s.resistance
            ? el('div', {style:{fontSize:'8px', color: resIsTarget?C.green:C.text3}}, [
                resIsTarget
                  ? '✅ هي الهدف'
                  : resAbove
                  ? '📍 فوق الهدف'
                  : '⚠️ تحت الهدف — الهدف بـ ATR',
              ])
            : null,
        ]);
      })(),
    ]),

    // ── 8. هدف + وقف خسارة + R/R
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'6px', marginBottom:'8px'}}, [
      el('div', {style:{
        background:'rgba(0,255,136,.08)', border:'1px solid rgba(0,255,136,.2)',
        borderRadius:'8px', padding:'7px 8px', textAlign:'center',
      }}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['🎯 هدف الصفقة']),
        el('div', {style:{fontSize:'12px', fontWeight:'800', color:C.green}}, ['$'+fmt(s.target,2)]),
        el('div', {style:{fontSize:'9px', color:C.green}}, ['+'+fmt(s.profitPct,1)+'%']),
        // مصدر الهدف
        el('div', {style:{fontSize:'8px', color:C.text3, marginTop:'1px'}}, [
          s.resistance && Math.abs(s.resistance-s.target)<0.5
            ? '📍 من المقاومة'
            : '📐 من ATR×2.5',
        ]),
      ]),
      el('div', {style:{
        background:'rgba(255,45,122,.08)', border:'1px solid rgba(255,45,122,.2)',
        borderRadius:'8px', padding:'7px 8px', textAlign:'center',
      }}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['🛑 الوقف']),
        el('div', {style:{fontSize:'12px', fontWeight:'800', color:C.pink}}, ['$'+fmt(s.stopLoss,2)]),
        el('div', {style:{fontSize:'9px', color:C.pink}}, ['-'+fmt(s.lossPct,1)+'%']),
      ]),
      el('div', {style:{
        background:rrColor+'10', border:'1px solid '+rrColor+'30',
        borderRadius:'8px', padding:'7px 8px', textAlign:'center',
      }}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['⚖️ R/R']),
        el('div', {style:{fontSize:'14px', fontWeight:'900', color:rrColor}}, [fmt(s.riskReward,1)+'x']),
        el('div', {style:{fontSize:'8px', color:rrColor}},
          [s.riskReward>=3?'ممتاز':s.riskReward>=2?'جيد':'مقبول']),
      ]),
    ]),

    // ── 9. أمر الشراء الجاهز — يظهر عند الضغط فقط
    isSelected && el('div', {style:{
      background:'linear-gradient(135deg,rgba(180,79,255,.08),rgba(255,45,122,.04))',
      border:'1px solid rgba(180,79,255,.3)',
      borderRadius:'10px', padding:'10px 12px', marginBottom:'8px',
    }}, [
      el('div', {style:{fontSize:'10px', fontWeight:'800', color:C.purple, marginBottom:'8px'}},
        [specPlanTitle]),
      el('div', {style:{borderTop:'1px solid rgba(180,79,255,.2)', marginBottom:'8px'}}),
      el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'5px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, ['نوع الأمر']),
        el('span', {style:{
          fontSize:'11px', fontWeight:'800', color:displayOrderColor,
          background:displayOrderColor+'18', borderRadius:'5px', padding:'2px 8px',
        }}, [displayOrderType]),
      ]),
      el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'5px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, [canPlaceSpecOrder ? 'سعر الشراء' : 'أفضل نقطة دخول']),
        el('span', {style:{fontSize:'13px', fontWeight:'900', color:C.text}}, ['$'+fmt(buyPrice,2)]),
      ]),
      el('div', {style:{borderTop:'1px solid rgba(255,255,255,.05)', margin:'5px 0'}}),
      el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'4px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, ['🛑 وقف الخسارة']),
        el('span', {style:{fontSize:'12px', fontWeight:'800', color:C.pink}}, ['$'+fmt(s.stopLoss,2)]),
      ]),
      el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'4px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, ['🎯 هدف الصفقة']),
        el('div', {style:{textAlign:'left'}}, [
          el('span', {style:{fontSize:'12px', fontWeight:'800', color:C.green}}, ['$'+fmt(s.target,2)]),
          el('span', {style:{fontSize:'9px', color:C.green}}, [' +'+fmt(s.profitPct,1)+'%']),
          el('div', {style:{fontSize:'8px', color:C.text3}}, [
            s.resistance && Math.abs(s.resistance-s.target)<0.5
              ? '📍 عند المقاومة'
              : '📐 ATR×2.5 (هدف واقعي)',
          ]),
        ]),
      ]),
      el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'8px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, ['📊 نسبة R/R']),
        el('span', {style:{fontSize:'12px', fontWeight:'800', color:rrColor}},
          [fmt(s.riskReward,1)+'x — لكل ريال خسارة ربحك '+fmt(s.riskReward,1)+' ريال']),
      ]),
      // تخصيص رأس المال
      el('div', {style:{
        background:'rgba(180,79,255,.08)', borderRadius:'7px',
        padding:'6px 8px', marginBottom:'5px',
        fontSize:'10px', color:C.purple, fontWeight:'700',
      }}, ['💼 خصص '+( s.allocPct*100).toFixed(0)+'% من رأسمالك — لا تتجاوز هذه النسبة']),
      // تحذير مجازفة
      el('div', {style:{
        fontSize:'9px', color:C.orange,
        background:'rgba(255,122,0,.08)', borderRadius:'6px',
        padding:'5px 8px',
      }}, ['⚠️ هذه مجازفة — الخسارة محدودة والربح ضخم محتمل. الوقف إلزامي.']),

      // ── مدة الصفقة المتوقعة للمجازفة
      (() => {
        if(!s.atrPct || !s.profitPct) return null;
        // ✅ تعديل: مدة تأخذ MACD والأسبوعي
        const dur = estimateTradeDuration({
          kind:'spec', profitPct:s.profitPct, atrPct:s.atrPct,
          macdHist:s.macdHist, macdHistDir:s.macdHistDir, weeklyTrend:s.weeklyTrend,
        });
        const days = dur.days;
        const type = days <= 1 ? {label:'🔥 يومي',  color:C.pink,   desc:'حركة سريعة — راقب كل ساعة'}
                   : days <= 3 ? {label:'⚡ قصير',   color:C.orange, desc:'1-3 أيام — الأنسب للمجازفة'}
                   : days <= 7 ? {label:'📅 أسبوعي', color:C.blue,   desc:'3-7 أيام — اصبر على المركز'}
                   :             {label:'⏳ طويل',   color:C.text2,  desc:'أكثر من أسبوع — مجازفة تحتاج صبراً'};
        return el('div', {style:{
          background:'#060b14', border:`1px solid ${type.color}33`,
          borderRadius:'8px', padding:'8px 12px', marginTop:'8px',
          display:'flex', justifyContent:'space-between', alignItems:'center',
        }}, [
          el('div', {}, [
            el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'2px'}}, ['⏱️ مدة المجازفة المتوقعة']),
            el('div', {style:{fontSize:'12px', fontWeight:'800', color:type.color}}, [type.label]),
            el('div', {style:{fontSize:'9px', color:C.text2, marginTop:'2px'}}, [type.desc]),
          ]),
          el('div', {style:{textAlign:'left', flexShrink:'0'}}, [
            el('div', {style:{fontSize:'18px', fontWeight:'900', color:type.color}}, [days+'']),
            el('div', {style:{fontSize:'8px', color:C.text3}}, ['يوم تداول']),
          ]),
        ]);
      })(),
      // رسالة الشمعة في أسفل الأمر
      s.topCandle && el('div', {style:{
        fontSize:'9px', marginTop:'5px', borderRadius:'6px', padding:'5px 8px',
        color: s.topCandle.signal==='bullish'?C.green:s.topCandle.signal==='bearish'?C.pink:C.yellow,
        background: s.topCandle.signal==='bullish'?'rgba(0,255,136,.06)':s.topCandle.signal==='bearish'?'rgba(255,45,122,.06)':'rgba(255,224,51,.06)',
      }}, [
        s.topCandle.signal==='bullish'
          ? '✅ شمعة صاعدة تؤكد الدخول — الزخم في صالحك'
          : s.topCandle.signal==='bearish'
          ? '🚨 شمعة هابطة — انتظر تأكيداً صاعداً قبل الدخول'
          : '⚠️ Doji — تردد في السوق، انتظر الشمعة التالية',
      ]),
    ]),

    // ── 10. تفاصيل إضافية عند الضغط
    isSelected && el('div', {style:{
      borderTop:'1px solid rgba(180,79,255,.15)', paddingTop:'10px', marginTop:'4px',
    }}, [
      el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'5px'}}, [
        s.rsi!=null && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 7px', textAlign:'center'}}, [
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['RSI']),
          el('div', {style:{fontSize:'11px', fontWeight:'700', color:s.rsi<35?C.green:s.rsi>70?C.pink:C.blue}},
            [fmt(s.rsi)+'%']),
          el('div', {style:{fontSize:'8px', color:C.text3}},
            [s.rsi<35?'تشبع بيع':s.rsi>70?'تشبع شراء':'محايد']),
        ]),
        s.macd!=null && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 7px', textAlign:'center'}}, [
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['MACD']),
          el('div', {style:{fontSize:'11px', fontWeight:'700', color:s.macd>0?C.green:C.pink}},
            [s.macd>0?'↑ صاعد':'↓ هابط']),
        ]),
        el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 7px', textAlign:'center'}}, [
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['حجم']),
          el('div', {style:{fontSize:'11px', fontWeight:'700', color:s.volR>=2?C.blue:C.text2}},
            [s.volR>0?'×'+fmt(s.volR,1):'—']),
        ]),
      ].filter(Boolean)),
      s.earnDays<999 && s.earnDays<=30 && el('div', {style:{
        marginTop:'8px', fontSize:'10px', color:C.yellow,
        background:'rgba(255,224,51,.06)', borderRadius:'6px',
        padding:'5px 8px', border:'1px solid rgba(255,224,51,.2)',
      }}, ['📅 نتائج الأرباح خلال '+s.earnDays+' يوم — ضع هذا في حسبانك']),
    ]),
  ]);
}
