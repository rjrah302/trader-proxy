// в”Җв”Җ Ш¬Щ„ШЁ ШЁЩҠШ§ЩҶШ§ШӘ 5 ШҜЩӮШ§ШҰЩӮ ЩҲШӯШіШ§ШЁ VWAP + EMA + Higher Low + RVOL
async function fetchHunterData(sym) {
  try {
    const url = `${FMP_BASE}/stable/historical-chart/5min?symbol=${sym}&apikey=${API_KEY}`;
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 8000);
    const res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(timer);
    if (!res.ok) return null;
    const data = await res.json();
    if (!Array.isArray(data) || data.length < 6) return null;

    // ШҙЩ…ЩҲШ№ Ш§Щ„ЩҠЩҲЩ… ЩҒЩӮШ· вҖ” ЩҶШіШӘШ®ШҜЩ… ШӘЩҲЩӮЩҠШӘ ЩҶЩҠЩҲЩҠЩҲШұЩғ (Ш§Щ„ШіЩҲЩӮ Ш§Щ„ШЈЩ…ШұЩҠЩғЩҠ)
    const nyDate = new Date().toLocaleDateString('en-CA', {timeZone:'America/New_York'});
    const bars = data.filter(b => b.date && b.date.startsWith(nyDate)).reverse();
    if (bars.length < 6) return null;

    const closes = bars.map(b => +b.close);
    const highs  = bars.map(b => +b.high);
    const lows   = bars.map(b => +b.low);
    const vols   = bars.map(b => +b.volume || 0);

    // в”Җв”Җ VWAP
    let sumPV = 0, sumV = 0;
    bars.forEach(b => {
      const tp = ((+b.high) + (+b.low) + (+b.close)) / 3;
      const v  = +b.volume || 0;
      sumPV += tp * v; sumV += v;
    });
    const vwap = sumV > 0 ? sumPV / sumV : null;

    // в”Җв”Җ EMA9 ЩҲ EMA21 Ш№Щ„Щү Ш§Щ„ШҘШәЩ„Ш§ЩӮШ§ШӘ
    const calcEMALocal = (arr, period) => {
      if (arr.length < period) return null;
      const k = 2 / (period + 1);
      let ema = arr.slice(0, period).reduce((a, b) => a + b, 0) / period;
      for (let i = period; i < arr.length; i++) ema = arr[i] * k + ema * (1 - k);
      return ema;
    };
    const ema9  = calcEMALocal(closes, 9);
    const ema21 = calcEMALocal(closes, 21);

    // в”Җв”Җ Higher Low: ШўШ®Шұ ЩӮШ§Ш№ЩҠЩҶ Щ…ШӯЩ„ЩҠЩҠЩҶ
    let higherLow = false;
    const localLows = [];
    for (let i = 1; i < lows.length - 1; i++) {
      if (lows[i] < lows[i-1] && lows[i] < lows[i+1]) localLows.push(lows[i]);
    }
    if (localLows.length >= 2) {
      higherLow = localLows[localLows.length-1] > localLows[localLows.length-2];
    }

    // в”Җв”Җ Ш§Ш®ШӘШұШ§ЩӮ ЩӮЩ…Ш© ШўШ®Шұ 15 ШҜЩӮЩҠЩӮШ© (3 ШҙЩ…ЩҲШ№)
    const last3Highs = highs.slice(-4, -1);
    const breakout15 = last3Highs.length >= 3 &&
      closes[closes.length-1] > Math.max(...last3Highs);

    // в”Җв”Җ RVOL ШӯШіШЁ ЩҲЩӮШӘ Ш§Щ„Ш¬Щ„ШіШ©
    const avgVol = state.prices[sym]?.avgVolume || 0;
    const todayVol = vols.reduce((a, b) => a + b, 0);
    const sessionBars = 78; // Ш№ШҜШҜ ШҙЩ…ЩҲШ№ 5 ШҜЩӮШ§ШҰЩӮ ЩҒЩҠ ЩҠЩҲЩ… ЩғШ§Щ…Щ„
    const expectedVol = avgVol > 0 ? avgVol * (bars.length / sessionBars) : 0;
    const rvol = expectedVol > 0 ? todayVol / expectedVol : 0;

    // в”Җв”Җ Ш§Щ„ЩӮЩҲШ© Ш§Щ„ЩҶШіШЁЩҠШ© vs SPY (30 ШҜЩӮЩҠЩӮШ© = 6 ШҙЩ…ЩҲШ№)
    const last6 = closes.slice(-6);
    const stockReturn30 = last6.length >= 2
      ? (last6[last6.length-1] - last6[0]) / last6[0] * 100 : 0;
    const rs30 = stockReturn30 - (state.spyChange || 0);

    // в”Җв”Җ MACD Histogram Ш№Щ„Щү 5 ШҜЩӮШ§ШҰЩӮ
    const macd5Hist = ema9 != null && ema21 != null ? ema9 - ema21 : null;

    // в”Җв”Җ Ш§Щ„ШіШ№Шұ Ш§Щ„ШӯШ§Щ„ЩҠ vs VWAP
    const currentPrice = closes[closes.length-1];
    const aboveVwap = vwap && currentPrice > vwap;

    return {
      vwap, ema9, ema21, higherLow, breakout15,
      rvol, rs30, stockReturn30, macd5Hist,
      aboveVwap, currentPrice, bars
    };
  } catch(e) { return null; }
}

// в”Җв”Җ ШӯШіШ§ШЁ HunterScore Щ„ШіЩҮЩ… ЩҲШ§ШӯШҜ
async function calcHunterScore(stock) {
  const p   = state.prices[stock.id];
  const ind = state.indicators[stock.id];
  // Gainers Ш®Ш§ШұШ¬ ЩӮШ§ШҰЩ…ШӘЩҶШ§ Щ„ЩҠШі Щ„ЩҮЩ… ind вҖ” ЩҶШіЩ…Шӯ Щ„ЩҮЩ… ШЁШ§Щ„Щ…ШұЩҲШұ ШЁШҜШұШ¬Ш© ШЈШіШ§ШіЩҠШ©
  if (!p?.price) return null;
  if (!ind && !stock.isGainer) return null; // ШәЩҠШұ Gainer ШЁШҜЩҲЩҶ ind = Щ…ШұЩҒЩҲШ¶

  const price = p.price;
  const rsi       = ind?.rsi       ?? null;
  const stochRsi  = ind?.stochRsi  ?? null;
  const bb_lower  = ind?.bb_lower  ?? null;
  const support   = ind?.support   ?? null;
  const macdHist  = ind?.macdHist  ?? null;
  const macdHistDir = ind?.macdHistDir ?? null;
  const atrPct    = ind?.atrPct    ?? 3;

  const intra = await fetchHunterData(stock.id);

  let score = 0;
  const checks = {};

  // в•җв•җ Ш§Щ„Щ…ШӯЩҲШұ 1: ШҘЩҶЩҮШ§Щғ Ш§Щ„ШЁЩҠШ№ (25 ЩҶЩӮШ·Ш©)
  // RSI < 30 Ш«Щ… ШЁШҜШЈ ЩҠШұШӘЩҒШ№
  const rsiExhaust = rsi != null && rsi < 30;
  checks.rsiExhaust = rsiExhaust;
  if (rsiExhaust) score += 7;

  // Stoch RSI ЩҠШ№ШЁШұ Щ„Щ„ШЈШ№Щ„Щү ШӘШӯШӘ 20
  const stochCross = stochRsi != null && stochRsi < 20;
  checks.stochCross = stochCross;
  if (stochCross) score += 5;

  // Ш§Щ„ШіШ№Шұ Ш®ШұШ¬ ШӘШӯШӘ BB Ш«Щ… Ш№Ш§ШҜ ШҜШ§Ш®Щ„ЩҮ
  const bbReversal = bb_lower != null && price > bb_lower * 0.99 && price <= bb_lower * 1.02;
  checks.bbReversal = bbReversal;
  if (bbReversal) score += 5;

  // RVOL >= 2
  const rvolOk = intra && intra.rvol >= 2;
  checks.rvolOk = rvolOk;
  if (rvolOk) score += 4;

  // Ш§Щ„ШіШ№Шұ Ш№ЩҶШҜ ШҜШ№Щ… Щ…ЩҲШ«ЩҲЩӮ Ш¶Щ…ЩҶ ATR ЩҲШ§ШӯШҜ
  const atrVal = atrPct || 3;
  const nearSup = support && Math.abs(price - support) / price * 100 <= atrVal;
  checks.nearSup = nearSup;
  if (nearSup) score += 4;

  // в•җв•җ Ш§Щ„Щ…ШӯЩҲШұ 2: ШӘШЈЩғЩҠШҜ Ш§Щ„Ш§ШұШӘШҜШ§ШҜ (35 ЩҶЩӮШ·Ш©)
  // Ш§ШіШӘШ№Ш§ШҜШ© VWAP
  const aboveVwap = intra?.aboveVwap || false;
  checks.aboveVwap = aboveVwap;
  if (aboveVwap) score += 8;

  // EMA9 > EMA21 Ш№Щ„Щү 5 ШҜЩӮШ§ШҰЩӮ
  const emaOk = intra?.ema9 != null && intra?.ema21 != null && intra.ema9 > intra.ema21;
  checks.emaOk = emaOk;
  if (emaOk) score += 6;

  // Higher Low Ш№Щ„Щү ШҙЩ…ЩҲШ№ 5 ШҜЩӮШ§ШҰЩӮ
  checks.higherLow = intra?.higherLow || false;
  if (checks.higherLow) score += 7;

  // Ш§Ш®ШӘШұШ§ЩӮ ЩӮЩ…Ш© ШўШ®Шұ 15 ШҜЩӮЩҠЩӮШ©
  checks.breakout15 = intra?.breakout15 || false;
  if (checks.breakout15) score += 7;

  // MACD Histogram 5 ШҜЩӮШ§ШҰЩӮ Щ…ЩҲШ¬ШЁ
  const macd5Ok = intra?.macd5Hist != null && intra.macd5Hist > 0;
  checks.macd5Ok = macd5Ok;
  if (macd5Ok) score += 5;

  // MACD Ш§Щ„ЩҠЩҲЩ…ЩҠ ЩҠШӘШӯШіЩҶ (contracting ШіШ§Щ„ШЁ ШЈЩҲ expanding Щ…ЩҲШ¬ШЁ ШЈЩҲ crossing)
  const macdDayOk = macdHist != null && (
    (macdHist > 0) ||
    (macdHist < 0 && macdHistDir === 'contracting') ||
    (macdHistDir === 'crossing')
  );
  checks.macdDayOk = macdDayOk;
  if (macdDayOk) score += 2;

  // в•җв•җ Ш§Щ„Щ…ШӯЩҲШұ 3: Ш§Щ„ЩӮЩҲШ© Ш§Щ„ЩҶШіШЁЩҠШ© vs SPY (20 ЩҶЩӮШ·Ш©)
  const rs30 = intra?.rs30 || 0;
  const stockRet = intra?.stockReturn30 || 0;
  let rsScore = 0;
  if (rs30 >= 2)       rsScore += 10;
  else if (rs30 >= 1)  rsScore += 7;
  else if (rs30 > 0)   rsScore += 4;
  // Ш§Щ„ШіЩҮЩ… ШЈШ®Ш¶Шұ ЩҲШ§Щ„ШіЩҲЩӮ ШЈШӯЩ…Шұ
  if (stockRet > 0 && (state.spyChange || 0) < 0) rsScore += 6;
  // Ш§Щ„ШіЩҮЩ… ЩҠШӯШ§ЩҒШё Ш№Щ„Щү ЩӮШ§Ш№ЩҮ ЩҲШ§Щ„ШіЩҲЩӮ ЩҠШөЩҶШ№ ЩӮЩҠШ№Ш§ЩҶШ§ЩӢ Ш¬ШҜЩҠШҜШ©
  if (checks.higherLow && state.marketTrend === 'bearish') rsScore += 4;
  checks.rsScore = Math.min(rsScore, 20);
  score += checks.rsScore;

  // в•җв•җ Ш§Щ„Щ…ШӯЩҲШұ 4: Ш§Щ„ШӯШ¬Щ… ЩҲШ§Щ„ШіЩҠЩҲЩ„Ш© (10 ЩҶЩӮШ§Ш·)
  // RVOL Щ…Ш№ Ш§Ш®ШӘШұШ§ЩӮ = ШӘШЈЩғЩҠШҜ ШЈЩӮЩҲЩү (Щ„Ш§ ШӘЩғШұШ§Шұ вҖ” Ш§Щ„Щ…ШӯЩҲШұ 1 ЩҠШӯШіШЁ RVOL ЩҲШӯШҜЩҮ)
  if (checks.breakout15 && intra?.rvol >= 1.5) score += 5; // Ш§Ш®ШӘШұШ§ЩӮ ШЁШӯШ¬Щ…
  else if (rvolOk) score += 3; // ШӯШ¬Щ… Щ…ШұШӘЩҒШ№ ШЁШҜЩҲЩҶ Ш§Ш®ШӘШұШ§ЩӮ
  if (p.avgVolume > 500000) score += 3; // ШіЩҠЩҲЩ„Ш© ЩғШ§ЩҒЩҠШ© Щ„Щ„ШӘЩҶЩҒЩҠШ°
  if (p.avgVolume > 2000000) score += 2; // ШіЩҠЩҲЩ„Ш© Щ…Щ…ШӘШ§ШІШ©

  // в•җв•җ Щ…ЩғШ§ЩҒШЈШ© Ш®Ш§ШөШ© Щ„Щ„ШіЩҲЩӮ Ш§Щ„ЩҮШ§ШЁШ· вҖ” ШЈШіЩҮЩ… ШӘЩӮШ§ЩҲЩ… Ш§Щ„ЩҮШЁЩҲШ·
  if (state.marketTrend === 'bearish') {
    // Ш§Щ„ШіЩҮЩ… ШЈШ®Ш¶Шұ ЩҲШ§Щ„ШіЩҲЩӮ ШЈШӯЩ…Шұ = Щ…ЩӮШ§ЩҲЩ… ЩӮЩҲЩҠ
    if ((p.change || 0) > 0) score += 15;
    // Ш§Щ„ШіЩҮЩ… ЩҠЩҮШЁШ· ШЈЩӮЩ„ Щ…ЩҶ Ш§Щ„ШіЩҲЩӮ
    else if ((p.change || 0) > (state.spyChange || -5)) score += 8;
    // Higher Low ЩҒЩҠ Ш§Щ„ШіЩҲЩӮ Ш§Щ„ЩҮШ§ШЁШ· = ШҘШҙШ§ШұШ© ЩӮЩҲЩҠШ© Ш¬ШҜШ§ЩӢ
    if (checks.higherLow) score += 10;
  }
  // в•җв•җ Щ…ЩғШ§ЩҒШЈШ© Gainer
  if (stock.isGainer) { score += 10; checks.isGainer = true; }
  // Ш§Щ„ЩҲЩӮЩҒ: ШӘШӯШӘ ШўШ®Шұ ЩӮШ§Ш№ ШөШ§Ш№ШҜ вҲ’ 0.2 Г— ATR
  const atrAbs  = price * atrVal / 100;
  const stopLoss = (support || price * 0.97) - (0.2 * atrAbs);
  const lossPct  = (price - stopLoss) / price * 100;

  // Ш§Щ„ЩҮШҜЩҒ: VWAP ШЈЩҲ Щ…ЩӮШ§ЩҲЩ…Ш© Щ„ШӯШёЩҠШ©
  const targetPrice = intra?.vwap && intra.vwap > price
    ? intra.vwap
    : ind?.resistance && ind.resistance > price * 1.02
      ? ind.resistance
      : price * (1 + atrVal * 2 / 100);

  const profitPct = (targetPrice - price) / price * 100;
  const rr = lossPct > 0 ? profitPct / lossPct : 0;

  let rrScore = 0;
  if (rr >= 2)       { rrScore += 6; }
  else if (rr >= 1.5){ rrScore += 4; }
  if (lossPct < atrVal * 1.5) rrScore += 2;
  if (!ind?.resistance || ind.resistance > price * 1.03) rrScore += 2;
  score += Math.min(rrScore, 10);

  // ШұЩҒШ¶ ШҘШ°Ш§ R/R ШЈЩӮЩ„ Щ…ЩҶ Ш§Щ„ШӯШҜ вҖ” ШЈШ®ЩҒ ЩҒЩҠ Ш§Щ„ШіЩҲЩӮ Ш§Щ„ШөШ§Ш№ШҜ Ш§Щ„ЩҮШ§ШҜШҰ
  const rrMin = state.marketTrend === 'bearish' ? 1.5 : 1.2;
  if (rr < rrMin) return null;
  // ШұЩҒШ¶ ШҘШ°Ш§ score ШЈЩӮЩ„ Щ…ЩҶ 55
  if (score < 55) return null;

  checks.rr = rr;

  return {
    id: stock.id, name: stock.name, sector: stock.sector,
    price, change: p.change || 0,
    score: Math.min(score, 100), checks,
    rsi, stochRsi, support,
    vwap: intra?.vwap || null,
    ema9: intra?.ema9 || null,
    ema21: intra?.ema21 || null,
    rvol: intra?.rvol || 0,
    rs30, stockReturn30: intra?.stockReturn30 || 0,
    stopLoss, targetPrice, profitPct, lossPct, rr,
    atrPct: atrVal,
    marketTrend: state.marketTrend,
  };
}

// в”Җв”Җ ЩӮШ§ШҰЩ…Ш© Ш§Щ„Щ…ШұШҙШӯЩҠЩҶ Ш§Щ„Щ…Ш®ШӘШөШұШ© Щ„Щ„ШӘШӯШҜЩҠШ« Ш§Щ„ШіШұЩҠШ№
function getHunterCandidates() {
  return ALL_STOCKS.filter(s => {
    const ind = state.indicators[s.id];
    const p   = state.prices[s.id];
    if (!ind || !p) return false;
    // ШЈШіЩҮЩ… ШёЩҮШұШӘ ШіШ§ШЁЩӮШ§ЩӢ ЩҒЩҠ Ш§Щ„ЩҶШӘШ§ШҰШ¬
    if ((state.hunterRecs||[]).some(r => r.id === s.id)) return true;
    if (ind?.rsi != null && ind.rsi < 40) return true;
    if (ind?.nearSupport) return true;
    return false;
  });
}

// в”Җв”Җ Ш¬Щ„ШЁ After Hours Щ„Щ„Щ…ШұШҙШӯЩҠЩҶ ЩҒЩӮШ·
async function fetchAftermarketData(candidates) {
  if (!candidates || candidates.length === 0) return;
  await Promise.all(candidates.map(async stock => {
    try {
      const res  = await fetch(`${FMP_BASE}/stable/aftermarket-quote?symbol=${stock.id}&apikey=${API_KEY}`, { signal: AbortSignal.timeout(5000) });
      const data = await res.json();
      const d = Array.isArray(data) ? data[0] : data;
      if (d && d.price) {
        state.aftermarket = state.aftermarket || {};
        state.aftermarket[stock.id] = {
          price:  +d.price  || null,
          change: +d.changesPercentage || 0,
          volume: +d.volume || 0,
        };
      }
    } catch(e) {}
  }));
}

// в”Җв”Җ ЩҲШ¶Ш№ Ш§Щ„ШөЩҠШҜ Ш§Щ„Щ„ЩҠЩ„ЩҠ вҖ” ШЁЩҠШ§ЩҶШ§ШӘ ЩҠЩҲЩ…ЩҠШ© ЩҒЩӮШ· ШЁШҜЩҲЩҶ intraday
async function calcHunterNight() {
  if (!state.indicatorsDone) return;
  console.log('[Hunter] рҹҢҷ ШҜЩҲШұШ© Щ„ЩҠЩ„ЩҠШ©...');

  const results = [];

  for (const stock of ALL_STOCKS) {
    const p   = state.prices[stock.id];
    const ind = state.indicators[stock.id];
    if (!p?.price || !ind) continue;

    const price = p.price;
    const { rsi, stochRsi, bb_lower, support, resistance, macdHist, macdHistDir, atrPct } = ind;

    let score = 0;
    const checks = {};

    // в•җв•җ ШҘЩҶЩҮШ§Щғ Ш§Щ„ШЁЩҠШ№ (25 ЩҶЩӮШ·Ш©)
    const rsiOk = rsi != null && rsi < 35;
    checks.rsiExhaust = rsiOk;
    if (rsiOk) score += 10;
    else if (rsi != null && rsi < 40) score += 5;

    const stochOk = stochRsi != null && stochRsi < 25;
    checks.stochCross = stochOk;
    if (stochOk) score += 5;

    const bbOk = bb_lower != null && price <= bb_lower * 1.02;
    checks.bbReversal = bbOk;
    if (bbOk) score += 5;

    const atrVal = atrPct || 3;
    const nearSup = support && Math.abs(price - support) / price * 100 <= atrVal;
    checks.nearSup = nearSup;
    if (nearSup) score += 5;

    // в•җв•җ MACD ЩҠШӘШӯШіЩҶ (20 ЩҶЩӮШ·Ш©)
    const macdOk = macdHist != null && (
      (macdHist > 0 && macdHistDir === 'expanding') ||
      (macdHistDir === 'crossing') ||
      (macdHist < 0 && macdHistDir === 'contracting')
    );
    checks.macdDayOk = macdOk;
    if (macdHist > 0 && macdHistDir === 'expanding') score += 20;
    else if (macdHistDir === 'crossing')              score += 16;
    else if (macdHist < 0 && macdHistDir === 'contracting') score += 10;

    // в•җв•җ Ш§Щ„Ш§ШӘШ¬Ш§ЩҮ Ш§Щ„ШЈШіШЁЩҲШ№ЩҠ (10 ЩҶЩӮШ·Ш©)
    if (ind.weeklyTrend === 'bullish') score += 10;
    else if (ind.weeklyTrend === 'bearish') score -= 5;

    // в•җв•җ Ш¬ЩҲШҜШ© Ш§Щ„ШөЩҒЩӮШ© R/R (10 ЩҶЩӮШ·Ш©)
    const atrAbs   = price * atrVal / 100;
    const stopLoss = (support || price * 0.97) - (0.2 * atrAbs);
    const lossPct  = (price - stopLoss) / price * 100;
    const targetPrice = resistance && resistance > price * 1.02
      ? resistance
      : price * (1 + atrVal * 2 / 100);
    const profitPct = (targetPrice - price) / price * 100;
    const rr = lossPct > 0 ? +(profitPct / lossPct).toFixed(2) : 0;

    if (rr >= 2)        score += 10;
    else if (rr >= 1.5) score += 6;

    // Ш№ШӘШЁШ© Ш§Щ„Щ„ЩҠЩ„ вҖ” ШЈШ®ЩҒ ЩҒЩҠ Ш§Щ„ШіЩҲЩӮ Ш§Щ„ЩҮШ§ШЁШ· Щ„ШЈЩҶ Ш§Щ„ШҙШұЩҲШ· ШЈШөШ№ШЁ
    const threshold = state.marketTrend === 'bearish' ? 35 : 45;
    if (score < threshold) continue;
    if (rr < 1.5)   continue;

    results.push({
      id: stock.id, name: stock.name, sector: stock.sector,
      price, change: p.change || 0,
      score: Math.min(score, 100), checks,
      rsi, stochRsi, support, resistance,
      vwap: null, ema9: null, ema21: null,
      rvol: 0, rs30: 0, stockReturn30: 0,
      stopLoss: +stopLoss.toFixed(2),
      targetPrice: +targetPrice.toFixed(2),
      profitPct: +profitPct.toFixed(1),
      lossPct: +lossPct.toFixed(1),
      rr, atrPct: atrVal,
      marketTrend: state.marketTrend,
      isNight: true, // рҹҢҷ Ш№Щ„Ш§Щ…Ш© Ш§Щ„ШӘШӯЩ„ЩҠЩ„ Ш§Щ„Щ„ЩҠЩ„ЩҠ
      _rawScore: score, // Щ„Щ„ШӘШӯЩӮЩӮ Щ…ЩҶ Ш§Щ„Щ…ШұШҙШӯЩҠЩҶ
    });
  }

  // в”Җв”Җ Ш¬Щ„ШЁ After Hours Щ„Щ„Щ…ШұШҙШӯЩҠЩҶ (score >= 30)
  const ahCandidates = results.filter(r => r._rawScore >= 30);
  if (ahCandidates.length > 0 && !isMarketOpen()) {
    await fetchAftermarketData(ahCandidates);
    ahCandidates.forEach(r => {
      const ah = state.aftermarket?.[r.id];
      if (!ah) return;
      if (ah.change > 2 && ah.volume > 500000)     { r.score = Math.min(r.score + 10, 100); r.ahBonus = true; }
      else if (ah.change > 0 && ah.volume > 200000) { r.score = Math.min(r.score + 5, 100); }
      else if (ah.change < -3)                       { r.score = Math.max(r.score - 10, 0); }
      r.aftermarket = ah;
    });
  }

  results.sort((a, b) => b.score - a.score);
  state.hunterRecs = results;
  console.log('[Hunter] рҹҢҷ Щ„ЩҠЩ„ЩҠШ© Ш§ЩғШӘЩ…Щ„ШӘ:', results.length, 'ЩҒШұШөШ©');
}

// в”Җв”Җ Ш¬Щ„ШЁ Biggest Gainers Щ…ЩҶ Ш§Щ„ШіЩҲЩӮ ЩғЩ„ЩҮ
async function fetchBiggestGainers() {
  try {
    const res  = await fetch(`${FMP_BASE}/stable/biggest-gainers?apikey=${API_KEY}`, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    if (!Array.isArray(data)) return [];

    // ЩҒЩ„ШӘШұ: ШӯШ¬Щ… > 500K ЩҲШіШ№Шұ $3-$200
    const filtered = data
      .filter(s => s.symbol && s.price >= 3 && s.price <= 200 && (s.volume||0) > 500000)
      .slice(0, 20)
      .map(s => ({
        id:     s.symbol,
        name:   s.name || s.symbol,
        sector: 'ШәЩҠЩҠЩҶШұ',
        cat:    'mid',
        beta:   1.5, // Ш§ЩҒШӘШұШ§Ш¶ЩҠ
        price:  +s.price,
        change: +s.changesPercentage,
        volume: +s.volume,
        isGainer: true, // Ш№Щ„Ш§Щ…Ш©
      }));

    console.log('[Gainers] Ш·Щ„Ш№:', filtered.length, 'ШіЩҮЩ…');
    return filtered;
  } catch(e) {
    console.warn('[Gainers] error:', e.message);
    return [];
  }
}

// в”Җв”Җ Ш§Щ„ШҜЩҲШұШ© Ш§Щ„ЩғШ§Щ…Щ„Ш©: ЩғЩ„ Ш§Щ„ШЈШіЩҮЩ… (Ш§ЩҒШӘШӘШ§Шӯ + Щ…ЩҶШӘШөЩҒ)
async function calcHunterFull() {
  if (!state.indicatorsDone) return;
  console.log('[Hunter] ШҜЩҲШұШ© ЩғШ§Щ…Щ„Ш©...');

  // в”Җв”Җ Ш¬Щ„ШЁ Gainers ЩҲШҘШ¶Ш§ЩҒШӘЩҮЩ… Щ„Щ„Щ…ШіШӯ
  const gainers = isMarketOpen() ? await fetchBiggestGainers() : [];

  // ШҜЩ…Ш¬ Gainers Щ…Ш№ ЩӮШ§ШҰЩ…ШӘЩҶШ§ вҖ” ЩҶШӘШ¬ЩҶШЁ Ш§Щ„ШӘЩғШұШ§Шұ
  const ourIds      = new Set(ALL_STOCKS.map(s => s.id));
  const extraStocks = gainers.filter(g => !ourIds.has(g.id));

  // ЩҶШ¬Щ„ШЁ ШЈШіШ№Ш§Шұ Ш§Щ„ЩҖ Gainers Ш§Щ„Ш¬ШҜШҜ (Щ…Ш§ Ш№ЩҶШҜЩҮЩ… state.prices)
  for (const g of extraStocks) {
    if (!state.prices[g.id]) {
      state.prices[g.id] = { price: g.price, change: g.change, isReal: true, avgVolume: g.volume };
    }
  }
  // ЩҶШӯШ°ЩҒ Gainers Ш§Щ„Ш°ЩҠЩҶ Щ„ЩҠШі Щ„ЩҮЩ… Щ…ШӨШҙШұШ§ШӘ вҖ” ЩҶШЁЩӮЩү ШЁШ§Щ„ЩӮЩҲШ© Ш§Щ„ЩҶШіШЁЩҠШ© ЩҒЩӮШ·
  // calcHunterScore ШіЩҠШӘШ№Ш§Щ…Щ„ Щ…Ш№ЩҮЩ… ШЁЩҖ intraday ЩҒЩӮШ· ШҘШ°Ш§ Щ…Ш§ Ш№ЩҶШҜЩҮЩ… ind
  const allStocks = [...ALL_STOCKS, ...extraStocks];
  const BATCH = 5;
  const results = [];
  for (let i = 0; i < allStocks.length; i += BATCH) {
    const batch = allStocks.slice(i, i + BATCH);
    const res = await Promise.all(batch.map(s => calcHunterScore(s)));
    res.forEach(r => { if (r) results.push(r); });
    if (i + BATCH < allStocks.length) await new Promise(r => setTimeout(r, 400));
  }
  results.sort((a, b) => b.score - a.score);
  state.hunterRecs = results;
  console.log('[Hunter] ЩғШ§Щ…Щ„Ш©:', results.length, 'ЩҒШұШөШ©');
}

// в”Җв”Җ Ш§Щ„ШҜЩҲШұШ© Ш§Щ„ШіШұЩҠШ№Ш©: Ш§Щ„Щ…ШұШҙШӯЩҲЩҶ ЩҒЩӮШ· (ЩғЩ„ 30 ШҜЩӮЩҠЩӮШ©)
async function calcHunterQuick() {
  if (!state.indicatorsDone || !isMarketOpen()) return;
  const candidates = getHunterCandidates();
  if (candidates.length === 0) return;
  console.log('[Hunter] ШіШұЩҠШ№Ш©:', candidates.length, 'Щ…ШұШҙШӯ...');
  const results = [];
  for (let i = 0; i < candidates.length; i += 5) {
    const batch = candidates.slice(i, i + 5);
    const res = await Promise.all(batch.map(s => calcHunterScore(s)));
    res.forEach(r => { if (r) results.push(r); });
    if (i + 5 < candidates.length) await new Promise(r => setTimeout(r, 300));
  }
  // ЩҶШҜЩ…Ш¬ Ш§Щ„ЩҶШӘШ§ШҰШ¬ Ш§Щ„Ш¬ШҜЩҠШҜШ© Щ…Ш№ Ш§Щ„ЩӮШҜЩҠЩ…Ш© вҖ” Ш§Щ„Ш¬ШҜЩҠШҜШ© ШӘШӯЩ„ Щ…ШӯЩ„ Ш§Щ„ЩӮШҜЩҠЩ…Ш©
  const oldResults = (state.hunterRecs || []).filter(
    r => !candidates.some(c => c.id === r.id)
  );
  const merged = [...results, ...oldResults];
  merged.sort((a, b) => b.score - a.score);
  state.hunterRecs = merged;
  render();
}

// в”Җв”Җ ШЁШҜШЎ Ш§Щ„ЩҖ loop ЩғЩ„ 30 ШҜЩӮЩҠЩӮШ©
let _hunterInterval = null;
function startHunterLoop() {
  if (_hunterInterval) clearInterval(_hunterInterval);
  _hunterInterval = setInterval(async () => {
    if (isMarketOpen()) await calcHunterQuick();
  }, 30 * 60 * 1000);
}

let _indicatorsLoading = false;

async function loadData(full=false) {
  // в”Җв”Җ Firebase sync Ш№ЩҶШҜ Ш§Щ„ШЁШҜШ§ЩҠШ© (Щ…ШұШ© ЩҲШ§ШӯШҜШ©)
  if(window._fbReady && !state._fbSynced) {
    state._fbSynced  = true;
    state._fbSyncing = true;
    render();
    await window._fbSync().catch(()=>{});
    state._fbSyncing = false;
  }

  // ШӘШӯЩ…ЩҠЩ„ Ш§Щ„ШЈШіШ№Ш§Шұ + Ш§ШӘШ¬Ш§ЩҮ Ш§Щ„ШіЩҲЩӮ ШҜШ§ШҰЩ…Ш§ЩӢ
  await Promise.all([fetchPrices(), fetchMarketTrend()]);

  // ШҘШ°Ш§ Ш§Щ„ШіЩҲЩӮ ЩҮШ§ШЁШ· вҖ” ШҙШәЩ‘Щ„ Ш§Щ„ШөШ§ШҰШҜ Ш§Щ„Щ„ЩҠЩ„ЩҠ ЩҒЩҲШұШ§ЩӢ ШЁШҜЩҲЩҶ Ш§ЩҶШӘШёШ§Шұ Ш§Щ„Щ…ШӨШҙШұШ§ШӘ
  if (state.marketTrend === 'bearish' && state.indicatorsDone) {
    await calcHunterNight();
  }
  render();

  // ШҘШ°Ш§ Ш§Щ„ШӘЩҲШөЩҠШ§ШӘ Щ…ЩӮЩҒЩ„Ш© (Щ…ШӯЩҒЩҲШёШ© Щ…ЩҶ Ш§Щ„ЩҠЩҲЩ…) вҖ” ЩҒЩӮШ· ШӯШҜЩ‘Ш« Ш§Щ„ШЈШіШ№Ш§Шұ ШЁШҜЩҲЩҶ ШҘШ№Ш§ШҜШ© ШӯШіШ§ШЁ
  if(_recsLockedToday && state.recs?.length > 0) {
    if(state.indicatorsDone) {
      // Ш§Щ„Щ…ШӨШҙШұШ§ШӘ Щ…ЩҲШ¬ЩҲШҜШ© вҖ” ШӯШҜЩ‘Ш« Ш§Щ„ШЈШіШ№Ш§Шұ ЩҒЩҠ Ш§Щ„ШЁШ·Ш§ЩӮШ§ШӘ ЩҒЩӮШ·
      state.recs = state.recs.map(r => {
        const p = state.prices[r.id];
        if(!p?.price) return r;
        return { ...r, price:p.price, change:p.change, high:p.high, low:p.low, volume:p.volume };
      });
    } else {
      // Ш§Щ„Щ…ШӨШҙШұШ§ШӘ ШәЩҠШұ Щ…ШӯЩ…Щ‘Щ„Ш© вҖ” ШӯЩ…Щ‘Щ„ЩҮШ§ Щ„ЩғЩҶ Щ„Ш§ ШӘЩҸШ№ЩҠШҜ Ш§Щ„ШӯШіШ§ШЁ
      const neverLoaded = !state.indicatorsDone && !_indicatorsLoading;
      if(neverLoaded && !_indicatorsLoading) {
        _indicatorsLoading = true;
        render();
        await fetchIndicators();
        _indicatorsLoading = false;
        // ШӯШҜЩ‘Ш« Ш§Щ„ШЈШіШ№Ш§Шұ ЩҒЩӮШ· вҖ” Щ„Ш§ calcRecs
        state.recs = state.recs.map(r => {
          const p = state.prices[r.id];
          if(!p?.price) return r;
          return { ...r, price:p.price, change:p.change, high:p.high, low:p.low, volume:p.volume };
        });
      }
    }
    render();
    return;
  }

  // ШӘШӯЩ…ЩҠЩ„ Ш§Щ„Щ…ШӨШҙШұШ§ШӘ: Ш№ЩҶШҜ ЩҒШӘШӯ Ш§Щ„ШіЩҲЩӮ ШЈЩҲ ШЈЩҲЩ„ Щ…ШұШ© (Щ„Щ„ШөШ§ШҰШҜ Ш§Щ„Щ„ЩҠЩ„ЩҠ)
  const session     = getSessionInfo();
  const neverLoaded = !state.indicatorsDone && !_indicatorsLoading;
  const shouldLoad  = (isMarketOpen() || neverLoaded) && !state.indicatorsDone && !_indicatorsLoading;

  if(shouldLoad) {
    _indicatorsLoading = true;
    render();

    await fetchIndicators();

    // в”Җв”Җ ШӯШіШ§ШЁ ЩҒЩӮШ· Щ„ЩҲ Ш§Щ„ШіЩҲЩӮ Щ„Ш§ ЩҠШІШ§Щ„ Щ…ЩҒШӘЩҲШӯШ§ЩӢ
    if(isMarketOpen()) {
      calcRecs();
      calcSpeculative();
    } else {
      // Ш§Щ„ШіЩҲЩӮ Щ…ШәЩ„ЩӮ вҖ” ШҙШәЩ‘Щ„ Ш§Щ„ШөШ§ШҰШҜ Ш§Щ„Щ„ЩҠЩ„ЩҠ ШЁШ№ШҜ Ш§ЩғШӘЩ…Ш§Щ„ Ш§Щ„Щ…ШӨШҙШұШ§ШӘ
      await calcHunterNight();
    }
    render();

    await Promise.all([
      fetchNews(),
      fetchEarnings(),
      fetchProfiles(),
    ]).catch(e => console.warn('[loadData] secondary fetch error:', e.message));

    _indicatorsLoading = false;
    // Ш§Щ„ШөШ§ШҰШҜ вҖ” ЩғШ§Щ…Щ„ Щ„ЩҲ Щ…ЩҒШӘЩҲШӯШҢ Щ„ЩҠЩ„ЩҠ Щ„ЩҲ Щ…ШәЩ„ЩӮ
    if(isMarketOpen()) {
      calcRecs();
      calcSpeculative();
      await calcHunterFull();
      startHunterLoop();
      // Ш¬Щ„ШЁ Price Target Щ„Щ„ШӘЩҲШөЩҠШ§ШӘ ЩҲШ§Щ„Щ…Ш¬Ш§ШІЩҒШ©
      const allRecs = [...(state.recs||[]), ...(state.speculativeRecs||[])];
      if(allRecs.length > 0) await fetchPriceTargets(allRecs);
    } else {
      await calcHunterNight();
    }
    render();
    console.log('[loadData] Ш§ЩғШӘЩ…Щ„ вҖ” ШӘЩҲШөЩҠШ§ШӘ:', state.recs?.length, '| Щ…Ш¬Ш§ШІЩҒШ©:', state.speculativeRecs?.length, '| ШөШ§ШҰШҜ:', state.hunterRecs?.length);

  } else if(neverLoaded && !_indicatorsLoading) {
    _indicatorsLoading = true;
    render();
    await fetchIndicators();
    _indicatorsLoading = false;
    await calcHunterNight();
    render();

  } else if(state.indicatorsDone) {
    // Ш§Щ„Щ…ШӨШҙШұШ§ШӘ Ш¬Ш§ЩҮШІШ© вҖ” ЩҒЩӮШ· ШӯШҜЩ‘Ш« Ш§Щ„ШЈШіШ№Ш§Шұ
    if(state.recs) {
      state.recs = state.recs.map(r => {
        const p = state.prices[r.id];
        if(!p?.price) return r;
        return { ...r, price:p.price, change:p.change, high:p.high, low:p.low, volume:p.volume };
      });
    }
  }

  render();
}

// в”Җв”Җ ЩғШҙЩҒ 12 ЩҶЩ…Ш· ШҙЩ…Ш№Ш© ЩҠШ§ШЁШ§ЩҶЩҠШ© ШӯЩӮЩҠЩӮЩҠ Щ…Ш№ OHLC ЩғШ§Щ…Щ„
function detectCandlePatterns(closes, highs, lows, opens) {
  if (!closes || closes.length < 3) return [];
  if (!opens || opens.length !== closes.length) return []; // ЩҶЩҲЩӮЩҒ Ш§Щ„ШӯШіШ§ШЁ ШҘШ°Ш§ open Щ…ЩҒЩӮЩҲШҜ

  const n   = closes.length;
  const patterns = [];

  // ШЁЩҠШ§ЩҶШ§ШӘ ШўШ®Шұ 3 ШҙЩ…Ш№Ш§ШӘ вҖ” open ШӯЩӮЩҠЩӮЩҠ Щ…ЩҶ Ш§Щ„ШЁЩҠШ§ЩҶШ§ШӘ
  const C0 = closes[n-1], H0 = highs[n-1], L0 = lows[n-1], O0 = opens[n-1];
  const C1 = closes[n-2], H1 = highs[n-2], L1 = lows[n-2], O1 = opens[n-2];
  const C2 = n>=4 ? closes[n-3] : C1;
  const H2 = n>=4 ? highs[n-3]  : H1;
  const L2 = n>=4 ? lows[n-3]   : L1;
  const O2 = n>=4 ? opens[n-3]  : O1;

  const body0 = Math.abs(C0-O0), range0 = H0-L0 || 0.0001;
  const body1 = Math.abs(C1-O1), range1 = H1-L1 || 0.0001;
  const body2 = Math.abs(C2-O2), range2 = H2-L2 || 0.0001;

  const bull0 = C0>O0, bear0 = C0<O0;
  const bull1 = C1>O1, bear1 = C1<O1;
  const bull2 = C2>O2, bear2 = C2<O2;

  const upperShadow0 = bull0 ? H0-C0 : H0-O0;
  const lowerShadow0 = bull0 ? O0-L0 : C0-L0;
  const upperShadow1 = bull1 ? H1-C1 : H1-O1;
  const lowerShadow1 = bull1 ? O1-L1 : C1-L1;

  // в”Җ 1. DOJI (Ш¬ШіЩ… < 5% Щ…ЩҶ Ш§Щ„ЩҶШ·Ш§ЩӮ)
  if (body0/range0 < 0.05)
    patterns.push({name:'Doji', ar:'ШҜЩҲШ¬ЩҠ', icon:'вҠ•', color:'#ffe033',
      signal:'neutral', strength:2,
      tip:'ШӘШұШҜШҜ ШЁЩҠЩҶ Ш§Щ„ШЁШ§ШҰШ№ЩҠЩҶ ЩҲШ§Щ„Щ…ШҙШӘШұЩҠЩҶ вҖ” Ш§ЩҶШӘШёШұ ШҙЩ…Ш№Ш© ШӘШЈЩғЩҠШҜ'});

  // в”Җ 2. HAMMER (Ш°ЩҠЩ„ ШіЩҒЩ„ЩҠ Ш·ЩҲЩҠЩ„ШҢ Ш¬ШіЩ… ШөШәЩҠШұ ЩҒЩҠ Ш§Щ„ШЈШ№Щ„ЩүШҢ ЩҒЩҠ Ш§ШӘШ¬Ш§ЩҮ ЩҮШ§ШЁШ·)
  if (lowerShadow0 > body0*2 && upperShadow0 < body0*0.5 && range0 > 0) {
    const downtrend = closes.slice(-6,-1).every((_,i,a) => i===0 || a[i] <= a[i-1]);
    if (downtrend || lowerShadow0 > body0*3)
      patterns.push({name:'Hammer', ar:'Ш§Щ„Щ…Ш·ШұЩӮШ©', icon:'рҹ”Ё', color:'#00ff88',
        signal:'bullish', strength:4,
        tip:'Ш§ШұШӘШҜШ§ШҜ ШөШ§Ш№ШҜ ЩӮЩҲЩҠ вҖ” Ш§Щ„Щ…ШҙШӘШұЩҲЩҶ ШҜШ§ЩҒШ№ЩҲШ§ Ш§Щ„ШіШ№Шұ Щ„Щ„ШЈШ№Щ„Щү ШЁЩӮЩҲШ©'});
  }

  // в”Җ 3. SHOOTING STAR (Ш°ЩҠЩ„ Ш№Щ„ЩҲЩҠ Ш·ЩҲЩҠЩ„ШҢ Ш¬ШіЩ… ШөШәЩҠШұ ЩҒЩҠ Ш§Щ„ШЈШіЩҒЩ„)
  if (upperShadow0 > body0*2 && lowerShadow0 < body0*0.5 && range0 > 0) {
    const uptrend = closes.slice(-6,-1).every((_,i,a) => i===0 || a[i] >= a[i-1]);
    if (uptrend || upperShadow0 > body0*3)
      patterns.push({name:'Shooting Star', ar:'Ш§Щ„ЩҶШ¬Щ… Ш§Щ„ШіШ§ЩӮШ·', icon:'рҹҢ ', color:'#ff2d7a',
        signal:'bearish', strength:4,
        tip:'Ш§ЩҶШ№ЩғШ§Ші ЩҮШЁЩҲШ·ЩҠ вҖ” Ш§Щ„ШЁШ§ШҰШ№ЩҲЩҶ ШұШҜЩҲШ§ Ш§Щ„ШіШ№Шұ Щ„Щ„ШЈШіЩҒЩ„ ШЁШ№ШҜ Ш§Щ„Ш§ШұШӘЩҒШ§Ш№'});
  }

  // в”Җ 4. BULLISH ENGULFING
  if (bull0 && bear1 && C0 >= O1 && O0 <= C1 && body0 > body1)
    patterns.push({name:'Bullish Engulfing', ar:'Ш§Щ„Ш§ШЁШӘЩ„Ш§Ш№ Ш§Щ„ШөШ§Ш№ШҜ', icon:'рҹҹў', color:'#00ff88',
      signal:'bullish', strength:5,
      tip:'Ш§ЩҶШ№ЩғШ§Ші ШөШ§Ш№ШҜ ЩӮЩҲЩҠ вҖ” Ш§Щ„ШҙЩ…Ш№Ш© Ш§Щ„Ш®Ш¶ШұШ§ШЎ Ш§ШЁШӘЩ„Ш№ШӘ Ш§Щ„ШӯЩ…ШұШ§ШЎ ЩғШ§Щ…Щ„Ш§ЩӢ'});

  // в”Җ 5. BEARISH ENGULFING
  if (bear0 && bull1 && O0 >= C1 && C0 <= O1 && body0 > body1)
    patterns.push({name:'Bearish Engulfing', ar:'Ш§Щ„Ш§ШЁШӘЩ„Ш§Ш№ Ш§Щ„ЩҮШ§ШЁШ·', icon:'рҹ”ҙ', color:'#ff2d7a',
      signal:'bearish', strength:5,
      tip:'Ш§ЩҶШ№ЩғШ§Ші ЩҮШЁЩҲШ·ЩҠ ЩӮЩҲЩҠ вҖ” Ш§Щ„ШҙЩ…Ш№Ш© Ш§Щ„ШӯЩ…ШұШ§ШЎ Ш§ШЁШӘЩ„Ш№ШӘ Ш§Щ„Ш®Ш¶ШұШ§ШЎ ЩғШ§Щ…Щ„Ш§ЩӢ'});

  if (n >= 4 && bull2 && body1/range1 < 0.3 && bear0 && C0 < (O2+C2)/2)

  // в”Җ 8. THREE WHITE SOLDIERS (3 ШҙЩ…Ш№Ш§ШӘ Ш®Ш¶ШұШ§ШЎ Щ…ШӘШӘШ§Щ„ЩҠШ© ШЁШЈШ¬ШіШ§Щ… ЩғШЁЩҠШұШ©)
  if (n >= 4 && bull0 && bull1 && bull2 &&

    patterns.push({name:'Three White Soldiers', ar:'Ш§Щ„Ш¬ЩҶЩҲШҜ Ш§Щ„Ш«Щ„Ш§Ш«Ш©', icon:'рҹҡҖ', color:'#00ff88',
      signal:'bullish', strength:5,
      tip:'ШІШ®Щ… ШөШ§Ш№ШҜ Ш§ШіШӘШ«ЩҶШ§ШҰЩҠ вҖ” 3 ШҙЩ…Ш№Ш§ШӘ Ш®Ш¶ШұШ§ШЎ ЩӮЩҲЩҠШ© Щ…ШӘШӘШ§Щ„ЩҠШ©'});

  // в”Җ 9. THREE BLACK CROWS (3 ШҙЩ…Ш№Ш§ШӘ ШӯЩ…ШұШ§ШЎ Щ…ШӘШӘШ§Щ„ЩҠШ©)
  if (n >= 4 && bear0 && bear1 && bear2 &&
      body0 > range0*0.5 && body1 > range1*0.5 &&

      signal:'bearish', strength:5,
      tip:'ШІШ®Щ… ЩҮШЁЩҲШ·ЩҠ ЩӮЩҲЩҠ вҖ” 3 ШҙЩ…Ш№Ш§ШӘ ШӯЩ…ШұШ§ШЎ Щ…ШӘШӘШ§Щ„ЩҠШ© ШЁШЈШ¬ШіШ§Щ… ЩғШЁЩҠШұШ©'});

  // в”Җ 10. MARUBOZU BULLISH (Ш¬ШіЩ… ЩғШЁЩҠШұ Ш¬ШҜШ§ЩӢШҢ Ш°ЩҠЩҲЩ„ ЩӮШөЩҠШұШ© Ш¬ШҜШ§ЩӢ)
  if (bull0 && body0/range0 > 0.85 && body0/O0 > 0.015)
    patterns.push({name:'Marubozu Bullish', ar:'Щ…Ш§ШұЩҲШЁЩҲШІЩҲ ШөШ§Ш№ШҜ', icon:'рҹ’ҡ', color:'#00ff88',
      signal:'bullish', strength:4,
      tip:'ШҙЩ…Ш№Ш© Ш®Ш¶ШұШ§ШЎ ЩғШ§Щ…Щ„Ш© ШЁЩ„Ш§ Ш°ЩҠЩҲЩ„ вҖ” Ш¶ШәШ· ШҙШұШ§ШЎ ЩӮЩҲЩҠ Ш·ЩҲШ§Щ„ Ш§Щ„Ш¬Щ„ШіШ©'});

  // в”Җ 11. MARUBOZU BEARISH
  if (bear0 && body0/range0 > 0.85 && body0/O0 > 0.015)
    patterns.push({name:'Marubozu Bearish', ar:'Щ…Ш§ШұЩҲШЁЩҲШІЩҲ ЩҮШ§ШЁШ·', icon:'рҹ”ҙ', color:'#ff2d7a',
      signal:'bearish', strength:4,

  // в”Җ 12. DRAGONFLY DOJI (Ш°ЩҠЩ„ ШіЩҒЩ„ЩҠ Ш·ЩҲЩҠЩ„ ЩҒЩӮШ· вҖ” ШҘШҙШ§ШұШ© Ш§ЩҶШ№ЩғШ§Ші ШөШ§Ш№ШҜ)
  if (body0/range0 < 0.05 && lowerShadow0 > range0*0.6 && upperShadow0 < range0*0.1)
    patterns.push({name:'Dragonfly Doji', ar:'ШҜЩҲШ¬ЩҠ Ш§Щ„ЩҠШ№ШіЩҲШЁ', icon:'рҹ”ө', color:'#00c8ff',
      signal:'bullish', strength:3,
      tip:'Ш§Щ„Щ…ШҙШӘШұЩҲЩҶ Ш§ШіШӘШұШҜЩҲШ§ Ш§Щ„ШіЩҠШ·ШұШ© Щ…ЩҶ Ш§Щ„ЩӮШ§Ш№ вҖ” Ш§ЩҶШ№ЩғШ§Ші ШөШ§Ш№ШҜ Щ…ШӯШӘЩ…Щ„'});

  // ШЈЩӮЩҲЩү ЩҶЩ…Ш·ЩҠЩҶ ЩҒЩӮШ· (ШӘШ¬ЩҶШЁ Ш§Щ„ЩҒЩҲШ¶Щү)
  return patterns
    .sort((a,b) => b.strength - a.strength)
    .slice(0,2);
}

// в”Җв”Җ Щ…ШӨШҙШұ Ш§Щ„ЩӮЩҲШ© Ш§Щ„ЩҶШіШЁЩҠШ© Щ…ЩӮШ§ШұЩҶШ© ШЁЩҖ SPY
function calcRelativeStrength(stockChange, spyChange) {
  if (spyChange === null || spyChange === undefined) return null;
  const diff = (stockChange || 0) - (spyChange || 0);
  let label, color, score;
  if      (diff >=  3) { label='ЩӮЩҲШ© Ш§ШіШӘШ«ЩҶШ§ШҰЩҠШ©';  color='#00ff88'; score= 20; }
  else if (diff >=  1) { label='ШЈЩӮЩҲЩү Щ…ЩҶ Ш§Щ„ШіЩҲЩӮ';  color='#00c8ff'; score= 12; }
  else if (diff >= -1) { label='Щ…Ш№ Ш§Щ„ШіЩҲЩӮ';        color='#7888aa'; score=  0; }
  else if (diff >= -3) { label='ШЈШ¶Ш№ЩҒ Щ…ЩҶ Ш§Щ„ШіЩҲЩӮ';  color='#ff7a00'; score= -8; }
  else                  { label='Ш¶Ш№ЩҠЩҒ Ш¬ШҜШ§ЩӢ';       color='#ff2d7a'; score=-15; }
  return { diff: +diff.toFixed(2), label, color, score };
}

// в”Җв”Җ ШұШіЩ… Ш§Щ„ШҙЩ…ЩҲШ№ Ш§Щ„ЩҠШ§ШЁШ§ЩҶЩҠШ© Щ…Ш№ OHLC ЩғШ§Щ…Щ„
function renderCandleChart(closes, highs, lows, opens) {
  if (!closes || closes.length < 5) return null;

  const rawC = closes.slice(-16);
  const rawH = highs ? highs.slice(-16) : rawC;
  const rawL = lows  ? lows.slice(-16)  : rawC;
  const rawO = opens ? opens.slice(-16) : rawC.map((c,i) => i===0 ? c : rawC[i-1]);
  const n    = rawC.length;

  // ШЁЩҠШ§ЩҶШ§ШӘ ЩғЩ„ ШҙЩ…Ш№Ш© вҖ” open ШӯЩӮЩҠЩӮЩҠ
  const candles = rawC.map((c, i) => {
    const o  = rawO[i] || (i === 0 ? c : rawC[i-1]);
    const h  = rawH[i] || Math.max(c, o);
    const l  = rawL[i] || Math.min(c, o);
    return { o, c, h, l, bull: c >= o };
  });

  const allH    = candles.map(c=>c.h);
  const allL    = candles.map(c=>c.l);
  const maxP    = Math.max(...allH) * 1.001;
  const minP    = Math.min(...allL) * 0.999;
  const range   = maxP - minP || 1;
  const chartH  = 64;

  function yPx(price) { return ((maxP - price) / range) * chartH; }

  const patterns = detectCandlePatterns(closes, highs, lows);
  const topPat   = patterns[0] || null;

  return el('div', {style:{marginBottom:'8px'}}, [
    // в”Җ Ш№ЩҶЩҲШ§ЩҶ + Ш§ШіЩ… Ш§Щ„ЩҶЩ…Ш·
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'4px'}}, [
      el('div', {style:{fontSize:'9px', color:C.text3}}, ['рҹ•Ҝ Ш§Щ„ШҙЩ…ЩҲШ№ Ш§Щ„ЩҠШ§ШЁШ§ЩҶЩҠШ© ('+n+' ЩҠЩҲЩ…)']),
      topPat ? el('div', {style:{
        fontSize:'9px', fontWeight:'800', color:topPat.color,
        background:topPat.color+'18', borderRadius:'4px', padding:'2px 7px',
        border:'1px solid '+topPat.color+'33',
      }}, [topPat.icon+' '+topPat.ar]) : null,
    ]),

    // в”Җ ШұШіЩ… SVG Щ„Щ„ШҙЩ…ЩҲШ№
    (() => {
      const W = 280, H = chartH + 8;
      const cW = Math.floor(W / n);
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svg.setAttribute('width',  '100%');
      svg.setAttribute('height', String(H));
      svg.style.cssText = 'display:block;background:#060b14;border-radius:8px;border:1px solid #1a2340;';

      candles.forEach((cd, i) => {
        const x   = i * cW + cW/2;
        const col = cd.bull ? '#00ff88' : '#ff2d7a';
        const col2= cd.bull ? '#00ff8855' : '#ff2d7a55';
        const bodyT = yPx(Math.max(cd.o, cd.c)) + 4;
        const bodyB = yPx(Math.min(cd.o, cd.c)) + 4;
        const bodyH = Math.max(bodyB - bodyT, 2);
        const wickT = yPx(cd.h) + 4;
        const wickB = yPx(cd.l) + 4;

        // ШёЩ„ (wick)
        const wick = document.createElementNS('http://www.w3.org/2000/svg','line');
        wick.setAttribute('x1', x); wick.setAttribute('x2', x);
        wick.setAttribute('y1', wickT); wick.setAttribute('y2', wickB);
        wick.setAttribute('stroke', col2); wick.setAttribute('stroke-width','1');
        svg.appendChild(wick);

        // Ш¬ШіЩ… (body)
        const bw = Math.max(cW - 3, 3);
        const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
        rect.setAttribute('x',      x - bw/2);
        rect.setAttribute('y',      bodyT);
        rect.setAttribute('width',  bw);
        rect.setAttribute('height', bodyH);
        rect.setAttribute('fill',   col);
        rect.setAttribute('rx',     '1');
        svg.appendChild(rect);
      });

      // Ш®Ш· MA Ш№Щ„Щү Ш§Щ„ШұШіЩ…
      if (closes.length >= 5) {
        const maPath = candles.map((_, i) => {
          if (i < 4) return null;
          const slice = candles.slice(i-4, i+1).map(c=>c.c);
          const ma = slice.reduce((a,b)=>a+b,0)/slice.length;
          const px = yPx(ma) + 4;
          const x2 = i * cW + cW/2;
          return i===4 ? `M ${x2} ${px}` : `L ${x2} ${px}`;
        }).filter(Boolean).join(' ');
        if (maPath) {
          const path = document.createElementNS('http://www.w3.org/2000/svg','path');
          path.setAttribute('d', maPath);
          path.setAttribute('stroke', '#00c8ff55');
          path.setAttribute('stroke-width','1');
          path.setAttribute('fill','none');
          svg.appendChild(path);
        }
      }

      return svg;
    })(),

    // в”Җ Ш§Щ„ШЈЩҶЩ…Ш§Ш· Ш§Щ„Щ…ЩғШӘШҙЩҒШ©
    patterns.length > 0 ? el('div', {style:{
      marginTop:'5px', display:'flex', flexDirection:'column', gap:'3px',
    }}, patterns.map(p =>
      el('div', {style:{
        fontSize:'9px', color:p.color, lineHeight:'1.5',
        paddingRight:'2px',
      }}, [p.icon+' '+p.ar+' вҖ” '+p.tip])
    )) : null,
  ]);
}

function renderRelativeStrength(stockChange) {
  const rs = calcRelativeStrength(stockChange, state.spyChange);
  if (!rs) return null;
  return el('div', {style:{
    display:'flex', justifyContent:'space-between', alignItems:'center',
    background:'#060b14', borderRadius:'7px', padding:'5px 8px', marginBottom:'6px',
  }}, [
    el('div', {style:{fontSize:'9px', color:C.text3}}, ['рҹ“Ҳ Ш§Щ„ЩӮЩҲШ© Щ…ЩӮШ§ШұЩҶШ© ШЁЩҖ SPY']),
    el('div', {style:{display:'flex', alignItems:'center', gap:'6px'}}, [
      el('span', {style:{
        fontSize:'9px', fontWeight:'800', color:rs.color,
        background:rs.color+'15', borderRadius:'4px', padding:'2px 7px',
      }}, [rs.label]),
      el('span', {style:{fontSize:'9px', color:rs.diff>=0?C.green:C.pink}}, [
        (rs.diff>=0?'+':'')+rs.diff+'%'
      ]),
    ]),
  ]);
}

// в”Җв”Җ ШЁЩҶЩҠШ© ШіШ¬Щ„ Ш§Щ„ШӘЩҲШөЩҠШ§ШӘ
// history_recs = [{id, name, recDate, recPrice, target, stopLoss, signal,
//                  resultDate, resultPrice, result:'win'|'loss'|'pending', pnlPct}]

function loadHistory() {
  try { return JSON.parse(localStorage.getItem('rec_history')||'[]'); } catch(e) { return []; }
}

function saveHistory(h) {
  const data = h.slice(-500);
  try { localStorage.setItem('rec_history', JSON.stringify(data)); } catch(e) {}
  if(window._fbReady) window._fbSaveHistory(data).catch(()=>{});
}

// в”Җв”Җ ШӘШіШ¬ЩҠЩ„ ШӘЩҲШөЩҠШ§ШӘ Ш§Щ„ЩҠЩҲЩ… ЩҒЩҠ Ш§Щ„ШіШ¬Щ„ (ЩҠЩҸШіШӘШҜШ№Щү ШЁШ№ШҜ calcRecs)
function recordRecsToHistory(recs, forceSession) {
  if(!recs||!recs.length) return;
  // вң… Щ„Ш§ ШӘШіШ¬ЩҠЩ„ Ш®Ш§ШұШ¬ ЩҲЩӮШӘ Ш§Щ„ШіЩҲЩӮ вҖ” ШЈШіШ№Ш§Шұ Ш§Щ„ЩҖ cache Щ„Ш§ ШӘЩҸЩ…Ш«Щ‘Щ„ ШҘШҙШ§ШұШ© ШӯЩӮЩҠЩӮЩҠШ©
  if(!isMarketOpen()) return;
  const history = loadHistory();
  const now     = new Date();
  const today   = now.toDateString();

  // ШӘШӯШҜЩҠШҜ Ш§Щ„Ш¬Щ„ШіШ©: ЩҠЩҸЩ…ШұШұ ШөШұШ§ШӯШ©ЩӢ ШЈЩҲ ЩҠЩҸШӯШіШЁ Щ…ЩҶ Ш§Щ„ЩҲЩӮШӘ
  const t       = getMarketTimes();
  const m       = getNowMins();
  const session = forceSession || ((m >= t.midDay && m <= t.midDay+60) ? 'Щ…ЩҶШӘШөЩҒ' : 'Ш§ЩҒШӘШӘШ§Шӯ');

  recs.forEach(r => {
    // Щ„Ш§ ШӘЩғШұШ§Шұ Щ„ЩҶЩҒШі Ш§Щ„ШіЩҮЩ… ЩҒЩҠ ЩҶЩҒШі Ш§Щ„Ш¬Щ„ШіШ© Щ…ЩҶ ЩҶЩҒШі Ш§Щ„ЩҠЩҲЩ…
    const exists = history.some(h =>
      h.id === r.id &&
      new Date(h.recDate).toDateString() === today &&
      h.session === session
    );
    if(exists) return;
    history.push({
      id:         r.id,
      type:       'rec',                // вҶҗ ШӘЩҲШөЩҠШ© Ш№Ш§ШҜЩҠШ©
      name:       r.name,
      sector:     r.sector,
      session,                          // 'Ш§ЩҒШӘШӘШ§Шӯ' ШЈЩҲ 'Щ…ЩҶШӘШөЩҒ'
      recDate:    now.toISOString(),
      recPrice:   r.price,
      target:     r.target,
      stopLoss:   r.stopLoss,
      signal:     r.signal,
      confidence: r.confidence,
      spyChange:  state.spyChange,      // ШӯШ§Щ„Ш© Ш§Щ„ШіЩҲЩӮ ЩҲЩӮШӘ Ш§Щ„ШӘЩҲШөЩҠШ©
      marketTrend:state.marketTrend,
      result:     'pending',
      resultDate: null,
      resultPrice:null,
      pnlPct:     null,
    });
  });
  saveHistory(history);
}

// в”Җв”Җ ШӘШіШ¬ЩҠЩ„ Ш§Щ„Щ…Ш¬Ш§ШІЩҒШ© ЩҒЩҠ Ш§Щ„ШіШ¬Щ„
function recordSpecToHistory(specs) {
  if(!specs||!specs.length) return;
  if(!isMarketOpen()) return;
  const history = loadHistory();
  const now     = new Date();
  const today   = now.toDateString();
  specs.forEach(r => {
    const exists = history.some(h =>
      h.id === r.id && h.type === 'spec' &&
      new Date(h.recDate).toDateString() === today
    );
    if(exists) return;
    history.push({
      id:          r.id,
      type:        'spec',
      name:        r.name,
      sector:      r.sector,
      session:     'Щ…Ш¬Ш§ШІЩҒШ©',
      recDate:     now.toISOString(),
      recPrice:    r.price,
      target:      r.target,
      stopLoss:    r.stopLoss,
      riskReward:  r.riskReward,
      lossPct:     r.lossPct,
      allocPct:    r.allocPct,
      score:       r.score,
      spyChange:   state.spyChange,
      marketTrend: state.marketTrend,
      result:      'pending',
      resultDate:  null,
      resultPrice: null,
      pnlPct:      null,
    });
  });
  saveHistory(history);
}

// в”Җв”Җ ШӘШӯШҜЩҠШ« ЩҶШӘШ§ШҰШ¬ Ш§Щ„ШӘЩҲШөЩҠШ§ШӘ Ш§Щ„Щ…Ш№Щ„ЩӮШ©
function updateHistoryResults() {
  const history = loadHistory();
  let changed = false;
  history.forEach(h => {
    if(h.result !== 'pending') return;
    const cur = state.prices[h.id]?.price;
    if(!cur || !(h.recPrice || h.price)) return;
    if(!h.recPrice && h.price) h.recPrice = h.price; // ШҜШ№Щ… Ш§Щ„ШіШ¬Щ„ Ш§Щ„ЩӮШҜЩҠЩ…
    const pnlPct = ((cur - h.recPrice)/h.recPrice*100);
    const daysSince = (Date.now()-new Date(h.recDate))/(1000*60*60*24);

    // Ш§Ш№ШӘШЁШұ Ш§Щ„ШөЩҒЩӮШ© Щ…ЩҶШӘЩҮЩҠШ© ШҘШ°Ш§:
    // - Щ„Щ…ШіШӘ Ш§Щ„ЩҮШҜЩҒ ШЈЩҲ ЩҲЩӮЩҒ Ш§Щ„Ш®ШіШ§ШұШ©
    // - ШЈЩҲ Щ…Ш¶Щү Ш№Щ„ЩҠЩҮШ§ 5 ШЈЩҠШ§Щ… (ШӘШҜШ§ЩҲЩ„ ЩҠЩҲЩ…ЩҠ)
    const hitTarget = h.target   && cur >= h.target;
    const hitStop   = h.stopLoss && cur <= h.stopLoss;
    const expired   = daysSince >= 5;

    if(hitTarget || hitStop || expired) {
      h.result      = pnlPct >= 0 ? 'win' : 'loss';
      h.resultDate  = new Date().toISOString();
      h.resultPrice = cur;
      h.pnlPct      = +pnlPct.toFixed(2);
      changed = true;
    } else {
      // ШӘШӯШҜЩҠШ« P&L Ш§Щ„ШӯШ§Щ„ЩҠ
      h.pnlPct = +pnlPct.toFixed(2);
    }
  });
  if(changed) saveHistory(history);
  return history;
}

// в”Җв”Җ ШҘШӯШөШ§ШҰЩҠШ§ШӘ Ш§Щ„ШіШ¬Щ„
function calcHistoryStats(history) {
  const closed  = history.filter(h=>h.result!=='pending');
  const wins    = closed.filter(h=>h.result==='win');
  const losses  = closed.filter(h=>h.result==='loss');
  const pending = history.filter(h=>h.result==='pending');
  const winRate = closed.length ? Math.round(wins.length/closed.length*100) : 0;
  const avgWin  = wins.length
    ? +(wins.reduce((s,h)=>s+(h.pnlPct||0),0)/wins.length).toFixed(2) : 0;
  const avgLoss = losses.length
    ? +(losses.reduce((s,h)=>s+(h.pnlPct||0),0)/losses.length).toFixed(2) : 0;
  const expectancy = closed.length
    ? +((winRate/100)*avgWin + (1-winRate/100)*avgLoss).toFixed(2) : 0;
  return { closed:closed.length, wins:wins.length, losses:losses.length,
           pending:pending.length, winRate, avgWin, avgLoss, expectancy };
}

        <div style="font-size:14px;color:#ff7a00;margin-bottom:8px">Ш®Ш·ШЈ ЩҒЩҠ Ш§Щ„ШӘШ·ШЁЩҠЩӮ</div>
        <div style="font-size:11px;color:#888;margin-bottom:16px">${msg}</div>
        <button onclick="location.reload()" style="background:#0a1020;border:1px solid #3a4560;color:#00c8ff;padding:10px 20px;border-radius:8px;font-size:12px">рҹ”„ ШҘШ№Ш§ШҜШ© Ш§Щ„ШӘШӯЩ…ЩҠЩ„</button>
      </div>`;
  }
  return false;
};

window.onunhandledrejection = function(e) {
  console.error('[Unhandled Promise]', e.reason);
};

function render() {
  try {
    const root = app();
    if(!root) { console.error('[render] Щ„Ш§ ЩҠЩҲШ¬ШҜ div#app'); return; }
    root.innerHTML = '';
    root.appendChild(renderApp());
    if(!state.animatedRecs) state.animatedRecs = new Set();
    if(state.recs) state.recs.forEach(r => state.animatedRecs.add(r.id));
  } catch(e) {
    console.error('[render] Ш®Ш·ШЈ:', e.message, e.stack);
  }
}

function renderApp() {
  return el('div', {id:'main', style:{
    display:'flex', flexDirection:'column',

  }}, [

    renderBottomNav(),

    state.selectedStock && (() => {
      const s   = ALL_STOCKS.find(x=>x.id===state.selectedStock);
      const p   = state.prices[state.selectedStock];
      const ind = state.indicators[state.selectedStock];
      if(!s) return null;
      // вң… ШҘШ°Ш§ Щ„Ш§ ЩҠЩҲШ¬ШҜ ШіШ№Шұ ШЈЩҲ Щ…ШӨШҙШұШ§ШӘ вҖ” ЩҶШ№ШұШ¶ ШөЩҒШӯШ© ШЁШіЩҠШ·Ш©
      if(!p || !ind) return el('div', {style:{
        position:'fixed', top:0, left:0, right:0, bottom:0,
        background:'#050810', zIndex:500,
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        direction:'rtl',
      }}, [
        el('div', {style:{fontSize:'20px', marginBottom:'8px'}}, ['вҸі']),
        el('div', {style:{fontSize:'14px', color:C.text, marginBottom:'4px'}}, [s.name]),
        el('div', {style:{fontSize:'11px', color:C.text2, marginBottom:'16px'}}, ['Ш¬Ш§ШұЩҠ ШӘШӯЩ…ЩҠЩ„ Ш§Щ„ШЁЩҠШ§ЩҶШ§ШӘ...']),
        el('button', {
          style:{background:'rgba(255,255,255,.08)', border:'1px solid #1a2340',
            borderRadius:'8px', padding:'8px 16px', color:C.text, cursor:'pointer'},
          onClick:()=>{ state.selectedStock=null; render(); }

  ]);
}

// в”Җв”Җ Data Check Bar
function renderDataCheck() {
  // ЩҶШӯЩҒШё ШўШ®Шұ ЩӮШұШ§ШЎШ© Щ„Щ„Щ…ШӨШҙШұШ§ШӘ ЩҒЩҠ state Щ„Ш№ШұШ¶ЩҮШ§ ШӯШӘЩү ШЁШ№ШҜ ШҘШәЩ„Ш§ЩӮ Ш§Щ„ШіЩҲЩӮ
  const dc = state.dataCheck;

  // ШҘШ°Ш§ Щ„Щ… ШӘЩҸШӯЩ…Щ‘Щ„ ШЈЩҠ Щ…ШӨШҙШұШ§ШӘ ЩҲЩ„Ш§ ЩҠЩҲШ¬ШҜ cache вҖ” ШЈШ®ЩҒЩҗ Ш§Щ„Щ…ШұШЁШ№
  const hasAnyData = dc.rsi.real > 0 || dc.prices.real > 0;
  if(!hasAnyData && !_indicatorsLoading) return el('div',{},[]);
  const items = [
    {label:'ШЈШіШ№Ш§Шұ', real:dc.prices.real, total:dc.prices.total},
    {label:'RSI',   real:dc.rsi.real,    total:dc.rsi.total},
    {label:'MACD',  real:dc.macd.real,   total:dc.macd.total},
    {label:'MA20',  real:dc.ma.real,     total:dc.ma.total},
    {label:'MA200', real:dc.ma200?.real||0, total:dc.ma200?.total||dc.ma.total},
    {label:'ШҜШ№Щ…',   real:dc.support.real,total:dc.support.total},
    {label:'ATR',   real:dc.atr.real,    total:dc.atr.total},
    {label:'BB',    real:dc.bb.real,     total:dc.bb.total},
  ];

  if(_indicatorsLoading) {
    return el('div', {style:{
      background:'#0a1020', borderBottom:'1px solid var(--border)',
      padding:'8px 16px',
      display:'flex', alignItems:'center', gap:'8px',
    }}, [
      el('div', {style:{
        width:'14px', height:'14px', border:'2px solid #00c8ff44',
        borderTop:'2px solid #00c8ff', borderRadius:'50%',
        animation:'spin 1s linear infinite', flexShrink:0,
      }}),
      el('span', {style:{fontSize:'11px', color:C.blue}}, [
        'вҸі Ш¬Ш§ШұЩҠ ШӘШӯЩ…ЩҠЩ„ Ш§Щ„Щ…ШӨШҙШұШ§ШӘ... (~45 Ш«Ш§ЩҶЩҠШ©)'
      ]),
    ]);
  }

  const session    = getSessionInfo();
  const indTime    = state.indicatorsTime;  // ЩҲЩӮШӘ ШўШ®Шұ ШӘШӯЩ…ЩҠЩ„ Щ…ШӨШҙШұШ§ШӘ
  const isClosed   = !isMarketOpen() && !_indicatorsLoading;

  return el('div', {style:{
    background:'#060b14', borderBottom:'1px solid var(--border)',
    padding:'6px 16px',
  }}, [
    el('div', {style:{
      display:'grid', gridTemplateColumns:'repeat(4,1fr)',
      gap:'4px', marginBottom: isClosed && indTime ? '5px' : '0',
    }},
    items.map(item => {
      const pct  = item.total>0 ? (item.real/item.total*100) : 0;
      const ok   = pct >= 80;
      const warn = pct >= 50;
      const color= ok ? C.green : warn ? C.yellow : C.pink;
      return el('div', {style:{
        background:'#0a1020', borderRadius:'6px',
        padding:'3px 6px', textAlign:'center',
        border:`1px solid ${color}22`,
      }}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, [item.label]),
        el('div', {style:{fontSize:'10px', fontWeight:'700', color}}, [
          item.real+'/'+item.total
        ]),
      ]);
    })
    ),
    // ШҙШұЩҠШ· Ш§Щ„ШӯШ§Щ„Ш© вҖ” ЩҠШёЩҮШұ ЩҒЩӮШ· Ш№ЩҶШҜ ШҘШәЩ„Ш§ЩӮ Ш§Щ„ШіЩҲЩӮ Щ…Ш№ ШЁЩҠШ§ЩҶШ§ШӘ Щ…ШӯЩҒЩҲШёШ©
    isClosed && indTime ? el('div', {style:{
      display:'flex', alignItems:'center', justifyContent:'space-between',
      marginTop:'5px', padding:'4px 8px',
      background:'rgba(255,224,51,0.05)',
      border:'1px solid rgba(255,224,51,0.15)',
      borderRadius:'6px',
    }}, [
      el('span', {style:{fontSize:'10px', color:C.yellow}}, [
        'рҹ•җ ШЁЩҠШ§ЩҶШ§ШӘ Щ…ШӯЩҒЩҲШёШ© вҖ” Ш§Щ„ШіЩҲЩӮ Щ…ШәЩ„ЩӮ'
      ]),
      el('span', {style:{fontSize:'10px', color:C.text3}}, [
        'ШўШ®Шұ ШӘШӯЩ…ЩҠЩ„: ' + new Date(indTime).toLocaleTimeString('ar', {hour:'2-digit', minute:'2-digit'})
      ]),
    ]) : null,
  ]);
}

// в”Җв”Җ Tabs
// в”Җв”Җ ШҙШұЩҠШ· MACD Hist + ШЈШіШЁЩҲШ№ЩҠ (ЩҠШёЩҮШұ ЩҒЩҠ Ш¬Щ…ЩҠШ№ Ш§Щ„ШӘШЁЩҲЩҠШЁШ§ШӘ)
function renderMacdBar() {
  // ЩҶШ¬Щ…Ш№ ШҘШӯШөШ§ШҰЩҠШ§ШӘ Щ…ЩҶ ЩғЩ„ Ш§Щ„ШЈШіЩҮЩ… Ш§Щ„ШӘЩҠ Ш№ЩҶШҜЩҮШ§ ШЁЩҠШ§ЩҶШ§ШӘ
  const inds = Object.values(state.indicators);
  const withHist = inds.filter(i=>i.macdHist!=null);
  if(withHist.length === 0) return null;

  const bullHist  = withHist.filter(i=>i.macdHist>0 && i.macdHistDir==='expanding').length;
  const bearHist  = withHist.filter(i=>i.macdHist<0 && i.macdHistDir==='expanding').length;
  const bullWeek  = withHist.filter(i=>i.weeklyTrend==='bullish').length;
  const total     = withHist.length;
  const moodColor = bullHist > bearHist ? C.green : bearHist > bullHist ? C.pink : C.yellow;
  const moodText  = bullHist > bearHist ? 'ШІШ®Щ… ШөШ§Ш№ШҜ' : bearHist > bullHist ? 'ШІШ®Щ… ЩҮШ§ШЁШ·' : 'Щ…ШӘЩҲШ§ШІЩҶ';

  return el('div', {style:{
    background:'#060b14', borderBottom:'1px solid #1a2340',
    padding:'6px 16px', display:'flex', gap:'8px', alignItems:'center',
    overflowX:'auto',
  }}, [
    // MACD Histogram Ш§Щ„ШіЩҲЩӮ
    el('div', {style:{
      display:'flex', alignItems:'center', gap:'5px', flexShrink:'0',
    }}, [
      el('span', {style:{fontSize:'9px', color:C.text3}}, ['MACD Hist']),
      el('span', {style:{
        fontSize:'10px', fontWeight:'700', color:moodColor,
        background:moodColor+'12', borderRadius:'5px', padding:'2px 7px',
      }}, [bullHist+'вҶ‘ / '+bearHist+'вҶ“ '+moodText]),
    ]),
    el('div', {style:{width:'1px', height:'16px', background:'#1a2340', flexShrink:'0'}}),
    // ШЈШіШЁЩҲШ№ЩҠ
    el('div', {style:{
      display:'flex', alignItems:'center', gap:'5px', flexShrink:'0',
    }}, [
      el('span', {style:{fontSize:'9px', color:C.text3}}, ['ШЈШіШЁЩҲШ№ЩҠ']),
      el('span', {style:{
        fontSize:'10px', fontWeight:'700',
        color: bullWeek/total > 0.6 ? C.green : bullWeek/total < 0.4 ? C.pink : C.yellow,
        background: bullWeek/total > 0.6 ? 'rgba(0,255,136,.1)' : bullWeek/total < 0.4 ? 'rgba(255,45,122,.1)' : 'rgba(255,224,51,.1)',
        borderRadius:'5px', padding:'2px 7px',
      }}, [
        bullWeek/total > 0.6 ? 'вҶ‘ ШөШ§Ш№ШҜ' : bullWeek/total < 0.4 ? 'вҶ“ ЩҮШ§ШЁШ·' : 'вҶ” Щ…ШӘЩҲШ§ШІЩҶ',
      ]),
    ]),
    el('div', {style:{width:'1px', height:'16px', background:'#1a2340', flexShrink:'0'}}),
    // ATR
    (() => {
      const avgATR = withHist.filter(i=>i.atrPct!=null).reduce((s,i)=>s+i.atrPct,0)/Math.max(withHist.filter(i=>i.atrPct!=null).length,1);
      return el('div', {style:{display:'flex', alignItems:'center', gap:'5px', flexShrink:'0'}}, [
        el('span', {style:{fontSize:'9px', color:C.text3}}, ['ATR Щ…ШӘЩҲШіШ·']),
        el('span', {style:{
          fontSize:'10px', fontWeight:'700',
          color: avgATR>4?C.orange:avgATR>2?C.yellow:C.text2,
        }}, [fmt(avgATR,1)+'%']),
      ]);
    })(),
  ]);
}

  ]);
}

// в”Җв”Җ Ш§Щ„ШӘШЁЩҲЩҠШЁШ§ШӘ Ш§Щ„Ш№Щ„ЩҲЩҠШ© (ЩҶШӯШӘЩҒШё ШЁЩҮШ§ Щ„Щ„ЩҖ desktop ЩҒЩӮШ·)
function renderTabs() {
  const tabs = [
    {id:'rec',     icon:'рҹҺҜ', label:'ШӘЩҲШөЩҠШ§ШӘЩҠ'},
    {id:'spec',    icon:'рҹҺІ', label:'Щ…Ш¬Ш§ШІЩҒШ©'},
    {id:'market',  icon:'рҹ“Ҡ', label:'Ш§Щ„ШіЩҲЩӮ'},
    {id:'port',    icon:'рҹ’ј', label:'Щ…ШӯЩҒШёШӘЩҠ'},
    {id:'history', icon:'рҹ“Ҳ', label:'Ш§Щ„ШіШ¬Щ„'},
    {id:'calc',    icon:'рҹ§®', label:'ШӯШ§ШіШЁШ©'},
    {id:'tips',    icon:'рҹ“ҡ', label:'ЩҶШөШ§ШҰШӯ'},
  ];

  const histPending = (() => {
    try {
      const h = JSON.parse(localStorage.getItem('rec_history')||'[]');
      return h.filter(x=>x.result==='pending').length;
    } catch(e) { return 0; }
  })();

  return el('div', {style:{
    display:'flex', background:'#090e1a',
    borderBottom:'1px solid var(--border)',
    overflowX:'auto', padding:'0 4px',
  }},
  tabs.map(t =>
    el('button', {
      style:{
        flex:'0 0 auto', padding:'10px 12px',
        fontSize:'11px', fontWeight:'700',
        color: state.tab===t.id ? C.blue : C.text2,
        background:'none',
        borderBottom: state.tab===t.id ? `2px solid ${C.blue}` : '2px solid transparent',
        whiteSpace:'nowrap', position:'relative',
      },
      onClick: () => { state.tab = t.id; render(); }
    }, [
      t.icon+' '+t.label,
      t.id==='history' && histPending>0
        ? el('span', {style:{
            position:'absolute', top:'6px', right:'2px',
            fontSize:'8px', fontWeight:'900',
            background:C.orange, color:'#050810',
            borderRadius:'8px', padding:'0 4px', minWidth:'14px',
            textAlign:'center', lineHeight:'14px',
          }}, [String(histPending)])
        : null,
    ])
  ));
}

// в”Җв”Җ Content Router
function renderContent() {
  const views = {
    rec:     renderRecTab,
    spec:    renderSpecTab,
    hunter:  renderHunterTab,
    market:  renderMarketTab,
    port:    renderPortTab,
    history: renderHistoryTab,
    calc:    renderCalcTab,
    tips:    renderTipsTab,
  };
  return (views[state.tab]||renderRecTab)();
}

function renderRecTab() {
  const session = getSessionInfo();
  const sInfo   = getMarketSession();

  // ШӯШ§Щ„Ш©: Ш®Ш§ШұШ¬ ШЈЩҲЩӮШ§ШӘ Ш§Щ„ШіЩҲЩӮ вҖ” ЩҲЩ„Ш§ ШӘЩҲШөЩҠШ§ШӘ Щ…ШӯЩҒЩҲШёШ©

    const icon  = sInfo==='pre' ? 'рҹҢ…' : sInfo==='after' ? 'рҹҢҶ' : 'рҹҢҷ';
    const msg   = sInfo==='pre'
      ? 'ЩӮШЁЩ„ Ш§ЩҒШӘШӘШ§Шӯ Ш§Щ„ШіЩҲЩӮ вҖ” Щ„Ш§ ШӘЩҲШөЩҠШ§ШӘ ШЁШ№ШҜ\nШіШӘШЁШҜШЈ Ш§Щ„ШӘЩҲШөЩҠШ§ШӘ Ш§Щ„ШіШ§Ш№Ш© '+(session.sub.split(' ')[2]||'4:30Щ…')
      : sInfo==='after'
      ? 'ШЁШ№ШҜ ШҘШәЩ„Ш§ЩӮ Ш§Щ„ШіЩҲЩӮ вҖ” Щ„Ш§ ШӘЩҲШөЩҠШ§ШӘ Ш¬ШҜЩҠШҜШ©\nШ§Щ„ШӘЩҲШөЩҠШ§ШӘ Ш§Щ„ЩӮШ§ШҜЩ…Ш© Ш№ЩҶШҜ ЩҒШӘШӯ Ш§Щ„ШіЩҲЩӮ Ш§Щ„ШәШҜ'
      : 'Ш§Щ„ШіЩҲЩӮ Щ…ШәЩ„ЩӮ вҖ” Щ„Ш§ ШӘЩҲШөЩҠШ§ШӘ\nШіШӘШЁШҜШЈ Ш§Щ„ШӘЩҲШөЩҠШ§ШӘ Ш№ЩҶШҜ ЩҒШӘШӯ Ш§Щ„ШіЩҲЩӮ 4:30Щ…';

    return el('div', {style:{textAlign:'center', padding:'60px 20px'}}, [

      el('div', {style:{fontSize:'14px', fontWeight:'800', color:C.text, marginBottom:'8px'}}, [session.label]),
      el('div', {style:{fontSize:'11px', color:C.text2, lineHeight:'1.8', whiteSpace:'pre-line'}}, [msg]),

        marginTop:'16px', fontSize:'11px', color:C.green,

      el('button', {
        style:{
          marginTop:'16px', padding:'10px 20px',
          background:'rgba(0,200,255,.1)', border:'1px solid rgba(0,200,255,.3)',
          borderRadius:'10px', color:C.blue, fontSize:'12px', fontWeight:'700',
          cursor:'pointer',
        },
        onClick: () => { window.DEBUG_MARKET = true; state.indicatorsDone=false; _recsLockedToday=false; loadData(true).then(()=>render()); }
      }, ['рҹ“Ҡ ШӘШӯЩ„ЩҠЩ„ Ш§Щ„ШўЩҶ (Ш®Ш§ШұШ¬ ШЈЩҲЩӮШ§ШӘ Ш§Щ„ШіЩҲЩӮ)']),

  // ШӯШ§Щ„Ш©: Ш¬Ш§ШұЩҠ Ш§Щ„ШӘШӯЩ…ЩҠЩ„
  if(_indicatorsLoading) {
    return el('div', {style:{padding:'20px 16px'}}, [
      el('div', {style:{
        background:'#0a1020', borderRadius:'14px',
        border:'1px solid rgba(0,200,255,.2)',

      }}, [

        el('div', {style:{fontSize:'10px', color:C.text3, marginTop:'8px'}}, [
          'ЩҠШіШӘШәШұЩӮ ~20 Ш«Ш§ЩҶЩҠШ© Щ„Щ„ШӯШөЩҲЩ„ Ш№Щ„Щү ШЁЩҠШ§ЩҶШ§ШӘ ШҜЩӮЩҠЩӮШ©'
        ]),
      ]),
      renderDataCheck(),
    ]);
  }

  // ШӯШ§Щ„Ш©: Щ„Ш§ ШӘЩҲШөЩҠШ§ШӘ
  if(!state.recs || state.recs.length===0) {
    const trend = state.marketTrend;
    const spyChg = state.spyChange;
    const trendMsg = trend==='bearish'
      ? 'рҹ“ү Ш§Щ„ШіЩҲЩӮ ЩҮШ§ШЁШ· вҖ” Ш§Щ„ШЈШҜШ§Ш© ШӘШӯЩ…ЩҠ ШұШЈШіЩ…Ш§Щ„Щғ ШЁШӘЩӮЩ„ЩҠЩ„ Ш§Щ„ШӘЩҲШөЩҠШ§ШӘ'
      : trend==='neutral'
      ? 'вҡ пёҸ Ш§Щ„ШіЩҲЩӮ Щ…ШӯШ§ЩҠШҜ вҖ” Щ„Ш§ ЩҒШұШө ШӘШіШӘЩҲЩҒЩҠ Ш§Щ„ШҙШұЩҲШ· ШӯШ§Щ„ЩҠШ§ЩӢ'
      : 'рҹ”Қ Ш§Щ„ШіЩҲЩӮ ШөШ§Ш№ШҜ Щ„ЩғЩҶ Щ„Ш§ ШіЩҮЩ… ЩҠШіШӘЩҲЩҒЩҠ ЩғЩ„ Ш§Щ„ШҙШұЩҲШ· Ш§Щ„ЩҠЩҲЩ…';

    return el('div', {style:{padding:'20px 16px', textAlign:'center'}}, [
      el('div', {style:{fontSize:'40px', marginBottom:'12px'}}, ['рҹ”Қ']),
      el('div', {style:{fontSize:'14px', fontWeight:'700', color:C.text, marginBottom:'8px'}}, [
        'Щ„Ш§ ШӘЩҲШ¬ШҜ ШӘЩҲШөЩҠШ§ШӘ ШӘШіШӘЩҲЩҒЩҠ Ш§Щ„ШҙШұЩҲШ· Ш§Щ„ЩҠЩҲЩ…'
      ]),
      // ШӯШ§Щ„Ш© Ш§Щ„ШіЩҲЩӮ
      spyChg!==null && el('div', {style:{
        display:'flex', justifyContent:'center', gap:'10px',
        marginBottom:'10px', fontSize:'11px', fontWeight:'700',
      }}, [
        el('span', {style:{color:spyChg>=0?C.green:C.pink}},
          ['SPY '+(spyChg>=0?'+':'')+spyChg.toFixed(2)+'%']),
        el('span', {style:{color:state.qqqChange>=0?C.green:C.pink}},
          ['QQQ '+(state.qqqChange>=0?'+':'')+state.qqqChange.toFixed(2)+'%']),
      ]),
      el('div', {style:{
        fontSize:'11px', color:C.text2, lineHeight:'1.9',
        background:'rgba(255,255,255,.03)', borderRadius:'10px',
        padding:'10px 14px', marginBottom:'10px', textAlign:'right',
      }}, [
        el('div', {style:{fontWeight:'700', color:C.text, marginBottom:'4px'}}, ['Ш§Щ„ШҙШұЩҲШ· Ш§Щ„ШӘШіШ№Ш© Ш§Щ„Щ…Ш·Щ„ЩҲШЁШ©:']),
        'вҖў ШҘШҙШ§ШұШ© ШҙШұШ§ШЎ Щ…ЩҶ 10 Щ…ШӨШҙШұШ§ШӘ', el('br'),
        'вҖў Ш«ЩӮШ© 60%+ вҖў Ш¬ЩҲШҜШ© ШөЩҒЩӮШ© 35%+', el('br'),
        'вҖў ЩҮШҜЩҒ ШұШЁШӯ 2%+ вҖў R/R 1:1+', el('br'),
        'вҖў Щ„Ш§ ШЈШұШЁШ§Шӯ Ш®Щ„Ш§Щ„ 5 ШЈЩҠШ§Щ…', el('br'),
        'вҖў Щ„Ш§ gap-up ШЈЩғШ«Шұ Щ…ЩҶ 8%', el('br'),
        'вҖў ШӘЩҲЩӮЩҠШӘ Щ…ЩӮШЁЩҲЩ„ вҖў ЩҒЩҲЩӮ MA50',
      ]),

        fontSize:'11px', color:C.yellow,

      }}, [trendMsg]),

        el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.text}}, [
          'рҹҺҜ ШӘЩҲШөЩҠШ§ШӘ Ш§Щ„ЩҠЩҲЩ… вҖ” '+state.recs.length+' ШЈШіЩҮЩ…'
        ]),
        el('div', {style:{fontSize:'10px', color:C.text2}}, [
          state.recsTime ? 'ШўШ®Шұ ШӘШӯШҜЩҠШ«: '+state.recsTime.toLocaleTimeString('ar') : ''
        ]),
      ]),
    ]),

    // Ш§Щ„ШЁШ·Ш§ЩӮШ§ШӘ
    ...state.recs.map((r,idx) => renderRecCard(r, idx)),
  ]);
}

function renderRecCard(r, idx) {
  const isSelected = state.selected === r.id;
  const sigColor = r.signal.includes('ЩӮЩҲЩҠ') ? C.green :
                   r.signal.includes('ШҙШұШ§ШЎ') ? C.blue : C.yellow;

  // в”Җв”Җ ЩҶЩҲШ№ Ш§Щ„ШЈЩ…Шұ вҖ” Щ…ЩҶШ·ЩӮ ШөШӯЩҠШӯ
  // ШӯШ§Щ„Ш© 1: Ш§Щ„ШіШ№Шұ Ш№ЩҶШҜ Ш§Щ„ШҜШ№Щ… Щ…ШЁШ§ШҙШұШ© (ЩҒШұЩӮ ШЈЩӮЩ„ Щ…ЩҶ 1%) вҶ’ ШЈЩ…Шұ ШіЩҲЩӮ
  // ШӯШ§Щ„Ш© 2: Ш§Щ„ШіШ№Шұ ШЈШ№Щ„Щү Щ…ЩҶ Ш§Щ„ШҜШ№Щ… ШЁЩҖ 1-10%           вҶ’ ШЈЩ…Шұ Щ…ШӯШҜШҜ Ш№ЩҶШҜ Ш§Щ„ШҜШ№Щ… (Ш§ЩҶШӘШёШұ ШӘШұШ§Ш¬Ш№)
  // ШӯШ§Щ„Ш© 3: Щ„Ш§ ЩҠЩҲШ¬ШҜ ШҜШ№Щ… ЩҲШ§Ш¶Шӯ                       вҶ’ ШЈЩ…Шұ ШіЩҲЩӮ ШЁШ§Щ„ШіШ№Шұ Ш§Щ„ШӯШ§Щ„ЩҠ
  const distToSup  = r.support>0 ? (r.price - r.support) / r.price * 100 : 0;
  const atSupport  = r.nearSupport || distToSup < 1;
  const hasSupport = r.support>0 && distToSup > 0;

  let orderType, orderColor, orderNote, buyPrice;

  if(atSupport) {
    // Ш§Щ„ШіШ№Шұ Ш№ЩҶШҜ Ш§Щ„ШҜШ№Щ… Ш§Щ„ШўЩҶ вҖ” Ш§ШҙШӘШұЩҠ ШЁШіШ№Шұ Ш§Щ„ШіЩҲЩӮ
    orderType  = 'ШЈЩ…Шұ ШіЩҲЩӮ';
    orderColor = C.green;
    orderNote  = 'Ш§Щ„ШіШ№Шұ Ш№ЩҶШҜ Ш§Щ„ШҜШ№Щ… вҖ” Ш§ШҙШӘШұЩҠ ЩҒЩҲШұШ§ЩӢ';
    buyPrice   = r.price;
  } else if(hasSupport && distToSup <= 10) {
    // Ш§Щ„ШіШ№Шұ ЩҒЩҲЩӮ Ш§Щ„ШҜШ№Щ… вҖ” Ш¶Ш№ ШЈЩ…Шұ Щ…ШӯШҜШҜ Ш№ЩҶШҜ Ш§Щ„ШҜШ№Щ… ЩҲШ§ЩҶШӘШёШұ Ш§Щ„ШӘШұШ§Ш¬Ш№
    orderType  = 'ШЈЩ…Шұ Щ…ШӯШҜШҜ';
    orderColor = C.blue;
    orderNote  = 'Ш§ЩҶШӘШёШұ ШӘШұШ§Ш¬Ш№ Ш§Щ„ШіШ№Шұ Щ„Щ„ШҜШ№Щ… вҖ” ЩҠЩҶЩҒШ° ШӘЩ„ЩӮШ§ШҰЩҠШ§ЩӢ';
    buyPrice   = r.support * 1.002; // ШіЩҶШӘШ§ШӘ ЩҒЩҲЩӮ Ш§Щ„ШҜШ№Щ… Щ„Ш¶Щ…Ш§ЩҶ Ш§Щ„ШӘЩҶЩҒЩҠШ°
  } else {
    // Ш§Щ„ШіШ№Шұ ШЁШ№ЩҠШҜ Ш№ЩҶ Ш§Щ„ШҜШ№Щ… ШЈЩҲ Щ„Ш§ ЩҠЩҲШ¬ШҜ ШҜШ№Щ… вҖ” ШЈЩ…Шұ ШіЩҲЩӮ ШЁШ§Щ„ШіШ№Шұ Ш§Щ„ШӯШ§Щ„ЩҠ
    orderType  = 'ШЈЩ…Шұ ШіЩҲЩӮ';
    orderColor = C.yellow;
    orderNote  = 'Ш§ШҜШ®Щ„ ШЁШіШ№Шұ Ш§Щ„ШіЩҲЩӮ вҖ” ШұШ§ЩӮШЁ ЩҲЩӮЩҒ Ш§Щ„Ш®ШіШ§ШұШ©';
    buyPrice   = r.price;
  }

  return el('div', {
    class: state.animatedRecs?.has(r.id) ? '' : 'fade-up',
    style:{
      background:'#0a1020', borderRadius:'14px',
      border:`1px solid ${r.isConviction ? '#ffe03344' : 'var(--border)'}`,
      padding:'14px', marginBottom:'10px',
      animationDelay: idx*0.05+'s',
    },
    onClick: () => { state.selected = isSelected ? null : r.id; render(); }
  }, [

    // в”Җв”Җ 1. ШұШЈШі Ш§Щ„ШЁШ·Ш§ЩӮШ©: Ш§ШіЩ… + ШҘШҙШ§ШұШ©
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'8px'}}, [
      el('div', {}, [
        el('div', {style:{display:'flex', alignItems:'center', gap:'6px', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'16px', fontWeight:'900', color:C.text}}, [r.name]),
          el('span', {style:{fontSize:'10px', color:C.text2}}, [r.id]),
          r.isConviction && el('span', {style:{
            fontSize:'9px', color:C.yellow, background:'rgba(255,224,51,.12)',
            borderRadius:'4px', padding:'1px 5px', border:'1px solid rgba(255,224,51,.3)',
          }}, ['вӯҗ High Conviction']),
        ]),
        el('div', {style:{fontSize:'10px', color:C.text2}}, [r.sector]),
      ]),
      el('div', {style:{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:'4px'}}, [
        el('div', {style:{
          background: sigColor+'22', border:`1px solid ${sigColor}44`,
          borderRadius:'8px', padding:'4px 10px',
          fontSize:'11px', fontWeight:'700', color:sigColor,
        }}, [r.signal]),
        r.isCooldown && el('span', {style:{
          fontSize:'9px', fontWeight:'700', padding:'2px 6px',
          borderRadius:'20px', background:'rgba(255,45,122,.15)',
          color:'#ff2d7a', border:'1px solid rgba(255,45,122,.3)',
        }}, ['вҸёпёҸ Cooldown']),
      ]),
    ]),

    // в”Җв”Җ 1.5 ШӘЩҶШЁЩҠЩҮ "ШёЩҮШұ ШЈЩ…Ші" вҖ” ЩҠШӯЩ…ЩҠ Щ…ЩҶ Ш§Щ„ШӘЩғШұШ§Шұ
    (() => {
      const history = loadHistory();
      const yesterday = new Date();

      const trend1    = r.weeklyTrend==='bullish' ? 1.2 : 0.8;
      const days = Math.max(1, Math.ceil(r.profitPct / (r.atrPct * momentum1 * trend1)));
      const type = days <= 1 ? {label:'рҹ”Ҙ ЩҠЩҲЩ…ЩҠ', color:C.pink,    desc:'ЩӮШҜ ШӘШөЩ„ Ш§Щ„ЩҮШҜЩҒ Ш§Щ„ЩҠЩҲЩ… вҖ” ШұШ§ЩӮШЁ ЩғЩ„ ШіШ§Ш№Ш©'}
                 : days <= 3 ? {label:'вҡЎ ЩӮШөЩҠШұ',  color:C.orange,  desc:'1-3 ШЈЩҠШ§Щ… ШӘШҜШ§ЩҲЩ„ вҖ” ШұШ§ЩӮШЁ ЩҠЩҲЩ…ЩҠШ§ЩӢ'}
                 : days <= 7 ? {label:'рҹ“… ШЈШіШЁЩҲШ№ЩҠ',color:C.blue,    desc:'3-7 ШЈЩҠШ§Щ… вҖ” Ш§ШөШЁШұ ЩҲЩ„Ш§ ШӘШӘШіШұШ№ ЩҒЩҠ Ш§Щ„Ш®ШұЩҲШ¬'}
                 :             {label:'вҸі Щ…ШӘЩҲШіШ·', color:C.text2,   desc:'ШЈЩғШ«Шұ Щ…ЩҶ ШЈШіШЁЩҲШ№ вҖ” ЩҮЩ„ ЩҠЩҶШ§ШіШЁЩғ ЩғЩ…Ш¶Ш§ШұШЁ ЩҠЩҲЩ…ЩҠШҹ'};
      return el('div', {style:{
        background:'#060b14', border:`1px solid ${type.color}33`,
        borderRadius:'8px', padding:'8px 12px', marginTop:'8px',
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}, [
        el('div', {}, [
          el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'2px'}}, ['вҸұпёҸ Щ…ШҜШ© Ш§Щ„ШөЩҒЩӮШ© Ш§Щ„Щ…ШӘЩҲЩӮШ№Ш©']),
          el('div', {style:{fontSize:'12px', fontWeight:'800', color:type.color}}, [type.label]),
          el('div', {style:{fontSize:'9px', color:C.text2, marginTop:'2px'}}, [type.desc]),
        ]),
        el('div', {style:{textAlign:'left', flexShrink:'0'}}, [
          el('div', {style:{fontSize:'18px', fontWeight:'900', color:type.color}}, [days+''])  ,
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['ЩҠЩҲЩ… ШӘШҜШ§ЩҲЩ„']),
        ]),
      ]);
    })(),

    // в”Җв”Җ 8. Ш§Щ„ШӘЩҒШ§ШөЩҠЩ„ (Ш№ЩҶШҜ Ш§Щ„Ш¶ШәШ·) вҖ” Щ…ШЁШіШ·Ш©
    isSelected && el('div', {style:{borderTop:'1px solid var(--border)', paddingTop:'10px', marginTop:'2px'}}, [
      r.reasons.length>0 && el('div', {style:{marginBottom:'8px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text2, marginBottom:'4px', fontWeight:'700'}}, ['рҹ“Ӣ ШЈШіШЁШ§ШЁ Ш§Щ„ШӘЩҲШөЩҠШ©:']),
        ...r.reasons.map(reason =>
          el('div', {style:{fontSize:'10px', color:C.green, marginBottom:'2px'}}, ['вң“ '+reason])
        ),
      ]),
      el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px', fontSize:'10px'}}, [
        r.stochRsi!=null && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 8px'}}, [
          el('div', {style:{color:C.text3}}, ['Stoch RSI']),
          el('div', {style:{fontWeight:'700', color:r.stochRsi<20?C.green:r.stochRsi>80?C.pink:C.blue}},
            [fmt(r.stochRsi)+'%']),
        ]),
        r.macd!=null && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 8px'}}, [
          el('div', {style:{color:C.text3}}, ['MACD']),
          el('div', {style:{fontWeight:'700', color:r.macd>0?C.green:C.pink}},
            [fmt(r.macd,3)+' '+(r.macd>0?'вҶ‘':'вҶ“')]),
        ]),
        r.riskReward>0 && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 8px'}}, [
          el('div', {style:{color:C.text3}}, ['R/R ЩҶШіШЁШ©']),
          el('div', {style:{fontWeight:'700', color:r.riskReward>=2?C.green:C.yellow}},
            [fmt(r.riskReward,1)+'x']),
        ]),
        r.atrPct!=null && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 8px'}}, [
          el('div', {style:{color:C.text3}}, ['ATR ШӘШ°ШЁШ°ШЁ']),
          el('div', {style:{fontWeight:'700', color:r.atrPct<2?C.green:r.atrPct<4?C.blue:C.orange}},
            [fmt(r.atrPct,1)+'%']),
        ]),
      ].filter(Boolean)),
      // вң… ШЈЩҶЩ…Ш§Ш· Ш§Щ„ШҙЩ…ЩҲШ№ ЩҒЩҠ Ш§Щ„ШӘЩҒШ§ШөЩҠЩ„
      r.candlePatterns?.length > 0 && el('div', {style:{
        marginTop:'8px', background:'#060b14', borderRadius:'8px', padding:'8px 10px',
      }}, [
        el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'5px', fontWeight:'700'}}, ['рҹ•Ҝ ШЈЩҶЩ…Ш§Ш· Ш§Щ„ШҙЩ…ЩҲШ№ Ш§Щ„Щ…ЩғШӘШҙЩҒШ©']),
        ...r.candlePatterns.map(p2 => el('div', {style:{
          display:'flex', alignItems:'center', gap:'6px',
          fontSize:'10px', color:p2.color, marginBottom:'3px',
        }}, [
          el('span',{style:{fontWeight:'800'}},[p2.icon+' '+p2.ar]),
          el('span',{style:{color:C.text3, fontSize:'9px'}},[' вҖ” '+p2.tip]),
        ])),
      ]),
      r.earnings<999 && el('div', {style:{
        fontSize:'10px', color:C.orange, marginTop:'8px',
        background:'rgba(255,122,0,.08)', borderRadius:'6px', padding:'5px 8px',
      }}, ['вҡ пёҸ ЩҶШӘШ§ШҰШ¬ Ш§Щ„ШЈШұШЁШ§Шӯ Ш®Щ„Ш§Щ„ '+r.earnings+' ЩҠЩҲЩ…']),
    ]),
  ]);
}

    ]);
  }

  if(!state.indicatorsDone) {
    return el('div', {style:{padding:'40px 16px', textAlign:'center'}}, [
      el('div', {style:{fontSize:'40px', marginBottom:'12px'}}, ['рҹҺІ']),
      el('div', {style:{fontSize:'13px', color:C.text2}}, [
        'ШіЩҠШӘЩ… ШӯШіШ§ШЁ ЩҒШұШө Ш§Щ„Щ…Ш¬Ш§ШІЩҒШ© ШЁШ№ШҜ ШӘШӯЩ…ЩҠЩ„ Ш§Щ„Щ…ШӨШҙШұШ§ШӘ'
      ]),
    ]);

  // в•җв•җ ШӘШӯШ°ЩҠШұ Ш§Щ„ШіЩҲЩӮ Ш§Щ„ЩҮШ§ШЁШ· Ш§Щ„ШӯЩӮЩҠЩӮЩҠ (ШЈЩӮЩ„ Щ…ЩҶ -1.5%)
  if(state.marketTrend === 'bearish') {
    return el('div', {style:{padding:'20px 16px'}}, [
      el('div', {style:{
        background:'rgba(255,45,122,.08)', border:'1px solid rgba(255,45,122,.3)',
        borderRadius:'14px', padding:'20px', textAlign:'center',
      }}, [
        el('div', {style:{fontSize:'36px', marginBottom:'10px'}}, ['рҹӣ‘']),
        el('div', {style:{fontSize:'14px', fontWeight:'700', color:C.pink, marginBottom:'6px'}}, [
          'Ш§Щ„ШіЩҲЩӮ ЩҮШ§ШЁШ· вҖ” Щ„Ш§ Щ…Ш¬Ш§ШІЩҒШ© Ш§Щ„ЩҠЩҲЩ…'
        ]),
        el('div', {style:{fontSize:'11px', color:C.text2, lineHeight:'1.8', marginBottom:'10px'}}, [
          'SPY: '+(state.spyChange>=0?'+':'')+fmt(state.spyChange)+'%',
          el('br'),
          'QQQ: '+(state.qqqChange>=0?'+':'')+fmt(state.qqqChange)+'%',
          el('br'),
          'ШЈШіЩҮЩ… Ш§Щ„Щ…Ш¬Ш§ШІЩҒШ© ШӘЩҶЩҮШ§Шұ ШЁШіШұШ№Ш© ЩҒЩҠ Ш§Щ„ШіЩҲЩӮ Ш§Щ„ЩҮШ§ШЁШ·',
        ]),
        el('div', {style:{
          fontSize:'11px', color:C.orange,
          background:'rgba(255,122,0,.08)', borderRadius:'8px',
          padding:'8px 12px', border:'1px solid rgba(255,122,0,.2)',
        }}, ['Ш§ЩҶШӘШёШұ ШӯШӘЩү ЩҠШіШӘЩӮШұ Ш§Щ„ШіЩҲЩӮ ЩӮШЁЩ„ Ш§Щ„Щ…Ш¬Ш§ШІЩҒШ© вң…']),
      ]),
    ]);
  }

  const specs = state.speculativeRecs || [];

  const trendColor = state.marketTrend==='bullish'?C.green:
                     state.marketTrend==='bearish'?C.pink:C.yellow;
  const trendLabel = state.marketTrend==='bullish'?'Ш§Щ„ШіЩҲЩӮ ШөШ§Ш№ШҜ вң…':
                     state.marketTrend==='bearish'?'Ш§Щ„ШіЩҲЩӮ ЩҮШ§ШЁШ· рҹӣ‘':
                     state.marketTrend==='neutral' ?'Ш§Щ„ШіЩҲЩӮ Щ…ШӯШ§ЩҠШҜ вҡ пёҸ':'Ш¬Ш§ШұЩҠ Ш§Щ„ШӘШӯЩӮЩӮ...';

  return el('div', {style:{padding:'12px 16px'}}, [
    el('div', {style:{marginBottom:'12px'}}, [
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'6px'}}, [
        el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.purple}}, [
          'рҹҺІ ШұШ§ШҜШ§Шұ Ш§Щ„Щ…Ш¬Ш§ШІЩҒШ© вҖ” '+specs.length+' ЩҒШұШөШ©'
        ]),
        el('div', {style:{fontSize:'10px', fontWeight:'700', color:trendColor}}, [trendLabel]),
      ]),
      // SPY + QQQ
      state.spyChange!==null && el('div', {style:{
        display:'flex', gap:'8px', fontSize:'10px',
        background:'#060b14', borderRadius:'8px', padding:'5px 8px',
        marginBottom:'6px',
      }}, [
        el('span', {style:{color:C.text2}}, ['Щ…ШӨШҙШұ Ш§Щ„ШіЩҲЩӮ:']),
        el('span', {style:{color:state.spyChange>=0?C.green:C.pink, fontWeight:'700'}}, [
          'SPY '+(state.spyChange>=0?'+':'')+fmt(state.spyChange)+'%'
        ]),
        el('span', {style:{color:state.qqqChange>=0?C.green:C.pink, fontWeight:'700'}}, [
          'QQQ '+(state.qqqChange>=0?'+':'')+fmt(state.qqqChange)+'%'
        ]),
      ]),
      el('div', {style:{
        fontSize:'10px', color:C.orange,
        background:'rgba(255,45,122,.06)', borderRadius:'6px',
        padding:'5px 8px', border:'1px solid rgba(255,45,122,.2)',
      }}, ['вҡ пёҸ ШЈШіЩҮЩ… Щ…Ш¬Ш§ШІЩҒШ© вҖ” Ш®ШөШө 5-8% ЩҒЩӮШ· Щ…ЩҶ ШұШЈШі Щ…Ш§Щ„Щғ Щ„ЩғЩ„ ШөЩҒЩӮШ©']),
    ]),

    specs.length===0 ?
      el('div', {style:{textAlign:'center', padding:'40px 0', color:C.text2, fontSize:'12px'}}, [
        'Щ„Ш§ ШӘЩҲШ¬ШҜ ЩҒШұШө Щ…Ш¬Ш§ШІЩҒШ© ШӘШіШӘЩҲЩҒЩҠ Ш§Щ„ШҙШұЩҲШ· Ш§Щ„ШўЩҶ'
      ]) :
      el('div', {}, specs.map((s,i) => renderSpecCard(s,i))),
  ]);
}

function renderSpecCard(s, idx) {
  const isSelected  = state.selected === s.id+'_spec';
  const labelColor  = s.score>=80?C.green:s.score>=65?C.orange:s.score>=50?C.yellow:C.text2;
  const entryColor  = s.entryTiming==='Ш§ШҜШ®Щ„ Ш§Щ„ШўЩҶ'?C.green:
                      s.entryTiming==='Щ…ЩӮШЁЩҲЩ„'?C.blue:
                      s.entryTiming==='Ш§ЩҶШӘШёШұ'?C.yellow:C.orange;
  const rrColor     = s.riskReward>=3?C.green:s.riskReward>=2?C.blue:C.yellow;

  // ЩҶЩҲШ№ Ш§Щ„ШЈЩ…Шұ
  const distToSup = s.support>0 ? (s.price-s.support)/s.price*100 : 999;
  const atSup     = s.nearSupport || distToSup < 1;
  const hasSup    = s.support>0 && distToSup>0 && distToSup<=18;
  const orderType = atSup ? 'ШЈЩ…Шұ ШіЩҲЩӮ' : hasSup ? 'ШЈЩ…Шұ Щ…ШӯШҜШҜ' : 'ШЈЩ…Шұ ШіЩҲЩӮ';
  const orderColor= atSup ? C.green   : hasSup  ? C.purple  : C.yellow;
  const buyPrice  = hasSup && !atSup  ? s.support*1.002 : s.price;

  return el('div', {
    class:'fade-up',
    style:{
      background:'#0a1020', borderRadius:'14px',
      border:'1px solid rgba(180,79,255,.25)',
      padding:'14px', marginBottom:'12px',
      animationDelay: idx*0.05+'s',
    },
    onClick: () => { state.selected = isSelected?null:s.id+'_spec'; render(); }
  }, [

    // в”Җв”Җ 1. ШұШЈШі Ш§Щ„ШЁШ·Ш§ЩӮШ©
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'8px'}}, [
      el('div', {}, [
        el('div', {style:{display:'flex', alignItems:'center', gap:'6px', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'16px', fontWeight:'900', color:C.text}}, [s.name]),
          el('span', {style:{fontSize:'10px', color:C.text3}}, [s.id]),
          el('span', {style:{
            fontSize:'9px', color:C.purple,
            background:'rgba(180,79,255,.12)', borderRadius:'4px', padding:'1px 6px',
          }}, ['ОІ'+fmt(s.beta,1)]),
        ]),
        el('div', {style:{fontSize:'10px', color:C.text3}}, [s.sector]),
      ]),
      el('div', {style:{textAlign:'left'}}, [
        el('div', {style:{fontSize:'11px', fontWeight:'800', color:labelColor}}, [s.label]),
        el('div', {style:{fontSize:'10px', color:C.text, fontWeight:'700'}}, [
          '$'+fmt(s.price,2),
          el('span', {style:{color:s.change>=0?C.green:C.pink, marginRight:'4px'}},
            [' '+(s.change>=0?'+':'')+fmt(s.change,1)+'%']),
        ]),
      ]),
    ]),

    // в”Җв”Җ 2. ШҙШұЩҠШ· Ш§Щ„ЩӮЩҲШ© + Щ…Ш№Щ„ЩҲЩ…Ш§ШӘ Ш§Щ„Щ…Ш¬Ш§ШІЩҒШ©
    el('div', {style:{marginBottom:'8px'}}, [
      // ШҙШұЩҠШ· Ш§Щ„ЩӮЩҲШ© Щ…Ш№ Ш§Щ„ЩҶШіШЁШ©
      el('div', {style:{display:'flex', alignItems:'center', gap:'8px', marginBottom:'5px'}}, [
        el('div', {style:{flex:1, height:'4px', background:'#1a2340', borderRadius:'2px'}}, [
          el('div', {style:{
            height:'4px', borderRadius:'2px', width:Math.min(100,s.score)+'%',
            background:'linear-gradient(90deg,'+C.purple+','+C.pink+')',
          }}),
        ]),
        el('span', {style:{fontSize:'10px', fontWeight:'700', color:labelColor, flexShrink:0}},
          [s.score+'/100']),
      ]),
      // Щ…Ш№Щ„ЩҲЩ…Ш§ШӘ Ш§Щ„Щ…Ш¬Ш§ШІЩҒШ© Ш§Щ„Ш«Щ„Ш§Ш«Ш©: ATR + Beta + R/R
      el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'5px'}}, [
        el('div', {style:{
          background:'rgba(255,122,0,.08)', borderRadius:'6px',
          padding:'4px 6px', textAlign:'center',
        }}, [
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['рҹ“Ҳ ATR']),
          el('div', {style:{fontSize:'11px', fontWeight:'800', color:C.orange}},
            [fmt(s.atrPct,1)+'%']),
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['ШӘШ°ШЁШ°ШЁ']),
        ]),
        el('div', {style:{
          background:'rgba(180,79,255,.08)', borderRadius:'6px',
          padding:'4px 6px', textAlign:'center',
        }}, [
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['вҡЎ Beta']),
          el('div', {style:{fontSize:'11px', fontWeight:'800', color:C.purple}},
            [fmt(s.beta,1)+'x']),
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['ШӘЩӮЩ„ШЁ']),
        ]),
        el('div', {style:{
          background: s.riskReward>=3?'rgba(0,255,136,.08)':'rgba(0,200,255,.08)',
          borderRadius:'6px', padding:'4px 6px', textAlign:'center',
        }}, [
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['вҡ–пёҸ R/R']),
          el('div', {style:{
            fontSize:'11px', fontWeight:'800',
            color: s.riskReward>=3?C.green:C.blue,
          }}, [fmt(s.riskReward,1)+'x']),
          el('div', {style:{fontSize:'8px', color:C.text3}},
            [s.riskReward>=3?'Щ…Щ…ШӘШ§ШІ':'Ш¬ЩҠШҜ']),
        ]),
      ]),
    ]),

    // в”Җв”Җ 3. ШіШЁШЁ Ш§Щ„Ш§Ш®ШӘЩҠШ§Шұ вҖ” ЩҲШ§Ш¶Шӯ ЩҲЩ…ШЁШ§ШҙШұ
    s.reasons.length>0 && el('div', {style:{
      background:'rgba(180,79,255,.06)', border:'1px solid rgba(180,79,255,.15)',
      borderRadius:'8px', padding:'8px 10px', marginBottom:'8px',
    }}, [
      el('div', {style:{fontSize:'9px', color:C.purple, fontWeight:'700', marginBottom:'5px'}},
        ['рҹ’Ў Щ„Щ…Ш§Ш°Ш§ ЩҮШ°Ш§ Ш§Щ„ШіЩҮЩ…Шҹ']),
      ...s.reasons.map(r => el('div', {style:{
        fontSize:'10px', color:C.text2, marginBottom:'3px', display:'flex', gap:'6px',
      }}, [
        el('span', {style:{color:C.purple, flexShrink:0}}, ['вҖў']),
        el('span',{}, [r]),
      ])),
    ]),

    // в”Җв”Җ 4. ШӘШӯШ°ЩҠШұШ§ШӘ (ШҘШ°Ш§ ЩҲШ¬ШҜШӘ)
    s.warnings?.length>0 && el('div', {style:{
      background:'rgba(255,122,0,.06)', border:'1px solid rgba(255,122,0,.2)',
      borderRadius:'8px', padding:'6px 10px', marginBottom:'8px',
    }}, [
      ...s.warnings.map(w => el('div', {style:{
        fontSize:'9px', color:C.orange, marginBottom:'2px',
      }}, ['вҡ пёҸ '+w])),
    ]),

    // в”Җв”Җ 4b. Price Target Ш§Щ„Щ…ШӯЩ„Щ„ЩҠЩҶ
    state.priceTargets?.[s.id]?.consensus && (() => {
      const pt   = state.priceTargets[s.id];
      const diff = ((pt.consensus - s.price) / s.price * 100).toFixed(1);
      const color = diff > 0 ? C.green : C.pink;
      return el('div', {style:{
        background:'rgba(180,79,255,.06)', borderRadius:'8px',
        padding:'6px 10px', marginBottom:'8px',
        border:'1px solid rgba(180,79,255,.2)',
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}, [
        el('div', {style:{fontSize:'10px', color:C.text2}}, ['рҹ‘ЁвҖҚрҹ’ј ЩҮШҜЩҒ Ш§Щ„Щ…ШӯЩ„Щ„ЩҠЩҶ']),
        el('div', {style:{textAlign:'left'}}, [
          el('div', {style:{fontSize:'12px', fontWeight:'700', color}}, [
            '$'+fmt(pt.consensus,2)+' ('+(diff>0?'+':'')+diff+'%)'
          ]),
          pt.high && pt.low && el('div', {style:{fontSize:'9px', color:C.text3}}, [
            'ШЈШ№Щ„Щү: $'+fmt(pt.high,2)+' | ШЈШҜЩҶЩү: $'+fmt(pt.low,2)
          ]),
        ]),
      ]);
    })(),

        display:'flex', alignItems:'center', gap:'6px', marginBottom:'3px',
      }}, [
        el('span', {style:{fontSize:'16px'}}, [
          s.topCandle.signal==='bullish'?'вң…':s.topCandle.signal==='bearish'?'рҹҡЁ':'вҡ пёҸ'

        el('span', {style:{
          fontSize:'11px', fontWeight:'800',

          s.topCandle.signal==='bullish'
            ? 'ШҙЩ…Ш№Ш© ШөШ§Ш№ШҜШ© вҖ” ШӘШЈЩғЩҠШҜ Ш§Щ„ШҜШ®ЩҲЩ„'

            ? 'ШҙЩ…Ш№Ш© ЩҮШ§ШЁШ·Ш© вҖ” Ш§ШҜШ®Щ„ ШЁШӯШ°Шұ'

      ]),
      el('div', {style:{
        fontSize:'10px',
        color: s.topCandle.signal==='bullish'?C.green:s.topCandle.signal==='bearish'?C.pink:C.yellow,
      }}, [s.topCandle.icon+' '+s.topCandle.ar+' вҖ” '+s.topCandle.tip]),
      // ЩҶШөЩҠШӯШ© ШҘШ¶Ш§ЩҒЩҠШ© Щ„Щ„ЩҮШ§ШЁШ·Ш©
      s.topCandle.signal==='bearish' && el('div', {style:{
        fontSize:'9px', color:C.pink, marginTop:'4px',
        borderTop:'1px solid rgba(255,45,122,.2)', paddingTop:'4px',

      // Щ…Ш¶Ш§Ш№ЩҒШ© Ш§Щ„ЩҶЩӮШ§Ш· Щ„Щ„Щ…Ш·ШұЩӮШ© ЩҲШ§Щ„Ш§ШЁШӘЩ„Ш§Ш№
      s.topCandle.signal==='bullish' &&
      (s.topCandle.name==='Hammer'||s.topCandle.name==='Bullish Engulfing'||s.topCandle.name==='Morning Star') &&
      el('div', {style:{
        fontSize:'9px', color:C.green, marginTop:'3px',
        background:'rgba(0,255,136,.06)', borderRadius:'4px', padding:'2px 6px',
        display:'inline-block',
      }}, ['рҹҡҖ ЩҶЩӮШ§Ш· Щ…Ш¶Ш§Ш№ЩҒШ© ЩҒЩҠ Ш§Щ„Щ…Ш¬Ш§ШІЩҒШ©']),
    ]),

    // в”Җв”Җ 5. ШӘЩҲЩӮЩҠШӘ Ш§Щ„ШҜШ®ЩҲЩ„
    el('div', {style:{
      background:entryColor+'11', border:'1px solid '+entryColor+'33',
      borderRadius:'8px', padding:'7px 10px', marginBottom:'8px',
      display:'flex', justifyContent:'space-between', alignItems:'center',
    }}, [
      el('span', {style:{fontSize:'11px', fontWeight:'800', color:entryColor}}, [s.entryTiming]),
      el('span', {style:{fontSize:'9px', color:C.text3, textAlign:'left', maxWidth:'60%'}}, [s.entryNote]),
    ]),

    // в”Җв”Җ 6. ШҙЩ…ЩҲШ№ ЩҠШ§ШЁШ§ЩҶЩҠШ©
    state.indicators[s.id]?.closes?.length >= 5
      ? renderCandleChart(
          state.indicators[s.id].closes,
          state.indicators[s.id].highs,
          state.indicators[s.id].lows,
          state.indicators[s.id].opens)
      : null,

    // в”Җв”Җ 7. Ш§Щ„ШЈШұЩӮШ§Щ… Ш§Щ„ШӯШ§ШіЩ…Ш©: ШҜШ№Щ… / Щ…ЩӮШ§ЩҲЩ…Ш© / ЩҮШҜЩҒ / ЩҲЩӮЩҒ
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px', marginBottom:'8px'}}, [
      // ШҜШ№Щ…
      el('div', {style:{
        background:'rgba(0,200,255,.06)', border:'1px solid rgba(0,200,255,.15)',
        borderRadius:'8px', padding:'7px 8px',
      }}, [
        el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'3px'}}, ['рҹ“җ Ш§Щ„ШҜШ№Щ…']),
        el('div', {style:{fontSize:'12px', fontWeight:'800', color:C.blue}},
          [s.support ? '$'+fmt(s.support,2) : 'вҖ”']),
        s.nearSupport && el('div', {style:{fontSize:'8px', color:C.green}}, ['вң… Ш§Щ„ШіШ№Шұ Ш№ЩҶШҜЩҮ Ш§Щ„ШўЩҶ']),
        !s.nearSupport && s.support && el('div', {style:{fontSize:'8px', color:C.text3}},
          ['ШЁЩҸШ№ШҜ '+fmt(distToSup,1)+'%']),
      ]),
      // Щ…ЩӮШ§ЩҲЩ…Ш© вҖ” ШӘЩҲШ¶ЩҠШӯ ШҘШ°Ш§ ЩғШ§ЩҶШӘ ЩҮЩҠ Ш§Щ„ЩҮШҜЩҒ ШЈЩ… Щ„Ш§

        const resIsTarget = s.resistance && Math.abs(s.resistance - s.target) < 0.5;
        const resAbove    = s.resistance && s.resistance > s.price*1.05;
        return el('div', {style:{
          background:'rgba(255,45,122,.06)', border:'1px solid rgba(255,45,122,.15)',

          el('div', {style:{fontSize:'12px', fontWeight:'800', color:C.pink}},
            [s.resistance ? '$'+fmt(s.resistance,2) : 'вҖ”']),
          // ШӘЩҲШ¶ЩҠШӯ Ш§Щ„Ш№Щ„Ш§ЩӮШ© ШЁШ§Щ„ЩҮШҜЩҒ
          s.resistance
            ? el('div', {style:{fontSize:'8px', color: resIsTarget?C.green:C.text3}}, [

              ])
            : null,
        ]);
      })(),
    ]),

    // в”Җв”Җ 8. ЩҮШҜЩҒ + ЩҲЩӮЩҒ Ш®ШіШ§ШұШ© + R/R
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'6px', marginBottom:'8px'}}, [
      el('div', {style:{
        background:'rgba(0,255,136,.08)', border:'1px solid rgba(0,255,136,.2)',
        borderRadius:'8px', padding:'7px 8px', textAlign:'center',
      }}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['рҹҺҜ ЩҮШҜЩҒ Ш§Щ„ШөЩҒЩӮШ©']),
        el('div', {style:{fontSize:'12px', fontWeight:'800', color:C.green}}, ['$'+fmt(s.target,2)]),
        el('div', {style:{fontSize:'9px', color:C.green}}, ['+'+fmt(s.profitPct,1)+'%']),
        // Щ…ШөШҜШұ Ш§Щ„ЩҮШҜЩҒ
        el('div', {style:{fontSize:'8px', color:C.text3, marginTop:'1px'}}, [
          s.resistance && Math.abs(s.resistance-s.target)<0.5
