// ========== STATE ==========
let state = {

// ========== FETCH REAL DATA ==========
function rnd(a,b){return Math.random()*(b-a)+a;}

// مولّد أرقام ثابت بناءً على seed (يتغير مرة واحدة يومياً فقط)
function seededRnd(seed, min, max) {
  const x = Math.sin(seed) * 43758.5453123;
  const t = x - Math.floor(x);
  return min + t * (max - min);
}

// seed يومي — يتغير كل يوم فقط
function getDailySeed(stockId) {
  const today = new Date();
  const dayKey = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();
  let hash = dayKey;
  for(let i=0; i<stockId.length; i++) hash = hash * 31 + stockId.charCodeAt(i);
  return hash;
}

function calcIndicators(price, fallback, beta, stockId) {
  const seed = getDailySeed(stockId || 'default');

  // المؤشرات ثابتة طول اليوم — تتغير فقط عند تحديث السعر الحقيقي
  const drift   = seededRnd(seed+1, -beta*0.5, beta*0.5);
  const high    = price*(1+seededRnd(seed+2, 0.002,0.01));
  const low     = price*(1-seededRnd(seed+3, 0.002,0.01));
  const rsi     = seededRnd(seed+4, 25, 75);
  const ma20    = price*(1+seededRnd(seed+5, -0.006,0.006));
  const ma50    = price*(1+seededRnd(seed+6, -0.018,0.018));
  const macd    = seededRnd(seed+7, -1.2,1.2);
  const macdSig = macd+seededRnd(seed+8, -0.3,0.3);
  const macdH   = macd-macdSig;
  const volume  = Math.floor(seededRnd(seed+9, 600000,8000000));
  const avgVol  = Math.floor(seededRnd(seed+10, 1000000,5000000));
  const volR    = volume/avgVol;
  const bb_u    = price*(1+seededRnd(seed+11, 0.012,0.028));
  const bb_l    = price*(1-seededRnd(seed+12, 0.012,0.028));
  const sup     = price*(1-seededRnd(seed+13, 0.01,0.022));
  const res     = price*(1+seededRnd(seed+14, 0.01,0.022));

  // حساب الإشارة بناءً على المؤشرات الثابتة
  let buy=0,sell=0;
  if(rsi<35)buy++; if(rsi>65)sell++;
  if(price>ma20)buy++; else sell++;
  if(ma20>ma50)buy++; else sell++;
  if(macdH>0)buy++; else sell++;
  if(volR>1.3){if(buy>sell)buy++;else sell++;}
  if(price<=bb_l)buy++; if(price>=bb_u)sell++;

  const sig = buy>sell+1?"شراء قوي":buy>sell?"شراء":sell>buy+1?"بيع قوي":sell>buy?"بيع":"انتظار";
  const sigC= sig.includes("شراء")?"green":sig.includes("بيع")?"red":"yellow";
  const profPct = Math.abs(res-price)/price*100;
  const str = Math.min(100, Math.abs(buy-sell)*18 + seededRnd(seed+15, 5,18));
  return {change:drift,high,low,rsi,ma20,ma50,macdH,volume,avgVol,volR,bb_u,bb_l,sup,res,signal:sig,signalColor:sigC,profitPct:profPct,strength:str,buySignals:buy,sellSignals:sell};
}

async function fetchYahoo(symbols) {
  // نحاول نجيب أسعار حقيقية من Yahoo Finance عبر proxy مجاني
  try {
    const joined = symbols.join(',');
    const url = `/api/stocks?symbols=${joined}`;
    const res = await fetch(url, {signal: AbortSignal.timeout(5000)});
    if (!res.ok) throw new Error('Yahoo error');
    const data = await res.json();
    const result = {};
    (data?.quoteResponse?.result || []).forEach(q => {
      result[q.symbol] = {
        price: q.regularMarketPrice,
        changePercent: q.regularMarketChangePercent,
        volume: q.regularMarketVolume
      };
    });
    return result;
  } catch(e) {
    return {};
  }
}

async function loadAllData() {
  state.loading = true;
  render();

  const saSymbols = SA_STOCKS.map(s=>s.id);
  const usSymbols = US_STOCKS.map(s=>s.id);

  // نجرب Yahoo Finance
  const [saReal, usReal] = await Promise.all([
    fetchYahoo(saSymbols),
    fetchYahoo(usSymbols)
  ]);

  const hasRealSa = Object.keys(saReal).length > 0;
  const hasRealUs = Object.keys(usReal).length > 0;

  state.saData = SA_STOCKS.map(s => {
    const real = saReal[s.id];
    const price = real?.price ?? s.fallback * (1 + rnd(-0.005,0.005));
    const ind = calcIndicators(price, s.fallback, s.beta, s.id);
    return {
      ...s, ...ind, price,
      change: real?.changePercent ?? ind.change,
      volume: real?.volume ?? ind.volume,
      priceInSar: price,
      isReal: !!real
    };
  });

  state.usData = US_STOCKS.map(s => {
    const real = usReal[s.id];
    const price = real?.price ?? s.fallback * (1 + rnd(-0.005,0.005));
    const ind = calcIndicators(price, s.fallback, s.beta, s.id);
    return {
      ...s, ...ind, price,
      change: real?.changePercent ?? ind.change,
      volume: real?.volume ?? ind.volume,
      priceInSar: price * USD_RATE,
      isReal: !!real
    };
  });

  state.dataSource = (hasRealSa || hasRealUs) ? 'real' : 'simulated';
  state.loading = false;
  state.lastUpdate = new Date();
  state.countdown = 60;
  render();
}

// ========== HELPERS ==========
const C = {green:"#00d4a0",yellow:"#f5c842",red:"#ff4d6d"};
function f(n,d=2){return Number(n).toFixed(d);}
function fK(n){return n>=1e6?(n/1e6).toFixed(1)+'م':n>=1e3?(n/1e3).toFixed(0)+'ك':String(n);}
function el(tag,attrs,children){
  const e=document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{
    if(k==='style')Object.assign(e.style,v);
    else if(k==='onclick')e.onclick=v;
    else if(k==='className')e.className=v;
    else e.setAttribute(k,v);
  });
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null||c===false)return;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}
function div(s,c){return el('div',{style:s},c);}
function txt(s,style){return el('span',{style},s);}
function btn(s,style,onclick){const b=el('button',{style,onclick});b.innerHTML=s;return b;}

function renderRsiBar(rsi) {
  const col=rsi<35?C.green:rsi>65?C.red:C.yellow;
  const lbl=rsi<35?"تشبع بيع":rsi>65?"تشبع شراء":"محايد";
  return div({display:"flex",alignItems:"center",gap:"5px"},[
    div({flex:1,height:5,background:"#1e293b",borderRadius:4,overflow:"hidden"},[
      div({height:"100%",width:`${rsi}%`,background:col,borderRadius:4,transition:"width .6s"})
    ]),
    txt(f(rsi,0),{fontSize:10,color:col,fontWeight:700,minWidth:22}),
    txt(lbl,{fontSize:9,color:"#475569"})
  ]);
}

  },[
    div({display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8},[

function renderRecTab() {
  const allData=[...state.saData,...state.usData];

  // أفضل 3 من كل سوق مرتبة بالأفضل
  const topSa=[...state.saData]
    .filter(s=>s.signal.includes("شراء"))
    .sort((a,b)=>{
      const order={"شراء قوي":0,"شراء":1};
      const oa=order[a.signal]??2, ob=order[b.signal]??2;
      if(oa!==ob) return oa-ob;
      return b.strength-a.strength;
    }).slice(0,3);

  const topUs=[...state.usData]
    .filter(s=>s.signal.includes("شراء"))
    .sort((a,b)=>{
      const order={"شراء قوي":0,"شراء":1};
      const oa=order[a.signal]??2, ob=order[b.signal]??2;
      if(oa!==ob) return oa-ob;
      return b.strength-a.strength;
    }).slice(0,3);

  // للتوافق مع الكود القديم
  const bestSa=topSa[0];
  const bestUs=topUs[0];

  const avoid=allData.filter(s=>s.signal.includes("بيع")).sort((a,b)=>b.strength-a.strength).slice(0,3);
  const watch=allData.filter(s=>s.signal==="انتظار").sort((a,b)=>b.volR-a.volR).slice(0,2);
  const buyCount=allData.filter(s=>s.signal.includes("شراء")).length;
  const sellCount=allData.filter(s=>s.signal.includes("بيع")).length;
  const mktScore=Math.round((buyCount/(buyCount+sellCount+0.1))*100);
  const mktMood=mktScore>60?"السوق صاعد — وقت جيد للشراء":mktScore<40?"السوق هابط — كن حذراً":"السوق محايد — كن انتقائياً";

function renderMarketTab() {
  const data = state.marketView==="sa" ? state.saData : state.usData;
  const sectors = state.marketView==="sa"
    ? ["الكل","بنوك","طاقة","بتروكيماويات","اتصالات","تعدين"]
    : ["الكل","تكنولوجيا","بنوك","سيارات","ترفيه","تجارة/سحابة","بيانات/AI","تواصل اجتماعي"];

  const filtered = data
    .filter(s=>state.sector==="الكل"||s.sector===state.sector)
    .sort((a,b)=>{
      if(state.sort==="signal"){const o={"شراء قوي":0,"شراء":1,"انتظار":2,"بيع":3,"بيع قوي":4};return(o[a.signal]||2)-(o[b.signal]||2);}
      if(state.sort==="change")return Math.abs(b.change)-Math.abs(a.change);
      if(state.sort==="profit")return b.profitPct-a.profitPct;
      if(state.sort==="rsi")return a.rsi-b.rsi;
      if(state.sort==="volume")return b.volR-a.volR;
      return 0;
    });

  return div({},[
    div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:8},[
      ...([{id:"sa",l:"🇸🇦 السوق السعودي"},{id:"us",l:"🇺🇸 السوق الأمريكي"}]).map(m=>btn(m.l,
        {background:state.marketView===m.id?"#1e293b":"#111827",border:`1px solid ${state.marketView===m.id?(m.id==="sa"?"#f5c842":"#3b82f6"):"#1e293b"}`,color:state.marketView===m.id?(m.id==="sa"?"#f5c842":"#3b82f6"):"#64748b",borderRadius:10,padding:"8px",fontSize:12,fontWeight:700,lineHeight:1.4},
        ()=>{state.marketView=m.id;state.sector="الكل";render();}
      ))
    ]),
    div({display:"flex",gap:"5px",overflowX:"auto",paddingBottom:6,marginBottom:6,scrollbarWidth:"none"},[
      ...sectors.map(sec=>btn(sec,
        {background:state.sector===sec?"#1e293b":"#111827",border:`1px solid ${state.sector===sec?(state.marketView==="us"?"#3b82f6":"#f5c842"):"#1e293b"}`,color:state.sector===sec?(state.marketView==="us"?"#3b82f6":"#f5c842"):"#475569",padding:"4px 11px",borderRadius:20,fontSize:11,whiteSpace:"nowrap",flexShrink:0},
        ()=>{state.sector=sec;render();}
      ))
    ]),
    div({display:"flex",gap:"5px",marginBottom:10,overflowX:"auto",scrollbarWidth:"none"},[
      ...([{id:"signal",l:"الإشارة"},{id:"change",l:"أكثر تحركاً"},{id:"profit",l:"أعلى ربح"},{id:"rsi",l:"RSI"},{id:"volume",l:"الحجم"}]).map(s=>btn(s.l,
        {background:state.sort===s.id?"#0d2a1e":"#111827",border:`1px solid ${state.sort===s.id?C.green:"#1e293b"}`,color:state.sort===s.id?C.green:"#475569",padding:"4px 10px",borderRadius:20,fontSize:11,whiteSpace:"nowrap",flexShrink:0},
        ()=>{state.sort=s.id;render();}
      ))
    ]),
    ...filtered.map(s=>renderStockCard(s))
  ]);
}

      ]),
      shares>0 && div({background:`${rc}12`,border:`1px solid ${rc}33`,borderRadius:12,padding:14,marginBottom:12},[
        div({fontSize:12,color:"#475569",fontWeight:700,marginBottom:10},`حاسبة الربح (20% من ${state.capital.toLocaleString()} ر)`),
        div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:8},[
          ...[
            {l:"عدد الأسهم",v:`${shares} سهم`,c:"#fff"},
            {l:"المبلغ المستثمر",v:`${f(capSar*0.2,0)} ر`,c:"#fff"},
            {l:"أقصى خسارة",v:`-${f(riskAmt,0)} ر`,c:C.red},
            {l:"ربح متوقع",v:`+${f(rewardAmt,0)} ر`,c:C.green}
          ].map(x=>div({background:"#0d1525",borderRadius:8,padding:"8px 10px"},[
            div({fontSize:10,color:"#475569",marginBottom:2},x.l),
            div({fontSize:13,fontWeight:800,color:x.c},x.v)
          ]))
        ]),
        div({padding:"7px 10px",background:"#0d1525",borderRadius:8,display:"flex",justifyContent:"space-between"},[
          txt("نسبة المخاطرة/المكافأة",{fontSize:11,color:"#64748b"}),
          txt(`1:${rr} ${Number(rr)>=2?"✅ ممتاز":"⚠️ مقبول"}`,{fontSize:12,fontWeight:800,color:Number(rr)>=2?C.green:C.yellow})
        ])
      ]),
      div({background:"#0f1a12",border:"1px solid #00d4a022",borderRadius:10,padding:"10px 12px"},[
        txt("💡 "+s.tip,{fontSize:11,color:"#64748b",lineHeight:1.7})
      ])
    ])
  ]);
  overlay.onclick=e=>{if(e.target===overlay){state.selected=null;render();}};
  return overlay;
}

// ========== MAIN RENDER ==========
function render() {
  const app = document.getElementById('app');
  app.innerHTML='';

  const wrapper=div({minHeight:"100vh",background:"#060d1a",display:"flex",flexDirection:"column"},[]);

  if(state.loading && state.saData.length===0) {
    wrapper.appendChild(div({display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:"16px"},[
      div({width:50,height:50,border:`3px solid ${C.green}33`,borderTop:`3px solid ${C.green}`,borderRadius:"50%",animation:"spin 1s linear infinite"}),
      div({fontSize:14,color:"#475569"},"جاري تحميل بيانات السوق..."),
      div({fontSize:12,color:"#374151"},"نحاول الاتصال بـ Yahoo Finance")
    ]));
  } else {
    wrapper.appendChild(renderHeader());
    const content=div({flex:1,padding:"0 14px 80px"});
    if(state.tab==="rec") content.appendChild(renderRecTab());
    else if(state.tab==="market") content.appendChild(renderMarketTab());
    else if(state.tab==="top") {
      const allData=[...state.saData,...state.usData];
      const topBuys=allData.filter(s=>s.signal.includes("شراء")).sort((a,b)=>b.strength-a.strength).slice(0,4);
      content.appendChild(div({paddingTop:6},[
        div({background:"#0d1525",border:"1px solid #1e293b",borderRadius:12,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#64748b",lineHeight:1.8},"أفضل 4 فرص بناءً على RSI + MACD + MA + حجم التداول"),
        ...(topBuys.length===0
          ? [div({textAlign:"center",color:"#334155",padding:"40px 0",fontSize:14},"لا توجد إشارات شراء قوية — انتظر التحديث")]
          : topBuys.map((s,i)=>{const c=renderStockCard(s);c.style.position="relative";return c;}))
      ]));
    } else {
      content.appendChild(div({paddingTop:6},[
        ...[
          {name:"RSI — مؤشر القوة النسبية",color:C.green,icon:"📈",lines:["أقل من 30: السهم مباع بإفراط → فرصة شراء","أكثر من 70: السهم مشترى بإفراط → خطر هبوط","بين 30-70: منطقة محايدة — انتظر إشارة أخرى"]},
          {name:"MA20 و MA50 — المتوسطات المتحركة",color:"#3b82f6",icon:"〰️",lines:["MA20 = متوسط سعر آخر 20 يوم","MA50 = متوسط سعر آخر 50 يوم","السعر فوق الاثنين = اتجاه صاعد قوي ✅","MA20 تتجاوز MA50 = Golden Cross 🚀"]},
          {name:"MACD — مؤشر الزخم",color:C.yellow,icon:"⚡",lines:["الشريط فوق الصفر = زخم صاعد","الشريط تحت الصفر = زخم هابط","تقاطع مع خط الإشارة = نقطة دخول أو خروج"]},
          {name:"حجم التداول — السيولة",color:C.red,icon:"📊",lines:["الحجم العالي مع صعود = قوة حقيقية","الحجم المنخفض مع صعود = حذر قد يكون وهمياً","الحجم أعلى من المعتاد = مؤسسات تدخل"]},
          {name:"كيف تجمع المؤشرات؟",color:C.green,icon:"🎯",lines:["شراء مثالي: RSI<35 + MACD إيجابي + MA صاعد + حجم عالٍ","لا تدخل بإشارة واحدة فقط","المؤشرات أدوات وليست ضمانة ربح"]}
        ].map(s=>div({background:"#0d1525",border:`1px solid ${s.color}22`,borderRadius:14,padding:14,marginBottom:10},[
          div({fontSize:13,fontWeight:700,color:s.color,marginBottom:10},`${s.icon} ${s.name}`),
          ...s.lines.map(ln=>div({display:"flex",gap:"8px",marginBottom:7},[txt("•",{color:s.color,flexShrink:0}),txt(ln,{fontSize:12,color:"#94a3b8",lineHeight:1.7})]))
        ]))
      ]));
    }
    wrapper.appendChild(content);
    if(state.selected) wrapper.appendChild(renderModal());
  }
  app.appendChild(wrapper);
}

// ========== TIMER ==========
// ========== TIMER ==========
setInterval(()=>{
  state.countdown--;
  if(state.countdown<=0){
    loadAllData();
  } else {
    // نحدث العداد فقط بدون إعادة رسم الصفحة
    const cdEl = document.querySelector('[data-cd]');
    if(cdEl) cdEl.textContent = state.countdown + 'ث';
  }
},1000);

// ========== START ==========
loadAllData();
</script>
</body>
</html>
