function _initFirebase() {
  try {
    if(typeof firebase === 'undefined' || typeof firebase.firestore === 'undefined') {
      // لم يتحمل بعد — أعد المحاولة بعد 500ms
      setTimeout(_initFirebase, 500);
      return;

      apiKey:            'AIzaSyDYyLS0faQLRV8Oqu1tdIXmJhtfklCHt7M',
      authDomain:        'trader-pro-e8b9b.firebaseapp.com',
      projectId:         'trader-pro-e8b9b',
      storageBucket:     'trader-pro-e8b9b.firebasestorage.app',
      messagingSenderId: '496012362495',
      appId:             '1:496012362495:web:4a1fed67ee8c994d0802ca',
    });
    const _DB      = firebase.firestore();
    const _USER_ID = 'default';

    window._fbSavePortfolio = async function(portfolio) {
      try {
        await _DB.collection('users').doc(_USER_ID)
                 .collection('data').doc('portfolio')
                 .set({ trades: portfolio, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        console.log('[FB] portfolio saved ✅', portfolio.length);
      } catch(e) { console.warn('[FB] savePortfolio:', e.message); }
    };

    window._fbLoadPortfolio = async function() {
      try {
        const snap = await _DB.collection('users').doc(_USER_ID)
                              .collection('data').doc('portfolio').get();
        return snap.exists ? (snap.data().trades || []) : [];
      } catch(e) { console.warn('[FB] loadPortfolio:', e.message); return []; }
    };

    window._fbSaveHistory = async function(history) {
      try {
        await _DB.collection('users').doc(_USER_ID)
                 .collection('data').doc('rec_history')
                 .set({ records: history.slice(-500), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        console.log('[FB] history saved ✅', history.length);
      } catch(e) { console.warn('[FB] saveHistory:', e.message); }
    };

    window._fbLoadHistory = async function() {
      try {
        const snap = await _DB.collection('users').doc(_USER_ID)
                              .collection('data').doc('rec_history').get();
        return snap.exists ? (snap.data().records || []) : [];
      } catch(e) { console.warn('[FB] loadHistory:', e.message); return []; }
    };

    window._fbSync = async function() {
      try {
        // ✅ السحابة للسجل فقط — المحفظة محلية
        const history = await window._fbLoadHistory();
        if(history.length) localStorage.setItem('rec_history', JSON.stringify(history));
        console.log('[FB] sync ✅ history='+history.length);
      } catch(e) { console.warn('[FB] sync error:', e.message); }
    };

    // ✅ Firebase جاهز فعلاً
    window._fbReady = true;
    console.log('[FB] Firebase جاهز ✅');

  } catch(e) {
    console.warn('[FB] init error:', e.message);
  }
}
_initFirebase();

// وقت السوق الأمريكي بالدقائق من منتصف الليل UTC
function getMarketTimes() {
  const now = new Date();
  const isSummer = (() => {
    const y = now.getUTCFullYear();
    const start = new Date(Date.UTC(y,2,8)); start.setUTCDate(8-(start.getUTCDay()||7)+7);
    const end   = new Date(Date.UTC(y,10,1)); end.setUTCDate(1+(7-end.getUTCDay())%7);
    return now >= start && now < end;
  })();
  return {
    // Pre-Market: 4:00ص - 4:30م سعودي (صيف: UTC 01:00-13:30)
    preOpen:  isSummer ? 60   : 120,   // 4:00ص  / 5:00ص  سعودي
    open:     isSummer ? 810  : 870,   // 4:30م  / 5:30م  سعودي
    close:    isSummer ? 1200 : 1260,  // 11:00م / 12:00ص سعودي
    // After Hours: 11:00م - 1:00ص سعودي (صيف: UTC 20:00-22:00)
    afterEnd: isSummer ? 1320 : 1380,  // 1:00ص  / 2:00ص  سعودي
    midDay:   isSummer ? 960  : 1020,  // 7:00م  / 8:00م  سعودي
    isSummer,
  };
}

function getNowMins() {
  const now = new Date();
  return now.getUTCHours()*60 + now.getUTCMinutes();
}

// ── حالة السوق الأربع
function getMarketSession() {
  if(window.DEBUG_MARKET) return 'open';
  const t = getMarketTimes();
  const m = getNowMins();

  // السوق مفتوح
  if(m >= t.open && m < t.close) return 'open';

  // Pre-Market (صباحاً قبل الفتح)
  if(m >= t.preOpen && m < t.open) return 'pre';

  // After Hours — نتعامل مع منتصف الليل
  // afterEnd قد يتجاوز 1440 (24 ساعة) في الشتاء
  if(t.afterEnd <= 1440) {
    // لا يتجاوز منتصف الليل — شيك عادي
    if(m >= t.close && m < t.afterEnd) return 'after';
  } else {
    // يتجاوز منتصف الليل — نشيك على جزئين
    const afterEndAdj = t.afterEnd - 1440; // الوقت بعد منتصف الليل
    if(m >= t.close || m < afterEndAdj) return 'after';
  }

  return 'closed';
}

function isMarketOpen() {
  return getMarketSession() === 'open';
}

// ── معلومات حالة السوق للعرض
function getSessionInfo() {
  const session = getMarketSession();
  const t = getMarketTimes();
  const tz = t.isSummer ? 'صيف' : 'شتاء';
  switch(session) {
    case 'open':
      return {
        label:  'السوق مفتوح',
        sub:    `4:30م - 11:00م ${tz}`,
        color:  '#00ff88',
        dot:    true,
        canRec: true,   // يمكن التوصية
      };
    case 'pre':
      return {
        label:  'ما قبل الافتتاح',
        sub:    `يفتح ${t.isSummer?'4:30م':'5:30م'} ${tz}`,
        color:  '#ffe033',
        dot:    false,
        canRec: false,
      };
    case 'after':
      return {
        label:  'بعد الإغلاق',
        sub:    `ينتهي ${t.isSummer?'1:00ص':'2:00ص'} ${tz}`,
        color:  '#ff7a00',
        dot:    false,
        canRec: false,
      };
    default:
      return {
        label:  'السوق مغلق',
        sub:    `يفتح ${t.isSummer?'4:30م':'5:30م'} ${tz}`,
        color:  '#7888aa',
        dot:    false,
        canRec: false,
      };
  }
}

const $ = id => document.getElementById(id);
const app = () => $('app');

function el(tag, props={}, children=[]) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => {
    if(k==='style' && typeof v==='object') Object.assign(e.style, v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  (Array.isArray(children)?children:[children]).forEach(c => {
    if(c===null||c===undefined||c===false) return;
    e.appendChild(typeof c==='string'||typeof c==='number'
      ? document.createTextNode(c) : c);
  });
  return e;
}

function txt(t, style={}) {
  return el('span', {style}, [String(t??'')]);
}

function fmt(n, d=2) {
  if(n===null||n===undefined||isNaN(n)) return '—';
  return Number(n).toFixed(d);
}

function fmtPrice(n) {
  if(!n) return '—';
  return '$'+Number(n).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
}

// ── 0. اتجاه السوق العام (SPY + QQQ)
async function fetchMarketTrend() {
  try {
    const fetchOne = async (sym) => {
      // نجرب stable ثم v3
      for(const url of [
        `${FMP_BASE}/stable/quote?symbol=${sym}&apikey=${API_KEY}`,
        `${FMP_BASE}/api/v3/quote/${sym}?apikey=${API_KEY}`,
      ]) {
        try {
          const res  = await fetch(url);
          const data = await res.json();
          const item = Array.isArray(data) ? data[0] : data;
          const chg  = parseFloat(item?.changePercentage ?? item?.changesPercentage ?? item?.change ?? NaN);
          if(!isNaN(chg)) return chg;
        } catch(e) { continue; }
      }
      return null;
    };

    const [spy, qqq] = await Promise.all([fetchOne('SPY'), fetchOne('QQQ')]);

    if(spy !== null) state.spyChange = spy;
    if(qqq !== null) state.qqqChange = qqq;

    if(state.spyChange !== null && state.qqqChange !== null) {
      const avg = (state.spyChange + state.qqqChange) / 2;
      // هابط حقيقي: متوسط أقل من -1.5% (تصحيح قوي)
      // صاعد: متوسط أكثر من +0.3%
      // محايد: بينهما (تذبذب طبيعي)
      state.marketTrend =
        avg >= 0.3  ? 'bullish'  :
        avg <= -1.5 ? 'bearish'  :
                      'neutral';
      console.log('[Market] SPY:'+state.spyChange+'% QQQ:'+state.qqqChange+'% avg:'+avg.toFixed(2)+'% → '+state.marketTrend);
    }
  } catch(e) { console.warn('[Market] error:', e.message); }
}


async function fetchPrices() {
  state.loadingPrices = true;
  state.dataCheck.prices.total = ALL_STOCKS.length;
  state._priceError = null;

  const symbols = ALL_STOCKS.map(s=>s.id);
  const BATCH   = 50;
  let proxyOk   = false;
  let fmpOk     = false;

  function storeProxy(q) {
    const price = parseFloat(q.regularMarketPrice);
    if(!q.symbol || !(price > 0)) return false;
    state.prices[q.symbol] = {
      price, isReal: true,
      change:    parseFloat(q.regularMarketChangePercent || 0),
      high:      parseFloat(q.regularMarketDayHigh  || price*1.01),
      low:       parseFloat(q.regularMarketDayLow   || price*0.99),
      volume:    parseInt(q.regularMarketVolume  || 0),
      avgVolume: parseInt(q.avgVolume || q.regularMarketVolume || 0),
    };
    return true;
  }

  function storeFMP(q) {
    const price = parseFloat(q.price);
    if(!q.symbol || !(price > 0)) return false;
    state.prices[q.symbol] = {
      price, isReal: true,
      change:    parseFloat(q.changePercentage ?? q.changesPercentage ?? q.change ?? 0),
      high:      parseFloat(q.dayHigh  ?? q.high  ?? price*1.01),
      low:       parseFloat(q.dayLow   ?? q.low   ?? price*0.99),
      volume:    parseInt(q.volume    ?? 0),
      // avgVolume من quote مباشرة — أسرع وأكثر موثوقية من profiles
      avgVolume: parseInt(q.avgVolume ?? q.averageVolume ?? q.volume ?? 0),
    };
    return true;
  }

  // ── محاولة 1: الـ proxy /api/stocks
  const proxyErrors = [];
  for(let i=0; i<symbols.length; i+=BATCH) {
    const batch = symbols.slice(i, i+BATCH).join(',');
    try {
      const ctrl  = new AbortController();
      const timer = setTimeout(()=>ctrl.abort(), 10000);
      const res   = await fetch('/api/stocks?symbols='+batch, {signal:ctrl.signal});
      clearTimeout(timer);
      if(!res.ok) {
        const txt = await res.text().catch(()=>'');
        proxyErrors.push('HTTP '+res.status+': '+txt.slice(0,80));
        continue;
      }
      const json = await res.json();
      const data = json?.quoteResponse?.result || [];
      let got = 0;
      data.forEach(q => { if(storeProxy(q)) { proxyOk = true; got++; } });
      console.log('[Proxy] batch '+(i/BATCH+1)+': '+got+'/'+data.length);
      if(proxyOk) {
        state.dataCheck.prices.real = Object.values(state.prices).filter(p=>p.isReal).length;
        render();
      }
    } catch(e) { proxyErrors.push(e.message||'network'); console.warn('[Proxy] err:', e.message); }
  }

  // ── محاولة 2: FMP v3 quote (Premium — الأكثر موثوقية)
  // نملأ الفراغات دائماً أو نُعيد كل شيء إذا فشل Proxy
  const missing  = symbols.filter(s => !state.prices[s]?.isReal);
  const toFetch  = missing.length > 0 ? missing : (!proxyOk ? symbols : []);
  const fmpErrors = [];

  for(let i=0; i<toFetch.length; i+=BATCH) {
    const batch = toFetch.slice(i, i+BATCH).join(',');
    try {
      const ctrl  = new AbortController();
      const timer = setTimeout(()=>ctrl.abort(), 10000);
      // Premium: نجرب stable أولاً ثم v3
      let data = null;
      for(const base of [
        `${FMP_BASE}/stable/quote?symbol=${batch}&apikey=${API_KEY}`,
        `${FMP_BASE}/api/v3/quote/${batch}?apikey=${API_KEY}`,
      ]) {
        const r = await fetch(base, {signal:ctrl.signal}).catch(()=>null);
        if(!r || !r.ok) continue;
        const d = await r.json().catch(()=>null);
        if(Array.isArray(d) && d.length > 0) { data = d; break; }
      }
      clearTimeout(timer);
      if(!data) { fmpErrors.push('no data'); continue; }
      let got = 0;
      data.forEach(q => { if(storeFMP(q)) { fmpOk = true; got++; } });
      console.log('[FMP] batch '+(i/BATCH+1)+': '+got+'/'+data.length);
      if(fmpOk) {
        state.dataCheck.prices.real = Object.values(state.prices).filter(p=>p.isReal).length;
        render();
      }
    } catch(e) { fmpErrors.push(e.message||'network'); console.warn('[FMP] err:', e.message); }
  }

  const gotData = proxyOk || fmpOk;

  // ── محاولة 3: cache
  if(!gotData) {
    try {
      const cached = localStorage.getItem('cached_prices');
      const time   = localStorage.getItem('cached_prices_time');
      if(cached && time) {
        const ageHours = (Date.now()-new Date(time))/36e5;
        const cd = JSON.parse(cached);
        // إذا Cache أقل من 8 ساعات → isReal:true (بيانات اليوم)
        // إذا أقل من 48 ساعة → isReal:false (fallback)
        const isFresh = ageHours < 8;
        Object.keys(cd).forEach(sym => {
          if(!state.prices[sym]) state.prices[sym] = {...cd[sym], isReal: isFresh ? cd[sym].isReal : false};
        });
        console.log('[Cache] تم استرجاع الأسعار، عمر الـ cache:', ageHours.toFixed(1)+'h، isReal:', isFresh);
      }
    } catch(e) {}
    if(proxyErrors.length || fmpErrors.length) {
      state._priceError = 'proxy: '+proxyErrors[0]+' | fmp: '+fmpErrors[0];
      console.error('[Prices] فشل كلي:', state._priceError);
    }
  }

  if(gotData) {
    try {
      localStorage.setItem('cached_prices', JSON.stringify(state.prices));
      localStorage.setItem('cached_prices_time', new Date().toISOString());
    } catch(e) {}
  }

  state.dataCheck.prices.real = Object.values(state.prices).filter(p=>p.price>0 && p.isReal).length;
  state.loadingPrices = false;
  console.log('[Prices] النتيجة: '+state.dataCheck.prices.real+'/'+state.dataCheck.prices.total+' | proxy:'+proxyOk+' fmp:'+fmpOk);
}

async function fetchIndicators() {
  state.loadingIndicators = true;
  state.indicators = {};
  console.log('[Indicators] بدء تحميل المؤشرات...');

  const INDICATOR_STOCKS = [
    'AAPL','NVDA','MSFT','GOOGL','META','AMZN','TSLA','AVGO','ORCL','CRM',
    'ADBE','NOW','CRWD','PANW','AMD','QCOM','TSM','ASML','ARM','APP',
    'JPM','GS','V','AXP','MS','BLK','BAC','LLY','JNJ','UNH',
    'XOM','CVX','NEE','NFLX','COST',
    'PLTR','SNOW','DDOG','NET','MDB','ALAB','NBIS','DELL','VST','CEG',
    'SHOP','MELI','COIN','PYPL','SQ','HOOD','SOFI','UBER','ABNB','DASH',
    'RBLX','SPOT','RIVN','RKLB','MSTR',
    'IONQ','QBTS','JOBY','LUNR','HIMS','CELH','ARRY','PLUG','NIO','SNAP',
  ];

  let dc = state.dataCheck;
  dc.rsi.total = dc.macd.total = dc.ma.total = dc.ma200.total =
  dc.support.total = dc.atr.total = dc.bb.total = INDICATOR_STOCKS.length;

  const BATCH = 5;

  try {
  for(let i=0; i<INDICATOR_STOCKS.length; i+=BATCH) {
    const batch = INDICATOR_STOCKS.slice(i, i+BATCH);

    await Promise.all(batch.map(async sym => {
      try {
        // بيانات تاريخية 200 يوم — Premium plan: نجرب 3 endpoints بالترتيب
        let closes = [], highs = [], lows = [];
        const endpoints = [
          // 1. الـ stable endpoint الجديد (الأفضل في Premium)
          `${FMP_BASE}/stable/historical-price-eod/full?symbol=${sym}&limit=200&apikey=${API_KEY}`,
          // 2. v3 الكلاسيكي — متاح في Premium دائماً
          `${FMP_BASE}/api/v3/historical-price-full/${sym}?timeseries=200&apikey=${API_KEY}`,
          // 3. v3 بدون timeseries — fallback أخير
          `${FMP_BASE}/api/v3/historical-price-full/${sym}?apikey=${API_KEY}`,
        ];
        for(const url of endpoints) {
          try {
            const ctrl2 = new AbortController();
            const t2    = setTimeout(()=>ctrl2.abort(), 8000);
            const r     = await fetch(url, {signal:ctrl2.signal});
            clearTimeout(t2);
            if(!r.ok) continue;
            const d    = await r.json();
            const hist = d?.historical || (Array.isArray(d) ? d : []);
            if(hist.length >= 20) {
              closes  = hist.map(h=>+(h.close||h.adjClose||0)).filter(v=>v>0).reverse();
              highs   = hist.map(h=>+(h.high||h.close||0)).filter(v=>v>0).reverse();
              lows    = hist.map(h=>+(h.low||h.close||0)).filter(v=>v>0).reverse();
              // ✅ استخراج volumes لحساب avgVolume
              const vols = hist.map(h=>+(h.volume||0)).filter(v=>v>0).reverse();
              if(vols.length >= 10 && !state.prices[sym]?.avgVolume) {
                const avg = Math.round(vols.slice(-20).reduce((a,b)=>a+b,0) / Math.min(vols.length,20));
                if(avg > 0 && state.prices[sym]) state.prices[sym].avgVolume = avg;
              }
              if(closes.length >= 20) break;
            }
          } catch(e) { continue; }
        }
        if(closes.length < 20) return;

        const cur = state.prices[sym]?.price || closes[closes.length-1] || 0;

        // ── MA20 (دائماً إذا توفر 20 يوم)
        const ma20 = closes.length>=20 ? closes.slice(-20).reduce((a,b)=>a+b,0)/20 : null;

        // ── MA50 (إذا توفر 50 يوم)
        const ma50 = closes.length>=50 ? closes.slice(-50).reduce((a,b)=>a+b,0)/50 : null;

        // ── MA200 (إذا توفر 200 يوم — الجديد)
        const ma200 = closes.length>=200 ? closes.slice(-200).reduce((a,b)=>a+b,0)/200 : null;

        console.log(`[MA] ${sym}: يوم=${closes.length} → MA20=${ma20!=null?'✅':'❌'} MA50=${ma50!=null?'✅':'❌'} MA200=${ma200!=null?'✅':'❌'}`);

        // ── RSI (14) — Wilder's Smoothing الصحيح
        let rsi = null;
        if(closes.length >= 15) {
          // الحساب الصحيح: Wilder's Smoothed Moving Average
          let gains = [], losses = [];
          for(let j=1; j<closes.length; j++) {
            const d = closes[j]-closes[j-1];
            gains.push(d>0 ? d : 0);
            losses.push(d<0 ? Math.abs(d) : 0);
          }
          // متوسط أول 14
          let ag = gains.slice(0,14).reduce((a,b)=>a+b,0)/14;
          let al = losses.slice(0,14).reduce((a,b)=>a+b,0)/14;
          // Wilder's smoothing للباقي
          for(let j=14; j<gains.length; j++) {
            ag = (ag*13 + gains[j]) / 14;
            al = (al*13 + losses[j]) / 14;
          }
          rsi = al===0 ? 100 : 100-(100/(1+ag/al));
          rsi = Math.min(100, Math.max(0, rsi));
        }

        // ── MACD (EMA12 - EMA26)
        function calcEMA(data, period) {
          if(data.length < period) return null;
          const k = 2/(period+1);
          let val = data.slice(0,period).reduce((a,b)=>a+b,0)/period;
          for(let j=period; j<data.length; j++) val = data[j]*k + val*(1-k);
          return val;
        }
        const ema12 = calcEMA(closes, 12);
        const ema26 = calcEMA(closes, 26);
        const macd  = (ema12!=null && ema26!=null) ? ema12-ema26 : null;

        // ── Bollinger Bands (تحتاج MA20)
        let bb_upper = null, bb_lower = null;
        if(ma20!=null) {
          const last20 = closes.slice(-20);
          const std = Math.sqrt(last20.reduce((s,p)=>s+Math.pow(p-ma20,2),0)/20);
          bb_upper = ma20 + 2*std;
          bb_lower = ma20 - 2*std;
        }

        // ── ATR (14) — True Range الصحيح
        let atrPct = null;
        if(highs.length >= 15 && closes.length >= 15) {
          const trs = [];
          const start = highs.length - 14;
          for(let j=start; j<highs.length; j++) {
            const prev = closes[j-1]; // السعر السابق دائماً موجود لأن j >= start >= 1
            const tr = Math.max(
              highs[j] - lows[j],
              Math.abs(highs[j] - prev),
              Math.abs(lows[j]  - prev)
            );
            trs.push(tr);
          }
          const atr = trs.reduce((a,b)=>a+b,0) / trs.length;
          atrPct = cur>0 ? (atr/cur)*100 : null;
        }

        // ── Stochastic RSI — يحتاج على الأقل 28 يوم (14 للـ RSI + 14 للـ Stoch)
        let stochRsi = null;
        if(closes.length >= 28) {
          const rsiArr = [];
          // احسب RSI لكل نقطة بنفس طريقة Wilder's
          for(let j=14; j<closes.length; j++) {
            const slice = closes.slice(0, j+1);
            let g2=[], l2=[];
            for(let k=1; k<slice.length; k++) {
              const d = slice[k]-slice[k-1];
              g2.push(d>0?d:0);
              l2.push(d<0?Math.abs(d):0);
            }
            let ag2 = g2.slice(0,14).reduce((a,b)=>a+b,0)/14;
            let al2 = l2.slice(0,14).reduce((a,b)=>a+b,0)/14;
            for(let k=14; k<g2.length; k++) {
              ag2 = (ag2*13+g2[k])/14;
              al2 = (al2*13+l2[k])/14;
            }
            rsiArr.push(al2===0 ? 100 : 100-(100/(1+ag2/al2)));
          }
          if(rsiArr.length >= 14) {
            const recent = rsiArr.slice(-14);
            const minR = Math.min(...recent), maxR = Math.max(...recent);
            stochRsi = maxR===minR ? 50 : ((rsiArr[rsiArr.length-1]-minR)/(maxR-minR))*100;
            stochRsi = Math.min(100, Math.max(0, stochRsi));
          }
        }

        // ── دعم ومقاومة
        const tolerance = cur * 0.015;
        const levels = [];
        for(let j=1; j<highs.length-1; j++) {
          if(highs[j]>=highs[j-1] && highs[j]>=highs[j+1]) levels.push({price:highs[j], type:'resistance'});
          if(lows[j]<=lows[j-1] && lows[j]<=lows[j+1])   levels.push({price:lows[j],  type:'support'});
        }
        const clusters = [];
        levels.forEach(l => {
          const ex = clusters.find(c => Math.abs(c.price-l.price)<=tolerance);
          if(ex) { ex.touches++; ex.price=(ex.price+l.price)/2; }
          else clusters.push({price:l.price, type:l.type, touches:1});
        });
        const strong = clusters.filter(c=>c.touches>=2);
        const resistance = strong.filter(c=>c.price>cur).sort((a,b)=>a.price-b.price)[0]?.price
          ?? Math.max(...highs.slice(-20));
        const support    = strong.filter(c=>c.price<cur).sort((a,b)=>b.price-a.price)[0]?.price
          ?? Math.min(...lows.slice(-20));
        const nearSupport    = support && cur>support ? cur<=support*1.03 : false;
        const nearResistance = resistance && cur<resistance ? cur>=resistance*0.98 : false;

        // ── حفظ
        state.indicators[sym] = {
          rsi, ma20, ma50, ma200, macd, bb_upper, bb_lower,
          support, resistance, nearSupport, nearResistance,
          atrPct, stochRsi,
          closes: closes.slice(-30),
          highs:  highs.slice(-30),   // ✅ للشموع اليابانية الحقيقية
          lows:   lows.slice(-30),    // ✅ للشموع اليابانية الحقيقية
        };

        if(rsi!=null)          dc.rsi.real++;
        if(macd!=null)         dc.macd.real++;
        if(ma20!=null && ma50) dc.ma.real++;
        if(ma200!=null)        dc.ma200.real++;
        if(support!=null)      dc.support.real++;
        if(atrPct!=null)       dc.atr.real++;
        if(bb_upper!=null)     dc.bb.real++;

      } catch(e) { console.warn('[Ind]', sym, e.message); }
    }));

    // render كل 5 دفعات فقط بدل كل دفعة — يمنع الرمش
    if(i % (BATCH*5) === 0) render();
    if(i+BATCH < INDICATOR_STOCKS.length) {
      await new Promise(r=>setTimeout(r,1200));
    }
  }

  dc.volume.total = ALL_STOCKS.length;
  dc.volume.real  = Object.values(state.prices).filter(p=>p.avgVolume>0).length;
  state.indicatorsTime    = new Date().toISOString();
  try { localStorage.setItem('indicators_time', state.indicatorsTime); } catch(e) {}
  console.log('[Indicators] اكتمل: RSI='+dc.rsi.real+'/'+dc.rsi.total+' MACD='+dc.macd.real+' MA='+dc.ma.real);
  } finally {
    // ✅ يضمن دائماً إعادة الضبط حتى عند خطأ غير متوقع
    state.loadingIndicators = false;
    state.indicatorsDone    = true;
  }
}


// ── 3. أخبار محسّنة — جمل مركّبة + ملخص + وزن التاريخ
async function fetchNews() {
  try {
    const topSyms = ALL_STOCKS.slice(0,30).map(s=>s.id).join(',');
    const res  = await fetch(`${FMP_BASE}/stable/news/stock?symbols=${topSyms}&limit=100&apikey=${API_KEY}`);
    const data = await res.json();
    state.news = {};
    if(!Array.isArray(data)) return;

    // ── كلمات ومصطلحات مركّبة مع أوزانها
    const NEG_PHRASES = [
      // خطورة عالية — وزن 3
      { re:/guidance\s*(cut|lower|reduc|slash)/i,          w:3 },
      { re:/revenue\s*(miss|shortfall|disappoint|decline)/i,w:3 },
      { re:/earnings\s*(miss|below|disappoint)/i,           w:3 },
      { re:/freemium|free\s*tier.*(revenue|impact|risk)/i,  w:3 },
      { re:/price\s*target\s*(cut|lower|reduc|slash)/i,     w:3 },
      { re:/downgrad[ei]/i,                                  w:3 },
      { re:/sec\s*(investigation|probe|lawsuit|charge)/i,   w:3 },
      { re:/accounting\s*(fraud|irregularit|restat)/i,      w:3 },
      { re:/ceo\s*(resign|depart|step\s*down|fired)/i,      w:3 },
      { re:/bankruptcy|chapter\s*11|insolvency/i,           w:3 },
      // خطورة متوسطة — وزن 2
      { re:/layoff|job\s*cut|workforce\s*reduc/i,           w:2 },
      { re:/slow(ing|down|er)\s*(growth|demand|sales)/i,    w:2 },
      { re:/compet(ition|itor)\s*(threat|pressure|challeng)/i,w:2},
      { re:/ai\s*(disrupt|replac|threaten|obsolet)/i,       w:2 },
      { re:/subscri\w+\s*(declin|slow|churn|cancel)/i,      w:2 },
      { re:/margin\s*(compress|pressure|squeez|declin)/i,   w:2 },
      { re:/debt\s*(concern|problem|issue|downgrad)/i,       w:2 },
      { re:/miss(ed|ing)?\s*(estimate|expectation|forecast)/i,w:2},
      { re:/below\s*(estimate|expectation|forecast|consensus)/i,w:2},
      { re:/weak\s*(outlook|guidance|forecast|demand)/i,    w:2 },
      // خطورة منخفضة — وزن 1
      { re:/\b(miss|fall|drop|decline|loss|cut|weak|disappoint)\b/i, w:1 },
      { re:/headwind|challeng|concern|risk|uncertain/i,     w:1 },
      { re:/short\s*sell|bearish/i,                         w:1 },
    ];

    const POS_PHRASES = [
      // قوة عالية — وزن 3
      { re:/earnings?\s*(beat|exceed|surpass|top)/i,        w:3 },
      { re:/revenue\s*(beat|record|surge|exceed)/i,         w:3 },
      { re:/guidance\s*(raise|increas|upgrad|improv)/i,     w:3 },
      { re:/price\s*target\s*(raise|increas|upgrad)/i,      w:3 },
      { re:/buyback|share\s*repurchas/i,                    w:2 },
      { re:/dividend\s*(increas|raise|hike)/i,              w:2 },
      // قوة متوسطة — وزن 2
      { re:/strong\s*(demand|growth|result|quarter)/i,      w:2 },
      { re:/beat\s*(estimate|expectation|forecast|consensus)/i,w:2},
      { re:/above\s*(estimate|expectation|forecast)/i,      w:2 },
      { re:/record\s*(revenue|profit|earning|quarter)/i,    w:2 },
      { re:/ai\s*(growth|opportunit|monetiz|revenue)/i,     w:2 },
      { re:/partnership|deal|contract|win/i,                w:1 },
      // قوة منخفضة — وزن 1
      { re:/\b(beat|surge|jump|rally|strong|record|growth|upgrad)\b/i,w:1},
      { re:/bullish|outperform|overweight|buy\s*rating/i,   w:1 },
    ];

    const now = Date.now();

    data.forEach(n => {
      const sym = n.symbol;
      if(!sym) return;
      if(!state.news[sym]) state.news[sym] = {pos:0, neg:0, items:[]};

      // ── وزن التاريخ: اليوم=2، الأمس=1.5، يومين=1، أقدم=0.5
      const ageHours = (now - new Date(n.publishedDate||n.date||now)) / 36e5;
      const dateW    = ageHours < 24 ? 2 : ageHours < 48 ? 1.5 : ageHours < 96 ? 1 : 0.5;

      // ── نص الخبر: عنوان + ملخص
      const text = ((n.title||'') + ' ' + (n.text||n.summary||n.content||'')).toLowerCase();

      let itemScore = 0;

      // حساب النقاط السلبية
      NEG_PHRASES.forEach(({re, w}) => {
        if(re.test(text)) itemScore -= w * dateW;
      });

      // حساب النقاط الإيجابية
      POS_PHRASES.forEach(({re, w}) => {
        if(re.test(text)) itemScore += w * dateW;
      });

      if(itemScore > 0) state.news[sym].pos += itemScore;
      else if(itemScore < 0) state.news[sym].neg += Math.abs(itemScore);
    });

    // ── تحويل النقاط لأعداد صحيحة
    Object.keys(state.news).forEach(sym => {
      state.news[sym].pos = Math.round(state.news[sym].pos);
      state.news[sym].neg = Math.round(state.news[sym].neg);
    });

  } catch(e) { console.warn('[News] error:', e.message); }
}

// ── 4. أرباح قادمة
async function fetchEarnings() {
  try {
    const today    = new Date().toISOString().slice(0,10);
    const nextWeek = new Date(Date.now()+14*864e5).toISOString().slice(0,10);
    const res  = await fetch(`${FMP_BASE}/stable/earning-calendar?from=${today}&to=${nextWeek}&apikey=${API_KEY}`);
    const data = await res.json();
    state.earnings = {};
    if(Array.isArray(data)) {
      data.forEach(e => {
        if(!e.symbol) return;
        const days = Math.ceil((new Date(e.date)-new Date())/(864e5));
        if(days>=0 && days<=14) state.earnings[e.symbol] = days;
      });
    }
  } catch(e) {}
}

// ── 5. Profiles
async function fetchProfiles() {
  const symbols = ALL_STOCKS.map(s=>s.id);
  const BATCH   = 10;
  for(let i=0; i<symbols.length; i+=BATCH) {
    const batch = symbols.slice(i, i+BATCH);
    await Promise.all(batch.map(async sym => {
      try {
        const res  = await fetch(`${FMP_BASE}/stable/profile?symbol=${sym}&apikey=${API_KEY}`);
        const data = await res.json();
        const p = Array.isArray(data) && data[0];
        if(p && p.symbol) {
          state.profiles[p.symbol] = {
            beta:      parseFloat(p.beta||0)||null,
            avgVolume: parseInt(p.avgVolume||0)||null,
            mktCap:    p.mktCap||null,
          };
        }
      } catch(e) {}
    }));
    if(i+BATCH < symbols.length) await new Promise(r=>setTimeout(r,300));
  }
}

// ================================================================
// ═══════════════════ SIGNAL ENGINE ══════════════════════════════
// ================================================================

function calcSignal(stock) {
  const p   = state.prices[stock.id];
  const ind = state.indicators[stock.id];
  const pro = state.profiles[stock.id];
  const news= state.news[stock.id]||{pos:0,neg:0};
  const earn= state.earnings[stock.id]??999;

  // ══ شرط أساسي: يجب أن يكون لدينا سعر (حقيقي أو cache) ومؤشرات
  if(!p || !p.price || !ind) return null;
  // اشتراط isReal فقط في أوقات السوق المفتوح
  if(isMarketOpen() && !p.isReal) return null;

  const price = p.price;
  const {rsi, ma20, ma50, ma200, macd, bb_upper, bb_lower,
         support, resistance, nearSupport, nearResistance,
         atrPct, stochRsi} = ind;

  // ══ حساب نقاط الشراء والبيع
  let buy=0, sell=0, reasons=[];

  // 1. RSI
  if(rsi!=null) {
    if(rsi<30)      { buy+=2; reasons.push('RSI '+fmt(rsi)+'% — تشبع بيع قوي'); }
    else if(rsi<40) { buy++;  reasons.push('RSI '+fmt(rsi)+'% — ميل للشراء'); }
    else if(rsi>70) { sell+=2;}
    else if(rsi>60) { sell++; }
  }

  // 2. MA Cross — طبقات ذكية
  // MA20
  if(ma20!=null && price>ma20) { buy++;  reasons.push('السعر فوق MA20'); }
  else if(ma20!=null)          { sell++; }

  // MA50
  if(ma20!=null && ma50!=null && ma20>ma50) { buy++;  reasons.push('MA20 فوق MA50 — اتجاه صاعد'); }
  else if(ma20!=null && ma50!=null)         { sell++; }

  // MA200 — الأقوى: اتجاه طويل المدى
  if(ma200!=null) {
    if(price > ma200)  { buy+=2; reasons.push('السعر فوق MA200 — اتجاه صاعد قوي 💪'); }
    else               { sell+=2; } // تحت MA200 = خطر حقيقي
  }

  // 3. MACD
  if(macd!=null) {
    if(macd>0) { buy++;  reasons.push('MACD إيجابي — زخم شراء'); }
    else       { sell++; }
  }

  // 4. Bollinger Bands
  if(bb_lower!=null && price<=bb_lower) { buy++;  reasons.push('السعر عند الحد الأدنى لـ BB'); }
  if(bb_upper!=null && price>=bb_upper) { sell++; }

  // 5. دعم/مقاومة
  if(nearSupport)    { buy+=2; reasons.push('قريب من الدعم $'+fmt(support,2)); }
  if(nearResistance) { sell+=2; }

  // 6. Stochastic RSI (حقيقي الآن)
  if(stochRsi!=null) {
    if(stochRsi<20)      { buy+=2; reasons.push('Stoch RSI '+fmt(stochRsi)+'% — تشبع بيع شديد'); }
    else if(stochRsi<30) { buy++;  reasons.push('Stoch RSI '+fmt(stochRsi)+'% — تشبع بيع'); }
    else if(stochRsi>80) { sell+=2; }
    else if(stochRsi>70) { sell++; }
  }

  // 7. Volume — avgVolume من prices أولاً (من quote) ثم من profiles كـ fallback
  const vol    = p.volume || 0;
  const avgVol = p.avgVolume || pro?.avgVolume || 0;
  const volR   = avgVol>0 ? vol/avgVol : 0;
  if(volR>1.5) {
    if(buy>sell) { buy++;  reasons.push('حجم تداول مرتفع ×'+fmt(volR,1)); }
    else         { sell++; }
  }

  // 8. ATR Risk/Reward — محسّن
  let riskReward = 0;
  if(atrPct!=null) {
    const atrStop2   = atrPct * 1.5;
    // ✅ المقاومة تُستخدم فقط إذا كانت أعلى من السعر بـ 2%+ (نفس منطق الهدف)
    const resValid2  = resistance!=null && resistance > price*1.02;
    const targetPrice = resValid2
      ? resistance
      : price * (1 + Math.max(atrPct*3, 3)/100);
    const distToTarget = (targetPrice - price) / price * 100;
    riskReward = atrStop2 > 0 ? distToTarget / atrStop2 : 0;
    if(riskReward>=3.0) { buy+=3; reasons.push('نسبة مخاطرة/مكافأة '+fmt(riskReward,1)+'x ممتازة جداً'); }
    else if(riskReward>=2.0) { buy+=2; reasons.push('نسبة مخاطرة/مكافأة '+fmt(riskReward,1)+'x ممتازة'); }
    else if(riskReward>=1.5) { buy++; reasons.push('نسبة مخاطرة/مكافأة '+fmt(riskReward,1)+'x جيدة'); }
    else if(riskReward<1)    { sell++; }
  }

  // 9. القوة النسبية vs SPY — إشارة حقيقية
  const rs = calcRelativeStrength(p.change, state.spyChange);
  if(rs) {
    if(rs.score > 0)       { buy  += Math.floor(rs.score/6); reasons.push('القوة vs SPY: '+rs.label+' ('+( rs.diff>=0?'+':'')+rs.diff+'%)'); }
    else if(rs.score < 0)  { sell += Math.abs(Math.floor(rs.score/5)); } // عقوبة أقوى: /5 بدل /8
  }

  // 10. الشموع اليابانية — إشارات إضافية
  const candlePatterns = detectCandlePatterns(ind.closes, ind.highs, ind.lows);
  candlePatterns.forEach(p2 => {
    if(p2.signal === 'bullish') {
      buy  += p2.strength >= 5 ? 2 : 1;
      reasons.push('شمعة '+p2.ar+' — '+p2.tip);
    } else if(p2.signal === 'bearish') {
      sell += p2.strength >= 5 ? 2 : 1;
    }
  });

  // ══ Cooldown — سهم هبط بعد إشارة شراء → يُحجب مباشرة
  const isCooldown = (state.cooldownStocks||[]).includes(stock.id);
  if(isCooldown) sell+=4;

  // ══ عقوبات
  if(earn<=5)       { sell+=3; }
  else if(earn<=10) { sell+=1; }
  const change = p.change||0;
  if(change>10)     { sell+=3; } // gap-up مبالغ
  else if(change>5) { sell++;  }
  // أخبار — النقاط الآن مرجّحة (0-15+ بدل 0-3)
  if(news.neg>=6)        { sell+=5; }       // أخبار سلبية جداً (مثل ADBE freemium+guidance cut)
  else if(news.neg>=4)   { sell+=4; }       // أخبار سلبية قوية
  else if(news.neg>=2)   { sell+=2; }       // أخبار سلبية متوسطة
  else if(news.neg>=1)   { sell++; }        // خبر سلبي واحد
  if(news.pos>=6)        { buy+=4; }        // أخبار إيجابية جداً
  else if(news.pos>=3)   { buy+=3; }        // أخبار إيجابية قوية
  else if(news.pos>=1)   { buy += Math.min(2, Math.round(news.pos)); }

  // ══ الإشارة النهائية
  const netScore = buy - sell;
  const signal   = netScore>=4?"شراء قوي":netScore>=2?"شراء":
                   netScore<=-4?"بيع قوي":netScore<=-2?"بيع":"انتظار";

  // ══ قوة الإشارة (0-100) — أقصى buy ممكن نظرياً ~26 (مع شموع+قوة نسبية+أخبار)
  const maxBuy = 26;
  const strength = Math.min(100, Math.max(0, Math.round((netScore + maxBuy) / (maxBuy*2) * 100)));

  // ══ الثقة (بناءً على عدد المؤشرات المتوفرة) — مجموعها 100%
  let confidence = 0;
  if(rsi!=null)                confidence += 18;
  if(macd!=null)               confidence += 18;
  if(ma20!=null && ma50!=null) confidence += 12;
  if(ma200!=null)              confidence += 12;
  if(support!=null)            confidence += 13;
  if(atrPct!=null)             confidence += 13;
  if(stochRsi!=null)           confidence += 14;
  // مكافآت بسيطة (لا تتجاوز 100)
  if(p.avgVolume>0) confidence = Math.min(100, confidence+5);
  if(news.pos>0)    confidence = Math.min(100, confidence+5);

  // ══ هدف الربح ووقف الخسارة
  const atrStop  = atrPct ? Math.min(atrPct*1.5, 15) : 2;
  const stopLoss = Math.max(price*(1-atrStop/100), price*0.75);

  // ✅ الهدف يجب أن يكون فوق السعر الحالي بـ 3%+ على الأقل
  const minTarget    = price * 1.03;                          // حد أدنى +3%
  const atrTarget    = price * (1 + Math.max(atrStop*2, 3)/100); // ATR-based هدف
  // المقاومة تُستخدم فقط إذا كانت أعلى من السعر بـ 2%+ وأعلى من الحد الأدنى
  const resValid     = resistance && resistance > price*1.02 && resistance > minTarget;
  const target       = resValid ? resistance : Math.max(atrTarget, minTarget);
  const profitPct    = (target-price)/price*100;

  // ══ R/R النهائي — يُحسب من الهدف الصحيح والوقف
  const lossPct    = (price-stopLoss)/price*100;
  riskReward       = lossPct > 0 ? profitPct/lossPct : 0;

  // ══ جودة الصفقة — معادلة محسّنة
  let tradeQuality = 0;
  // نسبة المخاطرة/المكافأة — الأهم
  if(riskReward>=3.0)       tradeQuality+=40;
  else if(riskReward>=2.0)  tradeQuality+=30;
  else if(riskReward>=1.5)  tradeQuality+=20;
  else if(riskReward>=1.0)  tradeQuality+=10;
  // قرب الدعم
  if(nearSupport)           tradeQuality+=25;
  // هدف الربح
  if(profitPct>=5)          tradeQuality+=20;
  else if(profitPct>=3)     tradeQuality+=15;
  else if(profitPct>=2)     tradeQuality+=8;
  // ATR منخفض = سهم مستقر
  if(atrPct!=null && atrPct<2)  tradeQuality+=15;
  else if(atrPct!=null && atrPct<3) tradeQuality+=8;
  tradeQuality = Math.min(100, tradeQuality);

  // ══ توقيت الدخول
  // حساب المسافة بين السعر الحالي والدعم
  const distToSupport = support>0 ? (price-support)/price*100 : 999;

  let entryTiming, entryColor, entryNote;

  if(nearSupport) {
    // السعر قريب من الدعم (أفضل توقيت)
    entryTiming = 'ادخل الآن';
    entryColor  = C.green;
    entryNote   = 'السعر عند الدعم — أفضل نقطة دخول';
  } else if(distToSupport <= 5) {
    // بعيد عن الدعم بـ 5% أو أقل — مقبول
    entryTiming = 'مقبول';
    entryColor  = C.blue;
    entryNote   = 'انتظر تراجعاً بسيطاً نحو $'+fmt(support,2)+' أفضل';
  } else if(distToSupport <= 10) {
    // بعيد عن الدعم بـ 10% — انتظر
    entryTiming = 'انتظر';
    entryColor  = C.yellow;
    entryNote   = 'السعر بعيد عن الدعم — انتظر تراجعاً لـ $'+fmt(support,2);
  } else {
    // بعيد جداً عن الدعم
    entryTiming = 'متأخر';
    entryColor  = C.orange;
    entryNote   = 'الدخول الآن محفوف بالمخاطر — الدعم عند $'+fmt(support,2);
  }

  // نقطة الدخول المثالية
  const idealEntry = nearSupport ? price : (support ? support*1.01 : price);

  // ══ حالة الدخول
  const signalQuality = confidence>=70 ? 'HIGH' : confidence>=50 ? 'MEDIUM' : 'LOW';
  const activeBuy  = !isCooldown && signalQuality==='HIGH' && (entryTiming==='ادخل الآن' || entryTiming==='مقبول');
  const watchOnly  = !isCooldown && (signalQuality==='MEDIUM' || entryTiming==='انتظر');
  const blockEntry = isCooldown || signalQuality==='LOW' || entryTiming==='متأخر';

  return {
    id: stock.id, name: stock.name, sector: stock.sector, cat: stock.cat,
    price, change, high:p.high, low:p.low, volume:vol, volR,
    rsi, ma20, ma50, ma200, macd, bb_upper, bb_lower,
    support, resistance, nearSupport, nearResistance,
    resTouches: ind.resTouches??1, supTouches: ind.supTouches??1,
    atrPct, stochRsi, riskReward,
    signal, strength, confidence, tradeQuality,
    netScore, buy, sell, reasons,
    stopLoss, target, profitPct,
    entryTiming, entryColor, entryNote, idealEntry, distToSupport,
    earnings: earn,
    news: news,
    // ⭐ High Conviction: ظهر في الجلسة الأولى وعاد في منتصف اليوم
    // نتحقق من _midDayDone أو من localStorage مباشرة (للحالة بعد إعادة التحميل)
    isConviction: (() => {
      const middayDone = _midDayDone || localStorage.getItem('recs_midday') === 'true';
      const s1ids      = state.sessionOneIds || [];
      return middayDone && s1ids.includes(stock.id);
    })(),
    beta: pro?.beta || stock.beta,
    activeBuy, watchOnly, blockEntry, isCooldown,
    closes: ind.closes || null,
    highs:  ind.highs  || null,
    lows:   ind.lows   || null,
    candlePatterns,
    relativeStrength: rs,
  };
}

// ================================================================
// ═══════════════════ RECOMMENDATION ENGINE ══════════════════════
// ================================================================

function calcRecs() {
  // ══ شروط صارمة للتوصية
  const candidates = ALL_STOCKS
    .map(s => calcSignal(s))
    .filter(Boolean)
    // شرط 1: إشارة شراء
    .filter(s => s.signal==='شراء قوي' || s.signal==='شراء')
    // شرط 2: ثقة كافية (60%+) — رفعنا من 50
    .filter(s => s.confidence >= 60)
    // شرط 3: جودة صفقة مقبولة (35%+) — خُفِّض من 40 لتجنب رفض R/R جيد بلا دعم
    .filter(s => s.tradeQuality >= 35)
    // شرط 4: هدف ربح 2%+
    .filter(s => s.profitPct >= 2)
    // شرط 5: نسبة مخاطرة/مكافأة 1:1 على الأقل — جديد
    .filter(s => s.riskReward >= 1.0)
    // شرط 6: لا أرباح قريبة
    .filter(s => s.earnings > 5)
    // شرط 7: لا gap-up مبالغ
    .filter(s => (s.change||0) <= 8)
    // شرط 8: توقيت الدخول مقبول — لا متأخر ولا انتظار
    .filter(s => s.entryTiming === 'ادخل الآن' || s.entryTiming === 'مقبول')
    // شرط 9: السعر فوق MA50 على الأقل
    .filter(s => s.ma50==null || s.price >= s.ma50*0.97);

  // ترتيب: قوة × 0.4 + ثقة × 0.3 + جودة × 0.2 + توقيت × 0.1
  // FIX: conviction = 10 بدل 20 — لا يطغى على قوة السهم الحقيقية
  candidates.sort((a,b) => {
    const timingBonus = (s) =>
      s.entryTiming==='ادخل الآن' ? 15 :
      s.entryTiming==='مقبول'     ? 5  : 0;
    const convictionBonus = (s) => s.isConviction ? 10 : 0;
    // ✅ مكافأة شمعة صاعدة قوية
    const candleBonus = (s) => {
      if(!s.candlePatterns?.length) return 0;
      const top = s.candlePatterns[0];
      return top.signal==='bullish' ? top.strength*2 : top.signal==='bearish' ? -top.strength*2 : 0;
    };
    // ✅ مكافأة القوة النسبية
    const rsBonus = (s) => s.relativeStrength ? Math.max(-10, Math.min(15, s.relativeStrength.score)) : 0;
    const scoreA = a.strength*0.4 + a.confidence*0.3 + a.tradeQuality*0.2
                 + timingBonus(a) + convictionBonus(a) + candleBonus(a) + rsBonus(a);
    const scoreB = b.strength*0.4 + b.confidence*0.3 + b.tradeQuality*0.2
                 + timingBonus(b) + convictionBonus(b) + candleBonus(b) + rsBonus(b);
    return scoreB - scoreA;
  });

  // Adaptive Market — عدد التوصيات حسب اتجاه السوق
  const maxRecs = state.marketTrend==='bullish' ? 5 :
                  state.marketTrend==='bearish' ? 2 : 4;

  const recs = [];
  const usedSectors = new Set();
  // الجولة الأولى: توصية واحدة لكل قطاع
  for(const c of candidates) {
    if(recs.length>=maxRecs) break;
    if(!usedSectors.has(c.sector)) {
      recs.push(c);
      usedSectors.add(c.sector);
    }
  }
  // الجولة الثانية: أكمل بأقوى المرشحين بدون تكرار
  for(const c of candidates) {
    if(recs.length>=maxRecs) break;
    if(!recs.find(r=>r.id===c.id)) recs.push(c);
  }

  // ══ تحديث Cooldown — سهم كان توصية وهبط -5%
  let cooldownUpdated = false;
  ALL_STOCKS.forEach(s => {
    const p = state.prices[s.id];
    if(!p?.isReal) return;
    const wasRec = (state.sessionOneIds||[]).includes(s.id);
    if(wasRec && (p.change||0) < -5) {
      if(!state.cooldownStocks) state.cooldownStocks = [];
      if(!state.cooldownStocks.includes(s.id)) {
        state.cooldownStocks.push(s.id);
        cooldownUpdated = true;
      }
    }
  });
  if(cooldownUpdated) {
    try { localStorage.setItem('cooldown_stocks', JSON.stringify(state.cooldownStocks)); } catch(e) {}
  }

  state.recs = recs;
  state.recsTime = new Date();

  // ✅ تسجيل في السجل فقط عند السوق المفتوح — لا تسجيل لأسعار قديمة
  if(isMarketOpen()) {
    recordRecsToHistory(recs);
  }

  // إشعار بالتوصيات الجديدة
  if(recs.length > 0) {
    const names = recs.slice(0,3).map(r=>r.id).join('، ');
    sendNotification('🎯 توصيات تريدر برو X', recs.length+' توصيات جديدة: '+names);
  }

  // حفظ التوصيات — s1_recs يُحفظ مرة واحدة فقط عند الافتتاح
  // لا نكتب فوقه هنا لأن منتصف اليوم يحتاجه للمقارنة
  try {
    // s1_recs يُحفظ فقط إذا لم يكن محفوظاً من قبل اليوم (الجلسة الأولى)
    const existingDate = localStorage.getItem('recs_date');
    const today        = new Date().toDateString();
    const isFirstRec   = existingDate !== today; // أول مرة اليوم
    if(isFirstRec) {
      localStorage.setItem('s1_recs', JSON.stringify(recs.map(r=>r.id)));
      state.sessionOneIds = recs.map(r=>r.id);
    }
    localStorage.setItem('recs_time',   new Date().toISOString());
    localStorage.setItem('recs_date',   today);
    localStorage.setItem('recs_full',   JSON.stringify(recs));
    localStorage.setItem('recs_midday', 'false');
  } catch(e) {}

  return recs;
}

// ═══════════════════ SPECULATIVE ENGINE ═════════════════════════
// ================================================================

function calcSpeculative() {
  if(state.marketTrend === 'bearish') {
    state.speculativeRecs = [];
    return [];
  }

  const candidates = ALL_STOCKS
    .filter(s => s.cat==='future' || s.cat==='small' || s.beta>=1.8)
    .map(s => {
      const p   = state.prices[s.id];
      const ind = state.indicators[s.id];
      const pro = state.profiles[s.id];

      if(!p?.price || !ind) return null;
      if(isMarketOpen() && !p.isReal) return null;

      const price  = p.price;
      const beta   = pro?.beta || s.beta || 1;
      const volR   = p.avgVolume>0 ? p.volume/p.avgVolume : 0;
      const change = p.change||0;
      const earnDays = state.earnings[s.id]??999;

      // ══ شرط 1: السعر — متوسط إلى صغير ($3 - $80)
      // المجازفة الحقيقية = سهم رخيص يتضاعف، مش سهم غالٍ
      if(price > 80 || price < 3) return null;

      // ══ شرط 2: تقلب كافٍ (beta أو ATR)
      // ATR% يعكس التقلب الفعلي أفضل من beta
      const atrPct = ind.atrPct||0;
      const isVolatile = beta>=1.7 || atrPct>=2.5;
      if(!isVolatile) return null;

      // ══ شرط 3: لا هبوط حر (لا gap-down >10%)
      if(change < -10) return null;

      // ══ شرط 4: لا أرباح قريبة جداً (<5 أيام)
      if(earnDays <= 5) return null;

      // ══ حساب النقاط — فكرة: الربح المحتمل vs الخسارة المحدودة
      let score = 0;
      const reasons = [];   // أسباب الاختيار بالعربي
      const warnings = [];  // تحذيرات

      // ── 1. إمكانية التضخم (ATR — يعكس التحرك اليومي الفعلي)
      if(atrPct >= 6)       { score+=20; reasons.push('ATR '+fmt(atrPct,1)+'% — تحركات ضخمة يومياً'); }
      else if(atrPct >= 4)  { score+=15; reasons.push('ATR '+fmt(atrPct,1)+'% — تذبذب عالٍ'); }
      else if(atrPct >= 2.5){ score+=8;  }

      // ── 2. Beta — حساسية للسوق
      if(beta>=2.5)         { score+=20; reasons.push('Beta '+fmt(beta,1)+' — يتحرك ضعف السوق'); }
      else if(beta>=2.0)    { score+=14; reasons.push('Beta '+fmt(beta,1)+' — تقلب جيد للمجازفة'); }
      else if(beta>=1.7)    { score+=8; }

      // ── 3. الاتجاه — لا نريد هبوطاً حراً
      // نريد: إما صاعد، أو ارتداد من قاع
      const trendUp   = ind.ma20!=null && ind.ma50!=null && ind.ma20 > ind.ma50;
      const aboveMa20 = ind.ma20!=null && price > ind.ma20;
      const bouncing  = ind.rsi!=null && ind.rsi<35 && ind.nearSupport; // ارتداد من قاع

      if(trendUp && aboveMa20) {
        score+=15;
        reasons.push('الاتجاه صاعد — فوق MA20 و MA20>MA50');
      } else if(bouncing) {
        score+=12;
        reasons.push('ارتداد محتمل — RSI'+fmt(ind.rsi)+'% عند الدعم');
      } else if(aboveMa20) {
        score+=6;
      } else if(!trendUp && !bouncing) {
        score-=8;
        warnings.push('الاتجاه غير واضح — تحقق من الرسم');
      }

      // ── 4. MACD — زخم قصير المدى
      if(ind.macd!=null && ind.macd>0) {
        score+=12;
        reasons.push('MACD صاعد — زخم شراء قصير المدى');
      } else if(ind.macd!=null && ind.macd<0) {
        score-=5;
      }

      // ── 5. حجم التداول — اهتمام حقيقي
      if(volR>=3)       { score+=15; reasons.push('حجم ×'+fmt(volR,1)+' — اهتمام استثنائي'); }
      else if(volR>=2)  { score+=10; reasons.push('حجم ×'+fmt(volR,1)+' — نشاط مرتفع'); }
      else if(volR>=1.5){ score+=5; }

      // ── 6. شموع — تأكيد بصري (المطرقة والابتلاع مضاعفة في المجازفة)
      const candles = detectCandlePatterns(ind.closes, ind.highs, ind.lows);
      const topCandle = candles[0] || null;
      candles.forEach(cp => {
        if(cp.signal==='bullish') {
          // المطرقة والابتلاع الصاعد أقوى للمجازفة — نقاط مضاعفة
          const isBest = cp.name==='Hammer' || cp.name==='Bullish Engulfing' || cp.name==='Morning Star';
          score += isBest
            ? (cp.strength>=5 ? 20 : 14)   // مضاعف
            : (cp.strength>=5 ? 10 : 6);    // عادي
          reasons.push('🕯 '+cp.ar+' — '+cp.tip);
        } else if(cp.signal==='bearish') {
          score -= cp.strength>=5 ? 10 : 5;
          warnings.push('🕯 '+cp.ar+' — '+cp.tip);
        }
      });

      // ── 7. عقوبات
      if(earnDays<=14)      { score-=8;  warnings.push('أرباح خلال '+earnDays+' يوم — تقلب مرتقب'); }
      if(change>12)         { score-=10; warnings.push('ارتفع '+fmt(change,1)+'% اليوم — قد يتراجع'); }
      if(ind.rsi!=null && ind.rsi>78) { score-=10; warnings.push('RSI مرتفع '+fmt(ind.rsi)+'% — تشبع شراء'); }

      score = Math.max(0, score);
      if(score < 40) return null;

      // ══ حساب وقف الخسارة والهدف — الأهم في المجازفة
      // وقف الخسارة: أسفل الدعم مباشرة أو 2×ATR
      const atrStop  = atrPct * 2;   // أوسع من التوصية العادية
      const rawStop  = ind.support && ind.support < price
        ? Math.min(ind.support * 0.985, price*(1-atrStop/100))  // أسفل الدعم بـ 1.5%
        : price*(1-atrStop/100);
      const stopLoss = Math.max(rawStop, price*0.65); // حد أقصى -35%
      const lossPct  = (price-stopLoss)/price*100;

      // الهدف: المقاومة أو 3x-4x وقف الخسارة
      const minTarget = price * (1 + lossPct*3/100);  // 3:1 R/R على الأقل
      const target    = ind.resistance && ind.resistance > price && ind.resistance > minTarget
        ? ind.resistance
        : price * (1 + lossPct*3.5/100);  // هدف 3.5:1

      const profitPct  = (target-price)/price*100;
      const riskReward = lossPct>0 ? profitPct/lossPct : 0;

      // رفض إذا R/R أقل من 2:1
      if(riskReward < 2) return null;

      // ══ توقيت الدخول
      const distToSup = ind.support>0 ? (price-ind.support)/price*100 : 999;
      let entryTiming, entryNote;
      if(ind.nearSupport) {
        entryTiming = 'ادخل الآن';
        entryNote   = 'السعر عند الدعم $'+fmt(ind.support,2)+' — أفضل نقطة دخول';
      } else if(distToSup<=8) {
        entryTiming = 'مقبول';
        entryNote   = 'قريب من الدعم — يمكن الدخول أو انتظار $'+fmt(ind.support,2);
      } else if(distToSup<=18) {
        entryTiming = 'انتظر';
        entryNote   = 'انتظر تراجعاً نحو $'+fmt(ind.support,2)+' للدخول بأمان';
      } else {
        entryTiming = 'متأخر';
        entryNote   = 'بعيد عن الدعم — الدخول محفوف بالمخاطر';
      }

      const label =
        score>=80 ? '🚀 انفجار محتمل' :
        score>=65 ? '🔥 زخم قوي'      :
        score>=50 ? '⚡ فرصة نشطة'    :
                    '🎲 مجازفة';

      // تخصيص رأس المال: 5-10% حسب الجودة
      const allocPct = score>=70 ? 0.10 : score>=55 ? 0.07 : 0.05;

      return {
        ...s, price, change, volR, beta, atrPct,
        score, label, reasons, warnings,
        rsi:ind.rsi, macd:ind.macd,
        ma20:ind.ma20, ma50:ind.ma50, ma200:ind.ma200,
        support:ind.support, resistance:ind.resistance,
        nearSupport:ind.nearSupport,
        stopLoss, target, profitPct, lossPct, riskReward,
        allocPct, entryTiming, entryNote,
        earnDays, topCandle,
      };
    })
    .filter(Boolean)
    .sort((a,b) => {
      // ترتيب: R/R أولاً × score
      const valA = a.riskReward * 0.5 + a.score * 0.5;
      const valB = b.riskReward * 0.5 + b.score * 0.5;
      return valB - valA;
    })
    .slice(0, 5);

  state.speculativeRecs = candidates;
  return candidates;
}

let _indicatorsLoading = false;

async function loadData(full=false) {
  // ── Firebase sync عند البداية (مرة واحدة)
  if(window._fbReady && !state._fbSynced) {
    state._fbSynced  = true;
    state._fbSyncing = true;
    render();
    await window._fbSync().catch(()=>{});
    state._fbSyncing = false;
  }

  // تحميل الأسعار + اتجاه السوق دائماً
  await Promise.all([fetchPrices(), fetchMarketTrend()]);
  render();

  // إذا التوصيات مقفلة (محفوظة من اليوم) — فقط حدّث الأسعار بدون إعادة حساب
  if(_recsLockedToday && state.recs?.length > 0) {
    if(state.indicatorsDone) {
      // المؤشرات موجودة — حدّث الأسعار في البطاقات فقط
      state.recs = state.recs.map(r => {
        const p = state.prices[r.id];
        if(!p?.price) return r;
        return { ...r, price:p.price, change:p.change, high:p.high, low:p.low, volume:p.volume };
      });
    } else {
      // المؤشرات غير محمّلة — حمّلها لكن لا تُعيد الحساب
      const neverLoaded = !state.indicatorsDone && !_indicatorsLoading;
      if(neverLoaded && !_indicatorsLoading) {
        _indicatorsLoading = true;
        render();
        await fetchIndicators();
        _indicatorsLoading = false;
        // حدّث الأسعار فقط — لا calcRecs
        state.recs = state.recs.map(r => {
          const p = state.prices[r.id];
          if(!p?.price) return r;
          return { ...r, price:p.price, change:p.change, high:p.high, low:p.low, volume:p.volume };
        });
      }
    }
    render();
    return;
  }

  // تحميل المؤشرات: عند فتح السوق، أو الطلب الصريح فقط
  // ❌ لا نحسّب توصيات خارج وقت السوق
  const session     = getSessionInfo();
  const neverLoaded = !state.indicatorsDone && !_indicatorsLoading;
  const shouldLoad  = (isMarketOpen() || full) && !state.indicatorsDone && !_indicatorsLoading;

  if(shouldLoad) {
    _indicatorsLoading = true;
    render();

    await fetchIndicators();

    // ── حساب فقط لو السوق لا يزال مفتوحاً (لم يُغلق أثناء التحميل)
    if(isMarketOpen() || full) {
      calcRecs();
      calcSpeculative();
    }
    render();

    await Promise.all([
      fetchNews(),
      fetchEarnings(),
      fetchProfiles(),
    ]).catch(e => console.warn('[loadData] secondary fetch error:', e.message));

    _indicatorsLoading = false;

    // ── حساب ثانٍ بعد الأخبار — فقط لو السوق مفتوح
    if(isMarketOpen() || full) {
      calcRecs();
      calcSpeculative();
    }
    console.log('[loadData] اكتمل — توصيات:', state.recs?.length, '| مجازفة:', state.speculativeRecs?.length);

  } else if(neverLoaded && !_indicatorsLoading) {
    // السوق مغلق لكن نحمّل المؤشرات للعرض فقط (بدون توصيات)
    _indicatorsLoading = true;
    render();
    await fetchIndicators();
    _indicatorsLoading = false;
    // لا calcRecs هنا — السوق مغلق

  } else if(state.indicatorsDone) {
    // المؤشرات جاهزة — فقط حدّث الأسعار
    if(state.recs) {
      state.recs = state.recs.map(r => {
        const p = state.prices[r.id];
        if(!p?.price) return r;
        return { ...r, price:p.price, change:p.change, high:p.high, low:p.low, volume:p.volume };
      });
    }
  }

  render();
}

const C = {
  green:'#00ff88', blue:'#00c8ff', purple:'#b44fff',
  pink:'#ff2d7a',  yellow:'#ffe033', orange:'#ff7a00',
  text:'#e8eeff',  text2:'#7888aa', text3:'#3a4560',

// ================================================================
// ═══════════════════ CANDLESTICK ENGINE (v23) ════════════════════
// ================================================================

// ── كشف 12 نمط شمعة يابانية حقيقي مع highs/lows
function detectCandlePatterns(closes, highs, lows) {
  if (!closes || closes.length < 3) return [];

  const n   = closes.length;
  const patterns = [];

  // بيانات آخر 3 شمعات
  // شمعة اليوم
  const C0 = closes[n-1], H0 = (highs||closes)[n-1], L0 = (lows||closes)[n-1];
  const O0 = closes[n-2]; // افتراض: open = close السابق
  // شمعة أمس
  const C1 = closes[n-2], H1 = (highs||closes)[n-2], L1 = (lows||closes)[n-2];
  const O1 = closes[n-3] || C1;
  // شمعة قبل أمس
  const C2 = n>=4 ? closes[n-3] : C1;
  const H2 = n>=4 ? (highs||closes)[n-3] : H1;
  const L2 = n>=4 ? (lows||closes)[n-3] : L1;
  const O2 = n>=4 ? closes[n-4] || C2 : O1;

  const body0 = Math.abs(C0-O0), range0 = H0-L0 || 0.0001;
  const body1 = Math.abs(C1-O1), range1 = H1-L1 || 0.0001;
  const body2 = Math.abs(C2-O2), range2 = H2-L2 || 0.0001;

  const bull0 = C0>O0, bear0 = C0<O0;
  const bull1 = C1>O1, bear1 = C1<O1;
  const bull2 = C2>O2, bear2 = C2<O2;

  const upperShadow0 = bull0 ? H0-C0 : H0-O0;
  const lowerShadow0 = bull0 ? O0-L0 : C0-L0;
  const upperShadow1 = bull1 ? H1-C1 : H1-O1;
  const lowerShadow1 = bull1 ? O1-L1 : C1-L1;

  // ─ 1. DOJI (جسم < 5% من النطاق)
  if (body0/range0 < 0.05)
    patterns.push({name:'Doji', ar:'دوجي', icon:'⊕', color:'#ffe033',
      signal:'neutral', strength:2,
      tip:'تردد بين البائعين والمشترين — انتظر شمعة تأكيد'});

  // ─ 2. HAMMER (ذيل سفلي طويل، جسم صغير في الأعلى، في اتجاه هابط)
  if (lowerShadow0 > body0*2 && upperShadow0 < body0*0.5 && range0 > 0) {
    const downtrend = closes.slice(-6,-1).every((_,i,a) => i===0 || a[i] <= a[i-1]);
    if (downtrend || lowerShadow0 > body0*3)
      patterns.push({name:'Hammer', ar:'المطرقة', icon:'🔨', color:'#00ff88',
        signal:'bullish', strength:4,
        tip:'ارتداد صاعد قوي — المشترون دافعوا السعر للأعلى بقوة'});
  }

  // ─ 3. SHOOTING STAR (ذيل علوي طويل، جسم صغير في الأسفل)
  if (upperShadow0 > body0*2 && lowerShadow0 < body0*0.5 && range0 > 0) {
    const uptrend = closes.slice(-6,-1).every((_,i,a) => i===0 || a[i] >= a[i-1]);
    if (uptrend || upperShadow0 > body0*3)
      patterns.push({name:'Shooting Star', ar:'النجم الساقط', icon:'🌠', color:'#ff2d7a',
        signal:'bearish', strength:4,
        tip:'انعكاس هبوطي — البائعون ردوا السعر للأسفل بعد الارتفاع'});
  }

  // ─ 4. BULLISH ENGULFING
  if (bull0 && bear1 && C0 >= O1 && O0 <= C1 && body0 > body1)
    patterns.push({name:'Bullish Engulfing', ar:'الابتلاع الصاعد', icon:'🟢', color:'#00ff88',
      signal:'bullish', strength:5,
      tip:'انعكاس صاعد قوي — الشمعة الخضراء ابتلعت الحمراء كاملاً'});

  // ─ 5. BEARISH ENGULFING
  if (bear0 && bull1 && O0 >= C1 && C0 <= O1 && body0 > body1)
    patterns.push({name:'Bearish Engulfing', ar:'الابتلاع الهابط', icon:'🔴', color:'#ff2d7a',
      signal:'bearish', strength:5,
      tip:'انعكاس هبوطي قوي — الشمعة الحمراء ابتلعت الخضراء كاملاً'});

  // ─ 6. MORNING STAR (3 شمعات: هبوط → دوجي/صغيرة → صعود)
  if (n >= 4 && bear2 && body1/range1 < 0.3 && bull0 && C0 > (O2+C2)/2)
    patterns.push({name:'Morning Star', ar:'نجمة الصباح', icon:'⭐', color:'#00ff88',
      signal:'bullish', strength:5,
      tip:'نمط انعكاس صاعد من 3 شمعات — إشارة قوية جداً'});

  // ─ 7. EVENING STAR (3 شمعات: صعود → دوجي/صغيرة → هبوط)
  if (n >= 4 && bull2 && body1/range1 < 0.3 && bear0 && C0 < (O2+C2)/2)
    patterns.push({name:'Evening Star', ar:'نجمة المساء', icon:'🌆', color:'#ff2d7a',
      signal:'bearish', strength:5,
      tip:'نمط انعكاس هبوطي من 3 شمعات — إشارة تحذير قوية'});

  // ─ 8. THREE WHITE SOLDIERS (3 شمعات خضراء متتالية بأجسام كبيرة)
  if (n >= 4 && bull0 && bull1 && bull2 &&
      body0 > range0*0.5 && body1 > range1*0.5 && body2 > range2*0.5 &&
      C0 > C1 && C1 > C2)
    patterns.push({name:'Three White Soldiers', ar:'الجنود الثلاثة', icon:'🚀', color:'#00ff88',
      signal:'bullish', strength:5,
      tip:'زخم صاعد استثنائي — 3 شمعات خضراء قوية متتالية'});

  // ─ 9. THREE BLACK CROWS (3 شمعات حمراء متتالية)
  if (n >= 4 && bear0 && bear1 && bear2 &&
      body0 > range0*0.5 && body1 > range1*0.5 &&
      C0 < C1 && C1 < C2)
    patterns.push({name:'Three Black Crows', ar:'الغربان الثلاثة', icon:'🐦‍⬛', color:'#ff2d7a',
      signal:'bearish', strength:5,
      tip:'زخم هبوطي قوي — 3 شمعات حمراء متتالية بأجسام كبيرة'});

  // ─ 10. MARUBOZU BULLISH (جسم كبير جداً، ذيول قصيرة جداً)
  if (bull0 && body0/range0 > 0.85 && body0/O0 > 0.015)
    patterns.push({name:'Marubozu Bullish', ar:'ماروبوزو صاعد', icon:'💚', color:'#00ff88',
      signal:'bullish', strength:4,
      tip:'شمعة خضراء كاملة بلا ذيول — ضغط شراء قوي طوال الجلسة'});

  // ─ 11. MARUBOZU BEARISH
  if (bear0 && body0/range0 > 0.85 && body0/O0 > 0.015)
    patterns.push({name:'Marubozu Bearish', ar:'ماروبوزو هابط', icon:'🔴', color:'#ff2d7a',
      signal:'bearish', strength:4,
      tip:'شمعة حمراء كاملة بلا ذيول — ضغط بيع قوي طوال الجلسة'});

  // ─ 12. DRAGONFLY DOJI (ذيل سفلي طويل فقط — إشارة انعكاس صاعد)
  if (body0/range0 < 0.05 && lowerShadow0 > range0*0.6 && upperShadow0 < range0*0.1)
    patterns.push({name:'Dragonfly Doji', ar:'دوجي اليعسوب', icon:'🔵', color:'#00c8ff',
      signal:'bullish', strength:3,
      tip:'المشترون استردوا السيطرة من القاع — انعكاس صاعد محتمل'});

  // أقوى نمطين فقط (تجنب الفوضى)
  return patterns
    .sort((a,b) => b.strength - a.strength)
    .slice(0,2);
}

// ── مؤشر القوة النسبية مقارنة بـ SPY
function calcRelativeStrength(stockChange, spyChange) {
  if (spyChange === null || spyChange === undefined) return null;
  const diff = (stockChange || 0) - (spyChange || 0);
  let label, color, score;
  if      (diff >=  3) { label='قوة استثنائية';  color='#00ff88'; score= 20; }
  else if (diff >=  1) { label='أقوى من السوق';  color='#00c8ff'; score= 12; }
  else if (diff >= -1) { label='مع السوق';        color='#7888aa'; score=  0; }
  else if (diff >= -3) { label='أضعف من السوق';  color='#ff7a00'; score= -8; }
  else                  { label='ضعيف جداً';       color='#ff2d7a'; score=-15; }
  return { diff: +diff.toFixed(2), label, color, score };
}

// ── رسم الشموع اليابانية (محسّن مع highs/lows الحقيقية)
function renderCandleChart(closes, highs, lows) {
  if (!closes || closes.length < 5) return null;

  const rawC = closes.slice(-16);
  const rawH = highs  ? highs.slice(-16) : rawC;
  const rawL = lows   ? lows.slice(-16)  : rawC;
  const n    = rawC.length;

  // بيانات كل شمعة
  const candles = rawC.map((c, i) => {
    const o  = i === 0 ? c : rawC[i-1];
    const h  = rawH[i] || Math.max(c, o);
    const l  = rawL[i] || Math.min(c, o);
    return { o, c, h, l, bull: c >= o };
  });

  const allH    = candles.map(c=>c.h);
  const allL    = candles.map(c=>c.l);
  const maxP    = Math.max(...allH) * 1.001;
  const minP    = Math.min(...allL) * 0.999;
  const range   = maxP - minP || 1;
  const chartH  = 64;

  function yPx(price) { return ((maxP - price) / range) * chartH; }

  const patterns = detectCandlePatterns(closes, highs, lows);
  const topPat   = patterns[0] || null;

  return el('div', {style:{marginBottom:'8px'}}, [
    // ─ عنوان + اسم النمط
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'4px'}}, [
      el('div', {style:{fontSize:'9px', color:C.text3}}, ['🕯 الشموع اليابانية ('+n+' يوم)']),
      topPat ? el('div', {style:{
        fontSize:'9px', fontWeight:'800', color:topPat.color,
        background:topPat.color+'18', borderRadius:'4px', padding:'2px 7px',
        border:'1px solid '+topPat.color+'33',
      }}, [topPat.icon+' '+topPat.ar]) : null,
    ]),

    // ─ رسم SVG للشموع
    (() => {
      const W = 280, H = chartH + 8;
      const cW = Math.floor(W / n);
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svg.setAttribute('width',  '100%');
      svg.setAttribute('height', String(H));
      svg.style.cssText = 'display:block;background:#060b14;border-radius:8px;border:1px solid #1a2340;';

      candles.forEach((cd, i) => {
        const x   = i * cW + cW/2;
        const col = cd.bull ? '#00ff88' : '#ff2d7a';
        const col2= cd.bull ? '#00ff8855' : '#ff2d7a55';
        const bodyT = yPx(Math.max(cd.o, cd.c)) + 4;
        const bodyB = yPx(Math.min(cd.o, cd.c)) + 4;
        const bodyH = Math.max(bodyB - bodyT, 2);
        const wickT = yPx(cd.h) + 4;
        const wickB = yPx(cd.l) + 4;

        // ظل (wick)
        const wick = document.createElementNS('http://www.w3.org/2000/svg','line');
        wick.setAttribute('x1', x); wick.setAttribute('x2', x);
        wick.setAttribute('y1', wickT); wick.setAttribute('y2', wickB);
        wick.setAttribute('stroke', col2); wick.setAttribute('stroke-width','1');
        svg.appendChild(wick);

        // جسم (body)
        const bw = Math.max(cW - 3, 3);
        const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
        rect.setAttribute('x',      x - bw/2);
        rect.setAttribute('y',      bodyT);
        rect.setAttribute('width',  bw);
        rect.setAttribute('height', bodyH);
        rect.setAttribute('fill',   col);
        rect.setAttribute('rx',     '1');
        svg.appendChild(rect);
      });

      // خط MA على الرسم
      if (closes.length >= 5) {
        const maPath = candles.map((_, i) => {
          if (i < 4) return null;
          const slice = candles.slice(i-4, i+1).map(c=>c.c);
          const ma = slice.reduce((a,b)=>a+b,0)/slice.length;
          const px = yPx(ma) + 4;
          const x2 = i * cW + cW/2;
          return i===4 ? `M ${x2} ${px}` : `L ${x2} ${px}`;
        }).filter(Boolean).join(' ');
        if (maPath) {
          const path = document.createElementNS('http://www.w3.org/2000/svg','path');
          path.setAttribute('d', maPath);
          path.setAttribute('stroke', '#00c8ff55');
          path.setAttribute('stroke-width','1');
          path.setAttribute('fill','none');
          svg.appendChild(path);
        }
      }

      return svg;
    })(),

    // ─ الأنماط المكتشفة
    patterns.length > 0 ? el('div', {style:{
      marginTop:'5px', display:'flex', flexDirection:'column', gap:'3px',
    }}, patterns.map(p =>
      el('div', {style:{
        fontSize:'9px', color:p.color, lineHeight:'1.5',
        paddingRight:'2px',
      }}, [p.icon+' '+p.ar+' — '+p.tip])
    )) : null,
  ]);
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem('rec_history')||'[]'); } catch(e) { return []; }
}

function saveHistory(h) {
  const data = h.slice(-500);
  try { localStorage.setItem('rec_history', JSON.stringify(data)); } catch(e) {}
  if(window._fbReady) window._fbSaveHistory(data).catch(()=>{});
}

// ── تسجيل توصيات اليوم في السجل (يُستدعى بعد calcRecs)
function recordRecsToHistory(recs, forceSession) {
  if(!recs||!recs.length) return;
  // ✅ لا تسجيل خارج وقت السوق — أسعار الـ cache لا تُمثّل إشارة حقيقية
  if(!isMarketOpen()) return;
  const history = loadHistory();
  const now     = new Date();
  const today   = now.toDateString();

  // تحديد الجلسة: يُمرر صراحةً أو يُحسب من الوقت
  const t       = getMarketTimes();
  const m       = getNowMins();
  const session = forceSession || ((m >= t.midDay && m <= t.midDay+60) ? 'منتصف' : 'افتتاح');

  recs.forEach(r => {
    // لا تكرار لنفس السهم في نفس الجلسة من نفس اليوم
    const exists = history.some(h =>
      h.id === r.id &&
      new Date(h.recDate).toDateString() === today &&
      h.session === session
    );
    if(exists) return;
    history.push({
      id:         r.id,
      name:       r.name,
      sector:     r.sector,
      session,                          // 'افتتاح' أو 'منتصف'
      recDate:    now.toISOString(),
      recPrice:   r.price,
      target:     r.target,
      stopLoss:   r.stopLoss,
      signal:     r.signal,
      confidence: r.confidence,
      spyChange:  state.spyChange,      // حالة السوق وقت التوصية
      marketTrend:state.marketTrend,
      result:     'pending',
      resultDate: null,
      resultPrice:null,
      pnlPct:     null,
    });
  });
  saveHistory(history);
}

// ── تحديث نتائج التوصيات المعلقة
function updateHistoryResults() {
  const history = loadHistory();
  let changed = false;
  history.forEach(h => {
    if(h.result !== 'pending') return;
    const cur = state.prices[h.id]?.price;
    if(!cur || !h.recPrice) return;
    const pnlPct = ((cur - h.recPrice)/h.recPrice*100);
    const daysSince = (Date.now()-new Date(h.recDate))/(1000*60*60*24);

    // اعتبر الصفقة منتهية إذا:
    // - لمست الهدف أو وقف الخسارة
    // - أو مضى عليها 5 أيام (تداول يومي)
    const hitTarget = h.target   && cur >= h.target;
    const hitStop   = h.stopLoss && cur <= h.stopLoss;
    const expired   = daysSince >= 5;

    if(hitTarget || hitStop || expired) {
      h.result      = pnlPct >= 0 ? 'win' : 'loss';
      h.resultDate  = new Date().toISOString();
      h.resultPrice = cur;
      h.pnlPct      = +pnlPct.toFixed(2);
      changed = true;
    } else {
      // تحديث P&L الحالي
      h.pnlPct = +pnlPct.toFixed(2);
    }
  });
  if(changed) saveHistory(history);
  return history;
}

// ── إحصائيات السجل
function calcHistoryStats(history) {
  const closed  = history.filter(h=>h.result!=='pending');
  const wins    = closed.filter(h=>h.result==='win');
  const losses  = closed.filter(h=>h.result==='loss');
  const pending = history.filter(h=>h.result==='pending');
  const winRate = closed.length ? Math.round(wins.length/closed.length*100) : 0;
  const avgWin  = wins.length
    ? +(wins.reduce((s,h)=>s+(h.pnlPct||0),0)/wins.length).toFixed(2) : 0;
  const avgLoss = losses.length
    ? +(losses.reduce((s,h)=>s+(h.pnlPct||0),0)/losses.length).toFixed(2) : 0;
  const expectancy = closed.length
    ? +((winRate/100)*avgWin + (1-winRate/100)*avgLoss).toFixed(2) : 0;
  return { closed:closed.length, wins:wins.length, losses:losses.length,
           pending:pending.length, winRate, avgWin, avgLoss, expectancy };
}

          const clr       = isPending ? C.yellow : isWin ? C.green : C.pink;
          const icon      = isPending ? '⏳' : isWin ? '✅' : '❌';
          const cur       = state.prices[h.id]?.price;
          const sesColor  = h.session==='افتتاح' ? C.blue : h.session==='منتصف' ? C.orange : C.text3;

          return el('div', {style:{
            background:'#0a1020', border:`1px solid ${clr}22`,
            borderRadius:'10px', padding:'10px 12px', marginBottom:'6px',
          }}, [
            el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}, [
              el('div', {style:{flex:'1'}}, [
                el('div', {style:{display:'flex', alignItems:'center', gap:'5px', marginBottom:'2px', flexWrap:'wrap'}}, [
                  el('span', {style:{fontSize:'13px', fontWeight:'800', color:C.text}}, [h.name]),
                  el('span', {style:{fontSize:'9px', color:C.text3}}, [h.id]),
                  // badge الجلسة
                  h.session && el('span', {style:{
                    fontSize:'8px', fontWeight:'700', color:sesColor,
                    background:sesColor+'15', borderRadius:'3px', padding:'1px 5px',
                    border:'1px solid '+sesColor+'33',
                  }}, [h.session==='افتتاح'?'🌅 افتتاح':'🌇 منتصف']),
                  el('span', {style:{
                    fontSize:'8px', fontWeight:'700', color:clr,
                    background:clr+'15', borderRadius:'3px', padding:'1px 5px',
                  }}, [icon+' '+(isPending?'معلقة':isWin?'ربح':'خسارة')]),
                ]),
                el('div', {style:{fontSize:'9px', color:C.text3}}, [
                  '📅 '+fmtDate(h.recDate)+' • $'+fmt(h.recPrice,2)+
                  (h.resultDate?' → '+fmtDate(h.resultDate):''),
                ]),
                el('div', {style:{fontSize:'9px', color:C.text2, marginTop:'1px'}}, [
                  h.signal+' '+h.confidence+'% ثقة'+
                  (h.spyChange!=null?' • SPY '+(h.spyChange>=0?'+':'')+h.spyChange+'%':''),
                ]),
              ]),
              el('div', {style:{textAlign:'left', minWidth:'58px'}}, [
                el('div', {style:{fontSize:'14px', fontWeight:'900',
                  color:(h.pnlPct||0)>=0?C.green:C.pink}},
                  [h.pnlPct!=null?(h.pnlPct>=0?'+':'')+h.pnlPct+'%':'—']),
                isPending && cur && el('div', {style:{fontSize:'9px', color:C.text3}},
                  ['$'+fmt(cur,2)]),
                h.target && el('div', {style:{fontSize:'8px', color:C.text3}},
                  ['🎯$'+fmt(h.target,2)]),
                h.stopLoss && el('div', {style:{fontSize:'8px', color:C.text3}},
                  ['🛑$'+fmt(h.stopLoss,2)]),
              ]),
            ]),
            // شريط تقدم السعر
            isPending && h.target && h.stopLoss && cur && (() => {
              const pct = Math.min(100,Math.max(0,
                (cur-h.stopLoss)/(h.target-h.stopLoss)*100));
              return el('div', {style:{marginTop:'6px'}}, [
                el('div', {style:{height:'3px', background:'#1a2340', borderRadius:'2px'}}, [
                  el('div', {style:{height:'3px', borderRadius:'2px', width:pct+'%',
                    background:`linear-gradient(90deg,${C.pink},${C.yellow},${C.green})`}}),
                ]),
                el('div', {style:{display:'flex', justifyContent:'space-between',
                  fontSize:'8px', color:C.text3, marginTop:'2px'}}, [
                  el('span',{},['🛑'+fmt(h.stopLoss,2)]),
                  el('span',{style:{color:C.text2}},[Math.round(pct)+'%']),
                  el('span',{},['🎯'+fmt(h.target,2)]),
                ]),
              ]);
            })(),
          ]);
        })),
  ]);
}

// ── معالج الأخطاء العالمي — يمنع الشاشة السوداء
window.onerror = function(msg, src, line, col, err) {
  console.error('[Global Error]', msg, 'line:', line);
  const appEl = document.getElementById('app');
  if(appEl && appEl.innerHTML === '') {
    appEl.innerHTML = `
      <div style="padding:30px;text-align:center;color:#fff;font-family:sans-serif">
        <div style="font-size:40px;margin-bottom:12px">⚠️</div>
        <div style="font-size:14px;color:#ff7a00;margin-bottom:8px">خطأ في التطبيق</div>
        <div style="font-size:11px;color:#888;margin-bottom:16px">${msg}</div>
        <button onclick="location.reload()" style="background:#0a1020;border:1px solid #3a4560;color:#00c8ff;padding:10px 20px;border-radius:8px;font-size:12px">🔄 إعادة التحميل</button>
      </div>`;
  }
  return false;
};

window.onunhandledrejection = function(e) {
  console.error('[Unhandled Promise]', e.reason);
};

function render() {
  try {
    const root = app();
    if(!root) { console.error('[render] لا يوجد div#app'); return; }
    root.innerHTML = '';
    root.appendChild(renderApp());
    if(!state.animatedRecs) state.animatedRecs = new Set();
    if(state.recs) state.recs.forEach(r => state.animatedRecs.add(r.id));
  } catch(e) {
    console.error('[render] خطأ:', e.message, e.stack);
  }
}

function renderApp() {
  return el('div', {id:'main'}, [
    renderHeader(),
    renderTicker(),
    renderDataCheck(),
    renderTabs(),
    renderContent(),
  ]);
}

// ── Data Check Bar
function renderDataCheck() {
  // نحفظ آخر قراءة للمؤشرات في state لعرضها حتى بعد إغلاق السوق
  const dc = state.dataCheck;

  // إذا لم تُحمّل أي مؤشرات ولا يوجد cache — أخفِ المربع
  const hasAnyData = dc.rsi.real > 0 || dc.prices.real > 0;
  if(!hasAnyData && !_indicatorsLoading) return el('div',{},[]);
  const items = [
    {label:'أسعار', real:dc.prices.real, total:dc.prices.total},
    {label:'RSI',   real:dc.rsi.real,    total:dc.rsi.total},
    {label:'MACD',  real:dc.macd.real,   total:dc.macd.total},
    {label:'MA20',  real:dc.ma.real,     total:dc.ma.total},
    {label:'MA200', real:dc.ma200?.real||0, total:dc.ma200?.total||dc.ma.total},
    {label:'دعم',   real:dc.support.real,total:dc.support.total},
    {label:'ATR',   real:dc.atr.real,    total:dc.atr.total},
    {label:'BB',    real:dc.bb.real,     total:dc.bb.total},
  ];

  if(_indicatorsLoading) {
    return el('div', {style:{
      background:'#0a1020', borderBottom:'1px solid var(--border)',
      padding:'8px 16px',
      display:'flex', alignItems:'center', gap:'8px',
    }}, [
      el('div', {style:{
        width:'14px', height:'14px', border:'2px solid #00c8ff44',
        borderTop:'2px solid #00c8ff', borderRadius:'50%',
        animation:'spin 1s linear infinite', flexShrink:0,
      }}),
      el('span', {style:{fontSize:'11px', color:C.blue}}, [
        '⏳ جاري تحميل المؤشرات... (~45 ثانية)'
      ]),
    ]);
  }

  const session    = getSessionInfo();
  const indTime    = state.indicatorsTime;  // وقت آخر تحميل مؤشرات
  const isClosed   = !isMarketOpen() && !_indicatorsLoading;

  return el('div', {style:{
    background:'#060b14', borderBottom:'1px solid var(--border)',
    padding:'6px 16px',
  }}, [
    el('div', {style:{
      display:'grid', gridTemplateColumns:'repeat(4,1fr)',
      gap:'4px', marginBottom: isClosed && indTime ? '5px' : '0',
    }},
    items.map(item => {
      const pct  = item.total>0 ? (item.real/item.total*100) : 0;
      const ok   = pct >= 80;
      const warn = pct >= 50;
      const color= ok ? C.green : warn ? C.yellow : C.pink;
      return el('div', {style:{
        background:'#0a1020', borderRadius:'6px',
        padding:'3px 6px', textAlign:'center',
        border:`1px solid ${color}22`,
      }}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, [item.label]),
        el('div', {style:{fontSize:'10px', fontWeight:'700', color}}, [
          item.real+'/'+item.total
        ]),
      ]);
    })
    ),
    // شريط الحالة — يظهر فقط عند إغلاق السوق مع بيانات محفوظة
    isClosed && indTime ? el('div', {style:{
      display:'flex', alignItems:'center', justifyContent:'space-between',
      marginTop:'5px', padding:'4px 8px',
      background:'rgba(255,224,51,0.05)',
      border:'1px solid rgba(255,224,51,0.15)',
      borderRadius:'6px',
    }}, [
      el('span', {style:{fontSize:'10px', color:C.yellow}}, [
        '🕐 بيانات محفوظة — السوق مغلق'
      ]),
      el('span', {style:{fontSize:'10px', color:C.text3}}, [
        'آخر تحميل: ' + new Date(indTime).toLocaleTimeString('ar', {hour:'2-digit', minute:'2-digit'})
      ]),
    ]) : null,
  ]);
}

function renderRecTab() {
  const session = getSessionInfo();
  const sInfo   = getMarketSession();

  // حالة: خارج أوقات السوق — ولا توصيات محفوظة
  if(!session.canRec && !state.indicatorsDone && !_indicatorsLoading) {
    const icon  = sInfo==='pre' ? '🌅' : sInfo==='after' ? '🌆' : '🌙';
    const msg   = sInfo==='pre'
      ? 'قبل افتتاح السوق — لا توصيات بعد\nستبدأ التوصيات الساعة '+(session.sub.split(' ')[2]||'4:30م')
      : sInfo==='after'
      ? 'بعد إغلاق السوق — لا توصيات جديدة\nالتوصيات القادمة عند فتح السوق الغد'
      : 'السوق مغلق — لا توصيات\nستبدأ التوصيات عند فتح السوق 4:30م';

    return el('div', {style:{textAlign:'center', padding:'60px 20px'}}, [
      el('div', {style:{fontSize:'48px', marginBottom:'12px'}}, [icon]),
      el('div', {style:{fontSize:'14px', fontWeight:'800', color:C.text, marginBottom:'8px'}}, [session.label]),
      el('div', {style:{fontSize:'11px', color:C.text2, lineHeight:'1.8', whiteSpace:'pre-line'}}, [msg]),
      el('div', {style:{
        marginTop:'16px', fontSize:'11px', color:C.green,
        background:'rgba(0,255,136,.08)', borderRadius:'8px',
        padding:'8px 12px', border:'1px solid rgba(0,255,136,.2)',
      }}, ['✅ لن تظهر أي توصية إلا ببيانات حقيقية كاملة']),
      el('button', {
        style:{

          background:'rgba(0,200,255,.1)', border:'1px solid rgba(0,200,255,.3)',
          borderRadius:'10px', color:C.blue, fontSize:'12px', fontWeight:'700',
          cursor:'pointer',
        },
        onClick: () => { window.DEBUG_MARKET = true; state.indicatorsDone=false; _recsLockedToday=false; loadData(true).then(()=>render()); }

  // حالة: جاري التحميل
  if(_indicatorsLoading) {
    return el('div', {style:{padding:'20px 16px'}}, [

        background:'#0a1020', borderRadius:'14px',
        border:'1px solid rgba(0,200,255,.2)',

          'جاري تحميل المؤشرات...'

        el('div', {style:{fontSize:'11px', color:C.text2}}, [

        el('div', {style:{fontSize:'10px', color:C.text3, marginTop:'8px'}}, [

        ]),

    const trendMsg = trend==='bearish'
      ? '📉 السوق هابط — الأداة تحمي رأسمالك بتقليل التوصيات'

      ? '⚠️ السوق محايد — لا فرص تستوفي الشروط حالياً'

      ]),

        fontSize:'11px', color:C.text2, lineHeight:'1.9',
        background:'rgba(255,255,255,.03)', borderRadius:'10px',
        padding:'10px 14px', marginBottom:'10px', textAlign:'right',
      }}, [
        el('div', {style:{fontWeight:'700', color:C.text, marginBottom:'4px'}}, ['الشروط التسعة المطلوبة:']),

        '• هدف ربح 2%+ • R/R 1:1+', el('br'),
        '• لا أرباح خلال 5 أيام', el('br'),
        '• لا gap-up أكثر من 8%', el('br'),
        '• توقيت مقبول • فوق MA50',
      ]),
      el('div', {style:{
        fontSize:'11px', color:C.yellow,
        background:'rgba(255,224,51,.06)', borderRadius:'8px',
