  return el('div', {style:{padding:'12px 16px'}}, [
    // رأس
    el('div', {style:{marginBottom:'12px'}}, [
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center'}}, [
        el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.text}}, [
          '🎯 توصيات اليوم — '+state.recs.length+' أسهم'
        ]),
        el('div', {style:{fontSize:'10px', color:C.text2}}, [
          state.recsTime ? 'آخر تحديث: '+state.recsTime.toLocaleTimeString('ar') : ''
        ]),
      ]),
    ]),

    // البطاقات
    ...state.recs.map((r,idx) => renderRecCard(r, idx)),
  ]);
}

function renderRecCard(r, idx) {
  const isSelected = state.selected === r.id;
  const sigColor = r.signal.includes('قوي') ? C.green :
                   r.signal.includes('شراء') ? C.blue : C.yellow;

  // ── نوع الأمر — منطق صحيح
  // حالة 1: السعر عند الدعم مباشرة (فرق أقل من 1%) → أمر سوق
  // حالة 2: السعر أعلى من الدعم بـ 1-10%           → أمر محدد عند الدعم (انتظر تراجع)
  // حالة 3: لا يوجد دعم واضح                       → أمر سوق بالسعر الحالي
  const distToSup  = r.support>0 ? (r.price - r.support) / r.price * 100 : 0;
  const atSupport  = r.nearSupport || distToSup < 1;
  const hasSupport = r.support>0 && distToSup > 0;

  let orderType, orderColor, orderNote, buyPrice;

  if(atSupport) {
    // السعر عند الدعم الآن — اشتري بسعر السوق
    orderType  = 'أمر سوق';
    orderColor = C.green;
    orderNote  = 'السعر عند الدعم — اشتري فوراً';
    buyPrice   = r.price;
  } else if(hasSupport && distToSup <= 10) {
    // السعر فوق الدعم — ضع أمر محدد عند الدعم وانتظر التراجع
    orderType  = 'أمر محدد';
    orderColor = C.blue;
    orderNote  = 'انتظر تراجع السعر للدعم — ينفذ تلقائياً';
    buyPrice   = r.support * 1.002; // سنتات فوق الدعم لضمان التنفيذ
  } else {
    // السعر بعيد عن الدعم أو لا يوجد دعم — أمر سوق بالسعر الحالي
    orderType  = 'أمر سوق';
    orderColor = C.yellow;
    orderNote  = 'ادخل بسعر السوق — راقب وقف الخسارة';
    buyPrice   = r.price;
  }

  return el('div', {
    class: state.animatedRecs?.has(r.id) ? '' : 'fade-up',
    style:{
      background:'#0a1020', borderRadius:'14px',
      border:`1px solid ${r.isConviction ? '#ffe03344' : 'var(--border)'}`,
      padding:'14px', marginBottom:'10px',
      animationDelay: idx*0.05+'s',
    },
    onClick: () => { state.selected = isSelected ? null : r.id; render(); }
  }, [

    // ── 1. رأس البطاقة: اسم + إشارة
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'8px'}}, [
      el('div', {}, [
        el('div', {style:{display:'flex', alignItems:'center', gap:'6px', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'16px', fontWeight:'900', color:C.text}}, [r.name]),
          el('span', {style:{fontSize:'10px', color:C.text2}}, [r.id]),
          r.isConviction && el('span', {style:{
            fontSize:'9px', color:C.yellow, background:'rgba(255,224,51,.12)',
            borderRadius:'4px', padding:'1px 5px', border:'1px solid rgba(255,224,51,.3)',
          }}, ['⭐ High Conviction']),
        ]),
        el('div', {style:{fontSize:'10px', color:C.text2}}, [r.sector]),
      ]),
      el('div', {style:{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:'4px'}}, [
        el('div', {style:{
          background: sigColor+'22', border:`1px solid ${sigColor}44`,
          borderRadius:'8px', padding:'4px 10px',
          fontSize:'11px', fontWeight:'700', color:sigColor,
        }}, [r.signal]),
        r.isCooldown && el('span', {style:{
          fontSize:'9px', fontWeight:'700', padding:'2px 6px',
          borderRadius:'20px', background:'rgba(255,45,122,.15)',
          color:'#ff2d7a', border:'1px solid rgba(255,45,122,.3)',
        }}, ['⏸️ Cooldown']),
      ]),
    ]),

    // ── 2. السعر + RSI + ثقة
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'6px', marginBottom:'8px'}}, [
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['السعر']),
        el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.text}}, [fmtPrice(r.price)]),
        el('div', {style:{fontSize:'9px', color: r.change>=0?C.green:C.pink}}, [
          (r.change>=0?'+':'')+fmt(r.change)+'%'
        ]),
      ]),
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['RSI']),
        el('div', {style:{
          fontSize:'13px', fontWeight:'700',
          color: r.rsi!=null?(r.rsi<30?C.green:r.rsi>70?C.pink:C.blue):C.text3,

    // ── 3. شريط القوة
    el('div', {style:{marginBottom:'8px'}}, [

    el('div', {style:{

        el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'9px', color:C.text3}}, ['MA20']),
          el('span', {style:{fontSize:'10px', fontWeight:'700', color:r.ma20?(r.price>r.ma20?C.green:C.pink):C.text3}},

        el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'9px', color:C.text3}}, ['MA50']),
          el('span', {style:{fontSize:'10px', fontWeight:'700', color:r.ma50?(r.price>r.ma50?C.green:C.pink):C.text3}},
            [r.ma50?fmtPrice(r.ma50):'—']),

        el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'9px', color:C.text3}}, ['MA200']),
          el('span', {style:{fontSize:'10px', fontWeight:'700', color:r.ma200?(r.price>r.ma200?C.green:C.pink):C.text3}},

        el('div', {style:{fontSize:'9px', marginTop:'2px', color:r.price>(r.ma200||r.ma50||0)?C.green:C.orange}}, [

    // ── 6. شموع يابانية + القوة النسبية
    r.closes && r.closes.length >= 5

      el('div', {style:{

    ]),

    // ── 8. التفاصيل (عند الضغط) — مبسطة
    isSelected && el('div', {style:{borderTop:'1px solid var(--border)', paddingTop:'10px', marginTop:'2px'}}, [
      r.reasons.length>0 && el('div', {style:{marginBottom:'8px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text2, marginBottom:'4px', fontWeight:'700'}}, ['📋 أسباب التوصية:']),
        ...r.reasons.map(reason =>
          el('div', {style:{fontSize:'10px', color:C.green, marginBottom:'2px'}}, ['✓ '+reason])
        ),
      ]),

          el('div', {style:{fontWeight:'700', color:r.stochRsi<20?C.green:r.stochRsi>80?C.pink:C.blue}},

        r.macd!=null && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 8px'}}, [
          el('div', {style:{color:C.text3}}, ['MACD']),
          el('div', {style:{fontWeight:'700', color:r.macd>0?C.green:C.pink}},
            [fmt(r.macd,3)+' '+(r.macd>0?'↑':'↓')]),
        ]),
        r.riskReward>0 && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 8px'}}, [
          el('div', {style:{color:C.text3}}, ['R/R نسبة']),
          el('div', {style:{fontWeight:'700', color:r.riskReward>=2?C.green:C.yellow}},
            [fmt(r.riskReward,1)+'x']),

      // ✅ أنماط الشموع في التفاصيل
      r.candlePatterns?.length > 0 && el('div', {style:{
        marginTop:'8px', background:'#060b14', borderRadius:'8px', padding:'8px 10px',
      }}, [
        el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'5px', fontWeight:'700'}}, ['🕯 أنماط الشموع المكتشفة']),
        ...r.candlePatterns.map(p2 => el('div', {style:{
          display:'flex', alignItems:'center', gap:'6px',
          fontSize:'10px', color:p2.color, marginBottom:'3px',

      r.earnings<999 && el('div', {style:{
        fontSize:'10px', color:C.orange, marginTop:'8px',

}

function renderSpecTab() {

      el('div', {style:{fontSize:'12px', color:C.blue}}, ['⏳ جاري تحميل المؤشرات...']),
    ]);
  }

  if(!state.indicatorsDone) {
    return el('div', {style:{padding:'40px 16px', textAlign:'center'}}, [
      el('div', {style:{fontSize:'40px', marginBottom:'12px'}}, ['🎲']),
      el('div', {style:{fontSize:'13px', color:C.text2}}, [

      ]),
    ]);
  }

  // ══ تحذير السوق الهابط الحقيقي (أقل من -1.5%)
  if(state.marketTrend === 'bearish') {
    return el('div', {style:{padding:'20px 16px'}}, [
      el('div', {style:{
        background:'rgba(255,45,122,.08)', border:'1px solid rgba(255,45,122,.3)',

        el('div', {style:{fontSize:'36px', marginBottom:'10px'}}, ['🛑']),
        el('div', {style:{fontSize:'14px', fontWeight:'700', color:C.pink, marginBottom:'6px'}}, [
          'السوق هابط — لا مجازفة اليوم'
        ]),
        el('div', {style:{fontSize:'11px', color:C.text2, lineHeight:'1.8', marginBottom:'10px'}}, [
          'SPY: '+(state.spyChange>=0?'+':'')+fmt(state.spyChange)+'%',
          el('br'),
          'QQQ: '+(state.qqqChange>=0?'+':'')+fmt(state.qqqChange)+'%',
          el('br'),
          'أسهم المجازفة تنهار بسرعة في السوق الهابط',
        ]),
        el('div', {style:{
          fontSize:'11px', color:C.orange,
          background:'rgba(255,122,0,.08)', borderRadius:'8px',

  const specs = state.speculativeRecs || [];

  const trendColor = state.marketTrend==='bullish'?C.green:

                     state.marketTrend==='neutral' ?'السوق محايد ⚠️':'جاري التحقق...';

  return el('div', {style:{padding:'12px 16px'}}, [
    el('div', {style:{marginBottom:'12px'}}, [
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'6px'}}, [
        el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.purple}}, [
          '🎲 رادار المجازفة — '+specs.length+' فرصة'
        ]),
        el('div', {style:{fontSize:'10px', fontWeight:'700', color:trendColor}}, [trendLabel]),
      ]),
      // SPY + QQQ
      state.spyChange!==null && el('div', {style:{
        display:'flex', gap:'8px', fontSize:'10px',
        background:'#060b14', borderRadius:'8px', padding:'5px 8px',
        marginBottom:'6px',
      }}, [
        el('span', {style:{color:C.text2}}, ['مؤشر السوق:']),
        el('span', {style:{color:state.spyChange>=0?C.green:C.pink, fontWeight:'700'}}, [
          'SPY '+(state.spyChange>=0?'+':'')+fmt(state.spyChange)+'%'
        ]),
        el('span', {style:{color:state.qqqChange>=0?C.green:C.pink, fontWeight:'700'}}, [
          'QQQ '+(state.qqqChange>=0?'+':'')+fmt(state.qqqChange)+'%'
        ]),

      el('div', {style:{

      }}, ['⚠️ أسهم مجازفة — خصص 5-8% فقط من رأس مالك لكل صفقة']),

    specs.length===0 ?
      el('div', {style:{textAlign:'center', padding:'40px 0', color:C.text2, fontSize:'12px'}}, [
        'لا توجد فرص مجازفة تستوفي الشروط الآن'
      ]) :
      el('div', {}, specs.map((s,i) => renderSpecCard(s,i))),
  ]);
}

function renderSpecCard(s, idx) {
  const isSelected  = state.selected === s.id+'_spec';
  const labelColor  = s.score>=80?C.green:s.score>=65?C.orange:s.score>=50?C.yellow:C.text2;
  const entryColor  = s.entryTiming==='ادخل الآن'?C.green:
                      s.entryTiming==='مقبول'?C.blue:
                      s.entryTiming==='انتظر'?C.yellow:C.orange;
  const rrColor     = s.riskReward>=3?C.green:s.riskReward>=2?C.blue:C.yellow;

  // نوع الأمر
  const distToSup = s.support>0 ? (s.price-s.support)/s.price*100 : 999;
  const atSup     = s.nearSupport || distToSup < 1;
  const hasSup    = s.support>0 && distToSup>0 && distToSup<=18;
  const orderType = atSup ? 'أمر سوق' : hasSup ? 'أمر محدد' : 'أمر سوق';
  const orderColor= atSup ? C.green   : hasSup  ? C.purple  : C.yellow;
  const buyPrice  = hasSup && !atSup  ? s.support*1.002 : s.price;

  return el('div', {
    class:'fade-up',
    style:{
      background:'#0a1020', borderRadius:'14px',
      border:'1px solid rgba(180,79,255,.25)',
      padding:'14px', marginBottom:'12px',
      animationDelay: idx*0.05+'s',
    },
    onClick: () => { state.selected = isSelected?null:s.id+'_spec'; render(); }
  }, [

function renderMarketTab() {
  const priced = ALL_STOCKS
    .map(s => {
      const p = state.prices[s.id];
      return p?.price > 0 ? {...s, p} : null;
    })
    .filter(Boolean)
    .sort((a,b) => Math.abs(b.p.change||0) - Math.abs(a.p.change||0));

  const isLive = priced.some(s=>s.p.isReal);
  const q      = (state.search||'').toLowerCase().trim();
  const sec    = state.sector || 'الكل';

  const filtered = priced
    .filter(s => sec==='الكل' || s.sector===sec || s.sector?.includes(sec))
    .filter(s => !q || s.id.toLowerCase().includes(q) || s.name.toLowerCase().includes(q) || s.sector?.toLowerCase().includes(q));

  // فرز حسب الفلتر النشط
  const sortBy = state.marketSort || 'change';
  const sorted = [...filtered].sort((a,b) => {
    if(sortBy==='change') return Math.abs(b.p.change||0) - Math.abs(a.p.change||0);
    if(sortBy==='price')  return b.p.price - a.p.price;
    if(sortBy==='vol')    return (b.p.volume/b.p.avgVolume||0) - (a.p.volume/a.p.avgVolume||0);
    return 0;
  });

  const gainers = sorted.filter(s=>(s.p.change||0)>0);
  const losers  = sorted.filter(s=>(s.p.change||0)<0);
  const flat    = sorted.filter(s=>(s.p.change||0)===0);

  // إحصائيات سريعة
  const avgChange = priced.length
    ? priced.reduce((s,x)=>s+(x.p.change||0),0)/priced.length : 0;

  if(priced.length === 0) {
    const elapsed = state._loadStart ? (Date.now()-state._loadStart)/1000 : 0;
    if(elapsed > 20) {
      return el('div',{style:{padding:'30px 16px',textAlign:'center'}},[
        el('div',{style:{fontSize:'32px',marginBottom:'8px'}},['⚠️']),
        el('div',{style:{fontSize:'13px',color:C.orange,marginBottom:'6px'}},['فشل تحميل الأسعار']),
        el('button',{
          style:{background:'rgba(0,200,255,.15)',border:'1px solid rgba(0,200,255,.3)',
            borderRadius:'8px',padding:'8px 16px',color:C.blue,fontSize:'11px'},
          onClick:()=>{state._loadStart=Date.now();loadData();render();}
        },['🔄 إعادة المحاولة']),
      ]);
    }
    return el('div',{style:{padding:'40px 16px',textAlign:'center'}},[
      el('div',{style:{width:'36px',height:'36px',margin:'0 auto 12px',
        border:'3px solid rgba(0,200,255,.2)',borderTop:'3px solid #00c8ff',
        borderRadius:'50%',animation:'spin 1s linear infinite'}}),
      el('div',{style:{fontSize:'13px',color:C.blue}},['جاري تحميل الأسعار...']),
    ]);
  }

  return el('div',{style:{padding:'12px 16px'}},[

    // ── شريط الحالة
    el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}},[
      el('div',{style:{fontSize:'13px',fontWeight:'700',color:C.text}},['📊 '+priced.length+' سهم']),
      el('div',{style:{display:'flex',gap:'6px',alignItems:'center'}},[
        el('div',{style:{
          fontSize:'10px',fontWeight:'700',
          color:avgChange>=0?C.green:C.pink,
          background:avgChange>=0?'rgba(0,255,136,.1)':'rgba(255,45,122,.1)',
          borderRadius:'6px',padding:'3px 8px',
          border:`1px solid ${avgChange>=0?'rgba(0,255,136,.3)':'rgba(255,45,122,.3)'}`,
        }},['متوسط '+(avgChange>=0?'+':'')+avgChange.toFixed(2)+'%']),
        el('div',{style:{
          fontSize:'10px',fontWeight:'700',
          color:isLive?C.green:C.yellow,
          background:isLive?'rgba(0,255,136,.1)':'rgba(255,224,51,.1)',
          borderRadius:'6px',padding:'3px 8px',
          border:`1px solid ${isLive?'rgba(0,255,136,.3)':'rgba(255,224,51,.3)'}`,
        }},[isLive?'🟢 حي':'🟡 آخر تحديث']),
      ]),
    ]),

    // ── فلاتر القطاعات
    el('div',{style:{display:'flex',gap:'5px',flexWrap:'nowrap',overflowX:'auto',marginBottom:'8px',paddingBottom:'2px'}},[
      ...[
        {id:'الكل', label:'الكل'},
        {id:'تكنولوجيا', label:'💻 تقنية'},
        {id:'AI/شرائح',  label:'🤖 AI'},
        {id:'مالية',     label:'🏦 مالية'},
        {id:'صحة',       label:'💊 صحة'},
        {id:'طاقة',      label:'⚡ طاقة'},
      ].map(f =>
        el('button',{
          style:{
            fontSize:'10px',fontWeight:'700',whiteSpace:'nowrap',flexShrink:'0',
            padding:'5px 10px',borderRadius:'20px',
            color: state.sector===f.id?'#050810':C.text2,
            background: state.sector===f.id?C.blue:'rgba(255,255,255,.05)',
            border: state.sector===f.id?'none':'1px solid #1a2340',
          },
          onClick:()=>{state.sector=f.id;render();}
        },[f.label])
      ),
    ]),

    // ── بحث + فرز + تحديث
    el('div',{style:{display:'flex',gap:'6px',marginBottom:'10px'}},[
      el('input',{
        type:'text',placeholder:'🔍 بحث...',value:state.search||'',
        style:{flex:'1',background:'#0a1020',border:'1px solid #1a2340',
          borderRadius:'8px',padding:'7px 10px',color:C.text,fontSize:'12px',outline:'none'},
        onInput:e=>{state.search=e.target.value;render();}
      }),
      // فرز
      (() => {
        const sel = document.createElement('select');
        Object.assign(sel.style,{
          background:'#0a1020',border:'1px solid #1a2340',borderRadius:'8px',
          padding:'7px 6px',color:C.text2,fontSize:'11px',flexShrink:'0',
        });
        [['change','تغيير'],['vol','حجم'],['price','سعر']].forEach(([v,l])=>{
          const o=document.createElement('option');
          o.value=v; o.textContent=l;
          if(state.marketSort===v) o.selected=true;
          sel.appendChild(o);
        });
        sel.onchange=e=>{state.marketSort=e.target.value;render();};
        return sel;
      })(),
      el('button',{
        style:{fontSize:'11px',fontWeight:'700',color:C.blue,flexShrink:'0',
          background:'rgba(0,200,255,.1)',borderRadius:'8px',padding:'7px 10px',
          border:'1px solid rgba(0,200,255,.3)'},
        onClick:async()=>{await fetchPrices();await fetchMarketTrend();render();}
      },['🔄']),
    ]),

    // ── إحصائيات سريعة
    el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'6px',marginBottom:'12px'}},[

        borderRadius:'8px',padding:'8px',textAlign:'center'}},[

        el('div',{style:{fontSize:'9px',color:C.text3}},['▲ رابح']),
      ]),
      el('div',{style:{background:'rgba(255,45,122,.06)',border:'1px solid rgba(255,45,122,.15)',
        borderRadius:'8px',padding:'8px',textAlign:'center'}},[
        el('div',{style:{fontSize:'18px',fontWeight:'900',color:C.pink}},[losers.length+'']),
        el('div',{style:{fontSize:'9px',color:C.text3}},['▼ خاسر']),
      ]),
      el('div',{style:{background:'rgba(255,255,255,.03)',border:'1px solid #1a2340',
        borderRadius:'8px',padding:'8px',textAlign:'center'}},[
        el('div',{style:{fontSize:'18px',fontWeight:'900',color:C.text2}},[flat.length+'']),
        el('div',{style:{fontSize:'9px',color:C.text3}},['➡️ مستقر']),
      ]),

    // ── قائمة الأسهم (شبكة منظمة)
    filtered.length === 0
      ? el('div',{style:{textAlign:'center',padding:'30px',color:C.text2,fontSize:'12px'}},['لا نتائج'])
      : el('div',{},[

          // الرابحون
          gainers.length>0 && el('div',{style:{marginBottom:'10px'}},[
            el('div',{style:{fontSize:'10px',color:C.green,fontWeight:'700',
              marginBottom:'5px',display:'flex',alignItems:'center',gap:'4px'}},[
              '▲ الرابحون ('+gainers.length+')',
            ]),
            el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px'}},[
              ...gainers.map(s=>renderMiniStock(s)),
            ]),
          ]),

          // الخاسرون
          losers.length>0 && el('div',{style:{marginBottom:'10px'}},[
            el('div',{style:{fontSize:'10px',color:C.pink,fontWeight:'700',
              marginBottom:'5px'}},[
              '▼ الخاسرون ('+losers.length+')',
            ]),
            el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px'}},[
              ...losers.map(s=>renderMiniStock(s)),
            ]),
          ]),

          // مستقرون
          flat.length>0 && el('div',{},[
            el('div',{style:{fontSize:'10px',color:C.text2,fontWeight:'700',marginBottom:'5px'}},['➡️ مستقر ('+flat.length+')']),
            el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px'}},[
              ...flat.map(s=>renderMiniStock(s)),
            ]),
          ]),

        ]),
  ]);
}

function renderMiniStock(s) {
  const chg     = s.p.change || 0;
  const isUp    = chg > 0;
  const clr     = chg > 0 ? C.green : chg < 0 ? C.pink : C.text2;
  const spyDiff = state.spyChange != null ? chg - state.spyChange : null;
  const ind     = state.indicators[s.id];
  const volR    = s.p.avgVolume>0 ? s.p.volume/s.p.avgVolume : 0;

  return el('div',{style:{
    background:'#060b14', borderRadius:'8px',
    padding:'8px 10px',
    border:`1px solid ${clr}18`,
    display:'flex', flexDirection:'column', gap:'2px',
    minWidth:'0', // مهم لـ grid overflow
  }},[
    // ── السطر الأول: رمز + تغيير
    el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},[
      el('div',{},[
        el('div',{style:{fontSize:'11px',fontWeight:'800',color:C.text,
          overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'80px'}},
          [s.name]),
        el('div',{style:{fontSize:'9px',color:C.text3}},[s.id]),
      ]),
      el('div',{style:{textAlign:'left',flexShrink:'0'}},[
        el('div',{style:{fontSize:'12px',fontWeight:'800',color:clr}},
          [(isUp?'+':'')+fmt(chg,2)+'%']),
        el('div',{style:{fontSize:'10px',color:C.text2}},['$'+fmtPrice(s.p.price)]),
      ]),
    ]),
    // ── السطر الثاني: vs SPY + حجم
    el('div',{style:{display:'flex',gap:'4px',flexWrap:'wrap'}},[
      spyDiff!=null && el('span',{style:{
        fontSize:'8px',color:spyDiff>=0?C.green:C.pink,
        background:spyDiff>=0?'rgba(0,255,136,.08)':'rgba(255,45,122,.08)',
        borderRadius:'3px',padding:'1px 4px',
      }},[(spyDiff>=0?'+':'')+spyDiff.toFixed(1)+'% SPY']),
      volR>=1.5 && el('span',{style:{
        fontSize:'8px',color:C.blue,
        background:'rgba(0,200,255,.08)',
        borderRadius:'3px',padding:'1px 4px',
      }},['vol ×'+fmt(volR,1)]),
      ind?.rsi!=null && el('span',{style:{
        fontSize:'8px',
        color: ind.rsi<35?C.green:ind.rsi>70?C.pink:C.text3,
        background:'rgba(255,255,255,.04)',
        borderRadius:'3px',padding:'1px 4px',
      }},['RSI '+Math.round(ind.rsi)]),
    ].filter(Boolean)),
  ]);
}

function renderPortTab() {
  // تحميل المحفظة من localStorage
  let portfolio = [];
  try { portfolio = JSON.parse(localStorage.getItem('portfolio')||'[]'); } catch(e) {}

  const openTrades  = portfolio.filter(t=>t.type==='buy'&&!t.closed);
  const closedTrades= portfolio.filter(t=>t.closed||t.type==='sell');

  const totalInvested = openTrades.reduce((s,t) => s + t.shares*t.buyPrice*USD_RATE, 0);
  const totalCurrent  = openTrades.reduce((s,t) => {
    const p = state.prices[t.symbol]?.price || t.buyPrice;
    return s + t.shares*p*USD_RATE;
  }, 0);
  const totalPnL = totalCurrent - totalInvested;

  const wins = closedTrades.filter(t=>(t.exitPrice||t.buyPrice)>t.buyPrice).length;
  const winRate = closedTrades.length>0 ? Math.round(wins/closedTrades.length*100) : 0;

  const totalRealized = closedTrades.reduce((s,t) => {
    const exit = t.exitPrice||t.buyPrice;
    return s + (exit - t.buyPrice)*t.shares*USD_RATE;
  }, 0);

  function _savePortfolio() {
    try { localStorage.setItem('portfolio', JSON.stringify(portfolio)); } catch(e) {}
    // المحفظة تُحفظ محلياً فقط — السجل هو ما يذهب للسحابة
  }

  function saveTrade() {
    const sym    = (document.getElementById('p_sym')?.value||'').toUpperCase().trim();
    const shares = parseFloat(document.getElementById('p_shares')?.value||0);
    const price  = parseFloat(document.getElementById('p_price')?.value||0);
    const type   = document.getElementById('p_type')?.value||'buy';
    const notes  = document.getElementById('p_notes')?.value||'';
    const stopV  = parseFloat(document.getElementById('p_stop')?.value||0);
    const tgtV   = parseFloat(document.getElementById('p_tgt')?.value||0);
    if(!sym||!shares||!price) { alert('أكمل الحقول الأساسية'); return; }

    const trade = {
      symbol:sym, shares, buyPrice:price, type,
      notes, stopLoss:stopV||0, target:tgtV||0,
      date:new Date().toISOString(),
      closed:false, exitPrice:null, exitDate:null,
    };

    // إذا نوع بيع — ابحث عن صفقة شراء مفتوحة
    if(type==='sell') {
      const openIdx = portfolio.findIndex(t=>t.symbol===sym&&t.type==='buy'&&!t.closed);
      if(openIdx>=0) {
        portfolio[openIdx].closed    = true;
        portfolio[openIdx].exitPrice = price;
        portfolio[openIdx].exitDate  = new Date().toISOString();
        portfolio[openIdx].exitNotes = notes;
      } else {
        // إضافة كسجل مباشر
        trade.closed    = true;
        trade.exitPrice = price;
        trade.exitDate  = new Date().toISOString();
        portfolio.push(trade);
      }
    } else {
      portfolio.push(trade);
    }

    _savePortfolio();
    ['p_sym','p_shares','p_price','p_notes','p_stop','p_tgt'].forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.value='';
    });
    render();
  }

  function deleteTrade(idx) {
    if(!confirm('حذف الصفقة؟')) return;
    portfolio.splice(idx, 1);
    _savePortfolio();
    render();
  }

  function closeTrade(idx) {
    const t   = portfolio[idx];
    const cur = state.prices[t.symbol]?.price || t.buyPrice;
    // نحفظ index في state لفتح حقل الإغلاق
    state._closingIdx = state._closingIdx === idx ? null : idx;
    render();
  }

  function confirmClose(idx) {
    const exitVal = parseFloat(document.getElementById('close_price_'+idx)?.value||0);
    if(!exitVal || isNaN(exitVal) || exitVal <= 0) { alert('أدخل سعر إغلاق صحيح'); return; }
    portfolio[idx].closed    = true;
    portfolio[idx].exitPrice = exitVal;
    portfolio[idx].exitDate  = new Date().toISOString();
    state._closingIdx = null;
    _savePortfolio();
    render();
  }

  function fmtDate(iso) {
    if(!iso) return '';
    try {
      return new Date(iso).toLocaleDateString('ar', {month:'short', day:'numeric'});
    } catch(e) { return ''; }
  }

  return el('div', {style:{padding:'12px 16px'}}, [
    // إحصائيات
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginBottom:'14px'}}, [
      el('div', {style:{background:'#0a1020', border:'1px solid var(--border)', borderRadius:'12px', padding:'12px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['💼 مفتوحة']),
        el('div', {style:{fontSize:'16px', fontWeight:'900', color:C.blue}}, [totalInvested.toFixed(0)+' ر']),
        el('div', {style:{fontSize:'9px', color:totalPnL>=0?C.green:C.pink}}, [
          'غير محقق: '+(totalPnL>=0?'+':'')+totalPnL.toFixed(0)+' ر'
        ]),
      ]),
      el('div', {style:{background: totalRealized>=0?'rgba(0,255,136,.08)':'rgba(255,45,122,.08)', border:`1px solid ${totalRealized>=0?C.green:C.pink}33`, borderRadius:'12px', padding:'12px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['💰 محقق']),
        el('div', {style:{fontSize:'16px', fontWeight:'900', color:totalRealized>=0?C.green:C.pink}}, [
          (totalRealized>=0?'+':'')+totalRealized.toFixed(0)+' ر'
        ]),
        el('div', {style:{fontSize:'9px', color:C.text2}}, [closedTrades.length+' صفقة مغلقة']),
      ]),
      el('div', {style:{background:'#0a1020', border:'1px solid var(--border)', borderRadius:'12px', padding:'12px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['🎯 نسبة النجاح']),
        el('div', {style:{fontSize:'16px', fontWeight:'900', color:winRate>=60?C.green:winRate>=40?C.yellow:C.pink}}, [winRate+'%']),
        el('div', {style:{fontSize:'9px', color:C.text2}}, [wins+' ربح / '+(closedTrades.length-wins)+' خسارة']),
      ]),
      el('div', {style:{background:'#0a1020', border:'1px solid var(--border)', borderRadius:'12px', padding:'12px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['📊 مفتوح / مغلق']),
        el('div', {style:{fontSize:'16px', fontWeight:'900', color:C.blue}}, [openTrades.length+' / '+closedTrades.length]),
        el('div', {style:{fontSize:'9px', color:C.text2}}, ['إجمالي '+portfolio.length+' صفقة']),
      ]),
    ]),

    // إضافة صفقة
    el('div', {style:{background:'#0a1020', border:`1px solid ${C.green}33`, borderRadius:'14px', padding:'14px', marginBottom:'14px'}}, [
      el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.green, marginBottom:'12px'}}, ['➕ تسجيل صفقة جديدة']),
      el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginBottom:'8px'}}, [
        el('div', {}, [
          el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['رمز السهم']),
          el('input', {id:'p_sym', type:'text', placeholder:'AAPL', style:{width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px', textTransform:'uppercase'}}),
        ]),
        el('div', {}, [
          el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['نوع الصفقة']),
          (() => {
            const sel = document.createElement('select');
            Object.assign(sel.style, {id:'p_type', width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px'});
            sel.id = 'p_type';
            ['buy','sell'].forEach((v) => {
              const o = document.createElement('option');
              o.value = v; o.textContent = v==='buy'?'🟢 شراء':'🔴 بيع';
              sel.appendChild(o);
            });
            return sel;
          })(),
        ]),
        el('div', {}, [
          el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['عدد الأسهم']),
          el('input', {id:'p_shares', type:'number', placeholder:'10', style:{width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px'}}),
        ]),
        el('div', {}, [
          el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['السعر $']),
          el('input', {id:'p_price', type:'number', placeholder:'150.00', style:{width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px'}}),
        ]),
        el('div', {}, [
          el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['🛑 وقف الخسارة $']),
          el('input', {id:'p_stop', type:'number', placeholder:'اختياري', style:{width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px'}}),
        ]),
        el('div', {}, [
          el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['🎯 الهدف $']),
          el('input', {id:'p_tgt', type:'number', placeholder:'اختياري', style:{width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px'}}),
        ]),
      ]),
      el('div', {style:{marginBottom:'8px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['📝 ملاحظات']),
        el('input', {id:'p_notes', type:'text', placeholder:'سبب الدخول، استراتيجية...', style:{width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px'}}),
      ]),
      el('button', {
        style:{width:'100%', background:`linear-gradient(135deg,${C.green}22,${C.blue}22)`, border:`1px solid ${C.green}`, color:C.green, borderRadius:'10px', padding:'10px', fontSize:'13px', fontWeight:'700'},
        onClick: saveTrade,
      }, ['💾 حفظ الصفقة']),
    ]),

    // ── الصفقات المفتوحة
    openTrades.length > 0 && el('div', {style:{marginBottom:'14px'}}, [
      el('div', {style:{fontSize:'12px', fontWeight:'700', color:C.blue, marginBottom:'8px'}}, ['📂 صفقات مفتوحة ('+openTrades.length+')']),
      ...portfolio.map((t, idx) => {
        if(t.closed || t.type==='sell') return null;
        const cur = state.prices[t.symbol]?.price || t.buyPrice;
        const pnl = (cur - t.buyPrice) * t.shares * USD_RATE;
        const pnlPct = ((cur - t.buyPrice)/t.buyPrice*100).toFixed(2);
        const rr = t.stopLoss>0&&t.target>0
          ? (((t.target-t.buyPrice)/(t.buyPrice-t.stopLoss))).toFixed(1)+'x'
          : null;
        const nearStop = t.stopLoss>0 && cur <= t.stopLoss*1.02;
        const nearTgt  = t.target>0  && cur >= t.target*0.98;
        return el('div', {style:{
          background:'#0a1020',
          border:`1px solid ${pnl>=0?C.green:C.pink}22`,
          borderRadius:'10px', padding:'10px', marginBottom:'8px',
        }}, [
          el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'4px'}}, [
            el('div', {}, [
              el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.text}}, [t.symbol+' × '+t.shares]),
              el('div', {style:{fontSize:'9px', color:C.text3}}, [
                '📅 '+fmtDate(t.date)+' • دخول $'+t.buyPrice.toFixed(2)

            ]),
            el('div', {style:{textAlign:'left'}}, [
              el('div', {style:{fontSize:'13px', fontWeight:'700', color:pnl>=0?C.green:C.pink}}, [
                (pnl>=0?'+':'')+pnl.toFixed(0)+' ر'
              ]),
              el('div', {style:{fontSize:'10px', color:pnl>=0?C.green:C.pink}}, [
                (pnl>=0?'+':'')+pnlPct+'%'

          // السعر الحالي
          el('div', {style:{display:'flex', gap:'6px', marginBottom:'4px'}}, [
            el('div', {style:{
              flex:'1', background:'#060b14', borderRadius:'6px', padding:'4px 6px',
              fontSize:'9px', color:C.text2,
            }}, ['الآن: $'+cur.toFixed(2)]),
            t.stopLoss>0&&el('div', {style:{
              flex:'1', background:nearStop?'rgba(255,45,122,.15)':'#060b14',
              borderRadius:'6px', padding:'4px 6px', fontSize:'9px',
              color:nearStop?C.pink:C.text3,
            }}, ['🛑 $'+t.stopLoss.toFixed(2)+(nearStop?' ⚠️':'')]),
            t.target>0&&el('div', {style:{
              flex:'1', background:nearTgt?'rgba(0,255,136,.15)':'#060b14',
              borderRadius:'6px', padding:'4px 6px', fontSize:'9px',
              color:nearTgt?C.green:C.text3,
            }}, ['🎯 $'+t.target.toFixed(2)+(nearTgt?' ✅':'')]),
          ].filter(Boolean)),
          // ملاحظات ونسبة R/R
          el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center'}}, [
            t.notes?el('div', {style:{fontSize:'9px', color:C.text3, flex:'1', marginLeft:'8px'}}, [
              '💬 '+t.notes
            ]):el('div',{},[]),
            el('div', {style:{display:'flex', gap:'4px', flexShrink:'0'}}, [
              rr&&el('span', {style:{
                fontSize:'9px', background:'rgba(180,79,255,.1)',
                border:'1px solid rgba(180,79,255,.3)',
                borderRadius:'4px', padding:'2px 5px', color:C.purple,
              }}, ['R:R '+rr]),
              el('button', {
                style:{background:`rgba(0,200,255,.1)`, border:`1px solid rgba(0,200,255,.3)`,
                  color:C.blue, borderRadius:'6px', padding:'3px 7px', fontSize:'9px'},
                onClick: () => closeTrade(idx),
              }, [state._closingIdx === idx ? '✕ إلغاء' : '💰 إغلاق']),
              el('button', {
                style:{background:'rgba(255,45,122,.1)', border:'1px solid rgba(255,45,122,.3)',
                  color:C.pink, borderRadius:'6px', padding:'3px 7px', fontSize:'9px'},

              }, ['🗑️']),
            ].filter(Boolean)),
          ]),
          // ── حقل إغلاق الصفقة (يظهر عند الضغط على إغلاق)
          state._closingIdx === idx ? el('div', {style:{

          }}, [
            el('span', {style:{fontSize:'9px', color:C.text3, flexShrink:'0'}}, ['سعر الإغلاق $']),

              id:'close_price_'+idx,

      ...portfolio.map((t, idx) => {
        if(!t.closed && t.type!=='sell') return null;
        const exit = t.exitPrice||t.buyPrice;
        const pnl  = (exit - t.buyPrice)*t.shares*USD_RATE;

        const days = t.exitDate&&t.date
          ? Math.round((new Date(t.exitDate)-new Date(t.date))/(1000*60*60*24))

        return el('div', {style:{
          background:'rgba(255,255,255,.02)',

// ================================================================
// ═══════════════════ TIMER & START ══════════════════════════════
// ================================================================

// ── متغيرات التحكم في التوصيات
let _recsLockedToday  = false;   // التوصيات محسوبة ومقفلة لليوم
let _midDayDone       = false;   // تحديث منتصف اليوم تم
let _lastRecDate      = null;    // تاريخ آخر حساب

function shouldRecalc() {
  const today = new Date().toDateString();
  // يوم جديد → أعد الحساب
  if(_lastRecDate !== today) {
    _recsLockedToday = false;
    _midDayDone      = false;
    _lastRecDate     = today;
    return true;
  }
  return !_recsLockedToday;
}

// ── تحديث الأسعار واتجاه السوق كل 30 ثانية (بدون إعادة حساب التوصيات)
setInterval(async () => {
  if(!isMarketOpen()) return; // لا داعي للتحديث خارج السوق
  await Promise.all([fetchPrices(), fetchMarketTrend()]);
  // فقط نحدث الأسعار في التوصيات الموجودة — لا نعيد الحساب الكامل
  if(state.recs) {
    state.recs = state.recs.map(r => {
      const p = state.prices[r.id];
      if(!p?.price) return r;
      return { ...r, price:p.price, change:p.change, high:p.high, low:p.low, volume:p.volume };
    });
  }
  if(state.speculativeRecs) {
    state.speculativeRecs = state.speculativeRecs.map(r => {
      const p = state.prices[r.id];
      if(!p?.price) return r;
      return { ...r, price:p.price, change:p.change };
    });
  }
  render();
}, 30000);

// ── فحص منتصف اليوم كل دقيقة
setInterval(async () => {
  if(!isMarketOpen() || !state.indicatorsDone) return;

  const t = getMarketTimes();
  const m = getNowMins();

  // 7:00م — تحديث المؤشرات وإعادة الحساب مرة ثانية وأخيرة
  if(m >= t.midDay && m <= t.midDay+5 && !_midDayDone) {
    _midDayDone      = true;
    _recsLockedToday = false;

    // ✅ حفظ توصيات الجلسة الأولى كـ High Conviction قبل أي شيء
    if(state.recs?.length > 0) {
      state.sessionOneIds = state.recs.map(r => r.id);
      try {
        localStorage.setItem('s1_recs',      JSON.stringify(state.sessionOneIds));
        localStorage.setItem('s1_recs_date', new Date().toDateString()); // تاريخ الحفظ
      } catch(e) {}
      console.log('[MidDay] حفظ High Conviction:', state.sessionOneIds);
    }

    // إعادة تحميل المؤشرات وحساب التوصيات
    state.indicatorsDone = false;
    await fetchIndicators();
    await fetchNews();
    await fetchEarnings();

    // calcRecs ستقارن التوصيات الجديدة مع sessionOneIds المحفوظة أعلاه
    calcRecs();
    calcSpeculative();
    // ✅ تسجيل جلسة المنتصف صراحةً بعد calcRecs
    if(state.recs?.length > 0 && isMarketOpen()) {
      recordRecsToHistory(state.recs, 'منتصف');
    }
    _recsLockedToday = true;
    try { localStorage.setItem('recs_midday', 'true'); } catch(e) {}
    render();
  }
}, 60000);

// ── إشعارات المتصفح
async function requestNotification() {
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default') {
    await Notification.requestPermission();
  }
}

function sendNotification(title, body) {
  if(Notification.permission !== 'granted') return;
  try {
    new Notification(title, { body, icon: '📊' });
  } catch(e) {}
}

// طلب إذن الإشعارات عند البداية
requestNotification();

// ── Debug helper
window.testMarket = () => {
  window.DEBUG_MARKET = true;
  state.indicatorsDone = false;
  _recsLockedToday     = false;
  loadData(true);
};

// ── إعادة تحميل الأسعار يدوياً
window.retryPrices = async () => {
  await fetchPrices();
  await fetchMarketTrend();
  render();
  console.log('[Retry] تم تحديث الأسعار:', state.dataCheck.prices.real, 'سهم');
};

// ── استرجاع التوصيات المحفوظة من نفس اليوم
(function restoreSavedRecs() {
  try {
    const savedDate  = localStorage.getItem('recs_date');
    const today      = new Date().toDateString();
    if(savedDate !== today) {
      // يوم جديد — امسح كل شيء بما فيه Cooldown
      localStorage.removeItem('s1_recs');
      localStorage.removeItem('s1_recs_date');
      localStorage.removeItem('cooldown_stocks');  // ✅ إصلاح: Cooldown يُمسح يومياً
      state.cooldownStocks = [];
      return;
    }

    const savedRecs  = localStorage.getItem('recs_full');
    const savedTime  = localStorage.getItem('recs_time');
    const midday     = localStorage.getItem('recs_midday') === 'true';

    if(!savedRecs || !savedTime) return;

    const recs = JSON.parse(savedRecs);
    if(!Array.isArray(recs) || recs.length === 0) return;

    // ✅ استرجاع sessionOneIds (توصيات الجلسة الأولى) للمقارنة الصحيحة
    const s1Date = localStorage.getItem('s1_recs_date');
    if(s1Date === today) {
      const s1 = localStorage.getItem('s1_recs');
      if(s1) state.sessionOneIds = JSON.parse(s1);
    }

    state.recs           = recs;
    state.recsTime       = new Date(savedTime);
    // ✅ إذا توصيات محفوظة من نفس اليوم → قفلها فوراً
    // المؤشرات ستُحمّل لتحديث الأسعار فقط، لكن لا إعادة حساب
    state.indicatorsDone = false;  // يحمّل المؤشرات لتحديث الأسعار
    _recsLockedToday     = true;   // ✅ مقفلة — لا إعادة حساب
    _lastRecDate         = today;
    _midDayDone          = midday;

    console.log('[Restore] توصيات:', recs.length, '| High Conviction:', state.sessionOneIds?.length||0);
  } catch(e) {}
})();

// ── بدء التحميل
(async () => {
  try {
    render();
    await loadData(false);
    if(state.recs?.length > 0) {
      _recsLockedToday = true;
      _lastRecDate     = new Date().toDateString();
    }
    render();
  } catch(e) {
    console.error('[Init] خطأ في التحميل الأول:', e.message);
    render(); // حاول العرض حتى مع الخطأ
  }
})();

</script>
