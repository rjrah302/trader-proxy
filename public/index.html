// ================================================================
// ═══════════════════ HUNTER TAB — صائد الارتداد ═════════════════
// ================================================================

function renderHunterTab() {
  if (_indicatorsLoading) {
    return el('div', {style:{padding:'40px 16px', textAlign:'center'}}, [
      el('div', {style:{fontSize:'12px', color:C.blue}}, ['⏳ جاري تحميل المؤشرات...']),
    ]);
  }
  if (!state.indicatorsDone) {
    return el('div', {style:{padding:'40px 16px', textAlign:'center'}}, [
      el('div', {style:{fontSize:'40px', marginBottom:'12px'}}, ['🎯']),
      el('div', {style:{fontSize:'13px', color:C.text2}}, ['سيبدأ الصائد بعد تحميل المؤشرات']),
    ]);
  }

  const isNightMode = !isMarketOpen();
  const hunters = state.hunterRecs || [];
  const entryHunters = hunters.filter(h => isMarketOpen() && !h.isNight && !h.isRadar && h.gainerClass !== 'chase' && h.actionTone === 'buy');
  const watchHuntersAll = hunters.filter(h => !entryHunters.includes(h) && h.gainerClass !== 'chase' && h.action !== 'لا تطارد');
  const watchHunters = watchHuntersAll.slice(0, 5);
  const avoidHunters = hunters.filter(h => h.gainerClass === 'chase' || h.action === 'لا تطارد');
  const hiddenWatchCount = Math.max(0, watchHuntersAll.length - watchHunters.length);
  const trendColor = state.marketTrend==='bearish'?C.pink:state.marketTrend==='bullish'?C.green:C.yellow;
  const trendLabel = state.marketTrend==='bearish'?'السوق هابط 🔻':state.marketTrend==='bullish'?'السوق صاعد ✅':'السوق محايد ⚠️';
  const sectionTitle = (title, count, color, note) => el('div', {style:{
    margin:'10px 0 8px', padding:'8px 10px',
    borderRadius:'9px', background:color+'0d',
    border:`1px solid ${color}26`,
  }}, [
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center'}}, [
      el('div', {style:{fontSize:'11px', fontWeight:'900', color}}, [title]),
      el('div', {style:{fontSize:'10px', fontWeight:'800', color}}, [count+' فرصة']),
    ]),
    note && el('div', {style:{fontSize:'9px', color:C.text2, marginTop:'3px', lineHeight:'1.45'}}, [note]),
  ]);

  return el('div', {style:{padding:'12px 16px'}}, [

    // ── رأس التبويب
    el('div', {style:{marginBottom:'12px'}}, [
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'6px'}}, [
        el('div', {style:{fontSize:'13px', fontWeight:'700', color:'#ff6b35'}}, [
          state.marketTrend==='bearish'
            ? '🎯 صائد المقاومين — '+hunters.length+' فرصة'
            : isNightMode
              ? '🌙 صائد الليل — '+hunters.length+' فرصة'
              : '🎯 صائد الارتداد — '+hunters.length+' فرصة'
        ]),
        el('div', {style:{fontSize:'10px', fontWeight:'700', color:trendColor}}, [trendLabel]),
      ]),

      // SPY + QQQ
      state.spyChange !== null && el('div', {style:{
        display:'flex', gap:'8px', fontSize:'10px',
        background:'#060b14', borderRadius:'8px', padding:'5px 8px', marginBottom:'6px',
      }}, [
        el('span', {style:{color:C.text2}}, ['مؤشر السوق:']),
        el('span', {style:{color:state.spyChange>=0?C.green:C.pink, fontWeight:'700'}}, ['SPY '+(state.spyChange>=0?'+':'')+fmt(state.spyChange)+'%']),
        el('span', {style:{color:state.qqqChange>=0?C.green:C.pink, fontWeight:'700'}}, ['QQQ '+(state.qqqChange>=0?'+':'')+fmt(state.qqqChange)+'%']),
      ]),

      el('div', {style:{
        display:'flex', justifyContent:'space-between', gap:'8px',
        fontSize:'9px', color:C.text3,
        background:'rgba(255,255,255,.035)', borderRadius:'6px',
        padding:'5px 8px', marginBottom:'6px',
      }}, [
        el('span', {}, ['آخر تحديث: '+fmtClock(state.hunterTime)]),
        el('span', {}, ['القادم: '+(isMarketOpen()?nextUpdateText(state.hunterTime,HUNTER_REFRESH_MIN):'بعد الافتتاح والتأكيد')]),
      ]),

      // تنبيه السوق الهابط
      state.marketTrend === 'bearish' && el('div', {style:{
        fontSize:'10px', color:C.pink,
        background:'rgba(255,45,122,.06)', borderRadius:'6px',
        padding:'5px 8px', border:'1px solid rgba(255,45,122,.2)',
        marginBottom:'6px',
      }}, ['🔻 السوق هابط — الصائد يبحث عن أسهم تقاوم الهبوط فقط']),

      // تحذير الوضع الليلي
      isNightMode && el('div', {style:{
        fontSize:'10px', color:'#aaa',
        background:'rgba(255,255,255,.04)', borderRadius:'6px',
        padding:'5px 8px', border:'1px solid rgba(255,255,255,.08)',
        marginBottom:'6px',
      }}, ['🌙 تحليل ليلي — بدون VWAP وintraday • يتحدث عند فتح السوق 4:30م']),

      // وصف
      el('div', {style:{
        fontSize:'10px', color:'#ff6b35',
        background:'rgba(255,107,53,.06)', borderRadius:'6px',
        padding:'5px 8px', border:'1px solid rgba(255,107,53,.2)',
      }}, ['🎯 يصطاد الارتداد والاشتعال — يتحدث كل '+HUNTER_REFRESH_MIN+' دقائق أثناء السوق']),
    ]),

    // ── القائمة
    hunters.length === 0
      ? el('div', {style:{textAlign:'center', padding:'40px 0', color:C.text2, fontSize:'12px'}}, [
          !state.indicatorsDone
            ? '⏳ جاري تحميل المؤشرات...'
            : 'لا توجد فرص ارتداد تستوفي الشروط الآن'
        ])
      : el('div', {}, [
          entryHunters.length > 0 && sectionTitle('فرص دخول مسموحة', entryHunters.length, C.green, 'هذه فقط التي تعني دخول. أي بطاقة لا تقول "ادخل الآن" فهي انتظار.'),
          ...entryHunters.map((h, i) => renderHunterCard(h, i)),

          watchHunters.length > 0 && sectionTitle('رادار مراقبة وانتظار تأكيد', watchHunters.length, C.yellow, 'ليست دخول الآن؛ انتظر محفز الدخول المكتوب داخل البطاقة.'),
          ...watchHunters.map((h, i) => renderHunterCard(h, i)),

          hiddenWatchCount > 0 && el('div', {style:{
            background:'rgba(255,224,51,.06)', border:'1px solid rgba(255,224,51,.18)',
            borderRadius:'10px', padding:'8px 10px', marginBottom:'8px',
            fontSize:'10px', color:C.yellow, textAlign:'center', fontWeight:'800',
          }}, ['تم إخفاء '+hiddenWatchCount+' بطاقة مراقبة ضعيفة لتقليل الضجيج.']),

          avoidHunters.length > 0 && sectionTitle('تجنب / مطاردة', avoidHunters.length, C.pink, 'هذه تظهر للوعي فقط؛ لا تدخل قبل Pullback أو إعادة بناء الشروط.'),
          avoidHunters.length > 0 && el('div', {style:{
            background:'rgba(255,45,122,.06)', border:'1px solid rgba(255,45,122,.18)',
            borderRadius:'10px', padding:'8px 10px', marginBottom:'8px',
            fontSize:'10px', color:C.pink, textAlign:'center', fontWeight:'800',
          }}, ['مستبعد: '+avoidHunters.length+' سهم مطاردة أو مخاطرة عالية.']),
        ]),
  ]);
}

function renderHunterCard(h, idx) {
  const isSelected = state.selected === h.id + '_hunter';
  const displayScore = Math.round(Math.max(0, Math.min(100, Number(h.score) || 0)));
  const scoreColor = displayScore >= 80 ? C.green : displayScore >= 70 ? C.blue : displayScore >= 60 ? C.yellow : C.orange;
  const actionColor = h.actionTone === 'buy' ? C.green : h.actionTone === 'watch' ? C.yellow : h.actionTone === 'support' ? C.blue : C.text2;
  const analystView = getAnalystView(h.id, h.price);
  const targetReason = h.vwap && h.vwap > h.price
    ? 'الهدف هو VWAP؛ ارتداد قصير وليس مطاردة.'
    : h.checks?.breakout15
      ? 'الهدف مبني على امتداد الاختراق بعد قمة 15 دقيقة.'
      : h.support
        ? 'الهدف بعد ارتداد من الدعم مع وقف واضح أسفله.'
        : 'الهدف محسوب من ATR لعدم وجود مقاومة قريبة موثوقة.';
  const durationEstimate = estimateTradeDuration({
    kind:'hunter', profitPct:h.profitPct, atrPct:h.atrPct,
    macdHist:h.macdHist, macdHistDir:h.macdHistDir, weeklyTrend:h.weeklyTrend,
    actionTone:h.actionTone, rvol:h.rvol, isNight:h.isNight,
  });
  const estimatedDays = durationEstimate.days;
  const durationText = durationEstimate.label;
  const enterVerdict = h.isNight
    ? {label:'مراقبة بعد الافتتاح', color:C.yellow, note:'تحليل ليلي؛ لا تنفيذ قبل تأكيد VWAP والحجم بعد الفتح.'}
    : h.actionTone === 'buy'
    ? {label:'دخول مسموح', color:C.green, note:'نفذ فقط إذا بقي فوق VWAP والحجم داعم.'}
    : h.actionTone === 'support'
      ? {label:'دخول قرب الدعم', color:C.blue, note:'لا تدخل إلا قريبًا من الدعم وبوقف صغير.'}
      : h.gainerClass === 'chase' || h.action === 'لا تطارد'
        ? {label:'لا تدخل الآن', color:C.pink, note:'السهم مرتفع لكن الدخول متأخر؛ انتظر Pullback.'}
        : {label:'لا تدخل الآن', color:C.yellow, note:'الدخول بعد اختراق/ثبات وليس بسعر عشوائي.'};
  const directOrder = h.isNight
    ? {label:'لا تدخل الآن', color:C.yellow, note:'ليلي فقط؛ انتظر الافتتاح وتأكيد السعر والحجم.'}
    : h.actionTone === 'buy'
    ? (h.action === 'ادخل بشرط'
        ? {label:'ادخل بشرط', color:C.blue, note:h.actionNote}
        : {label:'ادخل الآن', color:C.green, note:'السعر مناسب. نفذ مع الوقف المكتوب فقط.'})
    : h.actionTone === 'support'
      ? {label:'لا تدخل الآن', color:C.yellow, note:'انتظر السعر عند الدعم أو رجوع واضح؛ ليست إشارة تنفيذ فورية.'}
      : h.gainerClass === 'chase' || h.action === 'لا تطارد'
        ? {label:'ممنوع الدخول', color:C.pink, note:'انتظر Pullback أو تجاهل السهم.'}
        : {label:'لا تدخل الآن', color:C.yellow, note:'انتظر محفز الدخول. لا شراء الآن.'};
  const isFinalEntry = !h.isNight && isMarketOpen() && h.actionTone === 'buy';
  const triggerText = h.actionTone === 'buy'
    ? 'الثبات فوق $'+fmt(h.vwap || h.price,2)+' مع RVOL أعلى من 1.5'
    : h.checks?.breakout15
      ? 'إغلاق 5 دقائق فوق قمة الاختراق'
      : 'رجوع فوق VWAP أو Higher Low جديد';
  const invalidationText = 'كسر $'+fmt(h.stopLoss,2)+' أو فقدان VWAP مع حجم بيع';
  const trendBadge = h.marketTrend === 'bearish'
    ? el('span', {style:{fontSize:'9px', color:C.pink, background:'rgba(255,45,122,.1)', borderRadius:'4px', padding:'1px 5px'}}, ['سوق هابط'])
    : h.marketTrend === 'bullish'
      ? el('span', {style:{fontSize:'9px', color:C.green, background:'rgba(0,255,136,.1)', borderRadius:'4px', padding:'1px 5px'}}, ['سوق صاعد'])
      : null;

  const checkRow = (ok, label) => el('div', {style:{
    display:'flex', alignItems:'center', gap:'6px',
    fontSize:'10px', color: ok ? C.green : C.text3, marginBottom:'2px',
  }}, [el('span', {}, [ok ? '✅' : '❌']), el('span', {}, [label])]);

  return el('div', {style:{
    background:'#060b14',
    border:`1px solid ${isSelected ? '#ff6b35' : scoreColor+'22'}`,
    borderRadius:'12px', marginBottom:'8px', overflow:'hidden', cursor:'pointer',
  }, onClick:()=>{ state.selected = isSelected ? null : h.id+'_hunter'; render(); }}, [

    el('div', {style:{padding:'10px 12px'}}, [

      // ── رأس البطاقة
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'6px'}}, [
        el('div', {}, [
          el('div', {style:{display:'flex', alignItems:'center', gap:'6px'}}, [
            el('div', {style:{fontSize:'13px', fontWeight:'800', color:C.text}}, [h.name]),
            trendBadge,
            h.isNight && el('span', {style:{fontSize:'9px', color:'#aaa', background:'rgba(255,255,255,.06)', borderRadius:'4px', padding:'1px 5px'}}, ['🌙 ليلي']),
        h.isRadar && el('span', {style:{fontSize:'9px', color:C.yellow, background:'rgba(255,224,51,.10)', borderRadius:'4px', padding:'1px 5px'}}, ['رادار']),
        h.ahBonus && el('span', {style:{fontSize:'9px', color:C.green, background:'rgba(0,255,136,.1)', borderRadius:'4px', padding:'1px 5px'}}, ['🔥 AH+']),
        h.checks?.isGainer && el('span', {style:{fontSize:'9px', color:C.yellow, background:'rgba(255,224,51,.1)', borderRadius:'4px', padding:'1px 5px'}}, [
          '🔥 Top '+(h.gainerRank || '20')
        ]),
          ]),
          el('div', {style:{fontSize:'10px', color:C.text3}}, [h.id+' · '+h.sector]),
        ]),
        el('div', {style:{textAlign:'left'}}, [
          el('div', {style:{fontSize:'20px', fontWeight:'900', color:scoreColor}}, [displayScore+'']),
          el('div', {style:{fontSize:'9px', color:C.text3}}, ['/ 100']),
        ]),
      ]),

      // شريط Score
      el('div', {style:{height:'4px', background:'#1a2340', borderRadius:'4px', marginBottom:'8px'}}, [
        el('div', {style:{height:'100%', width:displayScore+'%', background:scoreColor, borderRadius:'4px'}}),
      ]),

      el('div', {style:{
        display:'flex', justifyContent:'space-between', alignItems:'center', gap:'8px',
        background:directOrder.color+'12', border:`1px solid ${directOrder.color}33`,
        borderRadius:'8px', padding:'7px 9px', marginBottom:'8px',
      }}, [
        el('div', {style:{fontSize:'13px', fontWeight:'900', color:directOrder.color, whiteSpace:'nowrap'}}, [
          directOrder.label
        ]),
        el('div', {style:{fontSize:'9px', color:C.text2, textAlign:'left'}}, [
          directOrder.note
        ]),
      ]),

      renderNewsMini(h.id, true),

      isSelected && h.gainerNote && el('div', {style:{
        background: h.gainerClass==='confirmed' ? 'rgba(255,224,51,.10)' : h.gainerClass==='chase' ? 'rgba(255,45,122,.08)' : 'rgba(0,200,255,.08)',
        border: h.gainerClass==='confirmed' ? '1px solid rgba(255,224,51,.28)' : h.gainerClass==='chase' ? '1px solid rgba(255,45,122,.22)' : '1px solid rgba(0,200,255,.22)',
        color: h.gainerClass==='confirmed' ? C.yellow : h.gainerClass==='chase' ? C.pink : C.blue,
        borderRadius:'8px', padding:'6px 8px', marginBottom:'8px',
        fontSize:'10px', fontWeight:'700',
      }}, [h.gainerNote]),

      isSelected && el('div', {style:{
        display:'grid', gridTemplateColumns:'1.1fr 1fr 1fr', gap:'6px',
        marginBottom:'8px',
      }}, [
        el('div', {style:{
          background:enterVerdict.color+'10', border:`1px solid ${enterVerdict.color}28`,
          borderRadius:'8px', padding:'7px 8px',
        }}, [
          el('div', {style:{fontSize:'8px', color:C.text3, marginBottom:'2px'}}, ['نوع الإشارة']),
          el('div', {style:{fontSize:'11px', fontWeight:'900', color:enterVerdict.color}}, [enterVerdict.label]),
          el('div', {style:{fontSize:'8px', color:C.text2, marginTop:'2px', lineHeight:'1.35'}}, [enterVerdict.note]),
        ]),
        el('div', {style:{
          background:'rgba(255,255,255,.035)', border:'1px solid rgba(255,255,255,.08)',
          borderRadius:'8px', padding:'7px 8px',
        }}, [
          el('div', {style:{fontSize:'8px', color:C.text3, marginBottom:'2px'}}, ['مدة الهدف']),
          el('div', {style:{fontSize:'11px', fontWeight:'900', color:estimatedDays<=1?C.green:estimatedDays<=3?C.orange:C.blue}}, [durationText]),
          el('div', {style:{fontSize:'8px', color:C.text2, marginTop:'2px'}}, ['حسب ATR والحجم والزخم']),
        ]),
        el('div', {style:{
          background:(analystView?.color || C.text2)+'0d', border:`1px solid ${(analystView?.color || C.text2)}24`,
          borderRadius:'8px', padding:'7px 8px',
        }}, [
          el('div', {style:{fontSize:'8px', color:C.text3, marginBottom:'2px'}}, ['رأي المحللين']),
          el('div', {style:{fontSize:'11px', fontWeight:'900', color:analystView?.color || C.text2}}, [
            analystView?.analysts ? analystView.verdict : 'غير متاح'
          ]),
          el('div', {style:{fontSize:'8px', color:C.text2, marginTop:'2px'}}, [
            analystView?.target ? 'هدفهم $'+fmt(analystView.target,2)+' ('+((analystView.upside||0)>=0?'+':'')+fmt(analystView.upside,1)+'%)' : 'ليس شرط دخول'
          ]),
        ]),
      ]),

      // السعر + VWAP + RS
      isSelected && el('div', {style:{display:'flex', gap:'8px', fontSize:'10px', marginBottom:'6px', flexWrap:'wrap'}}, [
        el('div', {style:{color:C.text, fontWeight:'700'}}, ['$'+fmt(h.price, 2)]),
        h.change !== 0 && el('div', {style:{color:h.change>0?C.green:C.pink, fontWeight:'700'}}, [(h.change>0?'+':'')+fmt(h.change,2)+'%']),
        // After Hours
        h.aftermarket?.price && el('div', {style:{color:h.aftermarket.change>0?C.green:C.pink}}, [
          '🌙 $'+fmt(h.aftermarket.price,2)+' ('+(h.aftermarket.change>0?'+':'')+fmt(h.aftermarket.change,1)+'%)'
        ]),
        h.vwap && el('div', {style:{color:h.checks.aboveVwap?C.green:C.text3}}, [
          'VWAP $'+fmt(h.vwap,2)+' '+(h.checks.aboveVwap?'▲':'▼')
        ]),
        h.rvol > 0 && el('div', {style:{color:h.rvol>=2?C.green:C.text2}}, ['RVOL ×'+fmt(h.rvol,1)]),
        h.rs30 !== 0 && el('div', {style:{color:h.rs30>0?C.green:C.pink}}, [
          'RS30m '+(h.rs30>0?'+':'')+fmt(h.rs30,1)+'%'
        ]),
      ]),

      isSelected && el('div', {style:{
        display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px',
        marginBottom:'8px', fontSize:'9px',
      }}, [
        el('div', {style:{background:'#090f1b', border:'1px solid rgba(0,255,136,.12)', borderRadius:'8px', padding:'7px 8px'}}, [
          el('div', {style:{color:C.green, fontWeight:'800', marginBottom:'3px'}}, ['محفز الدخول']),
          el('div', {style:{color:C.text2, lineHeight:'1.45'}}, [triggerText]),
        ]),
        el('div', {style:{background:'#090f1b', border:'1px solid rgba(255,45,122,.14)', borderRadius:'8px', padding:'7px 8px'}}, [
          el('div', {style:{color:C.pink, fontWeight:'800', marginBottom:'3px'}}, ['إلغاء الفكرة']),
          el('div', {style:{color:C.text2, lineHeight:'1.45'}}, [invalidationText]),
        ]),
      ]),

      // دخول / وقف / هدف
      el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'4px', marginBottom:'6px'}}, [
        el('div', {style:{background:'rgba(255,107,53,.08)', borderRadius:'6px', padding:'5px', textAlign:'center'}}, [
          el('div', {style:{fontSize:'9px', color:C.text3}}, ['دخول']),
          el('div', {style:{fontSize:'11px', fontWeight:'700', color:'#ff6b35'}}, ['$'+fmt(h.price,2)]),
        ]),
        el('div', {style:{background:'rgba(255,45,122,.08)', borderRadius:'6px', padding:'5px', textAlign:'center'}}, [
          el('div', {style:{fontSize:'9px', color:C.text3}}, ['وقف']),
          el('div', {style:{fontSize:'11px', fontWeight:'700', color:C.pink}}, ['$'+fmt(h.stopLoss,2)]),
          el('div', {style:{fontSize:'9px', color:C.text3}}, ['-'+fmt(h.lossPct,1)+'%']),
        ]),
        el('div', {style:{background:'rgba(0,255,136,.08)', borderRadius:'6px', padding:'5px', textAlign:'center'}}, [
          el('div', {style:{fontSize:'9px', color:C.text3}}, ['هدف']),
          el('div', {style:{fontSize:'11px', fontWeight:'700', color:C.green}}, ['$'+fmt(h.targetPrice,2)]),
          el('div', {style:{fontSize:'9px', color:C.green}}, ['+'+fmt(h.profitPct,1)+'%']),
        ]),
      ]),

      isSelected && el('div', {style:{
        background:'rgba(255,255,255,.028)',
        border:'1px solid rgba(255,255,255,.08)',
        borderRadius:'8px', padding:'7px 8px',
        color:C.text2, fontSize:'9px', lineHeight:'1.5',
        marginBottom:'8px',
      }}, [
        el('span', {style:{color:C.yellow, fontWeight:'800'}}, ['سبب الهدف: ']),
        targetReason
      ]),

      (isFinalEntry || isSelected) && renderTradeDecisionBox(calcTradeDecision({
        kind:'hunter',
        symbol:h.id,
        entry:h.price,
        stop:h.stopLoss,
        target:h.targetPrice,
        rr:h.rr,
        action:h.actionNote,
        watchOnly:!isFinalEntry,
        noTrade:h.isNight || h.gainerClass === 'chase' || h.action === 'لا تطارد',
        gainerClass:h.gainerClass,
      })),

      // R/R + RSI
      el('div', {style:{display:'flex', justifyContent:'space-between', fontSize:'10px', color:C.text2}}, [
        el('span', {}, ['R/R: ', el('span', {style:{color:h.rr>=2?C.green:h.rr>=1.5?C.blue:C.yellow, fontWeight:'700'}}, [fmt(h.rr,1)+'x'])]),
        el('span', {style:{color:C.text3}}, ['RSI '+fmt(h.rsi,0)+' · StochRSI '+fmt(h.stochRsi,0)]),
      ]),
    ]),

    // ── تفاصيل عند الضغط
    isSelected && el('div', {style:{borderTop:'1px solid #1a2340', padding:'10px 12px'}}, [
      el('div', {style:{fontSize:'10px', fontWeight:'700', color:C.text2, marginBottom:'8px'}}, ['الشروط المتحققة:']),

      el('div', {style:{marginBottom:'6px'}}, [
        el('div', {style:{fontSize:'9px', color:'#ff6b35', marginBottom:'3px'}}, ['إنهاك البيع (25 نقطة):']),
        checkRow(h.checks.rsiExhaust, 'RSI '+fmt(h.rsi,0)+'% — تشبع بيع شديد'),
        checkRow(h.checks.stochCross, 'Stoch RSI '+fmt(h.stochRsi,0)+'% — يعبر للأعلى'),
        checkRow(h.checks.bbReversal, 'السعر عاد داخل Bollinger'),
        checkRow(h.checks.rvolOk,     'حجم مرتفع ×'+fmt(h.rvol,1)),
        checkRow(h.checks.nearSup,    'عند الدعم $'+fmt(h.support,2)),
      ]),

      el('div', {style:{marginBottom:'6px'}}, [
        el('div', {style:{fontSize:'9px', color:'#ff6b35', marginBottom:'3px'}}, ['تأكيد الارتداد (35 نقطة):']),
        checkRow(h.checks.aboveVwap,  'فوق VWAP $'+fmt(h.vwap,2)),
        checkRow(h.checks.emaOk,      'EMA9 '+fmt(h.ema9,2)+' > EMA21 '+fmt(h.ema21,2)),
        checkRow(h.checks.higherLow,  'Higher Low على 5 دقائق'),
        checkRow(h.checks.breakout15, 'اختراق قمة آخر 15 دقيقة'),
        checkRow(h.checks.macd5Ok,    'MACD 5 دقائق موجب'),
        checkRow(h.checks.macdDayOk,  'MACD اليومي يتحسن'),
      ]),

      el('div', {}, [
        el('div', {style:{fontSize:'9px', color:'#ff6b35', marginBottom:'3px'}}, ['القوة النسبية:']),
        el('div', {style:{fontSize:'10px', color:h.rs30>0?C.green:C.pink}}, [
          'RS30m: '+(h.rs30>0?'+':'')+fmt(h.rs30,1)+'% vs SPY | عائد السهم: '+(h.stockReturn30>0?'+':'')+fmt(h.stockReturn30,1)+'%'
        ]),
      ]),
    ]),
  ]);
}

function renderMarketTab() {
  const priced = ALL_STOCKS
    .map(s => {
      const p = state.prices[s.id];
      return p?.price > 0 ? {...s, p} : null;
    })
    .filter(Boolean)
    .sort((a,b) => Math.abs(b.p.change||0) - Math.abs(a.p.change||0));

  const isLive = priced.some(s=>s.p.isReal);
  const q      = (state.search||'').toLowerCase().trim();
  const sec    = state.sector || 'الكل';

  const filtered = priced
    .filter(s => sec==='الكل' || s.sector===sec || s.sector?.includes(sec))
    .filter(s => !q || s.id.toLowerCase().includes(q) || s.name.toLowerCase().includes(q) || s.sector?.toLowerCase().includes(q));

  // فرز حسب الفلتر النشط
  const sortBy = state.marketSort || 'change';
  const sorted = [...filtered].sort((a,b) => {
    if(sortBy==='change') return Math.abs(b.p.change||0) - Math.abs(a.p.change||0);
    if(sortBy==='price')  return b.p.price - a.p.price;
    if(sortBy==='vol')    return (b.p.volume/b.p.avgVolume||0) - (a.p.volume/a.p.avgVolume||0);
    return 0;
  });

  const gainers = sorted.filter(s=>(s.p.change||0)>0);
  const losers  = sorted.filter(s=>(s.p.change||0)<0);
  const flat    = sorted.filter(s=>(s.p.change||0)===0);

  // إحصائيات سريعة
  const avgChange = priced.length
    ? priced.reduce((s,x)=>s+(x.p.change||0),0)/priced.length : 0;

  if(priced.length === 0) {
    const elapsed = state._loadStart ? (Date.now()-state._loadStart)/1000 : 0;
    if(elapsed > 20) {
      return el('div',{style:{padding:'30px 16px',textAlign:'center'}},[
        el('div',{style:{fontSize:'32px',marginBottom:'8px'}},['⚠️']),
        el('div',{style:{fontSize:'13px',color:C.orange,marginBottom:'6px'}},['فشل تحميل الأسعار']),
        el('button',{
          style:{background:'rgba(0,200,255,.15)',border:'1px solid rgba(0,200,255,.3)',
            borderRadius:'8px',padding:'8px 16px',color:C.blue,fontSize:'11px'},
          onClick:()=>{state._loadStart=Date.now();loadData();render();}
        },['🔄 إعادة المحاولة']),
      ]);
    }
    return el('div',{style:{padding:'40px 16px',textAlign:'center'}},[
      el('div',{style:{width:'36px',height:'36px',margin:'0 auto 12px',
        border:'3px solid rgba(0,200,255,.2)',borderTop:'3px solid #00c8ff',
        borderRadius:'50%',animation:'spin 1s linear infinite'}}),
      el('div',{style:{fontSize:'13px',color:C.blue}},['جاري تحميل الأسعار...']),
    ]);
  }

  return el('div',{style:{padding:'12px 16px'}},[

    // ── شريط الحالة
    el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}},[
      el('div',{style:{fontSize:'13px',fontWeight:'700',color:C.text}},['📊 '+priced.length+' سهم']),
      el('div',{style:{display:'flex',gap:'6px',alignItems:'center'}},[
        el('div',{style:{
          fontSize:'10px',fontWeight:'700',
          color:avgChange>=0?C.green:C.pink,
          background:avgChange>=0?'rgba(0,255,136,.1)':'rgba(255,45,122,.1)',
          borderRadius:'6px',padding:'3px 8px',
          border:`1px solid ${avgChange>=0?'rgba(0,255,136,.3)':'rgba(255,45,122,.3)'}`,
        }},['متوسط '+(avgChange>=0?'+':'')+avgChange.toFixed(2)+'%']),
        el('div',{style:{
          fontSize:'10px',fontWeight:'700',
          color:isLive?C.green:C.yellow,
          background:isLive?'rgba(0,255,136,.1)':'rgba(255,224,51,.1)',
          borderRadius:'6px',padding:'3px 8px',
          border:`1px solid ${isLive?'rgba(0,255,136,.3)':'rgba(255,224,51,.3)'}`,
        }},[isLive?'🟢 حي':'🟡 آخر تحديث']),
      ]),
    ]),

    // ── فلاتر القطاعات
    el('div',{style:{display:'flex',gap:'5px',flexWrap:'nowrap',overflowX:'auto',marginBottom:'8px',paddingBottom:'2px'}},[
      ...[
        {id:'الكل', label:'الكل'},
        {id:'تكنولوجيا', label:'💻 تقنية'},
        {id:'AI/شرائح',  label:'🤖 AI'},
        {id:'مالية',     label:'🏦 مالية'},
        {id:'صحة',       label:'💊 صحة'},
        {id:'طاقة',      label:'⚡ طاقة'},
      ].map(f =>
        {
          const count = f.id==='الكل' ? priced.length : priced.filter(s=>s.sector===f.id || s.sector?.includes(f.id)).length;
          return (
        el('button',{
          style:{
            fontSize:'10px',fontWeight:'700',whiteSpace:'nowrap',flexShrink:'0',
            padding:'5px 10px',borderRadius:'20px',
            color: state.sector===f.id?'#050810':C.text2,
            background: state.sector===f.id?C.blue:'rgba(255,255,255,.05)',
            border: state.sector===f.id?'none':'1px solid #1a2340',
          },
          onClick:()=>{state.sector=f.id;render();}
        },[f.label+' '+count])
          );
        }
      ),
    ]),

    // ── بحث + فرز + تحديث
    el('div',{style:{display:'flex',gap:'6px',marginBottom:'10px'}},[
      el('input',{
        type:'text',placeholder:'اكتب الرمز أو الاسم ثم Enter...',value:state.searchDraft ?? state.search ?? '',
        style:{flex:'1',background:'#0a1020',border:'1px solid #1a2340',
          borderRadius:'8px',padding:'7px 10px',color:C.text,fontSize:'12px',outline:'none'},
        onInput:e=>{
          state.searchDraft=e.target.value;
        },
        onKeyDown:e=>{
          if(e.key==='Enter') {

      el('div',{style:{background:'rgba(0,255,136,.06)',border:'1px solid rgba(0,255,136,.15)',

function renderMiniStock(s) {
  const chg      = s.p.change || 0;
  const isUp     = chg > 0;
  const clr      = chg > 0 ? C.green : chg < 0 ? C.pink : C.text2;
  const spyDiff  = state.spyChange != null ? chg - state.spyChange : null;
  const ind      = state.indicators[s.id];
  const volR     = s.p.avgVolume>0 ? s.p.volume/s.p.avgVolume : 0;
  const isOpen   = state.selectedStock === s.id;

  return el('div',{style:{
    background:'#060b14', borderRadius:'8px',
    border:`1px solid ${isOpen ? C.purple : clr+'18'}`,
    minWidth:'0', overflow:'hidden',
    cursor:'pointer',
  }, onClick:async()=>{
    state.selectedStock = isOpen ? null : s.id;
    render();
    if(!isOpen) {
      await ensureAnalystData(s.id);
      render();
    }
  }},[

    // ── رأس البطاقة
    el('div',{style:{padding:'8px 10px'}},[
      el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'2px'}},[
        el('div',{},[
          el('div',{style:{fontSize:'11px',fontWeight:'800',color:C.text,
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'80px'}},
            [s.name]),
          el('div',{style:{fontSize:'9px',color:C.text3}},[s.id]),
        ]),
        el('div',{style:{textAlign:'left',flexShrink:'0'}},[
          el('div',{style:{fontSize:'12px',fontWeight:'800',color:clr}},
            [(isUp?'+':'')+fmt(chg,2)+'%']),
          el('div',{style:{fontSize:'10px',color:C.text2}},['$'+fmtPrice(s.p.price)]),
        ]),
      ]),
      el('div',{style:{display:'flex',gap:'4px',flexWrap:'wrap'}},[
        spyDiff!=null && el('span',{style:{
          fontSize:'8px',color:spyDiff>=0?C.green:C.pink,
          background:spyDiff>=0?'rgba(0,255,136,.08)':'rgba(255,45,122,.08)',
          borderRadius:'3px',padding:'1px 4px',
        }},[(spyDiff>=0?'+':'')+spyDiff.toFixed(1)+'% SPY']),
        volR>=1.5 && el('span',{style:{
          fontSize:'8px',color:C.blue,
          background:'rgba(0,200,255,.08)',
          borderRadius:'3px',padding:'1px 4px',
        }},['vol ×'+fmt(volR,1)]),
        ind?.rsi!=null && el('span',{style:{
          fontSize:'8px',
          color: ind.rsi<35?C.green:ind.rsi>70?C.pink:C.text3,
          background:'rgba(255,255,255,.04)',
          borderRadius:'3px',padding:'1px 4px',
        }},['RSI '+Math.round(ind.rsi)]),
        // ✅ badge جودة البيانات — يستخدم العدد الحقيقي
        ind && (ind.dataLen || ind.closes?.length || 0) < 100 && el('span',{style:{
          fontSize:'8px', color:C.orange,
          background:'rgba(255,122,0,.08)',
          borderRadius:'3px', padding:'1px 4px',
        }},['📊 '+(ind.dataLen || ind.closes?.length||0)+'y']),
      ].filter(Boolean)),
    ]),

    // ── البطاقة تفتح صفحة كاملة عند الضغط
    isOpen && ind && null, // الصفحة الكاملة تُعرض في renderApp
  ]);
}

function renderStockPriceRangeCard(s, p, ind) {
  const range = state.stockRange || 'week';
  const count = range === 'month' ? 30 : 7;
  const closes = (ind?.closesFull || ind?.closes || []).slice(-count);
  const dates  = (ind?.datesFull  || ind?.dates  || []).slice(-count);
  if(!closes.length) return null;

  const first = closes[0], last = closes[closes.length-1];
  const periodPct = first ? (last-first)/first*100 : 0;
  const high = Math.max(...closes);
  const low  = Math.min(...closes);
  const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

  return el('div', {style:{
    background:'#0a1020', border:'1px solid rgba(214,168,79,.25)',
    borderRadius:'14px', padding:'12px', marginBottom:'12px',
  }}, [
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'10px'}}, [
      el('div', {style:{fontSize:'12px', fontWeight:'900', color:C.blue}}, ['📅 أسعار '+(range==='month'?'الشهر':'الأسبوع')]),
      el('div', {style:{display:'flex', gap:'6px'}}, [
        el('button', {style:{
          fontSize:'10px', fontWeight:'800', borderRadius:'7px', padding:'5px 9px',
          color:range==='week'?C.green:C.text2,
          border:`1px solid ${range==='week'?C.green+'66':'rgba(255,255,255,.12)'}`,
          background:range==='week'?'rgba(0,255,136,.10)':'rgba(255,255,255,.03)',
        }, onClick:()=>{state.stockRange='week'; render();}}, ['أسبوع']),
        el('button', {style:{
          fontSize:'10px', fontWeight:'800', borderRadius:'7px', padding:'5px 9px',
          color:range==='month'?C.green:C.text2,
          border:`1px solid ${range==='month'?C.green+'66':'rgba(255,255,255,.12)'}`,
          background:range==='month'?'rgba(0,255,136,.10)':'rgba(255,255,255,.03)',
        }, onClick:()=>{state.stockRange='month'; render();}}, ['شهر']),
      ]),
    ]),
    el('div', {style:{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'6px', marginBottom:'10px'}}, [
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'7px', textAlign:'center'}}, [
        el('div', {style:{fontSize:'8px', color:C.text3}}, ['تغير الفترة']),
        el('div', {style:{fontSize:'13px', fontWeight:'900', color:periodPct>=0?C.green:C.pink}}, [(periodPct>=0?'+':'')+fmt(periodPct,2)+'%']),
      ]),
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'7px', textAlign:'center'}}, [
        el('div', {style:{fontSize:'8px', color:C.text3}}, ['أعلى']),
        el('div', {style:{fontSize:'13px', fontWeight:'900', color:C.green}}, [fmtPrice(high)]),
      ]),
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'7px', textAlign:'center'}}, [
        el('div', {style:{fontSize:'8px', color:C.text3}}, ['أدنى']),
        el('div', {style:{fontSize:'13px', fontWeight:'900', color:C.pink}}, [fmtPrice(low)]),
      ]),
    ]),
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr', gap:'4px'}},
      closes.map((price, i) => {
        const prev = i>0 ? closes[i-1] : price;
        const chg = prev ? (price-prev)/prev*100 : 0;
        const d = dates[i] ? new Date(dates[i]) : null;
        const label = d && !isNaN(d) ? days[d.getDay()]+' '+dates[i] : 'اليوم '+(i+1);
        return el('div', {style:{
          display:'flex', justifyContent:'space-between', alignItems:'center',
          background:'rgba(255,255,255,.025)', borderRadius:'7px',
          padding:'5px 8px', fontSize:'10px',
        }}, [
          el('span', {style:{color:C.text2}}, [label]),
          el('span', {style:{fontWeight:'900', color:C.text}}, [fmtPrice(price)]),
          el('span', {style:{fontWeight:'800', color:chg>=0?C.green:C.pink}}, [(chg>=0?'+':'')+fmt(chg,2)+'%']),
        ]);
      })
    ),
  ]);
}

// ── بطاقة تحليل المضارب اليومي
function renderTraderCard(s, ind, volR, chg, priceObj) {
  const pData = priceObj || s.p || {};
  const price = pData.price || 0;

  const signals = [];

  // 1. MACD Histogram — زخم الحركة
  if(ind.macdHist!=null) {
    const h = ind.macdHist, d = ind.macdHistDir;
    const col  = h>0&&d==='expanding'?C.green : h>0?C.yellow : d==='expanding'?C.pink:C.orange;
    const icon = h>0&&d==='expanding'?'✅':h>0?'⚠️':d==='expanding'?'❌':'⚠️';
    const txt  = h>0&&d==='expanding'
      ? 'الزخم يتصاعد للأعلى — قوة الشراء تزداد — فرصة دخول جيدة'
      : h>0
      ? 'الزخم موجب لكن يضعف — الحركة تتباطأ — راقب الخروج'
      : d==='expanding'
      ? 'الزخم يتصاعد للأسفل — قوة البيع تزيد — تجنب الدخول'
      : 'الزخم سالب لكن يضعف — قد يرتد — انتظر تأكيداً';
    const hint = 'MACD Histogram يقيس قوة واتجاه الحركة';
    signals.push({label:'زخم الحركة (MACD)', value:(h>0?'+':'')+fmt(h,2)+(d==='expanding'?' ↑':' ↓'), desc:txt, hint, color:col, icon});
  }

  // 2. RSI — هل السهم مباع أو مشترى بإفراط؟
  if(ind.rsi!=null) {
    const r   = ind.rsi;
    const col = r<35?C.green:r>70?C.pink:C.yellow;
    const icon= r<35?'✅':r>70?'❌':'⚠️';
    const txt = r<30 ? 'مباع بإفراط شديد — ارتداد قوي محتمل — فرصة شراء'
              : r<45 ? 'منطقة شراء — السهم رخيص نسبياً'
              : r<60 ? 'منطقة محايدة — لا إشارة واضحة — انتظر'
              : r<70 ? 'السهم قوي لكن راقب التشبع'
              :        'مشترى بإفراط — قد ينزل — احذر من الدخول الآن';
    const hint = 'RSI: أقل من 30 = رخيص جداً | أكثر من 70 = غالٍ جداً';
    signals.push({label:'RSI — القوة النسبية', value:fmt(r,1), desc:txt, hint, color:col, icon});
  }

  // 3. الشمعة الأخيرة
  if(ind.closes?.length >= 3) {
    const candles = detectCandlePatterns(ind.closes, ind.highs, ind.lows, ind.opens);
    const top = candles[0];
    if(top) {
      const col  = top.signal==='bullish'?C.green:top.signal==='bearish'?C.pink:C.yellow;
      const icon = top.signal==='bullish'?'✅':top.signal==='bearish'?'❌':'⚠️';
      const extra= top.signal==='bullish'?' — إشارة شراء':top.signal==='bearish'?' — إشارة بيع':' — انتظر تأكيد';
      const hint = 'الشمعة تعكس حركة السعر في اليوم الأخير';
      signals.push({label:'الشمعة اليابانية', value:top.ar, desc:top.tip+extra, hint, color:col, icon});
    } else {
      const hint = 'الشمعة تعكس حركة السعر في اليوم الأخير';
      signals.push({label:'الشمعة اليابانية', value:'محايدة', desc:'لا نمط واضح — السوق في تردد — انتظر جلسة أخرى', hint, color:C.text3, icon:'⚠️'});
    }
  }

  // 4. الحجم
  const volCol  = volR>=2?C.green:volR>=1.2?C.blue:volR<0.7?C.pink:C.text3;
  const volIcon = volR>=2?'✅':volR>=1.2?'✅':volR<0.7?'❌':'⚠️';
  const volTxt  = volR>=2 ? 'اهتمام قوي جداً — حركة حقيقية وليست وهمية'
                : volR>=1.2 ? 'حجم مرتفع — تأكيد للحركة'
                : volR<0.7  ? 'حجم ضعيف — الحركة قد لا تستمر'
                :             'حجم طبيعي — لا تأكيد إضافي';
  const volHint = 'الحجم يقيس عدد الأسهم المتداولة مقارنة بالمعدل';
  signals.push({label:'حجم التداول', value:'×'+fmt(volR,1), desc:volTxt, hint:volHint, color:volCol, icon:volIcon});

  // 5. الأسبوعي
  if(ind.weeklyTrend) {
    const col  = ind.weeklyTrend==='bullish'?C.blue:C.pink;
    const icon = ind.weeklyTrend==='bullish'?'✅':'❌';
    const txt  = ind.weeklyTrend==='bullish'
      ? 'الاتجاه الكبير صاعد — الموجة في صالحك — أفضل للشراء'
      : 'الاتجاه الكبير هابط — تسبح عكس التيار — خطر أعلى';
    const hint = 'الأسبوعي يعكس اتجاه السهم على مدى أسابيع';
    signals.push({label:'الاتجاه الأسبوعي', value:ind.weeklyTrend==='bullish'?'صاعد ↑':'هابط ↓', desc:txt, hint, color:col, icon});
  }

  // 6. الدعم
  if(ind.support && ind.support > 0) {
    const dist     = (price - ind.support)/price*100;
    const atSup    = dist < 2;
    const belowSup = price < ind.support;
    const col  = atSup?C.green:belowSup?C.pink:C.text3;
    const icon = atSup?'✅':belowSup?'❌':'⚠️';
    const txt  = atSup
      ? 'السعر عند الدعم — تاريخياً يرتد من هنا — نقطة شراء محتملة'
      : belowSup
      ? 'السعر كسر الدعم — إشارة هبوط — انتظر الاستقرار'
      : 'بُعد '+fmt(dist,1)+'% من الدعم — ليس عند نقطة ارتداد بعد';
    const hint = 'الدعم = مستوى سعري يرتد منه السهم للأعلى تاريخياً';
    signals.push({label:'مستوى الدعم', value:'$'+fmt(ind.support,2), desc:txt, hint, color:col, icon});
  }

  // 7. رأي المحللين — للتأكيد وليس للقيادة
  const av = getAnalystView(s.id, price);
  if(av.analysts || av.target) {
    const icon = av.bias >= 1 ? '✅' : av.bias <= -2 ? '❌' : '⚠️';
    const desc = av.analysts
      ? av.analysts+' محلل — '+av.verdict+(av.target ? ' — هدفهم $'+fmt(av.target,2) : '')
      : 'هدف المحللين $'+fmt(av.target,2);
    const hint = 'رأي المحللين عامل تأكيد فقط؛ لا يدخل وحده بدون سعر دخول ووقف خسارة واضح';
    signals.push({
      label:'رأي المحللين',
      value: av.upside!=null ? (av.upside>=0?'+':'')+fmt(av.upside,1)+'%' : av.label,
      desc, hint, color:av.color, icon
    });
  }

  // ── القرار
  const greens = signals.filter(s=>s.icon==='✅').length;
  const reds   = signals.filter(s=>s.icon==='❌').length;
  let decision, decColor, decBg;
  if(greens >= 4)         { decision='اشتري / تمسك 🟢'; decColor=C.green;  decBg='rgba(0,255,136,.08)'; }
  else if(reds >= 3)      { decision='بيع / اخرج 🔴';   decColor=C.pink;   decBg='rgba(255,45,122,.08)'; }
  else if(greens >= reds) { decision='انتظر تأكيد 🟡';  decColor=C.yellow; decBg='rgba(255,224,51,.06)'; }
  else                    { decision='ميل للبيع ⚠️';    decColor=C.orange; decBg='rgba(255,122,0,.08)'; }

  return el('div',{style:{
    background:'#050810', padding:'10px',
  }},[

    // ── المؤشرات
    el('div',{style:{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'12px',width:'100%'}},
      signals.map(sig => el('div',{style:{
        background:'#060b14', borderRadius:'10px', padding:'10px 14px',
        border:`1px solid ${sig.color}22`,
        display:'flex', alignItems:'flex-start', gap:'10px',
        width:'100%', boxSizing:'border-box',
      }},[
        // أيقونة
        el('span',{style:{fontSize:'20px',flexShrink:'0',marginTop:'2px'}},[sig.icon]),
        // وصف يملأ المساحة
        el('div',{style:{flex:'1',minWidth:'0',textAlign:'right'}},[
          el('div',{style:{
            fontSize:'13px',fontWeight:'700',color:sig.color,
            lineHeight:'1.6', marginBottom:'3px',
          }},[sig.desc]),
          sig.hint && el('div',{style:{
            fontSize:'10px',color:C.text3,
            borderTop:`1px solid ${sig.color}15`, paddingTop:'3px', marginTop:'3px',
          }},[sig.hint]),
        ]),
        // القيمة + اسم المؤشر
        el('div',{style:{
          textAlign:'right', flexShrink:'0',
          borderRight:`2px solid ${sig.color}40`,
          paddingRight:'10px', minWidth:'70px',
        }},[
          el('div',{style:{fontSize:'14px',fontWeight:'900',color:sig.color}},[sig.value]),
          el('div',{style:{fontSize:'9px',color:C.text3,marginTop:'2px'}},[sig.label]),
        ]),
      ]))
    ),

    // ── القرار النهائي
    el('div',{style:{
      background:decBg,
      border:`1px solid ${decColor}33`,
      borderRadius:'10px',padding:'12px 14px',
      direction:'rtl', marginBottom:'8px',
    }},[
      el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}},[
        el('span',{style:{fontSize:'14px',fontWeight:'900',color:decColor}},[decision]),
        el('span',{style:{fontSize:'10px',color:C.text3}},['✅'+greens+' ❌'+reds+' ⚠️'+(signals.length-greens-reds)]),
      ]),
      el('div',{style:{fontSize:'11px',color:C.text2,lineHeight:'1.6'}},[
        greens >= 4
          ? 'معظم المؤشرات تشير للشراء — يمكن الدخول مع وقف الخسارة الإلزامي'
          : reds >= 3
          ? 'معظم المؤشرات تشير للبيع — تجنب الدخول أو اخرج إذا عندك مركز مفتوح'
          : greens >= reds
          ? 'المؤشرات مختلطة — انتظر شمعة غد: إذا أغلق بخضراء قوية مع حجم مرتفع ادخل، وإلا انتظر'
          : 'الميل للهبوط — انتظر حتى يستقر السعر عند دعم أو يتحول MACD للإيجابي',
      ]),
    ]),

    // ── تحذير
    el('div',{style:{fontSize:'8px',color:C.text3,marginTop:'6px',textAlign:'center'}},
      ['⚠️ تحليل تقني لحظي — القرار النهائي لك']),
  ]);
}

// ═══════════════════ PORTFOLIO TAB ══════════════════════════════
// ================================================================

function renderPortTab() {
  // تحميل المحفظة من localStorage
  let portfolio = [];
  try { portfolio = JSON.parse(localStorage.getItem('portfolio')||'[]'); } catch(e) {}

  const openTrades  = portfolio.filter(t=>t.type==='buy'&&!t.closed);
  const closedTrades= portfolio.filter(t=>t.closed||t.type==='sell');

  const totalInvested = openTrades.reduce((s,t) => s + t.shares*t.buyPrice*USD_RATE, 0);
  const totalCurrent  = openTrades.reduce((s,t) => {
    const p = state.prices[t.symbol]?.price || t.buyPrice;
    return s + t.shares*p*USD_RATE;
  }, 0);
  const totalPnL = totalCurrent - totalInvested;

  const wins = closedTrades.filter(t=>(t.exitPrice||t.buyPrice)>t.buyPrice).length;
  const winRate = closedTrades.length>0 ? Math.round(wins/closedTrades.length*100) : 0;

  const totalRealized = closedTrades.reduce((s,t) => {
    const exit = t.exitPrice||t.buyPrice;
    return s + (exit - t.buyPrice)*t.shares*USD_RATE;
  }, 0);

  function _savePortfolio() {
    try { localStorage.setItem('portfolio', JSON.stringify(portfolio)); } catch(e) {}
    // المحفظة تُحفظ محلياً فقط — السجل هو ما يذهب للسحابة
  }

  function saveTrade() {
    const sym    = (document.getElementById('p_sym')?.value||'').toUpperCase().trim();
    const shares = parseFloat(document.getElementById('p_shares')?.value||0);
    const price  = parseFloat(document.getElementById('p_price')?.value||0);
    const type   = document.getElementById('p_type')?.value||'buy';
    const notes  = document.getElementById('p_notes')?.value||'';
    const stopV  = parseFloat(document.getElementById('p_stop')?.value||0);
    const tgtV   = parseFloat(document.getElementById('p_tgt')?.value||0);
    if(!sym||!shares||!price) { alert('أكمل الحقول الأساسية'); return; }

    const trade = {
      symbol:sym, shares, buyPrice:price, type,
      notes, stopLoss:stopV||0, target:tgtV||0,
      date:new Date().toISOString(),
      closed:false, exitPrice:null, exitDate:null,
    };

    // إذا نوع بيع — ابحث عن صفقة شراء مفتوحة
    if(type==='sell') {
      const openIdx = portfolio.findIndex(t=>t.symbol===sym&&t.type==='buy'&&!t.closed);
      if(openIdx>=0) {
        portfolio[openIdx].closed    = true;
        portfolio[openIdx].exitPrice = price;
        portfolio[openIdx].exitDate  = new Date().toISOString();
        portfolio[openIdx].exitNotes = notes;
      } else {
        // إضافة كسجل مباشر
        trade.closed    = true;
        trade.exitPrice = price;
        trade.exitDate  = new Date().toISOString();
        portfolio.push(trade);
      }
    } else {
      portfolio.push(trade);
    }

    _savePortfolio();
    ['p_sym','p_shares','p_price','p_notes','p_stop','p_tgt'].forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.value='';
    });
    render();
  }

  function deleteTrade(idx) {
    if(!confirm('حذف الصفقة؟')) return;
    portfolio.splice(idx, 1);
    _savePortfolio();
    render();
  }

  function closeTrade(idx) {
    const t   = portfolio[idx];
    const cur = state.prices[t.symbol]?.price || t.buyPrice;
    // نحفظ index في state لفتح حقل الإغلاق
    state._closingIdx = state._closingIdx === idx ? null : idx;
    render();
  }

  function confirmClose(idx) {
    const exitVal = parseFloat(document.getElementById('close_price_'+idx)?.value||0);
    if(!exitVal || isNaN(exitVal) || exitVal <= 0) { alert('أدخل سعر إغلاق صحيح'); return; }
    portfolio[idx].closed    = true;
    portfolio[idx].exitPrice = exitVal;
    portfolio[idx].exitDate  = new Date().toISOString();
    state._closingIdx = null;
    _savePortfolio();
    render();
  }

  function fmtDate(iso) {
    if(!iso) return '';
    try {
      return new Date(iso).toLocaleDateString('ar', {month:'short', day:'numeric'});
    } catch(e) { return ''; }
  }

  return el('div', {style:{padding:'12px 16px'}}, [
    // إحصائيات
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginBottom:'14px'}}, [
      el('div', {style:{background:'#0a1020', border:'1px solid var(--border)', borderRadius:'12px', padding:'12px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['💼 مفتوحة']),
        el('div', {style:{fontSize:'16px', fontWeight:'900', color:C.blue}}, [totalInvested.toFixed(0)+' ر']),
        el('div', {style:{fontSize:'9px', color:totalPnL>=0?C.green:C.pink}}, [
          'غير محقق: '+(totalPnL>=0?'+':'')+totalPnL.toFixed(0)+' ر'
        ]),
      ]),
      el('div', {style:{background: totalRealized>=0?'rgba(0,255,136,.08)':'rgba(255,45,122,.08)', border:`1px solid ${totalRealized>=0?C.green:C.pink}33`, borderRadius:'12px', padding:'12px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['💰 محقق']),
        el('div', {style:{fontSize:'16px', fontWeight:'900', color:totalRealized>=0?C.green:C.pink}}, [
          (totalRealized>=0?'+':'')+totalRealized.toFixed(0)+' ر'
        ]),
        el('div', {style:{fontSize:'9px', color:C.text2}}, [closedTrades.length+' صفقة مغلقة']),
      ]),
      el('div', {style:{background:'#0a1020', border:'1px solid var(--border)', borderRadius:'12px', padding:'12px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['🎯 نسبة النجاح']),
        el('div', {style:{fontSize:'16px', fontWeight:'900', color:winRate>=60?C.green:winRate>=40?C.yellow:C.pink}}, [winRate+'%']),
        el('div', {style:{fontSize:'9px', color:C.text2}}, [wins+' ربح / '+(closedTrades.length-wins)+' خسارة']),
      ]),
      el('div', {style:{background:'#0a1020', border:'1px solid var(--border)', borderRadius:'12px', padding:'12px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['📊 مفتوح / مغلق']),
        el('div', {style:{fontSize:'16px', fontWeight:'900', color:C.blue}}, [openTrades.length+' / '+closedTrades.length]),
        el('div', {style:{fontSize:'9px', color:C.text2}}, ['إجمالي '+portfolio.length+' صفقة']),
      ]),
    ]),

    // إضافة صفقة
    el('div', {style:{background:'#0a1020', border:`1px solid ${C.green}33`, borderRadius:'14px', padding:'14px', marginBottom:'14px'}}, [
      el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.green, marginBottom:'12px'}}, ['➕ تسجيل صفقة جديدة']),
      el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginBottom:'8px'}}, [
        el('div', {}, [
          el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['رمز السهم']),
          el('input', {id:'p_sym', type:'text', placeholder:'AAPL', style:{width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px', textTransform:'uppercase'}}),
        ]),
        el('div', {}, [
          el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['نوع الصفقة']),
          (() => {
            const sel = document.createElement('select');
            Object.assign(sel.style, {id:'p_type', width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px'});
            sel.id = 'p_type';
            ['buy','sell'].forEach((v) => {
              const o = document.createElement('option');
              o.value = v; o.textContent = v==='buy'?'🟢 شراء':'🔴 بيع';
              sel.appendChild(o);
            });
            return sel;
          })(),
        ]),
        el('div', {}, [
          el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['عدد الأسهم']),
          el('input', {id:'p_shares', type:'number', placeholder:'10', style:{width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px'}}),
        ]),
        el('div', {}, [
          el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['السعر $']),
          el('input', {id:'p_price', type:'number', placeholder:'150.00', style:{width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px'}}),
        ]),
        el('div', {}, [
          el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['🛑 وقف الخسارة $']),
          el('input', {id:'p_stop', type:'number', placeholder:'اختياري', style:{width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px'}}),
        ]),
        el('div', {}, [
          el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['🎯 الهدف $']),
          el('input', {id:'p_tgt', type:'number', placeholder:'اختياري', style:{width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px'}}),
        ]),
      ]),
      el('div', {style:{marginBottom:'8px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['📝 ملاحظات']),
        el('input', {id:'p_notes', type:'text', placeholder:'سبب الدخول، استراتيجية...', style:{width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px'}}),
      ]),
      el('button', {
        style:{width:'100%', background:`linear-gradient(135deg,${C.green}22,${C.blue}22)`, border:`1px solid ${C.green}`, color:C.green, borderRadius:'10px', padding:'10px', fontSize:'13px', fontWeight:'700'},
        onClick: saveTrade,
      }, ['💾 حفظ الصفقة']),
    ]),

    // ── الصفقات المفتوحة
    openTrades.length > 0 && el('div', {style:{marginBottom:'14px'}}, [
      el('div', {style:{fontSize:'12px', fontWeight:'700', color:C.blue, marginBottom:'8px'}}, ['📂 صفقات مفتوحة ('+openTrades.length+')']),
      ...portfolio.map((t, idx) => {
        if(t.closed || t.type==='sell') return null;
        const cur = state.prices[t.symbol]?.price || t.buyPrice;
        const pnl = (cur - t.buyPrice) * t.shares * USD_RATE;
        const pnlPct = ((cur - t.buyPrice)/t.buyPrice*100).toFixed(2);
        const rr = t.stopLoss>0&&t.target>0
          ? (((t.target-t.buyPrice)/(t.buyPrice-t.stopLoss))).toFixed(1)+'x'
          : null;
        const nearStop = t.stopLoss>0 && cur <= t.stopLoss*1.02;
        const nearTgt  = t.target>0  && cur >= t.target*0.98;
        return el('div', {style:{
          background:'#0a1020',
          border:`1px solid ${pnl>=0?C.green:C.pink}22`,
          borderRadius:'10px', padding:'10px', marginBottom:'8px',
        }}, [
          el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'4px'}}, [
            el('div', {}, [
              el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.text}}, [t.symbol+' × '+t.shares]),
              el('div', {style:{fontSize:'9px', color:C.text3}}, [
                '📅 '+fmtDate(t.date)+' • دخول $'+t.buyPrice.toFixed(2)
              ]),
            ]),
            el('div', {style:{textAlign:'left'}}, [
              el('div', {style:{fontSize:'13px', fontWeight:'700', color:pnl>=0?C.green:C.pink}}, [
                (pnl>=0?'+':'')+pnl.toFixed(0)+' ر'
              ]),
              el('div', {style:{fontSize:'10px', color:pnl>=0?C.green:C.pink}}, [
                (pnl>=0?'+':'')+pnlPct+'%'
              ]),
            ]),
          ]),
          // السعر الحالي
          el('div', {style:{display:'flex', gap:'6px', marginBottom:'4px'}}, [
            el('div', {style:{
              flex:'1', background:'#060b14', borderRadius:'6px', padding:'4px 6px',
              fontSize:'9px', color:C.text2,
            }}, ['الآن: $'+cur.toFixed(2)]),
            t.stopLoss>0&&el('div', {style:{
              flex:'1', background:nearStop?'rgba(255,45,122,.15)':'#060b14',
              borderRadius:'6px', padding:'4px 6px', fontSize:'9px',
              color:nearStop?C.pink:C.text3,
            }}, ['🛑 $'+t.stopLoss.toFixed(2)+(nearStop?' ⚠️':'')]),
            t.target>0&&el('div', {style:{
              flex:'1', background:nearTgt?'rgba(0,255,136,.15)':'#060b14',
              borderRadius:'6px', padding:'4px 6px', fontSize:'9px',
              color:nearTgt?C.green:C.text3,
            }}, ['🎯 $'+t.target.toFixed(2)+(nearTgt?' ✅':'')]),
          ].filter(Boolean)),
          // ملاحظات ونسبة R/R
          el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center'}}, [
            t.notes?el('div', {style:{fontSize:'9px', color:C.text3, flex:'1', marginLeft:'8px'}}, [
              '💬 '+t.notes
            ]):el('div',{},[]),
            el('div', {style:{display:'flex', gap:'4px', flexShrink:'0'}}, [
              rr&&el('span', {style:{
                fontSize:'9px', background:'rgba(180,79,255,.1)',
                border:'1px solid rgba(180,79,255,.3)',
                borderRadius:'4px', padding:'2px 5px', color:C.purple,
              }}, ['R:R '+rr]),
              el('button', {
                style:{background:`rgba(0,200,255,.1)`, border:`1px solid rgba(0,200,255,.3)`,
                  color:C.blue, borderRadius:'6px', padding:'3px 7px', fontSize:'9px'},
                onClick: () => closeTrade(idx),
              }, [state._closingIdx === idx ? '✕ إلغاء' : '💰 إغلاق']),
              el('button', {
                style:{background:'rgba(255,45,122,.1)', border:'1px solid rgba(255,45,122,.3)',
                  color:C.pink, borderRadius:'6px', padding:'3px 7px', fontSize:'9px'},
                onClick: () => deleteTrade(idx),
              }, ['🗑️']),
            ].filter(Boolean)),
          ]),
          // ── حقل إغلاق الصفقة (يظهر عند الضغط على إغلاق)
          state._closingIdx === idx ? el('div', {style:{
            marginTop:'8px', background:'rgba(0,200,255,.06)',
            border:'1px solid rgba(0,200,255,.2)',
            borderRadius:'8px', padding:'8px 10px',
            display:'flex', gap:'6px', alignItems:'center',
          }}, [
            el('span', {style:{fontSize:'9px', color:C.text3, flexShrink:'0'}}, ['سعر الإغلاق $']),
            el('input', {
              id:'close_price_'+idx,
              type:'number',
              placeholder: cur.toFixed(2),
              style:{
                flex:'1', background:'#060b14', border:'1px solid rgba(0,200,255,.3)',
                borderRadius:'6px', padding:'5px 8px', color:C.text, fontSize:'12px',
              },
            }),
            el('button', {
              style:{
                background:`linear-gradient(135deg,${C.green}22,${C.blue}22)`,
                border:`1px solid ${C.green}44`, color:C.green,
                borderRadius:'6px', padding:'5px 10px', fontSize:'10px', fontWeight:'700',
                flexShrink:'0',
              },
              onClick: () => confirmClose(idx),
            }, ['✅ تأكيد']),
          ]) : null,
        ]);
      }).filter(Boolean),
    ]),

    // ── الصفقات المغلقة
    closedTrades.length > 0 && el('div', {}, [
      el('div', {style:{fontSize:'12px', fontWeight:'700', color:C.text2, marginBottom:'8px'}}, ['📋 السجل ('+closedTrades.length+')']),
      ...portfolio.map((t, idx) => {
        if(!t.closed && t.type!=='sell') return null;
        const exit = t.exitPrice||t.buyPrice;
        const pnl  = (exit - t.buyPrice)*t.shares*USD_RATE;
        const pnlPct = ((exit-t.buyPrice)/t.buyPrice*100).toFixed(2);
        const days = t.exitDate&&t.date
          ? Math.round((new Date(t.exitDate)-new Date(t.date))/(1000*60*60*24))
          : null;
        return el('div', {style:{
          background:'rgba(255,255,255,.02)',
          border:`1px solid ${pnl>=0?C.green:C.pink}18`,
          borderRadius:'8px', padding:'8px 10px', marginBottom:'6px',
          display:'flex', justifyContent:'space-between', alignItems:'center',
        }}, [
          el('div', {}, [
            el('div', {style:{fontSize:'11px', fontWeight:'700', color:pnl>=0?C.green:C.pink}}, [
              (pnl>=0?'✅':'❌')+' '+t.symbol
            ]),
            el('div', {style:{fontSize:'9px', color:C.text3}}, [
              fmtDate(t.date)+(t.exitDate?' → '+fmtDate(t.exitDate):'')+
              (days!==null?' ('+days+'ي)':'')
            ]),
            t.notes&&el('div', {style:{fontSize:'9px', color:C.text3}}, ['💬 '+t.notes]),
          ]),
          el('div', {style:{textAlign:'left'}}, [
            el('div', {style:{fontSize:'12px', fontWeight:'700', color:pnl>=0?C.green:C.pink}}, [
              (pnl>=0?'+':'')+pnl.toFixed(0)+' ر'
            ]),
            el('div', {style:{fontSize:'9px', color:pnl>=0?C.green:C.pink}}, [
              (pnl>=0?'+':'')+pnlPct+'%'
            ]),
            el('button', {
              style:{background:'rgba(255,45,122,.1)', border:'1px solid rgba(255,45,122,.25)', color:C.pink, borderRadius:'5px', padding:'2px 6px', fontSize:'9px', marginTop:'2px'},
              onClick: () => deleteTrade(idx),
            }, ['🗑️']),
          ]),
        ]);
      }).filter(Boolean),
    ]),
  ]);
}

          width:'100%', background:`linear-gradient(135deg,${C.blue}22,${C.green}22)`,
          border:`1px solid ${C.blue}44`, borderRadius:'8px',
          padding:'8px', color:C.blue, fontWeight:'700', fontSize:'12px',
        },
        onClick: () => {
          const buy = parseFloat($('calc_buy')?.value||0);
          const sell= parseFloat($('calc_sell')?.value||0);
          const qty = parseFloat($('calc_qty')?.value||0);
          if(!buy||!sell||!qty) return;
          const pnl    = (sell-buy)*qty;
          const pnlSar = pnl*USD_RATE;
          const pct    = (sell-buy)/buy*100;
          alert(`الربح/الخسارة:\n${pnl>=0?'+':''}${fmt(pnl,2)} $ (${fmt(pct,2)}%)\n= ${fmt(pnlSar,0)} ريال`);
        }
      }, ['احسب']),
    ]),
  ]);
}

// ── متغيرات التحكم في التوصيات
let _recsLockedToday  = false;   // التوصيات محسوبة ومقفلة لليوم
let _midDayDone       = false;   // تحديث منتصف اليوم تم
let _lastRecDate      = null;    // تاريخ آخر حساب

function shouldRecalc() {
  const today = new Date().toDateString();
  // يوم جديد → أعد الحساب
  if(_lastRecDate !== today) {
    _recsLockedToday = false;
    _midDayDone      = false;
    _lastRecDate     = today;
    return true;
  }
  return !_recsLockedToday;
}

// ── reset المؤشرات عند فتح السوق (إذا حُمّلت وهو مغلق)
let _marketWasClosed = !isMarketOpen();
setInterval(() => {
  const nowOpen = isMarketOpen();
  if(nowOpen && _marketWasClosed && !_recsLockedToday && !_indicatorsLoading) {
    console.log('[Market Open] السوق فتح — إعادة تحميل المؤشرات...');
    state.indicatorsDone = false;
    loadData(false);
  }
  _marketWasClosed = !nowOpen;
}, 15000);

// ── تحديث الأسعار واتجاه السوق كل 30 ثانية (بدون إعادة حساب التوصيات)
setInterval(async () => {
  if(!isMarketOpen()) return; // لا داعي للتحديث خارج السوق
  await Promise.all([fetchPrices(), fetchMarketTrend()]);
  // فقط نحدث الأسعار في التوصيات الموجودة — لا نعيد الحساب الكامل
  if(state.recs) {
    state.recs = state.recs.map(r => {
      const p = state.prices[r.id];
      if(!p?.price) return r;
      const stock = ALL_STOCKS.find(s => s.id === r.id);
      const fresh = stock && state.indicatorsDone ? calcSignal(stock) : null;
      return fresh
        ? { ...r, ...fresh, isConviction:r.isConviction }
        : { ...r, price:p.price, change:p.change, high:p.high, low:p.low, volume:p.volume };
    }).filter(r =>
      r?.recStage === 'confirmed' ||
      r?.recStage === 'conditional' ||
      r?.recStage === 'early'
    );
  }
  if(state.speculativeRecs) {
    state.speculativeRecs = state.speculativeRecs.map(r => {
      const p = state.prices[r.id];
      if(!p?.price) return r;
      return { ...r, price:p.price, change:p.change };
    });
  }
  render();
}, 30000);

// ── فحص منتصف اليوم كل دقيقة
setInterval(async () => {
  if(!isMarketOpen() || !state.indicatorsDone) return;

  const t = getMarketTimes();
  const m = getNowMins();

  // 7:00م — تحديث المؤشرات وإعادة الحساب مرة ثانية وأخيرة (نافذة 30 دقيقة)
  if(m >= t.midDay && m <= t.midDay+30 && !_midDayDone) {
    _midDayDone      = true;
    _recsLockedToday = false;

    // ✅ حفظ توصيات الجلسة الأولى كـ High Conviction قبل أي شيء
    if(state.recs?.length > 0) {
      state.sessionOneIds = state.recs.map(r => r.id);
      try {
        localStorage.setItem('s1_recs',      JSON.stringify(state.sessionOneIds));
        localStorage.setItem('s1_recs_date', new Date().toDateString()); // تاريخ الحفظ
      } catch(e) {}
      console.log('[MidDay] حفظ High Conviction:', state.sessionOneIds);
    }

    // إعادة تحميل المؤشرات وحساب التوصيات
    state.indicatorsDone = false;
    await fetchIndicators();
    await fetchNews();
    await fetchEarnings();

    // calcRecs ستقارن التوصيات الجديدة مع sessionOneIds المحفوظة أعلاه
    calcRecs();
    calcSpeculative();
    await calcHunterFull();
    // جلب Price Target للتوصيات فقط
    if(state.recs?.length > 0) await fetchPriceTargets(state.recs);
    if(state.recs?.length > 0 && isMarketOpen()) {
      recordRecsToHistory(state.recs, 'منتصف');
    }
    _recsLockedToday = true;
    try { localStorage.setItem('recs_midday', 'true'); } catch(e) {}
    render();
  }
}, 60000);

}

function sendNotification(title, body) {

  try {
    new Notification(title, { body, icon: '📊' });
  } catch(e) {}
}

// ── استرجاع التوصيات المحفوظة من نفس اليوم
(function restoreSavedRecs() {
  try {
    const savedDate  = localStorage.getItem('recs_date');
    const today      = new Date().toDateString();
    if(savedDate !== today) {
      // يوم جديد — امسح كل شيء بما فيه Cooldown
      localStorage.removeItem('s1_recs');
      localStorage.removeItem('s1_recs_date');
      localStorage.removeItem('cooldown_stocks');  // ✅ إصلاح: Cooldown يُمسح يومياً
      state.cooldownStocks = [];
      return;
    }

    const savedRecs  = localStorage.getItem('recs_full');
    const savedTime  = localStorage.getItem('recs_time');
    const midday     = localStorage.getItem('recs_midday') === 'true';

    if(!savedRecs || !savedTime) return;

    const recs = JSON.parse(savedRecs);
    if(!Array.isArray(recs) || recs.length === 0) return;
    const cleanRecs = recs.filter(r =>
      r?.recStage === 'confirmed' ||
      r?.recStage === 'conditional' ||
      r?.recStage === 'early' ||
      r?.activeBuy === true
    );
    if(cleanRecs.length !== recs.length) {
      localStorage.setItem('recs_full', JSON.stringify(cleanRecs));
      localStorage.setItem('recs_time', new Date().toISOString());
    }
    if(cleanRecs.length === 0) return;

    // ✅ استرجاع sessionOneIds (توصيات الجلسة الأولى) للمقارنة الصحيحة
    const s1Date = localStorage.getItem('s1_recs_date');
    if(s1Date === today) {
      const s1 = localStorage.getItem('s1_recs');
      if(s1) state.sessionOneIds = JSON.parse(s1);
    }

    state.recs           = cleanRecs;
    state.recsTime       = new Date(savedTime);
    // ✅ إذا توصيات محفوظة من نفس اليوم → قفلها فوراً
    // المؤشرات ستُحمّل لتحديث الأسعار فقط، لكن لا إعادة حساب
    state.indicatorsDone = false;  // يحمّل المؤشرات لتحديث الأسعار
    _recsLockedToday     = true;   // ✅ مقفلة — لا إعادة حساب
    _lastRecDate         = today;
    _midDayDone          = midday;

    console.log('[Restore] توصيات:', recs.length, '| High Conviction:', state.sessionOneIds?.length||0);
  } catch(e) {}
})();

// ── معالج الرسائل الذكي
async function tgHandle(msg, cid) {
  const s = tgState[cid] || {};
  const low = msg.toLowerCase();

  // ── أمر الخروج من سهم
  if(low.startsWith('خرجت') || low.startsWith('بعت')) {
    const sym = msg.split(/\s+/)[1]?.toUpperCase();
    if(sym) {
      try {
        const port = JSON.parse(localStorage.getItem('portfolio')||'[]');
        const t = port.find(x=>x.symbol===sym && !x.closed);
        if(t) {
          const cur = state.prices[sym]?.price || parseFloat(msg.split(/\s+/)[2]||t.target);
          t.closed = true; t.closePrice = cur; t.closeDate = new Date().toISOString();
          const pnl = ((cur-t.entry)/t.entry*100).toFixed(2);
          localStorage.setItem('portfolio', JSON.stringify(port));
          await tgSend(`✅ <b>${sym} مغلقة</b>\nدخول: $${t.entry} → خروج: $${cur}\n${pnl>0?'ربح +':'خسارة '}${pnl}%\nالسجل حُدّث 📊`);
        } else {
          await tgSend(`⚠️ ${sym} غير موجود في محفظتك`);
        }
      } catch(e){ await tgSend('⚠️ خطأ في التسجيل'); }
      tgState[cid] = {};
      return;
    }
  }

  // ── محفظتي
  if(msg==='محفظتي' || msg==='portfolio') {
    try {
      const port = JSON.parse(localStorage.getItem('portfolio')||'[]').filter(t=>!t.closed);
      if(port.length===0) { await tgSend('📂 محفظتك فارغة'); return; }
      let m = '💼 <b>محفظتك الآن:</b>\n──────────────\n';
      let totalPnl = 0;
      port.forEach(t=>{
        const cur = state.prices[t.symbol]?.price || t.entry;
        const pnl = ((cur-t.entry)/t.entry*100).toFixed(2);
        const icon = pnl>0?'✅':'❌';
        totalPnl += parseFloat(pnl);
        m += `${icon} <b>${t.symbol}</b> دخول $${t.entry} → الآن $${cur?.toFixed(2)} (${pnl>0?'+':''}${pnl}%)\n`;
      });
      m += `──────────────\nإجمالي: ${totalPnl>0?'+':''}${(totalPnl/port.length).toFixed(2)}% متوسط`;
      await tgSend(m);
    } catch(e){ await tgSend('⚠️ خطأ'); }
    return;
  }

  // ── تقرير اليوم
  if(msg==='تقرير' || msg==='اليوم') {
    const recs = state.recs || [];
    let m = '📊 <b>توصيات اليوم:</b>\n';
    if(recs.length===0) m += 'لا توصيات بعد — السوق مغلق\n';
    recs.forEach((r,i)=>{ m += `${i+1}. <b>${r.id}</b> هدف +${fmt(r.profitPct,1)}% | ثقة ${r.confidence}%\n`; });
    m += `\nSPY ${(state.spyChange||0)>=0?'+':''}${fmt(state.spyChange||0,2)}%`;
    await tgSend(m);
    return;
  }

  // ── استعلام عن سهم
  const sym = msg.toUpperCase().replace(/[^A-Z]/g,'');
  const stockExists = ALL_STOCKS?.find(x=>x.id===sym);
  if(sym.length>=2 && sym.length<=5 && stockExists && !s.step) {
    const ind = state.indicators[sym];
    const p   = state.prices[sym];
    if(!p) { await tgSend(`⏳ ${sym} — لم تُحمَّل بياناته بعد`); return; }
    const hist = ind?.macdHist;
    const rsi  = ind?.rsi;
    const weekly = ind?.weeklyTrend;
    let analysis = `📊 <b>${stockExists.name} (${sym})</b>\n`;
    analysis += `السعر: <b>$${p.price?.toFixed(2)}</b> ${p.change>=0?'📈':'📉'} ${p.change>=0?'+':''}${p.change?.toFixed(2)}%\n`;
    analysis += `──────────────\n`;
    if(hist!=null) analysis += `MACD Hist: ${hist>0?'✅':'❌'} ${hist>0?'+':''}${hist?.toFixed(2)} ${ind?.macdHistDir==='expanding'?'↑ يتوسع':'↓ يضيق'}\n`;
    if(rsi!=null)  analysis += `RSI: ${rsi<35?'✅':rsi>70?'❌':'⚠️'} ${rsi?.toFixed(1)}\n`;
    if(weekly)     analysis += `أسبوعي: ${weekly==='bullish'?'✅ صاعد':'❌ هابط'}\n`;
    analysis += `──────────────\n`;
    analysis += `هل اشتريت ${sym}؟\n1️⃣ نعم — سجّل صفقة\n2️⃣ لا — معلومات فقط`;
    tgState[cid] = { step:'ask_bought', sym, price:p.price };
    await tgSend(analysis);
    return;
  }

  // ── خطوات تسجيل الصفقة
  if(s.step==='ask_bought') {
    if(msg==='1' || msg==='نعم') {
      tgState[cid] = { ...s, step:'ask_price' };
      await tgSend(`بكم اشتريت ${s.sym}؟\n(اضغط إرسال للسعر الحالي $${s.price?.toFixed(2)})`);
    } else {
      tgState[cid] = {};
      await tgSend(`✅ تمام — ${s.sym} للمراقبة فقط`);
    }
    return;
  }

  if(s.step==='ask_price') {
    const entry = parseFloat(msg) || s.price;
    tgState[cid] = { ...s, step:'ask_qty', entry };
    await tgSend(`كم سهم اشتريت من ${s.sym}؟`);
    return;
  }

  if(s.step==='ask_qty') {
    const qty = parseInt(msg) || 1;
    const ind  = state.indicators[s.sym];
    const atrPct = ind?.atrPct || 3;
    const stop = (s.entry * (1 - atrPct*2/100)).toFixed(2);
    const target = (s.entry * (1 + atrPct*3.5/100)).toFixed(2);
    const profitPct = ((target-s.entry)/s.entry*100).toFixed(1);
    const days = estimateTradeDuration({kind:'spec', profitPct, atrPct}).days;

    // حفظ في المحفظة
    try {
      const port = JSON.parse(localStorage.getItem('portfolio')||'[]');
      port.push({ symbol:s.sym, entry:s.entry, qty, stop:parseFloat(stop), target:parseFloat(target), date:new Date().toISOString(), closed:false });
      localStorage.setItem('portfolio', JSON.stringify(port));
    } catch(e){}

    const msg2 = `✅ <b>تم تسجيل ${s.sym}</b>\n──────────────\nدخول: $${s.entry?.toFixed(2)}\nكمية: ${qty} سهم\nرأس المال: $${(s.entry*qty).toFixed(0)}\n──────────────\n🛑 وقف: $${stop} (-${atrPct*2}%)\n🎯 هدف: $${target} (+${profitPct}%)\n⏱️ مدة متوقعة: ${days<=1?'🔥 يومي':days<=3?'⚡ '+days+' أيام':'📅 '+days+' أيام'}\n──────────────\nسأراقبه وأنبهك 👀`;
    tgState[cid] = {};
    await tgSend(msg2);
    return;
  }

  // ── مساعدة
  await tgSend(`🦅 <b>RamiFalconX</b>\n──────────────\nاكتب رمز السهم: <code>NVDA</code>\nمحفظتك: <code>محفظتي</code>\nتقرير اليوم: <code>تقرير</code>\nخروج من سهم: <code>خرجت ALAB</code>`);
}
