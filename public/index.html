// в”Җв”Җ ШӘЩҮЩҠШҰШ© Firebase Щ…Ш№ Ш§ЩҶШӘШёШ§Шұ Ш¬Ш§ЩҮШІЩҠШ© Ш§Щ„ЩҖ SDK
function _initFirebase() {
  try {
    if(typeof firebase === 'undefined' || typeof firebase.firestore === 'undefined') {
      // Щ„Щ… ЩҠШӘШӯЩ…Щ„ ШЁШ№ШҜ вҖ” ШЈШ№ШҜ Ш§Щ„Щ…ШӯШ§ЩҲЩ„Ш© ШЁШ№ШҜ 500ms
      setTimeout(_initFirebase, 500);
      return;
    }
    firebase.initializeApp({
      apiKey:            'AIzaSyDYyLS0faQLRV8Oqu1tdIXmJhtfklCHt7M',
      authDomain:        'trader-pro-e8b9b.firebaseapp.com',
      projectId:         'trader-pro-e8b9b',
      storageBucket:     'trader-pro-e8b9b.firebasestorage.app',
      messagingSenderId: '496012362495',
      appId:             '1:496012362495:web:4a1fed67ee8c994d0802ca',
    });
    const _DB      = firebase.firestore();
    const _USER_ID = 'default';

    window._fbSavePortfolio = async function(portfolio) {
      try {
        await _DB.collection('users').doc(_USER_ID)
                 .collection('data').doc('portfolio')
                 .set({ trades: portfolio, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        console.log('[FB] portfolio saved вң…', portfolio.length);
      } catch(e) { console.warn('[FB] savePortfolio:', e.message); }
    };

    window._fbLoadPortfolio = async function() {
      try {
        const snap = await _DB.collection('users').doc(_USER_ID)
                              .collection('data').doc('portfolio').get();
        return snap.exists ? (snap.data().trades || []) : [];
      } catch(e) { console.warn('[FB] loadPortfolio:', e.message); return []; }
    };

    window._fbSaveHistory = async function(history) {
      try {
        await _DB.collection('users').doc(_USER_ID)
                 .collection('data').doc('rec_history')
                 .set({ records: history.slice(-500), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        console.log('[FB] history saved вң…', history.length);
      } catch(e) { console.warn('[FB] saveHistory:', e.message); }
    };

    window._fbLoadHistory = async function() {
      try {
        const snap = await _DB.collection('users').doc(_USER_ID)
                              .collection('data').doc('rec_history').get();
        return snap.exists ? (snap.data().records || []) : [];
      } catch(e) { console.warn('[FB] loadHistory:', e.message); return []; }
    };

    window._fbSync = async function() {
      try {
        // вң… Ш§Щ„ШіШӯШ§ШЁШ© Щ„Щ„ШіШ¬Щ„ ЩҒЩӮШ· вҖ” Ш§Щ„Щ…ШӯЩҒШёШ© Щ…ШӯЩ„ЩҠШ©
        const history = await window._fbLoadHistory();
        if(history.length) localStorage.setItem('rec_history', JSON.stringify(history));
        console.log('[FB] sync вң… history='+history.length);
      } catch(e) { console.warn('[FB] sync error:', e.message); }
    };

    // вң… Firebase Ш¬Ш§ЩҮШІ ЩҒШ№Щ„Ш§ЩӢ
    window._fbReady = true;
    console.log('[FB] Firebase Ш¬Ш§ЩҮШІ вң…');

  } catch(e) {
    console.warn('[FB] init error:', e.message);
  }
}
_initFirebase();

<script>
// ШӘШұЩҠШҜШұ ШЁШұЩҲ X вҖ” v15
// ================================================================
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ CONFIG в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// ================================================================
const API_KEY   = '9FDbZgjuTfNCiuOoTlUR4jweViwYAZiG';
const USD_RATE  = 3.75;
// ЩҶШіШӘШ®ШҜЩ… Ш§Щ„ЩҖ proxy Ш§Щ„Щ…ЩҲШ¬ЩҲШҜ /api/stocks Щ„Щ„ШЈШіШ№Ш§Шұ
// ЩҲFMP Щ…ШЁШ§ШҙШұШ© Щ„Щ„Щ…ШӨШҙШұШ§ШӘ Ш§Щ„ШӘЩӮЩҶЩҠШ© (ШӘШҜШ№Щ… CORS)
const FMP_BASE  = 'https://financialmodelingprep.com';

// ЩҲЩӮШӘ Ш§Щ„ШіЩҲЩӮ Ш§Щ„ШЈЩ…ШұЩҠЩғЩҠ ШЁШ§Щ„ШҜЩӮШ§ШҰЩӮ Щ…ЩҶ Щ…ЩҶШӘШөЩҒ Ш§Щ„Щ„ЩҠЩ„ UTC
function getMarketTimes() {
  const now = new Date();
  const isSummer = (() => {
    const y = now.getUTCFullYear();
    const start = new Date(Date.UTC(y,2,8)); start.setUTCDate(8-(start.getUTCDay()||7)+7);
    const end   = new Date(Date.UTC(y,10,1)); end.setUTCDate(1+(7-end.getUTCDay())%7);
    return now >= start && now < end;
  })();
  return {
    // Pre-Market: 4:00Шө - 4:30Щ… ШіШ№ЩҲШҜЩҠ (ШөЩҠЩҒ: UTC 01:00-13:30)
    preOpen:  isSummer ? 60   : 120,   // 4:00Шө  / 5:00Шө  ШіШ№ЩҲШҜЩҠ
    open:     isSummer ? 810  : 870,   // 4:30Щ…  / 5:30Щ…  ШіШ№ЩҲШҜЩҠ
    close:    isSummer ? 1200 : 1260,  // 11:00Щ… / 12:00Шө ШіШ№ЩҲШҜЩҠ
    // After Hours: 11:00Щ… - 1:00Шө ШіШ№ЩҲШҜЩҠ (ШөЩҠЩҒ: UTC 20:00-22:00)
    afterEnd: isSummer ? 1320 : 1380,  // 1:00Шө  / 2:00Шө  ШіШ№ЩҲШҜЩҠ
    midDay:   isSummer ? 960  : 1020,  // 7:00Щ…  / 8:00Щ…  ШіШ№ЩҲШҜЩҠ
    isSummer,
  };
}

function getNowMins() {
  const now = new Date();
  return now.getUTCHours()*60 + now.getUTCMinutes();
}

// в”Җв”Җ ШӯШ§Щ„Ш© Ш§Щ„ШіЩҲЩӮ Ш§Щ„ШЈШұШЁШ№
function getMarketSession() {
  if(window.DEBUG_MARKET) return 'open';
  const t   = getMarketTimes();
  const m   = getNowMins();
  const now = new Date();

  // вң… ЩҒШӯШө ЩҶЩҮШ§ЩҠШ© Ш§Щ„ШЈШіШЁЩҲШ№
  const day = now.getDay(); // 0=ШЈШӯШҜШҢ 6=ШіШЁШӘ
  if(day === 0 || day === 6) return 'closed';

  // вң… Ш§Щ„Ш№Ш·Щ„Ш§ШӘ Ш§Щ„ШұШіЩ…ЩҠШ© Ш§Щ„ШЈЩ…ШұЩҠЩғЩҠШ© (NYSE)
  const month = now.getMonth()+1;
  const date  = now.getDate();
  const year  = now.getFullYear();
  const holidays = [
    `1/1`,   // ШұШЈШі Ш§Щ„ШіЩҶШ©
    `6/19`,  // Juneteenth
    `7/4`,   // ЩҠЩҲЩ… Ш§Щ„Ш§ШіШӘЩӮЩ„Ш§Щ„
    `12/25`, // Ш№ЩҠШҜ Ш§Щ„Щ…ЩҠЩ„Ш§ШҜ
  ];
  if(holidays.includes(`${month}/${date}`)) return 'closed';
  // MLK Day вҖ” Ш«Ш§Щ„Ш« Ш§Ш«ЩҶЩҠЩҶ ЩҠЩҶШ§ЩҠШұ
  if(month===1 && day===1 && date>=15 && date<=21) return 'closed';
  // Presidents Day вҖ” Ш«Ш§Щ„Ш« Ш§Ш«ЩҶЩҠЩҶ ЩҒШЁШұШ§ЩҠШұ
  if(month===2 && day===1 && date>=15 && date<=21) return 'closed';
  // ЩҠЩҲЩ… Ш§Щ„Ш°Ш§ЩғШұШ© вҖ” ШўШ®Шұ Ш§Ш«ЩҶЩҠЩҶ Щ…Ш§ЩҠЩҲ
  if(month===5 && day===1 && date>=25) return 'closed';
  // Ш№ЩҠШҜ Ш§Щ„Ш№Щ…Ш§Щ„ вҖ” ШЈЩҲЩ„ Ш§Ш«ЩҶЩҠЩҶ ШіШЁШӘЩ…ШЁШұ
  if(month===9 && day===1 && date<=7) return 'closed';
  // Ш№ЩҠШҜ Ш§Щ„ШҙЩғШұ вҖ” ШұШ§ШЁШ№ Ш®Щ…ЩҠШі ЩҶЩҲЩҒЩ…ШЁШұ
  if(month===11 && day===4 && date>=22 && date<=28) return 'closed';
  // Ш§Щ„Ш¬Щ…Ш№Ш© Ш§Щ„ШіЩҲШҜШ§ШЎ вҖ” ЩҶШөЩҒ ЩҠЩҲЩ…
  if(month===11 && day===5 && date>=23 && date<=29) return 'short';
  // Ш№ЩҠШҜ Ш§Щ„Щ…ЩҠЩ„Ш§ШҜ ШҘШ°Ш§ Ш§Щ„ШЈШӯШҜ вҶ’ Ш§Щ„Ш§Ш«ЩҶЩҠЩҶ ШҘШ¬Ш§ШІШ©
  if(month===12 && date===26 && day===1) return 'closed';
  // ШұШЈШі Ш§Щ„ШіЩҶШ© ШҘШ°Ш§ Ш§Щ„ШЈШӯШҜ вҶ’ Ш§Щ„Ш§Ш«ЩҶЩҠЩҶ ШҘШ¬Ш§ШІШ©
  if(month===1 && date===2 && day===1 && now.getDay()===1) return 'closed';

  // Ш§Щ„ШіЩҲЩӮ Щ…ЩҒШӘЩҲШӯ
  if(m >= t.open && m < t.close) return 'open';

  // Pre-Market (ШөШЁШ§ШӯШ§ЩӢ ЩӮШЁЩ„ Ш§Щ„ЩҒШӘШӯ)
  if(m >= t.preOpen && m < t.open) return 'pre';

  // After Hours вҖ” ЩҶШӘШ№Ш§Щ…Щ„ Щ…Ш№ Щ…ЩҶШӘШөЩҒ Ш§Щ„Щ„ЩҠЩ„
  // afterEnd ЩӮШҜ ЩҠШӘШ¬Ш§ЩҲШІ 1440 (24 ШіШ§Ш№Ш©) ЩҒЩҠ Ш§Щ„ШҙШӘШ§ШЎ
  if(t.afterEnd <= 1440) {
    // Щ„Ш§ ЩҠШӘШ¬Ш§ЩҲШІ Щ…ЩҶШӘШөЩҒ Ш§Щ„Щ„ЩҠЩ„ вҖ” ШҙЩҠЩғ Ш№Ш§ШҜЩҠ
    if(m >= t.close && m < t.afterEnd) return 'after';
  } else {
    // ЩҠШӘШ¬Ш§ЩҲШІ Щ…ЩҶШӘШөЩҒ Ш§Щ„Щ„ЩҠЩ„ вҖ” ЩҶШҙЩҠЩғ Ш№Щ„Щү Ш¬ШІШҰЩҠЩҶ
    const afterEndAdj = t.afterEnd - 1440; // Ш§Щ„ЩҲЩӮШӘ ШЁШ№ШҜ Щ…ЩҶШӘШөЩҒ Ш§Щ„Щ„ЩҠЩ„
    if(m >= t.close || m < afterEndAdj) return 'after';
  }

  return 'closed';
}

function isMarketOpen() {
  return getMarketSession() === 'open';
}

// в”Җв”Җ Щ…Ш№Щ„ЩҲЩ…Ш§ШӘ ШӯШ§Щ„Ш© Ш§Щ„ШіЩҲЩӮ Щ„Щ„Ш№ШұШ¶
function getSessionInfo() {
  const session = getMarketSession();
  const t = getMarketTimes();
  const tz = t.isSummer ? 'ШөЩҠЩҒ' : 'ШҙШӘШ§ШЎ';
  switch(session) {
    case 'open':
      return {
        label:  'Ш§Щ„ШіЩҲЩӮ Щ…ЩҒШӘЩҲШӯ',
        sub:    `4:30Щ… - 11:00Щ… ${tz}`,
        color:  '#00ff88',
        dot:    true,
        canRec: true,   // ЩҠЩ…ЩғЩҶ Ш§Щ„ШӘЩҲШөЩҠШ©
      };
    case 'closed': {
      const m = getNowMins();
      const day = new Date().getDay();
      const isWeekend = day === 0 || day === 6;
      let closedSub;
      if (isWeekend) {
        closedSub = 'Ш№Ш·Щ„Ш© ШЈШіШЁЩҲШ№ЩҠШ©';
      } else if (m >= t.close) {
        // ШЁШ№ШҜ ШҘШәЩ„Ш§ЩӮ Ш§Щ„ШіЩҲЩӮ (11:00Щ… ЩҒЩ…Ш§ ЩҒЩҲЩӮ)
        closedSub = `ЩҠЩҒШӘШӯ ${t.isSummer?'4:30Щ…':'5:30Щ…'} ${tz}`;
      } else if (m < t.preOpen) {
        // ШЁШ№ШҜ Щ…ЩҶШӘШөЩҒ Ш§Щ„Щ„ЩҠЩ„ ЩҲЩӮШЁЩ„ Pre-Market
        closedSub = `ЩҠЩҒШӘШӯ ${t.isSummer?'4:30Щ…':'5:30Щ…'} ${tz}`;
      } else {
        // Ш№Ш·Щ„Ш© ШұШіЩ…ЩҠШ©
        closedSub = 'Ш№Ш·Щ„Ш© ШұШіЩ…ЩҠШ© вҖ” Ш§Щ„ШіЩҲЩӮ Щ…ШәЩ„ЩӮ Ш§Щ„ЩҠЩҲЩ…';
      }
      return {
        label:  'Ш§Щ„ШіЩҲЩӮ Щ…ШәЩ„ЩӮ',
        sub:    closedSub,
        color:  '#ff2d7a',
        dot:    false,
        canRec: false,
      };
    }
    case 'pre':
      return {
        label:  'Щ…Ш§ ЩӮШЁЩ„ Ш§Щ„Ш§ЩҒШӘШӘШ§Шӯ',
        sub:    `ЩҠЩҒШӘШӯ ${t.isSummer?'4:30Щ…':'5:30Щ…'} ${tz}`,
        color:  '#ffe033',
        dot:    false,
        canRec: false,
      };
    case 'short':
      return {
        label:  'Ш§Щ„ШіЩҲЩӮ вҖ” ЩҶШөЩҒ ЩҠЩҲЩ…',
        sub:    'Juneteenth / Black Friday',
        color:  '#ffa500',
        dot:    true,
        canRec: true,
      };
    case 'after':
      return {
        label:  'ШЁШ№ШҜ Ш§Щ„ШҘШәЩ„Ш§ЩӮ',
        sub:    `ЩҠЩҶШӘЩҮЩҠ ${t.isSummer?'1:00Шө':'2:00Шө'} ${tz}`,
        color:  '#ff7a00',
        dot:    false,
        canRec: false,
      };
    default:
      return {
        label:  'Ш§Щ„ШіЩҲЩӮ Щ…ШәЩ„ЩӮ',
        sub:    `ЩҠЩҒШӘШӯ ${t.isSummer?'4:30Щ…':'5:30Щ…'} ${tz}`,
        color:  '#7888aa',
        dot:    false,
        canRec: false,
      };
  }
}

// ================================================================
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ STOCKS в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// ================================================================
const STOCKS = [
  // рҹӨ– ШӘЩғЩҶЩҲЩ„ЩҲШ¬ЩҠШ§ / AI
  {id:"AAPL",  name:"Apple",         sector:"ШӘЩғЩҶЩҲЩ„ЩҲШ¬ЩҠШ§",       cat:"large",  beta:1.1},
  {id:"NVDA",  name:"Nvidia",        sector:"AI/ШҙШұШ§ШҰШӯ",        cat:"large",  beta:1.9},
  {id:"MSFT",  name:"Microsoft",     sector:"ШӘЩғЩҶЩҲЩ„ЩҲШ¬ЩҠШ§",       cat:"large",  beta:1.0},
  {id:"GOOGL", name:"Alphabet",      sector:"ШӘЩғЩҶЩҲЩ„ЩҲШ¬ЩҠШ§",       cat:"large",  beta:1.1},

const $ = id => document.getElementById(id);
const app = () => $('app');

function el(tag, props={}, children=[]) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => {
    if(k==='style' && typeof v==='object') Object.assign(e.style, v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  (Array.isArray(children)?children:[children]).forEach(c => {
    if(c===null||c===undefined||c===false) return;
    e.appendChild(typeof c==='string'||typeof c==='number'
      ? document.createTextNode(c) : c);
  });
  return e;
}

function txt(t, style={}) {
  return el('span', {style}, [String(t??'')]);
}

function fmt(n, d=2) {
  if(n===null||n===undefined||isNaN(n)) return 'вҖ”';
  return Number(n).toFixed(d);
}

function fmtPrice(n) {
  if(!n) return 'вҖ”';
  return '$'+Number(n).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
}

// в”Җв”Җ 0. Ш§ШӘШ¬Ш§ЩҮ Ш§Щ„ШіЩҲЩӮ Ш§Щ„Ш№Ш§Щ… (SPY + QQQ)
async function fetchMarketTrend() {
  try {
    const fetchOne = async (sym) => {
      // ЩҶШ¬ШұШЁ stable Ш«Щ… v3
      for(const url of [
        `${FMP_BASE}/stable/quote?symbol=${sym}&apikey=${API_KEY}`,
        `${FMP_BASE}/api/v3/quote/${sym}?apikey=${API_KEY}`,
      ]) {
        try {
          const res  = await fetch(url);
          const data = await res.json();
          const item = Array.isArray(data) ? data[0] : data;
          const chg  = parseFloat(item?.changePercentage ?? item?.changesPercentage ?? item?.change ?? NaN);
          if(!isNaN(chg)) return chg;
        } catch(e) { continue; }
      }
      return null;
    };

    const [spy, qqq] = await Promise.all([fetchOne('SPY'), fetchOne('QQQ')]);

    if(spy !== null) state.spyChange = spy;
    if(qqq !== null) state.qqqChange = qqq;

    if(state.spyChange !== null && state.qqqChange !== null) {
      const avg = (state.spyChange + state.qqqChange) / 2;
      // ЩҮШ§ШЁШ· ШӯЩӮЩҠЩӮЩҠ: Щ…ШӘЩҲШіШ· ШЈЩӮЩ„ Щ…ЩҶ -1.5% (ШӘШөШӯЩҠШӯ ЩӮЩҲЩҠ)
      // ШөШ§Ш№ШҜ: Щ…ШӘЩҲШіШ· ШЈЩғШ«Шұ Щ…ЩҶ +0.3%
      // Щ…ШӯШ§ЩҠШҜ: ШЁЩҠЩҶЩҮЩ…Ш§ (ШӘШ°ШЁШ°ШЁ Ш·ШЁЩҠШ№ЩҠ)
      state.marketTrend =
        avg >= 0.3  ? 'bullish'  :
        avg <= -1.5 ? 'bearish'  :
                      'neutral';
      console.log('[Market] SPY:'+state.spyChange+'% QQQ:'+state.qqqChange+'% avg:'+avg.toFixed(2)+'% вҶ’ '+state.marketTrend);
    }
  } catch(e) { console.warn('[Market] error:', e.message); }
}


async function fetchPrices() {
  state.loadingPrices = true;
  state.dataCheck.prices.total = ALL_STOCKS.length;
  state._priceError = null;

  // в”Җв”Җ ШӘЩҶШёЩҠЩҒ cache Ш§Щ„ЩӮШҜЩҠЩ… ШҘШ°Ш§ ШӘШәЩҠШұ Ш№ШҜШҜ Ш§Щ„ШЈШіЩҮЩ…
  try {
    const cachedKeys = Object.keys(state.prices);
    const currentIds = new Set(ALL_STOCKS.map(s => s.id));
    cachedKeys.forEach(k => { if (!currentIds.has(k)) delete state.prices[k]; });
  } catch(e) {}

  const symbols = ALL_STOCKS.map(s=>s.id);
  const BATCH   = 50;
  let proxyOk   = false;
  let fmpOk     = false;

  function storeProxy(q) {
    const price = parseFloat(q.regularMarketPrice);
    if(!q.symbol || !(price > 0)) return false;
    state.prices[q.symbol] = {
      price, isReal: true,
      change:    parseFloat(q.regularMarketChangePercent || 0),
      high:      parseFloat(q.regularMarketDayHigh  || price*1.01),
      low:       parseFloat(q.regularMarketDayLow   || price*0.99),
      volume:    parseInt(q.regularMarketVolume  || 0),
      avgVolume: parseInt(q.avgVolume || q.regularMarketVolume || 0),
    };
    return true;
  }

  function storeFMP(q) {
    const price = parseFloat(q.price);
    if(!q.symbol || !(price > 0)) return false;
    state.prices[q.symbol] = {
      price, isReal: true,
      change:    parseFloat(q.changePercentage ?? q.changesPercentage ?? q.change ?? 0),
      high:      parseFloat(q.dayHigh  ?? q.high  ?? price*1.01),
      low:       parseFloat(q.dayLow   ?? q.low   ?? price*0.99),
      volume:    parseInt(q.volume    ?? 0),
      // avgVolume Щ…ЩҶ quote Щ…ШЁШ§ШҙШұШ© вҖ” ШЈШіШұШ№ ЩҲШЈЩғШ«Шұ Щ…ЩҲШ«ЩҲЩӮЩҠШ© Щ…ЩҶ profiles
      avgVolume: parseInt(q.avgVolume ?? q.averageVolume ?? q.volume ?? 0),
    };
    return true;
  }

  // в”Җв”Җ Щ…ШӯШ§ЩҲЩ„Ш© 1: Ш§Щ„ЩҖ proxy /api/stocks
  const proxyErrors = [];
  for(let i=0; i<symbols.length; i+=BATCH) {
    const batch = symbols.slice(i, i+BATCH).join(',');
    try {
      // Щ„Ш§ ЩҶШіШӘШ®ШҜЩ… AbortSignal Щ…Ш№ Ш§Щ„ЩҖ Proxy вҖ” Щ„Ш§ ЩҠШҜШ№Щ…ЩҮ Vercel Edge
      const res = await fetch('/api/stocks?symbols='+batch);
      if(!res.ok) {
        const txt = await res.text().catch(()=>'');
        proxyErrors.push('HTTP '+res.status+': '+txt.slice(0,80));
        continue;
      }
      // ШӘШӯЩӮЩӮ ШҘЩҶ Ш§Щ„ШұШҜ Щ…Шҙ HTML (404 page Щ…ЩҶ Vercel)
      const contentType = res.headers.get('content-type')||'';
      if(contentType.includes('text/html')) {
        proxyErrors.push('Proxy returned HTML вҖ” skipping');
        break;
      }
      const json = await res.json().catch(() => null);
      if(!json) { proxyErrors.push('Proxy JSON parse failed'); continue; }
      const data = json?.quoteResponse?.result || [];
      let got = 0;
      data.forEach(q => { if(storeProxy(q)) { proxyOk = true; got++; } });
      console.log('[Proxy] batch '+(i/BATCH+1)+': '+got+'/'+data.length);
      if(proxyOk) {
        state.dataCheck.prices.real = ALL_STOCKS.filter(s => state.prices[s.id]?.isReal).length;
        render();
      }
    } catch(e) { proxyErrors.push(e.message||'network'); console.warn('[Proxy] err:', e.message); }
  }

  // в”Җв”Җ Щ…ШӯШ§ЩҲЩ„Ш© 2: FMP v3 quote (Premium вҖ” Ш§Щ„ШЈЩғШ«Шұ Щ…ЩҲШ«ЩҲЩӮЩҠШ©)
  // ЩҶЩ…Щ„ШЈ Ш§Щ„ЩҒШұШ§ШәШ§ШӘ ШҜШ§ШҰЩ…Ш§ЩӢ ШЈЩҲ ЩҶЩҸШ№ЩҠШҜ ЩғЩ„ ШҙЩҠШЎ ШҘШ°Ш§ ЩҒШҙЩ„ Proxy
  const missing  = symbols.filter(s => !state.prices[s]?.isReal);
  const toFetch  = missing.length > 0 ? missing : (!proxyOk ? symbols : []);
  const fmpErrors = [];

  for(let i=0; i<toFetch.length; i+=BATCH) {
    const batch = toFetch.slice(i, i+BATCH).join(',');
    try {
      const ctrl  = new AbortController();
      const timer = setTimeout(()=>ctrl.abort(), 10000);
      // Premium: ЩҶШ¬ШұШЁ stable ШЈЩҲЩ„Ш§ЩӢ Ш«Щ… v3
      let data = null;
      for(const base of [
        `${FMP_BASE}/stable/quote?symbol=${batch}&apikey=${API_KEY}`,
        `${FMP_BASE}/api/v3/quote/${batch}?apikey=${API_KEY}`,
      ]) {
        const r = await fetch(base, {signal:ctrl.signal}).catch(()=>null);
        if(!r || !r.ok) continue;
        const d = await r.json().catch(()=>null);
        if(Array.isArray(d) && d.length > 0) { data = d; break; }
      }
      clearTimeout(timer);
      if(!data) { fmpErrors.push('no data'); continue; }
      let got = 0;
      data.forEach(q => { if(storeFMP(q)) { fmpOk = true; got++; } });
      console.log('[FMP] batch '+(i/BATCH+1)+': '+got+'/'+data.length);
      if(fmpOk) {
        state.dataCheck.prices.real = ALL_STOCKS.filter(s => state.prices[s.id]?.isReal).length;
        render();
      }
    } catch(e) { fmpErrors.push(e.message||'network'); console.warn('[FMP] err:', e.message); }
  }

  const gotData = proxyOk || fmpOk;

  // в”Җв”Җ Щ…ШӯШ§ЩҲЩ„Ш© 3: cache
  if(!gotData) {
    try {
      const cached = localStorage.getItem('cached_prices');
      const time   = localStorage.getItem('cached_prices_time');
      if(cached && time) {
        const ageHours = (Date.now()-new Date(time))/36e5;
        const cd = JSON.parse(cached);
        // ШҘШ°Ш§ Cache ШЈЩӮЩ„ Щ…ЩҶ 8 ШіШ§Ш№Ш§ШӘ вҶ’ isReal:true (ШЁЩҠШ§ЩҶШ§ШӘ Ш§Щ„ЩҠЩҲЩ…)
        // ШҘШ°Ш§ ШЈЩӮЩ„ Щ…ЩҶ 48 ШіШ§Ш№Ш© вҶ’ isReal:false (fallback)
        const isFresh = ageHours < 8;
        Object.keys(cd).forEach(sym => {
          if(!state.prices[sym]) state.prices[sym] = {...cd[sym], isReal: isFresh ? cd[sym].isReal : false};
        });
        console.log('[Cache] ШӘЩ… Ш§ШіШӘШұШ¬Ш§Ш№ Ш§Щ„ШЈШіШ№Ш§ШұШҢ Ш№Щ…Шұ Ш§Щ„ЩҖ cache:', ageHours.toFixed(1)+'hШҢ isReal:', isFresh);
      }
    } catch(e) {}
    if(proxyErrors.length || fmpErrors.length) {
      state._priceError = 'proxy: '+proxyErrors[0]+' | fmp: '+fmpErrors[0];
      console.error('[Prices] ЩҒШҙЩ„ ЩғЩ„ЩҠ:', state._priceError);
    }
  }

  if(gotData) {
    try {
      localStorage.setItem('cached_prices', JSON.stringify(state.prices));
      localStorage.setItem('cached_prices_time', new Date().toISOString());
    } catch(e) {}
  }

  state.dataCheck.prices.real = ALL_STOCKS.filter(s => state.prices[s.id]?.price > 0 && state.prices[s.id]?.isReal).length;
  state.loadingPrices = false;
  console.log('[Prices] Ш§Щ„ЩҶШӘЩҠШ¬Ш©: '+state.dataCheck.prices.real+'/'+state.dataCheck.prices.total+' | proxy:'+proxyOk+' fmp:'+fmpOk);
}

// в”Җв”Җ 2. Щ…ШӨШҙШұШ§ШӘ ШӘЩӮЩҶЩҠШ© (3 Ш·Щ„ШЁШ§ШӘ/ШіЩҮЩ…ШҢ ШҜЩҒШ№Ш§ШӘ 8)
// в”Җв”Җ ШҜЩҲШ§Щ„ Ш§Щ„Щ…ШӨШҙШұШ§ШӘ вҖ” Щ…Ш№ШұЩ‘ЩҒШ© Ш№Ш§Щ„Щ…ЩҠШ§ЩӢ Щ„ШӘШ¬ЩҶШЁ ШҘШ№Ш§ШҜШ© Ш§Щ„ШҘЩҶШҙШ§ШЎ ЩҒЩҠ ЩғЩ„ ШіЩҮЩ…

function calcEMA(data, period) {
  if(!data || data.length < period) return null;
  const k = 2/(period+1);
  let val = data.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let j=period; j<data.length; j++) val = data[j]*k + val*(1-k);
  return val;
}

function calcADX(highs, lows, closes, period=14) {
  if(!highs || !lows || !closes) return null;
  if(highs.length < period*2) return null;
  const n = highs.length;
  const trs=[], pdms=[], ndms=[];
  for(let i=1; i<n; i++) {
    const tr  = Math.max(highs[i]-lows[i], Math.abs(highs[i]-closes[i-1]), Math.abs(lows[i]-closes[i-1]));
    const pdm = Math.max(highs[i]-highs[i-1], 0);
    const ndm = Math.max(lows[i-1]-lows[i], 0);
    trs.push(tr);
    pdms.push(pdm > ndm ? pdm : 0);
    ndms.push(ndm > pdm ? ndm : 0);
  }
  const smooth = (arr) => {
    let s = arr.slice(0, period).reduce((a,b)=>a+b,0);
    const out = [s];
    for(let i=period; i<arr.length; i++) { s = s - s/period + arr[i]; out.push(s); }
    return out;
  };
  const sTR = smooth(trs), sPDM = smooth(pdms), sNDM = smooth(ndms);
  const dxArr = [];
  for(let i=0; i<sTR.length; i++) {
    if(sTR[i] === 0) continue;
    const pdi = 100 * sPDM[i] / sTR[i];
    const ndi = 100 * sNDM[i] / sTR[i];
    const dx  = Math.abs(pdi-ndi) / (pdi+ndi) * 100;
    dxArr.push(dx);
  }
  if(dxArr.length < period) return null;
  let adx = dxArr.slice(0, period).reduce((a,b)=>a+b,0) / period;
  for(let i=period; i<dxArr.length; i++) adx = (adx*(period-1) + dxArr[i]) / period;
  return +adx.toFixed(1);
}

async function fetchIndicators() {
  state.loadingIndicators = true;
  state.indicators = {};
  console.log('[Indicators] ШЁШҜШЎ ШӘШӯЩ…ЩҠЩ„ Ш§Щ„Щ…ШӨШҙШұШ§ШӘ...');

  const INDICATOR_STOCKS = ALL_STOCKS.map(s=>s.id); // вң… ЩғЩ„ Ш§Щ„ЩҖ 127 ШіЩҮЩ…

  let dc = state.dataCheck;
  dc.rsi.total = dc.macd.total = dc.ma.total = dc.ma200.total =
  dc.support.total = dc.atr.total = dc.bb.total = INDICATOR_STOCKS.length;

  const BATCH = 7; // вң… ШұЩҸЩҒШ№ Щ…ЩҶ 5 вҶ’ 7 (750 Ш·Щ„ШЁ/ШҜЩӮЩҠЩӮШ© Ш§Щ„ШӯШҜШҢ ЩҶШіШӘШ®ШҜЩ… ~490)

  try {
  for(let i=0; i<INDICATOR_STOCKS.length; i+=BATCH) {
    const batch = INDICATOR_STOCKS.slice(i, i+BATCH);

    await Promise.all(batch.map(async sym => {
      try {
        // ШЁЩҠШ§ЩҶШ§ШӘ ШӘШ§ШұЩҠШ®ЩҠШ© 300 ЩҠЩҲЩ… вҖ” Щ„Ш¶Щ…Ш§ЩҶ Ш§Щ„Щ…ШӨШҙШұШ§ШӘ Ш§Щ„ШЈШіШЁЩҲШ№ЩҠШ© (MA50 ШЈШіШЁЩҲШ№ЩҠ ЩҠШӯШӘШ§Ш¬ 250+ ЩҠЩҲЩ…)
        let closes = [], highs = [], lows = [], opens = [];
        const endpoints = [
          // 1. Ш§Щ„ЩҖ stable endpoint Ш§Щ„Ш¬ШҜЩҠШҜ (Ш§Щ„ШЈЩҒШ¶Щ„ ЩҒЩҠ Premium)
          `${FMP_BASE}/stable/historical-price-eod/full?symbol=${sym}&limit=300&apikey=${API_KEY}`,
          // 2. v3 Ш§Щ„ЩғЩ„Ш§ШіЩҠЩғЩҠ вҖ” Щ…ШӘШ§Шӯ ЩҒЩҠ Premium ШҜШ§ШҰЩ…Ш§ЩӢ
          `${FMP_BASE}/api/v3/historical-price-full/${sym}?timeseries=300&apikey=${API_KEY}`,
          // 3. v3 ШЁШҜЩҲЩҶ timeseries вҖ” fallback ШЈШ®ЩҠШұ
          `${FMP_BASE}/api/v3/historical-price-full/${sym}?apikey=${API_KEY}`,
        ];
        for(const url of endpoints) {
          try {
            const ctrl2 = new AbortController();
            const t2    = setTimeout(()=>ctrl2.abort(), 8000);
            const r     = await fetch(url, {signal:ctrl2.signal});
            clearTimeout(t2);
            if(!r.ok) continue;
            const d    = await r.json();
            const hist = d?.historical || (Array.isArray(d) ? d : []);
            if(hist.length >= 20) {
              const validHist = hist.filter(h => (+h.adjClose||+h.close) && +h.high && +h.low && +h.open);
              // ЩҶШӯЩҒШё ЩҒЩӮШ· ШҘШ°Ш§ Ш§Щ„ШЁЩҠШ§ЩҶШ§ШӘ Ш§Щ„Ш¬ШҜЩҠШҜШ© ШЈЩҒШ¶Щ„ Щ…ЩҶ Ш§Щ„Щ…ЩҲШ¬ЩҲШҜШ©
              if(validHist.length > closes.length) {
                closes  = validHist.map(h=>+(h.adjClose||h.close)).reverse();
                highs   = validHist.map(h=>+h.high).reverse();
                lows    = validHist.map(h=>+h.low).reverse();
                opens   = validHist.map(h=>+h.open).reverse();
                // вң… Ш§ШіШӘШ®ШұШ§Ш¬ volumes Щ„ШӯШіШ§ШЁ avgVolume
                const vols = hist.map(h=>+(h.volume||0)).filter(v=>v>0).reverse();
                if(vols.length >= 10 && !state.prices[sym]?.avgVolume) {
                  const avg = Math.round(vols.slice(-20).reduce((a,b)=>a+b,0) / Math.min(vols.length,20));
                  if(avg > 0 && state.prices[sym]) state.prices[sym].avgVolume = avg;
                }
              }
              if(closes.length >= 200) break; // ЩҲШөЩ„ЩҶШ§ Щ„ЩҖ 200 ЩҠЩҲЩ… вҖ” ЩҶЩғШӘЩҒЩҠ
            }
          } catch(e) { continue; }
        }
        if(closes.length < 20) return;

        const cur = state.prices[sym]?.price || closes[closes.length-1] || 0;

        // в”Җв”Җ MA20 (ШҜШ§ШҰЩ…Ш§ЩӢ ШҘШ°Ш§ ШӘЩҲЩҒШұ 20 ЩҠЩҲЩ…)
        const ma20 = closes.length>=20 ? closes.slice(-20).reduce((a,b)=>a+b,0)/20 : null;

        // в”Җв”Җ MA50 (ШҘШ°Ш§ ШӘЩҲЩҒШұ 50 ЩҠЩҲЩ…)
        const ma50 = closes.length>=50 ? closes.slice(-50).reduce((a,b)=>a+b,0)/50 : null;

        // в”Җв”Җ MA200 (ШҘШ°Ш§ ШӘЩҲЩҒШұ 200 ЩҠЩҲЩ… вҖ” Ш§Щ„Ш¬ШҜЩҠШҜ)
        const ma200 = closes.length>=200 ? closes.slice(-200).reduce((a,b)=>a+b,0)/200 : null;

        console.log(`[MA] ${sym}: ЩҠЩҲЩ…=${closes.length} вҶ’ MA20=${ma20!=null?'вң…':'вқҢ'} MA50=${ma50!=null?'вң…':'вқҢ'} MA200=${ma200!=null?'вң…':'вқҢ'}`);

        // в”Җв”Җ RSI (14) вҖ” Wilder's Smoothing Ш§Щ„ШөШӯЩҠШӯ
        let rsi = null;
        if(closes.length >= 15) {
          // Ш§Щ„ШӯШіШ§ШЁ Ш§Щ„ШөШӯЩҠШӯ: Wilder's Smoothed Moving Average
          let gains = [], losses = [];
          for(let j=1; j<closes.length; j++) {
            const d = closes[j]-closes[j-1];
            gains.push(d>0 ? d : 0);
            losses.push(d<0 ? Math.abs(d) : 0);
          }
          // Щ…ШӘЩҲШіШ· ШЈЩҲЩ„ 14
          let ag = gains.slice(0,14).reduce((a,b)=>a+b,0)/14;
          let al = losses.slice(0,14).reduce((a,b)=>a+b,0)/14;
          // Wilder's smoothing Щ„Щ„ШЁШ§ЩӮЩҠ
          for(let j=14; j<gains.length; j++) {
            ag = (ag*13 + gains[j]) / 14;
            al = (al*13 + losses[j]) / 14;
          }
          rsi = al===0 ? 100 : 100-(100/(1+ag/al));
          rsi = Math.min(100, Math.max(0, rsi));
        }

        // в”Җв”Җ MACD (EMA12 - EMA26)
        const adx = calcADX(highs, lows, closes);
        const ema12 = calcEMA(closes, 12);
        const ema26 = calcEMA(closes, 26);
        const macd  = (ema12!=null && ema26!=null) ? ema12-ema26 : null;

        // в”Җв”Җ MACD Signal Line (EMA9 Щ…ЩҶ MACD) + Histogram
        let macdSignal = null, macdHist = null, macdHistDir = null;
        if(closes.length >= 35) {
          // ЩҶШЁЩҶЩҠ Щ…ШөЩҒЩҲЩҒШ© MACD Щ„ШўШ®Шұ 30 ЩҠЩҲЩ…
          const macdArr = [];
          for(let j=35; j<=closes.length; j++) {
            const sl   = closes.slice(0, j);
            const e12  = calcEMA(sl, 12);
            const e26  = calcEMA(sl, 26);
            if(e12!=null && e26!=null) macdArr.push(e12-e26);
          }
          if(macdArr.length >= 9) {
            macdSignal  = calcEMA(macdArr, 9);
            macdHist    = macd!=null && macdSignal!=null ? macd - macdSignal : null;
            // Ш§ШӘШ¬Ш§ЩҮ Ш§Щ„ЩҮЩҠШіШӘЩҲШәШұШ§Щ…: ЩҮЩ„ ЩҠШӘЩҲШіШ№ ШЈЩ… ЩҠШ¶ЩҠЩӮШҹ
            if(macdArr.length >= 10 && macdSignal!=null) {
              const prevMacd   = macdArr[macdArr.length-2];
              const prevSignal = calcEMA(macdArr.slice(0,-1), 9);
              const prevHist   = prevSignal!=null ? prevMacd - prevSignal : null;
              if(prevHist!=null && macdHist!=null) {
                const sameSign = (macdHist >= 0) === (prevHist >= 0);
                if(!sameSign) {
                  macdHistDir = 'crossing';
                } else {
                  const absDelta = Math.abs(macdHist) - Math.abs(prevHist);
                  macdHistDir = absDelta > 0 ? 'expanding' : 'contracting';
                }
              }
            }
          }
        }

        // в”Җв”Җ MACD ШЈШіШЁЩҲШ№ЩҠ (ЩҶШ¬Щ…Ш№ ЩғЩ„ 5 ШЈЩҠШ§Щ… ЩҠЩҲЩ…ЩҠШ© = ШҙЩ…Ш№Ш© ШЈШіШЁЩҲШ№ЩҠШ©)
        let weeklyMacd = null, weeklyMacdHist = null, weeklyTrend = null;
        if(closes.length >= 60) {
          const wCloses = [];
          for(let j=4; j<closes.length; j+=5) {
            wCloses.push(closes[j]); // ШўШ®Шұ ШҘШәЩ„Ш§ЩӮ Щ„ЩғЩ„ ШЈШіШЁЩҲШ№
          }
          if(wCloses.length >= 26) {
            const we12 = calcEMA(wCloses, 12);
            const we26 = calcEMA(wCloses, 26);
            weeklyMacd = (we12!=null && we26!=null) ? we12-we26 : null;
            if(wCloses.length >= 35) {
              const wMacdArr = [];
              for(let j=35; j<=wCloses.length; j++) {
                const wsl = wCloses.slice(0,j);
                const we12j = calcEMA(wsl,12);
                const we26j = calcEMA(wsl,26);
                if(we12j!=null && we26j!=null) wMacdArr.push(we12j-we26j);
              }
              if(wMacdArr.length >= 9) {
                const wSig = calcEMA(wMacdArr, 9);
                weeklyMacdHist = weeklyMacd!=null && wSig!=null ? weeklyMacd-wSig : null;
              }
            }
            // Ш§ШӘШ¬Ш§ЩҮ ШЈШіШЁЩҲШ№ЩҠ: ЩҮЩ„ MA20 ШЈШіШЁЩҲШ№ЩҠ > MA50 ШЈШіШЁЩҲШ№ЩҠШҹ
            if(wCloses.length >= 50) {
              const wma20 = wCloses.slice(-20).reduce((a,b)=>a+b,0)/20;
              const wma50 = wCloses.slice(-50).reduce((a,b)=>a+b,0)/50;
              weeklyTrend = wma20 > wma50 ? 'bullish' : 'bearish';
            }
          }
        }

        // в”Җв”Җ Bollinger Bands (ШӘШӯШӘШ§Ш¬ MA20)
        let bb_upper = null, bb_lower = null;
        if(ma20!=null) {
          const last20 = closes.slice(-20);
          const std = Math.sqrt(last20.reduce((s,p)=>s+Math.pow(p-ma20,2),0)/20);
          bb_upper = ma20 + 2*std;
          bb_lower = ma20 - 2*std;
        }

        // в”Җв”Җ ATR (14) вҖ” True Range Ш§Щ„ШөШӯЩҠШӯ
        let atrPct = null;
        if(highs.length >= 15 && closes.length >= 15) {
          const trs = [];
          const start = Math.max(1, highs.length - 14); // ЩҶШ¶Щ…ЩҶ j >= 1 ШҜШ§ШҰЩ…Ш§ЩӢ
          for(let j=start; j<highs.length; j++) {
            const prev = closes[j-1];
            if(!prev) continue; // ШӯЩ…Ш§ЩҠШ© ШҘШ¶Ш§ЩҒЩҠШ©
            const tr = Math.max(
              highs[j] - lows[j],
              Math.abs(highs[j] - prev),
              Math.abs(lows[j]  - prev)
            );
            trs.push(tr);
          }
          if(trs.length > 0) {
            const atr = trs.reduce((a,b)=>a+b,0) / trs.length;
            atrPct = cur>0 ? (atr/cur)*100 : null;
          }
        }

        // в”Җв”Җ Stochastic RSI вҖ” ЩҠШӯШӘШ§Ш¬ Ш№Щ„Щү Ш§Щ„ШЈЩӮЩ„ 28 ЩҠЩҲЩ… (14 Щ„Щ„ЩҖ RSI + 14 Щ„Щ„ЩҖ Stoch)
        let stochRsi = null;
        if(closes.length >= 28) {
          const rsiArr = [];
          // Ш§ШӯШіШЁ RSI Щ„ЩғЩ„ ЩҶЩӮШ·Ш© ШЁЩҶЩҒШі Ш·ШұЩҠЩӮШ© Wilder's
          for(let j=14; j<closes.length; j++) {
            const slice = closes.slice(0, j+1);
            let g2=[], l2=[];
            for(let k=1; k<slice.length; k++) {
              const d = slice[k]-slice[k-1];
              g2.push(d>0?d:0);
              l2.push(d<0?Math.abs(d):0);
            }
            let ag2 = g2.slice(0,14).reduce((a,b)=>a+b,0)/14;
            let al2 = l2.slice(0,14).reduce((a,b)=>a+b,0)/14;
            for(let k=14; k<g2.length; k++) {
              ag2 = (ag2*13+g2[k])/14;
              al2 = (al2*13+l2[k])/14;
            }
            rsiArr.push(al2===0 ? 100 : 100-(100/(1+ag2/al2)));
          }
          if(rsiArr.length >= 14) {
            const recent = rsiArr.slice(-14);
            const minR = Math.min(...recent), maxR = Math.max(...recent);
            stochRsi = maxR===minR ? 50 : ((rsiArr[rsiArr.length-1]-minR)/(maxR-minR))*100;
            stochRsi = Math.min(100, Math.max(0, stochRsi));
          }
        }

        // в”Җв”Җ ШҜШ№Щ… ЩҲЩ…ЩӮШ§ЩҲЩ…Ш©
        const tolerance = cur * 0.015;
        const levels = [];
        for(let j=1; j<highs.length-1; j++) {
          if(highs[j]>=highs[j-1] && highs[j]>=highs[j+1]) levels.push({price:highs[j], type:'resistance'});
          if(lows[j]<=lows[j-1] && lows[j]<=lows[j+1])   levels.push({price:lows[j],  type:'support'});
        }
        const clusters = [];
        levels.forEach(l => {
          const ex = clusters.find(c => Math.abs(c.price-l.price)<=tolerance);
          if(ex) { ex.touches++; ex.price=(ex.price+l.price)/2; }
          else clusters.push({price:l.price, type:l.type, touches:1});
        });
        const strong = clusters.filter(c=>c.touches>=2);
        const resistance = strong.filter(c=>c.price>cur).sort((a,b)=>a.price-b.price)[0]?.price
          ?? Math.max(...highs.slice(-20));
        const support    = strong.filter(c=>c.price<cur).sort((a,b)=>b.price-a.price)[0]?.price
          ?? Math.min(...lows.slice(-60));  // вҶҗ 60 ЩҠЩҲЩ… Щ„Щ„ЩҖ fallback Щ„ШӘШ¬ЩҶШЁ Ш§Щ„ШіШ№Шұ Ш§Щ„ШӯШ§Щ„ЩҠ
        const nearSupport    = support && cur>support ? cur<=support*1.03 : false;
        const nearResistance = resistance && cur<resistance ? cur>=resistance*0.98 : false;

        // в”Җв”Җ ШӯЩҒШё
        state.indicators[sym] = {
          rsi, ma20, ma50, ma200, macd, macdSignal, macdHist, macdHistDir,
          weeklyMacd, weeklyMacdHist, weeklyTrend,
          bb_upper, bb_lower,
          support, resistance, nearSupport, nearResistance,
          atrPct, stochRsi, adx,
          dataLen: closes.length,
          closes: closes.slice(-30),
          highs:  highs.slice(-30),
          lows:   lows.slice(-30),
          opens:  opens.slice(-30),
        };

        if(rsi!=null)          dc.rsi.real++;
        if(macd!=null)         dc.macd.real++;
        if(ma20!=null && ma50) dc.ma.real++;
        if(ma200!=null)        dc.ma200.real++;
        if(support!=null)      dc.support.real++;
        if(atrPct!=null)       dc.atr.real++;
        if(bb_upper!=null)     dc.bb.real++;

      } catch(e) { console.warn('[Ind]', sym, e.message); }
    }));

    // render ЩғЩ„ 5 ШҜЩҒШ№Ш§ШӘ ЩҒЩӮШ· ШЁШҜЩ„ ЩғЩ„ ШҜЩҒШ№Ш© вҖ” ЩҠЩ…ЩҶШ№ Ш§Щ„ШұЩ…Шҙ
    if(i % (BATCH*5) === 0) render();
    if(i+BATCH < INDICATOR_STOCKS.length) {
      await new Promise(r=>setTimeout(r,800)); // вң… Ш®ЩҸЩҒЩ‘Ш¶ Щ…ЩҶ 1200ms вҶ’ 800ms
    }
  }

  dc.volume.total = ALL_STOCKS.length;
  dc.volume.real  = ALL_STOCKS.filter(s => state.prices[s.id]?.avgVolume > 0).length;
  state.indicatorsTime    = new Date().toISOString();
  try { localStorage.setItem('indicators_time', state.indicatorsTime); } catch(e) {}
  console.log('[Indicators] Ш§ЩғШӘЩ…Щ„: RSI='+dc.rsi.real+'/'+dc.rsi.total+' MACD='+dc.macd.real+' MA='+dc.ma.real);
  } finally {
    // вң… ЩҠШ¶Щ…ЩҶ ШҜШ§ШҰЩ…Ш§ЩӢ ШҘШ№Ш§ШҜШ© Ш§Щ„Ш¶ШЁШ· ШӯШӘЩү Ш№ЩҶШҜ Ш®Ш·ШЈ ШәЩҠШұ Щ…ШӘЩҲЩӮШ№
    state.loadingIndicators = false;
    state.indicatorsDone    = true;
  }
}


// в”Җв”Җ 3. ШЈШ®ШЁШ§Шұ Щ…ШӯШіЩ‘ЩҶШ© вҖ” Ш¬Щ…ЩҠШ№ Ш§Щ„ШЈШіЩҮЩ… Ш№Щ„Щү ШҜЩҒШ№Ш§ШӘ
async function fetchNews() {
  try {
    state.news = {};
    // ЩҶЩӮШіЩ… Ш§Щ„ЩҖ 127 ШіЩҮЩ… Ш№Щ„Щү ШҜЩҒШ№Ш§ШӘ ШЁШҜЩ„ ШЈЩҲЩ„ 30 ЩҒЩӮШ·
    const BATCH = 30;
    for(let i = 0; i < ALL_STOCKS.length; i += BATCH) {
      const batchSyms = ALL_STOCKS.slice(i, i + BATCH).map(s => s.id).join(',');
      try {
        const res  = await fetch(`${FMP_BASE}/stable/news/stock?symbols=${batchSyms}&limit=100&apikey=${API_KEY}`);
        const data = await res.json();
        if(!Array.isArray(data)) continue;

    // в”Җв”Җ ЩғЩ„Щ…Ш§ШӘ ЩҲЩ…ШөШ·Щ„ШӯШ§ШӘ Щ…ШұЩғЩ‘ШЁШ© Щ…Ш№ ШЈЩҲШІШ§ЩҶЩҮШ§
    const NEG_PHRASES = [
      // Ш®Ш·ЩҲШұШ© Ш№Ш§Щ„ЩҠШ© вҖ” ЩҲШІЩҶ 3
      { re:/guidance\s*(cut|lower|reduc|slash)/i,          w:3 },
      { re:/revenue\s*(miss|shortfall|disappoint|decline)/i,w:3 },
      { re:/earnings\s*(miss|below|disappoint)/i,           w:3 },
      { re:/freemium|free\s*tier.*(revenue|impact|risk)/i,  w:3 },
      { re:/price\s*target\s*(cut|lower|reduc|slash)/i,     w:3 },
      { re:/downgrad[ei]/i,                                  w:3 },
      { re:/sec\s*(investigation|probe|lawsuit|charge)/i,   w:3 },
      { re:/accounting\s*(fraud|irregularit|restat)/i,      w:3 },
      { re:/ceo\s*(resign|depart|step\s*down|fired)/i,      w:3 },
      { re:/bankruptcy|chapter\s*11|insolvency/i,           w:3 },
      // Ш®Ш·ЩҲШұШ© Щ…ШӘЩҲШіШ·Ш© вҖ” ЩҲШІЩҶ 2
      { re:/layoff|job\s*cut|workforce\s*reduc/i,           w:2 },
      { re:/slow(ing|down|er)\s*(growth|demand|sales)/i,    w:2 },
      { re:/compet(ition|itor)\s*(threat|pressure|challeng)/i,w:2},
      { re:/ai\s*(disrupt|replac|threaten|obsolet)/i,       w:2 },
      { re:/subscri\w+\s*(declin|slow|churn|cancel)/i,      w:2 },
      { re:/margin\s*(compress|pressure|squeez|declin)/i,   w:2 },
      { re:/debt\s*(concern|problem|issue|downgrad)/i,       w:2 },
      { re:/miss(ed|ing)?\s*(estimate|expectation|forecast)/i,w:2},
      { re:/below\s*(estimate|expectation|forecast|consensus)/i,w:2},
      { re:/weak\s*(outlook|guidance|forecast|demand)/i,    w:2 },
      // Ш®Ш·ЩҲШұШ© Щ…ЩҶШ®ЩҒШ¶Ш© вҖ” ЩҲШІЩҶ 1
      { re:/\b(miss|fall|drop|decline|loss|cut|weak|disappoint)\b/i, w:1 },
      { re:/headwind|challeng|concern|risk|uncertain/i,     w:1 },
      { re:/short\s*sell|bearish/i,                         w:1 },
    ];

    const POS_PHRASES = [
      // ЩӮЩҲШ© Ш№Ш§Щ„ЩҠШ© вҖ” ЩҲШІЩҶ 3
      { re:/earnings?\s*(beat|exceed|surpass|top)/i,        w:3 },
      { re:/revenue\s*(beat|record|surge|exceed)/i,         w:3 },
      { re:/guidance\s*(raise|increas|upgrad|improv)/i,     w:3 },
      { re:/price\s*target\s*(raise|increas|upgrad)/i,      w:3 },
      { re:/buyback|share\s*repurchas/i,                    w:2 },
      { re:/dividend\s*(increas|raise|hike)/i,              w:2 },
      // ЩӮЩҲШ© Щ…ШӘЩҲШіШ·Ш© вҖ” ЩҲШІЩҶ 2
      { re:/strong\s*(demand|growth|result|quarter)/i,      w:2 },
      { re:/beat\s*(estimate|expectation|forecast|consensus)/i,w:2},
      { re:/above\s*(estimate|expectation|forecast)/i,      w:2 },
      { re:/record\s*(revenue|profit|earning|quarter)/i,    w:2 },
      { re:/ai\s*(growth|opportunit|monetiz|revenue)/i,     w:2 },
      { re:/partnership|deal|contract|win/i,                w:1 },
      // ЩӮЩҲШ© Щ…ЩҶШ®ЩҒШ¶Ш© вҖ” ЩҲШІЩҶ 1
      { re:/\b(beat|surge|jump|rally|strong|record|growth|upgrad)\b/i,w:1},
      { re:/bullish|outperform|overweight|buy\s*rating/i,   w:1 },
    ];

    const now = Date.now();

        data.forEach(n => {
          const sym = n.symbol;
          if(!sym) return;
          if(!state.news[sym]) state.news[sym] = {pos:0, neg:0, items:[]};

          const ageHours = (now - new Date(n.publishedDate||n.date||now)) / 36e5;
          const dateW    = ageHours < 24 ? 2 : ageHours < 48 ? 1.5 : ageHours < 96 ? 1 : 0.5;

          const text = ((n.title||'') + ' ' + (n.text||n.summary||n.content||'')).toLowerCase();

          let itemScore = 0;

          NEG_PHRASES.forEach(({re, w}) => {
            if(re.test(text)) itemScore -= w * dateW;
          });

          POS_PHRASES.forEach(({re, w}) => {
            if(re.test(text)) itemScore += w * dateW;
          });

          if(itemScore > 0) state.news[sym].pos += itemScore;
          else if(itemScore < 0) state.news[sym].neg += Math.abs(itemScore);
        });

      } catch(e) { console.warn('[News batch]', e.message); }
      // ШӘШЈШ®ЩҠШұ ШЁЩҠЩҶ Ш§Щ„ШҜЩҒШ№Ш§ШӘ Щ„ШӘШ¬ЩҶШЁ rate limit
      if(i + BATCH < ALL_STOCKS.length) await new Promise(r => setTimeout(r, 500));
    }

    // в”Җв”Җ ШӘШӯЩҲЩҠЩ„ Ш§Щ„ЩҶЩӮШ§Ш· Щ„ШЈШ№ШҜШ§ШҜ ШөШӯЩҠШӯШ©
    Object.keys(state.news).forEach(sym => {
      state.news[sym].pos = Math.round(state.news[sym].pos);
      state.news[sym].neg = Math.round(state.news[sym].neg);
    });

  } catch(e) { console.warn('[News] error:', e.message); }
}

// в”Җв”Җ 4. ШЈШұШЁШ§Шӯ ЩӮШ§ШҜЩ…Ш©
async function fetchEarnings() {
  try {
    const today    = new Date().toISOString().slice(0,10);
    const nextWeek = new Date(Date.now()+14*864e5).toISOString().slice(0,10);
    const res  = await fetch(`${FMP_BASE}/stable/earning-calendar?from=${today}&to=${nextWeek}&apikey=${API_KEY}`);
    const data = await res.json();
    state.earnings = {};
    if(Array.isArray(data)) {
      data.forEach(e => {
        if(!e.symbol) return;
        const days = Math.ceil((new Date(e.date)-new Date())/(864e5));
        if(days>=0 && days<=14) state.earnings[e.symbol] = days;
      });
    }
  } catch(e) {}
}

// в”Җв”Җ 5. Profiles
async function fetchProfiles() {
  const symbols = ALL_STOCKS.map(s=>s.id);
  const BATCH   = 10;

  // в”Җв”Җ ШЈЩҲЩ„Ш§ЩӢ: Profile (ШЁЩҠШ§ЩҶШ§ШӘ ШЈШіШ§ШіЩҠШ©)
  for(let i=0; i<symbols.length; i+=BATCH) {
    const batch = symbols.slice(i, i+BATCH);
    await Promise.all(batch.map(async sym => {
      try {
        const res  = await fetch(`${FMP_BASE}/stable/profile?symbol=${sym}&apikey=${API_KEY}`, { signal: AbortSignal.timeout(6000) });
        const data = await res.json();
        const p = Array.isArray(data) && data[0];
        if(p && p.symbol) {
          state.profiles[p.symbol] = {
            beta:      parseFloat(p.beta||0)||null,
            avgVolume: parseInt(p.avgVolume||0)||null,
            mktCap:    p.mktCap||null,
          };
        }
      } catch(e) {}
    }));
    if(i+BATCH < symbols.length) await new Promise(r=>setTimeout(r,200));
  }

  // в”Җв”Җ Ш«Ш§ЩҶЩҠШ§ЩӢ: Analyst Ratings вҖ” Щ…ШұШ© ЩҲШ§ШӯШҜШ© ЩҠЩҲЩ…ЩҠШ§ЩӢ ЩҒЩӮШ·
  const today         = new Date().toDateString();
  const analystDate   = localStorage.getItem('analyst_date');
  const analystCache  = localStorage.getItem('analyst_ratings');

  if(analystDate === today && analystCache) {
    // Ш§ШіШӘШ®ШҜЩ… Ш§Щ„ЩғШ§Шҙ вҖ” Щ„Ш§ Ш·Щ„ШЁШ§ШӘ ШҘШ¶Ш§ЩҒЩҠШ©
    try { state.analystRatings = JSON.parse(analystCache); } catch(e) {}
    console.log('[Analyst] Щ…ЩҶ Ш§Щ„ЩғШ§Шҙ вң…');
    return;
  }

  // Ш¬Щ„ШЁ Ш¬ШҜЩҠШҜ
  for(let i=0; i<symbols.length; i+=BATCH) {
    const batch = symbols.slice(i, i+BATCH);
    await Promise.all(batch.map(async sym => {
      try {
        const res2  = await fetch(`${FMP_BASE}/stable/ratings-snapshot?symbol=${sym}&apikey=${API_KEY}`, { signal: AbortSignal.timeout(6000) });
        const data2 = await res2.json();
        const r2 = Array.isArray(data2) ? data2[0] : data2;
        if(r2 && r2.ratingRecommendation) {
          state.analystRatings[sym] = {
            rating:   r2.ratingRecommendation || null,
            score:    +r2.ratingScore         || null,
            analysts: +r2.ratingAnalystCount  || 0,
          };
        }
      } catch(e) {}
    }));
    if(i+BATCH < symbols.length) await new Promise(r=>setTimeout(r,200));
  }

  // ШӯЩҒШё ЩҒЩҠ localStorage
  try {
    localStorage.setItem('analyst_date',    today);
    localStorage.setItem('analyst_ratings', JSON.stringify(state.analystRatings));
    console.log('[Analyst] ШӯЩҸЩҒШё ЩҒЩҠ Ш§Щ„ЩғШ§Шҙ вң…');
  } catch(e) {}
}

// в”Җв”Җ Ш¬Щ„ШЁ Price Target Щ„Щ„ШӘЩҲШөЩҠШ§ШӘ ЩҒЩӮШ· (5 ШЈШіЩҮЩ…)
async function fetchPriceTargets(recs) {
  if(!recs || recs.length === 0) return;
  await Promise.all(recs.map(async r => {
    try {
      const res  = await fetch(`${FMP_BASE}/stable/price-target-consensus?symbol=${r.id}&apikey=${API_KEY}`, { signal: AbortSignal.timeout(6000) });
      const data = await res.json();
      const d = Array.isArray(data) ? data[0] : data;
      if(d && d.targetConsensus) {
        state.priceTargets = state.priceTargets || {};
        state.priceTargets[r.id] = {
          consensus: +d.targetConsensus || null,
          high:      +d.targetHigh      || null,
          low:       +d.targetLow       || null,
          median:    +d.targetMedian    || null,
        };
      }
    } catch(e) {}
  }));
}

function calcSignal(stock) {
  const p   = state.prices[stock.id];
  const ind = state.indicators[stock.id];
  const pro = state.profiles[stock.id];
  const news= state.news[stock.id]||{pos:0,neg:0};
  const earn= state.earnings[stock.id]??999;

  // в•җв•җ ШҙШұШ· ШЈШіШ§ШіЩҠ: ЩҠШ¬ШЁ ШЈЩҶ ЩҠЩғЩҲЩҶ Щ„ШҜЩҠЩҶШ§ ШіШ№Шұ (ШӯЩӮЩҠЩӮЩҠ ШЈЩҲ cache) ЩҲЩ…ШӨШҙШұШ§ШӘ
  if(!p || !p.price || !ind) return null;
  // Ш§ШҙШӘШұШ§Ш· isReal ЩҒЩӮШ· ЩҒЩҠ ШЈЩҲЩӮШ§ШӘ Ш§Щ„ШіЩҲЩӮ Ш§Щ„Щ…ЩҒШӘЩҲШӯ
  if(isMarketOpen() && !p.isReal) return null;

  // вң… Ш¬ЩҲШҜШ© Ш§Щ„ШЁЩҠШ§ЩҶШ§ШӘ вҖ” 100 ЩҠЩҲЩ… Щ„Щ„ШӘЩҲШөЩҠШ© Ш§Щ„Ш№Ш§ШҜЩҠШ©
  const dataQuality = ind.dataLen || ind.closes?.length || 0;
  const hasFullData = dataQuality >= 100;

  const price = p.price;
  const {rsi, ma20, ma50, ma200, macd, bb_upper, bb_lower,
         support, resistance, nearSupport, nearResistance,
         atrPct, stochRsi} = ind;

  // в•җв•җ ШӯШіШ§ШЁ ЩҶЩӮШ§Ш· Ш§Щ„ШҙШұШ§ШЎ ЩҲШ§Щ„ШЁЩҠШ№
  let buy=0, sell=0, reasons=[];

  // 1. RSI
  if(rsi!=null) {
    if(rsi<30)      { buy+=2; reasons.push('RSI '+fmt(rsi)+'% вҖ” ШӘШҙШЁШ№ ШЁЩҠШ№ ЩӮЩҲЩҠ'); }
    else if(rsi<40) { buy++;  reasons.push('RSI '+fmt(rsi)+'% вҖ” Щ…ЩҠЩ„ Щ„Щ„ШҙШұШ§ШЎ'); }
    else if(rsi>70) { sell+=2;}
    else if(rsi>60) { sell++; }
  }

  // 2. MA Cross вҖ” Ш·ШЁЩӮШ§ШӘ Ш°ЩғЩҠШ©
  // MA20
  if(ma20!=null && price>ma20) { buy++;  reasons.push('Ш§Щ„ШіШ№Шұ ЩҒЩҲЩӮ MA20'); }
  else if(ma20!=null)          { sell++; }

  // MA50
  if(ma20!=null && ma50!=null && ma20>ma50) { buy++;  reasons.push('MA20 ЩҒЩҲЩӮ MA50 вҖ” Ш§ШӘШ¬Ш§ЩҮ ШөШ§Ш№ШҜ'); }
  else if(ma20!=null && ma50!=null)         { sell++; }

  // MA200 вҖ” Ш§Щ„ШЈЩӮЩҲЩү: Ш§ШӘШ¬Ш§ЩҮ Ш·ЩҲЩҠЩ„ Ш§Щ„Щ…ШҜЩү
  if(ma200!=null) {
    if(price > ma200)  { buy+=2; reasons.push('Ш§Щ„ШіШ№Шұ ЩҒЩҲЩӮ MA200 вҖ” Ш§ШӘШ¬Ш§ЩҮ ШөШ§Ш№ШҜ ЩӮЩҲЩҠ рҹ’Ә'); }
    else               { sell+=2; } // ШӘШӯШӘ MA200 = Ш®Ш·Шұ ШӯЩӮЩҠЩӮЩҠ
  }

  // 3. MACD
  if(macd!=null) {
    if(macd>0) { buy++;  reasons.push('MACD ШҘЩҠШ¬Ш§ШЁЩҠ вҖ” ШІШ®Щ… ШҙШұШ§ШЎ'); }
    else       { sell++; }
  }

  // 4. Bollinger Bands
  if(bb_lower!=null && price<=bb_lower) { buy++;  reasons.push('Ш§Щ„ШіШ№Шұ Ш№ЩҶШҜ Ш§Щ„ШӯШҜ Ш§Щ„ШЈШҜЩҶЩү Щ„ЩҖ BB'); }
  if(bb_upper!=null && price>=bb_upper) { sell++; }

  // 5. ШҜШ№Щ…/Щ…ЩӮШ§ЩҲЩ…Ш©
  if(nearSupport)    { buy+=2; reasons.push('ЩӮШұЩҠШЁ Щ…ЩҶ Ш§Щ„ШҜШ№Щ… $'+fmt(support,2)); }
  if(nearResistance) { sell+=2; }

  // 6. Stochastic RSI (ШӯЩӮЩҠЩӮЩҠ Ш§Щ„ШўЩҶ)
  if(stochRsi!=null) {
    if(stochRsi<20)      { buy+=2; reasons.push('Stoch RSI '+fmt(stochRsi)+'% вҖ” ШӘШҙШЁШ№ ШЁЩҠШ№ ШҙШҜЩҠШҜ'); }
    else if(stochRsi<30) { buy++;  reasons.push('Stoch RSI '+fmt(stochRsi)+'% вҖ” ШӘШҙШЁШ№ ШЁЩҠШ№'); }
    else if(stochRsi>80) { sell+=2; }
    else if(stochRsi>70) { sell++; }
  }

  // 7. Volume вҖ” avgVolume Щ…ЩҶ prices ШЈЩҲЩ„Ш§ЩӢ (Щ…ЩҶ quote) Ш«Щ… Щ…ЩҶ profiles ЩғЩҖ fallback
  const vol    = p.volume || 0;
  const avgVol = p.avgVolume || pro?.avgVolume || 0;
  const volR   = avgVol>0 ? vol/avgVol : 0;
  if(volR>1.5) {
    if(buy>sell) { buy++;  reasons.push('ШӯШ¬Щ… ШӘШҜШ§ЩҲЩ„ Щ…ШұШӘЩҒШ№ Г—'+fmt(volR,1)); }
    else         { sell++; }
  }

  // 8. ATR R/R вҖ” ЩҠЩҸШӯШіШЁ Ш§Щ„ШўЩҶ ЩӮШЁЩ„ netScore ШӯШӘЩү ШӘШ№ЩғШіЩҮ Ш§Щ„ШҘШҙШ§ШұШ©
  // в•җв•җ ЩҮШҜЩҒ Ш§Щ„ШұШЁШӯ ЩҲЩҲЩӮЩҒ Ш§Щ„Ш®ШіШ§ШұШ© вҖ” ATR ШҜЩҠЩҶШ§Щ…ЩҠЩғЩҠ
  const atrMultFinal = atrPct ? (atrPct < 2 ? 1.5 : atrPct < 4 ? 2.0 : 2.5) : 1.5;
  const atrStop  = atrPct ? Math.min(atrPct*atrMultFinal, 15) : 2;
  const atrBasedStop  = price*(1-atrStop/100);
  const supBasedStop  = support ? support*0.99 : null;
  const stopLoss = Math.max(
    supBasedStop && supBasedStop > atrBasedStop ? supBasedStop : atrBasedStop,
    price*0.75
  );
  const minTarget    = price * 1.03;
  const atrTarget    = price * (1 + Math.max(atrStop*2, 3)/100);
  const atrRealist   = price + (atrPct ? price*atrPct/100*3.5 : price*0.08);
  const resValid     = resistance && resistance > price*1.02 && resistance > minTarget;
  const resTarget    = resValid ? resistance : null;
  const isNearRes    = resistance && price >= resistance*0.98;
  const target       = isNearRes
    ? resistance * 1.05
    : resTarget
      ? Math.min(resTarget, atrRealist > minTarget ? atrRealist : resTarget)
      : Math.max(atrTarget, minTarget);
  const profitPct    = (target-price)/price*100;
  const lossPct      = (price-stopLoss)/price*100;
  const riskReward   = lossPct > 0 ? profitPct/lossPct : 0;

  // вң… ШӘШЈШ«ЩҠШұ R/R Ш№Щ„Щү ЩҶЩӮШ§Ш· Ш§Щ„ШҙШұШ§ШЎ вҖ” Ш§Щ„ШўЩҶ ЩҠЩҸШ¶Ш§ЩҒ ЩӮШЁЩ„ ШӯШіШ§ШЁ netScore
  if(riskReward>=3.0) { buy+=3; reasons.push('ЩҶШіШЁШ© Щ…Ш®Ш§Ш·ШұШ©/Щ…ЩғШ§ЩҒШЈШ© '+fmt(riskReward,1)+'x Щ…Щ…ШӘШ§ШІШ© Ш¬ШҜШ§ЩӢ'); }
  else if(riskReward>=2.0) { buy+=2; reasons.push('ЩҶШіШЁШ© Щ…Ш®Ш§Ш·ШұШ©/Щ…ЩғШ§ЩҒШЈШ© '+fmt(riskReward,1)+'x Щ…Щ…ШӘШ§ШІШ©'); }
  else if(riskReward>=1.5) { buy++;  reasons.push('ЩҶШіШЁШ© Щ…Ш®Ш§Ш·ШұШ©/Щ…ЩғШ§ЩҒШЈШ© '+fmt(riskReward,1)+'x Ш¬ЩҠШҜШ©'); }
  else if(riskReward<1)    { sell++; }

  // в”Җв”Җ Analyst Ratings вҖ” ЩҶЩӮШ§Ш· ШҘЩҠШ¬Ш§ШЁЩҠШ© ЩҒЩӮШ·
  const ar = state.analystRatings?.[stock.id];
  if(ar && ar.analysts >= 5) {
    const rat = (ar.rating||'').toLowerCase();
    if(rat.includes('strong buy') || rat.includes('buy')) {
      if(ar.analysts >= 20) { buy+=3; reasons.push('рҹ‘ЁвҖҚрҹ’ј '+ar.analysts+' Щ…ШӯЩ„Щ„ вҖ” ШҙШұШ§ШЎ ЩӮЩҲЩҠ'); }
      else if(ar.analysts >= 10) { buy+=2; reasons.push('рҹ‘ЁвҖҚрҹ’ј '+ar.analysts+' Щ…ШӯЩ„Щ„ вҖ” ШҙШұШ§ШЎ'); }
      else { buy++; reasons.push('рҹ‘ЁвҖҚрҹ’ј '+ar.analysts+' Щ…ШӯЩ„Щ„ вҖ” ШҘЩҠШ¬Ш§ШЁЩҠ'); }
    } else if(rat.includes('sell') || rat.includes('underperform')) {
      sell+=2; // Щ…ШӯЩ„Щ„ЩҲЩҶ ЩҠЩӮЩҲЩ„ЩҲЩҶ ШЁЩҠШ№ вҶ’ Ш№ЩӮЩҲШЁШ©
    }
  }
  if(ind.adx != null) {
    if(ind.adx > 30 && ind.macdHist > 0)       { buy++;  reasons.push('ADX '+ind.adx+' вҖ” Ш§ШӘШ¬Ш§ЩҮ ШөШ§Ш№ШҜ ЩӮЩҲЩҠ Ш¬ШҜШ§ЩӢ'); }
    else if(ind.adx > 25 && ind.macdHist > 0)  { buy++;  reasons.push('ADX '+ind.adx+' вҖ” Ш§ШӘШ¬Ш§ЩҮ ШөШ§Ш№ШҜ ЩӮЩҲЩҠ'); }
    // ADX < 20 = Щ„Ш§ ЩҶШ№Ш§ЩӮШЁШҢ ЩҒЩӮШ· Щ„Ш§ ЩҶЩғШ§ЩҒШҰ
  }
  if(ind.macdHist!=null) {
    const hist    = ind.macdHist;
    const histDir = ind.macdHistDir;
    if(hist > 0 && histDir === 'expanding')       { buy+=2;  reasons.push('MACD Hist +'+fmt(hist,2)+' вҶ‘ ШІШ®Щ… ШҙШұШ§ШЎ Щ…ШӘШөШ§Ш№ШҜ'); }
    else if(hist > 0 && histDir === 'contracting'){ buy++;   reasons.push('MACD Hist +'+fmt(hist,2)+' вҶ— ШІШ®Щ… ЩҠШ¶Ш№ЩҒ'); }
    else if(hist > 0 && histDir === 'crossing')   { buy+=2;  reasons.push('MACD Hist Ш№ШЁШұ Ш§Щ„ШөЩҒШұ Щ„Щ„ШЈШ№Щ„Щү вҶ‘ Ш§ЩҶШ№ЩғШ§Ші'); }
    else if(hist < 0 && histDir === 'contracting'){ buy++;   reasons.push('MACD Hist '+fmt(hist,2)+' вҶ— ШІШ®Щ… ШЁЩҠШ№ЩҠ ЩҠШӘЩӮЩ„Шө'); }
    else if(hist < 0 && histDir === 'crossing')   { sell++;  } // Ш№ШЁШұ Ш§Щ„ШөЩҒШұ Щ„Щ„ШЈШіЩҒЩ„
    else if(hist < 0 && histDir === 'expanding')  { sell+=2; } // ШІШ®Щ… ШЁЩҠШ№ЩҠ Щ…ШӘШөШ§Ш№ШҜ
  }

  // в”Җв”Җ MACD ШЈШіШЁЩҲШ№ЩҠ вҖ” ШӯЩ…Ш§ЩҠШ© Щ…ЩҶ Ш§Щ„ЩҮШЁЩҲШ· Ш§Щ„ЩғШЁЩҠШұ
  if(ind.weeklyTrend === 'bearish' && ind.weeklyMacdHist!=null && ind.weeklyMacdHist < 0) {
    sell+=2; // Ш§Щ„ШЈШіШЁЩҲШ№ЩҠ ЩҮШ§ШЁШ· = ШӘШӯШ°ЩҠШұ ЩӮЩҲЩҠ
  } else if(ind.weeklyTrend === 'bullish') {
    buy++;   // Ш§Щ„ШЈШіШЁЩҲШ№ЩҠ ШөШ§Ш№ШҜ = Щ…ЩғШ§ЩҒШЈШ©
  }

  // 9. Ш§Щ„ЩӮЩҲШ© Ш§Щ„ЩҶШіШЁЩҠШ© vs SPY вҖ” ШҘШҙШ§ШұШ© ШӯЩӮЩҠЩӮЩҠШ©
  const rs = calcRelativeStrength(p.change, state.spyChange);
  if(rs) {
    if(rs.score > 0)       { buy  += Math.floor(rs.score/6); reasons.push('Ш§Щ„ЩӮЩҲШ© vs SPY: '+rs.label+' ('+( rs.diff>=0?'+':'')+rs.diff+'%)'); }
    else if(rs.score < 0)  { sell += Math.abs(Math.floor(rs.score/5)); } // Ш№ЩӮЩҲШЁШ© ШЈЩӮЩҲЩү: /5 ШЁШҜЩ„ /8
  }

  // 10. Ш§Щ„ШҙЩ…ЩҲШ№ Ш§Щ„ЩҠШ§ШЁШ§ЩҶЩҠШ© вҖ” ШҘШҙШ§ШұШ§ШӘ ШҘШ¶Ш§ЩҒЩҠШ©
  const candlePatterns = detectCandlePatterns(ind.closes, ind.highs, ind.lows, ind.opens);
  candlePatterns.forEach(p2 => {
    if(p2.signal === 'bullish') {
      buy  += p2.strength >= 5 ? 2 : 1;
      reasons.push('ШҙЩ…Ш№Ш© '+p2.ar+' вҖ” '+p2.tip);
    } else if(p2.signal === 'bearish') {
      sell += p2.strength >= 5 ? 2 : 1;
    }
  });

  // в•җв•җ Cooldown вҖ” ШіЩҮЩ… ЩҮШЁШ· ШЁШ№ШҜ ШҘШҙШ§ШұШ© ШҙШұШ§ШЎ вҶ’ ЩҠЩҸШӯШ¬ШЁ Щ…ШЁШ§ШҙШұШ©
  const isCooldown = (state.cooldownStocks||[]).includes(stock.id);
  if(isCooldown) sell+=4;

  // вң… ШӯШ¬ШЁ: RSI Щ…ШұШӘЩҒШ№ + ЩӮШұЩҠШЁ Щ…ЩҶ Ш§Щ„Щ…ЩӮШ§ЩҲЩ…Ш© = Ш®Ш·Шұ Ш§ЩҶШ№ЩғШ§Ші
  if(rsi!=null && rsi > 70 && nearResistance) { sell+=4; }
  // вң… ШӘШӯШ°ЩҠШұ: RSI Щ…ШұШӘЩҒШ№ ЩҲШӯШҜЩҮ
  else if(rsi!=null && rsi > 72) { sell+=2; }

  // в•җв•җ Ш№ЩӮЩҲШЁШ§ШӘ
  if(earn<=5)       { sell+=3; }
  else if(earn<=10) { sell+=1; }
  const change = p.change||0;
  if(change>10)     { sell+=3; } // gap-up Щ…ШЁШ§Щ„Шә
  else if(change>5) { sell++;  }
  // ШЈШ®ШЁШ§Шұ вҖ” Ш§Щ„ЩҶЩӮШ§Ш· Ш§Щ„ШўЩҶ Щ…ШұШ¬Щ‘ШӯШ© (0-15+ ШЁШҜЩ„ 0-3)
  if(news.neg>=6)        { sell+=5; }       // ШЈШ®ШЁШ§Шұ ШіЩ„ШЁЩҠШ© Ш¬ШҜШ§ЩӢ (Щ…Ш«Щ„ ADBE freemium+guidance cut)
  else if(news.neg>=4)   { sell+=4; }       // ШЈШ®ШЁШ§Шұ ШіЩ„ШЁЩҠШ© ЩӮЩҲЩҠШ©
  else if(news.neg>=2)   { sell+=2; }       // ШЈШ®ШЁШ§Шұ ШіЩ„ШЁЩҠШ© Щ…ШӘЩҲШіШ·Ш©
  else if(news.neg>=1)   { sell++; }        // Ш®ШЁШұ ШіЩ„ШЁЩҠ ЩҲШ§ШӯШҜ
  if(news.pos>=6)        { buy+=4; }        // ШЈШ®ШЁШ§Шұ ШҘЩҠШ¬Ш§ШЁЩҠШ© Ш¬ШҜШ§ЩӢ
  else if(news.pos>=3)   { buy+=3; }        // ШЈШ®ШЁШ§Шұ ШҘЩҠШ¬Ш§ШЁЩҠШ© ЩӮЩҲЩҠШ©
  else if(news.pos>=1)   { buy += Math.min(2, Math.round(news.pos)); }

  // в•җв•җ Ш§Щ„ШҘШҙШ§ШұШ© Ш§Щ„ЩҶЩҮШ§ШҰЩҠШ©
  const netScore = buy - sell;
  const signal   = netScore>=4?"ШҙШұШ§ШЎ ЩӮЩҲЩҠ":netScore>=2?"ШҙШұШ§ШЎ":
                   netScore<=-4?"ШЁЩҠШ№ ЩӮЩҲЩҠ":netScore<=-2?"ШЁЩҠШ№":"Ш§ЩҶШӘШёШ§Шұ";

  // в•җв•җ ЩӮЩҲШ© Ш§Щ„ШҘШҙШ§ШұШ© (0-100) вҖ” ШЈЩӮШөЩү buy Щ…Щ…ЩғЩҶ ЩҶШёШұЩҠШ§ЩӢ ~26 (Щ…Ш№ ШҙЩ…ЩҲШ№+ЩӮЩҲШ© ЩҶШіШЁЩҠШ©+ШЈШ®ШЁШ§Шұ)
  const maxBuy = 26;
  const strength = Math.min(100, Math.max(0, Math.round((netScore + maxBuy) / (maxBuy*2) * 100)));

  // в•җв•җ Ш§Щ„Ш«ЩӮШ© вҖ” ШӘШ№ЩғШі Ш¬ЩҲШҜШ© Ш§Щ„ШҘШҙШ§ШұШ© Щ„Ш§ Щ…Ш¬ШұШҜ ШӘЩҲЩҒШұ Ш§Щ„Щ…ШӨШҙШұШ§ШӘ
  // Ш§Щ„ШЈШіШ§Ші: ЩҮЩ„ Ш§Щ„Щ…ШӨШҙШұШ§ШӘ Ш§Щ„Щ…ШӘЩҲЩҒШұШ© ШӘШӘЩҒЩӮ Щ…Ш№ Ш§Щ„ШҘШҙШ§ШұШ©Шҹ
  let confidence = 0;

  // 1. Ш§ШӘШіШ§ЩӮ Ш§Щ„Щ…ШӨШҙШұШ§ШӘ Щ…Ш№ ШЁШ№Ш¶ (Ш§Щ„ШЈЩҮЩ…)
  const bullSignals = [
    rsi!=null && rsi<45,                          // RSI ЩҒЩҠ Щ…ЩҶШ·ЩӮШ© ШҙШұШ§ШЎ
    macd!=null && macd>0,                          // MACD ШөШ§Ш№ШҜ
    ma20!=null && ma50!=null && ma20>ma50,         // Golden cross
    ma200!=null && price>ma200,                    // ЩҒЩҲЩӮ MA200
    nearSupport,                                    // Ш№ЩҶШҜ Ш§Щ„ШҜШ№Щ…
    stochRsi!=null && stochRsi<40,                 // StochRSI Щ…ЩҶШ®ЩҒШ¶
    atrPct!=null && atrPct<5,                      // ШӘШ°ШЁШ°ШЁ Щ…Ш№ЩӮЩҲЩ„
    news.pos>0,                                    // ШЈШ®ШЁШ§Шұ ШҘЩҠШ¬Ш§ШЁЩҠШ©
  ].filter(Boolean).length;

  const totalSignals = [
    rsi!=null, macd!=null, ma20!=null&&ma50!=null,
    ma200!=null, support!=null, stochRsi!=null, atrPct!=null,
  ].filter(Boolean).length;

  // ЩҶШіШЁШ© Ш§Щ„Щ…ШӨШҙШұШ§ШӘ Ш§Щ„Щ…ШӘЩҲЩҒШұШ© (0-50%)
  const availScore = totalSignals > 0 ? Math.round(totalSignals/7*50) : 0;

  // ЩҶШіШЁШ© Ш§Щ„Ш§ШӘШіШ§ЩӮ Щ…Ш№ Ш§Щ„ШҘШҙШ§ШұШ© (0-50%)
  const alignScore = totalSignals > 0 ? Math.round(bullSignals/Math.max(totalSignals,1)*50) : 0;

  confidence = Math.min(99, availScore + alignScore);

  // Щ…ЩғШ§ЩҒШЈШ©: ШЈШ®ШЁШ§Шұ ШҘЩҠШ¬Ш§ШЁЩҠШ© + ШӯШ¬Щ… Щ…ШұШӘЩҒШ№
  if(news.pos>0 && p.avgVolume>0) confidence = Math.min(99, confidence+3);

  // Ш№ЩӮЩҲШЁШ©: ШЈШ®ШЁШ§Шұ ШіЩ„ШЁЩҠШ© ШӘШ®ЩҒШ¶ Ш§Щ„Ш«ЩӮШ©
  if(news.neg>=4) confidence = Math.max(10, confidence-15);
  else if(news.neg>=2) confidence = Math.max(10, confidence-8);

  // в•җв•җ Ш¬ЩҲШҜШ© Ш§Щ„ШөЩҒЩӮШ© вҖ” Щ…Ш№Ш§ШҜЩ„Ш© Щ…ШӯШіЩ‘ЩҶШ©
  let tradeQuality = 0;
  // ЩҶШіШЁШ© Ш§Щ„Щ…Ш®Ш§Ш·ШұШ©/Ш§Щ„Щ…ЩғШ§ЩҒШЈШ© вҖ” Ш§Щ„ШЈЩҮЩ…
  if(riskReward>=3.0)       tradeQuality+=40;
  else if(riskReward>=2.0)  tradeQuality+=30;
  else if(riskReward>=1.5)  tradeQuality+=20;
  else if(riskReward>=1.0)  tradeQuality+=10;
  // ЩӮШұШЁ Ш§Щ„ШҜШ№Щ…
  if(nearSupport)           tradeQuality+=25;
  // ЩҮШҜЩҒ Ш§Щ„ШұШЁШӯ
  if(profitPct>=5)          tradeQuality+=20;
  else if(profitPct>=3)     tradeQuality+=15;
  else if(profitPct>=2)     tradeQuality+=8;
  // ATR Щ…ЩҶШ®ЩҒШ¶ = ШіЩҮЩ… Щ…ШіШӘЩӮШұ
  if(atrPct!=null && atrPct<2)  tradeQuality+=15;
  else if(atrPct!=null && atrPct<3) tradeQuality+=8;
  tradeQuality = Math.min(100, tradeQuality);

  // в•җв•җ ШӘЩҲЩӮЩҠШӘ Ш§Щ„ШҜШ®ЩҲЩ„
  // ШӯШіШ§ШЁ Ш§Щ„Щ…ШіШ§ЩҒШ© ШЁЩҠЩҶ Ш§Щ„ШіШ№Шұ Ш§Щ„ШӯШ§Щ„ЩҠ ЩҲШ§Щ„ШҜШ№Щ…
  const distToSupport = support>0 ? (price-support)/price*100 : 999;

  let entryTiming, entryColor, entryNote;

  if(nearResistance) {
    // вң… ЩӮШұЩҠШЁ Щ…ЩҶ Ш§Щ„Щ…ЩӮШ§ЩҲЩ…Ш© вҖ” Щ„Ш§ ШӘШҜШ®Щ„
    entryTiming = 'Ш§ЩҶШӘШёШұ';
    entryColor  = C.yellow;
    entryNote   = 'Ш§Щ„ШіШ№Шұ ЩӮШұЩҠШЁ Щ…ЩҶ Ш§Щ„Щ…ЩӮШ§ЩҲЩ…Ш© вҖ” Ш§ЩҶШӘШёШұ ЩғШіШұЩҮШ§ ШЈЩҲ ШӘШұШ§Ш¬Ш№';
  } else if(nearSupport) {
    // Ш§Щ„ШіШ№Шұ ЩӮШұЩҠШЁ Щ…ЩҶ Ш§Щ„ШҜШ№Щ… (ШЈЩҒШ¶Щ„ ШӘЩҲЩӮЩҠШӘ)
    entryTiming = 'Ш§ШҜШ®Щ„ Ш§Щ„ШўЩҶ';
    entryColor  = C.green;
    entryNote   = 'Ш§Щ„ШіШ№Шұ Ш№ЩҶШҜ Ш§Щ„ШҜШ№Щ… вҖ” ШЈЩҒШ¶Щ„ ЩҶЩӮШ·Ш© ШҜШ®ЩҲЩ„';
  } else if(distToSupport <= 5) {
    // ШЁШ№ЩҠШҜ Ш№ЩҶ Ш§Щ„ШҜШ№Щ… ШЁЩҖ 5% ШЈЩҲ ШЈЩӮЩ„ вҖ” Щ…ЩӮШЁЩҲЩ„
    entryTiming = 'Щ…ЩӮШЁЩҲЩ„';
    entryColor  = C.blue;
    entryNote   = 'Ш§ЩҶШӘШёШұ ШӘШұШ§Ш¬Ш№Ш§ЩӢ ШЁШіЩҠШ·Ш§ЩӢ ЩҶШӯЩҲ $'+fmt(support,2)+' ШЈЩҒШ¶Щ„';
  } else if(distToSupport <= 10) {
    // ШЁШ№ЩҠШҜ Ш№ЩҶ Ш§Щ„ШҜШ№Щ… ШЁЩҖ 10% вҖ” Ш§ЩҶШӘШёШұ
    entryTiming = 'Ш§ЩҶШӘШёШұ';
    entryColor  = C.yellow;
    entryNote   = 'Ш§Щ„ШіШ№Шұ ШЁШ№ЩҠШҜ Ш№ЩҶ Ш§Щ„ШҜШ№Щ… вҖ” Ш§ЩҶШӘШёШұ ШӘШұШ§Ш¬Ш№Ш§ЩӢ Щ„ЩҖ $'+fmt(support,2);
  } else {
    // ШЁШ№ЩҠШҜ Ш¬ШҜШ§ЩӢ Ш№ЩҶ Ш§Щ„ШҜШ№Щ…
    entryTiming = 'Щ…ШӘШЈШ®Шұ';
    entryColor  = C.orange;
    entryNote   = 'Ш§Щ„ШҜШ®ЩҲЩ„ Ш§Щ„ШўЩҶ Щ…ШӯЩҒЩҲЩҒ ШЁШ§Щ„Щ…Ш®Ш§Ш·Шұ вҖ” Ш§Щ„ШҜШ№Щ… Ш№ЩҶШҜ $'+fmt(support,2);
  }

  // ЩҶЩӮШ·Ш© Ш§Щ„ШҜШ®ЩҲЩ„ Ш§Щ„Щ…Ш«Ш§Щ„ЩҠШ©
  const idealEntry = nearSupport ? price : (support ? support*1.01 : price);

  // в•җв•җ ШӯШ§Щ„Ш© Ш§Щ„ШҜШ®ЩҲЩ„
  const signalQuality = confidence>=70 ? 'HIGH' : confidence>=50 ? 'MEDIUM' : 'LOW';
  const activeBuy  = !isCooldown && signalQuality==='HIGH' && (entryTiming==='Ш§ШҜШ®Щ„ Ш§Щ„ШўЩҶ' || entryTiming==='Щ…ЩӮШЁЩҲЩ„');
  const watchOnly  = !isCooldown && (signalQuality==='MEDIUM' || entryTiming==='Ш§ЩҶШӘШёШұ');
  const blockEntry = isCooldown || signalQuality==='LOW' || entryTiming==='Щ…ШӘШЈШ®Шұ';

  return {
    id: stock.id, name: stock.name, sector: stock.sector, cat: stock.cat,
    price, change, high:p.high, low:p.low, volume:vol, volR,
    rsi, ma20, ma50, ma200, macd, macdHist:ind.macdHist, macdHistDir:ind.macdHistDir,
    weeklyTrend:ind.weeklyTrend, weeklyMacdHist:ind.weeklyMacdHist,
    bb_upper, bb_lower,
    support, resistance, nearSupport, nearResistance,
    resTouches: ind.resTouches??1, supTouches: ind.supTouches??1,
    atrPct, stochRsi, riskReward,
    signal, strength, confidence, tradeQuality,
    netScore, buy, sell, reasons,
    stopLoss, target, profitPct,
    entryTiming, entryColor, entryNote, idealEntry, distToSupport,
    earnings: earn,
    news: news,
    // вӯҗ High Conviction: ШёЩҮШұ ЩҒЩҠ Ш§Щ„Ш¬Щ„ШіШ© Ш§Щ„ШЈЩҲЩ„Щү ЩҲШ№Ш§ШҜ ЩҒЩҠ Щ…ЩҶШӘШөЩҒ Ш§Щ„ЩҠЩҲЩ…
    // ЩҶШӘШӯЩӮЩӮ Щ…ЩҶ _midDayDone ШЈЩҲ Щ…ЩҶ localStorage Щ…ШЁШ§ШҙШұШ© (Щ„Щ„ШӯШ§Щ„Ш© ШЁШ№ШҜ ШҘШ№Ш§ШҜШ© Ш§Щ„ШӘШӯЩ…ЩҠЩ„)
    isConviction: (() => {
      const middayDone = _midDayDone || localStorage.getItem('recs_midday') === 'true';
      if (!middayDone) return false;
      // ЩҶЩӮШұШЈ Щ…ЩҶ state ШЈЩҲЩ„Ш§ЩӢ Ш«Щ… localStorage Щ…ШЁШ§ШҙШұШ© ЩғЩҖ fallback
      const s1ids = state.sessionOneIds ||
        (() => { try { return JSON.parse(localStorage.getItem('s1_recs')||'[]'); } catch(e){ return []; } })();
      return Array.isArray(s1ids) && s1ids.includes(stock.id);
    })(),
    beta: pro?.beta || stock.beta,
    activeBuy, watchOnly, blockEntry, isCooldown,
    closes: ind.closes || null,
    highs:  ind.highs  || null,
    lows:   ind.lows   || null,
    opens:  ind.opens  || null,
    adx:    ind.adx    || null,
    candlePatterns,
    relativeStrength: rs,
  };
}

function calcRecs() {
  // в•җв•җ ШҙШұЩҲШ· ШөШ§ШұЩ…Ш© Щ„Щ„ШӘЩҲШөЩҠШ©
  const candidates = ALL_STOCKS
    .map(s => calcSignal(s))
    .filter(Boolean)
    // ШҙШұШ· 1: ШҘШҙШ§ШұШ© ШҙШұШ§ШЎ
    .filter(s => s.signal==='ШҙШұШ§ШЎ ЩӮЩҲЩҠ' || s.signal==='ШҙШұШ§ШЎ')
    // ШҙШұШ· 2: Ш«ЩӮШ© ЩғШ§ЩҒЩҠШ© (60%+) вҖ” ШұЩҒШ№ЩҶШ§ Щ…ЩҶ 50
    .filter(s => s.confidence >= 60)
    // ШҙШұШ· 3: Ш¬ЩҲШҜШ© ШөЩҒЩӮШ© Щ…ЩӮШЁЩҲЩ„Ш© (35%+) вҖ” Ш®ЩҸЩҒЩҗЩ‘Ш¶ Щ…ЩҶ 40 Щ„ШӘШ¬ЩҶШЁ ШұЩҒШ¶ R/R Ш¬ЩҠШҜ ШЁЩ„Ш§ ШҜШ№Щ…
    .filter(s => s.tradeQuality >= 35)
    // ШҙШұШ· 4: ЩҮШҜЩҒ ШұШЁШӯ 2%+
    .filter(s => s.profitPct >= 2)
    // ШҙШұШ· 5: ЩҶШіШЁШ© Щ…Ш®Ш§Ш·ШұШ©/Щ…ЩғШ§ЩҒШЈШ© 1:1 Ш№Щ„Щү Ш§Щ„ШЈЩӮЩ„ вҖ” Ш¬ШҜЩҠШҜ
    .filter(s => s.riskReward >= 1.0)
    // ШҙШұШ· 6: Щ„Ш§ ШЈШұШЁШ§Шӯ ЩӮШұЩҠШЁШ© вҖ” ШЈЩғШ«Шұ ШөШұШ§Щ…Ш© Щ„Щ„ШЈШіЩҮЩ… Ш№Ш§Щ„ЩҠШ© Ш§Щ„ШӘЩӮЩ„ШЁ
    .filter(s => {
      const beta = s.beta || 1;
      if (beta >= 1.5) return s.earnings > 21; // ШЁЩҠЩҲШӘЩғ ЩҲШӘЩӮЩҶЩҠШ© вҖ” 3 ШЈШіШ§ШЁЩҠШ№
      if (beta >= 1.2) return s.earnings > 14; // Щ…ШӘЩҲШіШ· Ш§Щ„ШӘЩӮЩ„ШЁ вҖ” ШЈШіШЁЩҲШ№Ш§ЩҶ
      return s.earnings > 5;                   // Щ…ЩҶШ®ЩҒШ¶ Ш§Щ„ШӘЩӮЩ„ШЁ вҖ” 5 ШЈЩҠШ§Щ…
    })
    // ШҙШұШ· 7: Щ„Ш§ gap-up Щ…ШЁШ§Щ„Шә
    .filter(s => (s.change||0) <= 8)
    // ШҙШұШ· 7.5: Щ„Ш§ ШіЩҮЩ… Щ…Щ…ШӘШҜ вҖ” Ш§ШұШӘЩҒШ№ ШЈЩғШ«Шұ Щ…ЩҶ 20/30% ЩҒЩҠ 30 ЩҠЩҲЩ… Ш§Щ„ШЈШ®ЩҠШұШ©
    .filter(s => {
      const ind = state.indicators[s.id];
      const p   = state.prices[s.id];
      if (!ind?.closes || ind.closes.length < 5 || !p?.price) return true;
      // ЩҶШіШӘШ®ШҜЩ… ШЈЩӮШҜЩ… ШіШ№Шұ ЩҒЩҠ ind.closes (ЩҠЩ…Ш«Щ„ ~30 ЩҠЩҲЩ…) Щ…ЩӮШ§ШұЩҶШ© ШЁШ§Щ„ШіШ№Шұ Ш§Щ„ШӯШ§Щ„ЩҠ
      const price30dAgo = ind.closes[0]; // ШЈЩӮШҜЩ… ШіШ№Шұ Щ…ШӯЩҒЩҲШё
      const gain30d = price30dAgo > 0 ? (p.price - price30dAgo) / price30dAgo * 100 : 0;
      // ШЁЩҠШӘШ§ Ш№Ш§Щ„ЩҠ вҖ” ШӯШҜ 20%ШҢ Ш№Ш§ШҜЩҠШ© вҖ” ШӯШҜ 30%
      const limit = (s.beta || 1) >= 1.5 ? 20 : 30;
      return gain30d <= limit;
    })
    // ШҙШұШ· 8: ШӘЩҲЩӮЩҠШӘ Ш§Щ„ШҜШ®ЩҲЩ„ Щ…ЩӮШЁЩҲЩ„ вҖ” Щ„Ш§ Щ…ШӘШЈШ®Шұ ЩҲЩ„Ш§ Ш§ЩҶШӘШёШ§Шұ
    .filter(s => s.entryTiming === 'Ш§ШҜШ®Щ„ Ш§Щ„ШўЩҶ' || s.entryTiming === 'Щ…ЩӮШЁЩҲЩ„')
    // ШҙШұШ· 9: Ш§Щ„ШіШ№Шұ ЩҒЩҲЩӮ MA50 Ш№Щ„Щү Ш§Щ„ШЈЩӮЩ„
    .filter(s => s.ma50==null || s.price >= s.ma50*0.97)
    // ШҙШұШ· 10: вң… ШЁЩҠШ§ЩҶШ§ШӘ ЩғШ§ЩҒЩҠШ© вҖ” 100 ЩҠЩҲЩ… Ш№Щ„Щү Ш§Щ„ШЈЩӮЩ„
    .filter(s => (state.indicators[s.id]?.dataLen || state.indicators[s.id]?.closes?.length || 0) >= 100)
    // ШҙШұШ· 11: ШіЩҠЩҲЩ„Ш© ЩғШ§ЩҒЩҠШ© вҖ” 500 ШЈЩ„ЩҒ ШіЩҮЩ… ЩҠЩҲЩ…ЩҠШ§ЩӢ Ш№Щ„Щү Ш§Щ„ШЈЩӮЩ„
    .filter(s => {
      const p   = state.prices[s.id];
      const pro = state.profiles[s.id];
      const avg = p?.avgVolume || pro?.avgVolume || 0;
      return avg === 0 || avg >= 500000; // Щ„ЩҲ Щ…Ш§ ЩҒЩҠ ШЁЩҠШ§ЩҶШ§ШӘ ШӯШ¬Щ… вҶ’ ЩҠЩ…Шұ
    });

  // ШӘШұШӘЩҠШЁ: ЩӮЩҲШ© Г— 0.4 + Ш«ЩӮШ© Г— 0.3 + Ш¬ЩҲШҜШ© Г— 0.2 + ШӘЩҲЩӮЩҠШӘ Г— 0.1
  // FIX: conviction = 10 ШЁШҜЩ„ 20 вҖ” Щ„Ш§ ЩҠШ·ШәЩү Ш№Щ„Щү ЩӮЩҲШ© Ш§Щ„ШіЩҮЩ… Ш§Щ„ШӯЩӮЩҠЩӮЩҠШ©
  candidates.sort((a,b) => {
    const timingBonus = (s) =>
      s.entryTiming==='Ш§ШҜШ®Щ„ Ш§Щ„ШўЩҶ' ? 15 :
      s.entryTiming==='Щ…ЩӮШЁЩҲЩ„'     ? 5  : 0;
    const convictionBonus = (s) => s.isConviction ? 10 : 0;
    // вң… Щ…ЩғШ§ЩҒШЈШ© ШҙЩ…Ш№Ш© ШөШ§Ш№ШҜШ© ЩӮЩҲЩҠШ©
    const candleBonus = (s) => {
      if(!s.candlePatterns?.length) return 0;
      const top = s.candlePatterns[0];
      return top.signal==='bullish' ? top.strength*2 : top.signal==='bearish' ? -top.strength*2 : 0;
    };
    // вң… Щ…ЩғШ§ЩҒШЈШ© Ш§Щ„ЩӮЩҲШ© Ш§Щ„ЩҶШіШЁЩҠШ©
    const rsBonus = (s) => s.relativeStrength ? Math.max(-10, Math.min(15, s.relativeStrength.score)) : 0;
    const scoreA = a.strength*0.4 + a.confidence*0.3 + a.tradeQuality*0.2
                 + timingBonus(a) + convictionBonus(a) + candleBonus(a) + rsBonus(a);
    const scoreB = b.strength*0.4 + b.confidence*0.3 + b.tradeQuality*0.2
                 + timingBonus(b) + convictionBonus(b) + candleBonus(b) + rsBonus(b);
    return scoreB - scoreA;
  });

  // Adaptive Market вҖ” Ш№ШҜШҜ Ш§Щ„ШӘЩҲШөЩҠШ§ШӘ ШӯШіШЁ Ш§ШӘШ¬Ш§ЩҮ Ш§Щ„ШіЩҲЩӮ
  const maxRecs = state.marketTrend==='bullish' ? 5 :
                  state.marketTrend==='bearish' ? 2 : 4;

  const recs = [];
  const usedSectors = new Set();
  // Ш§Щ„Ш¬ЩҲЩ„Ш© Ш§Щ„ШЈЩҲЩ„Щү: ШӘЩҲШөЩҠШ© ЩҲШ§ШӯШҜШ© Щ„ЩғЩ„ ЩӮШ·Ш§Ш№
  for(const c of candidates) {
    if(recs.length>=maxRecs) break;
    if(!usedSectors.has(c.sector)) {
      recs.push(c);
      usedSectors.add(c.sector);
    }
  }
  // Ш§Щ„Ш¬ЩҲЩ„Ш© Ш§Щ„Ш«Ш§ЩҶЩҠШ©: ШЈЩғЩ…Щ„ ШЁШЈЩӮЩҲЩү Ш§Щ„Щ…ШұШҙШӯЩҠЩҶ ШЁШҜЩҲЩҶ ШӘЩғШұШ§Шұ
  for(const c of candidates) {
    if(recs.length>=maxRecs) break;
    if(!recs.find(r=>r.id===c.id)) recs.push(c);
  }

  // в•җв•җ ШӘШӯШҜЩҠШ« Cooldown вҖ” ШіЩҮЩ… ЩғШ§ЩҶ ШӘЩҲШөЩҠШ© ЩҲЩҮШЁШ· -5%
  let cooldownUpdated = false;
  ALL_STOCKS.forEach(s => {
    const p = state.prices[s.id];
    if(!p?.isReal) return;
    const wasRec = (state.sessionOneIds||[]).includes(s.id);
    if(wasRec && (p.change||0) < -5) {
      if(!state.cooldownStocks) state.cooldownStocks = [];
      if(!state.cooldownStocks.includes(s.id)) {
        state.cooldownStocks.push(s.id);
        cooldownUpdated = true;
      }
    }
  });
  if(cooldownUpdated) {
    try { localStorage.setItem('cooldown_stocks', JSON.stringify(state.cooldownStocks)); } catch(e) {}
  }

  state.recs = recs;
  state.recsTime = new Date();

  // вң… ШӘШіШ¬ЩҠЩ„ ЩҒЩҠ Ш§Щ„ШіШ¬Щ„ ЩҒЩӮШ· Ш№ЩҶШҜ Ш§Щ„ШіЩҲЩӮ Ш§Щ„Щ…ЩҒШӘЩҲШӯ вҖ” Щ„Ш§ ШӘШіШ¬ЩҠЩ„ Щ„ШЈШіШ№Ш§Шұ ЩӮШҜЩҠЩ…Ш©
  if(isMarketOpen()) {
    recordRecsToHistory(recs);
  }

  // ШҘШҙШ№Ш§Шұ ШЁШ§Щ„ШӘЩҲШөЩҠШ§ШӘ Ш§Щ„Ш¬ШҜЩҠШҜШ©
  if(recs.length > 0) {
    const names = recs.slice(0,3).map(r=>r.id).join('ШҢ ');
    sendNotification('рҹҺҜ ШӘЩҲШөЩҠШ§ШӘ ШӘШұЩҠШҜШұ ШЁШұЩҲ X', recs.length+' ШӘЩҲШөЩҠШ§ШӘ Ш¬ШҜЩҠШҜШ©: '+names);
  }

  // ШӯЩҒШё Ш§Щ„ШӘЩҲШөЩҠШ§ШӘ вҖ” s1_recs ЩҠЩҸШӯЩҒШё Щ…ШұШ© ЩҲШ§ШӯШҜШ© ЩҒЩӮШ· Ш№ЩҶШҜ Ш§Щ„Ш§ЩҒШӘШӘШ§Шӯ
  // Щ„Ш§ ЩҶЩғШӘШЁ ЩҒЩҲЩӮЩҮ ЩҮЩҶШ§ Щ„ШЈЩҶ Щ…ЩҶШӘШөЩҒ Ш§Щ„ЩҠЩҲЩ… ЩҠШӯШӘШ§Ш¬ЩҮ Щ„Щ„Щ…ЩӮШ§ШұЩҶШ©
  try {
    // s1_recs ЩҠЩҸШӯЩҒШё ЩҒЩӮШ· ШҘШ°Ш§ Щ„Щ… ЩҠЩғЩҶ Щ…ШӯЩҒЩҲШёШ§ЩӢ Щ…ЩҶ ЩӮШЁЩ„ Ш§Щ„ЩҠЩҲЩ… (Ш§Щ„Ш¬Щ„ШіШ© Ш§Щ„ШЈЩҲЩ„Щү)
    const existingDate = localStorage.getItem('recs_date');
    const today        = new Date().toDateString();
    const isFirstRec   = existingDate !== today; // ШЈЩҲЩ„ Щ…ШұШ© Ш§Щ„ЩҠЩҲЩ…
    if(isFirstRec) {
      localStorage.setItem('s1_recs', JSON.stringify(recs.map(r=>r.id)));
      state.sessionOneIds = recs.map(r=>r.id);
    }
    localStorage.setItem('recs_time',   new Date().toISOString());
    localStorage.setItem('recs_date',   today);
    localStorage.setItem('recs_full',   JSON.stringify(recs));
    localStorage.setItem('recs_midday', 'false');
  } catch(e) {}

  return recs;
}

// ================================================================
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ SPECULATIVE ENGINE в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// ================================================================

function calcSpeculative() {
  if(state.marketTrend === 'bearish') {
    state.speculativeRecs = [];
    return [];
  }

  const candidates = ALL_STOCKS
    .filter(s => s.cat==='future' || s.cat==='small' || s.beta>=1.8)
    .map(s => {
      const p   = state.prices[s.id];
      const ind = state.indicators[s.id];
      const pro = state.profiles[s.id];

      if(!p?.price || !ind) return null;
      if(isMarketOpen() && !p.isReal) return null;

      const price  = p.price;
      const beta   = pro?.beta || s.beta || 1;
      const volR   = p.avgVolume>0 ? p.volume/p.avgVolume : 0;
      const change = p.change||0;
      const earnDays    = state.earnings[s.id]??999;
      const dataQuality = ind.dataLen || ind.closes?.length || 0; // вң… Ш§Щ„Ш№ШҜШҜ Ш§Щ„ШӯЩӮЩҠЩӮЩҠ

      // в•җв•җ ШҙШұШ· 1: Ш§Щ„ШіШ№Шұ вҖ” Щ…ШӘЩҲШіШ· ШҘЩ„Щү ШөШәЩҠШұ ($3 - $100)
      if(price > 100 || price < 3) return null;

      // в•җв•җ ШҙШұШ· 1.5: ШіЩҠЩҲЩ„Ш© ЩғШ§ЩҒЩҠШ© вҖ” Щ…Щ„ЩҠЩҲЩҶ ШіЩҮЩ… ЩҠЩҲЩ…ЩҠШ§ЩӢ Ш№Щ„Щү Ш§Щ„ШЈЩӮЩ„
      const avgVolSpec = p.avgVolume || pro?.avgVolume || 0;
      if(avgVolSpec > 0 && avgVolSpec < 1000000) return null;

      // в•җв•җ ШҙШұШ· 2: ШӘЩӮЩ„ШЁ ЩғШ§ЩҒЩҚ (beta ШЈЩҲ ATR)
      // ATR% ЩҠШ№ЩғШі Ш§Щ„ШӘЩӮЩ„ШЁ Ш§Щ„ЩҒШ№Щ„ЩҠ ШЈЩҒШ¶Щ„ Щ…ЩҶ beta
      const atrPct = ind.atrPct||0;
      const isVolatile = beta>=1.7 || atrPct>=2.5;
      if(!isVolatile) return null;

      // в•җв•җ ШҙШұШ· 3: Щ„Ш§ ЩҮШЁЩҲШ· ШӯШұ (Щ„Ш§ gap-down >10%)
      if(change < -10) return null;

      // в•җв•җ ШҙШұШ· 4: Щ„Ш§ ШЈШұШЁШ§Шӯ ЩӮШұЩҠШЁШ© Ш¬ШҜШ§ЩӢ (<5 ШЈЩҠШ§Щ…)
      if(earnDays <= 5) return null;

      // вң… ШҙШұШ· 5: ШЁЩҠШ§ЩҶШ§ШӘ ЩғШ§ЩҒЩҠШ© вҖ” 60 ЩҠЩҲЩ… Ш№Щ„Щү Ш§Щ„ШЈЩӮЩ„ Щ„Щ„Щ…Ш¬Ш§ШІЩҒШ© (ШЈЩӮЩ„ Щ…ЩҶ Ш§Щ„ШӘЩҲШөЩҠШ©)
      if(dataQuality < 60) return null;

      // в•җв•җ ШӯШіШ§ШЁ Ш§Щ„ЩҶЩӮШ§Ш· вҖ” ЩҒЩғШұШ©: Ш§Щ„ШұШЁШӯ Ш§Щ„Щ…ШӯШӘЩ…Щ„ vs Ш§Щ„Ш®ШіШ§ШұШ© Ш§Щ„Щ…ШӯШҜЩҲШҜШ©
      let score = 0;
      const reasons = [];   // ШЈШіШЁШ§ШЁ Ш§Щ„Ш§Ш®ШӘЩҠШ§Шұ ШЁШ§Щ„Ш№ШұШЁЩҠ
      const warnings = [];  // ШӘШӯШ°ЩҠШұШ§ШӘ

      // в”Җв”Җ 1. ШҘЩ…ЩғШ§ЩҶЩҠШ© Ш§Щ„ШӘШ¶Ш®Щ… (ATR вҖ” ЩҠШ№ЩғШі Ш§Щ„ШӘШӯШұЩғ Ш§Щ„ЩҠЩҲЩ…ЩҠ Ш§Щ„ЩҒШ№Щ„ЩҠ)
      if(atrPct >= 6)       { score+=20; reasons.push('ATR '+fmt(atrPct,1)+'% вҖ” ШӘШӯШұЩғШ§ШӘ Ш¶Ш®Щ…Ш© ЩҠЩҲЩ…ЩҠШ§ЩӢ'); }
      else if(atrPct >= 4)  { score+=15; reasons.push('ATR '+fmt(atrPct,1)+'% вҖ” ШӘШ°ШЁШ°ШЁ Ш№Ш§Щ„ЩҚ'); }
      else if(atrPct >= 2.5){ score+=8;  }

      // в”Җв”Җ 2. Beta вҖ” ШӯШіШ§ШіЩҠШ© Щ„Щ„ШіЩҲЩӮ
      if(beta>=2.5)         { score+=20; reasons.push('Beta '+fmt(beta,1)+' вҖ” ЩҠШӘШӯШұЩғ Ш¶Ш№ЩҒ Ш§Щ„ШіЩҲЩӮ'); }
      else if(beta>=2.0)    { score+=14; reasons.push('Beta '+fmt(beta,1)+' вҖ” ШӘЩӮЩ„ШЁ Ш¬ЩҠШҜ Щ„Щ„Щ…Ш¬Ш§ШІЩҒШ©'); }
      else if(beta>=1.7)    { score+=8; }

      // в”Җв”Җ 3. Ш§Щ„Ш§ШӘШ¬Ш§ЩҮ вҖ” Щ„Ш§ ЩҶШұЩҠШҜ ЩҮШЁЩҲШ·Ш§ЩӢ ШӯШұШ§ЩӢ
      // ЩҶШұЩҠШҜ: ШҘЩ…Ш§ ШөШ§Ш№ШҜШҢ ШЈЩҲ Ш§ШұШӘШҜШ§ШҜ Щ…ЩҶ ЩӮШ§Ш№
      const trendUp   = ind.ma20!=null && ind.ma50!=null && ind.ma20 > ind.ma50;
      const aboveMa20 = ind.ma20!=null && price > ind.ma20;
      const bouncing  = ind.rsi!=null && ind.rsi<35 && ind.nearSupport; // Ш§ШұШӘШҜШ§ШҜ Щ…ЩҶ ЩӮШ§Ш№

      if(trendUp && aboveMa20) {
        score+=15;
        reasons.push('Ш§Щ„Ш§ШӘШ¬Ш§ЩҮ ШөШ§Ш№ШҜ вҖ” ЩҒЩҲЩӮ MA20 ЩҲ MA20>MA50');
      } else if(bouncing) {
        score+=12;
        reasons.push('Ш§ШұШӘШҜШ§ШҜ Щ…ШӯШӘЩ…Щ„ вҖ” RSI'+fmt(ind.rsi)+'% Ш№ЩҶШҜ Ш§Щ„ШҜШ№Щ…');
      } else if(aboveMa20) {
        score+=6;
      } else if(!trendUp && !bouncing) {
        score-=8;
        warnings.push('Ш§Щ„Ш§ШӘШ¬Ш§ЩҮ ШәЩҠШұ ЩҲШ§Ш¶Шӯ вҖ” ШӘШӯЩӮЩӮ Щ…ЩҶ Ш§Щ„ШұШіЩ…');
      }

      // в”Җв”Җ 4. MACD Histogram вҖ” Ш§Щ„ШІШ®Щ… Ш§Щ„ШӯЩӮЩҠЩӮЩҠ Щ„Щ„Щ…Ш¬Ш§ШІЩҒШ©
      if(ind.macdHist!=null) {
        const hist    = ind.macdHist;
        const histDir = ind.macdHistDir;
        if(hist > 0 && histDir === 'expanding') {
          score+=18;
          reasons.push('MACD Hist +'+fmt(hist,2)+' вҶ‘ вҖ” ШІШ®Щ… ШҙШұШ§ШЎ Щ…ШӘШөШ§Ш№ШҜ');
        } else if(hist > 0 && histDir === 'crossing') {
          score+=16;
          reasons.push('MACD Hist Ш№ШЁШұ Ш§Щ„ШөЩҒШұ Щ„Щ„ШЈШ№Щ„Щү вҖ” Ш§ЩҶШ№ЩғШ§Ші ШІШ®Щ…');
        } else if(hist > 0 && histDir === 'contracting') {
          score+=6;
          warnings.push('MACD Hist ЩҠШ¶ЩҠЩӮ вҖ” Ш§Щ„ШІШ®Щ… ЩҠШӘШұШ§Ш¬Ш№');
        } else if(hist < 0 && histDir === 'contracting') {
          // ШІШ®Щ… ШЁЩҠШ№ЩҠ ЩҠШӘЩӮЩ„Шө вҖ” ЩҒШұШөШ© Щ…ШӯШӘЩ…Щ„Ш© Щ„Ш§ Ш№ЩӮЩҲШЁШ© ЩғШ§Щ…Щ„Ш©
          score-=4;
          warnings.push('MACD Hist ШіШ§Щ„ШЁ ЩҠШӘЩӮЩ„Шө вҖ” Ш§ЩҶШӘШёШұ ШӘШЈЩғЩҠШҜ Ш§Щ„ШӘШӯЩҲЩ„');
        } else if(hist < 0 && histDir === 'crossing') {
          // Ш№ШЁШұ Ш§Щ„ШөЩҒШұ Щ„Щ„ШЈШіЩҒЩ„ вҖ” Ш®Ш·Шұ
          return null;
        } else if(hist < 0 && histDir === 'expanding') {
          // ШІШ®Щ… ШЁЩҠШ№ЩҠ Щ…ШӘШөШ§Ш№ШҜ вҖ” ШӯШ¬ШЁ ЩҒЩҲШұЩҠ
          return null;
        }
      } else if(ind.macd!=null) {
        // fallback Щ„Щ„ЩҖ MACD Ш§Щ„ШЁШіЩҠШ· ШҘШ°Ш§ Щ„Ш§ ЩҠЩҲШ¬ШҜ Histogram
        if(ind.macd>0) { score+=12; reasons.push('MACD ШөШ§Ш№ШҜ вҖ” ШІШ®Щ… ШҙШұШ§ШЎ ЩӮШөЩҠШұ Ш§Щ„Щ…ШҜЩү'); }
        else           { score-=5; }
      }

      // в”Җв”Җ ШЈШіШЁЩҲШ№ЩҠ вҖ” Щ„Ш§ Щ…Ш¬Ш§ШІЩҒШ© ЩҒЩҠ ЩҮШЁЩҲШ· ШЈШіШЁЩҲШ№ЩҠ ШӯШ§ШҜ
      if(ind.weeklyTrend === 'bearish' && ind.weeklyMacdHist!=null && ind.weeklyMacdHist < -1) {
        // Ш§Щ„ШЈШіШЁЩҲШ№ЩҠ ЩҮШ§ШЁШ· ШЁЩӮЩҲШ© вҖ” ШӯШ¬ШЁ
        return null;
      } else if(ind.weeklyTrend === 'bullish') {
        score+=8;
        reasons.push('ШЈШіШЁЩҲШ№ЩҠ ШөШ§Ш№ШҜ вҖ” Ш§Щ„Ш§ШӘШ¬Ш§ЩҮ Ш§Щ„ЩғШЁЩҠШұ ЩҒЩҠ ШөШ§Щ„ШӯЩғ');
      }

      // в”Җв”Җ 5. ШӯШ¬Щ… Ш§Щ„ШӘШҜШ§ЩҲЩ„ вҖ” Ш§ЩҮШӘЩ…Ш§Щ… ШӯЩӮЩҠЩӮЩҠ
      if(volR>=3)       { score+=15; reasons.push('ШӯШ¬Щ… Г—'+fmt(volR,1)+' вҖ” Ш§ЩҮШӘЩ…Ш§Щ… Ш§ШіШӘШ«ЩҶШ§ШҰЩҠ'); }
      else if(volR>=2)  { score+=10; reasons.push('ШӯШ¬Щ… Г—'+fmt(volR,1)+' вҖ” ЩҶШҙШ§Ш· Щ…ШұШӘЩҒШ№'); }
      else if(volR>=1.5){ score+=5; }

      // в”Җв”Җ 6. ШҙЩ…ЩҲШ№ вҖ” ШӘШЈЩғЩҠШҜ ШЁШөШұЩҠ (Ш§Щ„Щ…Ш·ШұЩӮШ© ЩҲШ§Щ„Ш§ШЁШӘЩ„Ш§Ш№ Щ…Ш¶Ш§Ш№ЩҒШ© ЩҒЩҠ Ш§Щ„Щ…Ш¬Ш§ШІЩҒШ©)
      const candles = detectCandlePatterns(ind.closes, ind.highs, ind.lows, ind.opens);
      const topCandle = candles[0] || null;
      candles.forEach(cp => {
        if(cp.signal==='bullish') {
          // Ш§Щ„Щ…Ш·ШұЩӮШ© ЩҲШ§Щ„Ш§ШЁШӘЩ„Ш§Ш№ Ш§Щ„ШөШ§Ш№ШҜ ШЈЩӮЩҲЩү Щ„Щ„Щ…Ш¬Ш§ШІЩҒШ© вҖ” ЩҶЩӮШ§Ш· Щ…Ш¶Ш§Ш№ЩҒШ©
          const isBest = cp.name==='Hammer' || cp.name==='Bullish Engulfing' || cp.name==='Morning Star';
          score += isBest
            ? (cp.strength>=5 ? 20 : 14)   // Щ…Ш¶Ш§Ш№ЩҒ
            : (cp.strength>=5 ? 10 : 6);    // Ш№Ш§ШҜЩҠ
          reasons.push('рҹ•Ҝ '+cp.ar+' вҖ” '+cp.tip);
        } else if(cp.signal==='bearish') {
          score -= cp.strength>=5 ? 10 : 5;
          warnings.push('рҹ•Ҝ '+cp.ar+' вҖ” '+cp.tip);
        }
      });

      // в”Җв”Җ 7. Ш№ЩӮЩҲШЁШ§ШӘ
      if(earnDays<=14)      { score-=8;  warnings.push('ШЈШұШЁШ§Шӯ Ш®Щ„Ш§Щ„ '+earnDays+' ЩҠЩҲЩ… вҖ” ШӘЩӮЩ„ШЁ Щ…ШұШӘЩӮШЁ'); }
      if(change>12)         { score-=10; warnings.push('Ш§ШұШӘЩҒШ№ '+fmt(change,1)+'% Ш§Щ„ЩҠЩҲЩ… вҖ” ЩӮШҜ ЩҠШӘШұШ§Ш¬Ш№'); }
      if(ind.rsi!=null && ind.rsi>78) { score-=10; warnings.push('RSI Щ…ШұШӘЩҒШ№ '+fmt(ind.rsi)+'% вҖ” ШӘШҙШЁШ№ ШҙШұШ§ШЎ'); }

      score = Math.max(0, score);
      if(score < 50) return null;

      // в•җв•җ ШӯШіШ§ШЁ ЩҲЩӮЩҒ Ш§Щ„Ш®ШіШ§ШұШ© ЩҲШ§Щ„ЩҮШҜЩҒ вҖ” Ш§Щ„ШЈЩҮЩ… ЩҒЩҠ Ш§Щ„Щ…Ш¬Ш§ШІЩҒШ©
      // ЩҲЩӮЩҒ Ш§Щ„Ш®ШіШ§ШұШ©: ШЈШіЩҒЩ„ Ш§Щ„ШҜШ№Щ… Щ…ШЁШ§ШҙШұШ© ШЈЩҲ 2Г—ATR
      const atrStop  = atrPct * 1.5; // Щ…Ш¶ШЁЩҲШ· Щ„Щ„Щ…Ш¬Ш§ШІЩҒШ© вҖ” Ш®ШіШ§ШұШ© Щ…ШӯШҜЩҲШҜШ©
      const rawStop  = ind.support && ind.support < price
        ? Math.min(ind.support * 0.985, price*(1-atrStop/100))  // ШЈШіЩҒЩ„ Ш§Щ„ШҜШ№Щ… ШЁЩҖ 1.5%
        : price*(1-atrStop/100);
      const stopLoss = Math.max(rawStop, price*0.65); // ШӯШҜ ШЈЩӮШөЩү -35%
      const lossPct  = (price-stopLoss)/price*100;

      // Ш§Щ„ЩҮШҜЩҒ: Щ…ШҙШӘЩӮ Щ…ЩҶ ШЁЩҶЩҠШ© Ш§Щ„ШіЩҲЩӮ Ш§Щ„ШӯЩӮЩҠЩӮЩҠШ© Щ„Ш§ Щ…ЩҶ Ш¶ШұШЁ Ш§Щ„ЩҲЩӮЩҒ
      // 1. Ш§Щ„Щ…ЩӮШ§ЩҲЩ…Ш© Ш§Щ„Щ…ШӨЩғШҜШ© (ШЈЩҲЩ„ЩҲЩҠШ© ЩӮШөЩҲЩү)
      const resValidSpec = ind.resistance && ind.resistance > price*1.05;
      // 2. Ш§Щ…ШӘШҜШ§ШҜ ATR Г— 2.5 Ш¶Щ…ЩҶ ШЈЩҒЩӮ 3-5 ШЈЩҠШ§Щ… (ЩҲШ§ЩӮШ№ЩҠ Щ„Щ„Щ…Ш¬Ш§ШІЩҒШ©)
      const atrExtTarget = price * (1 + (ind.atrPct||3) * 2.5 / 100);
      // 3. Ш§Щ„ШӯШҜ Ш§Щ„ШЈШҜЩҶЩү Ш§Щ„Щ…ЩӮШЁЩҲЩ„ (3:1 R/R Щ…ЩҶ Ш§Щ„ЩҲЩӮЩҒ)
      const minRRTarget  = price * (1 + lossPct*3/100);

      // ЩҶШ®ШӘШ§Шұ Ш§Щ„ЩҮШҜЩҒ: Ш§Щ„Щ…ЩӮШ§ЩҲЩ…Ш© ШҘШ°Ш§ ЩғШ§ЩҶШӘ ШЈШ№Щ„Щү Щ…ЩҶ Ш§Щ„ШӯШҜ Ш§Щ„ШЈШҜЩҶЩүШҢ ЩҲШҘЩ„Ш§ ATR extension
      let target;
      if(resValidSpec && ind.resistance > minRRTarget) {
        target = ind.resistance; // ЩҮШҜЩҒ ШӯЩӮЩҠЩӮЩҠ Щ…ЩҶ Ш§Щ„Щ…ЩӮШ§ЩҲЩ…Ш©
      } else if(atrExtTarget > minRRTarget) {
        target = atrExtTarget;   // ЩҮШҜЩҒ Щ…ЩҶ ATR ЩҲШ§ЩӮШ№ЩҠ
      } else {
        return null; // Щ„Ш§ ЩҠЩҲШ¬ШҜ ЩҮШҜЩҒ ШӯЩӮЩҠЩӮЩҠ вҖ” ЩҶШұЩҒШ¶ Ш§Щ„ШіЩҮЩ…
      }

      // ШҘШ°Ш§ Ш§Щ„Щ…ЩӮШ§ЩҲЩ…Ш© ШЁЩҠЩҶ Ш§Щ„ШіШ№Шұ ЩҲШ§Щ„ЩҮШҜЩҒ вҖ” Щ„Ш§ ЩҶШӘШ¬Ш§ЩҲШІЩҮШ§ ШЁШҜЩҲЩҶ ЩғШіШұ Щ…ШӨЩғШҜ
      if(!resValidSpec && ind.resistance && ind.resistance > price && ind.resistance < target) {
        target = ind.resistance * 0.97; // ЩҶЩӮЩҒ ЩӮШЁЩ„ Ш§Щ„Щ…ЩӮШ§ЩҲЩ…Ш© ШЁЩҮШ§Щ…Шҙ ШЈЩ…Ш§ЩҶ
      }

      const profitPct  = (target-price)/price*100;
      const riskReward = lossPct>0 ? profitPct/lossPct : 0;

      // ШұЩҒШ¶ ШҘШ°Ш§ R/R ШЈЩӮЩ„ Щ…ЩҶ 2:1
      if(riskReward < 2) return null;

      // в•җв•җ ШӘЩҲЩӮЩҠШӘ Ш§Щ„ШҜШ®ЩҲЩ„
      const distToSup = ind.support>0 ? (price-ind.support)/price*100 : 999;
      let entryTiming, entryNote;
      if(ind.nearSupport) {
        entryTiming = 'Ш§ШҜШ®Щ„ Ш§Щ„ШўЩҶ';
        entryNote   = 'Ш§Щ„ШіШ№Шұ Ш№ЩҶШҜ Ш§Щ„ШҜШ№Щ… $'+fmt(ind.support,2)+' вҖ” ШЈЩҒШ¶Щ„ ЩҶЩӮШ·Ш© ШҜШ®ЩҲЩ„';
      } else if(distToSup<=8) {
        entryTiming = 'Щ…ЩӮШЁЩҲЩ„';
        entryNote   = 'ЩӮШұЩҠШЁ Щ…ЩҶ Ш§Щ„ШҜШ№Щ… вҖ” ЩҠЩ…ЩғЩҶ Ш§Щ„ШҜШ®ЩҲЩ„ ШЈЩҲ Ш§ЩҶШӘШёШ§Шұ $'+fmt(ind.support,2);
      } else if(distToSup<=18) {
        entryTiming = 'Ш§ЩҶШӘШёШұ';
        entryNote   = 'Ш§ЩҶШӘШёШұ ШӘШұШ§Ш¬Ш№Ш§ЩӢ ЩҶШӯЩҲ $'+fmt(ind.support,2)+' Щ„Щ„ШҜШ®ЩҲЩ„ ШЁШЈЩ…Ш§ЩҶ';
      } else {
        entryTiming = 'Щ…ШӘШЈШ®Шұ';
        entryNote   = 'ШЁШ№ЩҠШҜ Ш№ЩҶ Ш§Щ„ШҜШ№Щ… вҖ” Ш§Щ„ШҜШ®ЩҲЩ„ Щ…ШӯЩҒЩҲЩҒ ШЁШ§Щ„Щ…Ш®Ш§Ш·Шұ';
      }

      const label =
        score>=80 ? 'рҹҡҖ Ш§ЩҶЩҒШ¬Ш§Шұ Щ…ШӯШӘЩ…Щ„' :
        score>=65 ? 'рҹ”Ҙ ШІШ®Щ… ЩӮЩҲЩҠ'      :
        score>=50 ? 'вҡЎ ЩҒШұШөШ© ЩҶШҙШ·Ш©'    :
                    'рҹҺІ Щ…Ш¬Ш§ШІЩҒШ©';

      // ШӘШ®ШөЩҠШө ШұШЈШі Ш§Щ„Щ…Ш§Щ„: 5-10% ШӯШіШЁ Ш§Щ„Ш¬ЩҲШҜШ©
      const allocPct = score>=70 ? 0.10 : score>=55 ? 0.07 : 0.05;

      return {
        ...s, price, change, volR, beta, atrPct,
        score, label, reasons, warnings,
        rsi:ind.rsi, macd:ind.macd,
        ma20:ind.ma20, ma50:ind.ma50, ma200:ind.ma200,
        support:ind.support, resistance:ind.resistance,
        nearSupport:ind.nearSupport,
        stopLoss, target, profitPct, lossPct, riskReward,
        allocPct, entryTiming, entryNote,
        earnDays, topCandle,
      };
    })
    .filter(Boolean)
    .sort((a,b) => {
      // ШӘШұШӘЩҠШЁ: R/R ШЈЩҲЩ„Ш§ЩӢ Г— score
      const valA = a.riskReward * 0.5 + a.score * 0.5;
      const valB = b.riskReward * 0.5 + b.score * 0.5;
      return valB - valA;
    })
    .slice(0, 5);

  state.speculativeRecs = candidates;
  if(candidates.length && isMarketOpen()) recordSpecToHistory(candidates);
  return candidates;
}
