// ═══════════════════ SPECULATIVE ENGINE ═════════════════════════
// ================================================================

function calcSpeculative() {
  const specDebug = {
    mode:'active',
    checked:0,
    kept:0,
    rejected:{price:0, volume:0, volatility:0, drop:0, earnings:0, data:0, macd:0, weekly:0, news:0, score:0, target:0, rr:0},
    watch:0,
  };

  const candidates = ALL_STOCKS
    .filter(s => state.prices[s.id]?.price > 0)
    .map(s => {
      const p   = state.prices[s.id];
      const ind = state.indicators[s.id];
      const pro = state.profiles[s.id];

      specDebug.checked++;
      if(!p?.price || !ind) { specDebug.rejected.data++; return null; }
      if(isMarketOpen() && !p.isReal) { specDebug.rejected.data++; return null; }

      const price  = p.price;
      const beta   = pro?.beta || s.beta || 1;
      const volR   = p.avgVolume>0 ? p.volume/p.avgVolume : 0;
      const change = p.change||0;
      const earnDays    = state.earnings[s.id]??999;
      const newsImpact  = getNewsImpact(s.id);
      const dataQuality = ind.dataLen || ind.closes?.length || 0; // ✅ العدد الحقيقي
      const atrPct = ind.atrPct||0;
      const roomToResistance = ind.resistance && ind.resistance > price
        ? (ind.resistance - price) / price * 100
        : 999;
      const minRoomToResistance = Math.max(4, atrPct * 0.9);
      const tooCloseToResistance = ind.resistance && roomToResistance < minRoomToResistance;

      // ══ شرط 1: السعر ليس معيار رفض؛ نرفض فقط الأسعار غير القابلة للتداول عمليًا
      if(price < 1) { specDebug.rejected.price++; return null; }

      // ══ شرط 1.5: سيولة كافية — مليون سهم يومياً على الأقل
      const avgVolSpec = p.avgVolume || pro?.avgVolume || 0;
      if(avgVolSpec > 0 && avgVolSpec < 350000) { specDebug.rejected.volume++; return null; }

      // ══ شرط 2: تقلب كافٍ (beta أو ATR)
      // ATR% يعكس التقلب الفعلي أفضل من beta
      const isVolatile = beta>=1.3 || atrPct>=1.8 || Math.abs(change) >= 4 || volR >= 1.8;
      if(!isVolatile) { specDebug.rejected.volatility++; return null; }

      // ══ شرط 3: لا هبوط حر بلا دعم واضح
      if(change < -15 && !ind.nearSupport) { specDebug.rejected.drop++; return null; }

      // ══ شرط 4: لا أرباح قريبة جداً (<5 أيام)
      if(earnDays <= 5) { specDebug.rejected.earnings++; return null; }

      // ══ شرط 4.5: خبر سلبي قوي يمنع المجازفة مباشرة
      if(newsImpact.block) { specDebug.rejected.news++; return null; }

      // ✅ شرط 5: بيانات كافية — 60 يوم على الأقل للمجازفة (أقل من التوصية)
      if(dataQuality < 35) { specDebug.rejected.data++; return null; }

      // ══ حساب النقاط — فكرة: الربح المحتمل vs الخسارة المحدودة
      let score = 0;
      const reasons = [];   // أسباب الاختيار بالعربي
      const warnings = [];  // تحذيرات

      // ── 1. إمكانية التضخم (ATR — يعكس التحرك اليومي الفعلي)
      if(atrPct >= 6)       { score+=24; reasons.push('ATR '+fmt(atrPct,1)+'% — قابلية انفجار عالية'); }
      else if(atrPct >= 4)  { score+=15; reasons.push('ATR '+fmt(atrPct,1)+'% — تذبذب عالٍ'); }
      else if(atrPct >= 2.5){ score+=8;  }

      // ── 2. Beta — حساسية للسوق
      if(beta>=2.5)         { score+=20; reasons.push('Beta '+fmt(beta,1)+' — يتحرك ضعف السوق'); }
      else if(beta>=2.0)    { score+=14; reasons.push('Beta '+fmt(beta,1)+' — تقلب جيد للمجازفة'); }
      else if(beta>=1.7)    { score+=8; }

      // ── 3. الاتجاه — لا نريد هبوطاً حراً
      // نريد: إما صاعد، أو ارتداد من قاع
      const trendUp   = ind.ma20!=null && ind.ma50!=null && ind.ma20 > ind.ma50;
      const aboveMa20 = ind.ma20!=null && price > ind.ma20;
      const bouncing  = ind.rsi!=null && ind.rsi<35 && ind.nearSupport; // ارتداد من قاع

      if(trendUp && aboveMa20) {
        score+=15;
        reasons.push('الاتجاه صاعد — فوق MA20 و MA20>MA50');
      } else if(bouncing) {
        score+=12;
        reasons.push('ارتداد محتمل — RSI'+fmt(ind.rsi)+'% عند الدعم');
      } else if(aboveMa20) {
        score+=6;
      } else if(!trendUp && !bouncing) {
        score-=8;
        warnings.push('الاتجاه غير واضح — تحقق من الرسم');
      }

      // ── 4. MACD Histogram — الزخم الحقيقي للمجازفة
      if(ind.macdHist!=null) {
        const hist    = ind.macdHist;
        const histDir = ind.macdHistDir;
        if(hist > 0 && histDir === 'expanding') {
          score+=18;
          reasons.push('MACD Hist +'+fmt(hist,2)+' ↑ — زخم شراء متصاعد');
        } else if(hist > 0 && histDir === 'crossing') {
          score+=16;
          reasons.push('MACD Hist عبر الصفر للأعلى — انعكاس زخم');
        } else if(hist > 0 && histDir === 'contracting') {
          score+=6;
          warnings.push('MACD Hist يضيق — الزخم يتراجع');
        } else if(hist < 0 && histDir === 'contracting') {
          // زخم بيعي يتقلص — فرصة محتملة لا عقوبة كاملة
          score-=4;
          warnings.push('MACD Hist سالب يتقلص — انتظر تأكيد التحول');
        } else if(hist < 0 && histDir === 'crossing') {
          // عبر الصفر للأسفل — خطر
          specDebug.rejected.macd++;
          return null;
        } else if(hist < 0 && histDir === 'expanding') {
          // زخم بيعي متصاعد — حجب فوري
          specDebug.rejected.macd++;
          return null;
        }
      } else if(ind.macd!=null) {
        // fallback للـ MACD البسيط إذا لا يوجد Histogram
        if(ind.macd>0) { score+=12; reasons.push('MACD صاعد — زخم شراء قصير المدى'); }
        else           { score-=5; }
      }

      // ── أسبوعي — لا مجازفة في هبوط أسبوعي حاد
      if(ind.weeklyTrend === 'bearish' && ind.weeklyMacdHist!=null && ind.weeklyMacdHist < -1) {
        // الأسبوعي هابط بقوة — حجب
        specDebug.rejected.weekly++;
        return null;
      } else if(ind.weeklyTrend === 'bullish') {
        score+=8;
        reasons.push('أسبوعي صاعد — الاتجاه الكبير في صالحك');
      }

      // ── 5. حجم التداول — اهتمام حقيقي
      if(volR>=3)       { score+=20; reasons.push('حجم ×'+fmt(volR,1)+' — اشتعال سيولة'); }
      else if(volR>=2)  { score+=14; reasons.push('حجم ×'+fmt(volR,1)+' — نشاط مرتفع'); }
      else if(volR>=1.5){ score+=5; }

      // ── 6. شموع — تأكيد بصري (المطرقة والابتلاع مضاعفة في المجازفة)
      const candles = detectCandlePatterns(ind.closes, ind.highs, ind.lows, ind.opens);
      const topCandle = candles[0] || null;
      candles.forEach(cp => {
        const cw = candleDecisionWeight(cp, {
          volR, nearSupport: ind.nearSupport,
          nearResistance: ind.nearResistance,
          tooCloseToResistance,
          trendUp, trendDown: !trendUp && !bouncing,
        });
        if(cw > 0) {
          // المطرقة والابتلاع الصاعد أقوى للمجازفة — نقاط مضاعفة
          const isBest = cp.name==='Hammer' || cp.name==='Bullish Engulfing' || cp.name==='Morning Star' || cp.name==='Dragonfly Doji';
          score += cw * (isBest ? 6 : 4);
          reasons.push('🕯 '+cp.ar+' — '+cp.tip);
        } else if(cw < 0) {
          score -= Math.abs(cw) * 5;
          warnings.push('🕯 '+cp.ar+' — '+cp.tip);
        }
      });

      // ── 7. عقوبات
      if(earnDays<=14)      { score-=8;  warnings.push('أرباح خلال '+earnDays+' يوم — تقلب مرتقب'); }
      if(newsImpact.level === 'neg') { score-=10; warnings.push('خبر سلبي مؤثر — انتظر هدوء الخبر'); }
      if(newsImpact.level === 'strongPos' && volR>=1.2) { score+=8; reasons.push('خبر إيجابي قوي مع حجم داعم'); }
      else if(newsImpact.level === 'pos') { score+=3; reasons.push('خبر إيجابي داعم'); }
      if(change>18 && !ind.nearSupport) { score-=12; warnings.push('ارتفع '+fmt(change,1)+'% — لا تطارد بدون Pullback'); }
      else if(change>8 && volR>=1.8)    { score+=6; reasons.push('اندفاع يومي مع حجم — مجازفة اشتعال'); }
      else if(change>12)                { score-=6; warnings.push('ارتفع '+fmt(change,1)+'% اليوم — راقب التراجع'); }
      if(ind.rsi!=null && ind.rsi>78) { score-=10; warnings.push('RSI مرتفع '+fmt(ind.rsi)+'% — تشبع شراء'); }
      if(tooCloseToResistance) { score-=15; warnings.push('قريب من المقاومة — مساحة '+fmt(roomToResistance,1)+'% فقط'); }

      score = Math.max(0, score);
      if(score < 22) { specDebug.rejected.score++; return null; }

      // ══ حساب وقف الخسارة والهدف — الأهم في المجازفة
      // وقف الخسارة: أسفل الدعم مباشرة أو 2×ATR
      const atrStop  = atrPct * 1.5; // مضبوط للمجازفة — خسارة محدودة
      const rawStop  = ind.support && ind.support < price
        ? Math.min(ind.support * 0.985, price*(1-atrStop/100))  // أسفل الدعم بـ 1.5%
        : price*(1-atrStop/100);
      const stopLoss = Math.max(rawStop, price*0.65); // حد أقصى -35%
      const lossPct  = (price-stopLoss)/price*100;

      // الهدف: مشتق من بنية السوق الحقيقية لا من ضرب الوقف
      // 1. المقاومة المؤكدة (أولوية قصوى)
      const resValidSpec = ind.resistance && ind.resistance > price*1.05;
      // 2. امتداد ATR × 2.5 ضمن أفق 3-5 أيام (واقعي للمجازفة)
      const atrExtTarget = price * (1 + (ind.atrPct||3) * 2.5 / 100);
      // 3. الحد الأدنى المقبول: 1.6:1 للمراقبة، 2.2:1 للدخول القوي
      const minRRTarget  = price * (1 + lossPct*1.6/100);

      // نختار الهدف: المقاومة إذا كانت أعلى من الحد الأدنى، وإلا ATR extension
      let target;
      if(resValidSpec && ind.resistance > minRRTarget) {
        target = ind.resistance; // هدف حقيقي من المقاومة
      } else if(atrExtTarget > minRRTarget) {
        target = atrExtTarget;   // هدف من ATR واقعي
      } else {
        specDebug.rejected.target++;
        return null; // لا يوجد هدف حقيقي — نرفض السهم
      }

      // إذا المقاومة بين السعر والهدف — لا نتجاوزها بدون كسر مؤكد
      if(!resValidSpec && ind.resistance && ind.resistance > price && ind.resistance < target) {
        target = ind.resistance * 0.97; // نقف قبل المقاومة بهامش أمان
      }

      const profitPct  = (target-price)/price*100;
      const riskReward = lossPct>0 ? profitPct/lossPct : 0;

      // رفض فقط إذا R/R ضعيف جداً، أما 1.0-1.7 فتظهر كمراقبة لا كدخول
      if(riskReward < 0.9) { specDebug.rejected.rr++; return null; }

      // ══ توقيت الدخول
      const distToSup = ind.support>0 ? (price-ind.support)/price*100 : 999;
      let entryTiming, entryNote;
      if(ind.nearSupport) {
        entryTiming = 'ادخل الآن';
        entryNote   = 'السعر عند الدعم $'+fmt(ind.support,2)+' — أفضل نقطة دخول';
      } else if(distToSup<=8) {
        entryTiming = 'مقبول';
        entryNote   = 'قريب من الدعم — يمكن الدخول أو انتظار $'+fmt(ind.support,2);
      } else if(distToSup<=18) {
        entryTiming = 'انتظر';
        entryNote   = 'انتظر تراجعاً نحو $'+fmt(ind.support,2)+' للدخول بأمان';
      } else {
        entryTiming = 'متأخر';
        entryNote   = 'بعيد عن الدعم — الدخول محفوف بالمخاطر';
      }

      const isWatch = tooCloseToResistance || score < 45 || riskReward < 1.45 || entryTiming === 'انتظر' || entryTiming === 'متأخر';
      const label = isWatch ? '👀 مراقبة مجازفة' :
        score>=80 ? '🚀 انفجار محتمل' :
        score>=65 ? '🔥 زخم قوي'      :
        score>=50 ? '⚡ فرصة نشطة'    :
                    '🎲 مجازفة';

      // تخصيص رأس المال: 5-10% حسب الجودة
      const allocPct = isWatch ? 0 : score>=70 ? 0.10 : score>=55 ? 0.07 : 0.05;
      if(isWatch) specDebug.watch++;

      return {
        ...s, price, change, volR, beta, atrPct,
        score, label, reasons, warnings, isWatch,
        rsi:ind.rsi, macd:ind.macd,
        macdHist:ind.macdHist, macdHistDir:ind.macdHistDir,
        weeklyTrend:ind.weeklyTrend,
        ma20:ind.ma20, ma50:ind.ma50, ma200:ind.ma200,
        support:ind.support, resistance:ind.resistance,
        newsImpact,
        roomToResistance, minRoomToResistance, tooCloseToResistance,
        nearSupport:ind.nearSupport,
        stopLoss, target, profitPct, lossPct, riskReward,
        allocPct, entryTiming, entryNote,
        earnDays, topCandle,
      };
    })
    .filter(Boolean)
    .sort((a,b) => {
      // ترتيب: R/R أولاً × score
      const valA = Math.min(a.riskReward, 4) * 18 + a.score * 0.35;
      const valB = Math.min(b.riskReward, 4) * 18 + b.score * 0.35;
      return valB - valA;
    })
    .slice(0, 10);

  state.speculativeRecs = candidates;
  specDebug.kept = candidates.length;
  state.specDebug = specDebug;
  state.specTime = new Date();
  if(candidates.length && isMarketOpen()) recordSpecToHistory(candidates);
  return candidates;
}

// ── جلب بيانات 5 دقائق وحساب VWAP + EMA + Higher Low + RVOL
async function fetchHunterData(sym) {
  try {
    const url = `${FMP_BASE}/stable/historical-chart/5min?symbol=${sym}&apikey=${API_KEY}`;
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 8000);
    const res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(timer);
    if (!res.ok) return null;
    const data = await res.json();
    if (!Array.isArray(data) || data.length < 6) return null;

    // شموع اليوم فقط — نستخدم توقيت نيويورك (السوق الأمريكي)
    const nyDate = new Date().toLocaleDateString('en-CA', {timeZone:'America/New_York'});
    const bars = data.filter(b => b.date && b.date.startsWith(nyDate)).reverse();
    if (bars.length < 6) return null;

    const closes = bars.map(b => +b.close);
    const highs  = bars.map(b => +b.high);
    const lows   = bars.map(b => +b.low);
    const vols   = bars.map(b => +b.volume || 0);

    // ── VWAP
    let sumPV = 0, sumV = 0;
    bars.forEach(b => {
      const tp = ((+b.high) + (+b.low) + (+b.close)) / 3;
      const v  = +b.volume || 0;
      sumPV += tp * v; sumV += v;
    });
    const vwap = sumV > 0 ? sumPV / sumV : null;

    // ── EMA9 و EMA21 على الإغلاقات
    const calcEMALocal = (arr, period) => {
      if (arr.length < period) return null;
      const k = 2 / (period + 1);
      let ema = arr.slice(0, period).reduce((a, b) => a + b, 0) / period;
      for (let i = period; i < arr.length; i++) ema = arr[i] * k + ema * (1 - k);
      return ema;
    };
    const ema9  = calcEMALocal(closes, 9);
    const ema21 = calcEMALocal(closes, 21);

    // ── Higher Low: آخر قاعين محليين
    let higherLow = false;
    const localLows = [];
    for (let i = 1; i < lows.length - 1; i++) {
      if (lows[i] < lows[i-1] && lows[i] < lows[i+1]) localLows.push(lows[i]);
    }
    if (localLows.length >= 2) {
      higherLow = localLows[localLows.length-1] > localLows[localLows.length-2];
    }

    // ── اختراق قمة آخر 15 دقيقة (3 شموع)
    const last3Highs = highs.slice(-4, -1);
    const breakout15 = last3Highs.length >= 3 &&
      closes[closes.length-1] > Math.max(...last3Highs);

    // ── RVOL حسب وقت الجلسة
    const avgVol = state.prices[sym]?.avgVolume || 0;
    const todayVol = vols.reduce((a, b) => a + b, 0);
    const sessionBars = 78; // عدد شموع 5 دقائق في يوم كامل
    const expectedVol = avgVol > 0 ? avgVol * (bars.length / sessionBars) : 0;
    const rvol = expectedVol > 0 ? todayVol / expectedVol : 0;

    // ── القوة النسبية vs SPY (30 دقيقة = 6 شموع)
    const last6 = closes.slice(-6);
    const stockReturn30 = last6.length >= 2
      ? (last6[last6.length-1] - last6[0]) / last6[0] * 100 : 0;
    const rs30 = stockReturn30 - (state.spyChange || 0);

    // ── MACD Histogram على 5 دقائق
    const macd5Hist = ema9 != null && ema21 != null ? ema9 - ema21 : null;

    // ── السعر الحالي vs VWAP
    const currentPrice = closes[closes.length-1];
    const aboveVwap = vwap && currentPrice > vwap;

    return {
      vwap, ema9, ema21, higherLow, breakout15,
      rvol, rs30, stockReturn30, macd5Hist,
      aboveVwap, currentPrice, bars
    };
  } catch(e) { return null; }
}

// ── حساب HunterScore لسهم واحد
async function calcHunterScore(stock) {
  const p   = state.prices[stock.id];
  const ind = state.indicators[stock.id];
  // Gainers خارج قائمتنا ليس لهم ind — نسمح لهم بالمرور بدرجة أساسية
  if (!p?.price) return null;
  if (!ind && !stock.isGainer) return null; // غير Gainer بدون ind = مرفوض

  const price = p.price;
  const newsImpact = getNewsImpact(stock.id);
  const rsi       = ind?.rsi       ?? null;
  const stochRsi  = ind?.stochRsi  ?? null;
  const bb_lower  = ind?.bb_lower  ?? null;
  const support   = ind?.support   ?? null;
  const resistance = ind?.resistance ?? null;
  const macdHist  = ind?.macdHist  ?? null;
  const macdHistDir = ind?.macdHistDir ?? null;
  const atrPct    = ind?.atrPct    ?? 3;

  const intra = await fetchHunterData(stock.id);

  let score = 0;
  const checks = {};

  // ══ المحور 1: إنهاك البيع (25 نقطة)
  // RSI < 30 ثم بدأ يرتفع
  const rsiExhaust = rsi != null && rsi < 30;
  checks.rsiExhaust = rsiExhaust;
  if (rsiExhaust) score += 7;

  // Stoch RSI يعبر للأعلى تحت 20
  const stochCross = stochRsi != null && stochRsi < 20;
  checks.stochCross = stochCross;
  if (stochCross) score += 5;

  // السعر خرج تحت BB ثم عاد داخله
  const bbReversal = bb_lower != null && price > bb_lower * 0.99 && price <= bb_lower * 1.02;
  checks.bbReversal = bbReversal;
  if (bbReversal) score += 5;

  // RVOL >= 2
  const rvolOk = intra && intra.rvol >= 2;
  checks.rvolOk = rvolOk;
  if (rvolOk) score += 4;

  // السعر عند دعم موثوق ضمن ATR واحد
  const atrVal = atrPct || 3;
  const nearSup = support && Math.abs(price - support) / price * 100 <= atrVal;
  checks.nearSup = nearSup;
  if (nearSup) score += 4;
  const roomToResistance = resistance && resistance > price ? (resistance - price) / price * 100 : 999;
  const tooCloseToResistance = resistance && roomToResistance < Math.max(2.5, atrVal * 0.7);
  checks.tooCloseToResistance = tooCloseToResistance;

  // ══ المحور 2: تأكيد الارتداد (35 نقطة)
  // استعادة VWAP
  const aboveVwap = intra?.aboveVwap || false;
  checks.aboveVwap = aboveVwap;
  if (aboveVwap) score += 8;

  // EMA9 > EMA21 على 5 دقائق
  const emaOk = intra?.ema9 != null && intra?.ema21 != null && intra.ema9 > intra.ema21;
  checks.emaOk = emaOk;
  if (emaOk) score += 6;

  // Higher Low على شموع 5 دقائق
  checks.higherLow = intra?.higherLow || false;
  if (checks.higherLow) score += 7;

  // اختراق قمة آخر 15 دقيقة
  checks.breakout15 = intra?.breakout15 || false;
  if (checks.breakout15) score += 7;

  // MACD Histogram 5 دقائق موجب
  const macd5Ok = intra?.macd5Hist != null && intra.macd5Hist > 0;
  checks.macd5Ok = macd5Ok;
  if (macd5Ok) score += 5;

  // MACD اليومي يتحسن (contracting سالب أو expanding موجب أو crossing)
  const macdDayOk = macdHist != null && (
    (macdHist > 0) ||
    (macdHist < 0 && macdHistDir === 'contracting') ||
    (macdHistDir === 'crossing')
  );
  checks.macdDayOk = macdDayOk;
  if (macdDayOk) score += 2;

  // ══ المحور 3: القوة النسبية vs SPY (20 نقطة)
  const rs30 = intra?.rs30 || 0;
  const stockRet = intra?.stockReturn30 || 0;
  let rsScore = 0;
  if (rs30 >= 2)       rsScore += 10;
  else if (rs30 >= 1)  rsScore += 7;
  else if (rs30 > 0)   rsScore += 4;
  // السهم أخضر والسوق أحمر
  if (stockRet > 0 && (state.spyChange || 0) < 0) rsScore += 6;
  // السهم يحافظ على قاعه والسوق يصنع قيعاناً جديدة
  if (checks.higherLow && state.marketTrend === 'bearish') rsScore += 4;
  checks.rsScore = Math.min(rsScore, 20);
  score += checks.rsScore;

  // ══ المحور 4: الحجم والسيولة (10 نقاط)
  // RVOL مع اختراق = تأكيد أقوى (لا تكرار — المحور 1 يحسب RVOL وحده)
  if (checks.breakout15 && intra?.rvol >= 1.5) score += 5; // اختراق بحجم
  else if (rvolOk) score += 3; // حجم مرتفع بدون اختراق
  if (p.avgVolume > 500000) score += 3; // سيولة كافية للتنفيذ
  if (p.avgVolume > 2000000) score += 2; // سيولة ممتازة

  // ══ مكافأة خاصة للسوق الهابط — أسهم تقاوم الهبوط
  if (state.marketTrend === 'bearish') {
    // السهم أخضر والسوق أحمر = مقاوم قوي
    if ((p.change || 0) > 0) score += 8;
    // السهم يهبط أقل من السوق
    else if ((p.change || 0) > (state.spyChange || -5)) score += 8;
    // Higher Low في السوق الهابط = إشارة قوية جداً
    if (checks.higherLow) score += 5;
  }
  // ══ مكافأة Gainer
  if (stock.isGainer) { score += 10; checks.isGainer = true; }

  // ══ تأثير الأخبار: لا نجعل الخبر وحده إشارة دخول، لكنه يمنع الأخبار السلبية القوية
  checks.newsRisk = newsImpact.level === 'criticalNeg' || newsImpact.level === 'neg';
  checks.newsBoost = newsImpact.level === 'strongPos' || newsImpact.level === 'pos';
  if(newsImpact.block) score -= 18;
  else if(newsImpact.level === 'neg') score -= 8;
  else if(newsImpact.level === 'strongPos' && (intra?.rvol || 0) >= 1.5) score += 6;
  else if(newsImpact.level === 'pos') score += 2;

  // ══ مكافأة: سهم هبط intraday ولكن مؤشراته جيدة (فرصة ارتداد سريع)
  const intradayDip = (p.change || 0) < -3
    && macdHist != null && macdHist > 0
    && (intra?.rvol || 0) >= 1.5;
  if (intradayDip) { score += 12; checks.intradayDip = true; }
  // الوقف: تحت آخر قاع صاعد − 0.2 × ATR
  const atrAbs  = price * atrVal / 100;
  const stopLoss = (support || price * 0.97) - (0.2 * atrAbs);
  const lossPct  = (price - stopLoss) / price * 100;

  // الهدف: VWAP أو مقاومة لحظية
  const rawTargetPrice = intra?.vwap && intra.vwap > price
    ? intra.vwap
    : ind?.resistance && ind.resistance > price * 1.02
      ? ind.resistance
      : price * (1 + atrVal * 2 / 100);
  const targetPrice = Math.max(rawTargetPrice, price * 1.015);

  const profitPct = (targetPrice - price) / price * 100;
  const rr = lossPct > 0 ? profitPct / lossPct : 0;

  let rrScore = 0;
  if (rr >= 2)       { rrScore += 6; }
  else if (rr >= 1.5){ rrScore += 4; }
  if (lossPct < atrVal * 1.5) rrScore += 2;
  if (!ind?.resistance || ind.resistance > price * 1.03) rrScore += 2;
  score += Math.min(rrScore, 10);

  // رفض إذا R/R أقل من الحد — أخف في السوق الصاعد الهادئ
  const rrMin = state.marketTrend === 'bearish' ? 1.5 : 1.2;
  if (rr < rrMin) return null;
  // عتبة النقاط — أخف ليلاً لأن المحور 2 (intraday) لا يعمل
  const scoreMin = isMarketOpen() ? 55 : 35;
  if (score < scoreMin) {
    if (score > 25) console.log(`[Hunter] ${stock.id}: score=${score} rr=${rr.toFixed(1)} rsi=${rsi}`);
    return null;
  }

  checks.rr = rr;
  checks.cleanMomentum = !!(aboveVwap && emaOk && (checks.higherLow || checks.breakout15));
  checks.safePullback = !!(nearSup && (rsiExhaust || bbReversal) && !checks.breakout15);
  checks.ignition = !!(aboveVwap && checks.breakout15 && (intra?.rvol || 0) >= 1.4 && rs30 >= -0.2 && !tooCloseToResistance);
  checks.readySoon = !!(!checks.ignition && (aboveVwap || checks.breakout15 || checks.higherLow) && (intra?.rvol || 0) >= 1.1 && rr >= 1.3 && !tooCloseToResistance);

  let action = 'راقب فقط';
  let actionTone = 'neutral';
  let actionNote = 'الإشارة ناقصة؛ انتظر اختراق واضح أو رجوع فوق VWAP.';
  let gainerClass = null;
  let gainerNote = null;

  if(score >= 70 && checks.ignition && rr >= 1.45) {
    action = 'ادخل الآن';
    actionTone = 'buy';
    actionNote = 'اشتعال لحظي: فوق VWAP + كسر 15 دقيقة + حجم داعم.';
  } else if(score >= 58 && (checks.ignition || checks.readySoon) && rr >= 1.3) {
    action = 'ادخل بشرط';
    actionTone = 'buy';
    actionNote = checks.ignition
      ? 'ادخل إذا ثبت 5 دقائق فوق الاختراق ولم يفقد VWAP.'
      : 'استعد: يحتاج ثبات فوق VWAP أو كسر آخر قمة.';
  } else if(score >= 65 && (checks.breakout15 || checks.higherLow) && rr >= 1.5) {
    action = 'لا تدخل الآن';
    actionTone = 'watch';
    actionNote = checks.breakout15
      ? 'انتظر ثبات السعر فوق الاختراق؛ لا تطارد شمعة طويلة.'
      : 'راقب اختراق آخر قمة 15 دقيقة أو رجوع فوق VWAP.';
  } else if(checks.safePullback && rr >= 1.5) {
    action = 'لا تدخل الآن';
    actionTone = 'watch';
    actionNote = 'قريب من الدعم، لكن لا يعتبر دخولًا حتى يعطي إشارة تنفيذ واضحة.';
  }

  if(newsImpact.block && actionTone === 'buy') {
    action = 'لا تدخل الآن';
    actionTone = 'watch';
    actionNote = 'خبر سلبي قوي يلغي الدخول حتى تهدأ الحركة ويتأكد السعر من جديد.';
  }

  if(stock.isGainer) {
    const overExtended = (p.change || 0) >= 18 && !nearSup && !checks.higherLow;
    const weakIntraday = !aboveVwap || (!emaOk && !checks.breakout15 && !checks.higherLow);
    if(actionTone === 'buy' && !overExtended && rr >= 1.7) {
      gainerClass = 'confirmed';
      gainerNote = '🔥 من أقوى 20 اليوم واجتاز شروط الصايد — ليس مجرد سهم مرتفع.';
    } else if(overExtended || weakIntraday || rr < 1.25) {
      gainerClass = 'chase';
      gainerNote = '🚫 Gainer لكنه قابل للمطاردة؛ انتظر Pullback أو ثبات فوق VWAP.';
      if(actionTone === 'buy') {
        action = 'لا تطارد';
        actionTone = 'neutral';
        actionNote = 'السهم من الرابحين لكن الدخول الآن متأخر أو غير مؤكد.';
      }
    } else {
      gainerClass = 'watch';
      gainerNote = '👀 من أقوى 20 اليوم؛ يحتاج تأكيد اختراق/ثبات قبل الدخول.';
    }
  }

  return {
    id: stock.id, name: stock.name, sector: stock.sector,
    price, change: p.change || 0,
    score: Math.min(score, 100), checks,
    rsi, stochRsi, support,
    vwap: intra?.vwap || null,
    ema9: intra?.ema9 || null,
    ema21: intra?.ema21 || null,
    rvol: intra?.rvol || 0,
    rs30, stockReturn30: intra?.stockReturn30 || 0,
    stopLoss, targetPrice, profitPct, lossPct, rr,
    atrPct: atrVal,
    marketTrend: state.marketTrend,
    newsImpact,
    action, actionTone, actionNote,
    isGainer: !!stock.isGainer,
    gainerRank: stock.gainerRank || null,
    gainerClass, gainerNote,
  };
}

function buildHunterRadar(existingIds=new Set(), limit=6) {
  const rows = [];
  for (const stock of ALL_STOCKS) {
    if (existingIds.has(stock.id)) continue;
    const p = state.prices[stock.id];
    const ind = state.indicators[stock.id];
    if (!p?.price || !ind) continue;

    const price = p.price;
    const atrPct = ind.atrPct || 3;
    const support = ind.support || null;
    const resistance = ind.resistance || null;
    const nearSup = support && Math.abs(price - support) / price * 100 <= atrPct * 1.25;
    const rsi = ind.rsi ?? null;
    const stochRsi = ind.stochRsi ?? null;
    const bbReversal = ind.bb_lower != null && price > ind.bb_lower * 0.985 && price <= ind.bb_lower * 1.035;
    const holdingBetterThanSpy = (p.change || 0) > (state.spyChange || 0) - 0.4;
    const volumeRatio = p.avgVolume ? (p.volume || 0) / p.avgVolume : 0;

    let radarScore = 30;
    if (nearSup) radarScore += 14;
    if (rsi != null && rsi < 45) radarScore += rsi < 35 ? 12 : 7;
    if (stochRsi != null && stochRsi < 40) radarScore += stochRsi < 20 ? 10 : 5;
    if (bbReversal) radarScore += 8;
    if (holdingBetterThanSpy) radarScore += 8;
    if (volumeRatio >= 1.5) radarScore += 7;
    if ((p.change || 0) > 0 && state.marketTrend !== 'bearish') radarScore += 4;

    const atrAbs = price * atrPct / 100;
    const stopLoss = (support || price * 0.97) - (0.2 * atrAbs);
    const lossPct = Math.max(0.1, (price - stopLoss) / price * 100);
    const targetPrice = resistance && resistance > price * 1.018
      ? resistance
      : price * (1 + atrPct * 1.7 / 100);
    const profitPct = (targetPrice - price) / price * 100;
    const rr = profitPct / lossPct;

    if (radarScore < 45 || rr < 1.05) continue;

    rows.push({
      id: stock.id, name: stock.name, sector: stock.sector,
      price, change: p.change || 0,
      score: Math.min(64, Math.round(radarScore)),
      checks: {
        rsiExhaust: rsi != null && rsi < 35,
        stochCross: stochRsi != null && stochRsi < 25,
        bbReversal,
        rvolOk: volumeRatio >= 1.5,
        nearSup,
        aboveVwap: false,
        emaOk: false,
        higherLow: false,
        breakout15: false,
        macd5Ok: false,
        macdDayOk: ind.macdHist != null && (ind.macdHist > 0 || ind.macdHistDir === 'contracting'),
        rsScore: holdingBetterThanSpy ? 6 : 0,
        rr,
      },
      rsi, stochRsi, support,
      vwap: null, ema9: null, ema21: null,
      rvol: volumeRatio, rs30: 0, stockReturn30: 0,
      stopLoss, targetPrice, profitPct, lossPct, rr,
      atrPct,
      marketTrend: state.marketTrend,
      action: 'رادار مراقبة',
      actionTone: 'watch',
      actionNote: 'قريب من شروط الصائد لكنه لم يؤكد VWAP أو الاختراق بعد.',
      isRadar: true,
      gainerClass: null,
      gainerNote: '👀 رادار مراقبة: لا دخول قبل رجوع فوق VWAP أو ظهور Higher Low بحجم داعم.',
    });
  }

  return rows
    .sort((a, b) => (b.score + b.rr * 4) - (a.score + a.rr * 4))
    .slice(0, limit);
}

// ── قائمة المرشحين المختصرة للتحديث السريع
function getHunterCandidates() {
  return ALL_STOCKS.filter(s => {
    const ind = state.indicators[s.id];
    const p   = state.prices[s.id];
    if (!ind || !p) return false;
    // أسهم ظهرت سابقاً في النتائج
    if ((state.hunterRecs||[]).some(r => r.id === s.id)) return true;
    if (ind?.rsi != null && ind.rsi < 40) return true;
    if (ind?.nearSupport) return true;
    return false;
  });
}

// ── جلب After Hours للمرشحين فقط
async function fetchAftermarketData(candidates) {
  if (!candidates || candidates.length === 0) return;
  await Promise.all(candidates.map(async stock => {
    try {
      const res  = await fetch(`${FMP_BASE}/stable/aftermarket-quote?symbol=${stock.id}&apikey=${API_KEY}`, { signal: AbortSignal.timeout(5000) });
      const data = await res.json();
      const d = Array.isArray(data) ? data[0] : data;
      if (d && d.price) {
        state.aftermarket = state.aftermarket || {};
        state.aftermarket[stock.id] = {
          price:  +d.price  || null,
          change: +d.changesPercentage || 0,
          volume: +d.volume || 0,
        };
      }
    } catch(e) {}
  }));
}

// ── وضع الصيد الليلي — بيانات يومية فقط بدون intraday
async function calcHunterNight() {
  if (!state.indicatorsDone) return;
  console.log('[Hunter] 🌙 دورة ليلية...');

  const results = [];
  const gainers = await fetchBiggestGainers();
  const gainerMap = new Map(gainers.map(g => [g.id, g]));
  const ourIds = new Set(ALL_STOCKS.map(s => s.id));
  for (const g of gainers) {
    state.prices[g.id] = {
      ...(state.prices[g.id] || {}),
      price: g.price,
      change: g.change,
      volume: g.volume,
      avgVolume: state.prices[g.id]?.avgVolume || g.volume,
      isReal: true,
      isGainer: true,
    };
  }
  const nightStocks = ALL_STOCKS.map(s => {
    const g = gainerMap.get(s.id);
    return g ? {...s, isGainer:true, gainerRank:g.gainerRank, gainerChange:g.change, gainerVolume:g.volume} : s;
  });
  const externalGainers = gainers.filter(g => !ourIds.has(g.id));

  for (const stock of nightStocks) {
    const p   = state.prices[stock.id];
    const ind = state.indicators[stock.id];
    if (!p?.price || !ind) continue;

    const price = p.price;
    const { rsi, stochRsi, bb_lower, support, resistance, macdHist, macdHistDir, atrPct } = ind;

    let score = 0;
    const checks = {};

    // ══ إنهاك البيع (30 نقطة) — أثقل ليلاً
    const rsiOk = rsi != null && rsi < 35;
    checks.rsiExhaust = rsiOk;
    if (rsiOk)                            score += 15; // RSI تشبع بيع → قوي جداً
    else if (rsi != null && rsi < 45)     score += 8;  // RSI منخفض نسبياً
    else if (rsi != null && rsi < 55)     score += 3;  // RSI متوسط

    const stochOk = stochRsi != null && stochRsi < 25;
    checks.stochCross = stochOk;
    if (stochOk)                          score += 8;
    else if (stochRsi != null && stochRsi < 40) score += 3;

    const bbOk = bb_lower != null && price <= bb_lower * 1.02;
    checks.bbReversal = bbOk;
    if (bbOk) score += 7;

    const atrVal = atrPct || 3;
    const nearSup = support && Math.abs(price - support) / price * 100 <= atrVal;
    checks.nearSup = nearSup;
    if (nearSup) score += 5;  // عند الدعم — فرصة دخول

    // ══ MACD يومي (30 نقطة) — الأهم ليلاً
    checks.macdDayOk = false;
    if (macdHist != null) {
      if (macdHist > 0 && macdHistDir === 'expanding')        { score += 30; checks.macdDayOk = true; }
      else if (macdHistDir === 'crossing')                     { score += 25; checks.macdDayOk = true; }
      else if (macdHist > 0)                                   { score += 18; checks.macdDayOk = true; }
      else if (macdHist < 0 && macdHistDir === 'contracting')  { score += 12; checks.macdDayOk = true; }
      else if (macdHist < 0 && macdHistDir === 'expanding')    { score -= 5;  } // هابط يتوسع = عقوبة
    }

    // ══ الاتجاه الأسبوعي (15 نقطة)
    if (ind.weeklyTrend === 'bullish') score += 15;
    else if (ind.weeklyTrend === 'bearish') score -= 8;

    if (stock.isGainer) {
      score += 14;
      checks.isGainer = true;
    }

    // ══ جودة الصفقة R/R (15 نقطة)
    const atrAbs   = price * atrVal / 100;
    const stopLoss = (support || price * 0.97) - (0.2 * atrAbs);
    const lossPct  = (price - stopLoss) / price * 100;
    const targetPrice = resistance && resistance > price * 1.02
      ? resistance
      : price * (1 + atrVal * 2 / 100);
    const profitPct = (targetPrice - price) / price * 100;
    const rr = lossPct > 0 ? +(profitPct / lossPct).toFixed(2) : 0;

    if (rr >= 2.5)      score += 15;
    else if (rr >= 2)   score += 10;
    else if (rr >= 1.5) score += 6;

    // عتبة الليل — موحدة 40 نقطة
    const threshold = state.marketTrend === 'bearish' ? 30 : 40;
    if (score < threshold) continue;
    if (rr < 1.3) continue; // R/R أدنى حد

    let action = 'راقب فقط';
    let actionTone = 'neutral';
    let actionNote = 'تحليل ليلي؛ انتظر افتتاح السوق لتأكيد VWAP والحجم اللحظي.';
    let gainerClass = null;
    let gainerNote = null;
    if(stock.isGainer) {
      const chaseRisk = (p.change || 0) >= 18 && !nearSup;
      gainerClass = chaseRisk ? 'chase' : (score >= 70 && rr >= 1.5 ? 'confirmed' : 'watch');
      gainerNote = chaseRisk
        ? '🚫 من أقوى 20 اليوم لكنه مرتفع بقوة؛ لا تطارد قبل Pullback.'
        : gainerClass === 'confirmed'
          ? '🔥 من أقوى 20 اليوم ونجح في فلتر الصايد الليلي.'
          : '👀 من أقوى 20 اليوم؛ يحتاج تأكيد الافتتاح وVWAP.';
      action = chaseRisk ? 'لا تطارد' : (gainerClass === 'confirmed' ? 'راقب افتتاح قوي' : 'Gainer مراقبة');
      actionTone = chaseRisk ? 'neutral' : (gainerClass === 'confirmed' ? 'watch' : 'support');
      actionNote = chaseRisk
        ? 'السهم قوي يوميًا لكن الدخول الآن متأخر.'
        : 'إذا افتتح فوق VWAP ومع حجم مرتفع يتحول لصيد فعلي.';
    }

    results.push({
      id: stock.id, name: stock.name, sector: stock.sector,
      price, change: p.change || 0,
      score: Math.min(score, 100), checks,
      rsi, stochRsi, support, resistance,
      vwap: null, ema9: null, ema21: null,
      rvol: 0, rs30: 0, stockReturn30: 0,
      stopLoss: +stopLoss.toFixed(2),
      targetPrice: +targetPrice.toFixed(2),
      profitPct: +profitPct.toFixed(1),
      lossPct: +lossPct.toFixed(1),
      rr, atrPct: atrVal,
      marketTrend: state.marketTrend,
      isNight: true, // 🌙 علامة التحليل الليلي
      isGainer: !!stock.isGainer,
      gainerRank: stock.gainerRank || null,
      gainerClass, gainerNote,
      action, actionTone, actionNote,
      _rawScore: score, // للتحقق من المرشحين
    });
  }

  externalGainers.forEach(g => {
    const chaseRisk = (g.change || 0) >= 18;
    const score = Math.max(45, Math.min(72, 45 + Math.min(Math.max(g.change || 0, 0), 20) + (g.volume > 2000000 ? 7 : 0)));
    results.push({
      id: g.id, name: g.name, sector: 'FMP Gainers',
      price: g.price, change: g.change || 0,
      score, checks:{isGainer:true},
      rsi:null, stochRsi:null, support:null, resistance:null,
      vwap:null, ema9:null, ema21:null,
      rvol:0, rs30:0, stockReturn30:0,
      stopLoss:+(g.price * 0.96).toFixed(2),
      targetPrice:+(g.price * 1.06).toFixed(2),
      profitPct:6,
      lossPct:4,
      rr:1.5,
      atrPct:4,
      marketTrend:state.marketTrend,
      isNight:true,
      isGainer:true,
      gainerRank:g.gainerRank,
      gainerClass:chaseRisk?'chase':'watch',
      gainerNote:chaseRisk
        ? '🚫 من أقوى 20 FMP لكنه خارج قائمتك ومرتفع بقوة؛ لا تطارد.'
        : '👀 سهم جديد من أقوى 20 FMP خارج قائمتك؛ يحتاج تأكيد مؤشرات عند الافتتاح.',
      action:chaseRisk?'لا تطارد':'Gainer جديد',
      actionTone:chaseRisk?'neutral':'watch',
      actionNote:'ظهر من اشتراك FMP. أضفه للقائمة فقط إذا تكرر أو أعطى تأكيد VWAP وحجم.',
      _rawScore:score,
    });
  });

  // ── جلب After Hours للمرشحين (score >= 30)
  const ahCandidates = results.filter(r => r._rawScore >= 30);
  if (ahCandidates.length > 0 && !isMarketOpen()) {
    await fetchAftermarketData(ahCandidates);
    ahCandidates.forEach(r => {
      const ah = state.aftermarket?.[r.id];
      if (!ah) return;
      if (ah.change > 2 && ah.volume > 500000)     { r.score = Math.min(r.score + 10, 100); r.ahBonus = true; }
      else if (ah.change > 0 && ah.volume > 200000) { r.score = Math.min(r.score + 5, 100); }
      else if (ah.change < -3)                       { r.score = Math.max(r.score - 10, 0); }
      r.aftermarket = ah;
    });
  }

  results.sort((a, b) => {
    const boost = x => x.isGainer ? (x.gainerClass === 'chase' ? 8 : 28) : 0;
    return (b.score + boost(b)) - (a.score + boost(a));
  });
  state.hunterRecs = results;
  state.hunterTime = new Date();
  console.log('[Hunter] 🌙 ليلية اكتملت:', results.length, 'فرصة');
}

// ── جلب Biggest Gainers من السوق كله
async function fetchBiggestGainers() {
  try {
    const res  = await fetch(`${FMP_BASE}/stable/biggest-gainers?apikey=${API_KEY}`, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    if (!Array.isArray(data)) return [];

    // FMP biggest-gainers أحياناً لا يرجع volume؛ لا نرمي السهم قبل محاولة quote
    const base = data
      .filter(s => s.symbol && +s.price >= 1 && +s.price <= 200)
      .slice(0, 25);

    const quoteMap = {};
    const symbols = base.map(s => s.symbol).filter(Boolean);
    for(let i=0; i<symbols.length; i+=25) {
      const batch = symbols.slice(i, i+25).join(',');
      try {
        const qres = await fetch(`${FMP_BASE}/stable/quote?symbol=${batch}&apikey=${API_KEY}`, { signal: AbortSignal.timeout(8000) });
        const qdata = await qres.json();
        if(Array.isArray(qdata)) {
          qdata.forEach(q => { if(q?.symbol) quoteMap[q.symbol] = q; });
        }
      } catch(e) {}
    }

    const filtered = base
      .map((s, idx) => {
        const q = quoteMap[s.symbol] || {};
        const price = +(q.price ?? s.price ?? 0);
        const volume = +(q.volume ?? s.volume ?? 0);
        const change = +(q.changePercentage ?? q.changesPercentage ?? s.changesPercentage ?? 0);
        return {
        id:     s.symbol,
        name:   q.name || s.name || s.symbol,
        sector: 'Gainers',
        cat:    'mid',
        beta:   1.5, // افتراضي
        price,
        change,
        volume,
        volumeKnown: volume > 0,
        gainerRank: idx + 1,
        isGainer: true, // علامة
      };
    })
      .filter(s => s.price >= 1 && s.price <= 200)
      .slice(0, 20);

    console.log('[Gainers] طلع:', filtered.length, 'سهم | volume known:', filtered.filter(x=>x.volumeKnown).length);
    return filtered;
  } catch(e) {
    console.warn('[Gainers] error:', e.message);
    return [];
  }
}

// ── الدورة الكاملة: كل الأسهم (افتتاح + منتصف)
async function calcHunterFull() {
  if (!state.indicatorsDone) return;
  console.log('[Hunter] دورة كاملة...');

  // ── جلب Gainers وإضافتهم للمسح
  const gainers = isMarketOpen() ? await fetchBiggestGainers() : [];

  // دمج Gainers مع قائمتنا — نتجنب التكرار، ونعلّم أسهم قائمتنا إذا ظهرت ضمن أقوى 20
  const ourIds      = new Set(ALL_STOCKS.map(s => s.id));
  const gainerMap   = new Map(gainers.map(g => [g.id, g]));
  const extraStocks = gainers.filter(g => !ourIds.has(g.id));

  // حدّث أسعار كل Gainer حتى لو كان داخل قائمتنا
  for (const g of gainers) {
    state.prices[g.id] = {
      ...(state.prices[g.id] || {}),
      price: g.price,
      change: g.change,
      volume: g.volume,
      avgVolume: state.prices[g.id]?.avgVolume || g.volume,
      isReal: true,
      isGainer: true,
    };
  }
  // نحذف Gainers الذين ليس لهم مؤشرات — نبقى بالقوة النسبية فقط
  // calcHunterScore سيتعامل معهم بـ intraday فقط إذا ما عندهم ind
  const markedStocks = ALL_STOCKS.map(s => {
    const g = gainerMap.get(s.id);
    return g ? {...s, isGainer:true, gainerRank:g.gainerRank, gainerChange:g.change, gainerVolume:g.volume} : s;
  });
  const allStocks = [...markedStocks, ...extraStocks];
  const BATCH = 5;
  const results = [];
  for (let i = 0; i < allStocks.length; i += BATCH) {
    const batch = allStocks.slice(i, i + BATCH);
    const res = await Promise.all(batch.map(s => calcHunterScore(s)));
    res.forEach(r => { if (r) results.push(r); });
    if (i + BATCH < allStocks.length) await new Promise(r => setTimeout(r, 400));
  }
  results.sort((a, b) => {
    const boost = x => x.isGainer ? (x.gainerClass === 'chase' ? 8 : 28) : 0;
    return (b.score + boost(b)) - (a.score + boost(a));
  });
  const existingIds = new Set(results.map(r => r.id));
  const radar = results.length < 6 ? buildHunterRadar(existingIds, 6 - results.length) : [];
  state.hunterRecs = [...results, ...radar];
  state.hunterTime = new Date();
  console.log('[Hunter] كاملة:', results.length, 'فرصة + رادار', radar.length);
}

// ── الدورة السريعة: المرشحون فقط
async function calcHunterQuick() {
  if (!state.indicatorsDone || !isMarketOpen()) return;
  const candidates = getHunterCandidates();
  if (candidates.length === 0) return;
  console.log('[Hunter] سريعة:', candidates.length, 'مرشح...');
  const results = [];
  for (let i = 0; i < candidates.length; i += 5) {
    const batch = candidates.slice(i, i + 5);
    const res = await Promise.all(batch.map(s => calcHunterScore(s)));
    res.forEach(r => { if (r) results.push(r); });
    if (i + 5 < candidates.length) await new Promise(r => setTimeout(r, 300));
  }
  // ندمج النتائج الجديدة مع القديمة — الجديدة تحل محل القديمة
  const oldResults = (state.hunterRecs || []).filter(
    r => !candidates.some(c => c.id === r.id)
  );
  const merged = [...results, ...oldResults];
  merged.sort((a, b) => {
    const boost = x => x.isGainer ? (x.gainerClass === 'chase' ? 8 : 28) : 0;
    return (b.score + boost(b)) - (a.score + boost(a));
  });
  const existingIds = new Set(merged.map(r => r.id));
  const radar = merged.length < 6 ? buildHunterRadar(existingIds, 6 - merged.length) : [];
  state.hunterRecs = [...merged, ...radar];
  state.hunterTime = new Date();
  render();
}

// ── بدء loop الصائد
let _hunterInterval = null;
function startHunterLoop() {
  if (_hunterInterval) clearInterval(_hunterInterval);
  _hunterInterval = setInterval(async () => {
    if (isMarketOpen()) await calcHunterQuick();
  }, HUNTER_REFRESH_MIN * 60 * 1000);
}

let _specInterval = null;
function startSpecLoop() {
  if (_specInterval) clearInterval(_specInterval);
  _specInterval = setInterval(async () => {
    if (isMarketOpen() && state.indicatorsDone) {
      const refreshMin = getActiveRefreshMin();
      const last = state.recsTime || state.specTime || null;
      const elapsed = last ? (Date.now() - new Date(last).getTime()) / 60000 : refreshMin;
      if(elapsed < refreshMin) return;
      await fetchMarketTrend();
      await fetchNews();
      calcRecs();
      calcSpeculative();
      render();
    }
  }, 60 * 1000);
}

  if (state.marketTrend === 'bearish' && state.indicatorsDone && !isMarketOpen()) {
    await calcHunterNight();
  }
  render();

  // إذا التوصيات مقفلة (محفوظة من اليوم) — فقط حدّث الأسعار بدون إعادة حساب

    if(state.indicatorsDone) {
      // المؤشرات موجودة — حدّث الأسعار في البطاقات فقط
      state.recs = state.recs.map(r => {
        const p = state.prices[r.id];
        if(!p?.price) return r;
        return { ...r, price:p.price, change:p.change, high:p.high, low:p.low, volume:p.volume };
      });
    } else {
      // المؤشرات غير محمّلة — حمّلها لكن لا تُعيد الحساب
      const neverLoaded = !state.indicatorsDone && !_indicatorsLoading;
      if(neverLoaded && !_indicatorsLoading) {
        _indicatorsLoading = true;
        render();
        await fetchIndicators();
        _indicatorsLoading = false;
        // حدّث الأسعار فقط — لا calcRecs
        state.recs = state.recs.map(r => {
          const p = state.prices[r.id];
          if(!p?.price) return r;
          return { ...r, price:p.price, change:p.change, high:p.high, low:p.low, volume:p.volume };
        });
      }
    }
    // الصائد مستقل عن قفل التوصيات، لأنه محرك لحظي يتغير أثناء السوق.
    if(state.indicatorsDone) {
      if(isMarketOpen()) {
        await calcHunterFull();
        startHunterLoop();
        startSpecLoop();
      } else {
        await calcHunterNight();
      }
    }
    render();
    return;
  }

  // تحميل المؤشرات: عند فتح السوق أو أول مرة (للصائد الليلي)
  const session     = getSessionInfo();
  const neverLoaded = !state.indicatorsDone && !_indicatorsLoading;
  const shouldLoad  = (isMarketOpen() || neverLoaded) && !state.indicatorsDone && !_indicatorsLoading;

  if(shouldLoad) {
    _indicatorsLoading = true;
    render();

    await fetchIndicators();

    // ── حساب فقط لو السوق لا يزال مفتوحاً
    if(isMarketOpen()) {
      calcRecs();
      calcSpeculative();
    } else {
      // السوق مغلق — شغّل الصائد الليلي بعد اكتمال المؤشرات
      await calcHunterNight();
    }
    render();

    await Promise.all([
      fetchNews(),
      fetchEarnings(),
      fetchProfiles(),
    ]).catch(e => console.warn('[loadData] secondary fetch error:', e.message));

    _indicatorsLoading = false;
    // الصائد — كامل لو مفتوح، ليلي لو مغلق
    if(isMarketOpen()) {
      calcRecs();
      calcSpeculative();
      await calcHunterFull();
      startHunterLoop();
      startSpecLoop();
      // جلب Price Target للتوصيات والمجازفة
      const allRecs = [...(state.recs||[]), ...(state.speculativeRecs||[])];
      if(allRecs.length > 0) await fetchPriceTargets(allRecs);
    } else {
      await calcHunterNight();
    }
    render();
    console.log('[loadData] اكتمل — توصيات:', state.recs?.length, '| مجازفة:', state.speculativeRecs?.length, '| صائد:', state.hunterRecs?.length);

  } else if(neverLoaded && !_indicatorsLoading) {
    _indicatorsLoading = true;
    render();
    await fetchIndicators();
    _indicatorsLoading = false;
    await calcHunterNight();
    render();

  } else if(state.indicatorsDone) {
    // المؤشرات جاهزة — فقط حدّث الأسعار
    if(state.recs) {
      state.recs = state.recs.map(r => {
        const p = state.prices[r.id];
        if(!p?.price) return r;
        return { ...r, price:p.price, change:p.change, high:p.high, low:p.low, volume:p.volume };
      });
    }
    if(isMarketOpen()) {
      await calcHunterFull();
      startHunterLoop();
      startSpecLoop();
    } else {
      await calcHunterNight();
    }
  }

  render();
}

// ── كشف 12 نمط شمعة يابانية حقيقي مع OHLC كامل
function detectCandlePatterns(closes, highs, lows, opens) {
  if (!closes || closes.length < 3) return [];
  if (!opens || opens.length !== closes.length) return []; // نوقف الحساب إذا open مفقود

  const n   = closes.length;
  const patterns = [];

  // بيانات آخر 3 شمعات — open حقيقي من البيانات
  const C0 = closes[n-1], H0 = highs[n-1], L0 = lows[n-1], O0 = opens[n-1];
  const C1 = closes[n-2], H1 = highs[n-2], L1 = lows[n-2], O1 = opens[n-2];
  const C2 = n>=4 ? closes[n-3] : C1;
  const H2 = n>=4 ? highs[n-3]  : H1;
  const L2 = n>=4 ? lows[n-3]   : L1;
  const O2 = n>=4 ? opens[n-3]  : O1;

  const body0 = Math.abs(C0-O0), range0 = H0-L0 || 0.0001;
  const body1 = Math.abs(C1-O1), range1 = H1-L1 || 0.0001;
  const body2 = Math.abs(C2-O2), range2 = H2-L2 || 0.0001;

  const bull0 = C0>O0, bear0 = C0<O0;
  const bull1 = C1>O1, bear1 = C1<O1;
  const bull2 = C2>O2, bear2 = C2<O2;

  const upperShadow0 = bull0 ? H0-C0 : H0-O0;
  const lowerShadow0 = bull0 ? O0-L0 : C0-L0;
  const upperShadow1 = bull1 ? H1-C1 : H1-O1;
  const lowerShadow1 = bull1 ? O1-L1 : C1-L1;
  const recent = closes.slice(Math.max(0, n-8), n);
  const prev   = closes.slice(Math.max(0, n-8), n-1);
  const avgRange = Math.max(0.0001, highs.slice(-10).reduce((sum,h,i)=>{
    const l = lows[lows.length - Math.min(10, highs.length) + i] ?? h;
    return sum + Math.max(0.0001, h-l);
  },0) / Math.max(1, Math.min(10, highs.length)));
  const avgBody = Math.max(0.0001, closes.slice(-10).reduce((sum,c,i)=>{
    const o = opens[opens.length - Math.min(10, closes.length) + i] ?? c;
    return sum + Math.abs(c-o);
  },0) / Math.max(1, Math.min(10, closes.length)));
  const prevHigh5 = Math.max(...prev.slice(-5));
  const prevLow5  = Math.min(...prev.slice(-5));
  const downtrend = prev.length >= 4 && (
    prev[prev.length-1] < prev[0] * 0.97 ||
    prev.slice(-4).filter((v,i,a)=> i>0 && v < a[i-1]).length >= 2
  );
  const uptrend = prev.length >= 4 && (
    prev[prev.length-1] > prev[0] * 1.03 ||
    prev.slice(-4).filter((v,i,a)=> i>0 && v > a[i-1]).length >= 2
  );
  const meaningfulRange = range0 >= avgRange * 0.55;
  const meaningfulBody  = body0 >= avgBody * 0.55;
  const closesUpperPart = (C0 - L0) / range0 >= 0.62;
  const closesLowerPart = (H0 - C0) / range0 >= 0.62;

  // ─ 1. DOJI (جسم < 5% من النطاق)
  if (meaningfulRange && body0/range0 < 0.05)
    patterns.push({name:'Doji', ar:'دوجي', icon:'⊕', color:'#ffe033',
      signal:'neutral', strength:2,
      tip:'تردد بين البائعين والمشترين — انتظر شمعة تأكيد'});

  // ─ 2. HAMMER (ذيل سفلي طويل، جسم صغير في الأعلى، في اتجاه هابط)
  if (meaningfulRange && lowerShadow0/range0 >= 0.55 && body0/range0 <= 0.35 && upperShadow0/range0 <= 0.25 && closesUpperPart) {
    if (downtrend || C0 <= prevLow5*1.03)
      patterns.push({name:'Hammer', ar:'المطرقة', icon:'🔨', color:'#00ff88',
        signal:'bullish', strength: downtrend ? 5 : 4,
        tip:'ارتداد صاعد قوي — المشترون دافعوا السعر للأعلى بقوة'});
  }

  // ─ 3. SHOOTING STAR (ذيل علوي طويل، جسم صغير في الأسفل)
  if (meaningfulRange && upperShadow0/range0 >= 0.55 && body0/range0 <= 0.35 && lowerShadow0/range0 <= 0.25 && closesLowerPart) {
    if (uptrend || C0 >= prevHigh5*0.97)
      patterns.push({name:'Shooting Star', ar:'النجم الساقط', icon:'🌠', color:'#ff2d7a',
        signal:'bearish', strength: uptrend ? 5 : 4,
        tip:'انعكاس هبوطي — البائعون ردوا السعر للأسفل بعد الارتفاع'});
  }

  // ─ 4. BULLISH ENGULFING
  if (meaningfulBody && bull0 && bear1 && C0 >= O1 && O0 <= C1 && body0 > body1*1.15 && body1 >= avgBody*0.35 && (downtrend || C1 <= prevLow5*1.04))
    patterns.push({name:'Bullish Engulfing', ar:'الابتلاع الصاعد', icon:'🟢', color:'#00ff88',
      signal:'bullish', strength:5,
      tip:'انعكاس صاعد قوي — الشمعة الخضراء ابتلعت الحمراء كاملاً'});

  // ─ 5. BEARISH ENGULFING
  if (meaningfulBody && bear0 && bull1 && O0 >= C1 && C0 <= O1 && body0 > body1*1.15 && body1 >= avgBody*0.35 && (uptrend || C1 >= prevHigh5*0.96))
    patterns.push({name:'Bearish Engulfing', ar:'الابتلاع الهابط', icon:'🔴', color:'#ff2d7a',
      signal:'bearish', strength:5,
      tip:'انعكاس هبوطي قوي — الشمعة الحمراء ابتلعت الخضراء كاملاً'});

  // ─ 6. MORNING STAR (3 شمعات: هبوط → دوجي/صغيرة → صعود)
  if (n >= 4 && meaningfulBody && downtrend && bear2 && body1/range1 < 0.35 && bull0 && C0 > (O2+C2)/2)
    patterns.push({name:'Morning Star', ar:'نجمة الصباح', icon:'⭐', color:'#00ff88',
      signal:'bullish', strength:5,
      tip:'نمط انعكاس صاعد من 3 شمعات — إشارة قوية جداً'});

  // ─ 7. EVENING STAR (3 شمعات: صعود → دوجي/صغيرة → هبوط)
  if (n >= 4 && meaningfulBody && uptrend && bull2 && body1/range1 < 0.35 && bear0 && C0 < (O2+C2)/2)
    patterns.push({name:'Evening Star', ar:'نجمة المساء', icon:'🌆', color:'#ff2d7a',
      signal:'bearish', strength:5,
      tip:'نمط انعكاس هبوطي من 3 شمعات — إشارة تحذير قوية'});

  // ─ 8. THREE WHITE SOLDIERS (3 شمعات خضراء متتالية بأجسام كبيرة)
  if (n >= 4 && meaningfulBody && bull0 && bull1 && bull2 &&
      body0 > range0*0.5 && body1 > range1*0.5 && body2 > range2*0.5 &&
      C0 > C1 && C1 > C2)
    patterns.push({name:'Three White Soldiers', ar:'الجنود الثلاثة', icon:'🚀', color:'#00ff88',
      signal:'bullish', strength:5,
      tip:'زخم صاعد استثنائي — 3 شمعات خضراء قوية متتالية'});

  // ─ 9. THREE BLACK CROWS (3 شمعات حمراء متتالية)
  if (n >= 4 && meaningfulBody && bear0 && bear1 && bear2 &&
      body0 > range0*0.5 && body1 > range1*0.5 &&
      C0 < C1 && C1 < C2)
    patterns.push({name:'Three Black Crows', ar:'الغربان الثلاثة', icon:'🐦‍⬛', color:'#ff2d7a',
      signal:'bearish', strength:5,
      tip:'زخم هبوطي قوي — 3 شمعات حمراء متتالية بأجسام كبيرة'});

  // ─ 10. MARUBOZU BULLISH (جسم كبير جداً، ذيول قصيرة جداً)
  if (meaningfulRange && bull0 && body0/range0 > 0.85 && body0/O0 > 0.015)
    patterns.push({name:'Marubozu Bullish', ar:'ماروبوزو صاعد', icon:'💚', color:'#00ff88',
      signal:'bullish', strength:4,
      tip:'شمعة خضراء كاملة بلا ذيول — ضغط شراء قوي طوال الجلسة'});

  // ─ 11. MARUBOZU BEARISH
  if (meaningfulRange && bear0 && body0/range0 > 0.85 && body0/O0 > 0.015)
    patterns.push({name:'Marubozu Bearish', ar:'ماروبوزو هابط', icon:'🔴', color:'#ff2d7a',
      signal:'bearish', strength:4,
      tip:'شمعة حمراء كاملة بلا ذيول — ضغط بيع قوي طوال الجلسة'});

  // ─ 12. DRAGONFLY DOJI (ذيل سفلي طويل فقط — إشارة انعكاس صاعد)
  if (meaningfulRange && body0/range0 < 0.07 && lowerShadow0 > range0*0.6 && upperShadow0 < range0*0.12 && (downtrend || C0 <= prevLow5*1.03))
    patterns.push({name:'Dragonfly Doji', ar:'دوجي اليعسوب', icon:'🔵', color:'#00c8ff',
      signal:'bullish', strength:3,
      tip:'المشترون استردوا السيطرة من القاع — انعكاس صاعد محتمل'});

  // أقوى نمطين فقط (تجنب الفوضى)
  const directional = patterns.filter(p => p.signal !== 'neutral');
  const finalPatterns = directional.length ? directional : patterns;
  return finalPatterns
    .sort((a,b) => b.strength - a.strength)
    .slice(0,2);
}

function candleDecisionWeight(pattern, ctx={}) {
  if(!pattern) return 0;
  const volR = ctx.volR ?? 1;
  const nearSupport = !!ctx.nearSupport;
  const nearResistance = !!ctx.nearResistance || !!ctx.tooCloseToResistance;
  const trendUp = !!ctx.trendUp;
  const trendDown = !!ctx.trendDown;
  let w = pattern.strength >= 5 ? 2 : 1;

  if(pattern.signal === 'bullish') {
    if(nearSupport) w += 1;
    if(volR >= 1.5) w += 1;
    if(nearResistance) w -= 2;
    if(trendDown && !nearSupport) w -= 1;
  } else if(pattern.signal === 'bearish') {
    if(nearResistance) w += 1;
    if(volR >= 1.5) w += 1;
    if(nearSupport) w -= 1;
    if(trendUp && !nearResistance) w -= 1;
    w = -w;
  } else {
    return 0;
  }
  return Math.max(-3, Math.min(3, w));
}

// ── مؤشر القوة النسبية مقارنة بـ SPY
function calcRelativeStrength(stockChange, spyChange) {
  if (spyChange === null || spyChange === undefined) return null;
  const diff = (stockChange || 0) - (spyChange || 0);
  let label, color, score;
  if      (diff >=  3) { label='قوة استثنائية';  color='#00ff88'; score= 20; }
  else if (diff >=  1) { label='أقوى من السوق';  color='#00c8ff'; score= 12; }
  else if (diff >= -1) { label='مع السوق';        color='#7888aa'; score=  0; }
  else if (diff >= -3) { label='أضعف من السوق';  color='#ff7a00'; score= -8; }
  else                  { label='ضعيف جداً';       color='#ff2d7a'; score=-15; }
  return { diff: +diff.toFixed(2), label, color, score };
}

// ── رسم الشموع اليابانية مع OHLC كامل
function renderCandleChart(closes, highs, lows, opens) {
  if (!closes || closes.length < 5) return null;

  const rawC = closes.slice(-16);
  const rawH = highs ? highs.slice(-16) : rawC;
  const rawL = lows  ? lows.slice(-16)  : rawC;
  const rawO = opens ? opens.slice(-16) : rawC.map((c,i) => i===0 ? c : rawC[i-1]);
  const n    = rawC.length;

  // بيانات كل شمعة — open حقيقي
  const candles = rawC.map((c, i) => {
    const o  = rawO[i] || (i === 0 ? c : rawC[i-1]);
    const h  = rawH[i] || Math.max(c, o);
    const l  = rawL[i] || Math.min(c, o);
    return { o, c, h, l, bull: c >= o };
  });

  const allH    = candles.map(c=>c.h);
  const allL    = candles.map(c=>c.l);
  const maxP    = Math.max(...allH) * 1.001;
  const minP    = Math.min(...allL) * 0.999;
  const range   = maxP - minP || 1;
  const chartH  = 64;

  function yPx(price) { return ((maxP - price) / range) * chartH; }

  const patterns = detectCandlePatterns(closes, highs, lows);
  const topPat   = patterns[0] || null;

  return el('div', {style:{marginBottom:'8px'}}, [
    // ─ عنوان + اسم النمط
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'4px'}}, [
      el('div', {style:{fontSize:'9px', color:C.text3}}, ['🕯 الشموع اليابانية ('+n+' يوم)']),
      topPat ? el('div', {style:{
        fontSize:'9px', fontWeight:'800', color:topPat.color,
        background:topPat.color+'18', borderRadius:'4px', padding:'2px 7px',
        border:'1px solid '+topPat.color+'33',
      }}, [topPat.icon+' '+topPat.ar]) : null,
    ]),

    // ─ رسم SVG للشموع
    (() => {
      const W = 280, H = chartH + 8;
      const cW = Math.floor(W / n);
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svg.setAttribute('width',  '100%');
      svg.setAttribute('height', String(H));
      svg.style.cssText = 'display:block;background:#060b14;border-radius:8px;border:1px solid #1a2340;';

      candles.forEach((cd, i) => {
        const x   = i * cW + cW/2;
        const col = cd.bull ? '#00ff88' : '#ff2d7a';
        const col2= cd.bull ? '#00ff8855' : '#ff2d7a55';
        const bodyT = yPx(Math.max(cd.o, cd.c)) + 4;
        const bodyB = yPx(Math.min(cd.o, cd.c)) + 4;
        const bodyH = Math.max(bodyB - bodyT, 2);
        const wickT = yPx(cd.h) + 4;
        const wickB = yPx(cd.l) + 4;

        // ظل (wick)
        const wick = document.createElementNS('http://www.w3.org/2000/svg','line');
        wick.setAttribute('x1', x); wick.setAttribute('x2', x);
        wick.setAttribute('y1', wickT); wick.setAttribute('y2', wickB);
        wick.setAttribute('stroke', col2); wick.setAttribute('stroke-width','1');
        svg.appendChild(wick);

        // جسم (body)
        const bw = Math.max(cW - 3, 3);
        const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
        rect.setAttribute('x',      x - bw/2);
        rect.setAttribute('y',      bodyT);
        rect.setAttribute('width',  bw);
        rect.setAttribute('height', bodyH);
        rect.setAttribute('fill',   col);
        rect.setAttribute('rx',     '1');
        svg.appendChild(rect);
      });

      // خط MA على الرسم
      if (closes.length >= 5) {
        const maPath = candles.map((_, i) => {
          if (i < 4) return null;
          const slice = candles.slice(i-4, i+1).map(c=>c.c);
          const ma = slice.reduce((a,b)=>a+b,0)/slice.length;
          const px = yPx(ma) + 4;
          const x2 = i * cW + cW/2;
          return i===4 ? `M ${x2} ${px}` : `L ${x2} ${px}`;
        }).filter(Boolean).join(' ');
        if (maPath) {
          const path = document.createElementNS('http://www.w3.org/2000/svg','path');
          path.setAttribute('d', maPath);
          path.setAttribute('stroke', '#00c8ff55');
          path.setAttribute('stroke-width','1');
          path.setAttribute('fill','none');
          svg.appendChild(path);
        }
      }

      return svg;
    })(),

    // ─ الأنماط المكتشفة
    patterns.length > 0 ? el('div', {style:{
      marginTop:'5px', display:'flex', flexDirection:'column', gap:'3px',
    }}, patterns.map(p =>
      el('div', {style:{
        fontSize:'9px', color:p.color, lineHeight:'1.5',
        paddingRight:'2px',
      }}, [p.icon+' '+p.ar+' — '+p.tip])
    )) : null,
  ]);
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem('rec_history')||'[]'); } catch(e) { return []; }
}

function saveHistory(h) {
  const data = h.slice(-500);
  try { localStorage.setItem('rec_history', JSON.stringify(data)); } catch(e) {}
  if(window._fbReady) window._fbSaveHistory(data).catch(()=>{});
}

// ── تسجيل توصيات اليوم في السجل (يُستدعى بعد calcRecs)
function recordRecsToHistory(recs, forceSession) {
  if(!recs||!recs.length) return;
  // ✅ لا تسجيل خارج وقت السوق — أسعار الـ cache لا تُمثّل إشارة حقيقية
  if(!isMarketOpen()) return;
  const history = loadHistory();
  const now     = new Date();
  const today   = now.toDateString();

  // تحديد الجلسة: يُمرر صراحةً أو يُحسب من الوقت
  const t       = getMarketTimes();
  const m       = getNowMins();
  const session = forceSession || ((m >= t.midDay && m <= t.midDay+60) ? 'منتصف' : 'افتتاح');

  recs.forEach(r => {
    // لا تكرار لنفس السهم في نفس الجلسة من نفس اليوم
    const exists = history.some(h =>
      h.id === r.id &&
      new Date(h.recDate).toDateString() === today &&
      h.session === session
    );
    if(exists) return;
    history.push({
      id:         r.id,
      type:       'rec',                // ← توصية عادية
      name:       r.name,
      sector:     r.sector,
      session,                          // 'افتتاح' أو 'منتصف'
      recDate:    now.toISOString(),
      recPrice:   r.price,
      target:     r.target,
      stopLoss:   r.stopLoss,
      signal:     r.signal,
      confidence: r.confidence,
      spyChange:  state.spyChange,      // حالة السوق وقت التوصية
      marketTrend:state.marketTrend,
      result:     'pending',
      resultDate: null,
      resultPrice:null,
      pnlPct:     null,
    });
  });
  saveHistory(history);
}

// ── تحديث نتائج التوصيات المعلقة
function updateHistoryResults() {
  const history = loadHistory();
  let changed = false;
  history.forEach(h => {
    if(h.result !== 'pending') return;
    const cur = state.prices[h.id]?.price;
    if(!cur || !(h.recPrice || h.price)) return;
    if(!h.recPrice && h.price) h.recPrice = h.price; // دعم السجل القديم
    const pnlPct = ((cur - h.recPrice)/h.recPrice*100);
    const daysSince = (Date.now()-new Date(h.recDate))/(1000*60*60*24);

    // اعتبر الصفقة منتهية إذا:
    // - لمست الهدف أو وقف الخسارة
    // - أو مضى عليها 5 أيام (تداول يومي)
    const hitTarget = h.target   && cur >= h.target;
    const hitStop   = h.stopLoss && cur <= h.stopLoss;
    const expired   = daysSince >= 5;

    if(hitTarget || hitStop || expired) {
      h.result      = pnlPct >= 0 ? 'win' : 'loss';
      h.resultDate  = new Date().toISOString();
      h.resultPrice = cur;
      h.pnlPct      = +pnlPct.toFixed(2);
      changed = true;
    } else {
      // تحديث P&L الحالي
      h.pnlPct = +pnlPct.toFixed(2);
    }
  });
  if(changed) saveHistory(history);
  return history;
}

// ── إحصائيات السجل
function calcHistoryStats(history) {
  const closed  = history.filter(h=>h.result!=='pending');
  const wins    = closed.filter(h=>h.result==='win');
  const losses  = closed.filter(h=>h.result==='loss');
  const pending = history.filter(h=>h.result==='pending');
  const winRate = closed.length ? Math.round(wins.length/closed.length*100) : 0;
  const avgWin  = wins.length
    ? +(wins.reduce((s,h)=>s+(h.pnlPct||0),0)/wins.length).toFixed(2) : 0;
  const avgLoss = losses.length
    ? +(losses.reduce((s,h)=>s+(h.pnlPct||0),0)/losses.length).toFixed(2) : 0;
  const expectancy = closed.length
    ? +((winRate/100)*avgWin + (1-winRate/100)*avgLoss).toFixed(2) : 0;
  return { closed:closed.length, wins:wins.length, losses:losses.length,
           pending:pending.length, winRate, avgWin, avgLoss, expectancy };
}

        }}, [
          el('div', {style:{fontSize:'22px', fontWeight:'900',
            color:fStats.expectancy>=0?C.green:C.pink}},
            [(fStats.expectancy>=0?'+':'')+fStats.expectancy+'%']),
          el('div', {style:{fontSize:'9px', color:C.text3, marginTop:'2px'}}, ['التوقع الرياضي']),
          el('div', {style:{fontSize:'9px', color:C.text2}}, ['لكل صفقة']),
        ]),

      fStats.closed > 0 && el('div', {style:{marginBottom:'8px'}}, [

          el('span', {style:{fontSize:'9px', color:C.text3}}, ['معدل النجاح']),

            [fStats.closed+' مغلقة • '+fStats.pending+' معلقة']),
        ]),
        el('div', {style:{height:'5px', background:'#1a2340', borderRadius:'3px'}}, [
          el('div', {style:{height:'5px', borderRadius:'3px', width:fStats.winRate+'%',
            background:`linear-gradient(90deg,${C.green},${C.blue})`}}),
        ]),
      ]),
      // مقارنة الجلستين
      (() => {
        const open = history.filter(h=>h.session==='افتتاح');
        const mid  = history.filter(h=>h.session==='منتصف');
        if(!open.length && !mid.length) return null;
        const oS = calcHistoryStats(open);
        const mS = calcHistoryStats(mid);
        return el('div', {style:{
          display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px',
          background:'rgba(255,255,255,.02)', borderRadius:'8px', padding:'8px',
        }}, [
          el('div', {style:{textAlign:'center'}}, [
            el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'3px'}}, ['🌅 الافتتاح']),

      el('button', {
        style:{flex:'1', fontSize:'12px', fontWeight:'800', padding:'8px', borderRadius:'10px',

      el('button', {
        style:{flex:'1', fontSize:'12px', fontWeight:'800', padding:'8px', borderRadius:'10px',
          color: state.histType==='spec' ? '#050810' : C.text2,

          style:{
            fontSize:'10px', fontWeight:'700', padding:'5px 10px',
            borderRadius:'7px', flexShrink:'0',

            background: state.histFilter===f ? C.blue : 'rgba(255,255,255,.05)',

      el('div', {style:{flex:'1'}}),
      // تصدير CSV
      history.length > 0 && el('button', {
        style:{
          fontSize:'10px', fontWeight:'700', color:C.green,
          background:'rgba(0,255,136,.08)', border:'1px solid rgba(0,255,136,.25)',
          borderRadius:'7px', padding:'5px 10px',

      }, ['⬇️ CSV']),
      // مسح
      history.length > 0 && el('button', {

          border:'1px solid rgba(255,45,122,.25)', borderRadius:'7px', padding:'5px 10px',
        },
        onClick: () => {
          if(confirm('حذف كل السجل؟')) {
            localStorage.removeItem('rec_history');
            if(window._fbReady) window._fbSaveHistory([]).catch(()=>{});
            state.histFilter='all'; render();
          }
        },
      }, ['🗑️']),
    ].filter(Boolean)),

    // ─ قائمة التوصيات
    recent.length === 0
      ? el('div', {style:{textAlign:'center', padding:'40px 20px', color:C.text2, fontSize:'12px'}}, [
          el('div', {style:{fontSize:'32px', marginBottom:'8px'}}, ['📭']),

        ])
      : el('div', {}, recent.map(h => {
          const isPending = h.result === 'pending';
          const isWin     = h.result === 'win';
          const clr       = isPending ? C.yellow : isWin ? C.green : C.pink;
          const icon      = isPending ? '⏳' : isWin ? '✅' : '❌';
          const cur       = state.prices[h.id]?.price;
          const sesColor  = h.session==='افتتاح' ? C.blue : h.session==='منتصف' ? C.orange : C.text3;

          return el('div', {style:{

            borderRadius:'10px', padding:'10px 12px', marginBottom:'6px',
          }}, [
            el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}, [
              el('div', {style:{flex:'1'}}, [
                el('div', {style:{display:'flex', alignItems:'center', gap:'5px', marginBottom:'2px', flexWrap:'wrap'}}, [
                  el('span', {style:{fontSize:'13px', fontWeight:'800', color:C.text}}, [h.name]),
                  el('span', {style:{fontSize:'9px', color:C.text3}}, [h.id]),
                  // badge الجلسة
                  h.session && el('span', {style:{
                    fontSize:'8px', fontWeight:'700', color:sesColor,
                    background:sesColor+'15', borderRadius:'3px', padding:'1px 5px',
                    border:'1px solid '+sesColor+'33',
                  }}, [h.session==='افتتاح'?'🌅 افتتاح':'🌇 منتصف']),
                  el('span', {style:{
                    fontSize:'8px', fontWeight:'700', color:clr,
                    background:clr+'15', borderRadius:'3px', padding:'1px 5px',
                  }}, [icon+' '+(isPending?'معلقة':isWin?'ربح':'خسارة')]),
                ]),
                el('div', {style:{fontSize:'9px', color:C.text3}}, [
                  '📅 '+fmtDate(h.recDate)+' • $'+fmt(h.recPrice,2)+
                  (h.resultDate?' → '+fmtDate(h.resultDate):''),
                ]),
                el('div', {style:{fontSize:'9px', color:C.text2, marginTop:'1px'}}, [
                  (h.signal||'')+(h.confidence!=null?' '+h.confidence+'% ثقة':'')+
                  (h.spyChange!=null?' • SPY '+(h.spyChange>=0?'+':'')+h.spyChange+'%':''),
                ]),
              ]),
              el('div', {style:{textAlign:'left', minWidth:'58px'}}, [
                el('div', {style:{fontSize:'14px', fontWeight:'900',
                  color:(h.pnlPct||0)>=0?C.green:C.pink}},
                  [h.pnlPct!=null?(h.pnlPct>=0?'+':'')+h.pnlPct+'%':'—']),
                isPending && cur && el('div', {style:{fontSize:'9px', color:C.text3}},
                  ['$'+fmt(cur,2)]),
                h.target && el('div', {style:{fontSize:'8px', color:C.text3}},
                  ['🎯$'+fmt(h.target,2)]),
                h.stopLoss && el('div', {style:{fontSize:'8px', color:C.text3}},
                  ['🛑$'+fmt(h.stopLoss,2)]),
              ]),
            ]),
            // شريط تقدم السعر
            isPending && h.target && h.stopLoss && cur && (() => {
              const pct = Math.min(100,Math.max(0,
                (cur-h.stopLoss)/(h.target-h.stopLoss)*100));
              return el('div', {style:{marginTop:'6px'}}, [
                el('div', {style:{height:'3px', background:'#1a2340', borderRadius:'2px'}}, [
                  el('div', {style:{height:'3px', borderRadius:'2px', width:pct+'%',
                    background:`linear-gradient(90deg,${C.pink},${C.yellow},${C.green})`}}),
                ]),
                el('div', {style:{display:'flex', justifyContent:'space-between',
                  fontSize:'8px', color:C.text3, marginTop:'2px'}}, [
                  el('span',{},['🛑'+fmt(h.stopLoss,2)]),
                  el('span',{style:{color:C.text2}},[Math.round(pct)+'%']),
                  el('span',{},['🎯'+fmt(h.target,2)]),
                ]),
              ]);
            })(),
          ]);
        })),
  ]);
}

// ── معالج الأخطاء العالمي — يمنع الشاشة السوداء
window.onerror = function(msg, src, line, col, err) {
  console.error('[Global Error]', msg, 'line:', line);
  const appEl = document.getElementById('app');
  if(appEl && appEl.innerHTML === '') {
    appEl.innerHTML = `
      <div style="padding:30px;text-align:center;color:#fff;font-family:sans-serif">
        <div style="font-size:40px;margin-bottom:12px">⚠️</div>
        <div style="font-size:14px;color:#ff7a00;margin-bottom:8px">خطأ في التطبيق</div>
        <div style="font-size:11px;color:#888;margin-bottom:16px">${msg}</div>
        <button onclick="location.reload()" style="background:#0a1020;border:1px solid #3a4560;color:#00c8ff;padding:10px 20px;border-radius:8px;font-size:12px">🔄 إعادة التحميل</button>
      </div>`;
  }
  return false;
};

window.onunhandledrejection = function(e) {
  console.error('[Unhandled Promise]', e.reason);
};

function render() {
  try {
    const root = app();
    if(!root) { console.error('[render] لا يوجد div#app'); return; }
    root.innerHTML = '';
    root.appendChild(renderApp());
    if(!state.animatedRecs) state.animatedRecs = new Set();
    if(state.recs) state.recs.forEach(r => state.animatedRecs.add(r.id));
  } catch(e) {
    console.error('[render] خطأ:', e.message, e.stack);
  }
}

function renderApp() {
  return el('div', {id:'main', style:{
    display:'flex', flexDirection:'column',
    minHeight:'100vh', paddingBottom:'60px',
  }}, [
    renderHeader(),
    renderTicker(),
    renderDataCheck(),
    renderMacdBar(),
    renderRiskPanel(),
    renderContent(),
    renderBottomNav(),
    // ── صفحة تحليل السهم الكاملة (overlay)
    state.selectedStock && (() => {
      const s   = ALL_STOCKS.find(x=>x.id===state.selectedStock);
      const p   = state.prices[state.selectedStock];
      const ind = state.indicators[state.selectedStock];
      if(!s) return null;
      // ✅ إذا لا يوجد سعر أو مؤشرات — نعرض صفحة بسيطة
      if(!p || !ind) return el('div', {style:{
        position:'fixed', top:0, left:0, right:0, bottom:0,
        background:'#050810', zIndex:500,
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        direction:'rtl',
      }}, [
        el('div', {style:{fontSize:'20px', marginBottom:'8px'}}, ['⏳']),
        el('div', {style:{fontSize:'14px', color:C.text, marginBottom:'4px'}}, [s.name]),
        el('div', {style:{fontSize:'11px', color:C.text2, marginBottom:'16px'}}, ['جاري تحميل البيانات...']),
        el('button', {
          style:{background:'rgba(255,255,255,.08)', border:'1px solid #1a2340',
            borderRadius:'8px', padding:'8px 16px', color:C.text, cursor:'pointer'},
          onClick:()=>{ state.selectedStock=null; render(); }
        }, ['✕ رجوع']),
      ]);
      const volR = p.avgVolume>0 ? p.volume/p.avgVolume : 0;
      return renderStockPage(s, p, ind, volR);
    })(),
  ]);
}

// ── Data Check Bar
function renderDataCheck() {
  // نحفظ آخر قراءة للمؤشرات في state لعرضها حتى بعد إغلاق السوق
  const dc = state.dataCheck;

  // إذا لم تُحمّل أي مؤشرات ولا يوجد cache — أخفِ المربع
  const hasAnyData = dc.rsi.real > 0 || dc.prices.real > 0;
  if(!hasAnyData && !_indicatorsLoading) return el('div',{},[]);
  const items = [
    {label:'أسعار', real:dc.prices.real, total:dc.prices.total},
    {label:'RSI',   real:dc.rsi.real,    total:dc.rsi.total},
    {label:'MACD',  real:dc.macd.real,   total:dc.macd.total},
    {label:'MA20',  real:dc.ma.real,     total:dc.ma.total},
    {label:'MA200', real:dc.ma200?.real||0, total:dc.ma200?.total||dc.ma.total},
    {label:'دعم',   real:dc.support.real,total:dc.support.total},
    {label:'ATR',   real:dc.atr.real,    total:dc.atr.total},
    {label:'BB',    real:dc.bb.real,     total:dc.bb.total},
  ];

  if(_indicatorsLoading) {
    return el('div', {style:{
      background:'#0a1020', borderBottom:'1px solid var(--border)',
      padding:'8px 16px',
      display:'flex', alignItems:'center', gap:'8px',
    }}, [
      el('div', {style:{
        width:'14px', height:'14px', border:'2px solid #00c8ff44',
        borderTop:'2px solid #00c8ff', borderRadius:'50%',
        animation:'spin 1s linear infinite', flexShrink:0,
      }}),
      el('span', {style:{fontSize:'11px', color:C.blue}}, [
        '⏳ جاري تحميل المؤشرات... (~45 ثانية)'
      ]),
    ]);
  }

  const session    = getSessionInfo();
  const indTime    = state.indicatorsTime;  // وقت آخر تحميل مؤشرات
  const isClosed   = !isMarketOpen() && !_indicatorsLoading;

  return el('div', {style:{
    background:'#060b14', borderBottom:'1px solid var(--border)',
    padding:'6px 16px',
  }}, [
    el('div', {style:{
      display:'grid', gridTemplateColumns:'repeat(4,1fr)',
      gap:'4px', marginBottom: isClosed && indTime ? '5px' : '0',
    }},
    items.map(item => {
      const pct  = item.total>0 ? (item.real/item.total*100) : 0;
      const ok   = pct >= 80;
      const warn = pct >= 50;
      const color= ok ? C.green : warn ? C.yellow : C.pink;
      return el('div', {style:{
        background:'#0a1020', borderRadius:'6px',
        padding:'3px 6px', textAlign:'center',
        border:`1px solid ${color}22`,
      }}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, [item.label]),
        el('div', {style:{fontSize:'10px', fontWeight:'700', color}}, [
          item.real+'/'+item.total
        ]),
      ]);
    })
    ),
    // شريط الحالة — يظهر فقط عند إغلاق السوق مع بيانات محفوظة
    isClosed && indTime ? el('div', {style:{
      display:'flex', alignItems:'center', justifyContent:'space-between',
      marginTop:'5px', padding:'4px 8px',
      background:'rgba(255,224,51,0.05)',
      border:'1px solid rgba(255,224,51,0.15)',
      borderRadius:'6px',
    }}, [
      el('span', {style:{fontSize:'10px', color:C.yellow}}, [
        '🕐 بيانات محفوظة — السوق مغلق'
      ]),
      el('span', {style:{fontSize:'10px', color:C.text3}}, [
        'آخر تحميل: ' + new Date(indTime).toLocaleTimeString('ar', {hour:'2-digit', minute:'2-digit'})
      ]),
    ]) : null,
  ]);
}
