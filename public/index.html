@keyframes spin{to{transform:rotate(360deg)}}
.pulse{animation:pulse 1.5s ease-in-out infinite}

// وقت السوق الأمريكي بالدقائق من منتصف الليل UTC
function getMarketTimes() {
  const now = new Date();
  const isSummer = (() => {
    const y = now.getUTCFullYear();
    const start = new Date(Date.UTC(y,2,8)); start.setUTCDate(8-(start.getUTCDay()||7)+7);
    const end   = new Date(Date.UTC(y,10,1)); end.setUTCDate(1+(7-end.getUTCDay())%7);
    return now >= start && now < end;
  })();
  return {
    // Pre-Market: 4:00ص - 4:30م سعودي (صيف: UTC 01:00-13:30)
    preOpen:  isSummer ? 60   : 120,   // 4:00ص  / 5:00ص  سعودي
    open:     isSummer ? 810  : 870,   // 4:30م  / 5:30م  سعودي
    close:    isSummer ? 1200 : 1260,  // 11:00م / 12:00ص سعودي
    // After Hours: 11:00م - 1:00ص سعودي (صيف: UTC 20:00-22:00)
    afterEnd: isSummer ? 1320 : 1380,  // 1:00ص  / 2:00ص  سعودي
    midDay:   isSummer ? 960  : 1020,  // 7:00م  / 8:00م  سعودي
    isSummer,
  };
}

function getNowMins() {
  const now = new Date();
  return now.getUTCHours()*60 + now.getUTCMinutes();
}

// ── حالة السوق الأربع
function getMarketSession() {
  if(window.DEBUG_MARKET) return 'open';
  const t = getMarketTimes();
  const m = getNowMins();

  // السوق مفتوح
  if(m >= t.open && m < t.close) return 'open';

  // Pre-Market (صباحاً قبل الفتح)
  if(m >= t.preOpen && m < t.open) return 'pre';

  // After Hours — نتعامل مع منتصف الليل
  // afterEnd قد يتجاوز 1440 (24 ساعة) في الشتاء
  if(t.afterEnd <= 1440) {
    // لا يتجاوز منتصف الليل — شيك عادي
    if(m >= t.close && m < t.afterEnd) return 'after';
  } else {
    // يتجاوز منتصف الليل — نشيك على جزئين
    const afterEndAdj = t.afterEnd - 1440; // الوقت بعد منتصف الليل
    if(m >= t.close || m < afterEndAdj) return 'after';
  }

  return 'closed';
}

function isMarketOpen() {
  return getMarketSession() === 'open';
}

// ── معلومات حالة السوق للعرض
function getSessionInfo() {
  const session = getMarketSession();
  const t = getMarketTimes();
  const tz = t.isSummer ? 'صيف' : 'شتاء';
  switch(session) {
    case 'open':
      return {
        label:  'السوق مفتوح',
        sub:    `4:30م - 11:00م ${tz}`,
        color:  '#00ff88',
        dot:    true,
        canRec: true,   // يمكن التوصية
      };
    case 'pre':
      return {
        label:  'ما قبل الافتتاح',
        sub:    `يفتح ${t.isSummer?'4:30م':'5:30م'} ${tz}`,
        color:  '#ffe033',
        dot:    false,
        canRec: false,
      };
    case 'after':
      return {
        label:  'بعد الإغلاق',
        sub:    `ينتهي ${t.isSummer?'1:00ص':'2:00ص'} ${tz}`,
        color:  '#ff7a00',
        dot:    false,
        canRec: false,
      };
    default:
      return {
        label:  'السوق مغلق',
        sub:    `يفتح ${t.isSummer?'4:30م':'5:30م'} ${tz}`,
        color:  '#7888aa',
        dot:    false,
        canRec: false,
      };
  }
}

const $ = id => document.getElementById(id);
const app = () => $('app');

function el(tag, props={}, children=[]) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => {
    if(k==='style' && typeof v==='object') Object.assign(e.style, v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  (Array.isArray(children)?children:[children]).forEach(c => {
    if(c===null||c===undefined||c===false) return;
    e.appendChild(typeof c==='string'||typeof c==='number'
      ? document.createTextNode(c) : c);
  });
  return e;
}

function txt(t, style={}) {
  return el('span', {style}, [String(t??'')]);
}

function fmt(n, d=2) {
  if(n===null||n===undefined||isNaN(n)) return '—';
  return Number(n).toFixed(d);
}

function fmtPrice(n) {
  if(!n) return '—';
  return '$'+Number(n).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
}

// ── 0. اتجاه السوق العام (SPY + QQQ)
async function fetchMarketTrend() {
  try {
    const fetchOne = async (sym) => {
      // نجرب stable ثم v3
      for(const url of [
        `${FMP_BASE}/stable/quote?symbol=${sym}&apikey=${API_KEY}`,
        `${FMP_BASE}/api/v3/quote/${sym}?apikey=${API_KEY}`,
      ]) {
        try {
          const res  = await fetch(url);
          const data = await res.json();
          const item = Array.isArray(data) ? data[0] : data;
          const chg  = parseFloat(item?.changePercentage ?? item?.changesPercentage ?? item?.change ?? NaN);
          if(!isNaN(chg)) return chg;
        } catch(e) { continue; }
      }
      return null;
    };

    const [spy, qqq] = await Promise.all([fetchOne('SPY'), fetchOne('QQQ')]);

    if(spy !== null) state.spyChange = spy;
    if(qqq !== null) state.qqqChange = qqq;

    if(state.spyChange !== null && state.qqqChange !== null) {
      const avg = (state.spyChange + state.qqqChange) / 2;
      // هابط حقيقي: متوسط أقل من -1.5% (تصحيح قوي)
      // صاعد: متوسط أكثر من +0.3%
      // محايد: بينهما (تذبذب طبيعي)
      state.marketTrend =
        avg >= 0.3  ? 'bullish'  :
        avg <= -1.5 ? 'bearish'  :
                      'neutral';
      console.log('[Market] SPY:'+state.spyChange+'% QQQ:'+state.qqqChange+'% avg:'+avg.toFixed(2)+'% → '+state.marketTrend);
    }
    }
  } catch(e) { console.warn('[Market] error:', e.message); }
}


async function fetchPrices() {
  state.loadingPrices = true;
  state.dataCheck.prices.total = ALL_STOCKS.length;
  state._priceError = null;

  const symbols = ALL_STOCKS.map(s=>s.id);
  const BATCH   = 50;
  let proxyOk   = false;
  let fmpOk     = false;

  function storeProxy(q) {
    const price = parseFloat(q.regularMarketPrice);
    if(!q.symbol || !(price > 0)) return false;
    state.prices[q.symbol] = {
      price, isReal: true,
      change:    parseFloat(q.regularMarketChangePercent || 0),
      high:      parseFloat(q.regularMarketDayHigh  || price*1.01),
      low:       parseFloat(q.regularMarketDayLow   || price*0.99),
      volume:    parseInt(q.regularMarketVolume  || 0),
      avgVolume: parseInt(q.avgVolume || q.regularMarketVolume || 0),
    };
    return true;
  }

  function storeFMP(q) {
    const price = parseFloat(q.price);
    if(!q.symbol || !(price > 0)) return false;
    state.prices[q.symbol] = {
      price, isReal: true,
      change:    parseFloat(q.changePercentage ?? q.changesPercentage ?? q.change ?? 0),
      high:      parseFloat(q.dayHigh  ?? q.high  ?? price*1.01),
      low:       parseFloat(q.dayLow   ?? q.low   ?? price*0.99),
      volume:    parseInt(q.volume    ?? 0),
      // avgVolume من quote مباشرة — أسرع وأكثر موثوقية من profiles
      avgVolume: parseInt(q.avgVolume ?? q.averageVolume ?? q.volume ?? 0),
    };
    return true;
  }

  // ── محاولة 1: الـ proxy /api/stocks
  const proxyErrors = [];
  for(let i=0; i<symbols.length; i+=BATCH) {
    const batch = symbols.slice(i, i+BATCH).join(',');
    try {
      const ctrl  = new AbortController();
      const timer = setTimeout(()=>ctrl.abort(), 10000);
      const res   = await fetch('/api/stocks?symbols='+batch, {signal:ctrl.signal});
      clearTimeout(timer);
      if(!res.ok) {
        const txt = await res.text().catch(()=>'');
        proxyErrors.push('HTTP '+res.status+': '+txt.slice(0,80));
        continue;
      }
      const json = await res.json();
      const data = json?.quoteResponse?.result || [];
      let got = 0;
      data.forEach(q => { if(storeProxy(q)) { proxyOk = true; got++; } });
      console.log('[Proxy] batch '+(i/BATCH+1)+': '+got+'/'+data.length);
      if(proxyOk) {
        state.dataCheck.prices.real = Object.values(state.prices).filter(p=>p.isReal).length;
        render();
      }
    } catch(e) { proxyErrors.push(e.message||'network'); console.warn('[Proxy] err:', e.message); }
  }

  // ── محاولة 2: FMP v3 quote (Premium — الأكثر موثوقية)
  // نملأ الفراغات دائماً أو نُعيد كل شيء إذا فشل Proxy
  const missing  = symbols.filter(s => !state.prices[s]?.isReal);
  const toFetch  = missing.length > 0 ? missing : (!proxyOk ? symbols : []);
  const fmpErrors = [];

  for(let i=0; i<toFetch.length; i+=BATCH) {
    const batch = toFetch.slice(i, i+BATCH).join(',');
    try {
      const ctrl  = new AbortController();
      const timer = setTimeout(()=>ctrl.abort(), 10000);
      // Premium: نجرب stable أولاً ثم v3
      let data = null;
      for(const base of [
        `${FMP_BASE}/stable/quote?symbol=${batch}&apikey=${API_KEY}`,
        `${FMP_BASE}/api/v3/quote/${batch}?apikey=${API_KEY}`,
      ]) {
        const r = await fetch(base, {signal:ctrl.signal}).catch(()=>null);
        if(!r || !r.ok) continue;
        const d = await r.json().catch(()=>null);
        if(Array.isArray(d) && d.length > 0) { data = d; break; }
      }
      clearTimeout(timer);
      if(!data) { fmpErrors.push('no data'); continue; }
      let got = 0;
      data.forEach(q => { if(storeFMP(q)) { fmpOk = true; got++; } });
      console.log('[FMP] batch '+(i/BATCH+1)+': '+got+'/'+data.length);
      if(fmpOk) {
        state.dataCheck.prices.real = Object.values(state.prices).filter(p=>p.isReal).length;
        render();
      }
    } catch(e) { fmpErrors.push(e.message||'network'); console.warn('[FMP] err:', e.message); }
  }

  const gotData = proxyOk || fmpOk;

  // ── محاولة 3: cache
  if(!gotData) {
    try {
      const cached = localStorage.getItem('cached_prices');
      const time   = localStorage.getItem('cached_prices_time');
      if(cached && time) {
        const ageHours = (Date.now()-new Date(time))/36e5;
        const cd = JSON.parse(cached);
        // إذا Cache أقل من 8 ساعات → isReal:true (بيانات اليوم)
        // إذا أقل من 48 ساعة → isReal:false (fallback)
        const isFresh = ageHours < 8;
        Object.keys(cd).forEach(sym => {
          if(!state.prices[sym]) state.prices[sym] = {...cd[sym], isReal: isFresh ? cd[sym].isReal : false};
        });
        console.log('[Cache] تم استرجاع الأسعار، عمر الـ cache:', ageHours.toFixed(1)+'h، isReal:', isFresh);
      }
    } catch(e) {}
    if(proxyErrors.length || fmpErrors.length) {
      state._priceError = 'proxy: '+proxyErrors[0]+' | fmp: '+fmpErrors[0];
      console.error('[Prices] فشل كلي:', state._priceError);
    }
  }

  if(gotData) {
    try {
      localStorage.setItem('cached_prices', JSON.stringify(state.prices));
      localStorage.setItem('cached_prices_time', new Date().toISOString());
    } catch(e) {}
  }

  state.dataCheck.prices.real = Object.values(state.prices).filter(p=>p.price>0 && p.isReal).length;
  state.loadingPrices = false;
  console.log('[Prices] النتيجة: '+state.dataCheck.prices.real+'/'+state.dataCheck.prices.total+' | proxy:'+proxyOk+' fmp:'+fmpOk);
}

// ── 2. مؤشرات تقنية (3 طلبات/سهم، دفعات 8)
async function fetchIndicators() {
  state.loadingIndicators = true;
  state.indicators = {};
  console.log('[Indicators] بدء تحميل المؤشرات...');

  const INDICATOR_STOCKS = [
    'AAPL','NVDA','MSFT','GOOGL','META','AMZN','TSLA','AVGO','ORCL','CRM',
    'ADBE','NOW','CRWD','PANW','AMD','QCOM','TSM','ASML','ARM','APP',
    'JPM','GS','V','AXP','MS','BLK','BAC','LLY','JNJ','UNH',
    'XOM','CVX','NEE','NFLX','COST',
    'PLTR','SNOW','DDOG','NET','MDB','ALAB','NBIS','DELL','VST','CEG',
    'SHOP','MELI','COIN','PYPL','SQ','HOOD','SOFI','UBER','ABNB','DASH',
    'RBLX','SPOT','RIVN','RKLB','MSTR',
    'IONQ','QBTS','JOBY','LUNR','HIMS','CELH','ARRY','PLUG','NIO','SNAP',
  ];

  let dc = state.dataCheck;
  dc.rsi.total = dc.macd.total = dc.ma.total = dc.ma200.total =
  dc.support.total = dc.atr.total = dc.bb.total = INDICATOR_STOCKS.length;

  const BATCH = 5;

  for(let i=0; i<INDICATOR_STOCKS.length; i+=BATCH) {
    const batch = INDICATOR_STOCKS.slice(i, i+BATCH);

    await Promise.all(batch.map(async sym => {
      try {
        // بيانات تاريخية 200 يوم — Premium plan: نجرب 3 endpoints بالترتيب
        let closes = [], highs = [], lows = [];
        const endpoints = [
          // 1. الـ stable endpoint الجديد (الأفضل في Premium)
          `${FMP_BASE}/stable/historical-price-eod/full?symbol=${sym}&limit=200&apikey=${API_KEY}`,
          // 2. v3 الكلاسيكي — متاح في Premium دائماً
          `${FMP_BASE}/api/v3/historical-price-full/${sym}?timeseries=200&apikey=${API_KEY}`,
          // 3. v3 بدون timeseries — fallback أخير
          `${FMP_BASE}/api/v3/historical-price-full/${sym}?apikey=${API_KEY}`,
        ];
        for(const url of endpoints) {
          try {
            const ctrl2 = new AbortController();
            const t2    = setTimeout(()=>ctrl2.abort(), 8000);
            const r     = await fetch(url, {signal:ctrl2.signal});
            clearTimeout(t2);
            if(!r.ok) continue;
            const d    = await r.json();
            const hist = d?.historical || (Array.isArray(d) ? d : []);
            if(hist.length >= 20) {
              closes  = hist.map(h=>+(h.close||h.adjClose||0)).filter(v=>v>0).reverse();
              highs   = hist.map(h=>+(h.high||h.close||0)).filter(v=>v>0).reverse();
              lows    = hist.map(h=>+(h.low||h.close||0)).filter(v=>v>0).reverse();
              // ✅ استخراج volumes لحساب avgVolume
              const vols = hist.map(h=>+(h.volume||0)).filter(v=>v>0).reverse();
              if(vols.length >= 10 && !state.prices[sym]?.avgVolume) {
                const avg = Math.round(vols.slice(-20).reduce((a,b)=>a+b,0) / Math.min(vols.length,20));
                if(avg > 0 && state.prices[sym]) state.prices[sym].avgVolume = avg;
              }
              if(closes.length >= 20) break;
            }
          } catch(e) { continue; }
        }
        if(closes.length < 20) return;

        const cur = state.prices[sym]?.price || closes[closes.length-1] || 0;

        // ── MA20 (دائماً إذا توفر 20 يوم)
        const ma20 = closes.length>=20 ? closes.slice(-20).reduce((a,b)=>a+b,0)/20 : null;

        // ── MA50 (إذا توفر 50 يوم)
        const ma50 = closes.length>=50 ? closes.slice(-50).reduce((a,b)=>a+b,0)/50 : null;

        // ── MA200 (إذا توفر 200 يوم — الجديد)
        const ma200 = closes.length>=200 ? closes.slice(-200).reduce((a,b)=>a+b,0)/200 : null;

        console.log(`[MA] ${sym}: يوم=${closes.length} → MA20=${ma20!=null?'✅':'❌'} MA50=${ma50!=null?'✅':'❌'} MA200=${ma200!=null?'✅':'❌'}`);

        // ── RSI (14) — Wilder's Smoothing الصحيح
        let rsi = null;
        if(closes.length >= 15) {
          // الحساب الصحيح: Wilder's Smoothed Moving Average
          let gains = [], losses = [];
          for(let j=1; j<closes.length; j++) {
            const d = closes[j]-closes[j-1];
            gains.push(d>0 ? d : 0);
            losses.push(d<0 ? Math.abs(d) : 0);
          }
          // متوسط أول 14
          let ag = gains.slice(0,14).reduce((a,b)=>a+b,0)/14;
          let al = losses.slice(0,14).reduce((a,b)=>a+b,0)/14;
          // Wilder's smoothing للباقي
          for(let j=14; j<gains.length; j++) {
            ag = (ag*13 + gains[j]) / 14;
            al = (al*13 + losses[j]) / 14;
          }
          rsi = al===0 ? 100 : 100-(100/(1+ag/al));
          rsi = Math.min(100, Math.max(0, rsi));
        }

        // ── MACD (EMA12 - EMA26)
        function calcEMA(data, period) {
          if(data.length < period) return null;
          const k = 2/(period+1);
          let val = data.slice(0,period).reduce((a,b)=>a+b,0)/period;
          for(let j=period; j<data.length; j++) val = data[j]*k + val*(1-k);
          return val;
        }
        const ema12 = calcEMA(closes, 12);
        const ema26 = calcEMA(closes, 26);
        const macd  = (ema12!=null && ema26!=null) ? ema12-ema26 : null;

        // ── Bollinger Bands (تحتاج MA20)
        let bb_upper = null, bb_lower = null;
        if(ma20!=null) {
          const last20 = closes.slice(-20);
          const std = Math.sqrt(last20.reduce((s,p)=>s+Math.pow(p-ma20,2),0)/20);
          bb_upper = ma20 + 2*std;
          bb_lower = ma20 - 2*std;
        }

        // ── ATR (14) — True Range الصحيح
        let atrPct = null;
        if(highs.length >= 15 && closes.length >= 15) {
          const trs = [];
          const start = highs.length - 14;
          for(let j=start; j<highs.length; j++) {
            const prev = closes[j-1]; // السعر السابق دائماً موجود لأن j >= start >= 1
            const tr = Math.max(
              highs[j] - lows[j],
              Math.abs(highs[j] - prev),
              Math.abs(lows[j]  - prev)
            );
            trs.push(tr);
          }
          const atr = trs.reduce((a,b)=>a+b,0) / trs.length;
          atrPct = cur>0 ? (atr/cur)*100 : null;
        }

        // ── Stochastic RSI — يحتاج على الأقل 28 يوم (14 للـ RSI + 14 للـ Stoch)
        let stochRsi = null;
        if(closes.length >= 28) {
          const rsiArr = [];
          // احسب RSI لكل نقطة بنفس طريقة Wilder's
          for(let j=14; j<closes.length; j++) {
            const slice = closes.slice(0, j+1);
            let g2=[], l2=[];
            for(let k=1; k<slice.length; k++) {
              const d = slice[k]-slice[k-1];
              g2.push(d>0?d:0);
              l2.push(d<0?Math.abs(d):0);
            }
            let ag2 = g2.slice(0,14).reduce((a,b)=>a+b,0)/14;
            let al2 = l2.slice(0,14).reduce((a,b)=>a+b,0)/14;
            for(let k=14; k<g2.length; k++) {
              ag2 = (ag2*13+g2[k])/14;
              al2 = (al2*13+l2[k])/14;
            }
            rsiArr.push(al2===0 ? 100 : 100-(100/(1+ag2/al2)));
          }
          if(rsiArr.length >= 14) {
            const recent = rsiArr.slice(-14);
            const minR = Math.min(...recent), maxR = Math.max(...recent);
            stochRsi = maxR===minR ? 50 : ((rsiArr[rsiArr.length-1]-minR)/(maxR-minR))*100;
            stochRsi = Math.min(100, Math.max(0, stochRsi));
          }
        }

        // ── دعم ومقاومة
        const tolerance = cur * 0.015;
        const levels = [];
        for(let j=1; j<highs.length-1; j++) {
          if(highs[j]>=highs[j-1] && highs[j]>=highs[j+1]) levels.push({price:highs[j], type:'resistance'});
          if(lows[j]<=lows[j-1] && lows[j]<=lows[j+1])   levels.push({price:lows[j],  type:'support'});
        }
        const clusters = [];
        levels.forEach(l => {
          const ex = clusters.find(c => Math.abs(c.price-l.price)<=tolerance);
          if(ex) { ex.touches++; ex.price=(ex.price+l.price)/2; }
          else clusters.push({price:l.price, type:l.type, touches:1});
        });
        const strong = clusters.filter(c=>c.touches>=2);
        const resistance = strong.filter(c=>c.price>cur).sort((a,b)=>a.price-b.price)[0]?.price
          ?? Math.max(...highs.slice(-20));
        const support    = strong.filter(c=>c.price<cur).sort((a,b)=>b.price-a.price)[0]?.price
          ?? Math.min(...lows.slice(-20));
        const nearSupport    = support && cur>support ? cur<=support*1.03 : false;
        const nearResistance = resistance && cur<resistance ? cur>=resistance*0.98 : false;

        // ── حفظ
        state.indicators[sym] = {
          rsi, ma20, ma50, ma200, macd, bb_upper, bb_lower,
          support, resistance, nearSupport, nearResistance,
          atrPct, stochRsi,
          closes: closes.slice(-30),
        };

        if(rsi!=null)          dc.rsi.real++;
        if(macd!=null)         dc.macd.real++;
        if(ma20!=null && ma50) dc.ma.real++;
        if(ma200!=null)        dc.ma200.real++;
        if(support!=null)      dc.support.real++;
        if(atrPct!=null)       dc.atr.real++;
        if(bb_upper!=null)     dc.bb.real++;

      } catch(e) { console.warn('[Ind]', sym, e.message); }
    }));

    // render كل 5 دفعات فقط بدل كل دفعة — يمنع الرمش
    if(i % (BATCH*5) === 0) render();
    if(i+BATCH < INDICATOR_STOCKS.length) {
      await new Promise(r=>setTimeout(r,1200));
    }
  }

  dc.volume.total = ALL_STOCKS.length;
  dc.volume.real  = Object.values(state.prices).filter(p=>p.avgVolume>0).length;
  state.loadingIndicators = false;
  state.indicatorsDone    = true;
  state.indicatorsTime    = new Date().toISOString(); // ✅ حفظ وقت التحميل
  try { localStorage.setItem('indicators_time', state.indicatorsTime); } catch(e) {}
  console.log('[Indicators] اكتمل: RSI='+dc.rsi.real+'/'+dc.rsi.total+' MACD='+dc.macd.real+' MA='+dc.ma.real);
}

        else if(/miss|fall|drop|decline|loss|cut|weak/.test(t)) state.news[sym].neg++;
      });

  } catch(e) {}
}

async function fetchProfiles() {
  const symbols = ALL_STOCKS.map(s=>s.id);
  const BATCH   = 10;
  for(let i=0; i<symbols.length; i+=BATCH) {
    const batch = symbols.slice(i, i+BATCH);
    await Promise.all(batch.map(async sym => {
      try {
        const res  = await fetch(`${FMP_BASE}/stable/profile?symbol=${sym}&apikey=${API_KEY}`);
        const data = await res.json();
        const p = Array.isArray(data) && data[0];
        if(p && p.symbol) {
          state.profiles[p.symbol] = {
            beta:      parseFloat(p.beta||0)||null,
            avgVolume: parseInt(p.avgVolume||0)||null,
            mktCap:    p.mktCap||null,
          };
        }
      } catch(e) {}
    }));
    if(i+BATCH < symbols.length) await new Promise(r=>setTimeout(r,300));
  }
}

// ═══════════════════ SIGNAL ENGINE ══════════════════════════════
// ================================================================

function calcSignal(stock) {
  const p   = state.prices[stock.id];
  const ind = state.indicators[stock.id];
  const pro = state.profiles[stock.id];
  const news= state.news[stock.id]||{pos:0,neg:0};
  const earn= state.earnings[stock.id]??999;

  // ══ شرط أساسي: يجب أن يكون لدينا سعر (حقيقي أو cache) ومؤشرات
  if(!p || !p.price || !ind) return null;
  // اشتراط isReal فقط في أوقات السوق المفتوح
  if(isMarketOpen() && !p.isReal) return null;

  const price = p.price;
  const {rsi, ma20, ma50, ma200, macd, bb_upper, bb_lower,
         support, resistance, nearSupport, nearResistance,
         atrPct, stochRsi} = ind;

  // ══ حساب نقاط الشراء والبيع
  let buy=0, sell=0, reasons=[];

  // 1. RSI
  if(rsi!=null) {
    if(rsi<30)      { buy+=2; reasons.push('RSI '+fmt(rsi)+'% — تشبع بيع قوي'); }
    else if(rsi<40) { buy++;  reasons.push('RSI '+fmt(rsi)+'% — ميل للشراء'); }
    else if(rsi>70) { sell+=2;}
    else if(rsi>60) { sell++; }
  }

  // 2. MA Cross — طبقات ذكية
  // MA20
  if(ma20!=null && price>ma20) { buy++;  reasons.push('السعر فوق MA20'); }
  else if(ma20!=null)          { sell++; }

  // MA50
  if(ma20!=null && ma50!=null && ma20>ma50) { buy++;  reasons.push('MA20 فوق MA50 — اتجاه صاعد'); }
  else if(ma20!=null && ma50!=null)         { sell++; }

  // MA200 — الأقوى: اتجاه طويل المدى
  if(ma200!=null) {
    if(price > ma200)  { buy+=2; reasons.push('السعر فوق MA200 — اتجاه صاعد قوي 💪'); }
    else               { sell+=2; } // تحت MA200 = خطر حقيقي
  }

  // 3. MACD
  if(macd!=null) {
    if(macd>0) { buy++;  reasons.push('MACD إيجابي — زخم شراء'); }
    else       { sell++; }
  }

  // 4. Bollinger Bands
  if(bb_lower!=null && price<=bb_lower) { buy++;  reasons.push('السعر عند الحد الأدنى لـ BB'); }
  if(bb_upper!=null && price>=bb_upper) { sell++; }

  // 5. دعم/مقاومة
  if(nearSupport)    { buy+=2; reasons.push('قريب من الدعم $'+fmt(support,2)); }
  if(nearResistance) { sell+=2; }

  // 6. Stochastic RSI (حقيقي الآن)
  if(stochRsi!=null) {
    if(stochRsi<20)      { buy+=2; reasons.push('Stoch RSI '+fmt(stochRsi)+'% — تشبع بيع شديد'); }
    else if(stochRsi<30) { buy++;  reasons.push('Stoch RSI '+fmt(stochRsi)+'% — تشبع بيع'); }
    else if(stochRsi>80) { sell+=2; }
    else if(stochRsi>70) { sell++; }
  }

  // 7. Volume — avgVolume من prices أولاً (من quote) ثم من profiles كـ fallback
  const vol    = p.volume || 0;
  const avgVol = p.avgVolume || pro?.avgVolume || 0;
  const volR   = avgVol>0 ? vol/avgVol : 0;
  if(volR>1.5) {
    if(buy>sell) { buy++;  reasons.push('حجم تداول مرتفع ×'+fmt(volR,1)); }
    else         { sell++; }
  }

  // 8. ATR Risk/Reward — محسّن
  let riskReward = 0;
  if(atrPct!=null) {
    const atrStop   = atrPct * 1.5;
    // استخدم المقاومة إذا بعيدة بما يكفي، وإلا استخدم هدف 3x ATR
    const targetPrice = (resistance!=null && resistance>price && (resistance-price)/price*100 > atrPct)
      ? resistance
      : price * (1 + atrPct*3/100);
    const distToTarget = (targetPrice - price) / price * 100;
    riskReward = atrStop > 0 ? distToTarget / atrStop : 0;
    if(riskReward>=3.0) { buy+=3; reasons.push('نسبة مخاطرة/مكافأة '+fmt(riskReward,1)+'x ممتازة جداً'); }
    else if(riskReward>=2.0) { buy+=2; reasons.push('نسبة مخاطرة/مكافأة '+fmt(riskReward,1)+'x ممتازة'); }
    else if(riskReward>=1.5) { buy++; reasons.push('نسبة مخاطرة/مكافأة '+fmt(riskReward,1)+'x جيدة'); }
    else if(riskReward<1)    { sell++; }
  }

  // ══ Cooldown — سهم هبط بعد إشارة شراء → يُحجب مباشرة
  const isCooldown = (state.cooldownStocks||[]).includes(stock.id);
  if(isCooldown) sell+=4;

  // ══ عقوبات
  if(earn<=5)       { sell+=3; }
  else if(earn<=10) { sell+=1; }
  const change = p.change||0;
  if(change>10)     { sell+=3; } // gap-up مبالغ
  else if(change>5) { sell++;  }
  if(news.neg>=2)   { sell+=2; }
  else if(news.neg===1) { sell++; }
  buy += Math.min(3, news.pos);

  // ══ الإشارة النهائية
  const netScore = buy - sell;
  const signal   = netScore>=4?"شراء قوي":netScore>=2?"شراء":
                   netScore<=-4?"بيع قوي":netScore<=-2?"بيع":"انتظار";

  // ══ قوة الإشارة (0-100) — أقصى buy ممكن نظرياً = 21
  const maxBuy = 21;
  const strength = Math.min(100, Math.max(0, Math.round((netScore + maxBuy) / (maxBuy*2) * 100)));

  // ══ الثقة (بناءً على عدد المؤشرات المتوفرة) — مجموعها 100%
  let confidence = 0;
  if(rsi!=null)                confidence += 18;
  if(macd!=null)               confidence += 18;
  if(ma20!=null && ma50!=null) confidence += 12;
  if(ma200!=null)              confidence += 12;
  if(support!=null)            confidence += 13;
  if(atrPct!=null)             confidence += 13;
  if(stochRsi!=null)           confidence += 14;
  // مكافآت بسيطة (لا تتجاوز 100)
  if(p.avgVolume>0) confidence = Math.min(100, confidence+5);
  if(news.pos>0)    confidence = Math.min(100, confidence+5);

  // ══ هدف الربح ووقف الخسارة
  const atrStop  = atrPct ? Math.min(atrPct*1.5, 15) : 2; // حد أقصى 15% للوقف
  const stopLoss = Math.max(price*(1-atrStop/100), price*0.75); // لا يتجاوز -25% أبداً
  const target   = resistance ?? price*(1+atrStop*2/100);
  const profitPct= (target-price)/price*100;

  // ══ جودة الصفقة — معادلة محسّنة
  let tradeQuality = 0;
  // نسبة المخاطرة/المكافأة — الأهم
  if(riskReward>=3.0)       tradeQuality+=40;
  else if(riskReward>=2.0)  tradeQuality+=30;
  else if(riskReward>=1.5)  tradeQuality+=20;
  else if(riskReward>=1.0)  tradeQuality+=10;
  // قرب الدعم
  if(nearSupport)           tradeQuality+=25;
  // هدف الربح
  if(profitPct>=5)          tradeQuality+=20;
  else if(profitPct>=3)     tradeQuality+=15;
  else if(profitPct>=2)     tradeQuality+=8;
  // ATR منخفض = سهم مستقر
  if(atrPct!=null && atrPct<2)  tradeQuality+=15;
  else if(atrPct!=null && atrPct<3) tradeQuality+=8;
  tradeQuality = Math.min(100, tradeQuality);

  // ══ توقيت الدخول
  // حساب المسافة بين السعر الحالي والدعم
  const distToSupport = support>0 ? (price-support)/price*100 : 999;

  let entryTiming, entryColor, entryNote;

  if(nearSupport) {
    // السعر قريب من الدعم (أفضل توقيت)
    entryTiming = 'ادخل الآن';
    entryColor  = C.green;
    entryNote   = 'السعر عند الدعم — أفضل نقطة دخول';
  } else if(distToSupport <= 5) {
    // بعيد عن الدعم بـ 5% أو أقل — مقبول
    entryTiming = 'مقبول';
    entryColor  = C.blue;
    entryNote   = 'انتظر تراجعاً بسيطاً نحو $'+fmt(support,2)+' أفضل';
  } else if(distToSupport <= 10) {
    // بعيد عن الدعم بـ 10% — انتظر
    entryTiming = 'انتظر';
    entryColor  = C.yellow;
    entryNote   = 'السعر بعيد عن الدعم — انتظر تراجعاً لـ $'+fmt(support,2);
  } else {
    // بعيد جداً عن الدعم
    entryTiming = 'متأخر';
    entryColor  = C.orange;
    entryNote   = 'الدخول الآن محفوف بالمخاطر — الدعم عند $'+fmt(support,2);
  }

  // نقطة الدخول المثالية
  const idealEntry = nearSupport ? price : (support ? support*1.01 : price);

  // ══ حالة الدخول
  const signalQuality = confidence>=70 ? 'HIGH' : confidence>=50 ? 'MEDIUM' : 'LOW';
  const activeBuy  = !isCooldown && signalQuality==='HIGH' && (entryTiming==='ادخل الآن' || entryTiming==='مقبول');
  const watchOnly  = !isCooldown && (signalQuality==='MEDIUM' || entryTiming==='انتظر');
  const blockEntry = isCooldown || signalQuality==='LOW' || entryTiming==='متأخر';

  return {
    id: stock.id, name: stock.name, sector: stock.sector, cat: stock.cat,
    price, change, high:p.high, low:p.low, volume:vol, volR,
    rsi, ma20, ma50, ma200, macd, bb_upper, bb_lower,
    support, resistance, nearSupport, nearResistance,
    resTouches: ind.resTouches??1, supTouches: ind.supTouches??1,
    atrPct, stochRsi, riskReward,
    signal, strength, confidence, tradeQuality,
    netScore, buy, sell, reasons,
    stopLoss, target, profitPct,
    entryTiming, entryColor, entryNote, idealEntry, distToSupport,
    earnings: earn,
    news: news,
    // ⭐ High Conviction: ظهر في الجلسة الأولى وعاد في منتصف اليوم
    // نتحقق من _midDayDone أو من localStorage مباشرة (للحالة بعد إعادة التحميل)
    isConviction: (() => {
      const middayDone = _midDayDone || localStorage.getItem('recs_midday') === 'true';
      const s1ids      = state.sessionOneIds || [];
      return middayDone && s1ids.includes(stock.id);
    })(),
    beta: pro?.beta || stock.beta,
    activeBuy, watchOnly, blockEntry, isCooldown,
  };
}

// ═══════════════════ RECOMMENDATION ENGINE ══════════════════════
// ================================================================

function calcRecs() {
  // ══ شروط صارمة للتوصية
  const candidates = ALL_STOCKS
    .map(s => calcSignal(s))
    .filter(Boolean)
    // شرط 1: إشارة شراء
    .filter(s => s.signal==='شراء قوي' || s.signal==='شراء')
    // شرط 2: ثقة كافية (60%+) — رفعنا من 50
    .filter(s => s.confidence >= 60)
    // شرط 3: جودة صفقة مقبولة (40%+) — رفعنا من 30
    .filter(s => s.tradeQuality >= 40)
    // شرط 4: هدف ربح 2%+
    .filter(s => s.profitPct >= 2)
    // شرط 5: نسبة مخاطرة/مكافأة 1:1 على الأقل — جديد
    .filter(s => s.riskReward >= 1.0)
    // شرط 6: لا أرباح قريبة
    .filter(s => s.earnings > 5)
    // شرط 7: لا gap-up مبالغ
    .filter(s => (s.change||0) <= 8)
    // شرط 8: توقيت الدخول مقبول — لا متأخر ولا انتظار
    .filter(s => s.entryTiming === 'ادخل الآن' || s.entryTiming === 'مقبول')
    // شرط 9: السعر فوق MA50 على الأقل
    .filter(s => s.ma50==null || s.price >= s.ma50*0.97);

  // ترتيب: قوة × 0.4 + ثقة × 0.3 + جودة × 0.2 + توقيت × 0.1
  // FIX: conviction = 10 بدل 20 — لا يطغى على قوة السهم الحقيقية
  candidates.sort((a,b) => {
    const timingBonus = (s) =>
      s.entryTiming==='ادخل الآن' ? 15 :
      s.entryTiming==='مقبول'     ? 5  : 0;
    const convictionBonus = (s) => s.isConviction ? 10 : 0;
    const scoreA = a.strength*0.4 + a.confidence*0.3 + a.tradeQuality*0.2
                 + timingBonus(a) + convictionBonus(a);
    const scoreB = b.strength*0.4 + b.confidence*0.3 + b.tradeQuality*0.2
                 + timingBonus(b) + convictionBonus(b);
    return scoreB - scoreA;
  });

  // Adaptive Market — عدد التوصيات حسب اتجاه السوق
  const maxRecs = state.marketTrend==='bullish' ? 5 :
                  state.marketTrend==='bearish' ? 2 : 4;

  const recs = [];
  const usedSectors = new Set();
  // الجولة الأولى: توصية واحدة لكل قطاع
  for(const c of candidates) {
    if(recs.length>=maxRecs) break;
    if(!usedSectors.has(c.sector)) {
      recs.push(c);
      usedSectors.add(c.sector);
    }
  }
  // الجولة الثانية: أكمل بأقوى المرشحين بدون تكرار
  for(const c of candidates) {
    if(recs.length>=maxRecs) break;
    if(!recs.find(r=>r.id===c.id)) recs.push(c);
  }

  // ══ تحديث Cooldown — سهم كان توصية وهبط -5%
  let cooldownUpdated = false;
  ALL_STOCKS.forEach(s => {
    const p = state.prices[s.id];
    if(!p?.isReal) return;
    const wasRec = (state.sessionOneIds||[]).includes(s.id);
    if(wasRec && (p.change||0) < -5) {
      if(!state.cooldownStocks) state.cooldownStocks = [];
      if(!state.cooldownStocks.includes(s.id)) {
        state.cooldownStocks.push(s.id);
        cooldownUpdated = true;
      }
    }
  });
  if(cooldownUpdated) {
    try { localStorage.setItem('cooldown_stocks', JSON.stringify(state.cooldownStocks)); } catch(e) {}
  }

  state.recs = recs;
  state.recsTime = new Date();

  // إشعار بالتوصيات الجديدة
  if(recs.length > 0) {
    const names = recs.slice(0,3).map(r=>r.id).join('، ');
    sendNotification('🎯 توصيات تريدر برو X', recs.length+' توصيات جديدة: '+names);
  }

  // حفظ التوصيات — s1_recs يُحفظ مرة واحدة فقط عند الافتتاح
  // لا نكتب فوقه هنا لأن منتصف اليوم يحتاجه للمقارنة
  try {
    // s1_recs يُحفظ فقط إذا لم يكن محفوظاً من قبل اليوم (الجلسة الأولى)
    const existingDate = localStorage.getItem('recs_date');
    const today        = new Date().toDateString();
    const isFirstRec   = existingDate !== today; // أول مرة اليوم
    if(isFirstRec) {
      localStorage.setItem('s1_recs', JSON.stringify(recs.map(r=>r.id)));
      state.sessionOneIds = recs.map(r=>r.id);
    }
    localStorage.setItem('recs_time',   new Date().toISOString());
    localStorage.setItem('recs_date',   today);
    localStorage.setItem('recs_full',   JSON.stringify(recs));
    localStorage.setItem('recs_midday', 'false');
  } catch(e) {}

  return recs;
}

// ═══════════════════ SPECULATIVE ENGINE ═════════════════════════
// ================================================================

function calcSpeculative() {
  // ══ شرط: السوق الهابط الحقيقي فقط يوقف المجازفة (أقل من -1.5%)
  // السوق المحايد (-1.5% إلى +0.3%) يسمح بمجازفة محدودة مع تحذير
  if(state.marketTrend === 'bearish') {
    state.speculativeRecs = [];
    return [];
  }
  const candidates = ALL_STOCKS
    // FIX 1: نشمل كل سهم beta >= 2 بغض النظر عن القطاع
    .filter(s => s.cat==='future' || s.beta>=2 || (s.cat==='small' && s.beta>=1.8))
    .map(s => {
      const p   = state.prices[s.id];
      const ind = state.indicators[s.id];
      const pro = state.profiles[s.id];

      // شرط أساسي: سعر (حقيقي أو cache) ومؤشرات
      if(!p?.price || !ind) return null;
      if(isMarketOpen() && !p.isReal) return null;

      const beta  = pro?.beta || s.beta || 1;
      const volR  = p.avgVolume>0 ? p.volume/p.avgVolume : 0;
      const price = p.price;

      let score = 0, reasons = [];

      // ── Beta (الأساس)
      if(beta>=2 && beta<=4)  { score+=25; reasons.push('Beta '+fmt(beta,1)+' — تقلب مثالي للمجازفة'); }
      else if(beta>4)         { score+=10; reasons.push('Beta '+fmt(beta,1)+' — خطر مرتفع جداً'); }
      else if(beta>=1.5)      { score+=15; }

      // ── RSI — FIX 2: rsi<30 فرصة ارتداد للمجازفة
      if(ind.rsi!=null) {
        if(ind.rsi<30)               { score+=12; reasons.push('RSI '+fmt(ind.rsi)+'% — تشبع بيع = ارتداد محتمل'); }
        else if(ind.rsi>50 && ind.rsi<70) { score+=15; reasons.push('RSI '+fmt(ind.rsi)+'% — زخم صاعد'); }
        else if(ind.rsi>=30 && ind.rsi<=50) { score+=8; }
        else if(ind.rsi>=70) { score-=5; } // تشبع شراء — تحذير
      }

      // ── MACD
      if(ind.macd!=null && ind.macd>0) { score+=15; reasons.push('MACD إيجابي — زخم شراء'); }

      // ── MA Cross — مع MA200
      if(ind.ma20!=null && ind.ma50!=null && ind.ma20>ind.ma50)
        { score+=10; reasons.push('اتجاه صاعد متوسط المدى'); }
      if(ind.ma200!=null) {
        if(s.price > ind.ma200) { score+=15; reasons.push('فوق MA200 — اتجاه قوي طويل المدى 💪'); }
        else                    { score-=10; } // تحت MA200 = عقوبة للمجازفة
      }

      // ── حجم التداول
      if(volR>2)        { score+=10; reasons.push('حجم ×'+fmt(volR,1)+' — اهتمام كبير'); }
      else if(volR>1.5) { score+=5; }

      // ── عقوبات
      if((state.earnings[s.id]??999)<=7) { score-=20; }
      if((p.change||0)>15) { score-=15; }
      if(ind.rsi!=null && ind.rsi>80) { score-=15; }

      score = Math.max(0, score);
      if(score < 35) return null;

      // ── FIX 3: هدف الربح ووقف الخسارة للمجازفة
      // المجازفة = ATR أكبر → هدف أعلى ووقف أوسع
      const atrStop   = ind.atrPct ? ind.atrPct * 2   : 5;  // وقف خسارة: 2x ATR (أوسع من العادي)
      const atrTarget = ind.atrPct ? ind.atrPct * 4   : 10; // هدف: 4x ATR
      const stopLoss  = price * (1 - atrStop/100);
      const target    = ind.resistance && ind.resistance > price
        ? ind.resistance
        : price * (1 + atrTarget/100);
      const profitPct = (target - price) / price * 100;
      const lossPct   = (price - stopLoss) / price * 100;
      const riskReward= lossPct > 0 ? profitPct / lossPct : 0;

      // ── تخصيص المجازفة — نسبة فقط (بدون رأس مال محدد)
      const allocPct  = beta >= 3 ? 0.05 : 0.08;

      // ── توقيت الدخول للمجازفة
      const distToSup = ind.support > 0 ? (price - ind.support) / price * 100 : 999;
      const entryTiming =
        ind.nearSupport     ? 'ادخل الآن' :
        distToSup <= 8      ? 'مقبول'     :
        distToSup <= 15     ? 'انتظر'     : 'متأخر';

      const label =
        score>=80 ? '🚀 Potential Explosion' :
        score>=65 ? '🔥 High Momentum'       :
        score>=50 ? '⚡ Aggressive'           :
                    '🎲 Speculative';

      return {
        ...s, price, change:p.change, volR, beta, score, label, reasons,
        rsi:ind.rsi, macd:ind.macd, ma20:ind.ma20, ma50:ind.ma50, ma200:ind.ma200,
        support:ind.support, resistance:ind.resistance, atrPct:ind.atrPct,
        stopLoss, target, profitPct, lossPct, riskReward,
        allocPct, entryTiming, nearSupport: ind.nearSupport,
      };
    })
    .filter(Boolean)
    // FIX 6: 5 فقط بدل 10 للتركيز
    .sort((a,b) => b.score - a.score)
    .slice(0, 5);

  state.speculativeRecs = candidates;
  return candidates;
}

let _indicatorsLoading = false;

async function loadData(full=false) {
  // تحميل الأسعار + اتجاه السوق دائماً
  await Promise.all([fetchPrices(), fetchMarketTrend()]);
  render();

  // إذا التوصيات مقفلة (محفوظة من اليوم) — فقط حدّث الأسعار بدون إعادة حساب
  if(_recsLockedToday && state.recs?.length > 0) {
    if(state.indicatorsDone) {
      // المؤشرات موجودة — حدّث الأسعار في البطاقات فقط
      state.recs = state.recs.map(r => {
        const p = state.prices[r.id];
        if(!p?.price) return r;
        return { ...r, price:p.price, change:p.change, high:p.high, low:p.low, volume:p.volume };
      });
    } else {
      // المؤشرات غير محمّلة — حمّلها لكن لا تُعيد الحساب
      const neverLoaded = !state.indicatorsDone && !_indicatorsLoading;
      if(neverLoaded && !_indicatorsLoading) {
        _indicatorsLoading = true;
        render();
        await fetchIndicators();
        _indicatorsLoading = false;
        // حدّث الأسعار فقط — لا calcRecs
        state.recs = state.recs.map(r => {
          const p = state.prices[r.id];
          if(!p?.price) return r;
          return { ...r, price:p.price, change:p.change, high:p.high, low:p.low, volume:p.volume };
        });
      }
    }
    render();
    return;
  }

  // تحميل المؤشرات: عند فتح السوق، أو الطلب الصريح، أو أول مرة دائماً
  const neverLoaded = !state.indicatorsDone && !_indicatorsLoading;
  if((isMarketOpen() || full || neverLoaded) && !state.indicatorsDone && !_indicatorsLoading) {
    _indicatorsLoading = true;
    render();

    await fetchIndicators();

    // ── الحساب الأول: بعد المؤشرات مباشرة
    calcRecs();
    calcSpeculative();
    render();

    // ثم نجلب الأخبار والأرباح والـ profiles بالتوازي
    await Promise.all([
      fetchNews(),
      fetchEarnings(),
      fetchProfiles(),
    ]).catch(e => console.warn('[loadData] secondary fetch error:', e.message));

    _indicatorsLoading = false;

    // ── الحساب الثاني (والأخير): بعد اكتمال الأخبار والأرباح
    calcRecs();
    calcSpeculative();
    console.log('[loadData] اكتمل — توصيات:', state.recs?.length, '| مجازفة:', state.speculativeRecs?.length);

  } else if(state.indicatorsDone) {
    // المؤشرات جاهزة — فقط حدّث الأسعار
    if(state.recs) {
      state.recs = state.recs.map(r => {
        const p = state.prices[r.id];
        if(!p?.price) return r;
        return { ...r, price:p.price, change:p.change, high:p.high, low:p.low, volume:p.volume };
      });
    }
  }

  render();
}

const C = {
  green:'#00ff88', blue:'#00c8ff', purple:'#b44fff',
  pink:'#ff2d7a',  yellow:'#ffe033', orange:'#ff7a00',

};

// ── معالج الأخطاء العالمي — يمنع الشاشة السوداء
window.onerror = function(msg, src, line, col, err) {
  console.error('[Global Error]', msg, 'line:', line);
  const appEl = document.getElementById('app');
  if(appEl && appEl.innerHTML === '') {
    appEl.innerHTML = `
      <div style="padding:30px;text-align:center;color:#fff;font-family:sans-serif">
        <div style="font-size:40px;margin-bottom:12px">⚠️</div>
        <div style="font-size:14px;color:#ff7a00;margin-bottom:8px">خطأ في التطبيق</div>
        <div style="font-size:11px;color:#888;margin-bottom:16px">${msg}</div>
        <button onclick="location.reload()" style="background:#0a1020;border:1px solid #3a4560;color:#00c8ff;padding:10px 20px;border-radius:8px;font-size:12px">🔄 إعادة التحميل</button>
      </div>`;
  }
  return false;
};

window.onunhandledrejection = function(e) {
  console.error('[Unhandled Promise]', e.reason);
};

function render() {
  try {
    const root = app();
    if(!root) { console.error('[render] لا يوجد div#app'); return; }
    root.innerHTML = '';
    root.appendChild(renderApp());
    if(!state.animatedRecs) state.animatedRecs = new Set();
    if(state.recs) state.recs.forEach(r => state.animatedRecs.add(r.id));
  } catch(e) {
    console.error('[render] خطأ:', e.message, e.stack);
  }
}

  return el('div', {id:'main'}, [
    renderHeader(),
    renderTicker(),
    renderDataCheck(),

}

function renderRecCard(r, idx) {
  const isSelected = state.selected === r.id;
  const sigColor = r.signal.includes('قوي') ? C.green :
                   r.signal.includes('شراء') ? C.blue : C.yellow;

  // ── نوع الأمر — منطق صحيح
  // حالة 1: السعر عند الدعم مباشرة (فرق أقل من 1%) → أمر سوق
  // حالة 2: السعر أعلى من الدعم بـ 1-10%           → أمر محدد عند الدعم (انتظر تراجع)
  // حالة 3: لا يوجد دعم واضح                       → أمر سوق بالسعر الحالي
  const distToSup  = r.support>0 ? (r.price - r.support) / r.price * 100 : 0;
  const atSupport  = r.nearSupport || distToSup < 1;
  const hasSupport = r.support>0 && distToSup > 0;

  let orderType, orderColor, orderNote, buyPrice;

  if(atSupport) {
    // السعر عند الدعم الآن — اشتري بسعر السوق
    orderType  = 'أمر سوق';
    orderColor = C.green;
    orderNote  = 'السعر عند الدعم — اشتري فوراً';
    buyPrice   = r.price;
  } else if(hasSupport && distToSup <= 10) {
    // السعر فوق الدعم — ضع أمر محدد عند الدعم وانتظر التراجع
    orderType  = 'أمر محدد';
    orderColor = C.blue;
    orderNote  = 'انتظر تراجع السعر للدعم — ينفذ تلقائياً';
    buyPrice   = r.support * 1.002; // سنتات فوق الدعم لضمان التنفيذ
  } else {
    // السعر بعيد عن الدعم أو لا يوجد دعم — أمر سوق بالسعر الحالي
    orderType  = 'أمر سوق';
    orderColor = C.yellow;
    orderNote  = 'ادخل بسعر السوق — راقب وقف الخسارة';
    buyPrice   = r.price;
  }

  return el('div', {
    class: state.animatedRecs?.has(r.id) ? '' : 'fade-up',
    style:{
      background:'#0a1020', borderRadius:'14px',
      border:`1px solid ${r.isConviction ? '#ffe03344' : 'var(--border)'}`,
      padding:'14px', marginBottom:'10px',
      animationDelay: idx*0.05+'s',
    },
    onClick: () => { state.selected = isSelected ? null : r.id; render(); }
  }, [

    // ── 1. رأس البطاقة: اسم + إشارة
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'8px'}}, [
      el('div', {}, [
        el('div', {style:{display:'flex', alignItems:'center', gap:'6px', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'16px', fontWeight:'900', color:C.text}}, [r.name]),
          el('span', {style:{fontSize:'10px', color:C.text2}}, [r.id]),
          r.isConviction && el('span', {style:{
            fontSize:'9px', color:C.yellow, background:'rgba(255,224,51,.12)',
            borderRadius:'4px', padding:'1px 5px', border:'1px solid rgba(255,224,51,.3)',
          }}, ['⭐ High Conviction']),
        ]),
        el('div', {style:{fontSize:'10px', color:C.text2}}, [r.sector]),
      ]),
      el('div', {style:{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:'4px'}}, [
        el('div', {style:{
          background: sigColor+'22', border:`1px solid ${sigColor}44`,
          borderRadius:'8px', padding:'4px 10px',
          fontSize:'11px', fontWeight:'700', color:sigColor,
        }}, [r.signal]),
        r.isCooldown && el('span', {style:{
          fontSize:'9px', fontWeight:'700', padding:'2px 6px',
          borderRadius:'20px', background:'rgba(255,45,122,.15)',
          color:'#ff2d7a', border:'1px solid rgba(255,45,122,.3)',
        }}, ['⏸️ Cooldown']),
      ]),
    ]),

    // ── 2. السعر + RSI + ثقة
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'6px', marginBottom:'8px'}}, [
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['السعر']),
        el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.text}}, [fmtPrice(r.price)]),
        el('div', {style:{fontSize:'9px', color: r.change>=0?C.green:C.pink}}, [
          (r.change>=0?'+':'')+fmt(r.change)+'%'
        ]),
      ]),
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['RSI']),
        el('div', {style:{
          fontSize:'13px', fontWeight:'700',
          color: r.rsi!=null?(r.rsi<30?C.green:r.rsi>70?C.pink:C.blue):C.text3,
        }}, [r.rsi!=null ? fmt(r.rsi) : '—']),
        el('div', {style:{fontSize:'9px', color:C.text3}}, [
          r.rsi!=null?(r.rsi<30?'تشبع بيع':r.rsi>70?'تشبع شراء':'طبيعي'):'—'
        ]),
      ]),
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['ثقة / جودة']),
        el('div', {style:{
          fontSize:'13px', fontWeight:'700',
          color: r.confidence>=80?C.green:r.confidence>=60?C.blue:C.yellow,
        }}, [r.confidence+'%']),
        el('div', {style:{fontSize:'9px', color:C.text3}}, [r.tradeQuality+'% جودة']),
      ]),
    ]),

    // ── 3. شريط القوة
    el('div', {style:{marginBottom:'8px'}}, [
      el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'3px'}}, [
        el('span', {style:{fontSize:'9px', color:C.text3}}, ['قوة الإشارة']),
        el('span', {style:{fontSize:'9px', color:C.text2}}, [r.strength+'%']),
      ]),
      el('div', {style:{height:'3px', background:'#1a2340', borderRadius:'2px'}}, [
        el('div', {style:{
          height:'3px', borderRadius:'2px', width:r.strength+'%',
          background:`linear-gradient(90deg,${C.blue},${C.green})`,

      ]),

    // ── 4. توقيت الدخول
    el('div', {style:{
      display:'flex', alignItems:'center', justifyContent:'space-between',
      background: r.entryColor+'11', border:`1px solid ${r.entryColor}33`,
      borderRadius:'8px', padding:'8px 10px', marginBottom:'8px',
    }}, [
      el('div', {style:{fontSize:'12px', fontWeight:'800', color:r.entryColor}}, [
        r.activeBuy?'✅ ادخل الآن': r.watchOnly?'👀 راقب فقط': r.blockEntry?'🚫 لا تدخل': r.entryTiming
      ]),
      el('div', {style:{fontSize:'9px', color:C.text2, textAlign:'left', maxWidth:'55%'}}, [r.entryNote]),
    ]),

    // ── 5. دعم / مقاومة + المتوسطات
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px', marginBottom:'8px'}}, [
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'4px'}}, ['📊 دعم / مقاومة']),
        el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'2px'}}, [
          el('div', {}, [
            el('div', {style:{fontSize:'9px', color:C.text3}}, ['دعم']),
            el('div', {style:{fontSize:'11px', fontWeight:'700', color:C.green}}, [r.support?fmtPrice(r.support):'—']),
          ]),
          el('div', {style:{textAlign:'left'}}, [
            el('div', {style:{fontSize:'9px', color:C.text3}}, ['مقاومة']),
            el('div', {style:{fontSize:'11px', fontWeight:'700', color:C.pink}}, [r.resistance?fmtPrice(r.resistance):'—']),
          ]),
        ]),
        r.nearSupport && el('div', {style:{
          fontSize:'9px', color:C.green, background:'rgba(0,255,136,.08)',
          borderRadius:'4px', padding:'2px 4px', marginTop:'2px',
        }}, ['✅ قريب من الدعم']),
      ]),
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'4px'}}, ['📈 المتوسطات']),
        el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'9px', color:C.text3}}, ['MA20']),
          el('span', {style:{fontSize:'10px', fontWeight:'700', color:r.ma20?(r.price>r.ma20?C.green:C.pink):C.text3}},
            [r.ma20?fmtPrice(r.ma20):'—']),
        ]),
        el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'9px', color:C.text3}}, ['MA50']),
          el('span', {style:{fontSize:'10px', fontWeight:'700', color:r.ma50?(r.price>r.ma50?C.green:C.pink):C.text3}},
            [r.ma50?fmtPrice(r.ma50):'—']),
        ]),
        el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'2px'}}, [
          el('span', {style:{fontSize:'9px', color:C.text3}}, ['MA200']),
          el('span', {style:{fontSize:'10px', fontWeight:'700', color:r.ma200?(r.price>r.ma200?C.green:C.pink):C.text3}},
            [r.ma200?fmtPrice(r.ma200):'—']),
        ]),
        el('div', {style:{fontSize:'9px', marginTop:'2px', color:r.price>(r.ma200||r.ma50||0)?C.green:C.orange}}, [
          r.ma200?(r.price>r.ma200?'💪 فوق MA200':'⚠️ تحت MA200'):(r.ma20>(r.ma50||0)?'✅ صاعد':'⚠️ هابط')
        ]),
      ]),
    ]),

    // ── 6. حجم التداول
    el('div', {style:{
      background:'#060b14', borderRadius:'8px', padding:'7px 10px', marginBottom:'8px',
      border: r.volR>=1.5?'1px solid rgba(0,200,255,.2)':'1px solid #1a2340',
    }}, [
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center'}}, [
        el('div', {}, [
          el('div', {style:{fontSize:'9px', color:C.text3}}, ['📦 حجم التداول']),
          el('div', {style:{fontSize:'11px', fontWeight:'700', color:C.text}}, [
            r.volume>0?(r.volume/1e6).toFixed(1)+'M':'—'
          ]),
        ]),
        el('div', {style:{textAlign:'center'}}, [
          el('div', {style:{fontSize:'9px', color:C.text3}}, ['مقارنة بالمعتاد']),
          el('div', {style:{fontSize:'12px', fontWeight:'800', color:r.volR>=2?C.green:r.volR>=1.3?C.blue:C.text2}},
            [r.volR>0?'×'+fmt(r.volR,1):'—']),
        ]),
        el('div', {style:{fontSize:'10px', fontWeight:'700', color:r.volR>=2?C.green:r.volR>=1.3?C.blue:C.text2}}, [
          r.volR>=2?'🔥 مرتفع جداً':r.volR>=1.3?'✅ مرتفع':r.volR>=0.7?'➡️ طبيعي':'⚠️ منخفض'
        ]),
      ]),
    ]),

    // ── 7. أمر الشراء الجاهز (يشمل الكمية والربح والخسارة)
    el('div', {style:{
      background:'linear-gradient(135deg,rgba(0,255,136,.06),rgba(0,200,255,.04))',
      border:'1px solid rgba(0,255,136,.25)', borderRadius:'10px',
      padding:'10px 12px', marginBottom: isSelected?'8px':'0',
    }}, [
      el('div', {style:{fontSize:'10px', fontWeight:'800', color:C.green, marginBottom:'8px'}}, ['📋 أمر الشراء الجاهز']),
      el('div', {style:{borderTop:'1px solid rgba(0,255,136,.15)', marginBottom:'8px'}}),

      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'5px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, ['نوع الأمر']),
        el('span', {style:{
          fontSize:'11px', fontWeight:'800', color:orderColor,
          background:orderColor+'18', borderRadius:'5px', padding:'2px 8px',
          border:`1px solid ${orderColor}33`,
        }}, [orderType]),
      ]),
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'5px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, ['سعر الشراء']),
        el('span', {style:{fontSize:'13px', fontWeight:'900', color:C.text}}, [fmtPrice(buyPrice)]),
      ]),
      el('div', {style:{borderTop:'1px solid rgba(255,255,255,.05)', margin:'5px 0'}}),
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'5px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, ['🛑 وقف الخسارة']),
        el('span', {style:{fontSize:'12px', fontWeight:'800', color:C.pink}}, [fmtPrice(r.stopLoss)]),
      ]),
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, ['🎯 هدف الربح']),
        el('div', {style:{textAlign:'left'}}, [
          el('div', {style:{fontSize:'12px', fontWeight:'800', color:C.green}}, [fmtPrice(r.target)]),
          el('div', {style:{fontSize:'9px', color:C.green}}, ['+'+fmt(r.profitPct,2)+'%']),
        ]),
      ]),
      el('div', {style:{
        fontSize:'10px', color:orderColor, background:orderColor+'0e',
        borderRadius:'6px', padding:'5px 8px',
      }}, ['💡 '+orderNote]),
    ]),

    // ── 8. التفاصيل (عند الضغط) — مبسطة
    isSelected && el('div', {style:{borderTop:'1px solid var(--border)', paddingTop:'10px', marginTop:'2px'}}, [
      r.reasons.length>0 && el('div', {style:{marginBottom:'8px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text2, marginBottom:'4px', fontWeight:'700'}}, ['📋 أسباب التوصية:']),
        ...r.reasons.map(reason =>
          el('div', {style:{fontSize:'10px', color:C.green, marginBottom:'2px'}}, ['✓ '+reason])
        ),
      ]),
      el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px', fontSize:'10px'}}, [
        r.stochRsi!=null && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 8px'}}, [
          el('div', {style:{color:C.text3}}, ['Stoch RSI']),
          el('div', {style:{fontWeight:'700', color:r.stochRsi<20?C.green:r.stochRsi>80?C.pink:C.blue}},
            [fmt(r.stochRsi)+'%']),
        ]),
        r.macd!=null && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 8px'}}, [
          el('div', {style:{color:C.text3}}, ['MACD']),
          el('div', {style:{fontWeight:'700', color:r.macd>0?C.green:C.pink}},
            [fmt(r.macd,3)+' '+(r.macd>0?'↑':'↓')]),
        ]),
        r.riskReward>0 && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 8px'}}, [
          el('div', {style:{color:C.text3}}, ['R/R نسبة']),
          el('div', {style:{fontWeight:'700', color:r.riskReward>=2?C.green:C.yellow}},
            [fmt(r.riskReward,1)+'x']),
        ]),
        r.atrPct!=null && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 8px'}}, [
          el('div', {style:{color:C.text3}}, ['ATR تذبذب']),
          el('div', {style:{fontWeight:'700', color:r.atrPct<2?C.green:r.atrPct<4?C.blue:C.orange}},
            [fmt(r.atrPct,1)+'%']),
        ]),
      ].filter(Boolean)),
      r.earnings<999 && el('div', {style:{
        fontSize:'10px', color:C.orange, marginTop:'8px',
        background:'rgba(255,122,0,.08)', borderRadius:'6px', padding:'5px 8px',
      }}, ['⚠️ نتائج الأرباح خلال '+r.earnings+' يوم']),
    ]),
  ]);
}

// ═══════════════════ SPECULATIVE TAB ════════════════════════════
// ================================================================

function renderSpecTab() {
  if(_indicatorsLoading) {
    return el('div', {style:{padding:'40px 16px', textAlign:'center'}}, [
      el('div', {style:{fontSize:'12px', color:C.blue}}, ['⏳ جاري تحميل المؤشرات...']),
    ]);
  }

  if(!state.indicatorsDone) {
    return el('div', {style:{padding:'40px 16px', textAlign:'center'}}, [
      el('div', {style:{fontSize:'40px', marginBottom:'12px'}}, ['🎲']),
      el('div', {style:{fontSize:'13px', color:C.text2}}, [
        'سيتم حساب فرص المجازفة بعد تحميل المؤشرات'
      ]),
    ]);
  }

  // ══ تحذير السوق الهابط الحقيقي (أقل من -1.5%)
  if(state.marketTrend === 'bearish') {
    return el('div', {style:{padding:'20px 16px'}}, [
      el('div', {style:{
        background:'rgba(255,45,122,.08)', border:'1px solid rgba(255,45,122,.3)',
        borderRadius:'14px', padding:'20px', textAlign:'center',
      }}, [
        el('div', {style:{fontSize:'36px', marginBottom:'10px'}}, ['🛑']),
        el('div', {style:{fontSize:'14px', fontWeight:'700', color:C.pink, marginBottom:'6px'}}, [
          'السوق هابط — لا مجازفة اليوم'
        ]),
        el('div', {style:{fontSize:'11px', color:C.text2, lineHeight:'1.8', marginBottom:'10px'}}, [
          'SPY: '+(state.spyChange>=0?'+':'')+fmt(state.spyChange)+'%',
          el('br'),
          'QQQ: '+(state.qqqChange>=0?'+':'')+fmt(state.qqqChange)+'%',
          el('br'),
          'أسهم المجازفة تنهار بسرعة في السوق الهابط',
        ]),
        el('div', {style:{
          fontSize:'11px', color:C.orange,
          background:'rgba(255,122,0,.08)', borderRadius:'8px',
          padding:'8px 12px', border:'1px solid rgba(255,122,0,.2)',
        }}, ['انتظر حتى يستقر السوق قبل المجازفة ✅']),
      ]),
    ]);
  }

  const specs = state.speculativeRecs || [];

  const trendColor = state.marketTrend==='bullish'?C.green:
                     state.marketTrend==='bearish'?C.pink:C.yellow;
  const trendLabel = state.marketTrend==='bullish'?'السوق صاعد ✅':
                     state.marketTrend==='bearish'?'السوق هابط 🛑':
                     state.marketTrend==='neutral' ?'السوق محايد ⚠️':'جاري التحقق...';

  return el('div', {style:{padding:'12px 16px'}}, [
    el('div', {style:{marginBottom:'12px'}}, [
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'6px'}}, [
        el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.purple}}, [
          '🎲 رادار المجازفة — '+specs.length+' فرصة'
        ]),
        el('div', {style:{fontSize:'10px', fontWeight:'700', color:trendColor}}, [trendLabel]),
      ]),
      // SPY + QQQ
      state.spyChange!==null && el('div', {style:{
        display:'flex', gap:'8px', fontSize:'10px',
        background:'#060b14', borderRadius:'8px', padding:'5px 8px',
        marginBottom:'6px',
      }}, [
        el('span', {style:{color:C.text2}}, ['مؤشر السوق:']),
        el('span', {style:{color:state.spyChange>=0?C.green:C.pink, fontWeight:'700'}}, [
          'SPY '+(state.spyChange>=0?'+':'')+fmt(state.spyChange)+'%'
        ]),
        el('span', {style:{color:state.qqqChange>=0?C.green:C.pink, fontWeight:'700'}}, [
          'QQQ '+(state.qqqChange>=0?'+':'')+fmt(state.qqqChange)+'%'
        ]),
      ]),
      el('div', {style:{
        fontSize:'10px', color:C.orange,
        background:'rgba(255,45,122,.06)', borderRadius:'6px',
        padding:'5px 8px', border:'1px solid rgba(255,45,122,.2)',
      }}, ['⚠️ أسهم مجازفة — خصص 5-8% فقط من رأس مالك لكل صفقة']),
    ]),

    specs.length===0 ?
      el('div', {style:{textAlign:'center', padding:'40px 0', color:C.text2, fontSize:'12px'}}, [
        'لا توجد فرص مجازفة تستوفي الشروط الآن'
      ]) :
      el('div', {}, specs.map((s,i) => renderSpecCard(s,i))),
  ]);
}

function renderSpecCard(s, idx) {
  const isSelected = state.selected === s.id+'_spec';
  const labelColor = s.score>=80?C.green:s.score>=65?C.orange:s.score>=50?C.yellow:C.text2;
  const entryColor = s.entryTiming==='ادخل الآن'?C.green:
                     s.entryTiming==='مقبول'?C.blue:
                     s.entryTiming==='انتظر'?C.yellow:C.orange;

  return el('div', {
    class:'fade-up',
    style:{
      background:'#0a1020', borderRadius:'12px',
      border:'1px solid rgba(180,79,255,.2)',
      padding:'12px 14px', marginBottom:'10px',
      animationDelay: idx*0.05+'s',
    },
    onClick: () => { state.selected = isSelected?null:s.id+'_spec'; render(); }
  }, [
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'6px'}}, [
      el('div', {}, [
        el('span', {style:{fontSize:'15px', fontWeight:'800', color:C.text}}, [s.name]),
        el('span', {style:{fontSize:'10px', color:C.text2, marginRight:'6px'}}, [' '+s.id]),
        el('span', {style:{fontSize:'9px', color:C.text3}}, ['Beta '+fmt(s.beta,1)]),
      ]),
      el('div', {style:{fontSize:'11px', fontWeight:'700', color:labelColor}}, [s.label]),
    ]),
    el('div', {style:{display:'flex', gap:'8px', fontSize:'10px', marginBottom:'8px'}}, [
      el('span', {style:{color:C.text, fontWeight:'700'}}, ['$'+fmt(s.price,2)]),
      el('span', {style:{color:s.change>=0?C.green:C.pink}}, [(s.change>=0?'+':'')+fmt(s.change)+'%']),
      s.volR>0 && el('span', {style:{color:s.volR>=2?C.blue:C.text2}}, ['حجم ×'+fmt(s.volR,1)]),
    ]),
    el('div', {style:{display:'flex', alignItems:'center', gap:'6px', marginBottom:'8px'}}, [
      el('div', {style:{flex:1, height:'4px', background:'#1a2340', borderRadius:'2px'}}, [
        el('div', {style:{height:'4px', borderRadius:'2px', width:Math.min(100,s.score)+'%',
          background:'linear-gradient(90deg,'+C.purple+','+C.pink+')'}}),
      ]),
      el('span', {style:{fontSize:'10px', fontWeight:'700', color:labelColor}}, [s.score+'/100']),
    ]),
    el('div', {style:{background:entryColor+'11', border:'1px solid '+entryColor+'33',
      borderRadius:'7px', padding:'5px 8px', fontSize:'10px', fontWeight:'700',
      color:entryColor, marginBottom:'8px', textAlign:'center'}}, ['⏱ '+s.entryTiming]),
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px', marginBottom:'8px'}}, [
      el('div', {style:{background:'rgba(0,255,136,.06)', border:'1px solid rgba(0,255,136,.15)',
        borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['🎯 هدف']),
        el('div', {style:{fontSize:'12px', fontWeight:'700', color:C.green}}, ['$'+fmt(s.target,2)]),
        el('div', {style:{fontSize:'9px', color:C.green}}, ['+'+fmt(s.profitPct,1)+'%']),
      ]),
      el('div', {style:{background:'rgba(255,45,122,.06)', border:'1px solid rgba(255,45,122,.15)',
        borderRadius:'8px', padding:'6px 8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['🛑 وقف']),
        el('div', {style:{fontSize:'12px', fontWeight:'700', color:C.pink}}, ['$'+fmt(s.stopLoss,2)]),
        el('div', {style:{fontSize:'9px', color:C.pink}}, ['-'+fmt(s.lossPct,1)+'%']),
      ]),
    ]),
    s.riskReward>0 && el('div', {style:{fontSize:'10px', marginBottom:isSelected?'8px':'0',
      color:s.riskReward>=2?C.green:s.riskReward>=1.5?C.yellow:C.orange}},
      ['نسبة مخاطرة/مكافأة: '+fmt(s.riskReward,1)+'x']),
    // ══ مربع أمر الشراء — المجازفة
    el('div', {style:{
      background:'linear-gradient(135deg,rgba(180,79,255,.07),rgba(255,45,122,.04))',
      border:'1px solid rgba(180,79,255,.3)',
      borderRadius:'10px', padding:'10px 12px',
      marginBottom:'8px',
    }}, [
      el('div', {style:{
        fontSize:'10px', fontWeight:'800', color:C.purple,
        marginBottom:'8px', letterSpacing:'0.3px',
      }}, ['📋 أمر الشراء الجاهز']),

      el('div', {style:{borderTop:'1px solid rgba(180,79,255,.2)', marginBottom:'8px'}}),

      (() => {
        const distToSup2 = s.support>0 ? (s.price - s.support) / s.price * 100 : 0;
        const atSup2     = s.nearSupport || distToSup2 < 1;
        const hasSup2    = s.support>0 && distToSup2 > 0;

        let orderType2, orderColor2, orderNote2, buyPrice2;
        if(atSup2) {
          orderType2  = 'أمر سوق';
          orderColor2 = C.green;
          orderNote2  = 'السعر عند الدعم — اشتري فوراً';
          buyPrice2   = s.price;
        } else if(hasSup2 && distToSup2 <= 15) {
          orderType2  = 'أمر محدد';
          orderColor2 = C.purple;
          orderNote2  = 'انتظر تراجع للدعم — ينفذ تلقائياً';
          buyPrice2   = s.support * 1.002;
        } else {
          orderType2  = 'أمر سوق';
          orderColor2 = C.yellow;
          orderNote2  = 'ادخل بسعر السوق — راقب وقف الخسارة';
          buyPrice2   = s.price;
        }

        return el('div', {}, [
          el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'6px'}}, [
            el('span', {style:{fontSize:'10px', color:C.text3}}, ['نوع الأمر']),
            el('span', {style:{
              fontSize:'11px', fontWeight:'800', color:orderColor2,
              background:orderColor2+'18', borderRadius:'5px', padding:'2px 8px',
              border:`1px solid ${orderColor2}33`,
            }}, [orderType2]),
          ]),
          el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'6px'}}, [
            el('span', {style:{fontSize:'10px', color:C.text3}}, ['سعر الشراء']),
            el('span', {style:{fontSize:'13px', fontWeight:'900', color:C.text}}, [
              '$'+fmt(buyPrice2,2)
            ]),
          ]),
          el('div', {style:{borderTop:'1px solid rgba(255,255,255,.05)', margin:'6px 0'}}),
          el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'5px'}}, [
            el('span', {style:{fontSize:'10px', color:C.text3}}, ['🛑 وقف الخسارة']),
            el('span', {style:{fontSize:'12px', fontWeight:'800', color:C.pink}}, [
              '$'+fmt(s.stopLoss,2)
            ]),
          ]),
          el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'6px'}}, [
            el('span', {style:{fontSize:'10px', color:C.text3}}, ['🎯 هدف الربح']),
            el('div', {}, [
              el('span', {style:{fontSize:'12px', fontWeight:'800', color:C.green}}, ['$'+fmt(s.target,2)]),
              el('span', {style:{fontSize:'9px', color:C.green, marginRight:'4px'}}, [' +'+fmt(s.profitPct,1)+'%']),
            ]),
          ]),
          el('div', {style:{
            fontSize:'10px', color:C.orange,
            background:'rgba(255,122,0,.08)', borderRadius:'6px',
            padding:'5px 8px', border:'1px solid rgba(255,122,0,.2)',
            marginBottom:'5px',
          }}, ['⚠️ مجازفة — خصص جزءاً صغيراً فقط من رأس مالك']),
          el('div', {style:{
            fontSize:'10px', color:orderColor2,
            background:orderColor2+'0e', borderRadius:'6px',
            padding:'5px 8px',
          }}, ['💡 '+orderNote2]),
        ]);
      })(),
    ]),

    isSelected && el('div', {style:{borderTop:'1px solid var(--border)', paddingTop:'8px'}}, [

}

function renderMarketTab() {
  const priced = ALL_STOCKS
    .map(s => {
      const p = state.prices[s.id];
      return p?.price > 0 ? {...s, p} : null;
    })
    .filter(Boolean)
    .sort((a,b) => Math.abs(b.p.change||0) - Math.abs(a.p.change||0));

  const isLive  = priced.some(s=>s.p.isReal);
  const q = (state.search||'').toLowerCase().trim();
  const sec = state.sector || 'الكل';
  const filtered = priced
    .filter(s => sec === 'الكل' || s.sector === sec || s.sector?.includes(sec))
    .filter(s => !q || s.id.toLowerCase().includes(q) || s.name.toLowerCase().includes(q));
  const gainers = filtered.filter(s=>(s.p.change||0)>0);
  const losers  = filtered.filter(s=>(s.p.change||0)<0);
  const flat    = filtered.filter(s=>(s.p.change||0)===0);

  // فارغ — رسالة تحميل مع timeout
  if(priced.length === 0) {
    // إذا مضى أكثر من 20 ثانية ولا أسعار — نعرض رسالة خطأ
    const elapsed = state._loadStart ? (Date.now() - state._loadStart)/1000 : 0;
    if(elapsed > 20) {
      return el('div', {style:{padding:'30px 16px', textAlign:'center'}}, [
        el('div', {style:{fontSize:'32px', marginBottom:'8px'}}, ['⚠️']),
        el('div', {style:{fontSize:'13px', color:C.orange, marginBottom:'6px'}}, ['فشل تحميل الأسعار']),
        el('div', {style:{fontSize:'11px', color:C.text2, marginBottom:'12px'}}, ['تحقق من الاتصال بالإنترنت']),
        el('button', {
          style:{background:'rgba(0,200,255,.15)', border:'1px solid rgba(0,200,255,.3)',
            borderRadius:'8px', padding:'8px 16px', color:C.blue, fontSize:'11px'},
          onClick: () => { state._loadStart = Date.now(); loadData(); render(); }
        }, ['🔄 إعادة المحاولة']),
      ]);
    }
    return el('div', {style:{padding:'40px 16px', textAlign:'center'}}, [
      el('div', {style:{
        width:'36px', height:'36px', margin:'0 auto 12px',
        border:'3px solid rgba(0,200,255,.2)',
        borderTop:'3px solid #00c8ff',
        borderRadius:'50%', animation:'spin 1s linear infinite',
      }}),
      el('div', {style:{fontSize:'13px', color:C.blue, marginBottom:'4px'}}, ['جاري تحميل الأسعار...']),
      el('div', {style:{fontSize:'11px', color:C.text2}}, [`${Math.round(elapsed)} ثانية`]),
    ]);
  }

  return el('div', {style:{padding:'12px 16px'}}, [
    // ── صف 1: العنوان + حالة الأسعار
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px'}}, [
      el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.text}}, [
        '📊 نظرة السوق — '+priced.length+' سهم'
      ]),
      el('div', {style:{
        fontSize:'10px', fontWeight:'700',
        color: isLive ? C.green : C.yellow,
        background: isLive ? 'rgba(0,255,136,.1)' : 'rgba(255,224,51,.1)',
        borderRadius:'6px', padding:'3px 10px',
        border:`1px solid ${isLive?'rgba(0,255,136,.3)':'rgba(255,224,51,.3)'}`,
      }}, [isLive ? '🟢 أسعار حية' : '🟡 آخر تحديث']),
    ]),
    // ── صف 2: أزرار القطاعات
    el('div', {style:{
      display:'flex', gap:'6px', flexWrap:'nowrap',
      overflowX:'auto', marginBottom:'8px', paddingBottom:'2px',
    }}, ['الكل','تكنولوجيا','مالية','صحة','طاقة'].map(sec =>
      el('button', {
        style:{
          fontSize:'11px', fontWeight:'700', whiteSpace:'nowrap',
          padding:'5px 12px', borderRadius:'20px', cursor:'pointer', flexShrink:'0',
          color: state.sector===sec ? '#050810' : C.text2,
          background: state.sector===sec ? C.blue : 'rgba(255,255,255,.05)',
          border: state.sector===sec ? 'none' : '1px solid #1a2340',
        },
        onClick: () => { state.sector = sec; render(); }
      }, [sec])
    )),
    // ── صف 3: بحث + زر تحديث
    el('div', {style:{display:'flex', gap:'8px', marginBottom:'12px'}}, [
      el('input', {
        type:'text', placeholder:'🔍 بحث عن سهم...', value: state.search,
        style:{
          flex:'1', background:'#0a1020', border:'1px solid #1a2340',
          borderRadius:'8px', padding:'8px 12px', color:'#e8eeff',
          fontSize:'12px', outline:'none', textAlign:'right',
        },
        onInput: e => { state.search = e.target.value; render(); }
      }),
      el('button', {
        style:{
          fontSize:'11px', fontWeight:'700', color:'#00c8ff',
          background:'rgba(0,200,255,.1)', borderRadius:'8px',
          padding:'8px 12px', border:'1px solid rgba(0,200,255,.3)',
          cursor:'pointer', whiteSpace:'nowrap', flexShrink:'0',
        },
        onClick: async () => { await fetchPrices(); await fetchMarketTrend(); render(); }
      }, ['🔄 تحديث']),
    ]),
    gainers.length>0 && el('div', {style:{marginBottom:'12px'}}, [
      el('div', {style:{fontSize:'11px', color:C.green, fontWeight:'700', marginBottom:'6px'}}, [
        '▲ الرابحون ('+gainers.length+')'
      ]),
      ...gainers.map(s => renderMiniStock(s, true)),
    ]),
    losers.length>0 && el('div', {style:{marginBottom:'12px'}}, [
      el('div', {style:{fontSize:'11px', color:C.pink, fontWeight:'700', marginBottom:'6px'}}, [
        '▼ الخاسرون ('+losers.length+')'
      ]),
      ...losers.map(s => renderMiniStock(s, false)),
    ]),
    flat.length>0 && el('div', {}, [
      el('div', {style:{fontSize:'11px', color:C.text2, fontWeight:'700', marginBottom:'6px'}}, ['➡️ بدون تغيير']),
      ...flat.map(s => renderMiniStock(s, false)),
    ]),
  ]);
}

function renderMiniStock(s, isGainer) {
  const color = isGainer ? C.green : C.pink;
  const spyChg = state.spyChange || 0;
  const diff = (s.p.change||0) - spyChg;
  const vsColor = diff >= 0 ? C.green : C.pink;
  const vsText = (diff>=0?'+':'')+diff.toFixed(2)+'% vs SPY';
  return el('div', {style:{
    display:'flex', justifyContent:'space-between', alignItems:'center',
    padding:'6px 10px', background:'#060b14', borderRadius:'8px',
    marginBottom:'4px', border:`1px solid ${color}18`,
  }}, [
    el('div', {}, [
      el('span', {style:{fontSize:'11px', fontWeight:'700', color:C.text}}, [s.name]),
      el('span', {style:{fontSize:'9px', color:C.text2, marginRight:'4px'}}, [' '+s.id]),
    ]),
    el('div', {style:{textAlign:'left'}}, [
      el('div', {style:{fontSize:'11px', fontWeight:'700', color:C.text}}, [fmtPrice(s.p.price)]),
      el('div', {style:{fontSize:'10px', color}}, [(isGainer?'+':'')+fmt(s.p.change)+'%']),
      state.spyChange!==null && el('div', {style:{fontSize:'9px', color:vsColor}}, [vsText]),
    ]),
  ]);
}
