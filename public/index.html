function renderStockPriceRangeCard(s, p, ind) {
  const range = state.stockRange || 'week';
  const count = range === 'month' ? 30 : 7;
  const closes = (ind?.closesFull || ind?.closes || []).slice(-count);
  const dates  = (ind?.datesFull  || ind?.dates  || []).slice(-count);
  if(!closes.length) return null;

  const first = closes[0], last = closes[closes.length-1];
  const periodPct = first ? (last-first)/first*100 : 0;
  const high = Math.max(...closes);
  const low  = Math.min(...closes);
  const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

  return el('div', {style:{
    background:'#0a1020', border:'1px solid rgba(214,168,79,.25)',
    borderRadius:'14px', padding:'12px', marginBottom:'12px',
  }}, [
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'10px'}}, [
      el('div', {style:{fontSize:'12px', fontWeight:'900', color:C.blue}}, ['📅 أسعار '+(range==='month'?'الشهر':'الأسبوع')]),
      el('div', {style:{display:'flex', gap:'6px'}}, [
        el('button', {style:{
          fontSize:'10px', fontWeight:'800', borderRadius:'7px', padding:'5px 9px',
          color:range==='week'?C.green:C.text2,
          border:`1px solid ${range==='week'?C.green+'66':'rgba(255,255,255,.12)'}`,
          background:range==='week'?'rgba(0,255,136,.10)':'rgba(255,255,255,.03)',
        }, onClick:()=>{state.stockRange='week'; render();}}, ['أسبوع']),
        el('button', {style:{
          fontSize:'10px', fontWeight:'800', borderRadius:'7px', padding:'5px 9px',
          color:range==='month'?C.green:C.text2,
          border:`1px solid ${range==='month'?C.green+'66':'rgba(255,255,255,.12)'}`,
          background:range==='month'?'rgba(0,255,136,.10)':'rgba(255,255,255,.03)',
        }, onClick:()=>{state.stockRange='month'; render();}}, ['شهر']),
      ]),
    ]),
    el('div', {style:{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'6px', marginBottom:'10px'}}, [
      el('div', {style:{background:'#060b14', borderRadius:'8px', padding:'7px', textAlign:'center'}}, [
        el('div', {style:{fontSize:'8px', color:C.text3}}, ['تغير الفترة']),

        el('div', {style:{fontSize:'13px', fontWeight:'900', color:C.pink}}, [fmtPrice(low)]),

    ]),
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr', gap:'4px'}},
      closes.map((price, i) => {
        const prev = i>0 ? closes[i-1] : price;
        const chg = prev ? (price-prev)/prev*100 : 0;
        const d = dates[i] ? new Date(dates[i]) : null;
        const label = d && !isNaN(d) ? days[d.getDay()]+' '+dates[i] : 'اليوم '+(i+1);
        return el('div', {style:{
          display:'flex', justifyContent:'space-between', alignItems:'center',
          background:'rgba(255,255,255,.025)', borderRadius:'7px',

        }}, [
          el('span', {style:{color:C.text2}}, [label]),

          el('span', {style:{fontWeight:'800', color:chg>=0?C.green:C.pink}}, [(chg>=0?'+':'')+fmt(chg,2)+'%']),
        ]);
      })
    ),
  ]);
}

// ── بطاقة تحليل المضارب اليومي
function renderTraderCard(s, ind, volR, chg, priceObj) {
  const pData = priceObj || s.p || {};
  const price = pData.price || 0;

  const signals = [];

  // 1. MACD Histogram — زخم الحركة
  if(ind.macdHist!=null) {
    const h = ind.macdHist, d = ind.macdHistDir;
    const col  = h>0&&d==='expanding'?C.green : h>0?C.yellow : d==='expanding'?C.pink:C.orange;
    const icon = h>0&&d==='expanding'?'✅':h>0?'⚠️':d==='expanding'?'❌':'⚠️';
    const txt  = h>0&&d==='expanding'
      ? 'الزخم يتصاعد للأعلى — قوة الشراء تزداد — فرصة دخول جيدة'
      : h>0
      ? 'الزخم موجب لكن يضعف — الحركة تتباطأ — راقب الخروج'
      : d==='expanding'
      ? 'الزخم يتصاعد للأسفل — قوة البيع تزيد — تجنب الدخول'
      : 'الزخم سالب لكن يضعف — قد يرتد — انتظر تأكيداً';
    const hint = 'MACD Histogram يقيس قوة واتجاه الحركة';
    signals.push({label:'زخم الحركة (MACD)', value:(h>0?'+':'')+fmt(h,2)+(d==='expanding'?' ↑':' ↓'), desc:txt, hint, color:col, icon});
  }

  // 2. RSI — هل السهم مباع أو مشترى بإفراط؟
  if(ind.rsi!=null) {
    const r   = ind.rsi;
    const col = r<35?C.green:r>70?C.pink:C.yellow;
    const icon= r<35?'✅':r>70?'❌':'⚠️';
    const txt = r<30 ? 'مباع بإفراط شديد — ارتداد قوي محتمل — فرصة شراء'
              : r<45 ? 'منطقة شراء — السهم رخيص نسبياً'
              : r<60 ? 'منطقة محايدة — لا إشارة واضحة — انتظر'
              : r<70 ? 'السهم قوي لكن راقب التشبع'
              :        'مشترى بإفراط — قد ينزل — احذر من الدخول الآن';
    const hint = 'RSI: أقل من 30 = رخيص جداً | أكثر من 70 = غالٍ جداً';
    signals.push({label:'RSI — القوة النسبية', value:fmt(r,1), desc:txt, hint, color:col, icon});
  }

  // 3. الشمعة الأخيرة
  if(ind.closes?.length >= 3) {
    const candles = detectCandlePatterns(ind.closes, ind.highs, ind.lows, ind.opens);
    const top = candles[0];
    if(top) {
      const col  = top.signal==='bullish'?C.green:top.signal==='bearish'?C.pink:C.yellow;
      const icon = top.signal==='bullish'?'✅':top.signal==='bearish'?'❌':'⚠️';
      const extra= top.signal==='bullish'?' — إشارة شراء':top.signal==='bearish'?' — إشارة بيع':' — انتظر تأكيد';
      const hint = 'الشمعة تعكس حركة السعر في اليوم الأخير';
      signals.push({label:'الشمعة اليابانية', value:top.ar, desc:top.tip+extra, hint, color:col, icon});
    } else {
      const hint = 'الشمعة تعكس حركة السعر في اليوم الأخير';
      signals.push({label:'الشمعة اليابانية', value:'محايدة', desc:'لا نمط واضح — السوق في تردد — انتظر جلسة أخرى', hint, color:C.text3, icon:'⚠️'});
    }
  }

  // 4. الحجم
  const volCol  = volR>=2?C.green:volR>=1.2?C.blue:volR<0.7?C.pink:C.text3;
  const volIcon = volR>=2?'✅':volR>=1.2?'✅':volR<0.7?'❌':'⚠️';
  const volTxt  = volR>=2 ? 'اهتمام قوي جداً — حركة حقيقية وليست وهمية'
                : volR>=1.2 ? 'حجم مرتفع — تأكيد للحركة'
                : volR<0.7  ? 'حجم ضعيف — الحركة قد لا تستمر'
                :             'حجم طبيعي — لا تأكيد إضافي';
  const volHint = 'الحجم يقيس عدد الأسهم المتداولة مقارنة بالمعدل';
  signals.push({label:'حجم التداول', value:'×'+fmt(volR,1), desc:volTxt, hint:volHint, color:volCol, icon:volIcon});

  // 5. الأسبوعي
  if(ind.weeklyTrend) {
    const col  = ind.weeklyTrend==='bullish'?C.blue:C.pink;
    const icon = ind.weeklyTrend==='bullish'?'✅':'❌';
    const txt  = ind.weeklyTrend==='bullish'
      ? 'الاتجاه الكبير صاعد — الموجة في صالحك — أفضل للشراء'
      : 'الاتجاه الكبير هابط — تسبح عكس التيار — خطر أعلى';
    const hint = 'الأسبوعي يعكس اتجاه السهم على مدى أسابيع';
    signals.push({label:'الاتجاه الأسبوعي', value:ind.weeklyTrend==='bullish'?'صاعد ↑':'هابط ↓', desc:txt, hint, color:col, icon});
  }

  // 6. الدعم
  if(ind.support && ind.support > 0) {
    const dist     = (price - ind.support)/price*100;
    const atSup    = dist < 2;
    const belowSup = price < ind.support;
    const col  = atSup?C.green:belowSup?C.pink:C.text3;
    const icon = atSup?'✅':belowSup?'❌':'⚠️';
    const txt  = atSup
      ? 'السعر عند الدعم — تاريخياً يرتد من هنا — نقطة شراء محتملة'
      : belowSup
      ? 'السعر كسر الدعم — إشارة هبوط — انتظر الاستقرار'
      : 'بُعد '+fmt(dist,1)+'% من الدعم — ليس عند نقطة ارتداد بعد';
    const hint = 'الدعم = مستوى سعري يرتد منه السهم للأعلى تاريخياً';
    signals.push({label:'مستوى الدعم', value:'$'+fmt(ind.support,2), desc:txt, hint, color:col, icon});
  }

  // 7. رأي المحللين — للتأكيد وليس للقيادة
  const av = getAnalystView(s.id, price);
  if(av.analysts || av.target) {
    const icon = av.bias >= 1 ? '✅' : av.bias <= -2 ? '❌' : '⚠️';
    const desc = av.analysts
      ? av.analysts+' محلل — '+av.verdict+(av.target ? ' — هدفهم $'+fmt(av.target,2) : '')
      : 'هدف المحللين $'+fmt(av.target,2);
    const hint = 'رأي المحللين عامل تأكيد فقط؛ لا يدخل وحده بدون سعر دخول ووقف خسارة واضح';
    signals.push({
      label:'رأي المحللين',
      value: av.upside!=null ? (av.upside>=0?'+':'')+fmt(av.upside,1)+'%' : av.label,
      desc, hint, color:av.color, icon
    });
  }

  // ── القرار
  const greens = signals.filter(s=>s.icon==='✅').length;
  const reds   = signals.filter(s=>s.icon==='❌').length;
  let decision, decColor, decBg;
  if(greens >= 4)         { decision='اشتري / تمسك 🟢'; decColor=C.green;  decBg='rgba(0,255,136,.08)'; }
  else if(reds >= 3)      { decision='بيع / اخرج 🔴';   decColor=C.pink;   decBg='rgba(255,45,122,.08)'; }
  else if(greens >= reds) { decision='انتظر تأكيد 🟡';  decColor=C.yellow; decBg='rgba(255,224,51,.06)'; }
  else                    { decision='ميل للبيع ⚠️';    decColor=C.orange; decBg='rgba(255,122,0,.08)'; }

  return el('div',{style:{
    background:'#050810', padding:'10px',
  }},[

    // ── المؤشرات
    el('div',{style:{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'12px',width:'100%'}},
      signals.map(sig => el('div',{style:{
        background:'#060b14', borderRadius:'10px', padding:'10px 14px',
        border:`1px solid ${sig.color}22`,
        display:'flex', alignItems:'flex-start', gap:'10px',
        width:'100%', boxSizing:'border-box',
      }},[
        // أيقونة
        el('span',{style:{fontSize:'20px',flexShrink:'0',marginTop:'2px'}},[sig.icon]),
        // وصف يملأ المساحة
        el('div',{style:{flex:'1',minWidth:'0',textAlign:'right'}},[
          el('div',{style:{
            fontSize:'13px',fontWeight:'700',color:sig.color,
            lineHeight:'1.6', marginBottom:'3px',
          }},[sig.desc]),
          sig.hint && el('div',{style:{
            fontSize:'10px',color:C.text3,
            borderTop:`1px solid ${sig.color}15`, paddingTop:'3px', marginTop:'3px',
          }},[sig.hint]),
        ]),
        // القيمة + اسم المؤشر
        el('div',{style:{
          textAlign:'right', flexShrink:'0',
          borderRight:`2px solid ${sig.color}40`,
          paddingRight:'10px', minWidth:'70px',
        }},[
          el('div',{style:{fontSize:'14px',fontWeight:'900',color:sig.color}},[sig.value]),
          el('div',{style:{fontSize:'9px',color:C.text3,marginTop:'2px'}},[sig.label]),
        ]),
      ]))
    ),

    // ── القرار النهائي
    el('div',{style:{
      background:decBg,
      border:`1px solid ${decColor}33`,
      borderRadius:'10px',padding:'12px 14px',
      direction:'rtl', marginBottom:'8px',
    }},[
      el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}},[
        el('span',{style:{fontSize:'14px',fontWeight:'900',color:decColor}},[decision]),
        el('span',{style:{fontSize:'10px',color:C.text3}},['✅'+greens+' ❌'+reds+' ⚠️'+(signals.length-greens-reds)]),
      ]),
      el('div',{style:{fontSize:'11px',color:C.text2,lineHeight:'1.6'}},[
        greens >= 4
          ? 'معظم المؤشرات تشير للشراء — يمكن الدخول مع وقف الخسارة الإلزامي'
          : reds >= 3
          ? 'معظم المؤشرات تشير للبيع — تجنب الدخول أو اخرج إذا عندك مركز مفتوح'
          : greens >= reds
          ? 'المؤشرات مختلطة — انتظر شمعة غد: إذا أغلق بخضراء قوية مع حجم مرتفع ادخل، وإلا انتظر'
          : 'الميل للهبوط — انتظر حتى يستقر السعر عند دعم أو يتحول MACD للإيجابي',
      ]),
    ]),

    // ── تحذير
    el('div',{style:{fontSize:'8px',color:C.text3,marginTop:'6px',textAlign:'center'}},
      ['⚠️ تحليل تقني لحظي — القرار النهائي لك']),
  ]);
}

function renderPortTab() {
  return renderSmartJournalTab();
  // تحميل المحفظة من localStorage
  let portfolio = [];
  try { portfolio = JSON.parse(localStorage.getItem('portfolio')||'[]'); } catch(e) {}

  const openTrades  = portfolio.filter(t=>t.type==='buy'&&!t.closed);
  const closedTrades= portfolio.filter(t=>t.closed||t.type==='sell');

  const totalInvested = openTrades.reduce((s,t) => s + t.shares*t.buyPrice*USD_RATE, 0);
  const totalCurrent  = openTrades.reduce((s,t) => {
    const p = state.prices[t.symbol]?.price || t.buyPrice;
    return s + t.shares*p*USD_RATE;
  }, 0);
  const totalPnL = totalCurrent - totalInvested;

  const wins = closedTrades.filter(t=>(t.exitPrice||t.buyPrice)>t.buyPrice).length;
  const winRate = closedTrades.length>0 ? Math.round(wins/closedTrades.length*100) : 0;

  const totalRealized = closedTrades.reduce((s,t) => {
    const exit = t.exitPrice||t.buyPrice;
    return s + (exit - t.buyPrice)*t.shares*USD_RATE;
  }, 0);

  function _savePortfolio() {
    try { localStorage.setItem('portfolio', JSON.stringify(portfolio)); } catch(e) {}
    // المحفظة تُحفظ محلياً فقط — السجل هو ما يذهب للسحابة
  }

  function saveTrade() {
    const sym    = (document.getElementById('p_sym')?.value||'').toUpperCase().trim();
    const shares = parseFloat(document.getElementById('p_shares')?.value||0);
    const price  = parseFloat(document.getElementById('p_price')?.value||0);
    const type   = document.getElementById('p_type')?.value||'buy';
    const notes  = document.getElementById('p_notes')?.value||'';
    const stopV  = parseFloat(document.getElementById('p_stop')?.value||0);
    const tgtV   = parseFloat(document.getElementById('p_tgt')?.value||0);
    if(!sym||!shares||!price) { alert('أكمل الحقول الأساسية'); return; }

    const trade = {
      symbol:sym, shares, buyPrice:price, type,
      notes, stopLoss:stopV||0, target:tgtV||0,
      date:new Date().toISOString(),
      closed:false, exitPrice:null, exitDate:null,
    };

    // إذا نوع بيع — ابحث عن صفقة شراء مفتوحة
    if(type==='sell') {
      const openIdx = portfolio.findIndex(t=>t.symbol===sym&&t.type==='buy'&&!t.closed);
      if(openIdx>=0) {
        portfolio[openIdx].closed    = true;
        portfolio[openIdx].exitPrice = price;
        portfolio[openIdx].exitDate  = new Date().toISOString();
        portfolio[openIdx].exitNotes = notes;
      } else {
        // إضافة كسجل مباشر
        trade.closed    = true;
        trade.exitPrice = price;
        trade.exitDate  = new Date().toISOString();
        portfolio.push(trade);
      }
    } else {
      portfolio.push(trade);
    }

    _savePortfolio();
    ['p_sym','p_shares','p_price','p_notes','p_stop','p_tgt'].forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.value='';
    });
    render();
  }

  function deleteTrade(idx) {
    if(!confirm('حذف الصفقة؟')) return;
    portfolio.splice(idx, 1);
    _savePortfolio();
    render();
  }

  function closeTrade(idx) {
    const t   = portfolio[idx];
    const cur = state.prices[t.symbol]?.price || t.buyPrice;
    // نحفظ index في state لفتح حقل الإغلاق
    state._closingIdx = state._closingIdx === idx ? null : idx;
    render();
  }

  function confirmClose(idx) {
    const exitVal = parseFloat(document.getElementById('close_price_'+idx)?.value||0);
    if(!exitVal || isNaN(exitVal) || exitVal <= 0) { alert('أدخل سعر إغلاق صحيح'); return; }
    portfolio[idx].closed    = true;
    portfolio[idx].exitPrice = exitVal;
    portfolio[idx].exitDate  = new Date().toISOString();
    state._closingIdx = null;
    _savePortfolio();
    render();
  }

  function fmtDate(iso) {
    if(!iso) return '';
    try {
      return new Date(iso).toLocaleDateString('ar', {month:'short', day:'numeric'});
    } catch(e) { return ''; }
  }

  return el('div', {style:{padding:'12px 16px'}}, [
    // إحصائيات
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginBottom:'14px'}}, [
      el('div', {style:{background:'#0a1020', border:'1px solid var(--border)', borderRadius:'12px', padding:'12px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['💼 مفتوحة']),
        el('div', {style:{fontSize:'16px', fontWeight:'900', color:C.blue}}, [totalInvested.toFixed(0)+' ر']),
        el('div', {style:{fontSize:'9px', color:totalPnL>=0?C.green:C.pink}}, [
          'غير محقق: '+(totalPnL>=0?'+':'')+totalPnL.toFixed(0)+' ر'
        ]),
      ]),
      el('div', {style:{background: totalRealized>=0?'rgba(0,255,136,.08)':'rgba(255,45,122,.08)', border:`1px solid ${totalRealized>=0?C.green:C.pink}33`, borderRadius:'12px', padding:'12px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['💰 محقق']),
        el('div', {style:{fontSize:'16px', fontWeight:'900', color:totalRealized>=0?C.green:C.pink}}, [
          (totalRealized>=0?'+':'')+totalRealized.toFixed(0)+' ر'
        ]),
        el('div', {style:{fontSize:'9px', color:C.text2}}, [closedTrades.length+' صفقة مغلقة']),
      ]),
      el('div', {style:{background:'#0a1020', border:'1px solid var(--border)', borderRadius:'12px', padding:'12px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['🎯 نسبة النجاح']),
        el('div', {style:{fontSize:'16px', fontWeight:'900', color:winRate>=60?C.green:winRate>=40?C.yellow:C.pink}}, [winRate+'%']),
        el('div', {style:{fontSize:'9px', color:C.text2}}, [wins+' ربح / '+(closedTrades.length-wins)+' خسارة']),
      ]),
      el('div', {style:{background:'#0a1020', border:'1px solid var(--border)', borderRadius:'12px', padding:'12px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['📊 مفتوح / مغلق']),
        el('div', {style:{fontSize:'16px', fontWeight:'900', color:C.blue}}, [openTrades.length+' / '+closedTrades.length]),
        el('div', {style:{fontSize:'9px', color:C.text2}}, ['إجمالي '+portfolio.length+' صفقة']),
      ]),
    ]),

    // إضافة صفقة
    el('div', {style:{background:'#0a1020', border:`1px solid ${C.green}33`, borderRadius:'14px', padding:'14px', marginBottom:'14px'}}, [
      el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.green, marginBottom:'12px'}}, ['➕ تسجيل صفقة جديدة']),

      el('div', {style:{marginBottom:'8px'}}, [

        el('input', {id:'p_notes', type:'text', placeholder:'سبب الدخول، استراتيجية...', style:{width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px'}}),
      ]),
      el('button', {
        style:{width:'100%', background:`linear-gradient(135deg,${C.green}22,${C.blue}22)`, border:`1px solid ${C.green}`, color:C.green, borderRadius:'10px', padding:'10px', fontSize:'13px', fontWeight:'700'},
        onClick: saveTrade,
      }, ['💾 حفظ الصفقة']),
    ]),

    // ── الصفقات المفتوحة
    openTrades.length > 0 && el('div', {style:{marginBottom:'14px'}}, [
      el('div', {style:{fontSize:'12px', fontWeight:'700', color:C.blue, marginBottom:'8px'}}, ['📂 صفقات مفتوحة ('+openTrades.length+')']),
      ...portfolio.map((t, idx) => {
        if(t.closed || t.type==='sell') return null;
        const cur = state.prices[t.symbol]?.price || t.buyPrice;
        const pnl = (cur - t.buyPrice) * t.shares * USD_RATE;
        const pnlPct = ((cur - t.buyPrice)/t.buyPrice*100).toFixed(2);
        const rr = t.stopLoss>0&&t.target>0
          ? (((t.target-t.buyPrice)/(t.buyPrice-t.stopLoss))).toFixed(1)+'x'
          : null;
        const nearStop = t.stopLoss>0 && cur <= t.stopLoss*1.02;
        const nearTgt  = t.target>0  && cur >= t.target*0.98;
        return el('div', {style:{
          background:'#0a1020',
          border:`1px solid ${pnl>=0?C.green:C.pink}22`,
          borderRadius:'10px', padding:'10px', marginBottom:'8px',
        }}, [
          el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'4px'}}, [
            el('div', {}, [
              el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.text}}, [t.symbol+' × '+t.shares]),
              el('div', {style:{fontSize:'9px', color:C.text3}}, [
                '📅 '+fmtDate(t.date)+' • دخول $'+t.buyPrice.toFixed(2)
              ]),
            ]),
            el('div', {style:{textAlign:'left'}}, [
              el('div', {style:{fontSize:'13px', fontWeight:'700', color:pnl>=0?C.green:C.pink}}, [
                (pnl>=0?'+':'')+pnl.toFixed(0)+' ر'
              ]),
              el('div', {style:{fontSize:'10px', color:pnl>=0?C.green:C.pink}}, [
                (pnl>=0?'+':'')+pnlPct+'%'
              ]),
            ]),
          ]),
          // السعر الحالي
          el('div', {style:{display:'flex', gap:'6px', marginBottom:'4px'}}, [
            el('div', {style:{
              flex:'1', background:'#060b14', borderRadius:'6px', padding:'4px 6px',
              fontSize:'9px', color:C.text2,
            }}, ['الآن: $'+cur.toFixed(2)]),
            t.stopLoss>0&&el('div', {style:{
              flex:'1', background:nearStop?'rgba(255,45,122,.15)':'#060b14',
              borderRadius:'6px', padding:'4px 6px', fontSize:'9px',
              color:nearStop?C.pink:C.text3,
            }}, ['🛑 $'+t.stopLoss.toFixed(2)+(nearStop?' ⚠️':'')]),
            t.target>0&&el('div', {style:{
              flex:'1', background:nearTgt?'rgba(0,255,136,.15)':'#060b14',
              borderRadius:'6px', padding:'4px 6px', fontSize:'9px',
              color:nearTgt?C.green:C.text3,
            }}, ['🎯 $'+t.target.toFixed(2)+(nearTgt?' ✅':'')]),
          ].filter(Boolean)),
          // ملاحظات ونسبة R/R
          el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center'}}, [
            t.notes?el('div', {style:{fontSize:'9px', color:C.text3, flex:'1', marginLeft:'8px'}}, [
              '💬 '+t.notes
            ]):el('div',{},[]),
            el('div', {style:{display:'flex', gap:'4px', flexShrink:'0'}}, [
              rr&&el('span', {style:{
                fontSize:'9px', background:'rgba(180,79,255,.1)',
                border:'1px solid rgba(180,79,255,.3)',
                borderRadius:'4px', padding:'2px 5px', color:C.purple,
              }}, ['R:R '+rr]),
              el('button', {
                style:{background:`rgba(0,200,255,.1)`, border:`1px solid rgba(0,200,255,.3)`,

                onClick: () => closeTrade(idx),
              }, [state._closingIdx === idx ? '✕ إلغاء' : '💰 إغلاق']),
              el('button', {
                style:{background:'rgba(255,45,122,.1)', border:'1px solid rgba(255,45,122,.3)',
                  color:C.pink, borderRadius:'6px', padding:'3px 7px', fontSize:'9px'},
                onClick: () => deleteTrade(idx),
              }, ['🗑️']),
            ].filter(Boolean)),
          ]),
          // ── حقل إغلاق الصفقة (يظهر عند الضغط على إغلاق)
          state._closingIdx === idx ? el('div', {style:{
            marginTop:'8px', background:'rgba(0,200,255,.06)',
            border:'1px solid rgba(0,200,255,.2)',
            borderRadius:'8px', padding:'8px 10px',
            display:'flex', gap:'6px', alignItems:'center',
          }}, [
            el('span', {style:{fontSize:'9px', color:C.text3, flexShrink:'0'}}, ['سعر الإغلاق $']),
            el('input', {
              id:'close_price_'+idx,
              type:'number',
              placeholder: cur.toFixed(2),
              style:{
                flex:'1', background:'#060b14', border:'1px solid rgba(0,200,255,.3)',
                borderRadius:'6px', padding:'5px 8px', color:C.text, fontSize:'12px',
              },
            }),
            el('button', {
              style:{
                background:`linear-gradient(135deg,${C.green}22,${C.blue}22)`,
                border:`1px solid ${C.green}44`, color:C.green,
                borderRadius:'6px', padding:'5px 10px', fontSize:'10px', fontWeight:'700',
                flexShrink:'0',
              },
              onClick: () => confirmClose(idx),
            }, ['✅ تأكيد']),
          ]) : null,

      }).filter(Boolean),
    ]),

    // ── الصفقات المغلقة
    closedTrades.length > 0 && el('div', {}, [
      el('div', {style:{fontSize:'12px', fontWeight:'700', color:C.text2, marginBottom:'8px'}}, ['📋 السجل ('+closedTrades.length+')']),

        if(!t.closed && t.type!=='sell') return null;
        const exit = t.exitPrice||t.buyPrice;
        const pnl  = (exit - t.buyPrice)*t.shares*USD_RATE;
        const pnlPct = ((exit-t.buyPrice)/t.buyPrice*100).toFixed(2);
        const days = t.exitDate&&t.date
          ? Math.round((new Date(t.exitDate)-new Date(t.date))/(1000*60*60*24))
          : null;
        return el('div', {style:{
          background:'rgba(255,255,255,.02)',
          border:`1px solid ${pnl>=0?C.green:C.pink}18`,

          display:'flex', justifyContent:'space-between', alignItems:'center',
        }}, [
          el('div', {}, [
            el('div', {style:{fontSize:'11px', fontWeight:'700', color:pnl>=0?C.green:C.pink}}, [
              (pnl>=0?'✅':'❌')+' '+t.symbol

              fmtDate(t.date)+(t.exitDate?' → '+fmtDate(t.exitDate):'')+

            el('div', {style:{fontSize:'9px', color:pnl>=0?C.green:C.pink}}, [
              (pnl>=0?'+':'')+pnlPct+'%'

              style:{background:'rgba(255,45,122,.1)', border:'1px solid rgba(255,45,122,.25)', color:C.pink, borderRadius:'5px', padding:'2px 6px', fontSize:'9px', marginTop:'2px'},

    ]),
  ]);
}

              borderRadius:'6px', padding:'6px 8px', color:C.text, fontSize:'12px'},
          }),
        ]),
        el('div', {}, [
          el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'3px'}}, ['سعر البيع $']),
          el('input', {
            id:'calc_sell', type:'number', placeholder:'0.00',
            style:{width:'100%', background:'#060b14', border:'1px solid var(--border)',
              borderRadius:'6px', padding:'6px 8px', color:C.text, fontSize:'12px'},
          }),
        ]),
      ]),
      el('div', {style:{marginBottom:'8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'3px'}}, ['عدد الأسهم']),
        el('input', {
          id:'calc_qty', type:'number', placeholder:'0',
          style:{width:'100%', background:'#060b14', border:'1px solid var(--border)',
            borderRadius:'6px', padding:'6px 8px', color:C.text, fontSize:'12px'},
        }),
      ]),
      el('button', {
        style:{
          width:'100%', background:`linear-gradient(135deg,${C.blue}22,${C.green}22)`,
          border:`1px solid ${C.blue}44`, borderRadius:'8px',
          padding:'8px', color:C.blue, fontWeight:'700', fontSize:'12px',
        },
        onClick: () => {
          const buy = parseFloat($('calc_buy')?.value||0);
          const sell= parseFloat($('calc_sell')?.value||0);
          const qty = parseFloat($('calc_qty')?.value||0);
          if(!buy||!sell||!qty) return;
          const pnl    = (sell-buy)*qty;
          const pnlSar = pnl*USD_RATE;
          const pct    = (sell-buy)/buy*100;
          alert(`الربح/الخسارة:\n${pnl>=0?'+':''}${fmt(pnl,2)} $ (${fmt(pct,2)}%)\n= ${fmt(pnlSar,0)} ريال`);
        }
      }, ['احسب']),
    ]),
  ]);
}

// ================================================================
// ═══════════════════ TIMER & START ══════════════════════════════
// ================================================================

// ── متغيرات التحكم في التوصيات
let _recsLockedToday  = false;   // التوصيات محسوبة ومقفلة لليوم
let _midDayDone       = false;   // تحديث منتصف اليوم تم
let _lastRecDate      = null;    // تاريخ آخر حساب

function shouldRecalc() {
  const today = new Date().toDateString();
  // يوم جديد → أعد الحساب
  if(_lastRecDate !== today) {
    _recsLockedToday = false;
    _midDayDone      = false;
    _lastRecDate     = today;
    return true;
  }
  return !_recsLockedToday;
}

// ── reset المؤشرات عند فتح السوق (إذا حُمّلت وهو مغلق)
let _marketWasClosed = !isMarketOpen();
setInterval(() => {
  const nowOpen = isMarketOpen();
  if(nowOpen && _marketWasClosed && !_recsLockedToday && !_indicatorsLoading) {
    console.log('[Market Open] السوق فتح — إعادة تحميل المؤشرات...');
    state.indicatorsDone = false;
    loadData(false);
  }
  _marketWasClosed = !nowOpen;
}, 15000);

// ── تحديث الأسعار واتجاه السوق كل 30 ثانية (بدون إعادة حساب التوصيات)
setInterval(async () => {
  if(!isMarketOpen()) return; // لا داعي للتحديث خارج السوق
  await Promise.all([fetchPrices(), fetchMarketTrend()]);
  // فقط نحدث الأسعار في التوصيات الموجودة — لا نعيد الحساب الكامل
  if(state.recs) {
    state.recs = state.recs.map(r => {
      const p = state.prices[r.id];
      if(!p?.price) return r;
      const stock = ALL_STOCKS.find(s => s.id === r.id);
      const fresh = stock && state.indicatorsDone ? calcSignal(stock) : null;
      return fresh
        ? { ...r, ...fresh, isConviction:r.isConviction }
        : { ...r, price:p.price, change:p.change, high:p.high, low:p.low, volume:p.volume };
    }).filter(r =>
      r?.recStage === 'confirmed' ||
      r?.recStage === 'conditional' ||
      r?.recStage === 'early'
    );
  }
  if(state.speculativeRecs) {
    state.speculativeRecs = state.speculativeRecs.map(r => {
      const p = state.prices[r.id];
      if(!p?.price) return r;
      return { ...r, price:p.price, change:p.change };
    });
  }
  render();
}, 30000);

// ── فحص منتصف اليوم كل دقيقة
setInterval(async () => {
  if(!isMarketOpen() || !state.indicatorsDone) return;

  const t = getMarketTimes();
  const m = getNowMins();

  // 7:00م — تحديث المؤشرات وإعادة الحساب مرة ثانية وأخيرة (نافذة 30 دقيقة)
  if(m >= t.midDay && m <= t.midDay+30 && !_midDayDone) {
    _midDayDone      = true;
    _recsLockedToday = false;

    // ✅ حفظ توصيات الجلسة الأولى كـ High Conviction قبل أي شيء
    if(state.recs?.length > 0) {
      state.sessionOneIds = state.recs.map(r => r.id);
      try {
        localStorage.setItem('s1_recs',      JSON.stringify(state.sessionOneIds));
        localStorage.setItem('s1_recs_date', new Date().toDateString()); // تاريخ الحفظ
      } catch(e) {}
      console.log('[MidDay] حفظ High Conviction:', state.sessionOneIds);
    }

    // إعادة تحميل المؤشرات وحساب التوصيات
    state.indicatorsDone = false;
    await fetchIndicators();
    await fetchNews();
    await fetchEarnings();

    // calcRecs ستقارن التوصيات الجديدة مع sessionOneIds المحفوظة أعلاه
    calcRecs();
    calcSpeculative();
    await calcHunterFull();
    await calcDailyTrade();
    // جلب Price Target للتوصيات فقط
    if(state.recs?.length > 0) await fetchPriceTargets(state.recs);
    if(state.recs?.length > 0 && isMarketOpen()) {
      recordRecsToHistory(state.recs, 'منتصف');
    }
    _recsLockedToday = true;
    try { localStorage.setItem('recs_midday', 'true'); } catch(e) {}
    render();
  }
}, 60000);

// ── إشعارات المتصفح
async function requestNotification() {
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default') {
    await Notification.requestPermission();
  }
}

function sendNotification(title, body) {
  if(Notification.permission !== 'granted') return;
  try {
    new Notification(title, { body, icon: '📊' });
  } catch(e) {}
}

// طلب إذن الإشعارات عند البداية
requestNotification();

// ── Debug helper
window.testMarket = () => {
  window.DEBUG_MARKET = true;
  state.indicatorsDone = false;
  _recsLockedToday     = false;
  loadData(true);
};

// ── إعادة تحميل الأسعار يدوياً
window.retryPrices = async () => {
  await fetchPrices();
  await fetchMarketTrend();
  render();
  console.log('[Retry] تم تحديث الأسعار:', state.dataCheck.prices.real, 'سهم');
};

// ── استرجاع التوصيات المحفوظة من نفس اليوم
(function restoreSavedRecs() {
  try {
    const savedDate  = localStorage.getItem('recs_date');
    const today      = new Date().toDateString();
    if(savedDate !== today) {
      // يوم جديد — امسح كل شيء بما فيه Cooldown
      localStorage.removeItem('s1_recs');
      localStorage.removeItem('s1_recs_date');
      localStorage.removeItem('cooldown_stocks');  // ✅ إصلاح: Cooldown يُمسح يومياً
      state.cooldownStocks = [];
      return;
    }

    const savedRecs  = localStorage.getItem('recs_full');
    const savedTime  = localStorage.getItem('recs_time');
    const midday     = localStorage.getItem('recs_midday') === 'true';

    if(!savedRecs || !savedTime) return;

    const recs = JSON.parse(savedRecs);
    if(!Array.isArray(recs) || recs.length === 0) return;
    const cleanRecs = recs.filter(r =>
      r?.recStage === 'confirmed' ||
      r?.recStage === 'conditional' ||
      r?.recStage === 'early' ||
      r?.activeBuy === true
    );
    if(cleanRecs.length !== recs.length) {
      localStorage.setItem('recs_full', JSON.stringify(cleanRecs));
      localStorage.setItem('recs_time', new Date().toISOString());
    }
    if(cleanRecs.length === 0) return;

    // ✅ استرجاع sessionOneIds (توصيات الجلسة الأولى) للمقارنة الصحيحة
    const s1Date = localStorage.getItem('s1_recs_date');
    if(s1Date === today) {
      const s1 = localStorage.getItem('s1_recs');
      if(s1) state.sessionOneIds = JSON.parse(s1);
    }

    state.recs           = cleanRecs;
    state.recsTime       = new Date(savedTime);
    // ✅ إذا توصيات محفوظة من نفس اليوم → قفلها فوراً
    // المؤشرات ستُحمّل لتحديث الأسعار فقط، لكن لا إعادة حساب
    state.indicatorsDone = false;  // يحمّل المؤشرات لتحديث الأسعار
    _recsLockedToday     = true;   // ✅ مقفلة — لا إعادة حساب
    _lastRecDate         = today;
    _midDayDone          = midday;

    console.log('[Restore] توصيات:', recs.length, '| High Conviction:', state.sessionOneIds?.length||0);
  } catch(e) {}
})();

// ── بدء التحميل
(async () => {
  try {
    render();
    await loadData(false);
    startPremarketLoop();
    _appBooting = false;
    if(state.recs?.length > 0) {
      _recsLockedToday = true;
      _lastRecDate     = new Date().toDateString();
    }
    render();
  } catch(e) {
    console.error('[Init] خطأ في التحميل الأول:', e.message);
    _appBooting = false;
    render();
  }
})();
