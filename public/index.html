function isJournalEntryCard(x, type) {
  const text = ((x?.decision||'')+' '+(x?.signal||'')+' '+(x?.actionTone||'')+' '+(x?.note||'')).toLowerCase();
  if(!x || !x.id || !x.entry || !x.target || !x.stopLoss) return false;
  if(type === 'premarket') return false; // رادار الافتتاح متابعة فقط حتى يؤكد بعد الافتتاح
  if(x.isRadar || x.isNight || x.isWatch || x.gainerClass === 'chase') return false;
  if(/لا تطارد|لا تدخل|ممنوع|تجنب|راقب فقط|مراقبة فقط|ادخل بشرط|شراء مشروط|conditional|استعد/.test(text)) return false;
  if(x.supportState?.lost || x.supportState?.softLost) return false;
  if(x.candleGate && !x.candleGate.allowsEntry) return false;
  if(x.candleGate?.bearishBlock) return false;
  if(x.entryGate && x.entryGate.allow === false) return false;
  if(type === 'rec') return !!x.activeBuy && x.recDecision?.label === 'ادخل الآن';
  if(type === 'spec') return !x.isWatch && x.entryTiming === 'ادخل الآن';
  if(type === 'daily') return x.action === 'ادخل مضاربة سريعة' && x.actionTone === 'dailyBuy';
  if(type === 'hunter') {
    const hunterDirectEntry = x.action === 'ادخل الآن' && x.actionTone === 'buy';
    const hunterSupportEntry = /دخول قرب الدعم/.test(text) && x.actionTone === 'support';
    return hunterDirectEntry || hunterSupportEntry;
  }
  return /ادخل الآن/.test(text);
}

function isJournalWatchSignalCard(x, type) {
  const text = ((x?.decision||'')+' '+(x?.signal||'')+' '+(x?.actionTone||'')+' '+(x?.note||'')+' '+(x?.entryTiming||'')).toLowerCase();
  if(!x || !x.id || !x.entry || !x.target || !x.stopLoss) return false;
  if(type === 'premarket') return false;
  if(isJournalEntryCard(x, type)) return false;
  if(x.gainerClass === 'chase' || /لا تطارد|لا تدخل|ممنوع|تجنب|كسر دعم/.test(text)) return false;
  if(type === 'rec') return !!(x.conditionalBuy || x.earlyRadar) || /استعد|انتظر|ادخل بشرط|شراء مشروط|راقب/.test(text);
  if(type === 'spec') return x.entryTiming === 'مقبول' || x.entryTiming === 'انتظر' || /مقبول|انتظر|راقب/.test(text);
  if(type === 'daily') return /انتظر|راقب|استعد/.test(text);
  if(type === 'hunter') return /راقب|انتظر|دخول قرب الدعم|شراء مشروط/.test(text) && !/ادخل الآن/.test(text);
  return /استعد|انتظر|راقب|شرط/.test(text);
}

function estimateJournalDays(x, type) {
  try {
    const dur = estimateTradeDuration({
      kind: type === 'hunter' ? 'hunter' : type === 'spec' ? 'spec' : type === 'daily' ? 'hunter' : 'rec',
      profitPct: +(x.profitPct || 0),
      atrPct: +(x.atrPct || 2.5),
      actionTone: x.actionTone || '',
      isNight: !!x.isNight,
    });
    return Math.max(1, +(dur.days || 3));
  } catch(e) {
    return type === 'spec' ? 5 : type === 'hunter' ? 3 : 5;
  }
}

function makeSmartJournalEntry(x, type, market, now) {
  const expectedDays = estimateJournalDays(x, type);
  const entry = +(x.entry || x.price || 0);
  const target = +(x.target || 0);
  const stopLoss = +(x.stopLoss || 0);
  const keyDate = now.toISOString().slice(0,10);
  return {
    journalId: [type, x.id, keyDate, entry.toFixed(2), target.toFixed(2), stopLoss.toFixed(2)].join(':'),
    id: x.id,
    name: x.name || '',
    sector: x.sector || '',
    type,
    decision: x.decision || x.signal || '',
    reason: x.note || '',
    signalAt: now.toISOString(),
    entry,
    target,
    stopLoss,
    riskReward: +(x.riskReward || 0),
    profitPct: +(x.profitPct || 0),
    lossPct: +(x.lossPct || 0),
    expectedDays,
    expiresAt: new Date(now.getTime() + expectedDays*864e5).toISOString(),
    score: +(x.score || 0),
    confidence: +(x.confidence || 0),
    tradeQuality: +(x.tradeQuality || 0),
    spyChange: market?.spyChange ?? null,
    qqqChange: market?.qqqChange ?? null,
    marketTrend: market?.trend || null,
    engineVersion: ENGINE_VERSION,
    entryContext: buildEntryContext(x, type, market),
    status: 'open',
    result: 'pending',
    closeReason: null,
    closeAt: null,
    closePrice: null,
    pnlPct: 0,
    maxPrice: entry,
    minPrice: entry,
  };
}

function makeSmartWatchSignalEntry(x, type, market, now) {
  const expectedDays = Math.min(3, Math.max(1, estimateJournalDays(x, type)));
  const entry = +(x.entry || x.price || 0);
  const target = +(x.target || 0);
  const stopLoss = +(x.stopLoss || 0);
  const keyDate = now.toISOString().slice(0,10);
  return {
    ...makeSmartJournalEntry(x, type, market, now),
    journalId: ['watch', type, x.id, keyDate, entry.toFixed(2), target.toFixed(2), stopLoss.toFixed(2)].join(':'),
    journalKind: 'watch_signal',
    decision: 'إنذار مبكر — '+(x.decision || x.signal || 'استعد/انتظر'),
    reason: x.note || 'إشارة مراقبة مبكرة؛ ليست دخول فعلي.',
    expectedDays,
    expiresAt: new Date(now.getTime() + expectedDays*864e5).toISOString(),
    result: 'watching',
  };
}

function updateSmartJournalFromLatest(payload) {
  if(!payload) return;
  const allowNewEntries = !!payload.market?.realOpen || ['pre','after'].includes(payload.market?.session);
  const now = new Date();
  const journal = loadSmartJournal();
  const byId = new Set(journal.map(x => x.journalId));
  if(!allowNewEntries) {
    evaluateSmartJournal(journal);
    return; // لا تضف بطاقات جديدة خارج السوق الحقيقي/الرادار المبكر
  }
  const groups = [
    ['rec', payload.recs || []],
    ['spec', payload.spec || []],
    ['daily', payload.daily || []],
    ['hunter', payload.hunter || []],
    ['premarket', payload.premarket || []],
  ];

  groups.forEach(([type, list]) => {
    (list || []).forEach(card => {
      if(type !== 'premarket' && !payload.market?.realOpen) return;
      const rec = isJournalEntryCard(card, type)
        ? makeSmartJournalEntry(card, type, payload.market || {}, now)
        : isJournalWatchSignalCard(card, type)
          ? makeSmartWatchSignalEntry(card, type, payload.market || {}, now)
          : null;
      if(!rec) return;
      if(byId.has(rec.journalId)) return;
      byId.add(rec.journalId);
      journal.push(rec);
    });
  });

  evaluateSmartJournal(journal, false);
  saveSmartJournal(journal);
}

function followupDayKey(d=new Date()) {
  return d.toISOString().slice(0, 10);
}

function loadDailyFollowup() {
  try { return JSON.parse(localStorage.getItem('daily_signal_followup') || '[]'); } catch(e) { return []; }
}

function saveDailyFollowup(records) {
  try { localStorage.setItem('daily_signal_followup', JSON.stringify((records || []).slice(-500))); } catch(e) {}
}

function followupSourceLabel(type) {
  return type === 'rec' ? 'توصية'
    : type === 'spec' ? 'مجازفة'
    : type === 'daily' ? 'مضاربة يومية'
    : type === 'hunter' ? 'صائد'
    : type === 'premarket' ? 'رادار الافتتاح'
    : type || 'بطاقة';
}

function savedCardHasEntryIntent(card) {
  const decisionText = [card?.decision, card?.actionTone, card?.entryTiming]
    .filter(Boolean).join(' ').toLowerCase();
  if(!decisionText) return !!card?.entryGate?.allow;
  if(/لا تدخل|لا تطارد|مراقبة فقط|راقب|انتظار|تجنب|ممنوع|watch|reject/.test(decisionText)) return false;
  if(card?.entryGate?.allow) return true;
  return /ادخل|دخول|buy|conditional|support/.test(decisionText);
}

function supportStateObjectFromSavedCard(card, currentPrice) {
  const support = +(card?.support || 0);
  const label = String(card?.supportState?.label || card?.supportState || '');
  return {
    above: support > 0 ? currentPrice >= support : true,
    lost: /كسر/.test(label),
    softLost: /تحت الدعم/.test(label),
    recovered: /استرجاع|استعاد|مستعاد/.test(label),
    label,
  };
}

function refreshSavedCardEntryGate(card, type) {
  if(!card || !savedCardHasEntryIntent(card)) return card;
  const id = card.id || card.symbol;
  const livePrice = +(state.prices?.[id]?.price || card.currentPrice || card.price || 0);
  const entry = +(card.entry || card.price || 0);
  if(!livePrice || !entry) return card;
  const gate = finalEntryGate({
    wantsEntry: true,
    kind: type || card.type || 'rec',
    price: +(card.price || entry),
    currentPrice: livePrice,
    entry,
    support: +(card.support || 0),
    supportState: supportStateObjectFromSavedCard(card, livePrice),
    supportSource: card.supportSource || card.entryContext?.supportSource || 'real',
    supTouches: +(card.supTouches || card.entryContext?.supTouches || 0),
    nearSupport: !!(card.nearSupport || Math.abs(+card.entryContext?.distToSupport || 999) <= 3),
    candleGate: card.entryContext?.candleGate || null,
    rvol: +(card.rvol || card.entryContext?.rvol || 0),
    higherLow: false,
    greenClose: !!card.entryContext?.candleGate?.bullishOk,
    recoveredSupport: /استرجاع|استعاد|مستعاد/.test(String(card.supportState || '')),
    riskReward: +(card.riskReward || card.entryContext?.riskReward || 0),
    atrPct: +(card.atrPct || 0),
    isMarketOpen: isMarketOpen(),
    allowWhenClosed: !!card.isPremarket,
    gainerClass: card.gainerClass || null,
  });
  if(gate.stage !== 'entry_chase') return {...card, currentPrice: livePrice, entryGate: gate};
  const note = entryGateReason(gate);
  return {
    ...card,
    currentPrice: livePrice,
    decision: 'لا تطارد',
    signal: 'لا تطارد',
    actionTone: 'reject',
    note,
    reason: note,
    isWatch: true,
    gainerClass: 'chase',
    entryGate: gate,
  };
}

function followupDecision(card) {
  const text = [
    card?.decision, card?.signal, card?.actionTone, card?.note, card?.reason,
    card?.supportState, card?.supportState?.label
  ].filter(Boolean).join(' ').toLowerCase();
  if(/وصل الهدف|target/.test(text)) return {status:'target', label:'وصل الهدف', color:C.green, reason:'تحقق الهدف المحفوظ.'};
  if(/ضرب الوقف|stop/.test(text)) return {status:'stop', label:'ضرب الوقف', color:C.pink, reason:'تم الوصول للوقف المحفوظ.'};
  if(/كسر دعم|supportlost|ممنوع|تجنب|لا تطارد|خطر مطاردة/.test(text)) {
    return {status:'ended', label:'انتهت الفكرة', color:C.pink, reason:card?.note || card?.reason || 'القرار الحالي يمنع الدخول.'};
  }
  if(/راقب استرجاع الدعم|تحت الدعم|watch|راقب|انتظار/.test(text)) {
    return {status:'watch', label:'تحت المتابعة', color:C.yellow, reason:card?.note || card?.reason || 'قريبة من القرار لكنها تحتاج شرطاً ناقصاً.'};
  }
  if(/ادخل الآن|دخول فعلي|شراء قوي|buy/.test(text)) {
    return {status:'valid', label:'ما زالت صالحة', color:C.green, reason:card?.note || card?.reason || 'الشروط الحالية ما زالت داعمة.'};
  }
  return {status:'watch', label:'تحت المتابعة', color:C.yellow, reason:card?.note || card?.reason || 'بطاقة ظهرت اليوم وتحتاج متابعة.'};
}

function makeFollowupRecord(card, type, now) {
  card = refreshSavedCardEntryGate(card, type);
  const entry = +(card.entry || card.price || 0);
  const target = +(card.target || 0);
  const stopLoss = +(card.stopLoss || 0);
  const day = followupDayKey(now);
  const key = [day, type, card.id || card.symbol, entry.toFixed(2), target.toFixed(2), stopLoss.toFixed(2)].join(':');
  const d = followupDecision(card);
  return {
    key, day, type,
    id: card.id || card.symbol || '',
    name: card.name || '',
    firstSeenAt: now.toISOString(),
    lastSeenAt: now.toISOString(),
    currentPrice: +(card.price || entry || 0),
    entry, target, stopLoss,
    riskReward: +(card.riskReward || 0),
    score: +(card.score || card.confidence || card.tradeQuality || 0),
    decision: card.decision || card.signal || '',
    support:+(card.support || 0),
    supportSource:card.supportSource || 'real',
    supTouches:+(card.supTouches || 0),
    entryGate:card.entryGate || null,
    entryContext:card.entryContext || null,
    engineVersion:card.engineVersion || ENGINE_VERSION,
    status: d.status,
    statusLabel: d.label,
    statusColor: d.color,
    reason: d.reason,
    seenCount: 1,
  };
}

function updateDailyFollowupFromLatest(payload) {
  if(!payload) return;
  const now = new Date();
  const day = followupDayKey(now);
  const records = loadDailyFollowup();
  const byKey = new Map(records.map(r => [r.key, r]));
  const seen = new Set();
  const groups = [
    ['rec', payload.recs || []],
    ['spec', payload.spec || []],
    ['daily', payload.daily || []],
    ['hunter', payload.hunter || []],
    ['premarket', payload.premarket || []],
  ];

  groups.forEach(([type, list]) => {
    (list || []).forEach(card => {
      if(!card?.id && !card?.symbol) return;
      const fresh = makeFollowupRecord(card, type, now);
      seen.add(fresh.key);
      const prev = byKey.get(fresh.key);
      if(prev) {
        prev.lastSeenAt = now.toISOString();
        prev.currentPrice = fresh.currentPrice;
        prev.status = fresh.status;
        prev.statusLabel = fresh.statusLabel;
        prev.statusColor = fresh.statusColor;
        prev.reason = fresh.reason;
        prev.decision = fresh.decision;
        prev.score = fresh.score;
        prev.seenCount = +(prev.seenCount || 1) + 1;
      } else {
        records.push(fresh);
        byKey.set(fresh.key, fresh);
      }
    });
  });

  records.forEach(r => {
    if(r.day !== day) return;
    const cur = +(state.prices?.[r.id]?.price || r.currentPrice || 0);
    if(cur) r.currentPrice = cur;
    if(r.target && cur >= r.target) {
      r.status = 'target';
      r.statusLabel = 'وصل الهدف';
      r.statusColor = C.green;
      r.reason = 'تحقق الهدف المحفوظ لهذه البطاقة.';
      return;
    }
    if(r.stopLoss && cur <= r.stopLoss) {
      r.status = 'stop';
      r.statusLabel = 'ضرب الوقف';
      r.statusColor = C.pink;
      r.reason = 'وصل السعر إلى الوقف المحفوظ لهذه البطاقة.';
      return;
    }
    if(!['target','stop','ended'].includes(r.status)) {
      const gateCard = refreshSavedCardEntryGate({
        ...r,
        price: r.currentPrice,
        entry: r.entry,
        target: r.target,
        stopLoss: r.stopLoss,
        riskReward: r.riskReward,
        support: r.support,
        supportSource: r.supportSource,
        supTouches: r.supTouches,
        entryGate: r.entryGate,
        entryContext: r.entryContext,
        decision: r.decision,
      }, r.type);
      if(gateCard.entryGate?.stage === 'entry_chase') {
        r.status = 'ended';
        r.statusLabel = 'لا تطارد';
        r.statusColor = C.pink;
        r.reason = gateCard.reason || entryGateReason(gateCard.entryGate);
        r.entryGate = gateCard.entryGate;
        return;
      }
    }
    if(!seen.has(r.key) && !['target','stop','ended'].includes(r.status)) {
      r.status = 'lost';
      r.statusLabel = 'فقدت شرط';
      r.statusColor = C.orange;
      r.reason = 'اختفت من التبويب الحالي؛ غالباً فقدت شرط الدخول أو تغيّر السعر.';
    }
  });

  saveDailyFollowup(records);
}

function evaluateSmartJournal(records, persist=true) {
  const now = new Date();
  let changed = false;
  records.forEach(r => {
    if(['target','stop','expired'].includes(r.status)) {
      r.result = r.status;
      r.status = 'closed';
      r.closeReason = r.result === 'target' ? 'وصل الهدف' : r.result === 'stop' ? 'ضرب الوقف' : 'انتهت المدة';
      if(!r.closeAt && r.closedAt) r.closeAt = r.closedAt;
      if(!r.closedAt && r.closeAt) r.closedAt = r.closeAt;
      changed = true;
    }
    if(r.status !== 'open') return;
    const cur = +(state.prices?.[r.id]?.price || 0);
    if(!cur || !r.entry) return;
    r.maxPrice = Math.max(+(r.maxPrice || r.entry), cur);
    r.minPrice = Math.min(+(r.minPrice || r.entry), cur);
    r.pnlPct = +(((cur - r.entry)/r.entry)*100).toFixed(2);
    const hitTarget = r.target && cur >= r.target;
    const hitStop = r.stopLoss && cur <= r.stopLoss;
    const expired = r.expiresAt && now >= new Date(r.expiresAt);
    if(hitTarget || hitStop || expired) {
      r.status = 'closed';
      r.closeAt = now.toISOString();
      r.closedAt = r.closeAt;
      r.closePrice = cur;
      if(r.journalKind === 'watch_signal') {
        r.result = hitTarget ? 'watch_hit' : hitStop ? 'watch_failed' : 'watch_expired';
        r.closeReason = hitTarget ? 'إنذار مبكر وصل الهدف' : hitStop ? 'إنذار مبكر ضرب الوقف' : 'انتهت مدة الإنذار المبكر';
      } else {
        r.result = hitTarget ? 'target' : hitStop ? 'stop' : 'expired';
        r.closeReason = hitTarget ? 'وصل الهدف' : hitStop ? 'ضرب الوقف' : 'انتهت المدة';
      }
      changed = true;
    }
  });
  if(changed && persist) saveSmartJournal(records);
  return records;
}

// ── تسجيل توصيات اليوم في السجل (يُستدعى بعد calcRecs)
function recordRecsToHistory(recs, forceSession) {
  return; // السجل القديم أُلغي — smart_journal هو المصدر الوحيد للتقييم
  if(!recs||!recs.length) return;
  // ✅ لا تسجيل خارج وقت السوق — أسعار الـ cache لا تُمثّل إشارة حقيقية
  if(!isMarketOpen()) return;
  const history = loadHistory();
  const now     = new Date();
  const today   = now.toDateString();

  // تحديد الجلسة: يُمرر صراحةً أو يُحسب من الوقت
  const t       = getMarketTimes();
  const m       = getNowMins();
  const session = forceSession || ((m >= t.midDay && m <= t.midDay+60) ? 'منتصف' : 'افتتاح');

  recs.forEach(r => {
    // لا تكرار لنفس السهم في نفس الجلسة من نفس اليوم
    const exists = history.some(h =>
      h.id === r.id &&
      new Date(h.recDate).toDateString() === today &&
      h.session === session
    );
    if(exists) return;
    history.push({
      id:         r.id,
      type:       'rec',                // ← توصية عادية
      name:       r.name,
      sector:     r.sector,
      session,                          // 'افتتاح' أو 'منتصف'
      recDate:    now.toISOString(),
      recPrice:   r.price,
      target:     r.target,
      stopLoss:   r.stopLoss,
      signal:     r.signal,
      confidence: r.confidence,
      spyChange:  state.spyChange,      // حالة السوق وقت التوصية
      marketTrend:state.marketTrend,
      result:     'pending',
      resultDate: null,
      resultPrice:null,
      pnlPct:     null,
    });
  });
  saveHistory(history);
}

// ── تحديث نتائج التوصيات المعلقة
function updateHistoryResults() {
  const history = loadHistory();
  let changed = false;
  history.forEach(h => {
    if(h.result !== 'pending') return;
    const cur = state.prices[h.id]?.price;
    if(!cur || !(h.recPrice || h.price)) return;
    if(!h.recPrice && h.price) h.recPrice = h.price; // دعم السجل القديم
    const pnlPct = ((cur - h.recPrice)/h.recPrice*100);
    const daysSince = (Date.now()-new Date(h.recDate))/(1000*60*60*24);

    // اعتبر الصفقة منتهية إذا:
    // - لمست الهدف أو وقف الخسارة
    // - أو مضى عليها 5 أيام (تداول يومي)
    const hitTarget = h.target   && cur >= h.target;
    const hitStop   = h.stopLoss && cur <= h.stopLoss;
    const expired   = daysSince >= 5;

    if(hitTarget || hitStop || expired) {
      h.result      = pnlPct >= 0 ? 'win' : 'loss';
      h.resultDate  = new Date().toISOString();
      h.resultPrice = cur;
      h.pnlPct      = +pnlPct.toFixed(2);
      changed = true;
    } else {
      // تحديث P&L الحالي
      h.pnlPct = +pnlPct.toFixed(2);
    }
  });
  if(changed) saveHistory(history);
  return history;
}

// ── إحصائيات السجل
function calcHistoryStats(history) {
  const closed  = history.filter(h=>h.result!=='pending');
  const wins    = closed.filter(h=>h.result==='win');
  const losses  = closed.filter(h=>h.result==='loss');
  const pending = history.filter(h=>h.result==='pending');
  const winRate = closed.length ? Math.round(wins.length/closed.length*100) : 0;
  const avgWin  = wins.length
    ? +(wins.reduce((s,h)=>s+(h.pnlPct||0),0)/wins.length).toFixed(2) : 0;
  const avgLoss = losses.length
    ? +(losses.reduce((s,h)=>s+(h.pnlPct||0),0)/losses.length).toFixed(2) : 0;
  const expectancy = closed.length
    ? +((winRate/100)*avgWin + (1-winRate/100)*avgLoss).toFixed(2) : 0;
  return { closed:closed.length, wins:wins.length, losses:losses.length,
           pending:pending.length, winRate, avgWin, avgLoss, expectancy };
}

function calcSmartJournalStats(records) {
  const watchSignals = records.filter(r => r.journalKind === 'watch_signal');
  const tradeRecords = records.filter(r => r.journalKind !== 'watch_signal');
  const closed = tradeRecords.filter(r => r.status === 'closed');
  const open = tradeRecords.filter(r => r.status === 'open');
  const wins = closed.filter(r => r.result === 'target' || (r.result === 'expired' && (r.pnlPct||0) > 0));
  const losses = closed.filter(r => r.result === 'stop' || (r.result === 'expired' && (r.pnlPct||0) < 0));
  const expired = closed.filter(r => r.result === 'expired');
  const winRate = closed.length ? Math.round(wins.length / closed.length * 100) : 0;
  const avgPnl = closed.length ? +(closed.reduce((s,r)=>s+(r.pnlPct||0),0)/closed.length).toFixed(2) : 0;
  const watchClosed = watchSignals.filter(r => r.status === 'closed');
  const watchHits = watchClosed.filter(r => r.result === 'watch_hit').length;
  const watchRate = watchClosed.length ? Math.round(watchHits / watchClosed.length * 100) : 0;
  return {total:records.length, open:open.length, closed:closed.length, wins:wins.length, losses:losses.length, expired:expired.length, winRate, avgPnl, watch:watchSignals.length, watchClosed:watchClosed.length, watchHits, watchRate};
}

    : history.filter(h => h.session === state.histFilter);
  const recent = [...filtered].reverse();

  // إحصائيات الجلسة المفلترة
  const fStats = calcHistoryStats(filtered);

  function fmtDate(iso) {
    if(!iso) return '—';
    try { return new Date(iso).toLocaleDateString('ar',{month:'short',day:'numeric'}); }
    catch(e){ return ''; }
  }

  // ── تصدير CSV
  function exportCSV() {
    const rows = [
      ['السهم','الاسم','القطاع','الجلسة','تاريخ التوصية','سعر الدخول','الهدف','وقف الخسارة',
       'الإشارة','الثقة%','SPY%','السوق','النتيجة','تاريخ الإغلاق','سعر الإغلاق','ربح/خسارة%'].join(','),
      ...history.map(h => [
        h.id, h.name, h.sector, h.session||'—',
        h.recDate ? new Date(h.recDate).toLocaleDateString('ar') : '—',
        h.recPrice||'', h.target||'', h.stopLoss||'',
        h.signal||'', h.confidence||'',
        h.spyChange!=null ? h.spyChange : '—',
        h.marketTrend||'—',
        h.result==='win'?'ربح':h.result==='loss'?'خسارة':'معلقة',
        h.resultDate ? new Date(h.resultDate).toLocaleDateString('ar') : '—',
        h.resultPrice||'—',
        h.pnlPct!=null ? h.pnlPct : '—',
      ].join(','))
    ].join('\n');

    const bom  = '\uFEFF'; // لدعم Excel عربي
    const blob = new Blob([bom+rows], {type:'text/csv;charset=utf-8'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'trader_history_'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  return el('div', {style:{padding:'12px 16px'}}, [

    // ─ بطاقة الإحصائيات الكاملة
    el('div', {style:{
      background:'linear-gradient(135deg,rgba(0,200,255,.06),rgba(180,79,255,.06))',
      border:'1px solid rgba(0,200,255,.2)', borderRadius:'14px',
      padding:'14px', marginBottom:'12px',
    }}, [
      el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'12px'}}, [
        el('div', {style:{fontSize:'13px', fontWeight:'900', color:state.histType==='rec'?C.blue:C.purple}}, [state.histType==='rec'?'📊 أداء التوصيات':'🎲 أداء المجازفة']),
        el('div', {style:{fontSize:'10px', color:C.text3}}, [history.length+'/500 سجل']),
      ]),
      el('div', {style:{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'8px', marginBottom:'10px'}}, [
        el('div', {style:{background:'#060b14', borderRadius:'10px', padding:'10px', textAlign:'center'}}, [
          el('div', {style:{fontSize:'22px', fontWeight:'900',
            color:fStats.winRate>=60?C.green:fStats.winRate>=40?C.yellow:C.pink}},
            [fStats.winRate+'%']),
          el('div', {style:{fontSize:'9px', color:C.text3, marginTop:'2px'}}, ['نسبة النجاح']),
          el('div', {style:{fontSize:'9px', color:C.text2}}, [fStats.wins+'✅ '+fStats.losses+'❌']),
        ]),
        el('div', {style:{background:'#060b14', borderRadius:'10px', padding:'10px', textAlign:'center'}}, [
          el('div', {style:{fontSize:'22px', fontWeight:'900', color:fStats.avgWin>=2?C.green:C.yellow}},
            ['+'+fStats.avgWin+'%']),
          el('div', {style:{fontSize:'9px', color:C.text3, marginTop:'2px'}}, ['متوسط الربح']),
          el('div', {style:{fontSize:'9px', color:C.text2}}, ['عند النجاح']),
        ]),
        el('div', {style:{
          background:fStats.expectancy>=0?'rgba(0,255,136,.08)':'rgba(255,45,122,.08)',
          border:`1px solid ${fStats.expectancy>=0?C.green:C.pink}33`,
          borderRadius:'10px', padding:'10px', textAlign:'center',
        }}, [
          el('div', {style:{fontSize:'22px', fontWeight:'900',
            color:fStats.expectancy>=0?C.green:C.pink}},
            [(fStats.expectancy>=0?'+':'')+fStats.expectancy+'%']),
          el('div', {style:{fontSize:'9px', color:C.text3, marginTop:'2px'}}, ['التوقع الرياضي']),
          el('div', {style:{fontSize:'9px', color:C.text2}}, ['لكل صفقة']),
        ]),
      ]),
      fStats.closed > 0 && el('div', {style:{marginBottom:'8px'}}, [
        el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'3px'}}, [
          el('span', {style:{fontSize:'9px', color:C.text3}}, ['معدل النجاح']),
          el('span', {style:{fontSize:'9px', color:C.text2}},
            [fStats.closed+' مغلقة • '+fStats.pending+' معلقة']),
        ]),
        el('div', {style:{height:'5px', background:'#1a2340', borderRadius:'3px'}}, [
          el('div', {style:{height:'5px', borderRadius:'3px', width:fStats.winRate+'%',
            background:`linear-gradient(90deg,${C.green},${C.blue})`}}),
        ]),
      ]),
      // مقارنة الجلستين
      (() => {
        const open = history.filter(h=>h.session==='افتتاح');
        const mid  = history.filter(h=>h.session==='منتصف');
        if(!open.length && !mid.length) return null;
        const oS = calcHistoryStats(open);
        const mS = calcHistoryStats(mid);
        return el('div', {style:{
          display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px',
          background:'rgba(255,255,255,.02)', borderRadius:'8px', padding:'8px',
        }}, [
          el('div', {style:{textAlign:'center'}}, [
            el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'3px'}}, ['🌅 الافتتاح']),
            el('div', {style:{fontSize:'13px', fontWeight:'800',
              color:oS.winRate>=55?C.green:oS.winRate>=40?C.yellow:C.pink}},
              [oS.winRate+'%']),
            el('div', {style:{fontSize:'8px', color:C.text3}}, [open.length+' توصية']),
          ]),
          el('div', {style:{textAlign:'center', borderRight:'1px solid #1a2340'}}, [
            el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'3px'}}, ['🌇 المنتصف']),
            el('div', {style:{fontSize:'13px', fontWeight:'800',
              color:mS.winRate>=55?C.green:mS.winRate>=40?C.yellow:C.pink}},
              [mS.winRate+'%']),
            el('div', {style:{fontSize:'8px', color:C.text3}}, [mid.length+' توصية']),
          ]),
        ]);
      })(),
    ]),

    // ─ تبديل بين التوصيات والمجازفة
    el('div', {style:{display:'flex', gap:'6px', marginBottom:'10px'}}, [
      el('button', {
        style:{flex:'1', fontSize:'12px', fontWeight:'800', padding:'8px', borderRadius:'10px',
          color: state.histType==='rec' ? '#050810' : C.text2,
          background: state.histType==='rec' ? C.blue : 'rgba(255,255,255,.05)',
          border: state.histType==='rec' ? 'none' : '1px solid #1a2340'},
        onClick: () => { state.histType='rec'; state.histFilter='all'; render(); },
      }, ['📊 التوصيات']),
      el('button', {
        style:{flex:'1', fontSize:'12px', fontWeight:'800', padding:'8px', borderRadius:'10px',
          color: state.histType==='spec' ? '#050810' : C.text2,
          background: state.histType==='spec' ? C.purple : 'rgba(255,255,255,.05)',
          border: state.histType==='spec' ? 'none' : '1px solid #1a2340'},
        onClick: () => { state.histType='spec'; state.histFilter='all'; render(); },
      }, ['🎲 المجازفة']),
    ]),

    // ─ أزرار الفلتر + تصدير + مسح
    el('div', {style:{display:'flex', gap:'6px', marginBottom:'12px', flexWrap:'wrap'}}, [
      // فلتر الجلسة
      ...['all','افتتاح','منتصف'].map(f =>
        el('button', {
          style:{
            fontSize:'10px', fontWeight:'700', padding:'5px 10px',
            borderRadius:'7px', flexShrink:'0',
            color: state.histFilter===f ? '#050810' : C.text2,
            background: state.histFilter===f ? C.blue : 'rgba(255,255,255,.05)',
            border: state.histFilter===f ? 'none' : '1px solid #1a2340',
          },
          onClick: () => { state.histFilter = f; render(); },
        }, [f==='all'?'🔘 الكل':f==='افتتاح'?'🌅 افتتاح':'🌇 منتصف'])
      ),
      el('div', {style:{flex:'1'}}),
      // تصدير CSV
      history.length > 0 && el('button', {
        style:{
          fontSize:'10px', fontWeight:'700', color:C.green,
          background:'rgba(0,255,136,.08)', border:'1px solid rgba(0,255,136,.25)',
          borderRadius:'7px', padding:'5px 10px',
        },
        onClick: exportCSV,
      }, ['⬇️ CSV']),
      // مسح
      history.length > 0 && el('button', {
        style:{
          fontSize:'10px', color:C.pink, background:'rgba(255,45,122,.08)',
          border:'1px solid rgba(255,45,122,.25)', borderRadius:'7px', padding:'5px 10px',
        },
        onClick: () => {
          if(confirm('حذف كل السجل؟')) {
            localStorage.removeItem('smart_journal');
            if(window._fbReady && window._fbSaveSmartJournal) window._fbSaveSmartJournal([]).catch(()=>{});
            state.histFilter='all'; render();
          }
        },
      }, ['🗑️']),
    ].filter(Boolean)),

    // ─ قائمة التوصيات
    recent.length === 0
      ? el('div', {style:{textAlign:'center', padding:'40px 20px', color:C.text2, fontSize:'12px'}}, [
          el('div', {style:{fontSize:'32px', marginBottom:'8px'}}, ['📭']),
          'لا توجد توصيات في هذا الفلتر',
        ])
      : el('div', {}, recent.map(h => {
          const isPending = h.result === 'pending';
          const isWin     = h.result === 'win';
          const clr       = isPending ? C.yellow : isWin ? C.green : C.pink;
          const icon      = isPending ? '⏳' : isWin ? '✅' : '❌';
          const cur       = state.prices[h.id]?.price;
          const sesColor  = h.session==='افتتاح' ? C.blue : h.session==='منتصف' ? C.orange : C.text3;

          return el('div', {style:{
            background:'#0a1020', border:`1px solid ${clr}22`,
            borderRadius:'10px', padding:'10px 12px', marginBottom:'6px',
          }}, [
            el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}, [
              el('div', {style:{flex:'1'}}, [
                el('div', {style:{display:'flex', alignItems:'center', gap:'5px', marginBottom:'2px', flexWrap:'wrap'}}, [
                  el('span', {style:{fontSize:'13px', fontWeight:'800', color:C.text}}, [h.name]),
                  el('span', {style:{fontSize:'9px', color:C.text3}}, [h.id]),
                  // badge الجلسة
                  h.session && el('span', {style:{
                    fontSize:'8px', fontWeight:'700', color:sesColor,
                    background:sesColor+'15', borderRadius:'3px', padding:'1px 5px',
                    border:'1px solid '+sesColor+'33',
                  }}, [h.session==='افتتاح'?'🌅 افتتاح':'🌇 منتصف']),
                  el('span', {style:{
                    fontSize:'8px', fontWeight:'700', color:clr,
                    background:clr+'15', borderRadius:'3px', padding:'1px 5px',
                  }}, [icon+' '+(isPending?'معلقة':isWin?'ربح':'خسارة')]),
                ]),
                el('div', {style:{fontSize:'9px', color:C.text3}}, [
                  '📅 '+fmtDate(h.recDate)+' • $'+fmt(h.recPrice,2)+
                  (h.resultDate?' → '+fmtDate(h.resultDate):''),
                ]),
                el('div', {style:{fontSize:'9px', color:C.text2, marginTop:'1px'}}, [
                  (h.signal||'')+(h.confidence!=null?' '+h.confidence+'% ثقة':'')+
                  (h.spyChange!=null?' • SPY '+(h.spyChange>=0?'+':'')+h.spyChange+'%':''),
                ]),
              ]),
              el('div', {style:{textAlign:'left', minWidth:'58px'}}, [
                el('div', {style:{fontSize:'14px', fontWeight:'900',
                  color:(h.pnlPct||0)>=0?C.green:C.pink}},
                  [h.pnlPct!=null?(h.pnlPct>=0?'+':'')+h.pnlPct+'%':'—']),
                isPending && cur && el('div', {style:{fontSize:'9px', color:C.text3}},
                  ['$'+fmt(cur,2)]),
                h.target && el('div', {style:{fontSize:'8px', color:C.text3}},
                  ['🎯$'+fmt(h.target,2)]),
                h.stopLoss && el('div', {style:{fontSize:'8px', color:C.text3}},
                  ['🛑$'+fmt(h.stopLoss,2)]),
              ]),
            ]),
            // شريط تقدم السعر
            isPending && h.target && h.stopLoss && cur && (() => {
              const pct = Math.min(100,Math.max(0,
                (cur-h.stopLoss)/(h.target-h.stopLoss)*100));
              return el('div', {style:{marginTop:'6px'}}, [
                el('div', {style:{height:'3px', background:'#1a2340', borderRadius:'2px'}}, [
                  el('div', {style:{height:'3px', borderRadius:'2px', width:pct+'%',
                    background:`linear-gradient(90deg,${C.pink},${C.yellow},${C.green})`}}),
                ]),
                el('div', {style:{display:'flex', justifyContent:'space-between',
                  fontSize:'8px', color:C.text3, marginTop:'2px'}}, [
                  el('span',{},['🛑'+fmt(h.stopLoss,2)]),
                  el('span',{style:{color:C.text2}},[Math.round(pct)+'%']),
                  el('span',{},['🎯'+fmt(h.target,2)]),
                ]),
              ]);
            })(),
          ]);
        })),
  ]);
}

// ── معالج الأخطاء العالمي — يمنع الشاشة السوداء
window.onerror = function(msg, src, line, col, err) {
  console.error('[Global Error]', msg, 'line:', line);
  const appEl = document.getElementById('app');
  if(appEl && appEl.innerHTML === '') {
    appEl.innerHTML = `
      <div style="padding:30px;text-align:center;color:#fff;font-family:sans-serif">
        <div style="font-size:40px;margin-bottom:12px">⚠️</div>
        <div style="font-size:14px;color:#ff7a00;margin-bottom:8px">خطأ في التطبيق</div>
        <div style="font-size:11px;color:#888;margin-bottom:16px">${msg}</div>
        <button onclick="location.reload()" style="background:#0a1020;border:1px solid #3a4560;color:#00c8ff;padding:10px 20px;border-radius:8px;font-size:12px">🔄 إعادة التحميل</button>
      </div>`;
  }
  return false;
};

window.onunhandledrejection = function(e) {
  console.error('[Unhandled Promise]', e.reason);
};

function render() {
  let root = null;
  try {
    root = app();
    if(!root) { console.error('[render] لا يوجد div#app'); return; }
    root.innerHTML = '';
    root.appendChild(renderApp());
    if(!state.animatedRecs) state.animatedRecs = new Set();
    if(state.recs) state.recs.forEach(r => state.animatedRecs.add(r.id));
  } catch(e) {
    console.error('[render] خطأ:', e.message, e.stack);
    const appEl = root || app();
    if(appEl) {
      appEl.innerHTML = '';
      appEl.appendChild(renderFatalAppError(e));
    }
  }
}

function renderRiskPanel() {
  const rs = state.riskSettings || {};
  const activeCapital = getBrokerCapital();
  const setNum = (key, val) => {
    const n = parseFloat(val);
    state.riskSettings[key] = isNaN(n) ? 0 : Math.max(0, n);

function renderMacdBar() {
  // نجمع إحصائيات من كل الأسهم التي عندها بيانات
  const inds = Object.values(state.indicators);
  const withHist = inds.filter(i=>i.macdHist!=null);
  if(withHist.length === 0) return null;

  const bullHist  = withHist.filter(i=>i.macdHist>0 && i.macdHistDir==='expanding').length;
  const bearHist  = withHist.filter(i=>i.macdHist<0 && i.macdHistDir==='expanding').length;
  const bullWeek  = withHist.filter(i=>i.weeklyTrend==='bullish').length;
  const total     = withHist.length;
  const moodColor = bullHist > bearHist ? C.green : bearHist > bullHist ? C.pink : C.yellow;
  const moodText  = bullHist > bearHist ? 'زخم صاعد' : bearHist > bullHist ? 'زخم هابط' : 'متوازن';

  return el('div', {style:{
    background:'#060b14', borderBottom:'1px solid #1a2340',
    padding:'6px 16px', display:'flex', gap:'8px', alignItems:'center',
    overflowX:'auto',
  }}, [
    // MACD Histogram السوق
    el('div', {style:{
      display:'flex', alignItems:'center', gap:'5px', flexShrink:'0',
    }}, [
      el('span', {style:{fontSize:'9px', color:C.text3}}, ['MACD Hist']),
      el('span', {style:{
        fontSize:'10px', fontWeight:'700', color:moodColor,
        background:moodColor+'12', borderRadius:'5px', padding:'2px 7px',
      }}, [bullHist+'↑ / '+bearHist+'↓ '+moodText]),
    ]),
    el('div', {style:{width:'1px', height:'16px', background:'#1a2340', flexShrink:'0'}}),
    // أسبوعي
    el('div', {style:{
      display:'flex', alignItems:'center', gap:'5px', flexShrink:'0',
    }}, [
      el('span', {style:{fontSize:'9px', color:C.text3}}, ['أسبوعي']),
      el('span', {style:{
        fontSize:'10px', fontWeight:'700',
        color: bullWeek/total > 0.6 ? C.green : bullWeek/total < 0.4 ? C.pink : C.yellow,
        background: bullWeek/total > 0.6 ? 'rgba(0,255,136,.1)' : bullWeek/total < 0.4 ? 'rgba(255,45,122,.1)' : 'rgba(255,224,51,.1)',
        borderRadius:'5px', padding:'2px 7px',
      }}, [
        bullWeek/total > 0.6 ? '↑ صاعد' : bullWeek/total < 0.4 ? '↓ هابط' : '↔ متوازن',
      ]),
    ]),
    el('div', {style:{width:'1px', height:'16px', background:'#1a2340', flexShrink:'0'}}),
    // ATR
    (() => {
      const avgATR = withHist.filter(i=>i.atrPct!=null).reduce((s,i)=>s+i.atrPct,0)/Math.max(withHist.filter(i=>i.atrPct!=null).length,1);

        el('span', {style:{fontSize:'9px', color:C.text3}}, ['ATR متوسط']),

        }}, [fmt(avgATR,1)+'%']),
      ]);
    })(),
  ]);
}

function renderToolReportTab() {
  return renderSmartReportTab();
  const history = updateHistoryResults();
  const now = Date.now();
  const week = history.filter(h => now - new Date(h.recDate).getTime() <= 7*864e5);
  const month = history.filter(h => now - new Date(h.recDate).getTime() <= 30*864e5);
  const recs = history.filter(h => (h.type||'rec') === 'rec');
  const specs = history.filter(h => h.type === 'spec');

  const stAll = calcHistoryStats(history);
  const stWeek = calcHistoryStats(week);
  const stRec = calcHistoryStats(recs);
  const stSpec = calcHistoryStats(specs);
  const closed = history.filter(h => h.result !== 'pending' && h.pnlPct != null);
  const best = closed.length ? [...closed].sort((a,b)=>(b.pnlPct||0)-(a.pnlPct||0))[0] : null;
  const worst = closed.length ? [...closed].sort((a,b)=>(a.pnlPct||0)-(b.pnlPct||0))[0] : null;
  const pending = history.filter(h => h.result === 'pending');
  const repeatStars = (() => {
    const byDay = {};
    history.filter(h=>(h.type||'rec')==='rec').forEach(h => {
      const d = new Date(h.recDate).toDateString();
      const k = d+'_'+h.id;
      byDay[k] = byDay[k] || new Set();
      byDay[k].add(h.session);
    });
    return Object.entries(byDay).filter(([,s])=>s.has('افتتاح') && s.has('منتصف')).length;
  })();

  const card = (title, value, sub, color=C.blue) => el('div', {style:{
    background:'#0a1020', border:`1px solid ${color}33`,
    borderRadius:'12px', padding:'12px',
  }}, [
    el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'5px'}}, [title]),
    el('div', {style:{fontSize:'18px', fontWeight:'900', color}}, [value]),
    sub && el('div', {style:{fontSize:'9px', color:C.text2, marginTop:'3px'}}, [sub]),
  ]);

  const row = (label, value, color=C.text) => el('div', {style:{
    display:'flex', justifyContent:'space-between', alignItems:'center',
    padding:'8px 0', borderBottom:'1px solid rgba(255,255,255,.06)',
    fontSize:'11px',
  }}, [
    el('span', {style:{color:C.text2}}, [label]),
    el('span', {style:{color, fontWeight:'900'}}, [value]),
  ]);

  return el('div', {style:{padding:'12px 16px'}}, [
    el('div', {style:{marginBottom:'12px'}}, [
      el('div', {style:{fontSize:'15px', fontWeight:'900', color:C.text}}, ['📊 تقرير أداء الأداة']),
      el('div', {style:{fontSize:'10px', color:C.text3, marginTop:'4px'}}, ['مبني على سجل التوصيات والمجازفة داخل الجهاز']),
    ]),
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginBottom:'12px'}}, [
      card('نسبة النجاح', stAll.winRate+'%', stAll.wins+' ربح / '+stAll.losses+' خسارة', stAll.winRate>=60?C.green:stAll.winRate>=40?C.yellow:C.pink),
      card('الصفقات المغلقة', String(stAll.closed), stAll.pending+' معلقة', C.blue),
      card('متوسط الربح', (stAll.avgWin>=0?'+':'')+stAll.avgWin+'%', 'للصفقات الرابحة', C.green),
      card('متوسط الخسارة', stAll.avgLoss+'%', 'للصفقات الخاسرة', C.pink),
      card('توقع الصفقة', (stAll.expectancy>=0?'+':'')+stAll.expectancy+'%', 'متوسط العائد المتوقع', stAll.expectancy>=0?C.green:C.pink),
      card('نجوم التكرار ⭐', String(repeatStars), 'ظهر افتتاح + منتصف', C.yellow),
    ]),
    el('div', {style:{
      background:'#0a1020', border:'1px solid var(--border)',
      borderRadius:'12px', padding:'12px', marginBottom:'12px',
    }}, [
      el('div', {style:{fontSize:'12px', fontWeight:'900', color:C.blue, marginBottom:'8px'}}, ['تفصيل الأداء']),
      row('آخر 7 أيام', stWeek.winRate+'% | '+stWeek.closed+' مغلقة | '+stWeek.pending+' معلقة', stWeek.winRate>=60?C.green:C.yellow),
      row('آخر 30 يوم', calcHistoryStats(month).winRate+'% | '+month.length+' إشارة', C.text),
      row('توصياتي', stRec.winRate+'% | '+recs.length+' إشارة', C.green),
      row('مجازفة', stSpec.winRate+'% | '+specs.length+' إشارة', C.purple),
      best && row('أفضل سهم', best.id+' +'+fmt(best.pnlPct,2)+'%', C.green),
      worst && row('أسوأ سهم', worst.id+' '+fmt(worst.pnlPct,2)+'%', C.pink),
    ]),
    pending.length>0 && el('div', {style:{
      background:'rgba(255,122,0,.06)', border:'1px solid rgba(255,122,0,.22)',
      borderRadius:'12px', padding:'12px',
    }}, [
      el('div', {style:{fontSize:'12px', fontWeight:'900', color:C.orange, marginBottom:'8px'}}, ['معلّقة تحتاج متابعة']),

function waitingReasonFromHunter(h) {
  const missing = [];
  if(!h.checks?.aboveVwap) missing.push('رجوع فوق VWAP');
  if(!h.checks?.breakout15) missing.push('اختراق قمة 15 دقيقة');
  if(!h.checks?.higherLow) missing.push('Higher Low');
  if((h.rvol || 0) < 1.4) missing.push('حجم أعلى');
  if(h.checks?.tooCloseToResistance) missing.push('ابتعاد عن المقاومة');
  return missing.slice(0, 2).join(' + ') || h.actionNote || 'ينقصه تأكيد التنفيذ';
}

function buildWaitingCandidates() {
  const items = [];
  (state.recs || []).forEach(r => {
    const label = r.recDecision?.label || (r.activeBuy ? 'ادخل الآن' : r.conditionalBuy ? 'ادخل بشرط' : r.earlyRadar ? 'استعد' : 'راقب فقط');
    if(r.activeBuy || r.blockEntry || r.tooCloseToResistance) return;
    if(!(r.conditionalBuy || r.earlyRadar || r.nearSupport || /استعد|شرط|راقب/.test(label))) return;
    const missing = r.conditionalBuy
      ? (r.recDecision?.note || r.entryNote || 'ينقص تنفيذ شرط الدخول')
      : r.earlyRadar
        ? 'قريب من الإشارة؛ انتظر تأكيد الزخم والحجم'
        : r.nearSupport
          ? 'قريب من الدعم؛ يحتاج ثبات وعدم كسر'
          : (r.entryNote || 'ينقص تأكيد الدخول');
    items.push({
      id:r.id, name:r.name, source:'توصيات', type:'rec',
      price:r.price, target:r.target, stopLoss:r.stopLoss, rr:r.riskReward,
      score: Math.round((r.confidence || 50) * 0.45 + (r.tradeQuality || 50) * 0.35 + (r.strength || 50) * 0.2),
      missing, note:label, color:C.blue, selected:r.id,
    });
  });

  (state.speculativeRecs || []).forEach(s => {
    if(s.entryTiming === 'ادخل الآن') return;
    if(s.score < 45) return;
    const missing = s.entryTiming === 'مقبول'
      ? (s.entryNote || 'قريبة؛ تحتاج انضباط الوقف والدخول')
      : s.entryTiming === 'انتظر'
        ? 'ينقصها محفز دخول أو قرب أفضل من الدعم'
        : s.entryNote || 'ينقصها تأكيد قبل المجازفة';
    items.push({
      id:s.id, name:s.name, source:'مجازفة', type:'spec',
      price:s.price, target:s.target, stopLoss:s.stopLoss, rr:s.riskReward,
      score:s.score || 0, missing, note:s.entryTiming || 'انتظار',
      color:C.purple, selected:s.id+'_spec',
    });
  });

  (state.hunterRecs || []).forEach(h => {
    if(h.actionTone === 'buy' || h.gainerClass === 'chase' || h.action === 'لا تطارد') return;
    if((h.score || 0) < 55) return;
    items.push({
      id:h.id, name:h.name, source:'صائد', type:'hunter',
      price:h.price, target:h.targetPrice, stopLoss:h.stopLoss, rr:h.rr,
      score:h.score || 0, missing:waitingReasonFromHunter(h),
      note:h.action || 'رادار', color:C.orange, selected:h.id+'_hunter',
    });
  });

  return items
    .filter(x => x.id && x.price)
    .sort((a,b) => (b.score || 0) - (a.score || 0))
    .slice(0, 15);
}

function renderFollowupTab() {
  const day = followupDayKey();
  const safeTime = v => {
    const t = new Date(v || 0).getTime();
    return Number.isFinite(t) ? t : 0;
  };
  const rows = loadDailyFollowup()
    .filter(r => r && typeof r === 'object' && r.day === day)
    .map(r => ({
      ...r,
      id: r.id || r.symbol || '—',
      type: r.type || 'followup',
      status: r.status || 'watch',
      statusLabel: r.statusLabel || 'متابعة',
      seenCount: Number.isFinite(+r.seenCount) ? +r.seenCount : 1,
    }))
    .sort((a, b) => {
      const order = {valid:0, watch:1, lost:2, target:3, stop:4, ended:5};
      return (order[a.status] ?? 9) - (order[b.status] ?? 9) ||
        safeTime(b.lastSeenAt) - safeTime(a.lastSeenAt);
    });
  const counts = rows.reduce((m, r) => {
    m[r.status] = (m[r.status] || 0) + 1;
    return m;
  }, {});
  const showLost = !!state.followupShowLost;
  const visibleRows = rows.filter(r => showLost || r.status !== 'lost');
  const clock = iso => {
    try { return new Date(iso).toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'}); } catch(e) { return '—'; }
  };
  const statusColor = r => {
    const custom = typeof r.statusColor === 'string' && r.statusColor.trim() ? r.statusColor : null;
    return custom || (r.status === 'valid' || r.status === 'target' ? C.green :
    r.status === 'stop' || r.status === 'ended' ? C.pink :
    r.status === 'lost' ? C.orange : C.yellow);
  };
  const card = r => {
    const color = statusColor(r);
    const entry = +r.entry || 0;
    const current = +r.currentPrice || 0;
    const pnl = entry && current ? ((current - entry) / entry * 100) : null;
    const source = followupSourceLabel(r.type);
    return el('div', {style:{
      background:'#060b14',
      border:`1px solid ${color}33`,
      borderRadius:'12px',
      padding:'10px 12px',
      marginBottom:'8px',
    }}, [
      el('div', {style:{display:'flex', justifyContent:'space-between', gap:'8px', alignItems:'flex-start'}}, [
        el('div', {}, [
          el('div', {style:{fontSize:'14px', fontWeight:'900', color:C.text}}, [
            r.id+' — '+(r.name || source)
          ]),
          el('div', {style:{fontSize:'10px', color:C.text3, marginTop:'2px'}}, [
            source+' • ظهر '+clock(r.firstSeenAt)+' • آخر مشاهدة '+clock(r.lastSeenAt)+' • '+(r.seenCount||1)+' مرة'
          ]),
        ]),
        el('div', {style:{
          fontSize:'10px', fontWeight:'900', color,
          background:color+'16', border:`1px solid ${color}33`,
          borderRadius:'8px', padding:'4px 8px', whiteSpace:'nowrap',
        }}, [r.statusLabel || 'متابعة']),
      ]),
      el('div', {style:{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'5px', marginTop:'8px'}}, [
        miniFollowBox('السعر', fmtPrice(current), C.text),
        miniFollowBox('دخول', fmtPrice(entry), C.orange),
        miniFollowBox('هدف', fmtPrice(+r.target || 0), C.green),
        miniFollowBox('وقف', fmtPrice(+r.stopLoss || 0), C.pink),
      ]),
      el('div', {style:{
        marginTop:'8px', fontSize:'10px', color:C.text2,
        background:'rgba(255,255,255,.035)', borderRadius:'8px',
        padding:'7px 9px', lineHeight:'1.6',
      }}, [
        el('b', {style:{color}}, ['سبب الحالة: ']),
        r.reason || 'بطاقة متابعة يومية.',
        pnl != null ? ' | الأداء الآن '+(pnl>=0?'+':'')+fmt(pnl,2)+'%' : '',
        r.riskReward ? ' | R/R '+fmt(r.riskReward,1)+'x' : '',
      ]),
    ]);
  };

  return el('div', {style:{padding:'12px 16px'}}, [
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'10px'}}, [
      el('div', {style:{fontSize:'15px', fontWeight:'900', color:C.blue}}, ['📌 المتابعة — '+visibleRows.length+' / '+rows.length+' بطاقة اليوم']),
      el('div', {style:{display:'flex', gap:'6px'}}, [
        el('button', {style:{
          fontSize:'10px', color:showLost?C.orange:C.text2, background:showLost?'rgba(255,123,37,.10)':'#0a1020',
          border:`1px solid ${showLost?C.orange+'66':'var(--border)'}`, borderRadius:'8px', padding:'6px 8px',
        }, onClick:()=>{ state.followupShowLost = !showLost; render(); }}, [showLost ? 'إخفاء فقدت شرط' : 'عرض فقدت شرط']),
        el('button', {style:{
          fontSize:'10px', color:C.text2, background:'#0a1020',
          border:'1px solid var(--border)', borderRadius:'8px', padding:'6px 8px',
        }, onClick:()=>{ saveDailyFollowup(loadDailyFollowup().filter(r => r.day !== day)); render(); }}, ['مسح اليوم']),
      ]),
    ]),
    el('div', {style:{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'6px', marginBottom:'10px'}}, [
      miniFollowBox('صالحة', String(counts.valid || 0), C.green),
      miniFollowBox('مراقبة', String(counts.watch || 0), C.yellow),
      miniFollowBox('فقدت شرط', String(counts.lost || 0), C.orange),
      miniFollowBox('انتهت', String((counts.ended || 0)+(counts.stop || 0)+(counts.target || 0)), C.pink),
    ]),
    el('div', {style:{
      fontSize:'10px', color:C.text2, lineHeight:'1.7',
      background:'rgba(0,200,255,.05)', border:'1px solid rgba(0,200,255,.18)',
      borderRadius:'10px', padding:'9px 10px', marginBottom:'10px',
    }}, ['هذا التبويب يحفظ بطاقات اليوم تلقائياً. إذا ظهرت توصية ثم اختفت، لن تضيع: ستظهر هنا كـ “فقدت شرط” مع السبب.']),
    ...(visibleRows.length ? visibleRows.map(card) : [el('div', {style:{textAlign:'center', padding:'38px 10px', color:C.text2}}, [
      el('div', {style:{fontSize:'38px', marginBottom:'8px'}}, ['📌']),
      el('div', {style:{fontSize:'13px', fontWeight:'900', color:C.text}}, [rows.length ? 'كل البطاقات الحالية فقدت شرطها' : 'لا توجد بطاقات متابعة اليوم بعد']),
      el('div', {style:{fontSize:'10px', color:C.text3, marginTop:'5px'}}, [rows.length ? 'اضغط عرض فقدت شرط إذا تريد مراجعتها.' : 'ستمتلئ تلقائياً عند ظهور توصيات أو صائد أو مجازفة أو رادار افتتاح.']),
    ])]),
  ]);
}

function miniFollowBox(label, value, color=C.text) {
  return el('div', {style:{

    el('div', {style:{fontSize:'11px', fontWeight:'900', color, overflow:'hidden', textOverflow:'ellipsis'}}, [value || '—']),
  ]);
