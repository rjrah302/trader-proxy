function _initFirebase() {
  try {
    if(typeof firebase === 'undefined' || typeof firebase.firestore === 'undefined') {
      // لم يتحمل بعد — أعد المحاولة بعد 500ms
      setTimeout(_initFirebase, 500);
      return;

    firebase.initializeApp({
      apiKey:            'AIzaSyDYyLS0faQLRV8Oqu1tdIXmJhtfklCHt7M',
      authDomain:        'trader-pro-e8b9b.firebaseapp.com',
      projectId:         'trader-pro-e8b9b',
      storageBucket:     'trader-pro-e8b9b.firebasestorage.app',
      messagingSenderId: '496012362495',
      appId:             '1:496012362495:web:4a1fed67ee8c994d0802ca',
    });
    const _DB      = firebase.firestore();
    const _USER_ID = 'default';

    window._fbSavePortfolio = async function(portfolio) {
      try {
        await _DB.collection('users').doc(_USER_ID)
                 .collection('data').doc('portfolio')
                 .set({ trades: portfolio, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        console.log('[FB] portfolio saved ✅', portfolio.length);
      } catch(e) { console.warn('[FB] savePortfolio:', e.message); }
    };

    window._fbLoadPortfolio = async function() {
      try {
        const snap = await _DB.collection('users').doc(_USER_ID)
                              .collection('data').doc('portfolio').get();
        return snap.exists ? (snap.data().trades || []) : [];
      } catch(e) { console.warn('[FB] loadPortfolio:', e.message); return []; }
    };

    window._fbSaveHistory = async function(history) {
      try {
        await _DB.collection('users').doc(_USER_ID)
                 .collection('data').doc('rec_history')
                 .set({ records: history.slice(-500), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        console.log('[FB] history saved ✅', history.length);
      } catch(e) { console.warn('[FB] saveHistory:', e.message); }
    };

    window._fbLoadHistory = async function() {
      try {
        const snap = await _DB.collection('users').doc(_USER_ID)
                              .collection('data').doc('rec_history').get();
        return snap.exists ? (snap.data().records || []) : [];
      } catch(e) { console.warn('[FB] loadHistory:', e.message); return []; }
    };

    window._fbSync = async function() {
      try {
        // ✅ السحابة للسجل فقط — المحفظة محلية
        const history = await window._fbLoadHistory();
        if(history.length) localStorage.setItem('rec_history', JSON.stringify(history));
        console.log('[FB] sync ✅ history='+history.length);
      } catch(e) { console.warn('[FB] sync error:', e.message); }
    };

    // ✅ Firebase جاهز فعلاً
    window._fbReady = true;
    console.log('[FB] Firebase جاهز ✅');

  } catch(e) {
    console.warn('[FB] init error:', e.message);
  }
}

// Rami Falcon X — v25
// ================================================================
// ═══════════════════ CONFIG ═════════════════════════════════════
// ================================================================
const API_KEY   = '';
const USD_RATE  = 3.75;
// نستخدم الـ proxy الموجود /api/stocks للأسعار
// وFMP مباشرة للمؤشرات التقنية (تدعم CORS)
const FMP_BASE  = 'https://financialmodelingprep.com';
const USE_SERVER_FMP_PROXY = location.protocol !== 'file:';

// On the deployed site, route FMP traffic through the backend so the browser
// does less direct work and Vercel can cache short-lived market responses.
if (USE_SERVER_FMP_PROXY && typeof window !== 'undefined' && window.fetch) {
  const _nativeFetch = window.fetch.bind(window);
  window.fetch = function(input, init) {
    const raw = typeof input === 'string' ? input : input?.url;
    if (raw && raw.startsWith(FMP_BASE)) {
      try {
        const url = new URL(raw);
        url.searchParams.delete('apikey');
        const proxyUrl = '/api/fmp?path=' + encodeURIComponent(url.pathname + url.search);
        return _nativeFetch(proxyUrl, init);
      } catch(e) {}
    }
    return _nativeFetch(input, init);
  };
}

// وقت السوق الأمريكي بالدقائق من منتصف الليل UTC
function getMarketTimes() {
  const now = new Date();
  const isSummer = (() => {
    const y = now.getUTCFullYear();
    const start = new Date(Date.UTC(y,2,8)); start.setUTCDate(8-(start.getUTCDay()||7)+7);
    const end   = new Date(Date.UTC(y,10,1)); end.setUTCDate(1+(7-end.getUTCDay())%7);
    return now >= start && now < end;
  })();
  return {
    // Pre-Market: 4:00ص - 4:30م سعودي (صيف: UTC 01:00-13:30)
    preOpen:  isSummer ? 60   : 120,   // 4:00ص  / 5:00ص  سعودي
    open:     isSummer ? 810  : 870,   // 4:30م  / 5:30م  سعودي
    close:    isSummer ? 1200 : 1260,  // 11:00م / 12:00ص سعودي
    // After Hours: 11:00م - 1:00ص سعودي (صيف: UTC 20:00-22:00)
    afterEnd: isSummer ? 1320 : 1380,  // 1:00ص  / 2:00ص  سعودي
    midDay:   isSummer ? 960  : 1020,  // 7:00م  / 8:00م  سعودي
    isSummer,
  };
}

function getNowMins() {
  const now = new Date();
  return now.getUTCHours()*60 + now.getUTCMinutes();
}

// ── حالة السوق الأربع
function getMarketSession() {
  if(window.DEBUG_MARKET) return 'open';
  const t   = getMarketTimes();
  const m   = getNowMins();
  const now = new Date();

  // ✅ فحص نهاية الأسبوع
  const day = now.getDay(); // 0=أحد، 6=سبت
  if(day === 0 || day === 6) return 'closed';

  // ✅ العطلات الرسمية الأمريكية (NYSE)
  const month = now.getMonth()+1;
  const date  = now.getDate();
  const year  = now.getFullYear();
  const holidays = [
    `1/1`,   // رأس السنة
    `6/19`,  // Juneteenth
    `7/4`,   // يوم الاستقلال
    `12/25`, // عيد الميلاد
  ];
  if(holidays.includes(`${month}/${date}`)) return 'closed';
  // MLK Day — ثالث اثنين يناير
  if(month===1 && day===1 && date>=15 && date<=21) return 'closed';
  // Presidents Day — ثالث اثنين فبراير
  if(month===2 && day===1 && date>=15 && date<=21) return 'closed';
  // يوم الذاكرة — آخر اثنين مايو
  if(month===5 && day===1 && date>=25) return 'closed';
  // عيد العمال — أول اثنين سبتمبر
  if(month===9 && day===1 && date<=7) return 'closed';
  // عيد الشكر — رابع خميس نوفمبر
  if(month===11 && day===4 && date>=22 && date<=28) return 'closed';
  // الجمعة السوداء — نصف يوم
  if(month===11 && day===5 && date>=23 && date<=29) return 'short';
  // عيد الميلاد إذا الأحد → الاثنين إجازة
  if(month===12 && date===26 && day===1) return 'closed';
  // رأس السنة إذا الأحد → الاثنين إجازة
  if(month===1 && date===2 && day===1 && now.getDay()===1) return 'closed';

  // السوق مفتوح
  if(m >= t.open && m < t.close) return 'open';

  // Pre-Market (صباحاً قبل الفتح)
  if(m >= t.preOpen && m < t.open) return 'pre';

  // After Hours — نتعامل مع منتصف الليل
  // afterEnd قد يتجاوز 1440 (24 ساعة) في الشتاء
  if(t.afterEnd <= 1440) {
    // لا يتجاوز منتصف الليل — شيك عادي
    if(m >= t.close && m < t.afterEnd) return 'after';
  } else {
    // يتجاوز منتصف الليل — نشيك على جزئين
    const afterEndAdj = t.afterEnd - 1440; // الوقت بعد منتصف الليل
    if(m >= t.close || m < afterEndAdj) return 'after';
  }

  return 'closed';
}

function isMarketOpen() {
  return getMarketSession() === 'open';
}

// ── معلومات حالة السوق للعرض
function getSessionInfo() {
  const session = getMarketSession();
  const t = getMarketTimes();
  const tz = t.isSummer ? 'صيف' : 'شتاء';
  switch(session) {
    case 'open':
      return {
        label:  'السوق مفتوح',
        sub:    `4:30م - 11:00م ${tz}`,
        color:  '#00ff88',
        dot:    true,
        canRec: true,   // يمكن التوصية
      };
    case 'closed': {
      const m = getNowMins();
      const day = new Date().getDay();
      const isWeekend = day === 0 || day === 6;
      let closedSub;
      if (isWeekend) {
        closedSub = 'عطلة أسبوعية';
      } else if (m >= t.close) {
        // بعد إغلاق السوق (11:00م فما فوق)
        closedSub = `يفتح ${t.isSummer?'4:30م':'5:30م'} ${tz}`;
      } else if (m < t.preOpen) {
        // بعد منتصف الليل وقبل Pre-Market
        closedSub = `يفتح ${t.isSummer?'4:30م':'5:30م'} ${tz}`;
      } else {
        // عطلة رسمية
        closedSub = 'عطلة رسمية — السوق مغلق اليوم';
      }
      return {
        label:  'السوق مغلق',
        sub:    closedSub,
        color:  '#ff2d7a',
        dot:    false,
        canRec: false,
      };
    }
    case 'pre':
      return {
        label:  'ما قبل الافتتاح',
        sub:    `يفتح ${t.isSummer?'4:30م':'5:30م'} ${tz}`,
        color:  '#ffe033',
        dot:    false,
        canRec: false,
      };
    case 'short':
      return {
        label:  'السوق — نصف يوم',
        sub:    'جلسة مختصرة — مراقبة فقط',
        color:  '#ffa500',
        dot:    false,
        canRec: false,
      };
    case 'after':
      return {
        label:  'بعد الإغلاق',
        sub:    `ينتهي ${t.isSummer?'1:00ص':'2:00ص'} ${tz}`,
        color:  '#ff7a00',
        dot:    false,
        canRec: false,
      };
    default:
      return {
        label:  'السوق مغلق',
        sub:    `يفتح ${t.isSummer?'4:30م':'5:30م'} ${tz}`,
        color:  '#7888aa',
        dot:    false,
        canRec: false,
      };
  }
}

const $ = id => document.getElementById(id);

function el(tag, props={}, children=[]) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => {
    if(k==='style' && typeof v==='object') Object.assign(e.style, v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  (Array.isArray(children)?children:[children]).forEach(c => {
    if(c===null||c===undefined||c===false) return;
    e.appendChild(typeof c==='string'||typeof c==='number'
      ? document.createTextNode(c) : c);
  });
  return e;
}

function txt(t, style={}) {
  return el('span', {style}, [String(t??'')]);
}

function fmt(n, d=2) {
  if(n===null||n===undefined||isNaN(n)) return '—';
  return Number(n).toFixed(d);
}

function fmtPrice(n) {
  if(!n) return '—';
  return '$'+Number(n).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function fmtClock(t) {
  if(!t) return '—';
  try { return new Date(t).toLocaleTimeString('ar', {hour:'2-digit', minute:'2-digit'}); }
  catch(e) { return '—'; }
}

function nextUpdateText(t, mins) {
  if(!t) return 'بعد أول تحديث';
  const next = new Date(new Date(t).getTime() + mins * 60000);
  return fmtClock(next);
}

function saveRiskSettings() {
  try {
    localStorage.setItem('risk_settings', JSON.stringify(state.riskSettings));
    localStorage.setItem('risk_broker', state.broker || state.riskSettings.defaultBroker || 'ibkr');
  } catch(e) {}
}

function getBrokerCapital(broker=state.broker) {
  const rs = state.riskSettings || {};
  return broker === 'sahm' ? +(rs.sahm || 0) : +(rs.ibkr || 0);
}

function getRiskPct(kind, ctx={}) {
  const rs = state.riskSettings || {};
  if(ctx.watchOnly || ctx.noTrade || ctx.gainerClass === 'chase') return 0;
  if(kind === 'rec') return +(rs.recRisk ?? 1.0);
  if(kind === 'hunter') return +(rs.hunterRisk ?? 0.5);
  if(kind === 'spec') return +(rs.specRisk ?? 0.5);
  return 0.5;
}

function calcTradeDecision({kind, symbol, entry, stop, target, rr, action, watchOnly=false, noTrade=false, gainerClass=null}) {
  const broker = state.broker || state.riskSettings.defaultBroker || 'ibkr';
  const capital = getBrokerCapital(broker);
  const riskPct = getRiskPct(kind, {watchOnly, noTrade, gainerClass});
  return window.RamiAnalysis.calcTradeDecision({
    kind, symbol, entry, stop, target, rr, action, watchOnly, noTrade,
    gainerClass, broker, capital, riskPct
  });
}

// ── 0. اتجاه السوق العام (SPY + QQQ)
async function fetchMarketTrend() {
  if (state.marketSnapshotTime && Date.now() - new Date(state.marketSnapshotTime).getTime() < 30000) return;
  try {
    const fetchOne = async (sym) => {
      // نجرب stable ثم v3
      for(const url of [
        `${FMP_BASE}/stable/quote?symbol=${sym}&apikey=${API_KEY}`,
        `${FMP_BASE}/api/v3/quote/${sym}?apikey=${API_KEY}`,
      ]) {
        try {
          const res  = await fetch(url);
          const data = await res.json();
          const item = Array.isArray(data) ? data[0] : data;
          const chg  = parseFloat(item?.changePercentage ?? item?.changesPercentage ?? item?.change ?? NaN);
          if(!isNaN(chg)) return chg;
        } catch(e) { continue; }
      }
      return null;
    };

    const [spy, qqq] = await Promise.all([fetchOne('SPY'), fetchOne('QQQ')]);

    if(spy !== null) state.spyChange = spy;
    if(qqq !== null) state.qqqChange = qqq;

    if(state.spyChange !== null && state.qqqChange !== null) {
      const avg = (state.spyChange + state.qqqChange) / 2;
      // هابط حقيقي: متوسط أقل من -1.5% (تصحيح قوي)
      // صاعد: متوسط أكثر من +0.3%
      // محايد: بينهما (تذبذب طبيعي)
      state.marketTrend =
        avg >= 0.3  ? 'bullish'  :
        avg <= -1.5 ? 'bearish'  :
                      'neutral';
      console.log('[Market] SPY:'+state.spyChange+'% QQQ:'+state.qqqChange+'% avg:'+avg.toFixed(2)+'% → '+state.marketTrend);
    }
  } catch(e) { console.warn('[Market] error:', e.message); }
}


async function fetchPrices() {
  state.loadingPrices = true;
  state.dataCheck.prices.total = ALL_STOCKS.length;
  state._priceError = null;

  // ── تنظيف cache القديم إذا تغير عدد الأسهم
  try {
    const cachedKeys = Object.keys(state.prices);
    const currentIds = new Set(ALL_STOCKS.map(s => s.id));
    cachedKeys.forEach(k => { if (!currentIds.has(k)) delete state.prices[k]; });
  } catch(e) {}

  const symbols = ALL_STOCKS.map(s=>s.id);
  const BATCH   = 50;
  let proxyOk   = false;
  let fmpOk     = false;

  function storeProxy(q) {
    const price = parseFloat(q.regularMarketPrice);
    if(!q.symbol || !(price > 0)) return false;
    state.prices[q.symbol] = {
      price, isReal: true,
      change:    parseFloat(q.regularMarketChangePercent || 0),
      high:      parseFloat(q.regularMarketDayHigh  || price*1.01),
      low:       parseFloat(q.regularMarketDayLow   || price*0.99),
      volume:    parseInt(q.regularMarketVolume  || 0),
      avgVolume: parseInt(q.avgVolume || q.regularMarketVolume || 0),
    };
    return true;
  }

  function storeFMP(q) {
    const price = parseFloat(q.price);
    if(!q.symbol || !(price > 0)) return false;
    state.prices[q.symbol] = {
      price, isReal: true,
      change:    parseFloat(q.changePercentage ?? q.changesPercentage ?? q.change ?? 0),
      high:      parseFloat(q.dayHigh  ?? q.high  ?? price*1.01),
      low:       parseFloat(q.dayLow   ?? q.low   ?? price*0.99),
      volume:    parseInt(q.volume    ?? 0),
      // avgVolume من quote مباشرة — أسرع وأكثر موثوقية من profiles
      avgVolume: parseInt(q.avgVolume ?? q.averageVolume ?? q.volume ?? 0),
    };
    return true;
  }

  // ── محاولة 1: الـ proxy /api/stocks
  // Server snapshot: one deployed-site request for prices + SPY/QQQ market trend.
  if (USE_SERVER_FMP_PROXY) {
    try {
      const res = await fetch('/api/snapshot?symbols=' + encodeURIComponent(symbols.join(',')));
      const json = await res.json().catch(() => null);
      const data = json?.quoteResponse?.result || [];
      let got = 0;
      data.forEach(q => { if(storeProxy(q)) got++; });

      if (json?.market) {
        if (json.market.spyChange !== null && json.market.spyChange !== undefined) state.spyChange = +json.market.spyChange;
        if (json.market.qqqChange !== null && json.market.qqqChange !== undefined) state.qqqChange = +json.market.qqqChange;
        if (json.market.trend) state.marketTrend = json.market.trend;
        state.marketSnapshotTime = json.time || new Date().toISOString();
      }

      if (got > 0) {
        state.dataCheck.prices.real = ALL_STOCKS.filter(s => state.prices[s.id]?.isReal).length;
        state.loadingPrices = false;
        localStorage.setItem('cached_prices', JSON.stringify(state.prices));
        localStorage.setItem('cached_prices_time', new Date().toISOString());
        console.log('[Snapshot] server prices:', got+'/'+symbols.length, '| trend:', state.marketTrend);
        render();
        return;
      }
    } catch(e) {
      console.warn('[Snapshot] fallback:', e.message);
    }
  }

  const proxyErrors = [];
  for(let i=0; i<symbols.length; i+=BATCH) {
    const batch = symbols.slice(i, i+BATCH).join(',');
    try {
      // لا نستخدم AbortSignal مع الـ Proxy — لا يدعمه Vercel Edge
      const res = await fetch('/api/stocks?symbols='+batch);
      if(!res.ok) {
        const txt = await res.text().catch(()=>'');
        proxyErrors.push('HTTP '+res.status+': '+txt.slice(0,80));
        continue;
      }
      // تحقق إن الرد مش HTML (404 page من Vercel)
      const contentType = res.headers.get('content-type')||'';
      if(contentType.includes('text/html')) {
        proxyErrors.push('Proxy returned HTML — skipping');
        break;
      }
      const json = await res.json().catch(() => null);
      if(!json) { proxyErrors.push('Proxy JSON parse failed'); continue; }
      const data = json?.quoteResponse?.result || [];
      let got = 0;
      data.forEach(q => { if(storeProxy(q)) { proxyOk = true; got++; } });
      console.log('[Proxy] batch '+(i/BATCH+1)+': '+got+'/'+data.length);
      if(proxyOk) {
        state.dataCheck.prices.real = ALL_STOCKS.filter(s => state.prices[s.id]?.isReal).length;
        render();
      }
    } catch(e) { proxyErrors.push(e.message||'network'); console.warn('[Proxy] err:', e.message); }
  }

  // ── محاولة 2: FMP v3 quote (Premium — الأكثر موثوقية)
  // نملأ الفراغات دائماً أو نُعيد كل شيء إذا فشل Proxy
  const missing  = symbols.filter(s => !state.prices[s]?.isReal);
  const toFetch  = missing.length > 0 ? missing : (!proxyOk ? symbols : []);
  const fmpErrors = [];

  for(let i=0; i<toFetch.length; i+=BATCH) {
    const batch = toFetch.slice(i, i+BATCH).join(',');
    try {
      const ctrl  = new AbortController();
      const timer = setTimeout(()=>ctrl.abort(), 10000);
      // Premium: نجرب stable أولاً ثم v3
      let data = null;
      for(const base of [
        `${FMP_BASE}/stable/quote?symbol=${batch}&apikey=${API_KEY}`,
        `${FMP_BASE}/api/v3/quote/${batch}?apikey=${API_KEY}`,
      ]) {
        const r = await fetch(base, {signal:ctrl.signal}).catch(()=>null);
        if(!r || !r.ok) continue;
        const d = await r.json().catch(()=>null);
        if(Array.isArray(d) && d.length > 0) { data = d; break; }
      }
      clearTimeout(timer);
      if(!data) { fmpErrors.push('no data'); continue; }
      let got = 0;
      data.forEach(q => { if(storeFMP(q)) { fmpOk = true; got++; } });
      console.log('[FMP] batch '+(i/BATCH+1)+': '+got+'/'+data.length);
      if(fmpOk) {
        state.dataCheck.prices.real = ALL_STOCKS.filter(s => state.prices[s.id]?.isReal).length;
        render();
      }
    } catch(e) { fmpErrors.push(e.message||'network'); console.warn('[FMP] err:', e.message); }
  }

  const gotData = proxyOk || fmpOk;

  // ── محاولة 3: cache
  if(!gotData) {
    try {
      const cached = localStorage.getItem('cached_prices');
      const time   = localStorage.getItem('cached_prices_time');
      if(cached && time) {
        const ageHours = (Date.now()-new Date(time))/36e5;
        const cd = JSON.parse(cached);
        // إذا Cache أقل من 8 ساعات → isReal:true (بيانات اليوم)
        // إذا أقل من 48 ساعة → isReal:false (fallback)
        const isFresh = ageHours < 8;
        Object.keys(cd).forEach(sym => {
          if(!state.prices[sym]) state.prices[sym] = {...cd[sym], isReal: isFresh ? cd[sym].isReal : false};
        });
        console.log('[Cache] تم استرجاع الأسعار، عمر الـ cache:', ageHours.toFixed(1)+'h، isReal:', isFresh);
      }
    } catch(e) {}
    if(proxyErrors.length || fmpErrors.length) {
      state._priceError = 'proxy: '+proxyErrors[0]+' | fmp: '+fmpErrors[0];
      console.error('[Prices] فشل كلي:', state._priceError);
    }
  }

  if(gotData) {
    try {
      localStorage.setItem('cached_prices', JSON.stringify(state.prices));
      localStorage.setItem('cached_prices_time', new Date().toISOString());
    } catch(e) {}
  }

  state.dataCheck.prices.real = ALL_STOCKS.filter(s => state.prices[s.id]?.price > 0 && state.prices[s.id]?.isReal).length;
  state.loadingPrices = false;
  console.log('[Prices] النتيجة: '+state.dataCheck.prices.real+'/'+state.dataCheck.prices.total+' | proxy:'+proxyOk+' fmp:'+fmpOk);
}

// ── 2. مؤشرات تقنية (3 طلبات/سهم، دفعات 8)
// ── دوال المؤشرات — معرّفة عالمياً لتجنب إعادة الإنشاء في كل سهم

function calcEMA(data, period) {
  if(!data || data.length < period) return null;
  const k = 2/(period+1);
  let val = data.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let j=period; j<data.length; j++) val = data[j]*k + val*(1-k);
  return val;
}

function calcADX(highs, lows, closes, period=14) {
  if(!highs || !lows || !closes) return null;
  if(highs.length < period*2) return null;
  const n = highs.length;
  const trs=[], pdms=[], ndms=[];
  for(let i=1; i<n; i++) {
    const tr  = Math.max(highs[i]-lows[i], Math.abs(highs[i]-closes[i-1]), Math.abs(lows[i]-closes[i-1]));
    const pdm = Math.max(highs[i]-highs[i-1], 0);
    const ndm = Math.max(lows[i-1]-lows[i], 0);
    trs.push(tr);
    pdms.push(pdm > ndm ? pdm : 0);
    ndms.push(ndm > pdm ? ndm : 0);
  }
  const smooth = (arr) => {
    let s = arr.slice(0, period).reduce((a,b)=>a+b,0);
    const out = [s];
    for(let i=period; i<arr.length; i++) { s = s - s/period + arr[i]; out.push(s); }
    return out;
  };
  const sTR = smooth(trs), sPDM = smooth(pdms), sNDM = smooth(ndms);
  const dxArr = [];
  for(let i=0; i<sTR.length; i++) {
    if(sTR[i] === 0) continue;
    const pdi = 100 * sPDM[i] / sTR[i];
    const ndi = 100 * sNDM[i] / sTR[i];
    const dx  = Math.abs(pdi-ndi) / (pdi+ndi) * 100;
    dxArr.push(dx);
  }
  if(dxArr.length < period) return null;
  let adx = dxArr.slice(0, period).reduce((a,b)=>a+b,0) / period;
  for(let i=period; i<dxArr.length; i++) adx = (adx*(period-1) + dxArr[i]) / period;
  return +adx.toFixed(1);
}

async function fetchIndicators() {
  state.loadingIndicators = true;
  state.indicators = {};
  console.log('[Indicators] بدء تحميل المؤشرات...');

  const INDICATOR_STOCKS = ALL_STOCKS.map(s=>s.id); // ✅ كل الـ 127 سهم

  let dc = state.dataCheck;
  dc.rsi.total = dc.macd.total = dc.ma.total = dc.ma200.total =
  dc.support.total = dc.atr.total = dc.bb.total = INDICATOR_STOCKS.length;
  dc.rsi.real = dc.macd.real = dc.ma.real = dc.ma200.real =
  dc.support.real = dc.atr.real = dc.bb.real = dc.volume.real = 0;

  const BATCH = 7; // ✅ رُفع من 5 → 7 (750 طلب/دقيقة الحد، نستخدم ~490)

  try {
  for(let i=0; i<INDICATOR_STOCKS.length; i+=BATCH) {
    const batch = INDICATOR_STOCKS.slice(i, i+BATCH);

    await Promise.all(batch.map(async sym => {
      try {
        // بيانات تاريخية 300 يوم — لضمان المؤشرات الأسبوعية (MA50 أسبوعي يحتاج 250+ يوم)
        let closes = [], highs = [], lows = [], opens = [], dates = [];
        const endpoints = [
          // 1. الـ stable endpoint الجديد (الأفضل في Premium)
          `${FMP_BASE}/stable/historical-price-eod/full?symbol=${sym}&limit=300&apikey=${API_KEY}`,
          // 2. v3 الكلاسيكي — متاح في Premium دائماً
          `${FMP_BASE}/api/v3/historical-price-full/${sym}?timeseries=300&apikey=${API_KEY}`,
          // 3. v3 بدون timeseries — fallback أخير
          `${FMP_BASE}/api/v3/historical-price-full/${sym}?apikey=${API_KEY}`,
        ];
        for(const url of endpoints) {
          try {
            const ctrl2 = new AbortController();
            const t2    = setTimeout(()=>ctrl2.abort(), 8000);
            const r     = await fetch(url, {signal:ctrl2.signal});
            clearTimeout(t2);
            if(!r.ok) continue;
            const d    = await r.json();
            const hist = d?.historical || (Array.isArray(d) ? d : []);
            if(hist.length >= 20) {
              const validHist = hist.filter(h => (+h.adjClose||+h.close) && +h.high && +h.low && +h.open);
              // نحفظ فقط إذا البيانات الجديدة أفضل من الموجودة
              if(validHist.length > closes.length) {
                closes  = validHist.map(h=>+(h.adjClose||h.close)).reverse();
                highs   = validHist.map(h=>+h.high).reverse();
                lows    = validHist.map(h=>+h.low).reverse();
                opens   = validHist.map(h=>+h.open).reverse();
                dates   = validHist.map(h=>h.date||h.label||'').reverse();
                // ✅ استخراج volumes لحساب avgVolume
                const vols = hist.map(h=>+(h.volume||0)).filter(v=>v>0).reverse();
                if(vols.length >= 10 && !state.prices[sym]?.avgVolume) {
                  const avg = Math.round(vols.slice(-20).reduce((a,b)=>a+b,0) / Math.min(vols.length,20));
                  if(avg > 0 && state.prices[sym]) state.prices[sym].avgVolume = avg;
                }
              }
              if(closes.length >= 300) break; // وصلنا لـ 300 يوم — نكتفي
            }
          } catch(e) { continue; }
        }
        if(closes.length < 20) return;

        const cur = state.prices[sym]?.price || closes[closes.length-1] || 0;

        // ── MA20 (دائماً إذا توفر 20 يوم)
        const ma20 = closes.length>=20 ? closes.slice(-20).reduce((a,b)=>a+b,0)/20 : null;

        // ── MA50 (إذا توفر 50 يوم)
        const ma50 = closes.length>=50 ? closes.slice(-50).reduce((a,b)=>a+b,0)/50 : null;

        // ── MA200 (إذا توفر 200 يوم — الجديد)
        const ma200 = closes.length>=200 ? closes.slice(-200).reduce((a,b)=>a+b,0)/200 : null;

        console.log(`[MA] ${sym}: يوم=${closes.length} → MA20=${ma20!=null?'✅':'❌'} MA50=${ma50!=null?'✅':'❌'} MA200=${ma200!=null?'✅':'❌'}`);

        // ── RSI (14) — Wilder's Smoothing الصحيح
        let rsi = null;
        if(closes.length >= 15) {
          // الحساب الصحيح: Wilder's Smoothed Moving Average
          let gains = [], losses = [];
          for(let j=1; j<closes.length; j++) {
            const d = closes[j]-closes[j-1];
            gains.push(d>0 ? d : 0);
            losses.push(d<0 ? Math.abs(d) : 0);
          }
          // متوسط أول 14
          let ag = gains.slice(0,14).reduce((a,b)=>a+b,0)/14;
          let al = losses.slice(0,14).reduce((a,b)=>a+b,0)/14;
          // Wilder's smoothing للباقي
          for(let j=14; j<gains.length; j++) {
            ag = (ag*13 + gains[j]) / 14;
            al = (al*13 + losses[j]) / 14;
          }
          rsi = al===0 ? 100 : 100-(100/(1+ag/al));
          rsi = Math.min(100, Math.max(0, rsi));
        }

        // ── MACD (EMA12 - EMA26)
        const adx = calcADX(highs, lows, closes);
        const ema12 = calcEMA(closes, 12);
        const ema26 = calcEMA(closes, 26);
        const macd  = (ema12!=null && ema26!=null) ? ema12-ema26 : null;

        // ── MACD Signal Line (EMA9 من MACD) + Histogram
        let macdSignal = null, macdHist = null, macdHistDir = null;
        if(closes.length >= 35) {
          // نبني مصفوفة MACD لآخر 30 يوم
          const macdArr = [];
          for(let j=35; j<=closes.length; j++) {
            const sl   = closes.slice(0, j);
            const e12  = calcEMA(sl, 12);
            const e26  = calcEMA(sl, 26);
            if(e12!=null && e26!=null) macdArr.push(e12-e26);
          }
          if(macdArr.length >= 9) {
            macdSignal  = calcEMA(macdArr, 9);
            macdHist    = macd!=null && macdSignal!=null ? macd - macdSignal : null;
            // اتجاه الهيستوغرام: هل يتوسع أم يضيق؟
            if(macdArr.length >= 10 && macdSignal!=null) {
              const prevMacd   = macdArr[macdArr.length-2];
              const prevSignal = calcEMA(macdArr.slice(0,-1), 9);
              const prevHist   = prevSignal!=null ? prevMacd - prevSignal : null;
              if(prevHist!=null && macdHist!=null) {
                const sameSign = (macdHist >= 0) === (prevHist >= 0);
                if(!sameSign) {
                  macdHistDir = 'crossing';
                } else {
                  const absDelta = Math.abs(macdHist) - Math.abs(prevHist);
                  macdHistDir = absDelta > 0 ? 'expanding' : 'contracting';
                }
              }
            }
          }
        }

        // ── MACD أسبوعي (نجمع كل 5 أيام يومية = شمعة أسبوعية)
        let weeklyMacd = null, weeklyMacdHist = null, weeklyTrend = null;
        if(closes.length >= 60) {
          const wCloses = [];
          for(let j=4; j<closes.length; j+=5) {
            wCloses.push(closes[j]); // آخر إغلاق لكل أسبوع
          }
          if(wCloses.length >= 26) {
            const we12 = calcEMA(wCloses, 12);
            const we26 = calcEMA(wCloses, 26);
            weeklyMacd = (we12!=null && we26!=null) ? we12-we26 : null;
            if(wCloses.length >= 35) {
              const wMacdArr = [];
              for(let j=35; j<=wCloses.length; j++) {
                const wsl = wCloses.slice(0,j);
                const we12j = calcEMA(wsl,12);
                const we26j = calcEMA(wsl,26);
                if(we12j!=null && we26j!=null) wMacdArr.push(we12j-we26j);
              }
              if(wMacdArr.length >= 9) {
                const wSig = calcEMA(wMacdArr, 9);
                weeklyMacdHist = weeklyMacd!=null && wSig!=null ? weeklyMacd-wSig : null;
              }
            }
            // اتجاه أسبوعي: هل MA20 أسبوعي > MA50 أسبوعي؟
            if(wCloses.length >= 50) {
              const wma20 = wCloses.slice(-20).reduce((a,b)=>a+b,0)/20;
              const wma50 = wCloses.slice(-50).reduce((a,b)=>a+b,0)/50;
              weeklyTrend = wma20 > wma50 ? 'bullish' : 'bearish';
            }
          }
        }

        // ── Bollinger Bands (تحتاج MA20)
        let bb_upper = null, bb_lower = null;
        if(ma20!=null) {
          const last20 = closes.slice(-20);
          const std = Math.sqrt(last20.reduce((s,p)=>s+Math.pow(p-ma20,2),0)/20);
          bb_upper = ma20 + 2*std;
          bb_lower = ma20 - 2*std;
        }

        // ── ATR (14) — True Range الصحيح
        let atrPct = null;
        if(highs.length >= 15 && closes.length >= 15) {
          const trs = [];
          const start = Math.max(1, highs.length - 14); // نضمن j >= 1 دائماً
          for(let j=start; j<highs.length; j++) {
            const prev = closes[j-1];
            if(!prev) continue; // حماية إضافية
            const tr = Math.max(
              highs[j] - lows[j],
              Math.abs(highs[j] - prev),
              Math.abs(lows[j]  - prev)
            );
            trs.push(tr);
          }
          if(trs.length > 0) {
            const atr = trs.reduce((a,b)=>a+b,0) / trs.length;
            atrPct = cur>0 ? (atr/cur)*100 : null;
          }
        }

        // ── Stochastic RSI — يحتاج على الأقل 28 يوم (14 للـ RSI + 14 للـ Stoch)
        let stochRsi = null;
        if(closes.length >= 28) {
          const rsiArr = [];
          // احسب RSI لكل نقطة بنفس طريقة Wilder's
          for(let j=14; j<closes.length; j++) {
            const slice = closes.slice(0, j+1);
            let g2=[], l2=[];
            for(let k=1; k<slice.length; k++) {
              const d = slice[k]-slice[k-1];
              g2.push(d>0?d:0);
              l2.push(d<0?Math.abs(d):0);
            }
            let ag2 = g2.slice(0,14).reduce((a,b)=>a+b,0)/14;
            let al2 = l2.slice(0,14).reduce((a,b)=>a+b,0)/14;
            for(let k=14; k<g2.length; k++) {
              ag2 = (ag2*13+g2[k])/14;
              al2 = (al2*13+l2[k])/14;
            }
            rsiArr.push(al2===0 ? 100 : 100-(100/(1+ag2/al2)));
          }
          if(rsiArr.length >= 14) {
            const recent = rsiArr.slice(-14);
            const minR = Math.min(...recent), maxR = Math.max(...recent);
            stochRsi = maxR===minR ? 50 : ((rsiArr[rsiArr.length-1]-minR)/(maxR-minR))*100;
            stochRsi = Math.min(100, Math.max(0, stochRsi));
          }
        }

        // ── دعم ومقاومة
        const tolerance = cur * 0.015;
        const levels = [];
        for(let j=1; j<highs.length-1; j++) {
          if(highs[j]>=highs[j-1] && highs[j]>=highs[j+1]) levels.push({price:highs[j], type:'resistance'});
          if(lows[j]<=lows[j-1] && lows[j]<=lows[j+1])   levels.push({price:lows[j],  type:'support'});
        }
        const clusters = [];
        levels.forEach(l => {
          const ex = clusters.find(c => Math.abs(c.price-l.price)<=tolerance);
          if(ex) { ex.touches++; ex.price=(ex.price+l.price)/2; }
          else clusters.push({price:l.price, type:l.type, touches:1});
        });
        const strong = clusters.filter(c=>c.touches>=2);
        const resistanceCluster = strong.filter(c=>c.price>cur).sort((a,b)=>a.price-b.price)[0] || null;
        const supportCluster    = strong.filter(c=>c.price<cur).sort((a,b)=>b.price-a.price)[0] || null;
        const resistance = resistanceCluster?.price ?? Math.max(...highs.slice(-20));
        const support    = supportCluster?.price    ?? Math.min(...lows.slice(-60));  // ← 60 يوم للـ fallback لتجنب السعر الحالي
        const resTouches = resistanceCluster?.touches || 1;
        const supTouches = supportCluster?.touches || 1;
        const nearSupport    = support && cur>support ? cur<=support*1.03 : false;
        const nearResistance = resistance && cur<resistance ? cur>=resistance*0.98 : false;

        // ── حفظ
        state.indicators[sym] = {
          rsi, ma20, ma50, ma200, macd, macdSignal, macdHist, macdHistDir,
          weeklyMacd, weeklyMacdHist, weeklyTrend,
          bb_upper, bb_lower,
          support, resistance, nearSupport, nearResistance, resTouches, supTouches,
          atrPct, stochRsi, adx,
          dataLen: closes.length,
          closesFull: closes.slice(-300),
          highsFull:  highs.slice(-300),
          lowsFull:   lows.slice(-300),
          opensFull:  opens.slice(-300),
          datesFull:  dates.slice(-300),
          closes: closes.slice(-30),
          highs:  highs.slice(-30),
          lows:   lows.slice(-30),
          opens:  opens.slice(-30),
          dates:  dates.slice(-30),
        };

        if(rsi!=null)          dc.rsi.real++;
        if(macd!=null)         dc.macd.real++;
        if(ma20!=null && ma50) dc.ma.real++;
        if(ma200!=null)        dc.ma200.real++;
        if(support!=null)      dc.support.real++;
        if(atrPct!=null)       dc.atr.real++;
        if(bb_upper!=null)     dc.bb.real++;

      } catch(e) { console.warn('[Ind]', sym, e.message); }
    }));

    // render كل 5 دفعات فقط بدل كل دفعة — يمنع الرمش
    if(i % (BATCH*5) === 0) render();
    if(i+BATCH < INDICATOR_STOCKS.length) {
      await new Promise(r=>setTimeout(r,800)); // ✅ خُفّض من 1200ms → 800ms
    }
  }

  dc.volume.total = ALL_STOCKS.length;
  dc.volume.real  = ALL_STOCKS.filter(s => state.prices[s.id]?.avgVolume > 0).length;
  state.indicatorsTime    = new Date().toISOString();
  try { localStorage.setItem('indicators_time', state.indicatorsTime); } catch(e) {}
  console.log('[Indicators] اكتمل: RSI='+dc.rsi.real+'/'+dc.rsi.total+' MACD='+dc.macd.real+' MA='+dc.ma.real);
  } finally {
    // ✅ يضمن دائماً إعادة الضبط حتى عند خطأ غير متوقع
    state.loadingIndicators = false;
    state.indicatorsDone    = true;
  }
}


// ── 3. أخبار محسّنة — جميع الأسهم على دفعات
async function fetchNews() {
  try {
    state.news = {};
    // نقسم الـ 127 سهم على دفعات بدل أول 30 فقط
    const BATCH = 30;
    for(let i = 0; i < ALL_STOCKS.length; i += BATCH) {
      const batchSyms = ALL_STOCKS.slice(i, i + BATCH).map(s => s.id).join(',');
      try {
        const res  = await fetch(`${FMP_BASE}/stable/news/stock?symbols=${batchSyms}&limit=100&apikey=${API_KEY}`);
        const data = await res.json();
        if(!Array.isArray(data)) continue;

    // ── كلمات ومصطلحات مركّبة مع أوزانها
    const NEG_PHRASES = [
      // خطورة عالية — وزن 3
      { re:/guidance\s*(cut|lower|reduc|slash)/i,          w:3 },
      { re:/revenue\s*(miss|shortfall|disappoint|decline)/i,w:3 },
      { re:/earnings\s*(miss|below|disappoint)/i,           w:3 },
      { re:/freemium|free\s*tier.*(revenue|impact|risk)/i,  w:3 },
      { re:/price\s*target\s*(cut|lower|reduc|slash)/i,     w:3 },
      { re:/downgrad[ei]/i,                                  w:3 },
      { re:/sec\s*(investigation|probe|lawsuit|charge)/i,   w:3 },
      { re:/accounting\s*(fraud|irregularit|restat)/i,      w:3 },
      { re:/ceo\s*(resign|depart|step\s*down|fired)/i,      w:3 },
      { re:/bankruptcy|chapter\s*11|insolvency/i,           w:3 },
      // خطورة متوسطة — وزن 2
      { re:/layoff|job\s*cut|workforce\s*reduc/i,           w:2 },
      { re:/slow(ing|down|er)\s*(growth|demand|sales)/i,    w:2 },
      { re:/compet(ition|itor)\s*(threat|pressure|challeng)/i,w:2},
      { re:/ai\s*(disrupt|replac|threaten|obsolet)/i,       w:2 },
      { re:/subscri\w+\s*(declin|slow|churn|cancel)/i,      w:2 },
      { re:/margin\s*(compress|pressure|squeez|declin)/i,   w:2 },
      { re:/debt\s*(concern|problem|issue|downgrad)/i,       w:2 },
      { re:/miss(ed|ing)?\s*(estimate|expectation|forecast)/i,w:2},
      { re:/below\s*(estimate|expectation|forecast|consensus)/i,w:2},
      { re:/weak\s*(outlook|guidance|forecast|demand)/i,    w:2 },
      // خطورة منخفضة — وزن 1
      { re:/\b(miss|fall|drop|decline|loss|cut|weak|disappoint)\b/i, w:1 },
      { re:/headwind|challeng|concern|risk|uncertain/i,     w:1 },
      { re:/short\s*sell|bearish/i,                         w:1 },
    ];

    const POS_PHRASES = [
      // قوة عالية — وزن 3
      { re:/earnings?\s*(beat|exceed|surpass|top)/i,        w:3 },
      { re:/revenue\s*(beat|record|surge|exceed)/i,         w:3 },
      { re:/guidance\s*(raise|increas|upgrad|improv)/i,     w:3 },
      { re:/price\s*target\s*(raise|increas|upgrad)/i,      w:3 },
      { re:/buyback|share\s*repurchas/i,                    w:2 },
      { re:/dividend\s*(increas|raise|hike)/i,              w:2 },
      // قوة متوسطة — وزن 2
      { re:/strong\s*(demand|growth|result|quarter)/i,      w:2 },
      { re:/beat\s*(estimate|expectation|forecast|consensus)/i,w:2},
      { re:/above\s*(estimate|expectation|forecast)/i,      w:2 },
      { re:/record\s*(revenue|profit|earning|quarter)/i,    w:2 },
      { re:/ai\s*(growth|opportunit|monetiz|revenue)/i,     w:2 },
      { re:/partnership|deal|contract|win/i,                w:1 },
      // قوة منخفضة — وزن 1
      { re:/\b(beat|surge|jump|rally|strong|record|growth|upgrad)\b/i,w:1},
      { re:/bullish|outperform|overweight|buy\s*rating/i,   w:1 },
    ];

    const now = Date.now();

        data.forEach(n => {
          const sym = n.symbol;
          if(!sym) return;
          if(!state.news[sym]) state.news[sym] = {pos:0, neg:0, items:[]};

          const ageHours = (now - new Date(n.publishedDate||n.date||now)) / 36e5;
          const dateW    = ageHours < 24 ? 2 : ageHours < 48 ? 1.5 : ageHours < 96 ? 1 : 0.5;

          const text = ((n.title||'') + ' ' + (n.text||n.summary||n.content||'')).toLowerCase();

          let itemScore = 0;

          NEG_PHRASES.forEach(({re, w}) => {
            if(re.test(text)) itemScore -= w * dateW;
          });

          POS_PHRASES.forEach(({re, w}) => {
            if(re.test(text)) itemScore += w * dateW;
          });

          if(itemScore > 0) state.news[sym].pos += itemScore;
          else if(itemScore < 0) state.news[sym].neg += Math.abs(itemScore);

          if(itemScore !== 0) {
            state.news[sym].items.push({
              title: n.title || 'خبر بدون عنوان',
              source: n.site || n.publisher || n.source || '',
              ageHours,
              score: +itemScore.toFixed(1),
            });
          }
        });

      } catch(e) { console.warn('[News batch]', e.message); }
      // تأخير بين الدفعات لتجنب rate limit
      if(i + BATCH < ALL_STOCKS.length) await new Promise(r => setTimeout(r, 500));
    }

    // ── تحويل النقاط لأعداد صحيحة
    Object.keys(state.news).forEach(sym => {
      state.news[sym].pos = Math.round(state.news[sym].pos);
      state.news[sym].neg = Math.round(state.news[sym].neg);
      state.news[sym].items = (state.news[sym].items || [])
        .sort((a,b) => Math.abs(b.score) - Math.abs(a.score))
        .slice(0, 3);
      state.news[sym].net = state.news[sym].pos - state.news[sym].neg;
    });

  } catch(e) { console.warn('[News] error:', e.message); }
}

function getNewsImpact(sym) {
  const n = state.news?.[sym] || {pos:0, neg:0, items:[]};
  const pos = +(n.pos || 0);
  const neg = +(n.neg || 0);
  const net = pos - neg;
  const top = (n.items || [])[0] || null;

  if(neg >= 8 || net <= -6) {
    return {
      level:'criticalNeg', label:'خبر سلبي قوي', color:C.pink,
      score:-3, block:true,
      summary: top?.title || 'أخبار سلبية قوية؛ لا تدخل قبل هدوء الخبر.',
      pos, neg, net, top,
    };
  }
  if(neg >= 4 || net <= -3) {
    return {
      level:'neg', label:'خبر سلبي', color:C.orange,
      score:-2, block:false,
      summary: top?.title || 'أخبار سلبية تحتاج حذر.',
      pos, neg, net, top,
    };
  }
  if(pos >= 6 || net >= 5) {
    return {
      level:'strongPos', label:'خبر إيجابي قوي', color:C.green,
      score:2, block:false,
      summary: top?.title || 'أخبار إيجابية داعمة.',
      pos, neg, net, top,
    };
  }
  if(pos >= 2 || net >= 2) {
    return {
      level:'pos', label:'خبر إيجابي', color:C.blue,
      score:1, block:false,
      summary: top?.title || 'أخبار إيجابية خفيفة.',
      pos, neg, net, top,
    };
  }
  return {
    level:'neutral', label:'أخبار هادئة', color:C.text3,
    score:0, block:false,
    summary:'لا يوجد خبر مؤثر واضح الآن.',
    pos, neg, net, top,
  };
}

function renderNewsMini(sym, compact=false) {
  const ni = getNewsImpact(sym);
  if(ni.level === 'neutral' && compact) return null;
  return el('div', {style:{
    background:ni.color+'0f',
    border:`1px solid ${ni.color}26`,
    borderRadius:'8px',
    padding:compact ? '6px 8px' : '8px 10px',
    marginBottom:'8px',
  }}, [
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', gap:'8px'}}, [
      el('div', {style:{fontSize:compact?'9px':'10px', color:C.text2}}, ['📰 الأخبار']),
      el('div', {style:{fontSize:compact?'10px':'12px', fontWeight:'900', color:ni.color}}, [ni.label]),
    ]),
    !compact && el('div', {style:{fontSize:'9px', color:C.text2, lineHeight:'1.45', marginTop:'5px'}}, [ni.summary]),
    !compact && el('div', {style:{fontSize:'8px', color:C.text3, marginTop:'4px'}}, [

    ]),

}

// ── 4. أرباح قادمة
async function fetchEarnings() {
  try {
    const today    = new Date().toISOString().slice(0,10);
    const nextWeek = new Date(Date.now()+14*864e5).toISOString().slice(0,10);
    const res  = await fetch(`${FMP_BASE}/api/v3/earning_calendar?from=${today}&to=${nextWeek}&apikey=${API_KEY}`);
    if(!res.ok) return;
    const data = await res.json();
    state.earnings = {};
    if(Array.isArray(data)) {
      data.forEach(e => {
        if(!e.symbol) return;
        const days = Math.ceil((new Date(e.date)-new Date())/(864e5));
        if(days>=0 && days<=14) state.earnings[e.symbol] = days;
      });
    }
  } catch(e) {}
}

// ── 5. Profiles
async function fetchProfiles() {
  const symbols = ALL_STOCKS.map(s=>s.id);
  const BATCH   = 10;

  // ── أولاً: Profile (بيانات أساسية)
  for(let i=0; i<symbols.length; i+=BATCH) {
    const batch = symbols.slice(i, i+BATCH);
    await Promise.all(batch.map(async sym => {
      try {
        const res  = await fetch(`${FMP_BASE}/stable/profile?symbol=${sym}&apikey=${API_KEY}`, { signal: AbortSignal.timeout(6000) });
        const data = await res.json();
        const p = Array.isArray(data) && data[0];
        if(p && p.symbol) {
          state.profiles[p.symbol] = {
            beta:      parseFloat(p.beta||0)||null,
            avgVolume: parseInt(p.avgVolume||0)||null,
            mktCap:    p.mktCap||null,
          };
        }
      } catch(e) {}
    }));
    if(i+BATCH < symbols.length) await new Promise(r=>setTimeout(r,200));
  }

  // ── ثانياً: Analyst Ratings — مرة واحدة يومياً فقط
  const today         = new Date().toDateString();
  const analystDate   = localStorage.getItem('analyst_date');
  const analystCache  = localStorage.getItem('analyst_ratings');

  if(analystDate === today && analystCache) {
    // استخدم الكاش — لا طلبات إضافية
    try {
      const cached = JSON.parse(analystCache);
      if(cached && Object.keys(cached).length > 0) {
        state.analystRatings = cached;
        console.log('[Analyst] من الكاش ✅');
        return;
      }
    } catch(e) {}
    console.log('[Analyst] الكاش فارغ — سيتم الجلب من جديد');
  }

  // جلب جديد
  for(let i=0; i<symbols.length; i+=BATCH) {
    const batch = symbols.slice(i, i+BATCH);
    await Promise.all(batch.map(async sym => {
      await fetchOneAnalystRating(sym);
    }));
    if(i+BATCH < symbols.length) await new Promise(r=>setTimeout(r,200));
  }

  // حفظ في localStorage
  try {
    localStorage.setItem('analyst_date',    today);
    localStorage.setItem('analyst_ratings', JSON.stringify(state.analystRatings));
    console.log('[Analyst] حُفظ في الكاش ✅');
  } catch(e) {}
}

// ── جلب Price Target للتوصيات فقط (5 أسهم)
async function fetchPriceTargets(recs) {
  if(!recs || recs.length === 0) return;
  await Promise.all(recs.map(r => fetchOnePriceTarget(r.id)));
}

async function fetchJsonFast(url, ms=7000) {
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), ms);
  try {
    const res = await fetch(url, {signal:ctrl.signal});
    clearTimeout(timer);
    if(!res.ok) return null;
    return await res.json();
  } catch(e) {
    clearTimeout(timer);
    return null;
  }
}

async function fetchOnePriceTarget(sym) {
  if(!sym || state.priceTargets?.[sym]) return state.priceTargets?.[sym] || null;
  const urls = [
    `${FMP_BASE}/stable/price-target-consensus?symbol=${sym}&apikey=${API_KEY}`,
    `${FMP_BASE}/api/v4/price-target-consensus?symbol=${sym}&apikey=${API_KEY}`,
    `${FMP_BASE}/api/v4/price-target?symbol=${sym}&apikey=${API_KEY}`,
  ];
  for(const url of urls) {
    const data = await fetchJsonFast(url);
    if(Array.isArray(data) && data.length > 1) {
      const targets = data
        .map(x => +(x?.targetConsensus ?? x?.targetPrice ?? x?.priceTarget ?? x?.target ?? 0))
        .filter(x => x > 0)
        .sort((a,b)=>a-b);
      if(targets.length) {
        const avg = targets.reduce((a,b)=>a+b,0) / targets.length;
        const median = targets[Math.floor(targets.length/2)];
        state.priceTargets = state.priceTargets || {};
        state.priceTargets[sym] = {
          consensus: avg,
          high: targets[targets.length-1],
          low: targets[0],
          median,
          analystCount: targets.length,
        };
        return state.priceTargets[sym];
      }
    }
    const d = Array.isArray(data) ? data[0] : data;
    const consensus = +(d?.targetConsensus ?? d?.targetPrice ?? d?.priceTarget ?? d?.target ?? 0);
    if(consensus > 0) {
      state.priceTargets = state.priceTargets || {};
      state.priceTargets[sym] = {
        consensus,
        high:   +(d?.targetHigh ?? d?.high ?? 0) || null,
        low:    +(d?.targetLow ?? d?.low ?? 0) || null,
        median: +(d?.targetMedian ?? d?.median ?? 0) || null,
        analystCount: +(d?.analystCount ?? d?.numberOfAnalysts ?? d?.count ?? 0) || null,
      };
      return state.priceTargets[sym];
    }
  }
  return null;
}

async function fetchOneAnalystRating(sym) {
  if(!sym || state.analystRatings?.[sym]) return state.analystRatings?.[sym] || null;
  const urls = [
    `${FMP_BASE}/stable/ratings-snapshot?symbol=${sym}&apikey=${API_KEY}`,
    `${FMP_BASE}/api/v3/rating/${sym}?apikey=${API_KEY}`,
  ];
  for(const url of urls) {
    const data = await fetchJsonFast(url);
    const d = Array.isArray(data) ? data[0] : data;
    const rating = d?.ratingRecommendation ?? d?.rating ?? d?.ratingDetailsDCFRecommendation ?? null;
    const analysts = +(d?.ratingAnalystCount ?? d?.analystCount ?? d?.numberOfAnalyst ?? d?.numberOfAnalysts ?? 0);
    const score = +(d?.ratingScore ?? d?.score ?? d?.ratingDetailsDCFScore ?? 0) || null;
    if(rating || analysts || score) {
      state.analystRatings = state.analystRatings || {};
      state.analystRatings[sym] = { rating, score, analysts };
      return state.analystRatings[sym];
    }
  }
  return null;
}

async function ensureAnalystData(sym) {
  if(!sym) return;
  await Promise.all([
    fetchOneAnalystRating(sym),
    fetchOnePriceTarget(sym),
  ]);
  try {
    localStorage.setItem('analyst_date', new Date().toDateString());
    localStorage.setItem('analyst_ratings', JSON.stringify(state.analystRatings||{}));
  } catch(e) {}
}

function getAnalystView(sym, price=null) {
  const ar = state.analystRatings?.[sym] || null;
  const pt = state.priceTargets?.[sym] || null;
  const rat = (ar?.rating || '').toLowerCase();
  const analysts = +(ar?.analysts || pt?.analystCount || 0);
  const target = +(pt?.consensus || 0);
  const upside = price && target ? (target - price) / price * 100 : null;

  let bias = 0;
  let label = 'لا يوجد إجماع';
  if(analysts >= 5) {
    if(rat.includes('strong buy')) { bias += analysts >= 20 ? 3 : 2; label = 'شراء قوي'; }
    else if(rat.includes('buy') || rat.includes('outperform') || rat.includes('overweight')) { bias += analysts >= 15 ? 2 : 1; label = 'شراء'; }
    else if(rat.includes('hold') || rat.includes('neutral')) { label = 'محايد'; }
    else if(rat.includes('sell') || rat.includes('underperform') || rat.includes('underweight')) { bias -= 2; label = 'بيع/تخفيض'; }
  }

  if(upside != null) {
    if(upside >= 20) bias += 2;
    else if(upside >= 8) bias += 1;
    else if(upside <= -8) bias -= 2;
    else if(upside <= 3) bias -= 1;
  }

  const confidence =
    analysts >= 20 ? 'عالٍ' :
    analysts >= 10 ? 'متوسط' :
    analysts >= 5  ? 'محدود' : 'ضعيف';
  const color = bias >= 3 ? C.green : bias >= 1 ? C.blue : bias <= -2 ? C.pink : C.yellow;
  const verdict = bias >= 3 ? 'يدعم الصفقة' : bias >= 1 ? 'تأكيد إضافي' : bias <= -2 ? 'يخالف الصفقة' : 'محايد';
  return { ar, pt, rating: ar?.rating || null, analysts, target, upside, bias, label, confidence, color, verdict };
}

// ═══════════════════ SIGNAL ENGINE ══════════════════════════════
// ================================================================

function calcSignal(stock) {
  const p   = state.prices[stock.id];
  const ind = state.indicators[stock.id];
  const pro = state.profiles[stock.id];
  const news= state.news[stock.id]||{pos:0,neg:0};
  const newsImpact = getNewsImpact(stock.id);
  const earn= state.earnings[stock.id]??999;

  // ══ شرط أساسي: يجب أن يكون لدينا سعر (حقيقي أو cache) ومؤشرات
  if(!p || !p.price || !ind) return null;
  // اشتراط isReal فقط في أوقات السوق المفتوح
  if(isMarketOpen() && !p.isReal) return null;

  // ✅ جودة البيانات — 100 يوم للتوصية العادية
  const dataQuality = ind.dataLen || ind.closes?.length || 0;
  const hasFullData = dataQuality >= 100;

  const price = p.price;
  const {rsi, ma20, ma50, ma200, macd, bb_upper, bb_lower,
         support, resistance, nearSupport, nearResistance,
         atrPct, stochRsi} = ind;

  // ══ حساب نقاط الشراء والبيع
  let buy=0, sell=0, reasons=[];

  // 1. RSI
  if(rsi!=null) {
    if(rsi<30)      { buy+=2; reasons.push('RSI '+fmt(rsi)+'% — تشبع بيع قوي'); }
    else if(rsi<40) { buy++;  reasons.push('RSI '+fmt(rsi)+'% — ميل للشراء'); }
    else if(rsi>70) { sell+=2;}
    else if(rsi>60) { sell++; }
  }

  // 2. MA Cross — طبقات ذكية
  // MA20
  if(ma20!=null && price>ma20) { buy++;  reasons.push('السعر فوق MA20'); }
  else if(ma20!=null)          { sell++; }

  // MA50
  if(ma20!=null && ma50!=null && ma20>ma50) { buy++;  reasons.push('MA20 فوق MA50 — اتجاه صاعد'); }
  else if(ma20!=null && ma50!=null)         { sell++; }

  // MA200 — الأقوى: اتجاه طويل المدى
  if(ma200!=null) {
    if(price > ma200)  { buy+=2; reasons.push('السعر فوق MA200 — اتجاه صاعد قوي 💪'); }
    else               { sell+=2; } // تحت MA200 = خطر حقيقي
  }

  // 3. MACD
  if(macd!=null) {
    if(macd>0) { buy++;  reasons.push('MACD إيجابي — زخم شراء'); }
    else       { sell++; }
  }

  // 4. Bollinger Bands
  if(bb_lower!=null && price<=bb_lower) { buy++;  reasons.push('السعر عند الحد الأدنى لـ BB'); }
  if(bb_upper!=null && price>=bb_upper) { sell++; }

  // 5. دعم/مقاومة
  if(nearSupport)    { buy+=2; reasons.push('قريب من الدعم $'+fmt(support,2)); }
  if(nearResistance) { sell+=2; }

  // 6. Stochastic RSI (حقيقي الآن)
  if(stochRsi!=null) {
    if(stochRsi<20)      { buy+=2; reasons.push('Stoch RSI '+fmt(stochRsi)+'% — تشبع بيع شديد'); }
    else if(stochRsi<30) { buy++;  reasons.push('Stoch RSI '+fmt(stochRsi)+'% — تشبع بيع'); }
    else if(stochRsi>80) { sell+=2; }
    else if(stochRsi>70) { sell++; }
  }

  // 7. Volume — avgVolume من prices أولاً (من quote) ثم من profiles كـ fallback
  const vol    = p.volume || 0;
  const avgVol = p.avgVolume || pro?.avgVolume || 0;
  const volR   = avgVol>0 ? vol/avgVol : 0;
  if(volR>1.5) {
    if(buy>sell) { buy++;  reasons.push('حجم تداول مرتفع ×'+fmt(volR,1)); }
    else         { sell++; }
  }

  // 8. ATR R/R — يُحسب الآن قبل netScore حتى تعكسه الإشارة
  // ══ هدف الربح ووقف الخسارة — ATR ديناميكي
  const atrMultFinal = atrPct ? (atrPct < 2 ? 1.5 : atrPct < 4 ? 2.0 : 2.5) : 1.5;
  const atrStop  = atrPct ? Math.min(atrPct*atrMultFinal, 15) : 2;
  const atrBasedStop  = price*(1-atrStop/100);
  const supBasedStop  = support ? support*0.99 : null;
  const stopLoss = Math.max(
    supBasedStop && supBasedStop > atrBasedStop ? supBasedStop : atrBasedStop,
    price*0.75
  );
  const minTarget    = price * 1.03;
  const atrTarget    = price * (1 + Math.max(atrStop*2, 3)/100);
  const atrRealist   = price + (atrPct ? price*atrPct/100*3.5 : price*0.08);
  const resValid     = resistance && resistance > price*1.02 && resistance > minTarget;
  const resTarget    = resValid ? resistance : null;
  const roomToResistance = resistance && resistance > price
    ? (resistance - price) / price * 100
    : 999;
  const minRoomToResistance = Math.max(3, (atrPct || 2) * 0.8);
  const tooCloseToResistance = resistance && roomToResistance < minRoomToResistance;
  if(tooCloseToResistance) {
    sell += 3;
    reasons.push('قريب من المقاومة — مساحة الحركة '+fmt(roomToResistance,1)+'% فقط');
  }
  const target       = resTarget
    ? Math.min(resTarget * 0.98, atrRealist > minTarget ? atrRealist : resTarget * 0.98)
    : Math.max(atrTarget, minTarget);
  const profitPct    = (target-price)/price*100;
  const lossPct      = (price-stopLoss)/price*100;
  const riskReward   = lossPct > 0 ? profitPct/lossPct : 0;

  // ✅ تأثير R/R على نقاط الشراء — الآن يُضاف قبل حساب netScore
  if(riskReward>=3.0) { buy+=3; reasons.push('نسبة مخاطرة/مكافأة '+fmt(riskReward,1)+'x ممتازة جداً'); }
  else if(riskReward>=2.0) { buy+=2; reasons.push('نسبة مخاطرة/مكافأة '+fmt(riskReward,1)+'x ممتازة'); }
  else if(riskReward>=1.5) { buy++;  reasons.push('نسبة مخاطرة/مكافأة '+fmt(riskReward,1)+'x جيدة'); }
  else if(riskReward<1)    { sell++; }

  // ── Analyst View — عامل تأكيد وليس قائد قرار
  const analystView = getAnalystView(stock.id, price);
  if(analystView.analysts >= 5) {
    if(analystView.bias > 0) {
      buy += Math.min(2, analystView.bias);
      reasons.push('👨‍💼 '+analystView.analysts+' محلل — '+analystView.verdict);
    } else if(analystView.bias < 0) {
      sell += Math.min(2, Math.abs(analystView.bias));
    }
  }
  if(ind.adx != null) {
    if(ind.adx > 30 && ind.macdHist > 0)       { buy++;  reasons.push('ADX '+ind.adx+' — اتجاه صاعد قوي جداً'); }
    else if(ind.adx > 25 && ind.macdHist > 0)  { buy++;  reasons.push('ADX '+ind.adx+' — اتجاه صاعد قوي'); }
    // ADX < 20 = لا نعاقب، فقط لا نكافئ
  }
  if(ind.macdHist!=null) {
    const hist    = ind.macdHist;
    const histDir = ind.macdHistDir;
    if(hist > 0 && histDir === 'expanding')       { buy+=2;  reasons.push('MACD Hist +'+fmt(hist,2)+' ↑ زخم شراء متصاعد'); }
    else if(hist > 0 && histDir === 'contracting'){ buy++;   reasons.push('MACD Hist +'+fmt(hist,2)+' ↗ زخم يضعف'); }
    else if(hist > 0 && histDir === 'crossing')   { buy+=2;  reasons.push('MACD Hist عبر الصفر للأعلى ↑ انعكاس'); }
    else if(hist < 0 && histDir === 'contracting'){ buy++;   reasons.push('MACD Hist '+fmt(hist,2)+' ↗ زخم بيعي يتقلص'); }
    else if(hist < 0 && histDir === 'crossing')   { sell++;  } // عبر الصفر للأسفل
    else if(hist < 0 && histDir === 'expanding')  { sell+=2; } // زخم بيعي متصاعد
  }

  // ── MACD أسبوعي — حماية من الهبوط الكبير
  if(ind.weeklyTrend === 'bearish' && ind.weeklyMacdHist!=null && ind.weeklyMacdHist < 0) {
    sell+=2; // الأسبوعي هابط = تحذير قوي
  } else if(ind.weeklyTrend === 'bullish') {
    buy++;   // الأسبوعي صاعد = مكافأة
  }

  // 9. القوة النسبية vs SPY — إشارة حقيقية
  const rs = calcRelativeStrength(p.change, state.spyChange);
  if(rs) {
    if(rs.score > 0)       { buy  += Math.floor(rs.score/6); reasons.push('القوة vs SPY: '+rs.label+' ('+( rs.diff>=0?'+':'')+rs.diff+'%)'); }
    else if(rs.score < 0)  { sell += Math.abs(Math.floor(rs.score/5)); } // عقوبة أقوى: /5 بدل /8
  }

  // 10. الشموع اليابانية — إشارات إضافية
  const candlePatterns = detectCandlePatterns(ind.closes, ind.highs, ind.lows, ind.opens);
  candlePatterns.forEach(p2 => {
    const cw = candleDecisionWeight(p2, {
      volR, nearSupport, nearResistance, tooCloseToResistance:false,
      trendUp: ma20!=null && ma50!=null && ma20>ma50,
      trendDown: ma20!=null && ma50!=null && ma20<ma50,
    });
    if(cw > 0) {
      buy += cw;
      reasons.push('شمعة '+p2.ar+' — '+p2.tip);
    } else if(cw < 0) {
      sell += Math.abs(cw);
    }
  });

  // ══ Cooldown — سهم هبط بعد إشارة شراء → يُحجب مباشرة
  const isCooldown = (state.cooldownStocks||[]).includes(stock.id);
  if(isCooldown) sell+=4;

  // ✅ حجب: RSI مرتفع + قريب من المقاومة = خطر انعكاس
  if(rsi!=null && rsi > 70 && nearResistance) { sell+=4; }
  // ✅ تحذير: RSI مرتفع وحده
  else if(rsi!=null && rsi > 72) { sell+=2; }

  // ══ عقوبات
  if(earn<=5)       { sell+=3; }
  else if(earn<=10) { sell+=1; }
  const change = p.change||0;
  if(change>18 && !nearSupport && volR < 1.8)     { sell+=2; } // gap-up مبالغ بدون حجم داعم
  else if(change>10 && !nearSupport && volR < 1.5) { sell++;  }
  // أخبار — النقاط الآن مرجّحة (0-15+ بدل 0-3)
  if(news.neg>=6)        { sell+=5; }       // أخبار سلبية جداً (مثل ADBE freemium+guidance cut)
  else if(news.neg>=4)   { sell+=4; }       // أخبار سلبية قوية
  else if(news.neg>=2)   { sell+=2; }       // أخبار سلبية متوسطة
  else if(news.neg>=1)   { sell++; }        // خبر سلبي واحد
  if(news.pos>=6)        { buy+=4; }        // أخبار إيجابية جداً
  else if(news.pos>=3)   { buy+=3; }        // أخبار إيجابية قوية
  else if(news.pos>=1)   { buy += Math.min(2, Math.round(news.pos)); }
  if(newsImpact.block)   { sell+=3; }
  else if(newsImpact.level === 'strongPos' && volR >= 1.2) { buy++; reasons.push('خبر إيجابي قوي مع حجم داعم'); }

  // ══ الإشارة النهائية
  const netScore = buy - sell;
  const signal   = netScore>=4?"شراء قوي":netScore>=2?"شراء":
                   netScore<=-4?"بيع قوي":netScore<=-2?"بيع":"انتظار";

  // ══ قوة الإشارة (0-100) — أقصى buy ممكن نظرياً ~26 (مع شموع+قوة نسبية+أخبار)
  const maxBuy = 26;
  const strength = Math.min(100, Math.max(0, Math.round((netScore + maxBuy) / (maxBuy*2) * 100)));

  // ══ الثقة — تعكس جودة الإشارة لا مجرد توفر المؤشرات
  // الأساس: هل المؤشرات المتوفرة تتفق مع الإشارة؟
  let confidence = 0;

  // 1. اتساق المؤشرات مع بعض (الأهم)
  const bullSignals = [
    rsi!=null && rsi<45,                          // RSI في منطقة شراء
    macd!=null && macd>0,                          // MACD صاعد
    ma20!=null && ma50!=null && ma20>ma50,         // Golden cross
    ma200!=null && price>ma200,                    // فوق MA200
    nearSupport,                                    // عند الدعم
    stochRsi!=null && stochRsi<40,                 // StochRSI منخفض
    atrPct!=null && atrPct<5,                      // تذبذب معقول
    news.pos>0,                                    // أخبار إيجابية
  ].filter(Boolean).length;

  const totalSignals = [
    rsi!=null, macd!=null, ma20!=null&&ma50!=null,
    ma200!=null, support!=null, stochRsi!=null, atrPct!=null,
  ].filter(Boolean).length;

  // نسبة المؤشرات المتوفرة (0-50%)
  const availScore = totalSignals > 0 ? Math.round(totalSignals/7*50) : 0;

  // نسبة الاتساق مع الإشارة (0-50%)
  const alignScore = totalSignals > 0 ? Math.round(bullSignals/Math.max(totalSignals,1)*50) : 0;

  confidence = Math.min(99, availScore + alignScore);

  // مكافأة: أخبار إيجابية + حجم مرتفع
  if(news.pos>0 && p.avgVolume>0) confidence = Math.min(99, confidence+3);

  // عقوبة: أخبار سلبية تخفض الثقة
  if(news.neg>=4) confidence = Math.max(10, confidence-15);
  else if(news.neg>=2) confidence = Math.max(10, confidence-8);

  // ══ جودة الصفقة — معادلة محسّنة
  let tradeQuality = 0;
  // نسبة المخاطرة/المكافأة — الأهم
  if(riskReward>=3.0)       tradeQuality+=40;
  else if(riskReward>=2.0)  tradeQuality+=30;
  else if(riskReward>=1.5)  tradeQuality+=20;
  else if(riskReward>=1.0)  tradeQuality+=10;
  // قرب الدعم
  if(nearSupport)           tradeQuality+=25;
  // هدف الربح
  if(profitPct>=5)          tradeQuality+=20;
  else if(profitPct>=3)     tradeQuality+=15;
  else if(profitPct>=2)     tradeQuality+=8;
  if(tooCloseToResistance)  tradeQuality-=25;
  // ATR منخفض = سهم مستقر
  if(atrPct!=null && atrPct<2)  tradeQuality+=15;
  else if(atrPct!=null && atrPct<3) tradeQuality+=8;
  tradeQuality = Math.min(100, Math.max(0, tradeQuality));

  // ══ توقيت الدخول
  // حساب المسافة بين السعر الحالي والدعم
  const distToSupport = support>0 ? (price-support)/price*100 : 999;

  let entryTiming, entryColor, entryNote;

  if(tooCloseToResistance || nearResistance) {
    // ✅ قريب من المقاومة — لا تدخل
    entryTiming = 'انتظر';
    entryColor  = C.yellow;
    entryNote   = 'السعر قريب من المقاومة — انتظر كسرها أو تراجع';
  } else if(nearSupport) {
    // السعر قريب من الدعم (أفضل توقيت)
    entryTiming = 'ادخل الآن';
    entryColor  = C.green;
    entryNote   = 'السعر عند الدعم — أفضل نقطة دخول';
  } else if(distToSupport <= 5) {
    // بعيد عن الدعم بـ 5% أو أقل — مقبول
    entryTiming = 'مقبول';
    entryColor  = C.blue;
    entryNote   = 'انتظر تراجعاً بسيطاً نحو $'+fmt(support,2)+' أفضل';
  } else if(distToSupport <= 10) {
    // بعيد عن الدعم بـ 10% — انتظر
    entryTiming = 'انتظر';
    entryColor  = C.yellow;
    entryNote   = 'السعر بعيد عن الدعم — انتظر تراجعاً لـ $'+fmt(support,2);
  } else {
    // بعيد جداً عن الدعم
    entryTiming = 'متأخر';
    entryColor  = C.orange;
    entryNote   = 'الدخول الآن محفوف بالمخاطر — الدعم عند $'+fmt(support,2);
  }

  // نقطة الدخول المثالية
  const idealEntry = nearSupport ? price : (support ? support*1.01 : price);

  // ══ حالة الدخول
  const signalQuality = confidence>=70 ? 'HIGH' : confidence>=50 ? 'MEDIUM' : 'LOW';
  const rrOkForEntry = riskReward >= REC_MIN_ENTRY_RR;
  const qualityOkForEntry = tradeQuality >= REC_MIN_ENTRY_QUALITY;
  const trendOkForEntry = ind.adx == null || ind.adx >= REC_MIN_ENTRY_ADX || nearSupport;
  const newsOkForEntry = !newsImpact.block && newsImpact.level !== 'neg';
  const timingOkForEntry = entryTiming==='ادخل الآن' || entryTiming==='مقبول';
  const entryBlockReasons = [];
  if(!rrOkForEntry) entryBlockReasons.push('R/R أقل من '+REC_MIN_ENTRY_RR+'x');
  if(!qualityOkForEntry) entryBlockReasons.push('جودة الصفقة أقل من '+REC_MIN_ENTRY_QUALITY+'%');
  if(!trendOkForEntry) entryBlockReasons.push('ADX ضعيف ولا يوجد دعم كاف');
  if(!newsOkForEntry) entryBlockReasons.push('خبر سلبي مؤثر');
  if(!timingOkForEntry) entryBlockReasons.push('التوقيت غير مناسب');
  const activeBuy  = !isCooldown && !tooCloseToResistance && signalQuality==='HIGH' && rrOkForEntry && qualityOkForEntry && trendOkForEntry && newsOkForEntry && timingOkForEntry;
  const blockEntry = isCooldown || signalQuality==='LOW' || entryTiming==='متأخر' || newsImpact.block;
  const watchOnly  = !activeBuy && !blockEntry;
  const earlyMomentum = (ind.macdHist != null && ind.macdHist > 0) || (volR >= 1.2 && (p.change || 0) > 0);
  const earlyNear = nearSupport || distToSupport <= 6;
  const conditionalBuy = !activeBuy && !blockEntry && !tooCloseToResistance &&
    newsOkForEntry && signal !== 'بيع' && signal !== 'بيع قوي' &&
    riskReward >= 1.3 && profitPct >= 2 && confidence >= 58 && tradeQuality >= 35 &&
    (entryTiming === 'مقبول' || entryTiming === 'انتظر' || earlyNear) &&
    (earlyMomentum || earlyNear);
  const ignitionReady = earlyMomentum && (volR >= 1.5 || nearSupport || distToSupport <= 4);
  const earlyMoveOk = change <= 12 || ignitionReady || (volR >= 2 && !nearResistance);
  const earlyRadar = !activeBuy && !conditionalBuy && !blockEntry && !tooCloseToResistance &&
    newsOkForEntry && riskReward >= 1.15 && profitPct >= 2 && confidence >= 50 &&
    (earlyNear || earlyMomentum) && earlyMoveOk;
  const recStage = activeBuy ? 'confirmed' : conditionalBuy ? 'conditional' : earlyRadar ? 'early' : 'reject';
  const recDecision = activeBuy
    ? {label:'ادخل الآن', color:C.green, note:entryNote}
    : conditionalBuy
      ? {label:'ادخل بشرط', color:C.blue, note:'ادخل فقط إذا ثبت فوق '+fmtPrice(price)+' أو رجع قرب '+fmtPrice(idealEntry)+' مع حجم داعم.'}
      : earlyRadar
        ? {label:'استعد', color:C.yellow, note:'بداية حركة محتملة؛ انتظر تأكيد الحجم أو رجوع فوق نقطة الدخول.'}
        : {label:'مرفوض', color:C.pink, note:'لم تكتمل شروط التوصية.'};
  const finalEntryNote = activeBuy
    ? entryNote
    : conditionalBuy || earlyRadar
      ? recDecision.note
    : entryBlockReasons.length
      ? 'لا تدخل الآن — '+entryBlockReasons.join('، ')
      : entryNote;

  return {
    id: stock.id, name: stock.name, sector: stock.sector, cat: stock.cat,
    price, change, high:p.high, low:p.low, volume:vol, volR,
    rsi, ma20, ma50, ma200, macd, macdHist:ind.macdHist, macdHistDir:ind.macdHistDir,
    weeklyTrend:ind.weeklyTrend, weeklyMacdHist:ind.weeklyMacdHist,
    bb_upper, bb_lower,
    support, resistance, nearSupport, nearResistance,
    roomToResistance, minRoomToResistance, tooCloseToResistance,
    resTouches: ind.resTouches??1, supTouches: ind.supTouches??1,
    atrPct, stochRsi, riskReward,
    signal, strength, confidence, tradeQuality,
    netScore, buy, sell, reasons,
    stopLoss, target, profitPct,
    entryTiming, entryColor, entryNote: finalEntryNote, idealEntry, distToSupport,
    entryBlockReasons,
    earnings: earn,
    news: news,
    newsImpact,
    // ⭐ High Conviction: ظهر في الجلسة الأولى وعاد في منتصف اليوم
    // نتحقق من _midDayDone أو من localStorage مباشرة (للحالة بعد إعادة التحميل)
    isConviction: (() => {
      const middayDone = _midDayDone || localStorage.getItem('recs_midday') === 'true';
      if (!middayDone) return false;
      // نقرأ من state أولاً ثم localStorage مباشرة كـ fallback
      const s1ids = state.sessionOneIds ||
        (() => { try { return JSON.parse(localStorage.getItem('s1_recs')||'[]'); } catch(e){ return []; } })();
      return Array.isArray(s1ids) && s1ids.includes(stock.id);
    })(),
    beta: pro?.beta || stock.beta,
    activeBuy, watchOnly, blockEntry, isCooldown,
    conditionalBuy, earlyRadar, recStage, recDecision, ignitionReady,
    closes: ind.closes || null,
    highs:  ind.highs  || null,
    lows:   ind.lows   || null,
    opens:  ind.opens  || null,
    adx:    ind.adx    || null,
    candlePatterns,
    relativeStrength: rs,
    analystView,
  };
}

function estimateTradeDuration({kind='rec', profitPct=0, atrPct=0, macdHist=0, macdHistDir=null, weeklyTrend=null, actionTone=null, rvol=1, isNight=false}) {
  return window.RamiAnalysis.estimateTradeDuration({
    kind, profitPct, atrPct, macdHist, macdHistDir, weeklyTrend, actionTone, rvol, isNight
  });
}

// ================================================================
// ═══════════════════ RECOMMENDATION ENGINE ══════════════════════
// ================================================================

function calcRecs() {
  // ══ شروط صارمة للتوصية
  const candidates = ALL_STOCKS
    .map(s => calcSignal(s))
    .filter(Boolean)
    // التوصيات الآن مراحل: دخول مؤكد، دخول مشروط، أو رادار مبكر.
    .filter(s => s.recStage === 'confirmed' || s.recStage === 'conditional' || s.recStage === 'early')
    // شرط 1: إشارة شراء أو بداية تحول مقبولة
    .filter(s => s.signal==='شراء قوي' || s.signal==='شراء' || s.conditionalBuy || s.earlyRadar)
    // شرط 2: ثقة كافية حسب المرحلة
    .filter(s => s.activeBuy ? s.confidence >= 70 : s.confidence >= 50)
    // شرط 3: جودة صفقة مقبولة حسب المرحلة
    .filter(s => s.activeBuy ? s.tradeQuality >= 50 : s.tradeQuality >= 30)
    // شرط 4: هدف ربح 2%+
    .filter(s => s.profitPct >= 2)
    // شرط 5: الدخول المؤكد 1.5x، والرادار المبكر يقبل 1.15x لأنه ليس تنفيذًا مباشرًا
    .filter(s => s.activeBuy ? s.riskReward >= REC_MIN_ENTRY_RR : s.riskReward >= 1.15)
    // شرط 6: لا أرباح قريبة — أكثر صرامة للأسهم عالية التقلب
    .filter(s => {
      const beta = s.beta || 1;
      if (beta >= 1.5) return s.earnings > 21; // بيوتك وتقنية — 3 أسابيع
      if (beta >= 1.2) return s.earnings > 14; // متوسط التقلب — أسبوعان
      return s.earnings > 5;                   // منخفض التقلب — 5 أيام
    })
    // شرط 7: لا مطاردة عمياء — الارتفاع مسموح إذا الحجم/الدعم/المسافة للمقاومة مقبولة
    .filter(s => {
      const ch = s.change || 0;
      if (ch <= 8) return true;
      const supportedMove = (s.volR || 0) >= 1.8 || s.nearSupport || s.ignitionReady;
      const tooExtendedNow = s.tooCloseToResistance && !s.nearSupport;
      if (s.activeBuy) return ch <= 14 || (supportedMove && !tooExtendedNow);
      return ch <= 18 || ((s.volR || 0) >= 2.2 && !tooExtendedNow);
    })
    // شرط 7.5: لا سهم ممتد بلا دعم — لا نمنع الترند القوي إذا الحركة مدعومة
    .filter(s => {
      const ind = state.indicators[s.id];
      const p   = state.prices[s.id];
      if (!ind?.closes || ind.closes.length < 5 || !p?.price) return true;
      // نستخدم أقدم سعر في ind.closes (يمثل ~30 يوم) مقارنة بالسعر الحالي
      const price30dAgo = ind.closes[0]; // أقدم سعر محفوظ
      const gain30d = price30dAgo > 0 ? (p.price - price30dAgo) / price30dAgo * 100 : 0;
      const supportedTrend = s.nearSupport || (s.volR || 0) >= 1.8 || s.ignitionReady;
      const limit = s.activeBuy ? 60 : 90;
      return gain30d <= limit || (supportedTrend && !s.tooCloseToResistance);
    })
    // شرط 8: توقيت الدخول مقبول أو السهم في رادار مبكر قريب
    .filter(s => s.entryTiming === 'ادخل الآن' || s.entryTiming === 'مقبول' || s.conditionalBuy || s.earlyRadar)
    // شرط 8.5: لا توصية إذا المسافة للمقاومة ضيقة — لا نطارد السهم عند السقف
    .filter(s => !s.tooCloseToResistance && (s.roomToResistance == null || s.roomToResistance >= Math.max(4, s.minRoomToResistance || 0)))
    // شرط 9: السعر فوق MA50 على الأقل
    .filter(s => s.ma50==null || s.price >= s.ma50*0.97)
    // شرط 9.5: الاتجاه اللحظي/اليومي ليس ضعيفًا جدًا إلا إذا كان السهم عند الدعم
    .filter(s => s.nearSupport || s.adx == null || s.adx >= REC_MIN_ENTRY_ADX || (s.macdHist != null && s.macdHist > 0))
    // شرط 9.6: الخبر السلبي القوي يلغي التوصية
    .filter(s => !s.newsImpact?.block && s.newsImpact?.level !== 'neg')
    // شرط 10: ✅ بيانات كافية — 100 يوم على الأقل
    .filter(s => (state.indicators[s.id]?.dataLen || state.indicators[s.id]?.closes?.length || 0) >= 100)
    // شرط 11: سيولة كافية — 500 ألف سهم يومياً على الأقل
    .filter(s => {
      const p   = state.prices[s.id];
      const pro = state.profiles[s.id];
      const avg = p?.avgVolume || pro?.avgVolume || 0;
      return avg === 0 || avg >= 500000; // لو ما في بيانات حجم → يمر
    });

  // ترتيب: قوة × 0.4 + ثقة × 0.3 + جودة × 0.2 + توقيت × 0.1
  // FIX: conviction = 10 بدل 20 — لا يطغى على قوة السهم الحقيقية
  candidates.sort((a,b) => {
    const timingBonus = (s) =>
      s.entryTiming==='ادخل الآن' ? 15 :
      s.entryTiming==='مقبول'     ? 5  : 0;
    const convictionBonus = (s) => s.isConviction ? 10 : 0;
    // ✅ مكافأة شمعة صاعدة قوية
    const candleBonus = (s) => {
      if(!s.candlePatterns?.length) return 0;
      const top = s.candlePatterns[0];
      return top.signal==='bullish' ? top.strength*2 : top.signal==='bearish' ? -top.strength*2 : 0;
    };
    // ✅ مكافأة القوة النسبية
    const rsBonus = (s) => s.relativeStrength ? Math.max(-10, Math.min(15, s.relativeStrength.score)) : 0;
    const analystBonus = (s) => s.analystView ? Math.max(-8, Math.min(8, s.analystView.bias * 3)) : 0;
    const stageBonus = (s) => s.recStage === 'confirmed' ? 25 : s.recStage === 'conditional' ? 10 : 0;
    const scoreA = a.strength*0.4 + a.confidence*0.3 + a.tradeQuality*0.2
                 + timingBonus(a) + convictionBonus(a) + candleBonus(a) + rsBonus(a) + analystBonus(a) + stageBonus(a);
    const scoreB = b.strength*0.4 + b.confidence*0.3 + b.tradeQuality*0.2
                 + timingBonus(b) + convictionBonus(b) + candleBonus(b) + rsBonus(b) + analystBonus(b) + stageBonus(b);
    return scoreB - scoreA;
  });

  // لا نمنع الفرص بسبب حالة السوق؛ السوق يظهر كتحذير والاختيار للمستخدم.
  const maxRecs = 10;

  const recs = [];
  const usedSectors = new Set();
  // الجولة الأولى: توصية واحدة لكل قطاع
  for(const c of candidates) {
    if(recs.length>=maxRecs) break;
    if(!usedSectors.has(c.sector)) {
      recs.push(c);
      usedSectors.add(c.sector);
    }
  }
  // الجولة الثانية: أكمل بأقوى المرشحين بدون تكرار
  for(const c of candidates) {
    if(recs.length>=maxRecs) break;
    if(!recs.find(r=>r.id===c.id)) recs.push(c);
  }

  // ══ تحديث Cooldown — سهم كان توصية وهبط -5%
  let cooldownUpdated = false;
  ALL_STOCKS.forEach(s => {
    const p = state.prices[s.id];
    if(!p?.isReal) return;
    const wasRec = (state.sessionOneIds||[]).includes(s.id);
    if(wasRec && (p.change||0) < -5) {
      if(!state.cooldownStocks) state.cooldownStocks = [];
      if(!state.cooldownStocks.includes(s.id)) {
        state.cooldownStocks.push(s.id);
        cooldownUpdated = true;
      }
    }
  });
  if(cooldownUpdated) {
    try { localStorage.setItem('cooldown_stocks', JSON.stringify(state.cooldownStocks)); } catch(e) {}
  }

  state.recs = recs;
  state.recsTime = new Date();

  // ✅ تسجيل في السجل فقط عند السوق المفتوح — لا تسجيل لأسعار قديمة
  if(isMarketOpen()) {
    recordRecsToHistory(recs);
  }

  // إشعار بالتوصيات الجديدة
  if(recs.length > 0) {
    const names = recs.slice(0,3).map(r=>r.id).join('، ');
    sendNotification('🎯 Rami Falcon X', recs.length+' توصيات جديدة: '+names);
  }

  // حفظ التوصيات — s1_recs يُحفظ مرة واحدة فقط عند الافتتاح
  // لا نكتب فوقه هنا لأن منتصف اليوم يحتاجه للمقارنة
  try {
    // s1_recs يُحفظ فقط إذا لم يكن محفوظاً من قبل اليوم (الجلسة الأولى)
    const existingDate = localStorage.getItem('recs_date');
    const today        = new Date().toDateString();
    const isFirstRec   = existingDate !== today; // أول مرة اليوم
    if(isFirstRec) {
      localStorage.setItem('s1_recs', JSON.stringify(recs.map(r=>r.id)));
      state.sessionOneIds = recs.map(r=>r.id);
    }
    localStorage.setItem('recs_time',   new Date().toISOString());
    localStorage.setItem('recs_date',   today);
    localStorage.setItem('recs_full',   JSON.stringify(recs));
    localStorage.setItem('recs_midday', 'false');
  } catch(e) {}

  return recs;
}
