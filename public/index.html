        ]),
      ]),
      el('div', {style:{
        background:'rgba(255,45,122,.08)', border:'1px solid rgba(255,45,122,.2)',
        borderRadius:'8px', padding:'7px 8px', textAlign:'center',
      }}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['рҹӣ‘ Ш§Щ„ЩҲЩӮЩҒ']),
        el('div', {style:{fontSize:'12px', fontWeight:'800', color:C.pink}}, ['$'+fmt(s.stopLoss,2)]),
        el('div', {style:{fontSize:'9px', color:C.pink}}, ['-'+fmt(s.lossPct,1)+'%']),
      ]),
      el('div', {style:{
        background:rrColor+'10', border:'1px solid '+rrColor+'30',
        borderRadius:'8px', padding:'7px 8px', textAlign:'center',
      }}, [
        el('div', {style:{fontSize:'9px', color:C.text3}}, ['вҡ–пёҸ R/R']),
        el('div', {style:{fontSize:'14px', fontWeight:'900', color:rrColor}}, [fmt(s.riskReward,1)+'x']),
        el('div', {style:{fontSize:'8px', color:rrColor}},
          [s.riskReward>=3?'Щ…Щ…ШӘШ§ШІ':s.riskReward>=2?'Ш¬ЩҠШҜ':'Щ…ЩӮШЁЩҲЩ„']),
      ]),
    ]),

    // в”Җв”Җ 9. ШЈЩ…Шұ Ш§Щ„ШҙШұШ§ШЎ Ш§Щ„Ш¬Ш§ЩҮШІ
    el('div', {style:{
      background:'linear-gradient(135deg,rgba(180,79,255,.08),rgba(255,45,122,.04))',
      border:'1px solid rgba(180,79,255,.3)',
      borderRadius:'10px', padding:'10px 12px', marginBottom:'8px',
    }}, [
      el('div', {style:{fontSize:'10px', fontWeight:'800', color:C.purple, marginBottom:'8px'}},
        ['рҹ“Ӣ ШЈЩ…Шұ Ш§Щ„ШҙШұШ§ШЎ']),
      el('div', {style:{borderTop:'1px solid rgba(180,79,255,.2)', marginBottom:'8px'}}),
      el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'5px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, ['ЩҶЩҲШ№ Ш§Щ„ШЈЩ…Шұ']),
        el('span', {style:{
          fontSize:'11px', fontWeight:'800', color:orderColor,
          background:orderColor+'18', borderRadius:'5px', padding:'2px 8px',
        }}, [orderType]),
      ]),
      el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'5px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, ['ШіШ№Шұ Ш§Щ„ШҙШұШ§ШЎ']),
        el('span', {style:{fontSize:'13px', fontWeight:'900', color:C.text}}, ['$'+fmt(buyPrice,2)]),
      ]),
      el('div', {style:{borderTop:'1px solid rgba(255,255,255,.05)', margin:'5px 0'}}),
      el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'4px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, ['рҹӣ‘ ЩҲЩӮЩҒ Ш§Щ„Ш®ШіШ§ШұШ©']),
        el('span', {style:{fontSize:'12px', fontWeight:'800', color:C.pink}}, ['$'+fmt(s.stopLoss,2)]),
      ]),
      el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'4px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, ['рҹҺҜ ЩҮШҜЩҒ Ш§Щ„ШөЩҒЩӮШ©']),
        el('div', {style:{textAlign:'left'}}, [
          el('span', {style:{fontSize:'12px', fontWeight:'800', color:C.green}}, ['$'+fmt(s.target,2)]),
          el('span', {style:{fontSize:'9px', color:C.green}}, [' +'+fmt(s.profitPct,1)+'%']),
          el('div', {style:{fontSize:'8px', color:C.text3}}, [
            s.resistance && Math.abs(s.resistance-s.target)<0.5
              ? 'рҹ“Қ Ш№ЩҶШҜ Ш§Щ„Щ…ЩӮШ§ЩҲЩ…Ш©'
              : 'рҹ“җ ATRГ—3.5 (Щ…ЩӮШ§ЩҲЩ…Ш© ЩӮШұЩҠШЁШ© Ш¬ШҜШ§ЩӢ)',
          ]),
        ]),
      ]),
      el('div', {style:{display:'flex', justifyContent:'space-between', marginBottom:'8px'}}, [
        el('span', {style:{fontSize:'10px', color:C.text3}}, ['рҹ“Ҡ ЩҶШіШЁШ© R/R']),
        el('span', {style:{fontSize:'12px', fontWeight:'800', color:rrColor}},
          [fmt(s.riskReward,1)+'x вҖ” Щ„ЩғЩ„ ШұЩҠШ§Щ„ Ш®ШіШ§ШұШ© ШұШЁШӯЩғ '+fmt(s.riskReward,1)+' ШұЩҠШ§Щ„']),
      ]),
      // ШӘШ®ШөЩҠШө ШұШЈШі Ш§Щ„Щ…Ш§Щ„
      el('div', {style:{
        background:'rgba(180,79,255,.08)', borderRadius:'7px',
        padding:'6px 8px', marginBottom:'5px',
        fontSize:'10px', color:C.purple, fontWeight:'700',
      }}, ['рҹ’ј Ш®ШөШө '+( s.allocPct*100).toFixed(0)+'% Щ…ЩҶ ШұШЈШіЩ…Ш§Щ„Щғ вҖ” Щ„Ш§ ШӘШӘШ¬Ш§ЩҲШІ ЩҮШ°ЩҮ Ш§Щ„ЩҶШіШЁШ©']),
      // ШӘШӯШ°ЩҠШұ Щ…Ш¬Ш§ШІЩҒШ©
      el('div', {style:{
        fontSize:'9px', color:C.orange,
        background:'rgba(255,122,0,.08)', borderRadius:'6px',
        padding:'5px 8px',
      }}, ['вҡ пёҸ ЩҮШ°ЩҮ Щ…Ш¬Ш§ШІЩҒШ© вҖ” Ш§Щ„Ш®ШіШ§ШұШ© Щ…ШӯШҜЩҲШҜШ© ЩҲШ§Щ„ШұШЁШӯ Ш¶Ш®Щ… Щ…ШӯШӘЩ…Щ„. Ш§Щ„ЩҲЩӮЩҒ ШҘЩ„ШІШ§Щ…ЩҠ.']),

      // в”Җв”Җ Щ…ШҜШ© Ш§Щ„ШөЩҒЩӮШ© Ш§Щ„Щ…ШӘЩҲЩӮШ№Ш© Щ„Щ„Щ…Ш¬Ш§ШІЩҒШ©
      (() => {
        if(!s.atrPct || !s.profitPct) return null;
        // вң… ШӘШ№ШҜЩҠЩ„: Щ…ШҜШ© ШӘШЈШ®Ш° MACD ЩҲШ§Щ„ШЈШіШЁЩҲШ№ЩҠ
        const momentum2 = s.macdHist>0 && s.macdHistDir==='expanding' ? 1.3 :
                          s.macdHist>0 ? 1.0 : 0.7;
        const trend2    = s.weeklyTrend==='bullish' ? 1.2 : 0.8;
        const days = Math.max(1, Math.ceil(s.profitPct / (s.atrPct * momentum2 * trend2)));
        const type = days <= 1 ? {label:'рҹ”Ҙ ЩҠЩҲЩ…ЩҠ',  color:C.pink,   desc:'ШӯШұЩғШ© ШіШұЩҠШ№Ш© вҖ” ШұШ§ЩӮШЁ ЩғЩ„ ШіШ§Ш№Ш©'}
                   : days <= 3 ? {label:'вҡЎ ЩӮШөЩҠШұ',   color:C.orange, desc:'1-3 ШЈЩҠШ§Щ… вҖ” Ш§Щ„ШЈЩҶШіШЁ Щ„Щ„Щ…Ш¬Ш§ШІЩҒШ©'}
                   : days <= 7 ? {label:'рҹ“… ШЈШіШЁЩҲШ№ЩҠ', color:C.blue,   desc:'3-7 ШЈЩҠШ§Щ… вҖ” Ш§ШөШЁШұ Ш№Щ„Щү Ш§Щ„Щ…ШұЩғШІ'}
                   :             {label:'вҸі Ш·ЩҲЩҠЩ„',   color:C.text2,  desc:'ШЈЩғШ«Шұ Щ…ЩҶ ШЈШіШЁЩҲШ№ вҖ” Щ…Ш¬Ш§ШІЩҒШ© ШӘШӯШӘШ§Ш¬ ШөШЁШұШ§ЩӢ'};
        return el('div', {style:{
          background:'#060b14', border:`1px solid ${type.color}33`,
          borderRadius:'8px', padding:'8px 12px', marginTop:'8px',
          display:'flex', justifyContent:'space-between', alignItems:'center',
        }}, [
          el('div', {}, [
            el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'2px'}}, ['вҸұпёҸ Щ…ШҜШ© Ш§Щ„Щ…Ш¬Ш§ШІЩҒШ© Ш§Щ„Щ…ШӘЩҲЩӮШ№Ш©']),
            el('div', {style:{fontSize:'12px', fontWeight:'800', color:type.color}}, [type.label]),
            el('div', {style:{fontSize:'9px', color:C.text2, marginTop:'2px'}}, [type.desc]),
          ]),
          el('div', {style:{textAlign:'left', flexShrink:'0'}}, [
            el('div', {style:{fontSize:'18px', fontWeight:'900', color:type.color}}, [days+'']),
            el('div', {style:{fontSize:'8px', color:C.text3}}, ['ЩҠЩҲЩ… ШӘШҜШ§ЩҲЩ„']),
          ]),
        ]);
      })(),
      // ШұШіШ§Щ„Ш© Ш§Щ„ШҙЩ…Ш№Ш© ЩҒЩҠ ШЈШіЩҒЩ„ Ш§Щ„ШЈЩ…Шұ
      s.topCandle && el('div', {style:{
        fontSize:'9px', marginTop:'5px', borderRadius:'6px', padding:'5px 8px',
        color: s.topCandle.signal==='bullish'?C.green:s.topCandle.signal==='bearish'?C.pink:C.yellow,
        background: s.topCandle.signal==='bullish'?'rgba(0,255,136,.06)':s.topCandle.signal==='bearish'?'rgba(255,45,122,.06)':'rgba(255,224,51,.06)',
      }}, [
        s.topCandle.signal==='bullish'
          ? 'вң… ШҙЩ…Ш№Ш© ШөШ§Ш№ШҜШ© ШӘШӨЩғШҜ Ш§Щ„ШҜШ®ЩҲЩ„ вҖ” Ш§Щ„ШІШ®Щ… ЩҒЩҠ ШөШ§Щ„ШӯЩғ'
          : s.topCandle.signal==='bearish'
          ? 'рҹҡЁ ШҙЩ…Ш№Ш© ЩҮШ§ШЁШ·Ш© вҖ” Ш§ЩҶШӘШёШұ ШӘШЈЩғЩҠШҜШ§ЩӢ ШөШ§Ш№ШҜШ§ЩӢ ЩӮШЁЩ„ Ш§Щ„ШҜШ®ЩҲЩ„'
          : 'вҡ пёҸ Doji вҖ” ШӘШұШҜШҜ ЩҒЩҠ Ш§Щ„ШіЩҲЩӮШҢ Ш§ЩҶШӘШёШұ Ш§Щ„ШҙЩ…Ш№Ш© Ш§Щ„ШӘШ§Щ„ЩҠШ©',
      ]),
    ]),

    // в”Җв”Җ 10. ШӘЩҒШ§ШөЩҠЩ„ ШҘШ¶Ш§ЩҒЩҠШ© Ш№ЩҶШҜ Ш§Щ„Ш¶ШәШ·
    isSelected && el('div', {style:{
      borderTop:'1px solid rgba(180,79,255,.15)', paddingTop:'10px', marginTop:'4px',
    }}, [
      el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'5px'}}, [
        s.rsi!=null && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 7px', textAlign:'center'}}, [
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['RSI']),
          el('div', {style:{fontSize:'11px', fontWeight:'700', color:s.rsi<35?C.green:s.rsi>70?C.pink:C.blue}},
            [fmt(s.rsi)+'%']),
          el('div', {style:{fontSize:'8px', color:C.text3}},
            [s.rsi<35?'ШӘШҙШЁШ№ ШЁЩҠШ№':s.rsi>70?'ШӘШҙШЁШ№ ШҙШұШ§ШЎ':'Щ…ШӯШ§ЩҠШҜ']),
        ]),
        s.macd!=null && el('div', {style:{background:'#060b14', borderRadius:'6px', padding:'5px 7px', textAlign:'center'}}, [
          el('div', {style:{fontSize:'8px', color:C.text3}}, ['MACD']),
          el('div', {style:{fontSize:'11px', fontWeight:'700', color:s.macd>0?C.green:C.pink}},

        marginTop:'8px', fontSize:'10px', color:C.yellow,

    ]),

}

function renderMarketTab() {
  const priced = ALL_STOCKS
    .map(s => {
      const p = state.prices[s.id];
      return p?.price > 0 ? {...s, p} : null;
    })
    .filter(Boolean)
    .sort((a,b) => Math.abs(b.p.change||0) - Math.abs(a.p.change||0));

  const isLive = priced.some(s=>s.p.isReal);
  const q      = (state.search||'').toLowerCase().trim();
  const sec    = state.sector || 'Ш§Щ„ЩғЩ„';

  const filtered = priced
    .filter(s => sec==='Ш§Щ„ЩғЩ„' || s.sector===sec || s.sector?.includes(sec))
    .filter(s => !q || s.id.toLowerCase().includes(q) || s.name.toLowerCase().includes(q) || s.sector?.toLowerCase().includes(q));

  // ЩҒШұШІ ШӯШіШЁ Ш§Щ„ЩҒЩ„ШӘШұ Ш§Щ„ЩҶШҙШ·
  const sortBy = state.marketSort || 'change';
  const sorted = [...filtered].sort((a,b) => {
    if(sortBy==='change') return Math.abs(b.p.change||0) - Math.abs(a.p.change||0);
    if(sortBy==='price')  return b.p.price - a.p.price;
    if(sortBy==='vol')    return (b.p.volume/b.p.avgVolume||0) - (a.p.volume/a.p.avgVolume||0);
    return 0;
  });

  const gainers = sorted.filter(s=>(s.p.change||0)>0);
  const losers  = sorted.filter(s=>(s.p.change||0)<0);
  const flat    = sorted.filter(s=>(s.p.change||0)===0);

  // ШҘШӯШөШ§ШҰЩҠШ§ШӘ ШіШұЩҠШ№Ш©
  const avgChange = priced.length
    ? priced.reduce((s,x)=>s+(x.p.change||0),0)/priced.length : 0;

  if(priced.length === 0) {
    const elapsed = state._loadStart ? (Date.now()-state._loadStart)/1000 : 0;
    if(elapsed > 20) {
      return el('div',{style:{padding:'30px 16px',textAlign:'center'}},[
        el('div',{style:{fontSize:'32px',marginBottom:'8px'}},['вҡ пёҸ']),
        el('div',{style:{fontSize:'13px',color:C.orange,marginBottom:'6px'}},['ЩҒШҙЩ„ ШӘШӯЩ…ЩҠЩ„ Ш§Щ„ШЈШіШ№Ш§Шұ']),
        el('button',{
          style:{background:'rgba(0,200,255,.15)',border:'1px solid rgba(0,200,255,.3)',
            borderRadius:'8px',padding:'8px 16px',color:C.blue,fontSize:'11px'},
          onClick:()=>{state._loadStart=Date.now();loadData();render();}
        },['рҹ”„ ШҘШ№Ш§ШҜШ© Ш§Щ„Щ…ШӯШ§ЩҲЩ„Ш©']),
      ]);
    }
    return el('div',{style:{padding:'40px 16px',textAlign:'center'}},[
      el('div',{style:{width:'36px',height:'36px',margin:'0 auto 12px',
        border:'3px solid rgba(0,200,255,.2)',borderTop:'3px solid #00c8ff',
        borderRadius:'50%',animation:'spin 1s linear infinite'}}),
      el('div',{style:{fontSize:'13px',color:C.blue}},['Ш¬Ш§ШұЩҠ ШӘШӯЩ…ЩҠЩ„ Ш§Щ„ШЈШіШ№Ш§Шұ...']),
    ]);
  }

  return el('div',{style:{padding:'12px 16px'}},[

    // в”Җв”Җ ШҙШұЩҠШ· Ш§Щ„ШӯШ§Щ„Ш©
    el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}},[
      el('div',{style:{fontSize:'13px',fontWeight:'700',color:C.text}},['рҹ“Ҡ '+priced.length+' ШіЩҮЩ…']),
      el('div',{style:{display:'flex',gap:'6px',alignItems:'center'}},[
        el('div',{style:{
          fontSize:'10px',fontWeight:'700',
          color:avgChange>=0?C.green:C.pink,
          background:avgChange>=0?'rgba(0,255,136,.1)':'rgba(255,45,122,.1)',
          borderRadius:'6px',padding:'3px 8px',
          border:`1px solid ${avgChange>=0?'rgba(0,255,136,.3)':'rgba(255,45,122,.3)'}`,
        }},['Щ…ШӘЩҲШіШ· '+(avgChange>=0?'+':'')+avgChange.toFixed(2)+'%']),
        el('div',{style:{
          fontSize:'10px',fontWeight:'700',
          color:isLive?C.green:C.yellow,
          background:isLive?'rgba(0,255,136,.1)':'rgba(255,224,51,.1)',
          borderRadius:'6px',padding:'3px 8px',
          border:`1px solid ${isLive?'rgba(0,255,136,.3)':'rgba(255,224,51,.3)'}`,
        }},[isLive?'рҹҹў ШӯЩҠ':'рҹҹЎ ШўШ®Шұ ШӘШӯШҜЩҠШ«']),
      ]),
    ]),

    // в”Җв”Җ ЩҒЩ„Ш§ШӘШұ Ш§Щ„ЩӮШ·Ш§Ш№Ш§ШӘ
    el('div',{style:{display:'flex',gap:'5px',flexWrap:'nowrap',overflowX:'auto',marginBottom:'8px',paddingBottom:'2px'}},[
      ...[
        {id:'Ш§Щ„ЩғЩ„', label:'Ш§Щ„ЩғЩ„'},
        {id:'ШӘЩғЩҶЩҲЩ„ЩҲШ¬ЩҠШ§', label:'рҹ’» ШӘЩӮЩҶЩҠШ©'},
        {id:'AI/ШҙШұШ§ШҰШӯ',  label:'рҹӨ– AI'},
        {id:'Щ…Ш§Щ„ЩҠШ©',     label:'рҹҸҰ Щ…Ш§Щ„ЩҠШ©'},
        {id:'ШөШӯШ©',       label:'рҹ’Ҡ ШөШӯШ©'},
        {id:'Ш·Ш§ЩӮШ©',      label:'вҡЎ Ш·Ш§ЩӮШ©'},
      ].map(f =>
        el('button',{
          style:{
            fontSize:'10px',fontWeight:'700',whiteSpace:'nowrap',flexShrink:'0',
            padding:'5px 10px',borderRadius:'20px',
            color: state.sector===f.id?'#050810':C.text2,
            background: state.sector===f.id?C.blue:'rgba(255,255,255,.05)',
            border: state.sector===f.id?'none':'1px solid #1a2340',
          },
          onClick:()=>{state.sector=f.id;render();}
        },[f.label])
      ),
    ]),

    // в”Җв”Җ ШЁШӯШ« + ЩҒШұШІ + ШӘШӯШҜЩҠШ«
    el('div',{style:{display:'flex',gap:'6px',marginBottom:'10px'}},[
      el('input',{
        type:'text',placeholder:'рҹ”Қ ШЁШӯШ«...',value:state.search||'',
        style:{flex:'1',background:'#0a1020',border:'1px solid #1a2340',
          borderRadius:'8px',padding:'7px 10px',color:C.text,fontSize:'12px',outline:'none'},
        onInput:e=>{state.search=e.target.value;render();}
      }),
      // ЩҒШұШІ
      (() => {
        const sel = document.createElement('select');
        Object.assign(sel.style,{
          background:'#0a1020',border:'1px solid #1a2340',borderRadius:'8px',
          padding:'7px 6px',color:C.text2,fontSize:'11px',flexShrink:'0',
        });
        [['change','ШӘШәЩҠЩҠШұ'],['vol','ШӯШ¬Щ…'],['price','ШіШ№Шұ']].forEach(([v,l])=>{
          const o=document.createElement('option');
          o.value=v; o.textContent=l;
          if(state.marketSort===v) o.selected=true;
          sel.appendChild(o);
        });
        sel.onchange=e=>{state.marketSort=e.target.value;render();};
        return sel;
      })(),
      el('button',{
        style:{fontSize:'11px',fontWeight:'700',color:C.blue,flexShrink:'0',
          background:'rgba(0,200,255,.1)',borderRadius:'8px',padding:'7px 10px',
          border:'1px solid rgba(0,200,255,.3)'},
        onClick:async()=>{await fetchPrices();await fetchMarketTrend();render();}
      },['рҹ”„']),
    ]),

    // в”Җв”Җ ШҘШӯШөШ§ШҰЩҠШ§ШӘ ШіШұЩҠШ№Ш©
    el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'6px',marginBottom:'12px'}},[
      el('div',{style:{background:'rgba(0,255,136,.06)',border:'1px solid rgba(0,255,136,.15)',
        borderRadius:'8px',padding:'8px',textAlign:'center'}},[
        el('div',{style:{fontSize:'18px',fontWeight:'900',color:C.green}},[gainers.length+'']),
        el('div',{style:{fontSize:'9px',color:C.text3}},['в–І ШұШ§ШЁШӯ']),
      ]),
      el('div',{style:{background:'rgba(255,45,122,.06)',border:'1px solid rgba(255,45,122,.15)',
        borderRadius:'8px',padding:'8px',textAlign:'center'}},[
        el('div',{style:{fontSize:'18px',fontWeight:'900',color:C.pink}},[losers.length+'']),
        el('div',{style:{fontSize:'9px',color:C.text3}},['в–ј Ш®Ш§ШіШұ']),
      ]),
      el('div',{style:{background:'rgba(255,255,255,.03)',border:'1px solid #1a2340',
        borderRadius:'8px',padding:'8px',textAlign:'center'}},[
        el('div',{style:{fontSize:'18px',fontWeight:'900',color:C.text2}},[flat.length+'']),
        el('div',{style:{fontSize:'9px',color:C.text3}},['вһЎпёҸ Щ…ШіШӘЩӮШұ']),
      ]),
    ]),

    // в”Җв”Җ ЩӮШ§ШҰЩ…Ш© Ш§Щ„ШЈШіЩҮЩ… (ШҙШЁЩғШ© Щ…ЩҶШёЩ…Ш©)
    filtered.length === 0
      ? el('div',{style:{textAlign:'center',padding:'30px',color:C.text2,fontSize:'12px'}},['Щ„Ш§ ЩҶШӘШ§ШҰШ¬'])
      : el('div',{},[

          // Ш§Щ„ШұШ§ШЁШӯЩҲЩҶ
          gainers.length>0 && el('div',{style:{marginBottom:'10px'}},[
            el('div',{style:{fontSize:'10px',color:C.green,fontWeight:'700',
              marginBottom:'5px',display:'flex',alignItems:'center',gap:'4px'}},[
              'в–І Ш§Щ„ШұШ§ШЁШӯЩҲЩҶ ('+gainers.length+')',
            ]),
            el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px'}},[
              ...gainers.map(s=>renderMiniStock(s)),
            ]),
          ]),

          // Ш§Щ„Ш®Ш§ШіШұЩҲЩҶ
          losers.length>0 && el('div',{style:{marginBottom:'10px'}},[
            el('div',{style:{fontSize:'10px',color:C.pink,fontWeight:'700',
              marginBottom:'5px'}},[
              'в–ј Ш§Щ„Ш®Ш§ШіШұЩҲЩҶ ('+losers.length+')',
            ]),
            el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px'}},[
              ...losers.map(s=>renderMiniStock(s)),
            ]),
          ]),

          // Щ…ШіШӘЩӮШұЩҲЩҶ
          flat.length>0 && el('div',{},[
            el('div',{style:{fontSize:'10px',color:C.text2,fontWeight:'700',marginBottom:'5px'}},['вһЎпёҸ Щ…ШіШӘЩӮШұ ('+flat.length+')']),
            el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px'}},[
              ...flat.map(s=>renderMiniStock(s)),
            ]),
          ]),

        ]),
  ]);
}

function renderMiniStock(s) {
  const chg      = s.p.change || 0;
  const isUp     = chg > 0;
  const clr      = chg > 0 ? C.green : chg < 0 ? C.pink : C.text2;
  const spyDiff  = state.spyChange != null ? chg - state.spyChange : null;
  const ind      = state.indicators[s.id];
  const volR     = s.p.avgVolume>0 ? s.p.volume/s.p.avgVolume : 0;
  const isOpen   = state.selectedStock === s.id;

  return el('div',{style:{
    background:'#060b14', borderRadius:'8px',
    border:`1px solid ${isOpen ? C.purple : clr+'18'}`,
    minWidth:'0', overflow:'hidden',
    cursor:'pointer',
  }, onClick:()=>{ state.selectedStock = isOpen ? null : s.id; render(); }},[

    // в”Җв”Җ ШұШЈШі Ш§Щ„ШЁШ·Ш§ЩӮШ©
    el('div',{style:{padding:'8px 10px'}},[
      el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'2px'}},[
        el('div',{},[
          el('div',{style:{fontSize:'11px',fontWeight:'800',color:C.text,
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'80px'}},
            [s.name]),
          el('div',{style:{fontSize:'9px',color:C.text3}},[s.id]),
        ]),
        el('div',{style:{textAlign:'left',flexShrink:'0'}},[
          el('div',{style:{fontSize:'12px',fontWeight:'800',color:clr}},
            [(isUp?'+':'')+fmt(chg,2)+'%']),
          el('div',{style:{fontSize:'10px',color:C.text2}},['$'+fmtPrice(s.p.price)]),
        ]),
      ]),
      el('div',{style:{display:'flex',gap:'4px',flexWrap:'wrap'}},[
        spyDiff!=null && el('span',{style:{
          fontSize:'8px',color:spyDiff>=0?C.green:C.pink,
          background:spyDiff>=0?'rgba(0,255,136,.08)':'rgba(255,45,122,.08)',
          borderRadius:'3px',padding:'1px 4px',
        }},[(spyDiff>=0?'+':'')+spyDiff.toFixed(1)+'% SPY']),
        volR>=1.5 && el('span',{style:{
          fontSize:'8px',color:C.blue,
          background:'rgba(0,200,255,.08)',
          borderRadius:'3px',padding:'1px 4px',
        }},['vol Г—'+fmt(volR,1)]),
        ind?.rsi!=null && el('span',{style:{
          fontSize:'8px',
          color: ind.rsi<35?C.green:ind.rsi>70?C.pink:C.text3,
          background:'rgba(255,255,255,.04)',
          borderRadius:'3px',padding:'1px 4px',
        }},['RSI '+Math.round(ind.rsi)]),
        // вң… badge Ш¬ЩҲШҜШ© Ш§Щ„ШЁЩҠШ§ЩҶШ§ШӘ вҖ” ЩҠШіШӘШ®ШҜЩ… Ш§Щ„Ш№ШҜШҜ Ш§Щ„ШӯЩӮЩҠЩӮЩҠ
        ind && (ind.dataLen || ind.closes?.length || 0) < 100 && el('span',{style:{
          fontSize:'8px', color:C.orange,
          background:'rgba(255,122,0,.08)',
          borderRadius:'3px', padding:'1px 4px',
        }},['рҹ“Ҡ '+(ind.dataLen || ind.closes?.length||0)+'y']),
      ].filter(Boolean)),
    ]),

    // в”Җв”Җ Ш§Щ„ШЁШ·Ш§ЩӮШ© ШӘЩҒШӘШӯ ШөЩҒШӯШ© ЩғШ§Щ…Щ„Ш© Ш№ЩҶШҜ Ш§Щ„Ш¶ШәШ·
    isOpen && ind && null, // Ш§Щ„ШөЩҒШӯШ© Ш§Щ„ЩғШ§Щ…Щ„Ш© ШӘЩҸШ№ШұШ¶ ЩҒЩҠ renderApp
  ]);
}

// в”Җв”Җ ШөЩҒШӯШ© ШӘШӯЩ„ЩҠЩ„ Ш§Щ„ШіЩҮЩ… Ш§Щ„ЩғШ§Щ…Щ„Ш© (overlay)
function renderStockPage(s, p, ind, volR) {

  const clr = chg>0?C.green:chg<0?C.pink:C.text2;

  return el('div', {style:{
    position:'fixed', top:0, left:0, right:0, bottom:0,
    background:'#050810', zIndex:500,
    overflowY:'auto', display:'flex', flexDirection:'column',
    direction:'rtl', // вң… Ш§ШӘШ¬Ш§ЩҮ Ш№ШұШЁЩҠ
  }}, [

    // в”Җв”Җ ЩҮЩҠШҜШұ Ш§Щ„ШөЩҒШӯШ©
    el('div', {style:{
      position:'sticky', top:0, zIndex:10,
      background:'#050810', borderBottom:'1px solid #1a2340',
      padding:'12px 16px',
      display:'flex', alignItems:'center', gap:'12px',
      direction:'rtl',
    }}, [
      el('div', {style:{flex:'1'}}, [
        el('div', {style:{fontSize:'15px', fontWeight:'800', color:C.text}}, [s.name]),
        el('div', {style:{fontSize:'11px', color:C.text3}}, [s.id+' вҖў '+(s.sector||'')]),
      ]),
      el('div', {style:{textAlign:'left', flexShrink:'0'}}, [

      ]),
      // ШІШұ Ш§Щ„ШұШ¬ЩҲШ№ ЩҒЩҠ Ш§Щ„ЩҠШіШ§Шұ
      el('button', {
        style:{
          background:'rgba(255,255,255,.08)', border:'1px solid #1a2340',
          borderRadius:'8px', padding:'7px 14px',
          color:C.text, fontSize:'13px', fontWeight:'700',
          flexShrink:'0', cursor:'pointer',
        },
        onClick:()=>{ state.selectedStock=null; render(); }
      }, ['вң• ШұШ¬ЩҲШ№']),
    ]),

    // в”Җв”Җ Ш§Щ„Щ…ШӯШӘЩҲЩү
    el('div', {style:{padding:'12px 16px', flex:'1', direction:'rtl', width:'100%', boxSizing:'border-box'}}, [
      renderTraderCard(s, ind, volR, chg, p),
    ]),
  ]);
}

// в”Җв”Җ ШЁШ·Ш§ЩӮШ© ШӘШӯЩ„ЩҠЩ„ Ш§Щ„Щ…Ш¶Ш§ШұШЁ Ш§Щ„ЩҠЩҲЩ…ЩҠ
function renderTraderCard(s, ind, volR, chg, priceObj) {
  const pData = priceObj || s.p || {};
  const price = pData.price || 0;

  const signals = [];

  // 1. MACD Histogram вҖ” ШІШ®Щ… Ш§Щ„ШӯШұЩғШ©
  if(ind.macdHist!=null) {
    const h = ind.macdHist, d = ind.macdHistDir;
    const col  = h>0&&d==='expanding'?C.green : h>0?C.yellow : d==='expanding'?C.pink:C.orange;
    const icon = h>0&&d==='expanding'?'вң…':h>0?'вҡ пёҸ':d==='expanding'?'вқҢ':'вҡ пёҸ';
    const txt  = h>0&&d==='expanding'
      ? 'Ш§Щ„ШІШ®Щ… ЩҠШӘШөШ§Ш№ШҜ Щ„Щ„ШЈШ№Щ„Щү вҖ” ЩӮЩҲШ© Ш§Щ„ШҙШұШ§ШЎ ШӘШІШҜШ§ШҜ вҖ” ЩҒШұШөШ© ШҜШ®ЩҲЩ„ Ш¬ЩҠШҜШ©'
      : h>0
      ? 'Ш§Щ„ШІШ®Щ… Щ…ЩҲШ¬ШЁ Щ„ЩғЩҶ ЩҠШ¶Ш№ЩҒ вҖ” Ш§Щ„ШӯШұЩғШ© ШӘШӘШЁШ§Ш·ШЈ вҖ” ШұШ§ЩӮШЁ Ш§Щ„Ш®ШұЩҲШ¬'
      : d==='expanding'
      ? 'Ш§Щ„ШІШ®Щ… ЩҠШӘШөШ§Ш№ШҜ Щ„Щ„ШЈШіЩҒЩ„ вҖ” ЩӮЩҲШ© Ш§Щ„ШЁЩҠШ№ ШӘШІЩҠШҜ вҖ” ШӘШ¬ЩҶШЁ Ш§Щ„ШҜШ®ЩҲЩ„'
      : 'Ш§Щ„ШІШ®Щ… ШіШ§Щ„ШЁ Щ„ЩғЩҶ ЩҠШ¶Ш№ЩҒ вҖ” ЩӮШҜ ЩҠШұШӘШҜ вҖ” Ш§ЩҶШӘШёШұ ШӘШЈЩғЩҠШҜШ§ЩӢ';
    const hint = 'MACD Histogram ЩҠЩӮЩҠШі ЩӮЩҲШ© ЩҲШ§ШӘШ¬Ш§ЩҮ Ш§Щ„ШӯШұЩғШ©';
    signals.push({label:'ШІШ®Щ… Ш§Щ„ШӯШұЩғШ© (MACD)', value:(h>0?'+':'')+fmt(h,2)+(d==='expanding'?' вҶ‘':' вҶ“'), desc:txt, hint, color:col, icon});
  }

  // 2. RSI вҖ” ЩҮЩ„ Ш§Щ„ШіЩҮЩ… Щ…ШЁШ§Ш№ ШЈЩҲ Щ…ШҙШӘШұЩү ШЁШҘЩҒШұШ§Ш·Шҹ
  if(ind.rsi!=null) {
    const r   = ind.rsi;
    const col = r<35?C.green:r>70?C.pink:C.yellow;
    const icon= r<35?'вң…':r>70?'вқҢ':'вҡ пёҸ';
    const txt = r<30 ? 'Щ…ШЁШ§Ш№ ШЁШҘЩҒШұШ§Ш· ШҙШҜЩҠШҜ вҖ” Ш§ШұШӘШҜШ§ШҜ ЩӮЩҲЩҠ Щ…ШӯШӘЩ…Щ„ вҖ” ЩҒШұШөШ© ШҙШұШ§ШЎ'
              : r<45 ? 'Щ…ЩҶШ·ЩӮШ© ШҙШұШ§ШЎ вҖ” Ш§Щ„ШіЩҮЩ… ШұШ®ЩҠШө ЩҶШіШЁЩҠШ§ЩӢ'
              : r<60 ? 'Щ…ЩҶШ·ЩӮШ© Щ…ШӯШ§ЩҠШҜШ© вҖ” Щ„Ш§ ШҘШҙШ§ШұШ© ЩҲШ§Ш¶ШӯШ© вҖ” Ш§ЩҶШӘШёШұ'
              : r<70 ? 'Ш§Щ„ШіЩҮЩ… ЩӮЩҲЩҠ Щ„ЩғЩҶ ШұШ§ЩӮШЁ Ш§Щ„ШӘШҙШЁШ№'
              :        'Щ…ШҙШӘШұЩү ШЁШҘЩҒШұШ§Ш· вҖ” ЩӮШҜ ЩҠЩҶШІЩ„ вҖ” Ш§ШӯШ°Шұ Щ…ЩҶ Ш§Щ„ШҜШ®ЩҲЩ„ Ш§Щ„ШўЩҶ';
    const hint = 'RSI: ШЈЩӮЩ„ Щ…ЩҶ 30 = ШұШ®ЩҠШө Ш¬ШҜШ§ЩӢ | ШЈЩғШ«Шұ Щ…ЩҶ 70 = ШәШ§Щ„ЩҚ Ш¬ШҜШ§ЩӢ';
    signals.push({label:'RSI вҖ” Ш§Щ„ЩӮЩҲШ© Ш§Щ„ЩҶШіШЁЩҠШ©', value:fmt(r,1), desc:txt, hint, color:col, icon});
  }

  // 3. Ш§Щ„ШҙЩ…Ш№Ш© Ш§Щ„ШЈШ®ЩҠШұШ©
  if(ind.closes?.length >= 3) {
    const candles = detectCandlePatterns(ind.closes, ind.highs, ind.lows, ind.opens);
    const top = candles[0];
    if(top) {
      const col  = top.signal==='bullish'?C.green:top.signal==='bearish'?C.pink:C.yellow;
      const icon = top.signal==='bullish'?'вң…':top.signal==='bearish'?'вқҢ':'вҡ пёҸ';
      const extra= top.signal==='bullish'?' вҖ” ШҘШҙШ§ШұШ© ШҙШұШ§ШЎ':top.signal==='bearish'?' вҖ” ШҘШҙШ§ШұШ© ШЁЩҠШ№':' вҖ” Ш§ЩҶШӘШёШұ ШӘШЈЩғЩҠШҜ';
      const hint = 'Ш§Щ„ШҙЩ…Ш№Ш© ШӘШ№ЩғШі ШӯШұЩғШ© Ш§Щ„ШіШ№Шұ ЩҒЩҠ Ш§Щ„ЩҠЩҲЩ… Ш§Щ„ШЈШ®ЩҠШұ';
      signals.push({label:'Ш§Щ„ШҙЩ…Ш№Ш© Ш§Щ„ЩҠШ§ШЁШ§ЩҶЩҠШ©', value:top.ar, desc:top.tip+extra, hint, color:col, icon});
    } else {
      const hint = 'Ш§Щ„ШҙЩ…Ш№Ш© ШӘШ№ЩғШі ШӯШұЩғШ© Ш§Щ„ШіШ№Шұ ЩҒЩҠ Ш§Щ„ЩҠЩҲЩ… Ш§Щ„ШЈШ®ЩҠШұ';
      signals.push({label:'Ш§Щ„ШҙЩ…Ш№Ш© Ш§Щ„ЩҠШ§ШЁШ§ЩҶЩҠШ©', value:'Щ…ШӯШ§ЩҠШҜШ©', desc:'Щ„Ш§ ЩҶЩ…Ш· ЩҲШ§Ш¶Шӯ вҖ” Ш§Щ„ШіЩҲЩӮ ЩҒЩҠ ШӘШұШҜШҜ вҖ” Ш§ЩҶШӘШёШұ Ш¬Щ„ШіШ© ШЈШ®ШұЩү', hint, color:C.text3, icon:'вҡ пёҸ'});
    }
  }

  // 4. Ш§Щ„ШӯШ¬Щ…
  const volCol  = volR>=2?C.green:volR>=1.2?C.blue:volR<0.7?C.pink:C.text3;
  const volIcon = volR>=2?'вң…':volR>=1.2?'вң…':volR<0.7?'вқҢ':'вҡ пёҸ';
  const volTxt  = volR>=2 ? 'Ш§ЩҮШӘЩ…Ш§Щ… ЩӮЩҲЩҠ Ш¬ШҜШ§ЩӢ вҖ” ШӯШұЩғШ© ШӯЩӮЩҠЩӮЩҠШ© ЩҲЩ„ЩҠШіШӘ ЩҲЩҮЩ…ЩҠШ©'
                : volR>=1.2 ? 'ШӯШ¬Щ… Щ…ШұШӘЩҒШ№ вҖ” ШӘШЈЩғЩҠШҜ Щ„Щ„ШӯШұЩғШ©'
                : volR<0.7  ? 'ШӯШ¬Щ… Ш¶Ш№ЩҠЩҒ вҖ” Ш§Щ„ШӯШұЩғШ© ЩӮШҜ Щ„Ш§ ШӘШіШӘЩ…Шұ'
                :             'ШӯШ¬Щ… Ш·ШЁЩҠШ№ЩҠ вҖ” Щ„Ш§ ШӘШЈЩғЩҠШҜ ШҘШ¶Ш§ЩҒЩҠ';
  const volHint = 'Ш§Щ„ШӯШ¬Щ… ЩҠЩӮЩҠШі Ш№ШҜШҜ Ш§Щ„ШЈШіЩҮЩ… Ш§Щ„Щ…ШӘШҜШ§ЩҲЩ„Ш© Щ…ЩӮШ§ШұЩҶШ© ШЁШ§Щ„Щ…Ш№ШҜЩ„';
  signals.push({label:'ШӯШ¬Щ… Ш§Щ„ШӘШҜШ§ЩҲЩ„', value:'Г—'+fmt(volR,1), desc:volTxt, hint:volHint, color:volCol, icon:volIcon});

  // 5. Ш§Щ„ШЈШіШЁЩҲШ№ЩҠ
  if(ind.weeklyTrend) {
    const col  = ind.weeklyTrend==='bullish'?C.blue:C.pink;
    const icon = ind.weeklyTrend==='bullish'?'вң…':'вқҢ';
    const txt  = ind.weeklyTrend==='bullish'
      ? 'Ш§Щ„Ш§ШӘШ¬Ш§ЩҮ Ш§Щ„ЩғШЁЩҠШұ ШөШ§Ш№ШҜ вҖ” Ш§Щ„Щ…ЩҲШ¬Ш© ЩҒЩҠ ШөШ§Щ„ШӯЩғ вҖ” ШЈЩҒШ¶Щ„ Щ„Щ„ШҙШұШ§ШЎ'
      : 'Ш§Щ„Ш§ШӘШ¬Ш§ЩҮ Ш§Щ„ЩғШЁЩҠШұ ЩҮШ§ШЁШ· вҖ” ШӘШіШЁШӯ Ш№ЩғШі Ш§Щ„ШӘЩҠШ§Шұ вҖ” Ш®Ш·Шұ ШЈШ№Щ„Щү';
    const hint = 'Ш§Щ„ШЈШіШЁЩҲШ№ЩҠ ЩҠШ№ЩғШі Ш§ШӘШ¬Ш§ЩҮ Ш§Щ„ШіЩҮЩ… Ш№Щ„Щү Щ…ШҜЩү ШЈШіШ§ШЁЩҠШ№';
    signals.push({label:'Ш§Щ„Ш§ШӘШ¬Ш§ЩҮ Ш§Щ„ШЈШіШЁЩҲШ№ЩҠ', value:ind.weeklyTrend==='bullish'?'ШөШ§Ш№ШҜ вҶ‘':'ЩҮШ§ШЁШ· вҶ“', desc:txt, hint, color:col, icon});
  }

  // 6. Ш§Щ„ШҜШ№Щ…
  if(ind.support && ind.support > 0) {
    const dist     = (price - ind.support)/price*100;
    const atSup    = dist < 2;
    const belowSup = price < ind.support;
    const col  = atSup?C.green:belowSup?C.pink:C.text3;
    const icon = atSup?'вң…':belowSup?'вқҢ':'вҡ пёҸ';
    const txt  = atSup
      ? 'Ш§Щ„ШіШ№Шұ Ш№ЩҶШҜ Ш§Щ„ШҜШ№Щ… вҖ” ШӘШ§ШұЩҠШ®ЩҠШ§ЩӢ ЩҠШұШӘШҜ Щ…ЩҶ ЩҮЩҶШ§ вҖ” ЩҶЩӮШ·Ш© ШҙШұШ§ШЎ Щ…ШӯШӘЩ…Щ„Ш©'
      : belowSup
      ? 'Ш§Щ„ШіШ№Шұ ЩғШіШұ Ш§Щ„ШҜШ№Щ… вҖ” ШҘШҙШ§ШұШ© ЩҮШЁЩҲШ· вҖ” Ш§ЩҶШӘШёШұ Ш§Щ„Ш§ШіШӘЩӮШұШ§Шұ'
      : 'ШЁЩҸШ№ШҜ '+fmt(dist,1)+'% Щ…ЩҶ Ш§Щ„ШҜШ№Щ… вҖ” Щ„ЩҠШі Ш№ЩҶШҜ ЩҶЩӮШ·Ш© Ш§ШұШӘШҜШ§ШҜ ШЁШ№ШҜ';
    const hint = 'Ш§Щ„ШҜШ№Щ… = Щ…ШіШӘЩҲЩү ШіШ№ШұЩҠ ЩҠШұШӘШҜ Щ…ЩҶЩҮ Ш§Щ„ШіЩҮЩ… Щ„Щ„ШЈШ№Щ„Щү ШӘШ§ШұЩҠШ®ЩҠШ§ЩӢ';
    signals.push({label:'Щ…ШіШӘЩҲЩү Ш§Щ„ШҜШ№Щ…', value:'$'+fmt(ind.support,2), desc:txt, hint, color:col, icon});
  }

  // в”Җв”Җ Ш§Щ„ЩӮШұШ§Шұ
  const greens = signals.filter(s=>s.icon==='вң…').length;
  const reds   = signals.filter(s=>s.icon==='вқҢ').length;
  let decision, decColor, decBg;
  if(greens >= 4)         { decision='Ш§ШҙШӘШұЩҠ / ШӘЩ…ШіЩғ рҹҹў'; decColor=C.green;  decBg='rgba(0,255,136,.08)'; }
  else if(reds >= 3)      { decision='ШЁЩҠШ№ / Ш§Ш®ШұШ¬ рҹ”ҙ';   decColor=C.pink;   decBg='rgba(255,45,122,.08)'; }
  else if(greens >= reds) { decision='Ш§ЩҶШӘШёШұ ШӘШЈЩғЩҠШҜ рҹҹЎ';  decColor=C.yellow; decBg='rgba(255,224,51,.06)'; }
  else                    { decision='Щ…ЩҠЩ„ Щ„Щ„ШЁЩҠШ№ вҡ пёҸ';    decColor=C.orange; decBg='rgba(255,122,0,.08)'; }

  return el('div',{style:{
    background:'#050810', padding:'10px',
  }},[

    // в”Җв”Җ Ш§Щ„Щ…ШӨШҙШұШ§ШӘ
    el('div',{style:{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'12px',width:'100%'}},
      signals.map(sig => el('div',{style:{
        background:'#060b14', borderRadius:'10px', padding:'10px 14px',
        border:`1px solid ${sig.color}22`,
        display:'flex', alignItems:'flex-start', gap:'10px',
        width:'100%', boxSizing:'border-box',
      }},[
        // ШЈЩҠЩӮЩҲЩҶШ©
        el('span',{style:{fontSize:'20px',flexShrink:'0',marginTop:'2px'}},[sig.icon]),
        // ЩҲШөЩҒ ЩҠЩ…Щ„ШЈ Ш§Щ„Щ…ШіШ§ШӯШ©
        el('div',{style:{flex:'1',minWidth:'0',textAlign:'right'}},[
          el('div',{style:{
            fontSize:'13px',fontWeight:'700',color:sig.color,
            lineHeight:'1.6', marginBottom:'3px',
          }},[sig.desc]),
          sig.hint && el('div',{style:{
            fontSize:'10px',color:C.text3,
            borderTop:`1px solid ${sig.color}15`, paddingTop:'3px', marginTop:'3px',
          }},[sig.hint]),
        ]),
        // Ш§Щ„ЩӮЩҠЩ…Ш© + Ш§ШіЩ… Ш§Щ„Щ…ШӨШҙШұ
        el('div',{style:{
          textAlign:'right', flexShrink:'0',
          borderRight:`2px solid ${sig.color}40`,
          paddingRight:'10px', minWidth:'70px',
        }},[
          el('div',{style:{fontSize:'14px',fontWeight:'900',color:sig.color}},[sig.value]),
          el('div',{style:{fontSize:'9px',color:C.text3,marginTop:'2px'}},[sig.label]),
        ]),
      ]))
    ),

    // в”Җв”Җ Ш§Щ„ЩӮШұШ§Шұ Ш§Щ„ЩҶЩҮШ§ШҰЩҠ
    el('div',{style:{
      background:decBg,
      border:`1px solid ${decColor}33`,
      borderRadius:'10px',padding:'12px 14px',
      direction:'rtl', marginBottom:'8px',
    }},[
      el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}},[
        el('span',{style:{fontSize:'14px',fontWeight:'900',color:decColor}},[decision]),
        el('span',{style:{fontSize:'10px',color:C.text3}},['вң…'+greens+' вқҢ'+reds+' вҡ пёҸ'+(signals.length-greens-reds)]),
      ]),
      el('div',{style:{fontSize:'11px',color:C.text2,lineHeight:'1.6'}},[
        greens >= 4
          ? 'Щ…Ш№ШёЩ… Ш§Щ„Щ…ШӨШҙШұШ§ШӘ ШӘШҙЩҠШұ Щ„Щ„ШҙШұШ§ШЎ вҖ” ЩҠЩ…ЩғЩҶ Ш§Щ„ШҜШ®ЩҲЩ„ Щ…Ш№ ЩҲЩӮЩҒ Ш§Щ„Ш®ШіШ§ШұШ© Ш§Щ„ШҘЩ„ШІШ§Щ…ЩҠ'
          : reds >= 3
          ? 'Щ…Ш№ШёЩ… Ш§Щ„Щ…ШӨШҙШұШ§ШӘ ШӘШҙЩҠШұ Щ„Щ„ШЁЩҠШ№ вҖ” ШӘШ¬ЩҶШЁ Ш§Щ„ШҜШ®ЩҲЩ„ ШЈЩҲ Ш§Ш®ШұШ¬ ШҘШ°Ш§ Ш№ЩҶШҜЩғ Щ…ШұЩғШІ Щ…ЩҒШӘЩҲШӯ'
          : greens >= reds
          ? 'Ш§Щ„Щ…ШӨШҙШұШ§ШӘ Щ…Ш®ШӘЩ„Ш·Ш© вҖ” Ш§ЩҶШӘШёШұ ШҙЩ…Ш№Ш© ШәШҜ: ШҘШ°Ш§ ШЈШәЩ„ЩӮ ШЁШ®Ш¶ШұШ§ШЎ ЩӮЩҲЩҠШ© Щ…Ш№ ШӯШ¬Щ… Щ…ШұШӘЩҒШ№ Ш§ШҜШ®Щ„ШҢ ЩҲШҘЩ„Ш§ Ш§ЩҶШӘШёШұ'
          : 'Ш§Щ„Щ…ЩҠЩ„ Щ„Щ„ЩҮШЁЩҲШ· вҖ” Ш§ЩҶШӘШёШұ ШӯШӘЩү ЩҠШіШӘЩӮШұ Ш§Щ„ШіШ№Шұ Ш№ЩҶШҜ ШҜШ№Щ… ШЈЩҲ ЩҠШӘШӯЩҲЩ„ MACD Щ„Щ„ШҘЩҠШ¬Ш§ШЁЩҠ',
      ]),
    ]),

    // в”Җв”Җ ШӘШӯШ°ЩҠШұ
    el('div',{style:{fontSize:'8px',color:C.text3,marginTop:'6px',textAlign:'center'}},
      ['вҡ пёҸ ШӘШӯЩ„ЩҠЩ„ ШӘЩӮЩҶЩҠ Щ„ШӯШёЩҠ вҖ” Ш§Щ„ЩӮШұШ§Шұ Ш§Щ„ЩҶЩҮШ§ШҰЩҠ Щ„Щғ']),
  ]);
}

// ================================================================
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ PORTFOLIO TAB в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// ================================================================

function renderPortTab() {
  // ШӘШӯЩ…ЩҠЩ„ Ш§Щ„Щ…ШӯЩҒШёШ© Щ…ЩҶ localStorage
  let portfolio = [];
  try { portfolio = JSON.parse(localStorage.getItem('portfolio')||'[]'); } catch(e) {}

  const openTrades  = portfolio.filter(t=>t.type==='buy'&&!t.closed);
  const closedTrades= portfolio.filter(t=>t.closed||t.type==='sell');

  const totalInvested = openTrades.reduce((s,t) => s + t.shares*t.buyPrice*USD_RATE, 0);
  const totalCurrent  = openTrades.reduce((s,t) => {
    const p = state.prices[t.symbol]?.price || t.buyPrice;
    return s + t.shares*p*USD_RATE;
  }, 0);
  const totalPnL = totalCurrent - totalInvested;

  const wins = closedTrades.filter(t=>(t.exitPrice||t.buyPrice)>t.buyPrice).length;
  const winRate = closedTrades.length>0 ? Math.round(wins/closedTrades.length*100) : 0;

  const totalRealized = closedTrades.reduce((s,t) => {
    const exit = t.exitPrice||t.buyPrice;
    return s + (exit - t.buyPrice)*t.shares*USD_RATE;
  }, 0);

  function _savePortfolio() {
    try { localStorage.setItem('portfolio', JSON.stringify(portfolio)); } catch(e) {}
    // Ш§Щ„Щ…ШӯЩҒШёШ© ШӘЩҸШӯЩҒШё Щ…ШӯЩ„ЩҠШ§ЩӢ ЩҒЩӮШ· вҖ” Ш§Щ„ШіШ¬Щ„ ЩҮЩҲ Щ…Ш§ ЩҠШ°ЩҮШЁ Щ„Щ„ШіШӯШ§ШЁШ©
  }

  function saveTrade() {
    const sym    = (document.getElementById('p_sym')?.value||'').toUpperCase().trim();
    const shares = parseFloat(document.getElementById('p_shares')?.value||0);
    const price  = parseFloat(document.getElementById('p_price')?.value||0);
    const type   = document.getElementById('p_type')?.value||'buy';
    const notes  = document.getElementById('p_notes')?.value||'';
    const stopV  = parseFloat(document.getElementById('p_stop')?.value||0);
    const tgtV   = parseFloat(document.getElementById('p_tgt')?.value||0);
    if(!sym||!shares||!price) { alert('ШЈЩғЩ…Щ„ Ш§Щ„ШӯЩӮЩҲЩ„ Ш§Щ„ШЈШіШ§ШіЩҠШ©'); return; }

    const trade = {
      symbol:sym, shares, buyPrice:price, type,
      notes, stopLoss:stopV||0, target:tgtV||0,
      date:new Date().toISOString(),
      closed:false, exitPrice:null, exitDate:null,
    };

    // ШҘШ°Ш§ ЩҶЩҲШ№ ШЁЩҠШ№ вҖ” Ш§ШЁШӯШ« Ш№ЩҶ ШөЩҒЩӮШ© ШҙШұШ§ШЎ Щ…ЩҒШӘЩҲШӯШ©
    if(type==='sell') {
      const openIdx = portfolio.findIndex(t=>t.symbol===sym&&t.type==='buy'&&!t.closed);
      if(openIdx>=0) {
        portfolio[openIdx].closed    = true;
        portfolio[openIdx].exitPrice = price;
        portfolio[openIdx].exitDate  = new Date().toISOString();
        portfolio[openIdx].exitNotes = notes;
      } else {
        // ШҘШ¶Ш§ЩҒШ© ЩғШіШ¬Щ„ Щ…ШЁШ§ШҙШұ
        trade.closed    = true;
        trade.exitPrice = price;
        trade.exitDate  = new Date().toISOString();
        portfolio.push(trade);
      }
    } else {
      portfolio.push(trade);
    }

    _savePortfolio();
    ['p_sym','p_shares','p_price','p_notes','p_stop','p_tgt'].forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.value='';
    });
    render();
  }

  function deleteTrade(idx) {
    if(!confirm('ШӯШ°ЩҒ Ш§Щ„ШөЩҒЩӮШ©Шҹ')) return;
    portfolio.splice(idx, 1);
    _savePortfolio();
    render();
  }

  function closeTrade(idx) {
    const t   = portfolio[idx];
    const cur = state.prices[t.symbol]?.price || t.buyPrice;
    // ЩҶШӯЩҒШё index ЩҒЩҠ state Щ„ЩҒШӘШӯ ШӯЩӮЩ„ Ш§Щ„ШҘШәЩ„Ш§ЩӮ
    state._closingIdx = state._closingIdx === idx ? null : idx;
    render();
  }

  function confirmClose(idx) {
    const exitVal = parseFloat(document.getElementById('close_price_'+idx)?.value||0);
    if(!exitVal || isNaN(exitVal) || exitVal <= 0) { alert('ШЈШҜШ®Щ„ ШіШ№Шұ ШҘШәЩ„Ш§ЩӮ ШөШӯЩҠШӯ'); return; }
    portfolio[idx].closed    = true;
    portfolio[idx].exitPrice = exitVal;
    portfolio[idx].exitDate  = new Date().toISOString();
    state._closingIdx = null;
    _savePortfolio();
    render();
  }

  function fmtDate(iso) {
    if(!iso) return '';
    try {
      return new Date(iso).toLocaleDateString('ar', {month:'short', day:'numeric'});
    } catch(e) { return ''; }
  }

  return el('div', {style:{padding:'12px 16px'}}, [
    // ШҘШӯШөШ§ШҰЩҠШ§ШӘ
    el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginBottom:'14px'}}, [
      el('div', {style:{background:'#0a1020', border:'1px solid var(--border)', borderRadius:'12px', padding:'12px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['рҹ’ј Щ…ЩҒШӘЩҲШӯШ©']),
        el('div', {style:{fontSize:'16px', fontWeight:'900', color:C.blue}}, [totalInvested.toFixed(0)+' Шұ']),
        el('div', {style:{fontSize:'9px', color:totalPnL>=0?C.green:C.pink}}, [
          'ШәЩҠШұ Щ…ШӯЩӮЩӮ: '+(totalPnL>=0?'+':'')+totalPnL.toFixed(0)+' Шұ'
        ]),
      ]),
      el('div', {style:{background: totalRealized>=0?'rgba(0,255,136,.08)':'rgba(255,45,122,.08)', border:`1px solid ${totalRealized>=0?C.green:C.pink}33`, borderRadius:'12px', padding:'12px'}}, [
        el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['рҹ’° Щ…ШӯЩӮЩӮ']),
        el('div', {style:{fontSize:'16px', fontWeight:'900', color:totalRealized>=0?C.green:C.pink}}, [
          (totalRealized>=0?'+':'')+totalRealized.toFixed(0)+' Шұ'
        ]),
        el('div', {style:{fontSize:'9px', color:C.text2}}, [closedTrades.length+' ШөЩҒЩӮШ© Щ…ШәЩ„ЩӮШ©']),
      ]),

    // ШҘШ¶Ш§ЩҒШ© ШөЩҒЩӮШ©
    el('div', {style:{background:'#0a1020', border:`1px solid ${C.green}33`, borderRadius:'14px', padding:'14px', marginBottom:'14px'}}, [

      el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginBottom:'8px'}}, [

        el('div', {}, [

          (() => {

            ['buy','sell'].forEach((v) => {

              o.value = v; o.textContent = v==='buy'?'рҹҹў ШҙШұШ§ШЎ':'рҹ”ҙ ШЁЩҠШ№';
              sel.appendChild(o);

            return sel;
          })(),
        ]),
        el('div', {}, [

          el('input', {id:'p_shares', type:'number', placeholder:'10', style:{width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px'}}),

        el('div', {}, [

          el('input', {id:'p_price', type:'number', placeholder:'150.00', style:{width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px'}}),
        ]),
        el('div', {}, [
          el('div', {style:{fontSize:'10px', color:C.text3, marginBottom:'4px'}}, ['рҹӣ‘ ЩҲЩӮЩҒ Ш§Щ„Ш®ШіШ§ШұШ© $']),
          el('input', {id:'p_stop', type:'number', placeholder:'Ш§Ш®ШӘЩҠШ§ШұЩҠ', style:{width:'100%', background:'#060b14', border:'1px solid var(--border)', borderRadius:'8px', padding:'8px', color:C.text, fontSize:'12px'}}),
        ]),
        el('div', {}, [

      ...portfolio.map((t, idx) => {
        if(t.closed || t.type==='sell') return null;
        const cur = state.prices[t.symbol]?.price || t.buyPrice;
        const pnl = (cur - t.buyPrice) * t.shares * USD_RATE;
        const pnlPct = ((cur - t.buyPrice)/t.buyPrice*100).toFixed(2);
        const rr = t.stopLoss>0&&t.target>0
          ? (((t.target-t.buyPrice)/(t.buyPrice-t.stopLoss))).toFixed(1)+'x'
          : null;
        const nearStop = t.stopLoss>0 && cur <= t.stopLoss*1.02;
        const nearTgt  = t.target>0  && cur >= t.target*0.98;
        return el('div', {style:{
          background:'#0a1020',
          border:`1px solid ${pnl>=0?C.green:C.pink}22`,
          borderRadius:'10px', padding:'10px', marginBottom:'8px',
        }}, [
          el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'4px'}}, [

              el('div', {style:{fontSize:'9px', color:C.text3}}, [
                'рҹ“… '+fmtDate(t.date)+' вҖў ШҜШ®ЩҲЩ„ $'+t.buyPrice.toFixed(2)
              ]),
            ]),
            el('div', {style:{textAlign:'left'}}, [
              el('div', {style:{fontSize:'13px', fontWeight:'700', color:pnl>=0?C.green:C.pink}}, [
                (pnl>=0?'+':'')+pnl.toFixed(0)+' Шұ'
              ]),
              el('div', {style:{fontSize:'10px', color:pnl>=0?C.green:C.pink}}, [
                (pnl>=0?'+':'')+pnlPct+'%'
              ]),
            ]),
          ]),
          // Ш§Щ„ШіШ№Шұ Ш§Щ„ШӯШ§Щ„ЩҠ
          el('div', {style:{display:'flex', gap:'6px', marginBottom:'4px'}}, [
            el('div', {style:{
              flex:'1', background:'#060b14', borderRadius:'6px', padding:'4px 6px',

            }}, ['Ш§Щ„ШўЩҶ: $'+cur.toFixed(2)]),

              flex:'1', background:nearStop?'rgba(255,45,122,.15)':'#060b14',
              borderRadius:'6px', padding:'4px 6px', fontSize:'9px',
              color:nearStop?C.pink:C.text3,
            }}, ['рҹӣ‘ $'+t.stopLoss.toFixed(2)+(nearStop?' вҡ пёҸ':'')]),
            t.target>0&&el('div', {style:{
              flex:'1', background:nearTgt?'rgba(0,255,136,.15)':'#060b14',
              borderRadius:'6px', padding:'4px 6px', fontSize:'9px',
              color:nearTgt?C.green:C.text3,
            }}, ['рҹҺҜ $'+t.target.toFixed(2)+(nearTgt?' вң…':'')]),
          ].filter(Boolean)),
          // Щ…Щ„Ш§ШӯШёШ§ШӘ ЩҲЩҶШіШЁШ© R/R
          el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center'}}, [
            t.notes?el('div', {style:{fontSize:'9px', color:C.text3, flex:'1', marginLeft:'8px'}}, [

            ]):el('div',{},[]),
            el('div', {style:{display:'flex', gap:'4px', flexShrink:'0'}}, [
              rr&&el('span', {style:{
                fontSize:'9px', background:'rgba(180,79,255,.1)',
                border:'1px solid rgba(180,79,255,.3)',
                borderRadius:'4px', padding:'2px 5px', color:C.purple,
              }}, ['R:R '+rr]),
              el('button', {
                style:{background:`rgba(0,200,255,.1)`, border:`1px solid rgba(0,200,255,.3)`,
                  color:C.blue, borderRadius:'6px', padding:'3px 7px', fontSize:'9px'},
                onClick: () => closeTrade(idx),
              }, [state._closingIdx === idx ? 'вң• ШҘЩ„ШәШ§ШЎ' : 'рҹ’° ШҘШәЩ„Ш§ЩӮ']),
              el('button', {
                style:{background:'rgba(255,45,122,.1)', border:'1px solid rgba(255,45,122,.3)',
                  color:C.pink, borderRadius:'6px', padding:'3px 7px', fontSize:'9px'},
                onClick: () => deleteTrade(idx),
              }, ['рҹ—‘пёҸ']),
            ].filter(Boolean)),
          ]),
          // в”Җв”Җ ШӯЩӮЩ„ ШҘШәЩ„Ш§ЩӮ Ш§Щ„ШөЩҒЩӮШ© (ЩҠШёЩҮШұ Ш№ЩҶШҜ Ш§Щ„Ш¶ШәШ· Ш№Щ„Щү ШҘШәЩ„Ш§ЩӮ)
          state._closingIdx === idx ? el('div', {style:{
            marginTop:'8px', background:'rgba(0,200,255,.06)',
            border:'1px solid rgba(0,200,255,.2)',
            borderRadius:'8px', padding:'8px 10px',
            display:'flex', gap:'6px', alignItems:'center',
          }}, [
            el('span', {style:{fontSize:'9px', color:C.text3, flexShrink:'0'}}, ['ШіШ№Шұ Ш§Щ„ШҘШәЩ„Ш§ЩӮ $']),
            el('input', {
              id:'close_price_'+idx,
              type:'number',
              placeholder: cur.toFixed(2),
              style:{
                flex:'1', background:'#060b14', border:'1px solid rgba(0,200,255,.3)',
                borderRadius:'6px', padding:'5px 8px', color:C.text, fontSize:'12px',
              },
            }),
            el('button', {
              style:{
                background:`linear-gradient(135deg,${C.green}22,${C.blue}22)`,
                border:`1px solid ${C.green}44`, color:C.green,
                borderRadius:'6px', padding:'5px 10px', fontSize:'10px', fontWeight:'700',
                flexShrink:'0',
              },
              onClick: () => confirmClose(idx),
            }, ['вң… ШӘШЈЩғЩҠШҜ']),
          ]) : null,
        ]);
      }).filter(Boolean),
    ]),

    // в”Җв”Җ Ш§Щ„ШөЩҒЩӮШ§ШӘ Ш§Щ„Щ…ШәЩ„ЩӮШ©
    closedTrades.length > 0 && el('div', {}, [
      el('div', {style:{fontSize:'12px', fontWeight:'700', color:C.text2, marginBottom:'8px'}}, ['рҹ“Ӣ Ш§Щ„ШіШ¬Щ„ ('+closedTrades.length+')']),
      ...portfolio.map((t, idx) => {
        if(!t.closed && t.type!=='sell') return null;
        const exit = t.exitPrice||t.buyPrice;
        const pnl  = (exit - t.buyPrice)*t.shares*USD_RATE;
        const pnlPct = ((exit-t.buyPrice)/t.buyPrice*100).toFixed(2);
        const days = t.exitDate&&t.date
          ? Math.round((new Date(t.exitDate)-new Date(t.date))/(1000*60*60*24))
          : null;
        return el('div', {style:{
          background:'rgba(255,255,255,.02)',
          border:`1px solid ${pnl>=0?C.green:C.pink}18`,
          borderRadius:'8px', padding:'8px 10px', marginBottom:'6px',
          display:'flex', justifyContent:'space-between', alignItems:'center',
        }}, [
          el('div', {}, [
            el('div', {style:{fontSize:'11px', fontWeight:'700', color:pnl>=0?C.green:C.pink}}, [
              (pnl>=0?'вң…':'вқҢ')+' '+t.symbol

            el('div', {style:{fontSize:'9px', color:C.text3}}, [
              fmtDate(t.date)+(t.exitDate?' вҶ’ '+fmtDate(t.exitDate):'')+

            t.notes&&el('div', {style:{fontSize:'9px', color:C.text3}}, ['рҹ’¬ '+t.notes]),
          ]),
          el('div', {style:{textAlign:'left'}}, [
            el('div', {style:{fontSize:'12px', fontWeight:'700', color:pnl>=0?C.green:C.pink}}, [
              (pnl>=0?'+':'')+pnl.toFixed(0)+' Шұ'

            el('div', {style:{fontSize:'9px', color:pnl>=0?C.green:C.pink}}, [
              (pnl>=0?'+':'')+pnlPct+'%'

            el('button', {
              style:{background:'rgba(255,45,122,.1)', border:'1px solid rgba(255,45,122,.25)', color:C.pink, borderRadius:'5px', padding:'2px 6px', fontSize:'9px', marginTop:'2px'},
              onClick: () => deleteTrade(idx),
            }, ['рҹ—‘пёҸ']),
          ]),
        ]);
      }).filter(Boolean),
    ]),
  ]);
}

  return el('div', {style:{padding:'16px'}}, [
    el('div', {style:{fontSize:'13px', fontWeight:'700', color:C.text, marginBottom:'12px'}}, ['рҹ§® ШӯШ§ШіШЁШ© Ш§Щ„ШӘШҜШ§ЩҲЩ„']),

    // ШӯШ§ШіШЁШ© Ш§Щ„ШұШЁШӯ
    el('div', {style:{
      background:'#0a1020', borderRadius:'10px',
      border:'1px solid var(--border)', padding:'12px',
    }}, [
      el('div', {style:{fontSize:'11px', color:C.text2, marginBottom:'8px'}}, ['рҹ“Ҳ ШӯШ§ШіШЁШ© Ш§Щ„ШұШЁШӯ/Ш§Щ„Ш®ШіШ§ШұШ©']),
      el('div', {style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px', marginBottom:'8px'}}, [
        el('div', {}, [
          el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'3px'}}, ['ШіШ№Шұ Ш§Щ„ШҙШұШ§ШЎ $']),
          el('input', {
            id:'calc_buy', type:'number', placeholder:'0.00',
            style:{width:'100%', background:'#060b14', border:'1px solid var(--border)',
              borderRadius:'6px', padding:'6px 8px', color:C.text, fontSize:'12px'},
          }),
        ]),
        el('div', {}, [
          el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'3px'}}, ['ШіШ№Шұ Ш§Щ„ШЁЩҠШ№ $']),
          el('input', {
            id:'calc_sell', type:'number', placeholder:'0.00',
            style:{width:'100%', background:'#060b14', border:'1px solid var(--border)',
              borderRadius:'6px', padding:'6px 8px', color:C.text, fontSize:'12px'},
          }),
        ]),
      ]),
      el('div', {style:{marginBottom:'8px'}}, [
        el('div', {style:{fontSize:'9px', color:C.text3, marginBottom:'3px'}}, ['Ш№ШҜШҜ Ш§Щ„ШЈШіЩҮЩ…']),
        el('input', {
          id:'calc_qty', type:'number', placeholder:'0',
          style:{width:'100%', background:'#060b14', border:'1px solid var(--border)',
            borderRadius:'6px', padding:'6px 8px', color:C.text, fontSize:'12px'},
        }),
      ]),
      el('button', {
        style:{
          width:'100%', background:`linear-gradient(135deg,${C.blue}22,${C.green}22)`,
          border:`1px solid ${C.blue}44`, borderRadius:'8px',
          padding:'8px', color:C.blue, fontWeight:'700', fontSize:'12px',
        },
        onClick: () => {
          const buy = parseFloat($('calc_buy')?.value||0);
          const sell= parseFloat($('calc_sell')?.value||0);
          const qty = parseFloat($('calc_qty')?.value||0);
          if(!buy||!sell||!qty) return;
          const pnl    = (sell-buy)*qty;
          const pnlSar = pnl*USD_RATE;
          const pct    = (sell-buy)/buy*100;
          alert(`Ш§Щ„ШұШЁШӯ/Ш§Щ„Ш®ШіШ§ШұШ©:\n${pnl>=0?'+':''}${fmt(pnl,2)} $ (${fmt(pct,2)}%)\n= ${fmt(pnlSar,0)} ШұЩҠШ§Щ„`);
        }
      }, ['Ш§ШӯШіШЁ']),
    ]),
  ]);
}

// в”Җв”Җ Щ…ШӘШәЩҠШұШ§ШӘ Ш§Щ„ШӘШӯЩғЩ… ЩҒЩҠ Ш§Щ„ШӘЩҲШөЩҠШ§ШӘ
let _recsLockedToday  = false;   // Ш§Щ„ШӘЩҲШөЩҠШ§ШӘ Щ…ШӯШіЩҲШЁШ© ЩҲЩ…ЩӮЩҒЩ„Ш© Щ„Щ„ЩҠЩҲЩ…
let _midDayDone       = false;   // ШӘШӯШҜЩҠШ« Щ…ЩҶШӘШөЩҒ Ш§Щ„ЩҠЩҲЩ… ШӘЩ…
let _lastRecDate      = null;    // ШӘШ§ШұЩҠШ® ШўШ®Шұ ШӯШіШ§ШЁ

function shouldRecalc() {
  const today = new Date().toDateString();
  // ЩҠЩҲЩ… Ш¬ШҜЩҠШҜ вҶ’ ШЈШ№ШҜ Ш§Щ„ШӯШіШ§ШЁ
  if(_lastRecDate !== today) {
    _recsLockedToday = false;
    _midDayDone      = false;
    _lastRecDate     = today;
    return true;
  }
  return !_recsLockedToday;
}

// в”Җв”Җ reset Ш§Щ„Щ…ШӨШҙШұШ§ШӘ Ш№ЩҶШҜ ЩҒШӘШӯ Ш§Щ„ШіЩҲЩӮ (ШҘШ°Ш§ ШӯЩҸЩ…Щ‘Щ„ШӘ ЩҲЩҮЩҲ Щ…ШәЩ„ЩӮ)
let _marketWasClosed = !isMarketOpen();
setInterval(() => {
  const nowOpen = isMarketOpen();
  if(nowOpen && _marketWasClosed && !_recsLockedToday && !_indicatorsLoading) {
    console.log('[Market Open] Ш§Щ„ШіЩҲЩӮ ЩҒШӘШӯ вҖ” ШҘШ№Ш§ШҜШ© ШӘШӯЩ…ЩҠЩ„ Ш§Щ„Щ…ШӨШҙШұШ§ШӘ...');
    state.indicatorsDone = false;
    loadData(false);
  }
  _marketWasClosed = !nowOpen;
}, 15000);

// в”Җв”Җ ШӘШӯШҜЩҠШ« Ш§Щ„ШЈШіШ№Ш§Шұ ЩҲШ§ШӘШ¬Ш§ЩҮ Ш§Щ„ШіЩҲЩӮ ЩғЩ„ 30 Ш«Ш§ЩҶЩҠШ© (ШЁШҜЩҲЩҶ ШҘШ№Ш§ШҜШ© ШӯШіШ§ШЁ Ш§Щ„ШӘЩҲШөЩҠШ§ШӘ)
setInterval(async () => {
  if(!isMarketOpen()) return; // Щ„Ш§ ШҜШ§Ш№ЩҠ Щ„Щ„ШӘШӯШҜЩҠШ« Ш®Ш§ШұШ¬ Ш§Щ„ШіЩҲЩӮ
  await Promise.all([fetchPrices(), fetchMarketTrend()]);
  // ЩҒЩӮШ· ЩҶШӯШҜШ« Ш§Щ„ШЈШіШ№Ш§Шұ ЩҒЩҠ Ш§Щ„ШӘЩҲШөЩҠШ§ШӘ Ш§Щ„Щ…ЩҲШ¬ЩҲШҜШ© вҖ” Щ„Ш§ ЩҶШ№ЩҠШҜ Ш§Щ„ШӯШіШ§ШЁ Ш§Щ„ЩғШ§Щ…Щ„
  if(state.recs) {
    state.recs = state.recs.map(r => {
      const p = state.prices[r.id];
      if(!p?.price) return r;
      return { ...r, price:p.price, change:p.change, high:p.high, low:p.low, volume:p.volume };
    });
  }
  if(state.speculativeRecs) {
    state.speculativeRecs = state.speculativeRecs.map(r => {
      const p = state.prices[r.id];
      if(!p?.price) return r;
      return { ...r, price:p.price, change:p.change };
    });
  }
  render();
}, 30000);

// в”Җв”Җ ЩҒШӯШө Щ…ЩҶШӘШөЩҒ Ш§Щ„ЩҠЩҲЩ… ЩғЩ„ ШҜЩӮЩҠЩӮШ©
setInterval(async () => {
  if(!isMarketOpen() || !state.indicatorsDone) return;

  const t = getMarketTimes();
  const m = getNowMins();

  // 7:00Щ… вҖ” ШӘШӯШҜЩҠШ« Ш§Щ„Щ…ШӨШҙШұШ§ШӘ ЩҲШҘШ№Ш§ШҜШ© Ш§Щ„ШӯШіШ§ШЁ Щ…ШұШ© Ш«Ш§ЩҶЩҠШ© ЩҲШЈШ®ЩҠШұШ© (ЩҶШ§ЩҒШ°Ш© 30 ШҜЩӮЩҠЩӮШ©)
  if(m >= t.midDay && m <= t.midDay+30 && !_midDayDone) {
    _midDayDone      = true;
    _recsLockedToday = false;

    // вң… ШӯЩҒШё ШӘЩҲШөЩҠШ§ШӘ Ш§Щ„Ш¬Щ„ШіШ© Ш§Щ„ШЈЩҲЩ„Щү ЩғЩҖ High Conviction ЩӮШЁЩ„ ШЈЩҠ ШҙЩҠШЎ
    if(state.recs?.length > 0) {
      state.sessionOneIds = state.recs.map(r => r.id);
      try {
        localStorage.setItem('s1_recs',      JSON.stringify(state.sessionOneIds));
        localStorage.setItem('s1_recs_date', new Date().toDateString()); // ШӘШ§ШұЩҠШ® Ш§Щ„ШӯЩҒШё
      } catch(e) {}
      console.log('[MidDay] ШӯЩҒШё High Conviction:', state.sessionOneIds);
    }

    // ШҘШ№Ш§ШҜШ© ШӘШӯЩ…ЩҠЩ„ Ш§Щ„Щ…ШӨШҙШұШ§ШӘ ЩҲШӯШіШ§ШЁ Ш§Щ„ШӘЩҲШөЩҠШ§ШӘ
    state.indicatorsDone = false;
    await fetchIndicators();
    await fetchNews();
    await fetchEarnings();

    // calcRecs ШіШӘЩӮШ§ШұЩҶ Ш§Щ„ШӘЩҲШөЩҠШ§ШӘ Ш§Щ„Ш¬ШҜЩҠШҜШ© Щ…Ш№ sessionOneIds Ш§Щ„Щ…ШӯЩҒЩҲШёШ© ШЈШ№Щ„Ш§ЩҮ
    calcRecs();
    calcSpeculative();
    await calcHunterFull();
    // Ш¬Щ„ШЁ Price Target Щ„Щ„ШӘЩҲШөЩҠШ§ШӘ ЩҒЩӮШ·
    if(state.recs?.length > 0) await fetchPriceTargets(state.recs);
    if(state.recs?.length > 0 && isMarketOpen()) {
      recordRecsToHistory(state.recs, 'Щ…ЩҶШӘШөЩҒ');
    }
    _recsLockedToday = true;
    try { localStorage.setItem('recs_midday', 'true'); } catch(e) {}
    render();
  }
}, 60000);

  if(!('Notification' in window)) return;
  if(Notification.permission === 'default') {
    await Notification.requestPermission();
  }
}

function sendNotification(title, body) {
  if(Notification.permission !== 'granted') return;
  try {
    new Notification(title, { body, icon: 'рҹ“Ҡ' });
  } catch(e) {}
}

(function restoreSavedRecs() {
  try {
    const savedDate  = localStorage.getItem('recs_date');
    const today      = new Date().toDateString();
    if(savedDate !== today) {
      // ЩҠЩҲЩ… Ш¬ШҜЩҠШҜ вҖ” Ш§Щ…ШіШӯ ЩғЩ„ ШҙЩҠШЎ ШЁЩ…Ш§ ЩҒЩҠЩҮ Cooldown
      localStorage.removeItem('s1_recs');
      localStorage.removeItem('s1_recs_date');
      localStorage.removeItem('cooldown_stocks');  // вң… ШҘШөЩ„Ш§Шӯ: Cooldown ЩҠЩҸЩ…ШіШӯ ЩҠЩҲЩ…ЩҠШ§ЩӢ
      state.cooldownStocks = [];
      return;
    }

    const savedRecs  = localStorage.getItem('recs_full');
    const savedTime  = localStorage.getItem('recs_time');
    const midday     = localStorage.getItem('recs_midday') === 'true';

    if(!savedRecs || !savedTime) return;

    const recs = JSON.parse(savedRecs);
    if(!Array.isArray(recs) || recs.length === 0) return;

    // вң… Ш§ШіШӘШұШ¬Ш§Ш№ sessionOneIds (ШӘЩҲШөЩҠШ§ШӘ Ш§Щ„Ш¬Щ„ШіШ© Ш§Щ„ШЈЩҲЩ„Щү) Щ„Щ„Щ…ЩӮШ§ШұЩҶШ© Ш§Щ„ШөШӯЩҠШӯШ©
    const s1Date = localStorage.getItem('s1_recs_date');
    if(s1Date === today) {
      const s1 = localStorage.getItem('s1_recs');
      if(s1) state.sessionOneIds = JSON.parse(s1);
    }

    state.recs           = recs;
    state.recsTime       = new Date(savedTime);
    // вң… ШҘШ°Ш§ ШӘЩҲШөЩҠШ§ШӘ Щ…ШӯЩҒЩҲШёШ© Щ…ЩҶ ЩҶЩҒШі Ш§Щ„ЩҠЩҲЩ… вҶ’ ЩӮЩҒЩ„ЩҮШ§ ЩҒЩҲШұШ§ЩӢ
    // Ш§Щ„Щ…ШӨШҙШұШ§ШӘ ШіШӘЩҸШӯЩ…Щ‘Щ„ Щ„ШӘШӯШҜЩҠШ« Ш§Щ„ШЈШіШ№Ш§Шұ ЩҒЩӮШ·ШҢ Щ„ЩғЩҶ Щ„Ш§ ШҘШ№Ш§ШҜШ© ШӯШіШ§ШЁ
    state.indicatorsDone = false;  // ЩҠШӯЩ…Щ‘Щ„ Ш§Щ„Щ…ШӨШҙШұШ§ШӘ Щ„ШӘШӯШҜЩҠШ« Ш§Щ„ШЈШіШ№Ш§Шұ
    _recsLockedToday     = true;   // вң… Щ…ЩӮЩҒЩ„Ш© вҖ” Щ„Ш§ ШҘШ№Ш§ШҜШ© ШӯШіШ§ШЁ
    _lastRecDate         = today;
    _midDayDone          = midday;

    console.log('[Restore] ШӘЩҲШөЩҠШ§ШӘ:', recs.length, '| High Conviction:', state.sessionOneIds?.length||0);
  } catch(e) {}
})();

  const time = session==='Щ…ЩҶШӘШөЩҒ' ? '7:00Щ…' : '4:30Щ…';
  let msg = `рҹ”” <b>ШӘШұЩҠШҜШұ ШЁШұЩҲ вҖ” ${session==='Щ…ЩҶШӘШөЩҒ'?'ШӘШӯШҜЩҠШ« Ш§Щ„Щ…ЩҶШӘШөЩҒ':'Ш§ЩҒШӘШӘШ§Шӯ Ш§Щ„ШіЩҲЩӮ'} ${time}</b>\n`;
  msg += `рҹ“Ҡ SPY ${(state.spyChange||0)>=0?'+':''}${fmt(state.spyChange||0,2)}%\n\n`;
  msg += `<b>ШӘЩҲШөЩҠШ§ШӘ Ш§Щ„ЩҠЩҲЩ…:</b>\n`;
  recs.slice(0,5).forEach((r,i)=>{
    msg += `${i+1}. <b>${r.id}</b> Ш«ЩӮШ© ${r.confidence}% | ЩҮШҜЩҒ +${fmt(r.profitPct,1)}%\n`;
  });
  msg += `\nШ§ЩҒШӘШӯ Ш§Щ„ШЈШҜШ§Ш© Щ„Щ„ШӘЩҒШ§ШөЩҠЩ„ рҹ‘Ҷ`;
  tgSend(msg);
}

// в”Җв”Җ ШӘЩҶШЁЩҠЩҮ ЩҲШөЩҲЩ„ Ш§Щ„ЩҮШҜЩҒ ШЈЩҲ Ш§Щ„ЩҲЩӮЩҒ
function tgCheckTrades() {
  try {
    const portfolio = JSON.parse(localStorage.getItem('portfolio')||'[]');
    portfolio.filter(t=>!t.closed).forEach(t=>{
      const p = state.prices[t.symbol];
      if(!p) return;
      const cur = p.price, target = parseFloat(t.target||0), stop = parseFloat(t.stop||0);
      if(target>0 && cur>=target && !t._tgTarget) {
        t._tgTarget=true;
        tgSend(`рҹҺҜ <b>${t.symbol} ЩҲШөЩ„ Ш§Щ„ЩҮШҜЩҒ!</b>\n$${t.entry} вҶ’ $${cur.toFixed(2)}\nШұШЁШӯ: +${((cur-t.entry)/t.entry*100).toFixed(2)}% рҹҺү\nШ§ЩғШӘШЁ Щ„Щ„ШЁЩҲШӘ: <code>Ш®ШұШ¬ШӘ ${t.symbol}</code>`);
      }
      if(stop>0 && cur<=stop*1.02 && cur>stop && !t._tgStop) {
        t._tgStop=true;
        tgSend(`вҡ пёҸ <b>${t.symbol} Ш§ЩӮШӘШұШЁ Щ…ЩҶ Ш§Щ„ЩҲЩӮЩҒ!</b>\n$${cur.toFixed(2)} | ЩҲЩӮЩҒ: $${stop}\nШұШ§ЩӮШЁ ЩҲЩғЩҶ Щ…ШіШӘШ№ШҜШ§ЩӢ`);
      }
      if(stop>0 && cur<=stop && !t._tgBreak) {
        t._tgBreak=true;
        tgSend(`рҹҡЁ <b>${t.symbol} ЩғШіШұ Ш§Щ„ЩҲЩӮЩҒ!</b>\n$${cur.toFixed(2)} | Ш®ШіШ§ШұШ©: ${((cur-t.entry)/t.entry*100).toFixed(2)}%\nШ§Ш®ШұШ¬ ЩҒЩҲШұШ§ЩӢ!`);
      }
    });
  } catch(e){}
}

// в”Җв”Җ ШӯШ§Щ„Ш© Ш§Щ„Щ…ШӯШ§ШҜШ«Ш©
const tgState = {};

// в”Җв”Җ polling Щ…Ш№Ш·Щ„ вҖ” Ш§Щ„ШЁЩҲШӘ ЩҠШ№Щ…Щ„ Ш№Щ„Щү Vercel webhook
// Щ„Ш§ ЩҶШіШӘШ®ШҜЩ… getUpdates Щ…ЩҶ Ш§Щ„Щ…ШӘШөЩҒШӯ Щ„ШӘШ¬ЩҶШЁ 409 Conflict
async function tgPoll() {
  // Щ…Ш№Ш·Щ„ вҖ” Ш§Щ„ШЁЩҲШӘ Ш№Щ„Щү Vercel ЩҠШӘШ№Ш§Щ…Щ„ Щ…Ш№ Ш§Щ„ШұШіШ§ШҰЩ„
}

// в”Җв”Җ Щ…Ш№Ш§Щ„Ш¬ Ш§Щ„ШұШіШ§ШҰЩ„ Ш§Щ„Ш°ЩғЩҠ
async function tgHandle(msg, cid) {
  const s = tgState[cid] || {};
  const low = msg.toLowerCase();

  // в”Җв”Җ ШЈЩ…Шұ Ш§Щ„Ш®ШұЩҲШ¬ Щ…ЩҶ ШіЩҮЩ…
  if(low.startsWith('Ш®ШұШ¬ШӘ') || low.startsWith('ШЁШ№ШӘ')) {
    const sym = msg.split(/\s+/)[1]?.toUpperCase();
    if(sym) {
      try {
        const port = JSON.parse(localStorage.getItem('portfolio')||'[]');
        const t = port.find(x=>x.symbol===sym && !x.closed);
        if(t) {
          const cur = state.prices[sym]?.price || parseFloat(msg.split(/\s+/)[2]||t.target);
          t.closed = true; t.closePrice = cur; t.closeDate = new Date().toISOString();
          const pnl = ((cur-t.entry)/t.entry*100).toFixed(2);
          localStorage.setItem('portfolio', JSON.stringify(port));
          await tgSend(`вң… <b>${sym} Щ…ШәЩ„ЩӮШ©</b>\nШҜШ®ЩҲЩ„: $${t.entry} вҶ’ Ш®ШұЩҲШ¬: $${cur}\n${pnl>0?'ШұШЁШӯ +':'Ш®ШіШ§ШұШ© '}${pnl}%\nШ§Щ„ШіШ¬Щ„ ШӯЩҸШҜЩ‘Ш« рҹ“Ҡ`);
        } else {
          await tgSend(`вҡ пёҸ ${sym} ШәЩҠШұ Щ…ЩҲШ¬ЩҲШҜ ЩҒЩҠ Щ…ШӯЩҒШёШӘЩғ`);
        }
      } catch(e){ await tgSend('вҡ пёҸ Ш®Ш·ШЈ ЩҒЩҠ Ш§Щ„ШӘШіШ¬ЩҠЩ„'); }
      tgState[cid] = {};
      return;
    }
  }

  // в”Җв”Җ Щ…ШӯЩҒШёШӘЩҠ
  if(msg==='Щ…ШӯЩҒШёШӘЩҠ' || msg==='portfolio') {
    try {
      const port = JSON.parse(localStorage.getItem('portfolio')||'[]').filter(t=>!t.closed);
      if(port.length===0) { await tgSend('рҹ“Ӯ Щ…ШӯЩҒШёШӘЩғ ЩҒШ§ШұШәШ©'); return; }
      let m = 'рҹ’ј <b>Щ…ШӯЩҒШёШӘЩғ Ш§Щ„ШўЩҶ:</b>\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n';
      let totalPnl = 0;
      port.forEach(t=>{
        const cur = state.prices[t.symbol]?.price || t.entry;
        const pnl = ((cur-t.entry)/t.entry*100).toFixed(2);
        const icon = pnl>0?'вң…':'вқҢ';
        totalPnl += parseFloat(pnl);
        m += `${icon} <b>${t.symbol}</b> ШҜШ®ЩҲЩ„ $${t.entry} вҶ’ Ш§Щ„ШўЩҶ $${cur?.toFixed(2)} (${pnl>0?'+':''}${pnl}%)\n`;
      });
      m += `в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nШҘШ¬Щ…Ш§Щ„ЩҠ: ${totalPnl>0?'+':''}${(totalPnl/port.length).toFixed(2)}% Щ…ШӘЩҲШіШ·`;
      await tgSend(m);
    } catch(e){ await tgSend('вҡ пёҸ Ш®Ш·ШЈ'); }
    return;
  }

  // в”Җв”Җ ШӘЩӮШұЩҠШұ Ш§Щ„ЩҠЩҲЩ…
  if(msg==='ШӘЩӮШұЩҠШұ' || msg==='Ш§Щ„ЩҠЩҲЩ…') {
    const recs = state.recs || [];
    let m = 'рҹ“Ҡ <b>ШӘЩҲШөЩҠШ§ШӘ Ш§Щ„ЩҠЩҲЩ…:</b>\n';
    if(recs.length===0) m += 'Щ„Ш§ ШӘЩҲШөЩҠШ§ШӘ ШЁШ№ШҜ вҖ” Ш§Щ„ШіЩҲЩӮ Щ…ШәЩ„ЩӮ\n';
    recs.forEach((r,i)=>{ m += `${i+1}. <b>${r.id}</b> ЩҮШҜЩҒ +${fmt(r.profitPct,1)}% | Ш«ЩӮШ© ${r.confidence}%\n`; });
    m += `\nSPY ${(state.spyChange||0)>=0?'+':''}${fmt(state.spyChange||0,2)}%`;
    await tgSend(m);
    return;
  }

  // в”Җв”Җ Ш§ШіШӘШ№Щ„Ш§Щ… Ш№ЩҶ ШіЩҮЩ…
  const sym = msg.toUpperCase().replace(/[^A-Z]/g,'');
  const stockExists = ALL_STOCKS?.find(x=>x.id===sym);
  if(sym.length>=2 && sym.length<=5 && stockExists && !s.step) {
    const ind = state.indicators[sym];
    const p   = state.prices[sym];
    if(!p) { await tgSend(`вҸі ${sym} вҖ” Щ„Щ… ШӘЩҸШӯЩ…ЩҺЩ‘Щ„ ШЁЩҠШ§ЩҶШ§ШӘЩҮ ШЁШ№ШҜ`); return; }
    const hist = ind?.macdHist;
    const rsi  = ind?.rsi;
    const weekly = ind?.weeklyTrend;
    let analysis = `рҹ“Ҡ <b>${stockExists.name} (${sym})</b>\n`;
    analysis += `Ш§Щ„ШіШ№Шұ: <b>$${p.price?.toFixed(2)}</b> ${p.change>=0?'рҹ“Ҳ':'рҹ“ү'} ${p.change>=0?'+':''}${p.change?.toFixed(2)}%\n`;
    analysis += `в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n`;
    if(hist!=null) analysis += `MACD Hist: ${hist>0?'вң…':'вқҢ'} ${hist>0?'+':''}${hist?.toFixed(2)} ${ind?.macdHistDir==='expanding'?'вҶ‘ ЩҠШӘЩҲШіШ№':'вҶ“ ЩҠШ¶ЩҠЩӮ'}\n`;
    if(rsi!=null)  analysis += `RSI: ${rsi<35?'вң…':rsi>70?'вқҢ':'вҡ пёҸ'} ${rsi?.toFixed(1)}\n`;
    if(weekly)     analysis += `ШЈШіШЁЩҲШ№ЩҠ: ${weekly==='bullish'?'вң… ШөШ§Ш№ШҜ':'вқҢ ЩҮШ§ШЁШ·'}\n`;
    analysis += `в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n`;
    analysis += `ЩҮЩ„ Ш§ШҙШӘШұЩҠШӘ ${sym}Шҹ\n1пёҸвғЈ ЩҶШ№Щ… вҖ” ШіШ¬Щ‘Щ„ ШөЩҒЩӮШ©\n2пёҸвғЈ Щ„Ш§ вҖ” Щ…Ш№Щ„ЩҲЩ…Ш§ШӘ ЩҒЩӮШ·`;
    tgState[cid] = { step:'ask_bought', sym, price:p.price };
    await tgSend(analysis);
    return;
  }

  // в”Җв”Җ Ш®Ш·ЩҲШ§ШӘ ШӘШіШ¬ЩҠЩ„ Ш§Щ„ШөЩҒЩӮШ©
  if(s.step==='ask_bought') {
    if(msg==='1' || msg==='ЩҶШ№Щ…') {
      tgState[cid] = { ...s, step:'ask_price' };
      await tgSend(`ШЁЩғЩ… Ш§ШҙШӘШұЩҠШӘ ${s.sym}Шҹ\n(Ш§Ш¶ШәШ· ШҘШұШіШ§Щ„ Щ„Щ„ШіШ№Шұ Ш§Щ„ШӯШ§Щ„ЩҠ $${s.price?.toFixed(2)})`);
    } else {
      tgState[cid] = {};
      await tgSend(`вң… ШӘЩ…Ш§Щ… вҖ” ${s.sym} Щ„Щ„Щ…ШұШ§ЩӮШЁШ© ЩҒЩӮШ·`);
    }
    return;
  }

  if(s.step==='ask_price') {
    const entry = parseFloat(msg) || s.price;
    tgState[cid] = { ...s, step:'ask_qty', entry };
    await tgSend(`ЩғЩ… ШіЩҮЩ… Ш§ШҙШӘШұЩҠШӘ Щ…ЩҶ ${s.sym}Шҹ`);
    return;
  }

  if(s.step==='ask_qty') {
    const qty = parseInt(msg) || 1;
    const ind  = state.indicators[s.sym];
    const atrPct = ind?.atrPct || 3;
    const stop = (s.entry * (1 - atrPct*2/100)).toFixed(2);
    const target = (s.entry * (1 + atrPct*3.5/100)).toFixed(2);
    const profitPct = ((target-s.entry)/s.entry*100).toFixed(1);
    const days = Math.ceil((target-s.entry)/s.entry*100/atrPct);

    // ШӯЩҒШё ЩҒЩҠ Ш§Щ„Щ…ШӯЩҒШёШ©
    try {
      const port = JSON.parse(localStorage.getItem('portfolio')||'[]');
      port.push({ symbol:s.sym, entry:s.entry, qty, stop:parseFloat(stop), target:parseFloat(target), date:new Date().toISOString(), closed:false });
      localStorage.setItem('portfolio', JSON.stringify(port));
    } catch(e){}

    const msg2 = `вң… <b>ШӘЩ… ШӘШіШ¬ЩҠЩ„ ${s.sym}</b>\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nШҜШ®ЩҲЩ„: $${s.entry?.toFixed(2)}\nЩғЩ…ЩҠШ©: ${qty} ШіЩҮЩ…\nШұШЈШі Ш§Щ„Щ…Ш§Щ„: $${(s.entry*qty).toFixed(0)}\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nрҹӣ‘ ЩҲЩӮЩҒ: $${stop} (-${atrPct*2}%)\nрҹҺҜ ЩҮШҜЩҒ: $${target} (+${profitPct}%)\nвҸұпёҸ Щ…ШҜШ© Щ…ШӘЩҲЩӮШ№Ш©: ${days<=1?'рҹ”Ҙ ЩҠЩҲЩ…ЩҠ':days<=3?'вҡЎ '+days+' ШЈЩҠШ§Щ…':'рҹ“… '+days+' ШЈЩҠШ§Щ…'}\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nШіШЈШұШ§ЩӮШЁЩҮ ЩҲШЈЩҶШЁЩҮЩғ рҹ‘Җ`;
    tgState[cid] = {};
    await tgSend(msg2);
    return;
  }

  // в”Җв”Җ Щ…ШіШ§Ш№ШҜШ©
  await tgSend(`рҹҰ… <b>RamiFalconX</b>\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\nШ§ЩғШӘШЁ ШұЩ…ШІ Ш§Щ„ШіЩҮЩ…: <code>NVDA</code>\nЩ…ШӯЩҒШёШӘЩғ: <code>Щ…ШӯЩҒШёШӘЩҠ</code>\nШӘЩӮШұЩҠШұ Ш§Щ„ЩҠЩҲЩ…: <code>ШӘЩӮШұЩҠШұ</code>\nШ®ШұЩҲШ¬ Щ…ЩҶ ШіЩҮЩ…: <code>Ш®ШұШ¬ШӘ ALAB</code>`);
}

// в”Җв”Җ Polling Щ…Ш№Ш·Щ„ вҖ” Ш§Щ„ШЁЩҲШӘ Ш№Щ„Щү Vercel ЩҠШӘШ№Ш§Щ…Щ„ Щ…Ш№ Ш§Щ„ШұШіШ§ШҰЩ„
// setInterval(() => tgPoll(), 3000);
</script>
