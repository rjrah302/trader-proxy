function el(tag, props={}, children=[]) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => {
    if(k==='style' && typeof v==='object') Object.assign(e.style, v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  (Array.isArray(children)?children:[children]).forEach(c => {
    if(c===null||c===undefined||c===false) return;
    e.appendChild(typeof c==='string'||typeof c==='number'
      ? document.createTextNode(c) : c);
  });
  return e;
}

function calcEMA(data, period) {
  if(!data || data.length < period) return null;
  const k = 2/(period+1);
  let val = data.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let j=period; j<data.length; j++) val = data[j]*k + val*(1-k);
  return val;
}

function calcADX(highs, lows, closes, period=14) {
  if(!highs || !lows || !closes) return null;
  if(highs.length < period*2) return null;
  const n = highs.length;
  const trs=[], pdms=[], ndms=[];
  for(let i=1; i<n; i++) {
    const tr  = Math.max(highs[i]-lows[i], Math.abs(highs[i]-closes[i-1]), Math.abs(lows[i]-closes[i-1]));
    const pdm = Math.max(highs[i]-highs[i-1], 0);
    const ndm = Math.max(lows[i-1]-lows[i], 0);
    trs.push(tr);
    pdms.push(pdm > ndm ? pdm : 0);
    ndms.push(ndm > pdm ? ndm : 0);
  }
  const smooth = (arr) => {
    let s = arr.slice(0, period).reduce((a,b)=>a+b,0);
    const out = [s];
    for(let i=period; i<arr.length; i++) { s = s - s/period + arr[i]; out.push(s); }
    return out;
  };
  const sTR = smooth(trs), sPDM = smooth(pdms), sNDM = smooth(ndms);
  const dxArr = [];
  for(let i=0; i<sTR.length; i++) {
    if(sTR[i] === 0) continue;
    const pdi = 100 * sPDM[i] / sTR[i];
    const ndi = 100 * sNDM[i] / sTR[i];
    const dx  = Math.abs(pdi-ndi) / (pdi+ndi) * 100;
    dxArr.push(dx);
  }
  if(dxArr.length < period) return null;
  let adx = dxArr.slice(0, period).reduce((a,b)=>a+b,0) / period;
  for(let i=period; i<dxArr.length; i++) adx = (adx*(period-1) + dxArr[i]) / period;
  return +adx.toFixed(1);
}

  if(neg >= 8 || net <= -6) {

  if(pos >= 2 || net >= 2) {

      score:1, block:false,

async function fetchJsonFast(url, ms=7000) {
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), ms);
  try {
    const res = await fetch(url, {signal:ctrl.signal});
    clearTimeout(timer);
    if(!res.ok) return null;
    return await res.json();
  } catch(e) {
    clearTimeout(timer);
    return null;
  }
}

async function fetchOnePriceTarget(sym) {
  if(!sym || state.priceTargets?.[sym]) return state.priceTargets?.[sym] || null;
  const urls = [
    `${FMP_BASE}/stable/price-target-consensus?symbol=${sym}&apikey=${API_KEY}`,
    `${FMP_BASE}/api/v4/price-target-consensus?symbol=${sym}&apikey=${API_KEY}`,
    `${FMP_BASE}/api/v4/price-target?symbol=${sym}&apikey=${API_KEY}`,
  ];
  for(const url of urls) {
    const data = await fetchJsonFast(url);
    if(Array.isArray(data) && data.length > 1) {
      const targets = data
        .map(x => +(x?.targetConsensus ?? x?.targetPrice ?? x?.priceTarget ?? x?.target ?? 0))
        .filter(x => x > 0)
        .sort((a,b)=>a-b);
      if(targets.length) {
        const avg = targets.reduce((a,b)=>a+b,0) / targets.length;
        const median = targets[Math.floor(targets.length/2)];
        state.priceTargets = state.priceTargets || {};
        state.priceTargets[sym] = {
          consensus: avg,
          high: targets[targets.length-1],
          low: targets[0],
          median,
          analystCount: targets.length,
        };
        return state.priceTargets[sym];
      }
    }
    const d = Array.isArray(data) ? data[0] : data;
    const consensus = +(d?.targetConsensus ?? d?.targetPrice ?? d?.priceTarget ?? d?.target ?? 0);
    if(consensus > 0) {
      state.priceTargets = state.priceTargets || {};
      state.priceTargets[sym] = {
        consensus,
        high:   +(d?.targetHigh ?? d?.high ?? 0) || null,
        low:    +(d?.targetLow ?? d?.low ?? 0) || null,
        median: +(d?.targetMedian ?? d?.median ?? 0) || null,
        analystCount: +(d?.analystCount ?? d?.numberOfAnalysts ?? d?.count ?? 0) || null,
      };
      return state.priceTargets[sym];
    }
  }
  return null;
}

async function fetchOneAnalystRating(sym) {
  if(!sym || state.analystRatings?.[sym]) return state.analystRatings?.[sym] || null;
  const urls = [
    `${FMP_BASE}/stable/ratings-snapshot?symbol=${sym}&apikey=${API_KEY}`,
    `${FMP_BASE}/api/v3/rating/${sym}?apikey=${API_KEY}`,
  ];
  for(const url of urls) {
    const data = await fetchJsonFast(url);
    const d = Array.isArray(data) ? data[0] : data;
    const rating = d?.ratingRecommendation ?? d?.rating ?? d?.ratingDetailsDCFRecommendation ?? null;
    const analysts = +(d?.ratingAnalystCount ?? d?.analystCount ?? d?.numberOfAnalyst ?? d?.numberOfAnalysts ?? 0);
    const score = +(d?.ratingScore ?? d?.score ?? d?.ratingDetailsDCFScore ?? 0) || null;
    if(rating || analysts || score) {

  return null;
}

      const supportedTrend = s.nearSupport || (s.volR || 0) >= 1.8 || s.ignitionReady;
      const limit = s.activeBuy ? 60 : 90;
      return gain30d <= limit || (supportedTrend && !s.tooCloseToResistance);
    })
    // Ø´Ø±Ø· 8: ØªÙˆÙ‚ÙŠØª Ø§Ù„Ø¯Ø®ÙˆÙ„ Ù…Ù‚Ø¨ÙˆÙ„ Ø£Ùˆ Ø§Ù„Ø³Ù‡Ù… ÙÙŠ Ø±Ø§Ø¯Ø§Ø± Ù…Ø¨ÙƒØ± Ù‚Ø±ÙŠØ¨
    .filter(s => s.entryTiming === 'Ø§Ø¯Ø®Ù„ Ø§Ù„Ø¢Ù†' || s.entryTiming === 'Ù…Ù‚Ø¨ÙˆÙ„' || s.conditionalBuy || s.earlyRadar)
    // Ø´Ø±Ø· 8.5: Ù„Ø§ ØªÙˆØµÙŠØ© Ø¥Ø°Ø§ Ø§Ù„Ù…Ø³Ø§ÙØ© Ù„Ù„Ù…Ù‚Ø§ÙˆÙ…Ø© Ø¶ÙŠÙ‚Ø© â€” Ù„Ø§ Ù†Ø·Ø§Ø±Ø¯ Ø§Ù„Ø³Ù‡Ù… Ø¹Ù†Ø¯ Ø§Ù„Ø³Ù‚Ù
    .filter(s => !s.tooCloseToResistance && (s.roomToResistance == null || s.roomToResistance >= Math.max(4, s.minRoomToResistance || 0)))
    // Ø´Ø±Ø· 9: Ø§Ù„Ø³Ø¹Ø± ÙÙˆÙ‚ MA50 Ø¹Ù„Ù‰ Ø§Ù„Ø£Ù‚Ù„
    .filter(s => s.ma50==null || s.price >= s.ma50*0.97)
    // Ø´Ø±Ø· 9.5: Ø§Ù„Ø§ØªØ¬Ø§Ù‡ Ø§Ù„Ù„Ø­Ø¸ÙŠ/Ø§Ù„ÙŠÙˆÙ…ÙŠ Ù„ÙŠØ³ Ø¶Ø¹ÙŠÙÙ‹Ø§ Ø¬Ø¯Ù‹Ø§ Ø¥Ù„Ø§ Ø¥Ø°Ø§ ÙƒØ§Ù† Ø§Ù„Ø³Ù‡Ù… Ø¹Ù†Ø¯ Ø§Ù„Ø¯Ø¹Ù…
    .filter(s => s.nearSupport || s.adx == null || s.adx >= REC_MIN_ENTRY_ADX || (s.macdHist != null && s.macdHist > 0))
    // Ø´Ø±Ø· 9.6: Ø§Ù„Ø®Ø¨Ø± Ø§Ù„Ø³Ù„Ø¨ÙŠ Ø§Ù„Ù‚ÙˆÙŠ ÙŠÙ„ØºÙŠ Ø§Ù„ØªÙˆØµÙŠØ©
    .filter(s => !s.newsImpact?.block && s.newsImpact?.level !== 'neg')
    // Ø´Ø±Ø· 10: âœ… Ø¨ÙŠØ§Ù†Ø§Øª ÙƒØ§ÙÙŠØ© â€” 100 ÙŠÙˆÙ… Ø¹Ù„Ù‰ Ø§Ù„Ø£Ù‚Ù„
    .filter(s => (state.indicators[s.id]?.dataLen || state.indicators[s.id]?.closes?.length || 0) >= 100)
    // Ø´Ø±Ø· 11: Ø³ÙŠÙˆÙ„Ø© ÙƒØ§ÙÙŠØ© â€” 500 Ø£Ù„Ù Ø³Ù‡Ù… ÙŠÙˆÙ…ÙŠØ§Ù‹ Ø¹Ù„Ù‰ Ø§Ù„Ø£Ù‚Ù„
    .filter(s => {

    });

  // ØªØ±ØªÙŠØ¨: Ù‚ÙˆØ© Ã— 0.4 + Ø«Ù‚Ø© Ã— 0.3 + Ø¬ÙˆØ¯Ø© Ã— 0.2 + ØªÙˆÙ‚ÙŠØª Ã— 0.1
  // FIX: conviction = 10 Ø¨Ø¯Ù„ 20 â€” Ù„Ø§ ÙŠØ·ØºÙ‰ Ø¹Ù„Ù‰ Ù‚ÙˆØ© Ø§Ù„Ø³Ù‡Ù… Ø§Ù„Ø­Ù‚ÙŠÙ‚ÙŠØ©
  candidates.sort((a,b) => {
    const timingBonus = (s) =>
      s.entryTiming==='Ø§Ø¯Ø®Ù„ Ø§Ù„Ø¢Ù†' ? 15 :
      s.entryTiming==='Ù…Ù‚Ø¨ÙˆÙ„'     ? 5  : 0;
    const convictionBonus = (s) => s.isConviction ? 10 : 0;
    // âœ… Ù…ÙƒØ§ÙØ£Ø© Ø´Ù…Ø¹Ø© ØµØ§Ø¹Ø¯Ø© Ù‚ÙˆÙŠØ©
    const candleBonus = (s) => {
      if(!s.candlePatterns?.length) return 0;
      const top = s.candlePatterns[0];
      return top.signal==='bullish' ? top.strength*2 : top.signal==='bearish' ? -top.strength*2 : 0;
    };

    const rsBonus = (s) => s.relativeStrength ? Math.max(-10, Math.min(15, s.relativeStrength.score)) : 0;
    const analystBonus = (s) => s.analystView ? Math.max(-8, Math.min(8, s.analystView.bias * 3)) : 0;
    const stageBonus = (s) => s.recStage === 'confirmed' ? 25 : s.recStage === 'conditional' ? 10 : 0;
    const scoreA = a.strength*0.4 + a.confidence*0.3 + a.tradeQuality*0.2
                 + timingBonus(a) + convictionBonus(a) + candleBonus(a) + rsBonus(a) + analystBonus(a) + stageBonus(a);
    const scoreB = b.strength*0.4 + b.confidence*0.3 + b.tradeQuality*0.2
                 + timingBonus(b) + convictionBonus(b) + candleBonus(b) + rsBonus(b) + analystBonus(b) + stageBonus(b);
    return scoreB - scoreA;
  });

  // Ù„Ø§ Ù†Ù…Ù†Ø¹ Ø§Ù„ÙØ±Øµ Ø¨Ø³Ø¨Ø¨ Ø­Ø§Ù„Ø© Ø§Ù„Ø³ÙˆÙ‚Ø› Ø§Ù„Ø³ÙˆÙ‚ ÙŠØ¸Ù‡Ø± ÙƒØªØ­Ø°ÙŠØ± ÙˆØ§Ù„Ø§Ø®ØªÙŠØ§Ø± Ù„Ù„Ù…Ø³ØªØ®Ø¯Ù….
  const maxRecs = 10;

  // Ø§Ù„Ø¬ÙˆÙ„Ø© Ø§Ù„Ø£ÙˆÙ„Ù‰: ØªÙˆØµÙŠØ© ÙˆØ§Ø­Ø¯Ø© Ù„ÙƒÙ„ Ù‚Ø·Ø§Ø¹
  for(const c of candidates) {

      recs.push(c);

  // Ø§Ù„Ø¬ÙˆÙ„Ø© Ø§Ù„Ø«Ø§Ù†ÙŠØ©: Ø£ÙƒÙ…Ù„ Ø¨Ø£Ù‚ÙˆÙ‰ Ø§Ù„Ù…Ø±Ø´Ø­ÙŠÙ† Ø¨Ø¯ÙˆÙ† ØªÙƒØ±Ø§Ø±
  for(const c of candidates) {

  // â•â• ØªØ­Ø¯ÙŠØ« Cooldown â€” Ø³Ù‡Ù… ÙƒØ§Ù† ØªÙˆØµÙŠØ© ÙˆÙ‡Ø¨Ø· -5%
  let cooldownUpdated = false;

      }

  });
  if(cooldownUpdated) {

  state.recs = recs;
  state.recsTime = new Date();

  // âœ… ØªØ³Ø¬ÙŠÙ„ ÙÙŠ Ø§Ù„Ø³Ø¬Ù„ ÙÙ‚Ø· Ø¹Ù†Ø¯ Ø§Ù„Ø³ÙˆÙ‚ Ø§Ù„Ù…ÙØªÙˆØ­ â€” Ù„Ø§ ØªØ³Ø¬ÙŠÙ„ Ù„Ø£Ø³Ø¹Ø§Ø± Ù‚Ø¯ÙŠÙ…Ø©
  if(isMarketOpen()) {

  }

  // Ø¥Ø´Ø¹Ø§Ø± Ø¨Ø§Ù„ØªÙˆØµÙŠØ§Øª Ø§Ù„Ø¬Ø¯ÙŠØ¯Ø©
  if(recs.length > 0) {
    const names = recs.slice(0,3).map(r=>r.id).join('ØŒ ');
    sendNotification('ðŸŽ¯ Rami Falcon X', recs.length+' ØªÙˆØµÙŠØ§Øª Ø¬Ø¯ÙŠØ¯Ø©: '+names);

  // Ø­ÙØ¸ Ø§Ù„ØªÙˆØµÙŠØ§Øª â€” s1_recs ÙŠÙØ­ÙØ¸ Ù…Ø±Ø© ÙˆØ§Ø­Ø¯Ø© ÙÙ‚Ø· Ø¹Ù†Ø¯ Ø§Ù„Ø§ÙØªØªØ§Ø­
  // Ù„Ø§ Ù†ÙƒØªØ¨ ÙÙˆÙ‚Ù‡ Ù‡Ù†Ø§ Ù„Ø£Ù† Ù…Ù†ØªØµÙ Ø§Ù„ÙŠÙˆÙ… ÙŠØ­ØªØ§Ø¬Ù‡ Ù„Ù„Ù…Ù‚Ø§Ø±Ù†Ø©
  try {
    // s1_recs ÙŠÙØ­ÙØ¸ ÙÙ‚Ø· Ø¥Ø°Ø§ Ù„Ù… ÙŠÙƒÙ† Ù…Ø­ÙÙˆØ¸Ø§Ù‹ Ù…Ù† Ù‚Ø¨Ù„ Ø§Ù„ÙŠÙˆÙ… (Ø§Ù„Ø¬Ù„Ø³Ø© Ø§Ù„Ø£ÙˆÙ„Ù‰)
    const existingDate = localStorage.getItem('recs_date');
    const today        = new Date().toDateString();

    if(isFirstRec) {

    localStorage.setItem('recs_midday', 'false');
  } catch(e) {}

  return recs;
}

function calcSpeculative() {

      if(dataQuality < 35) { specDebug.rejected.data++; return null; }

      // â•â• Ø­Ø³Ø§Ø¨ Ø§Ù„Ù†Ù‚Ø§Ø· â€” ÙÙƒØ±Ø©: Ø§Ù„Ø±Ø¨Ø­ Ø§Ù„Ù…Ø­ØªÙ…Ù„ vs Ø§Ù„Ø®Ø³Ø§Ø±Ø© Ø§Ù„Ù…Ø­Ø¯ÙˆØ¯Ø©
      let score = 0;

      if(atrPct >= 6)       { score+=24; reasons.push('ATR '+fmt(atrPct,1)+'% â€” Ù‚Ø§Ø¨Ù„ÙŠØ© Ø§Ù†ÙØ¬Ø§Ø± Ø¹Ø§Ù„ÙŠØ©'); }

      if(beta>=2.5)         { score+=20; reasons.push('Beta '+fmt(beta,1)+' â€” ÙŠØªØ­Ø±Ùƒ Ø¶Ø¹Ù Ø§Ù„Ø³ÙˆÙ‚'); }
      else if(beta>=2.0)    { score+=14; reasons.push('Beta '+fmt(beta,1)+' â€” ØªÙ‚Ù„Ø¨ Ø¬ÙŠØ¯ Ù„Ù„Ù…Ø¬Ø§Ø²ÙØ©'); }
      else if(beta>=1.7)    { score+=8; }

      // â”€â”€ 3. Ø§Ù„Ø§ØªØ¬Ø§Ù‡ â€” Ù„Ø§ Ù†Ø±ÙŠØ¯ Ù‡Ø¨ÙˆØ·Ø§Ù‹ Ø­Ø±Ø§Ù‹
      // Ù†Ø±ÙŠØ¯: Ø¥Ù…Ø§ ØµØ§Ø¹Ø¯ØŒ Ø£Ùˆ Ø§Ø±ØªØ¯Ø§Ø¯ Ù…Ù† Ù‚Ø§Ø¹
      const trendUp   = ind.ma20!=null && ind.ma50!=null && ind.ma20 > ind.ma50;

        } else if(hist < 0 && histDir === 'crossing') {

        if(ind.macd>0) { score+=12; reasons.push('MACD ØµØ§Ø¹Ø¯ â€” Ø²Ø®Ù… Ø´Ø±Ø§Ø¡ Ù‚ØµÙŠØ± Ø§Ù„Ù…Ø¯Ù‰'); }

      // â”€â”€ Ø£Ø³Ø¨ÙˆØ¹ÙŠ â€” Ù„Ø§ Ù…Ø¬Ø§Ø²ÙØ© ÙÙŠ Ù‡Ø¨ÙˆØ· Ø£Ø³Ø¨ÙˆØ¹ÙŠ Ø­Ø§Ø¯
      if(ind.weeklyTrend === 'bearish' && ind.weeklyMacdHist!=null && ind.weeklyMacdHist < -1) {

      } else if(ind.weeklyTrend === 'bullish') {

        reasons.push('Ø£Ø³Ø¨ÙˆØ¹ÙŠ ØµØ§Ø¹Ø¯ â€” Ø§Ù„Ø§ØªØ¬Ø§Ù‡ Ø§Ù„ÙƒØ¨ÙŠØ± ÙÙŠ ØµØ§Ù„Ø­Ùƒ');
      }

      // â”€â”€ 5. Ø­Ø¬Ù… Ø§Ù„ØªØ¯Ø§ÙˆÙ„ â€” Ø§Ù‡ØªÙ…Ø§Ù… Ø­Ù‚ÙŠÙ‚ÙŠ
      if(volR>=3)       { score+=20; reasons.push('Ø­Ø¬Ù… Ã—'+fmt(volR,1)+' â€” Ø§Ø´ØªØ¹Ø§Ù„ Ø³ÙŠÙˆÙ„Ø©'); }
      else if(volR>=2)  { score+=14; reasons.push('Ø­Ø¬Ù… Ã—'+fmt(volR,1)+' â€” Ù†Ø´Ø§Ø· Ù…Ø±ØªÙØ¹'); }

      // â”€â”€ 6. Ø´Ù…ÙˆØ¹ â€” ØªØ£ÙƒÙŠØ¯ Ø¨ØµØ±ÙŠ (Ø§Ù„Ù…Ø·Ø±Ù‚Ø© ÙˆØ§Ù„Ø§Ø¨ØªÙ„Ø§Ø¹ Ù…Ø¶Ø§Ø¹ÙØ© ÙÙŠ Ø§Ù„Ù…Ø¬Ø§Ø²ÙØ©)
      const candles = detectCandlePatterns(ind.closes, ind.highs, ind.lows, ind.opens);
      const topCandle = candles[0] || null;

          const isBest = cp.name==='Hammer' || cp.name==='Bullish Engulfing' || cp.name==='Morning Star' || cp.name==='Dragonfly Doji';
          score += cw * (isBest ? 6 : 4);

      // â”€â”€ 7. Ø¹Ù‚ÙˆØ¨Ø§Øª
      if(earnDays<=14)      { score-=8;  warnings.push('Ø£Ø±Ø¨Ø§Ø­ Ø®Ù„Ø§Ù„ '+earnDays+' ÙŠÙˆÙ… â€” ØªÙ‚Ù„Ø¨ Ù…Ø±ØªÙ‚Ø¨'); }
      if(newsImpact.level === 'neg') { score-=10; warnings.push('Ø®Ø¨Ø± Ø³Ù„Ø¨ÙŠ Ù…Ø¤Ø«Ø± â€” Ø§Ù†ØªØ¸Ø± Ù‡Ø¯ÙˆØ¡ Ø§Ù„Ø®Ø¨Ø±'); }
      if(newsImpact.level === 'strongPos' && volR>=1.2) { score+=8; reasons.push('Ø®Ø¨Ø± Ø¥ÙŠØ¬Ø§Ø¨ÙŠ Ù‚ÙˆÙŠ Ù…Ø¹ Ø­Ø¬Ù… Ø¯Ø§Ø¹Ù…'); }

      if(change>18 && !ind.nearSupport) { score-=12; warnings.push('Ø§Ø±ØªÙØ¹ '+fmt(change,1)+'% â€” Ù„Ø§ ØªØ·Ø§Ø±Ø¯ Ø¨Ø¯ÙˆÙ† Pullback'); }
      else if(change>8 && volR>=1.8)    { score+=6; reasons.push('Ø§Ù†Ø¯ÙØ§Ø¹ ÙŠÙˆÙ…ÙŠ Ù…Ø¹ Ø­Ø¬Ù… â€” Ù…Ø¬Ø§Ø²ÙØ© Ø§Ø´ØªØ¹Ø§Ù„'); }
      else if(change>12)                { score-=6; warnings.push('Ø§Ø±ØªÙØ¹ '+fmt(change,1)+'% Ø§Ù„ÙŠÙˆÙ… â€” Ø±Ø§Ù‚Ø¨ Ø§Ù„ØªØ±Ø§Ø¬Ø¹'); }
      if(ind.rsi!=null && ind.rsi>78) { score-=10; warnings.push('RSI Ù…Ø±ØªÙØ¹ '+fmt(ind.rsi)+'% â€” ØªØ´Ø¨Ø¹ Ø´Ø±Ø§Ø¡'); }
      if(tooCloseToResistance) { score-=15; warnings.push('Ù‚Ø±ÙŠØ¨ Ù…Ù† Ø§Ù„Ù…Ù‚Ø§ÙˆÙ…Ø© â€” Ù…Ø³Ø§Ø­Ø© '+fmt(roomToResistance,1)+'% ÙÙ‚Ø·'); }

      score = Math.max(0, score);
      if(score < 22) { specDebug.rejected.score++; return null; }

      // â•â• Ø­Ø³Ø§Ø¨ ÙˆÙ‚Ù Ø§Ù„Ø®Ø³Ø§Ø±Ø© ÙˆØ§Ù„Ù‡Ø¯Ù â€” Ø§Ù„Ø£Ù‡Ù… ÙÙŠ Ø§Ù„Ù…Ø¬Ø§Ø²ÙØ©
      // ÙˆÙ‚Ù Ø§Ù„Ø®Ø³Ø§Ø±Ø©: Ø£Ø³ÙÙ„ Ø§Ù„Ø¯Ø¹Ù… Ù…Ø¨Ø§Ø´Ø±Ø© Ø£Ùˆ 2Ã—ATR
      const atrStop  = atrPct * 1.5; // Ù…Ø¶Ø¨ÙˆØ· Ù„Ù„Ù…Ø¬Ø§Ø²ÙØ© â€” Ø®Ø³Ø§Ø±Ø© Ù…Ø­Ø¯ÙˆØ¯Ø©
      const rawStop  = ind.support && ind.support < price
        ? Math.min(ind.support * 0.985, price*(1-atrStop/100))  // Ø£Ø³ÙÙ„ Ø§Ù„Ø¯Ø¹Ù… Ø¨Ù€ 1.5%
        : price*(1-atrStop/100);
      const stopLoss = Math.max(rawStop, price*0.65); // Ø­Ø¯ Ø£Ù‚ØµÙ‰ -35%
      const lossPct  = (price-stopLoss)/price*100;

      // Ø§Ù„Ù‡Ø¯Ù: Ù…Ø´ØªÙ‚ Ù…Ù† Ø¨Ù†ÙŠØ© Ø§Ù„Ø³ÙˆÙ‚ Ø§Ù„Ø­Ù‚ÙŠÙ‚ÙŠØ© Ù„Ø§ Ù…Ù† Ø¶Ø±Ø¨ Ø§Ù„ÙˆÙ‚Ù
      // 1. Ø§Ù„Ù…Ù‚Ø§ÙˆÙ…Ø© Ø§Ù„Ù…Ø¤ÙƒØ¯Ø© (Ø£ÙˆÙ„ÙˆÙŠØ© Ù‚ØµÙˆÙ‰)
      const resValidSpec = ind.resistance && ind.resistance > price*1.05;
      // 2. Ø§Ù…ØªØ¯Ø§Ø¯ ATR Ã— 2.5 Ø¶Ù…Ù† Ø£ÙÙ‚ 3-5 Ø£ÙŠØ§Ù… (ÙˆØ§Ù‚Ø¹ÙŠ Ù„Ù„Ù…Ø¬Ø§Ø²ÙØ©)
      const atrExtTarget = price * (1 + (ind.atrPct||3) * 2.5 / 100);
      // 3. Ø§Ù„Ø­Ø¯ Ø§Ù„Ø£Ø¯Ù†Ù‰ Ø§Ù„Ù…Ù‚Ø¨ÙˆÙ„: 1.6:1 Ù„Ù„Ù…Ø±Ø§Ù‚Ø¨Ø©ØŒ 2.2:1 Ù„Ù„Ø¯Ø®ÙˆÙ„ Ø§Ù„Ù‚ÙˆÙŠ
      const minRRTarget  = price * (1 + lossPct*1.6/100);

      // Ù†Ø®ØªØ§Ø± Ø§Ù„Ù‡Ø¯Ù: Ø§Ù„Ù…Ù‚Ø§ÙˆÙ…Ø© Ø¥Ø°Ø§ ÙƒØ§Ù†Øª Ø£Ø¹Ù„Ù‰ Ù…Ù† Ø§Ù„Ø­Ø¯ Ø§Ù„Ø£Ø¯Ù†Ù‰ØŒ ÙˆØ¥Ù„Ø§ ATR extension
      let target;
      if(resValidSpec && ind.resistance > minRRTarget) {
        target = ind.resistance; // Ù‡Ø¯Ù Ø­Ù‚ÙŠÙ‚ÙŠ Ù…Ù† Ø§Ù„Ù…Ù‚Ø§ÙˆÙ…Ø©
      } else if(atrExtTarget > minRRTarget) {
        target = atrExtTarget;   // Ù‡Ø¯Ù Ù…Ù† ATR ÙˆØ§Ù‚Ø¹ÙŠ
      } else {
        specDebug.rejected.target++;
        return null; // Ù„Ø§ ÙŠÙˆØ¬Ø¯ Ù‡Ø¯Ù Ø­Ù‚ÙŠÙ‚ÙŠ â€” Ù†Ø±ÙØ¶ Ø§Ù„Ø³Ù‡Ù…
      }

      // Ø¥Ø°Ø§ Ø§Ù„Ù…Ù‚Ø§ÙˆÙ…Ø© Ø¨ÙŠÙ† Ø§Ù„Ø³Ø¹Ø± ÙˆØ§Ù„Ù‡Ø¯Ù â€” Ù„Ø§ Ù†ØªØ¬Ø§ÙˆØ²Ù‡Ø§ Ø¨Ø¯ÙˆÙ† ÙƒØ³Ø± Ù…Ø¤ÙƒØ¯
      if(!resValidSpec && ind.resistance && ind.resistance > price && ind.resistance < target) {
        target = ind.resistance * 0.97; // Ù†Ù‚Ù Ù‚Ø¨Ù„ Ø§Ù„Ù…Ù‚Ø§ÙˆÙ…Ø© Ø¨Ù‡Ø§Ù…Ø´ Ø£Ù…Ø§Ù†
      }

      const profitPct  = (target-price)/price*100;
      const riskReward = lossPct>0 ? profitPct/lossPct : 0;

      // Ø±ÙØ¶ ÙÙ‚Ø· Ø¥Ø°Ø§ R/R Ø¶Ø¹ÙŠÙ Ø¬Ø¯Ø§Ù‹ØŒ Ø£Ù…Ø§ 1.0-1.7 ÙØªØ¸Ù‡Ø± ÙƒÙ…Ø±Ø§Ù‚Ø¨Ø© Ù„Ø§ ÙƒØ¯Ø®ÙˆÙ„
      if(riskReward < 0.9) { specDebug.rejected.rr++; return null; }

      // â•â• ØªÙˆÙ‚ÙŠØª Ø§Ù„Ø¯Ø®ÙˆÙ„
      const distToSup = ind.support>0 ? (price-ind.support)/price*100 : 999;
      let entryTiming, entryNote;
      if(ind.nearSupport) {
        entryTiming = 'Ø§Ø¯Ø®Ù„ Ø§Ù„Ø¢Ù†';
        entryNote   = 'Ø§Ù„Ø³Ø¹Ø± Ø¹Ù†Ø¯ Ø§Ù„Ø¯Ø¹Ù… $'+fmt(ind.support,2)+' â€” Ø£ÙØ¶Ù„ Ù†Ù‚Ø·Ø© Ø¯Ø®ÙˆÙ„';
      } else if(distToSup<=8) {
        entryTiming = 'Ù…Ù‚Ø¨ÙˆÙ„';
        entryNote   = 'Ù‚Ø±ÙŠØ¨ Ù…Ù† Ø§Ù„Ø¯Ø¹Ù… â€” ÙŠÙ…ÙƒÙ† Ø§Ù„Ø¯Ø®ÙˆÙ„ Ø£Ùˆ Ø§Ù†ØªØ¸Ø§Ø± $'+fmt(ind.support,2);
      } else if(distToSup<=18) {
        entryTiming = 'Ø§Ù†ØªØ¸Ø±';
        entryNote   = 'Ø§Ù†ØªØ¸Ø± ØªØ±Ø§Ø¬Ø¹Ø§Ù‹ Ù†Ø­Ùˆ $'+fmt(ind.support,2)+' Ù„Ù„Ø¯Ø®ÙˆÙ„ Ø¨Ø£Ù…Ø§Ù†';
      } else {
        entryTiming = 'Ù…ØªØ£Ø®Ø±';
        entryNote   = 'Ø¨Ø¹ÙŠØ¯ Ø¹Ù† Ø§Ù„Ø¯Ø¹Ù… â€” Ø§Ù„Ø¯Ø®ÙˆÙ„ Ù…Ø­ÙÙˆÙ Ø¨Ø§Ù„Ù…Ø®Ø§Ø·Ø±';
      }

      const isWatch = tooCloseToResistance || score < 45 || riskReward < 1.45 || entryTiming === 'Ø§Ù†ØªØ¸Ø±' || entryTiming === 'Ù…ØªØ£Ø®Ø±';
      const label = isWatch ? 'ðŸ‘€ Ù…Ø±Ø§Ù‚Ø¨Ø© Ù…Ø¬Ø§Ø²ÙØ©' :
        score>=80 ? 'ðŸš€ Ø§Ù†ÙØ¬Ø§Ø± Ù…Ø­ØªÙ…Ù„' :
        score>=65 ? 'ðŸ”¥ Ø²Ø®Ù… Ù‚ÙˆÙŠ'      :
        score>=50 ? 'âš¡ ÙØ±ØµØ© Ù†Ø´Ø·Ø©'    :
                    'ðŸŽ² Ù…Ø¬Ø§Ø²ÙØ©';

      // ØªØ®ØµÙŠØµ Ø±Ø£Ø³ Ø§Ù„Ù…Ø§Ù„: 5-10% Ø­Ø³Ø¨ Ø§Ù„Ø¬ÙˆØ¯Ø©
      const allocPct = isWatch ? 0 : score>=70 ? 0.10 : score>=55 ? 0.07 : 0.05;
      if(isWatch) specDebug.watch++;

      return {
        ...s, price, change, volR, beta, atrPct,
        score, label, reasons, warnings, isWatch,
        rsi:ind.rsi, macd:ind.macd,
        macdHist:ind.macdHist, macdHistDir:ind.macdHistDir,
        weeklyTrend:ind.weeklyTrend,
        ma20:ind.ma20, ma50:ind.ma50, ma200:ind.ma200,
        support:ind.support, resistance:ind.resistance,
        newsImpact,
        roomToResistance, minRoomToResistance, tooCloseToResistance,
        nearSupport:ind.nearSupport,
        stopLoss, target, profitPct, lossPct, riskReward,
        allocPct, entryTiming, entryNote,
        earnDays, topCandle,
      };
    })
    .filter(Boolean)
    .sort((a,b) => {
      // ØªØ±ØªÙŠØ¨: R/R Ø£ÙˆÙ„Ø§Ù‹ Ã— score
      const valA = Math.min(a.riskReward, 4) * 18 + a.score * 0.35;
      const valB = Math.min(b.riskReward, 4) * 18 + b.score * 0.35;
      return valB - valA;
    })
    .slice(0, 10);

  state.speculativeRecs = candidates;
  specDebug.kept = candidates.length;
  state.specDebug = specDebug;
  state.specTime = new Date();

}

// â”€â”€ Ø¬Ù„Ø¨ Ø¨ÙŠØ§Ù†Ø§Øª 5 Ø¯Ù‚Ø§Ø¦Ù‚ ÙˆØ­Ø³Ø§Ø¨ VWAP + EMA + Higher Low + RVOL
async function fetchHunterData(sym) {
  try {
    const url = `${FMP_BASE}/stable/historical-chart/5min?symbol=${sym}&apikey=${API_KEY}`;
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 8000);
    const res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(timer);
    if (!res.ok) return null;
    const data = await res.json();
    if (!Array.isArray(data) || data.length < 6) return null;

    // Ø´Ù…ÙˆØ¹ Ø§Ù„ÙŠÙˆÙ… ÙÙ‚Ø· â€” Ù†Ø³ØªØ®Ø¯Ù… ØªÙˆÙ‚ÙŠØª Ù†ÙŠÙˆÙŠÙˆØ±Ùƒ (Ø§Ù„Ø³ÙˆÙ‚ Ø§Ù„Ø£Ù…Ø±ÙŠÙƒÙŠ)
    const nyDate = new Date().toLocaleDateString('en-CA', {timeZone:'America/New_York'});
    const bars = data.filter(b => b.date && b.date.startsWith(nyDate)).reverse();
    if (bars.length < 6) return null;

    const closes = bars.map(b => +b.close);
    const highs  = bars.map(b => +b.high);
    const lows   = bars.map(b => +b.low);
    const vols   = bars.map(b => +b.volume || 0);

    // â”€â”€ VWAP
    let sumPV = 0, sumV = 0;
    bars.forEach(b => {
      const tp = ((+b.high) + (+b.low) + (+b.close)) / 3;
      const v  = +b.volume || 0;
      sumPV += tp * v; sumV += v;
    });
    const vwap = sumV > 0 ? sumPV / sumV : null;

    // â”€â”€ EMA9 Ùˆ EMA21 Ø¹Ù„Ù‰ Ø§Ù„Ø¥ØºÙ„Ø§Ù‚Ø§Øª
    const calcEMALocal = (arr, period) => {
      if (arr.length < period) return null;
      const k = 2 / (period + 1);
      let ema = arr.slice(0, period).reduce((a, b) => a + b, 0) / period;
      for (let i = period; i < arr.length; i++) ema = arr[i] * k + ema * (1 - k);
      return ema;
    };
    const ema9  = calcEMALocal(closes, 9);
    const ema21 = calcEMALocal(closes, 21);

    // â”€â”€ Higher Low: Ø¢Ø®Ø± Ù‚Ø§Ø¹ÙŠÙ† Ù…Ø­Ù„ÙŠÙŠÙ†
    let higherLow = false;
    const localLows = [];
    for (let i = 1; i < lows.length - 1; i++) {
      if (lows[i] < lows[i-1] && lows[i] < lows[i+1]) localLows.push(lows[i]);
    }
    if (localLows.length >= 2) {
      higherLow = localLows[localLows.length-1] > localLows[localLows.length-2];
    }

    // â”€â”€ Ø§Ø®ØªØ±Ø§Ù‚ Ù‚Ù…Ø© Ø¢Ø®Ø± 15 Ø¯Ù‚ÙŠÙ‚Ø© (3 Ø´Ù…ÙˆØ¹)
    const last3Highs = highs.slice(-4, -1);
    const breakout15 = last3Highs.length >= 3 &&
      closes[closes.length-1] > Math.max(...last3Highs);

    // â”€â”€ RVOL Ø­Ø³Ø¨ ÙˆÙ‚Øª Ø§Ù„Ø¬Ù„Ø³Ø©
    const avgVol = state.prices[sym]?.avgVolume || 0;
    const todayVol = vols.reduce((a, b) => a + b, 0);
    const sessionBars = 78; // Ø¹Ø¯Ø¯ Ø´Ù…ÙˆØ¹ 5 Ø¯Ù‚Ø§Ø¦Ù‚ ÙÙŠ ÙŠÙˆÙ… ÙƒØ§Ù…Ù„
    const expectedVol = avgVol > 0 ? avgVol * (bars.length / sessionBars) : 0;
    const rvol = expectedVol > 0 ? todayVol / expectedVol : 0;

    // â”€â”€ Ø§Ù„Ù‚ÙˆØ© Ø§Ù„Ù†Ø³Ø¨ÙŠØ© vs SPY (30 Ø¯Ù‚ÙŠÙ‚Ø© = 6 Ø´Ù…ÙˆØ¹)
    const last6 = closes.slice(-6);
    const stockReturn30 = last6.length >= 2
      ? (last6[last6.length-1] - last6[0]) / last6[0] * 100 : 0;
    const rs30 = stockReturn30 - (state.spyChange || 0);

    // â”€â”€ MACD Histogram Ø¹Ù„Ù‰ 5 Ø¯Ù‚Ø§Ø¦Ù‚
    const macd5Hist = ema9 != null && ema21 != null ? ema9 - ema21 : null;

    // â”€â”€ Ø§Ù„Ø³Ø¹Ø± Ø§Ù„Ø­Ø§Ù„ÙŠ vs VWAP
    const currentPrice = closes[closes.length-1];
    const aboveVwap = vwap && currentPrice > vwap;

    return {
      vwap, ema9, ema21, higherLow, breakout15,
      rvol, rs30, stockReturn30, macd5Hist,
      aboveVwap, currentPrice, bars
    };
  } catch(e) { return null; }
}

// â”€â”€ Ø­Ø³Ø§Ø¨ HunterScore Ù„Ø³Ù‡Ù… ÙˆØ§Ø­Ø¯
async function calcHunterScore(stock) {
  const p   = state.prices[stock.id];
  const ind = state.indicators[stock.id];
  // Gainers Ø®Ø§Ø±Ø¬ Ù‚Ø§Ø¦Ù…ØªÙ†Ø§ Ù„ÙŠØ³ Ù„Ù‡Ù… ind â€” Ù†Ø³Ù…Ø­ Ù„Ù‡Ù… Ø¨Ø§Ù„Ù…Ø±ÙˆØ± Ø¨Ø¯Ø±Ø¬Ø© Ø£Ø³Ø§Ø³ÙŠØ©
  if (!p?.price) return null;
  if (!ind && !stock.isGainer) return null; // ØºÙŠØ± Gainer Ø¨Ø¯ÙˆÙ† ind = Ù…Ø±ÙÙˆØ¶

  const price = p.price;
  const newsImpact = getNewsImpact(stock.id);
  const rsi       = ind?.rsi       ?? null;
  const stochRsi  = ind?.stochRsi  ?? null;
  const bb_lower  = ind?.bb_lower  ?? null;
  const support   = ind?.support   ?? null;
  const resistance = ind?.resistance ?? null;

  const macdHistDir = ind?.macdHistDir ?? null;
  const atrPct    = ind?.atrPct    ?? 3;

  const intra = await fetchHunterData(stock.id);

  let score = 0;
  const checks = {};

  // â•â• Ø§Ù„Ù…Ø­ÙˆØ± 1: Ø¥Ù†Ù‡Ø§Ùƒ Ø§Ù„Ø¨ÙŠØ¹ (25 Ù†Ù‚Ø·Ø©)
  // RSI < 30 Ø«Ù… Ø¨Ø¯Ø£ ÙŠØ±ØªÙØ¹
  const rsiExhaust = rsi != null && rsi < 30;
  checks.rsiExhaust = rsiExhaust;
  if (rsiExhaust) score += 7;

  // Stoch RSI ÙŠØ¹Ø¨Ø± Ù„Ù„Ø£Ø¹Ù„Ù‰ ØªØ­Øª 20
  const stochCross = stochRsi != null && stochRsi < 20;
  checks.stochCross = stochCross;
  if (stochCross) score += 5;

  // Ø§Ù„Ø³Ø¹Ø± Ø®Ø±Ø¬ ØªØ­Øª BB Ø«Ù… Ø¹Ø§Ø¯ Ø¯Ø§Ø®Ù„Ù‡
  const bbReversal = bb_lower != null && price > bb_lower * 0.99 && price <= bb_lower * 1.02;
  checks.bbReversal = bbReversal;
  if (bbReversal) score += 5;

  // RVOL >= 2
  const rvolOk = intra && intra.rvol >= 2;
  checks.rvolOk = rvolOk;
  if (rvolOk) score += 4;

  // Ø§Ù„Ø³Ø¹Ø± Ø¹Ù†Ø¯ Ø¯Ø¹Ù… Ù…ÙˆØ«ÙˆÙ‚ Ø¶Ù…Ù† ATR ÙˆØ§Ø­Ø¯
  const atrVal = atrPct || 3;
  const nearSup = support && Math.abs(price - support) / price * 100 <= atrVal;
  checks.nearSup = nearSup;
  if (nearSup) score += 4;
  const roomToResistance = resistance && resistance > price ? (resistance - price) / price * 100 : 999;
  const tooCloseToResistance = resistance && roomToResistance < Math.max(2.5, atrVal * 0.7);
  checks.tooCloseToResistance = tooCloseToResistance;

  // â•â• Ø§Ù„Ù…Ø­ÙˆØ± 2: ØªØ£ÙƒÙŠØ¯ Ø§Ù„Ø§Ø±ØªØ¯Ø§Ø¯ (35 Ù†Ù‚Ø·Ø©)
  // Ø§Ø³ØªØ¹Ø§Ø¯Ø© VWAP
  const aboveVwap = intra?.aboveVwap || false;
  checks.aboveVwap = aboveVwap;
  if (aboveVwap) score += 8;

  // EMA9 > EMA21 Ø¹Ù„Ù‰ 5 Ø¯Ù‚Ø§Ø¦Ù‚
  const emaOk = intra?.ema9 != null && intra?.ema21 != null && intra.ema9 > intra.ema21;
  checks.emaOk = emaOk;
  if (emaOk) score += 6;

  // Higher Low Ø¹Ù„Ù‰ Ø´Ù…ÙˆØ¹ 5 Ø¯Ù‚Ø§Ø¦Ù‚
  checks.higherLow = intra?.higherLow || false;
  if (checks.higherLow) score += 7;

  // Ø§Ø®ØªØ±Ø§Ù‚ Ù‚Ù…Ø© Ø¢Ø®Ø± 15 Ø¯Ù‚ÙŠÙ‚Ø©
  checks.breakout15 = intra?.breakout15 || false;
  if (checks.breakout15) score += 7;

  // MACD Histogram 5 Ø¯Ù‚Ø§Ø¦Ù‚ Ù…ÙˆØ¬Ø¨
  const macd5Ok = intra?.macd5Hist != null && intra.macd5Hist > 0;
  checks.macd5Ok = macd5Ok;
  if (macd5Ok) score += 5;

  // MACD Ø§Ù„ÙŠÙˆÙ…ÙŠ ÙŠØªØ­Ø³Ù† (contracting Ø³Ø§Ù„Ø¨ Ø£Ùˆ expanding Ù…ÙˆØ¬Ø¨ Ø£Ùˆ crossing)
  const macdDayOk = macdHist != null && (
    (macdHist > 0) ||
    (macdHist < 0 && macdHistDir === 'contracting') ||
    (macdHistDir === 'crossing')
  );
  checks.macdDayOk = macdDayOk;
  if (macdDayOk) score += 2;

  // â•â• Ø§Ù„Ù…Ø­ÙˆØ± 3: Ø§Ù„Ù‚ÙˆØ© Ø§Ù„Ù†Ø³Ø¨ÙŠØ© vs SPY (20 Ù†Ù‚Ø·Ø©)
  const rs30 = intra?.rs30 || 0;
  const stockRet = intra?.stockReturn30 || 0;
  let rsScore = 0;
  if (rs30 >= 2)       rsScore += 10;
  else if (rs30 >= 1)  rsScore += 7;
  else if (rs30 > 0)   rsScore += 4;
  // Ø§Ù„Ø³Ù‡Ù… Ø£Ø®Ø¶Ø± ÙˆØ§Ù„Ø³ÙˆÙ‚ Ø£Ø­Ù…Ø±
  if (stockRet > 0 && (state.spyChange || 0) < 0) rsScore += 6;
  // Ø§Ù„Ø³Ù‡Ù… ÙŠØ­Ø§ÙØ¸ Ø¹Ù„Ù‰ Ù‚Ø§Ø¹Ù‡ ÙˆØ§Ù„Ø³ÙˆÙ‚ ÙŠØµÙ†Ø¹ Ù‚ÙŠØ¹Ø§Ù†Ø§Ù‹ Ø¬Ø¯ÙŠØ¯Ø©
  if (checks.higherLow && state.marketTrend === 'bearish') rsScore += 4;
  checks.rsScore = Math.min(rsScore, 20);
  score += checks.rsScore;

  // â•â• Ø§Ù„Ù…Ø­ÙˆØ± 4: Ø§Ù„Ø­Ø¬Ù… ÙˆØ§Ù„Ø³ÙŠÙˆÙ„Ø© (10 Ù†Ù‚Ø§Ø·)
  // RVOL Ù…Ø¹ Ø§Ø®ØªØ±Ø§Ù‚ = ØªØ£ÙƒÙŠØ¯ Ø£Ù‚ÙˆÙ‰ (Ù„Ø§ ØªÙƒØ±Ø§Ø± â€” Ø§Ù„Ù…Ø­ÙˆØ± 1 ÙŠØ­Ø³Ø¨ RVOL ÙˆØ­Ø¯Ù‡)
  if (checks.breakout15 && intra?.rvol >= 1.5) score += 5; // Ø§Ø®ØªØ±Ø§Ù‚ Ø¨Ø­Ø¬Ù…
  else if (rvolOk) score += 3; // Ø­Ø¬Ù… Ù…Ø±ØªÙØ¹ Ø¨Ø¯ÙˆÙ† Ø§Ø®ØªØ±Ø§Ù‚
  if (p.avgVolume > 500000) score += 3; // Ø³ÙŠÙˆÙ„Ø© ÙƒØ§ÙÙŠØ© Ù„Ù„ØªÙ†ÙÙŠØ°
  if (p.avgVolume > 2000000) score += 2; // Ø³ÙŠÙˆÙ„Ø© Ù…Ù…ØªØ§Ø²Ø©

  // â•â• Ù…ÙƒØ§ÙØ£Ø© Ø®Ø§ØµØ© Ù„Ù„Ø³ÙˆÙ‚ Ø§Ù„Ù‡Ø§Ø¨Ø· â€” Ø£Ø³Ù‡Ù… ØªÙ‚Ø§ÙˆÙ… Ø§Ù„Ù‡Ø¨ÙˆØ·
  if (state.marketTrend === 'bearish') {

function buildHunterRadar(existingIds=new Set(), limit=6) {
  const rows = [];
  for (const stock of ALL_STOCKS) {
    if (existingIds.has(stock.id)) continue;
    const p = state.prices[stock.id];
    const ind = state.indicators[stock.id];
    if (!p?.price || !ind) continue;

    const price = p.price;
    const atrPct = ind.atrPct || 3;
    const support = ind.support || null;
    const resistance = ind.resistance || null;
    const nearSup = support && Math.abs(price - support) / price * 100 <= atrPct * 1.25;
    const rsi = ind.rsi ?? null;
    const stochRsi = ind.stochRsi ?? null;
    const bbReversal = ind.bb_lower != null && price > ind.bb_lower * 0.985 && price <= ind.bb_lower * 1.035;
    const holdingBetterThanSpy = (p.change || 0) > (state.spyChange || 0) - 0.4;
    const volumeRatio = p.avgVolume ? (p.volume || 0) / p.avgVolume : 0;

    let radarScore = 30;
    if (nearSup) radarScore += 14;
    if (rsi != null && rsi < 45) radarScore += rsi < 35 ? 12 : 7;
    if (stochRsi != null && stochRsi < 40) radarScore += stochRsi < 20 ? 10 : 5;
    if (bbReversal) radarScore += 8;
    if (holdingBetterThanSpy) radarScore += 8;
    if (volumeRatio >= 1.5) radarScore += 7;
    if ((p.change || 0) > 0 && state.marketTrend !== 'bearish') radarScore += 4;

    const atrAbs = price * atrPct / 100;
    const stopLoss = (support || price * 0.97) - (0.2 * atrAbs);
    const lossPct = Math.max(0.1, (price - stopLoss) / price * 100);
    const targetPrice = resistance && resistance > price * 1.018
      ? resistance
      : price * (1 + atrPct * 1.7 / 100);
    const profitPct = (targetPrice - price) / price * 100;
    const rr = profitPct / lossPct;

    if (radarScore < 45 || rr < 1.05) continue;

    rows.push({
      id: stock.id, name: stock.name, sector: stock.sector,
      price, change: p.change || 0,
      score: Math.min(64, Math.round(radarScore)),
      checks: {
        rsiExhaust: rsi != null && rsi < 35,
        stochCross: stochRsi != null && stochRsi < 25,
        bbReversal,
        rvolOk: volumeRatio >= 1.5,
        nearSup,
        aboveVwap: false,
        emaOk: false,
        higherLow: false,
        breakout15: false,
        macd5Ok: false,
        macdDayOk: ind.macdHist != null && (ind.macdHist > 0 || ind.macdHistDir === 'contracting'),
        rsScore: holdingBetterThanSpy ? 6 : 0,
        rr,
      },
      rsi, stochRsi, support,
      vwap: null, ema9: null, ema21: null,
      rvol: volumeRatio, rs30: 0, stockReturn30: 0,
      stopLoss, targetPrice, profitPct, lossPct, rr,
      atrPct,
      marketTrend: state.marketTrend,
      action: 'Ø±Ø§Ø¯Ø§Ø± Ù…Ø±Ø§Ù‚Ø¨Ø©',
      actionTone: 'watch',
      actionNote: 'Ù‚Ø±ÙŠØ¨ Ù…Ù† Ø´Ø±ÙˆØ· Ø§Ù„ØµØ§Ø¦Ø¯ Ù„ÙƒÙ†Ù‡ Ù„Ù… ÙŠØ¤ÙƒØ¯ VWAP Ø£Ùˆ Ø§Ù„Ø§Ø®ØªØ±Ø§Ù‚ Ø¨Ø¹Ø¯.',
      isRadar: true,
      gainerClass: null,
      gainerNote: 'ðŸ‘€ Ø±Ø§Ø¯Ø§Ø± Ù…Ø±Ø§Ù‚Ø¨Ø©: Ù„Ø§ Ø¯Ø®ÙˆÙ„ Ù‚Ø¨Ù„ Ø±Ø¬ÙˆØ¹ ÙÙˆÙ‚ VWAP Ø£Ùˆ Ø¸Ù‡ÙˆØ± Higher Low Ø¨Ø­Ø¬Ù… Ø¯Ø§Ø¹Ù….',

  return rows

async function fetchAftermarketData(candidates) {
  if (!candidates || candidates.length === 0) return;
  await Promise.all(candidates.map(async stock => {
    try {
      const res  = await fetch(`${FMP_BASE}/stable/aftermarket-quote?symbol=${stock.id}&apikey=${API_KEY}`, { signal: AbortSignal.timeout(5000) });
      const data = await res.json();
      const d = Array.isArray(data) ? data[0] : data;
      if (d && d.price) {
        state.aftermarket = state.aftermarket || {};
        state.aftermarket[stock.id] = {
          price:  +d.price  || null,
          change: +d.changesPercentage || 0,
          volume: +d.volume || 0,
        };
      }
    } catch(e) {}
  }));
}

// â”€â”€ Ø¬Ù„Ø¨ Biggest Gainers Ù…Ù† Ø§Ù„Ø³ÙˆÙ‚ ÙƒÙ„Ù‡
async function fetchBiggestGainers() {
  try {
    const res  = await fetch(`${FMP_BASE}/stable/biggest-gainers?apikey=${API_KEY}`, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    if (!Array.isArray(data)) return [];

    // FMP biggest-gainers Ø£Ø­ÙŠØ§Ù†Ø§Ù‹ Ù„Ø§ ÙŠØ±Ø¬Ø¹ volumeØ› Ù„Ø§ Ù†Ø±Ù…ÙŠ Ø§Ù„Ø³Ù‡Ù… Ù‚Ø¨Ù„ Ù…Ø­Ø§ÙˆÙ„Ø© quote
    const base = data
      .filter(s => s.symbol && +s.price >= 1 && +s.price <= 200)
      .slice(0, 25);

    const quoteMap = {};
    const symbols = base.map(s => s.symbol).filter(Boolean);
    for(let i=0; i<symbols.length; i+=25) {
      const batch = symbols.slice(i, i+25).join(',');
      try {
        const qres = await fetch(`${FMP_BASE}/stable/quote?symbol=${batch}&apikey=${API_KEY}`, { signal: AbortSignal.timeout(8000) });
        const qdata = await qres.json();
        if(Array.isArray(qdata)) {
          qdata.forEach(q => { if(q?.symbol) quoteMap[q.symbol] = q; });
        }
      } catch(e) {}
    }

    const filtered = base
      .map((s, idx) => {
        const q = quoteMap[s.symbol] || {};
        const price = +(q.price ?? s.price ?? 0);
        const volume = +(q.volume ?? s.volume ?? 0);
        const change = +(q.changePercentage ?? q.changesPercentage ?? s.changesPercentage ?? 0);
        return {
        id:     s.symbol,
        name:   q.name || s.name || s.symbol,
        sector: 'Gainers',
        cat:    'mid',
        beta:   1.5, // Ø§ÙØªØ±Ø§Ø¶ÙŠ
        price,
        change,
        volume,
        volumeKnown: volume > 0,
        gainerRank: idx + 1,
        isGainer: true, // Ø¹Ù„Ø§Ù…Ø©
      };
    })
      .filter(s => s.price >= 1 && s.price <= 200)
      .slice(0, 20);

    console.log('[Gainers] Ø·Ù„Ø¹:', filtered.length, 'Ø³Ù‡Ù… | volume known:', filtered.filter(x=>x.volumeKnown).length);
    return filtered;
  } catch(e) {
    console.warn('[Gainers] error:', e.message);
    return [];
  }
}

function candleDecisionWeight(pattern, ctx={}) {
  if(!pattern) return 0;
  const volR = ctx.volR ?? 1;
  const nearSupport = !!ctx.nearSupport;
  const nearResistance = !!ctx.nearResistance || !!ctx.tooCloseToResistance;
  const trendUp = !!ctx.trendUp;
  const trendDown = !!ctx.trendDown;
  let w = pattern.strength >= 5 ? 2 : 1;

  if(pattern.signal === 'bullish') {
    if(nearSupport) w += 1;
    if(volR >= 1.5) w += 1;
    if(nearResistance) w -= 2;
    if(trendDown && !nearSupport) w -= 1;
  } else if(pattern.signal === 'bearish') {
    if(nearResistance) w += 1;
    if(volR >= 1.5) w += 1;
    if(nearSupport) w -= 1;
    if(trendUp && !nearResistance) w -= 1;
    w = -w;
  } else {
    return 0;
  }
  return Math.max(-3, Math.min(3, w));
}

// â”€â”€ Ù…Ø¤Ø´Ø± Ø§Ù„Ù‚ÙˆØ© Ø§Ù„Ù†Ø³Ø¨ÙŠØ© Ù…Ù‚Ø§Ø±Ù†Ø© Ø¨Ù€ SPY
function calcRelativeStrength(stockChange, spyChange) {
  if (spyChange === null || spyChange === undefined) return null;
  const diff = (stockChange || 0) - (spyChange || 0);
  let label, color, score;
  if      (diff >=  3) { label='Ù‚ÙˆØ© Ø§Ø³ØªØ«Ù†Ø§Ø¦ÙŠØ©';  color='#00ff88'; score= 20; }
  else if (diff >=  1) { label='Ø£Ù‚ÙˆÙ‰ Ù…Ù† Ø§Ù„Ø³ÙˆÙ‚';  color='#00c8ff'; score= 12; }
  else if (diff >= -1) { label='Ù…Ø¹ Ø§Ù„Ø³ÙˆÙ‚';        color='#7888aa'; score=  0; }
  else if (diff >= -3) { label='Ø£Ø¶Ø¹Ù Ù…Ù† Ø§Ù„Ø³ÙˆÙ‚';  color='#ff7a00'; score= -8; }
  else                  { label='Ø¶Ø¹ÙŠÙ Ø¬Ø¯Ø§Ù‹';       color='#ff2d7a'; score=-15; }
  return { diff: +diff.toFixed(2), label, color, score };
}

// â”€â”€ Ø±Ø³Ù… Ø§Ù„Ø´Ù…ÙˆØ¹ Ø§Ù„ÙŠØ§Ø¨Ø§Ù†ÙŠØ© Ù…Ø¹ OHLC ÙƒØ§Ù…Ù„
function renderCandleChart(closes, highs, lows, opens) {
  if (!closes || closes.length < 5) return null;

  const rawC = closes.slice(-16);
  const rawH = highs ? highs.slice(-16) : rawC;
  const rawL = lows  ? lows.slice(-16)  : rawC;
  const rawO = opens ? opens.slice(-16) : rawC.map((c,i) => i===0 ? c : rawC[i-1]);
  const n    = rawC.length;

  // Ø¨ÙŠØ§Ù†Ø§Øª ÙƒÙ„ Ø´Ù…Ø¹Ø© â€” open Ø­Ù‚ÙŠÙ‚ÙŠ
  const candles = rawC.map((c, i) => {
    const o  = rawO[i] || (i === 0 ? c : rawC[i-1]);
    const h  = rawH[i] || Math.max(c, o);
    const l  = rawL[i] || Math.min(c, o);
    return { o, c, h, l, bull: c >= o };
  });

  const allH    = candles.map(c=>c.h);
  const allL    = candles.map(c=>c.l);
  const maxP    = Math.max(...allH) * 1.001;
  const minP    = Math.min(...allL) * 0.999;
  const range   = maxP - minP || 1;
  const chartH  = 64;

  function yPx(price) { return ((maxP - price) / range) * chartH; }

  const patterns = detectCandlePatterns(closes, highs, lows);
  const topPat   = patterns[0] || null;

  return el('div', {style:{marginBottom:'8px'}}, [
    // â”€ Ø¹Ù†ÙˆØ§Ù† + Ø§Ø³Ù… Ø§Ù„Ù†Ù…Ø·
    el('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'4px'}}, [
      el('div', {style:{fontSize:'9px', color:C.text3}}, ['ðŸ•¯ Ø§Ù„Ø´Ù…ÙˆØ¹ Ø§Ù„ÙŠØ§Ø¨Ø§Ù†ÙŠØ© ('+n+' ÙŠÙˆÙ…)']),
      topPat ? el('div', {style:{
        fontSize:'9px', fontWeight:'800', color:topPat.color,
        background:topPat.color+'18', borderRadius:'4px', padding:'2px 7px',
        border:'1px solid '+topPat.color+'33',
      }}, [topPat.icon+' '+topPat.ar]) : null,
    ]),

    // â”€ Ø±Ø³Ù… SVG Ù„Ù„Ø´Ù…ÙˆØ¹
    (() => {
      const W = 280, H = chartH + 8;
      const cW = Math.floor(W / n);
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svg.setAttribute('width',  '100%');
      svg.setAttribute('height', String(H));
      svg.style.cssText = 'display:block;background:#060b14;border-radius:8px;border:1px solid #1a2340;';

      candles.forEach((cd, i) => {
        const x   = i * cW + cW/2;
        const col = cd.bull ? '#00ff88' : '#ff2d7a';
        const col2= cd.bull ? '#00ff8855' : '#ff2d7a55';
        const bodyT = yPx(Math.max(cd.o, cd.c)) + 4;
        const bodyB = yPx(Math.min(cd.o, cd.c)) + 4;
        const bodyH = Math.max(bodyB - bodyT, 2);
        const wickT = yPx(cd.h) + 4;
        const wickB = yPx(cd.l) + 4;

        // Ø¸Ù„ (wick)
        const wick = document.createElementNS('http://www.w3.org/2000/svg','line');
        wick.setAttribute('x1', x); wick.setAttribute('x2', x);
        wick.setAttribute('y1', wickT); wick.setAttribute('y2', wickB);
        wick.setAttribute('stroke', col2); wick.setAttribute('stroke-width','1');
        svg.appendChild(wick);

        // Ø¬Ø³Ù… (body)
        const bw = Math.max(cW - 3, 3);
        const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
        rect.setAttribute('x',      x - bw/2);
        rect.setAttribute('y',      bodyT);
        rect.setAttribute('width',  bw);
        rect.setAttribute('height', bodyH);
        rect.setAttribute('fill',   col);
        rect.setAttribute('rx',     '1');
        svg.appendChild(rect);
      });

      // Ø®Ø· MA Ø¹Ù„Ù‰ Ø§Ù„Ø±Ø³Ù…
      if (closes.length >= 5) {
        const maPath = candles.map((_, i) => {
          if (i < 4) return null;
          const slice = candles.slice(i-4, i+1).map(c=>c.c);
          const ma = slice.reduce((a,b)=>a+b,0)/slice.length;
          const px = yPx(ma) + 4;
          const x2 = i * cW + cW/2;
          return i===4 ? `M ${x2} ${px}` : `L ${x2} ${px}`;
        }).filter(Boolean).join(' ');
        if (maPath) {
          const path = document.createElementNS('http://www.w3.org/2000/svg','path');
          path.setAttribute('d', maPath);
          path.setAttribute('stroke', '#00c8ff55');
          path.setAttribute('stroke-width','1');
          path.setAttribute('fill','none');
          svg.appendChild(path);
        }
      }

      return svg;
    })(),

    // â”€ Ø§Ù„Ø£Ù†Ù…Ø§Ø· Ø§Ù„Ù…ÙƒØªØ´ÙØ©
    patterns.length > 0 ? el('div', {style:{
      marginTop:'5px', display:'flex', flexDirection:'column', gap:'3px',
    }}, patterns.map(p =>
      el('div', {style:{
        fontSize:'9px', color:p.color, lineHeight:'1.5',
        paddingRight:'2px',
      }}, [p.icon+' '+p.ar+' â€” '+p.tip])
    )) : null,
  ]);
}

  if(!isMarketOpen()) return;
  const history = loadHistory();
  const now     = new Date();
  const today   = now.toDateString();

  // ØªØ­Ø¯ÙŠØ¯ Ø§Ù„Ø¬Ù„Ø³Ø©: ÙŠÙÙ…Ø±Ø± ØµØ±Ø§Ø­Ø©Ù‹ Ø£Ùˆ ÙŠÙØ­Ø³Ø¨ Ù…Ù† Ø§Ù„ÙˆÙ‚Øª
  const t       = getMarketTimes();

  const session = forceSession || ((m >= t.midDay && m <= t.midDay+60) ? 'Ù…Ù†ØªØµÙ' : 'Ø§ÙØªØªØ§Ø­');

  recs.forEach(r => {
    // Ù„Ø§ ØªÙƒØ±Ø§Ø± Ù„Ù†ÙØ³ Ø§Ù„Ø³Ù‡Ù… ÙÙŠ Ù†ÙØ³ Ø§Ù„Ø¬Ù„Ø³Ø© Ù…Ù† Ù†ÙØ³ Ø§Ù„ÙŠÙˆÙ…
    const exists = history.some(h =>
      h.id === r.id &&
      new Date(h.recDate).toDateString() === today &&
      h.session === session
    );
    if(exists) return;
    history.push({
      id:         r.id,
      type:       'rec',                // â† ØªÙˆØµÙŠØ© Ø¹Ø§Ø¯ÙŠØ©
      name:       r.name,
      sector:     r.sector,
      session,                          // 'Ø§ÙØªØªØ§Ø­' Ø£Ùˆ 'Ù…Ù†ØªØµÙ'
      recDate:    now.toISOString(),
      recPrice:   r.price,

      signal:     r.signal,
      confidence: r.confidence,
      spyChange:  state.spyChange,      // Ø­Ø§Ù„Ø© Ø§Ù„Ø³ÙˆÙ‚ ÙˆÙ‚Øª Ø§Ù„ØªÙˆØµÙŠØ©
      marketTrend:state.marketTrend,

}

// â”€â”€ ØªØ­Ø¯ÙŠØ« Ù†ØªØ§Ø¦Ø¬ Ø§Ù„ØªÙˆØµÙŠØ§Øª Ø§Ù„Ù…Ø¹Ù„Ù‚Ø©
function updateHistoryResults() {
  const history = loadHistory();
  let changed = false;
  history.forEach(h => {
    if(h.result !== 'pending') return;
    const cur = state.prices[h.id]?.price;
    if(!cur || !(h.recPrice || h.price)) return;
    if(!h.recPrice && h.price) h.recPrice = h.price; // Ø¯Ø¹Ù… Ø§Ù„Ø³Ø¬Ù„ Ø§Ù„Ù‚Ø¯ÙŠÙ…
    const pnlPct = ((cur - h.recPrice)/h.recPrice*100);
    const daysSince = (Date.now()-new Date(h.recDate))/(1000*60*60*24);

    // Ø§Ø¹ØªØ¨Ø± Ø§Ù„ØµÙÙ‚Ø© Ù…Ù†ØªÙ‡ÙŠØ© Ø¥Ø°Ø§:
    // - Ù„Ù…Ø³Øª Ø§Ù„Ù‡Ø¯Ù Ø£Ùˆ ÙˆÙ‚Ù Ø§Ù„Ø®Ø³Ø§Ø±Ø©
    // - Ø£Ùˆ Ù…Ø¶Ù‰ Ø¹Ù„ÙŠÙ‡Ø§ 5 Ø£ÙŠØ§Ù… (ØªØ¯Ø§ÙˆÙ„ ÙŠÙˆÙ…ÙŠ)
    const hitTarget = h.target   && cur >= h.target;
    const hitStop   = h.stopLoss && cur <= h.stopLoss;
    const expired   = daysSince >= 5;

    if(hitTarget || hitStop || expired) {
      h.result      = pnlPct >= 0 ? 'win' : 'loss';
      h.resultDate  = new Date().toISOString();
      h.resultPrice = cur;
      h.pnlPct      = +pnlPct.toFixed(2);
      changed = true;
    } else {
      // ØªØ­Ø¯ÙŠØ« P&L Ø§Ù„Ø­Ø§Ù„ÙŠ
      h.pnlPct = +pnlPct.toFixed(2);
    }
  });
  if(changed) saveHistory(history);
  return history;
}

// â”€â”€ Ø¥Ø­ØµØ§Ø¦ÙŠØ§Øª Ø§Ù„Ø³Ø¬Ù„
function calcHistoryStats(history) {
  const closed  = history.filter(h=>h.result!=='pending');
  const wins    = closed.filter(h=>h.result==='win');
  const losses  = closed.filter(h=>h.result==='loss');
  const pending = history.filter(h=>h.result==='pending');
  const winRate = closed.length ? Math.round(wins.length/closed.length*100) : 0;
  const avgWin  = wins.length
    ? +(wins.reduce((s,h)=>s+(h.pnlPct||0),0)/wins.length).toFixed(2) : 0;
  const avgLoss = losses.length
    ? +(losses.reduce((s,h)=>s+(h.pnlPct||0),0)/losses.length).toFixed(2) : 0;
  const expectancy = closed.length
    ? +((winRate/100)*avgWin + (1-winRate/100)*avgLoss).toFixed(2) : 0;
  return { closed:closed.length, wins:wins.length, losses:losses.length,
           pending:pending.length, winRate, avgWin, avgLoss, expectancy };
}
